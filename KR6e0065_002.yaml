body:
  text: 第十依文正釋中二先通辯諸科後別依二釋前中本疏科此一部經文總為十例一本末部類二本部三分三問答相屬四以文從義五前後攝褺六隨品長分七隨會次第八本末大位九本末遍收十主伴無盡今存中八思之可見就存八中初本部三分者謂序正流通世主妙嚴一品即為序分證信發起通九會故現相品已去是正宗三流通分者古今七釋一光統師云以入法界一品為其流通證入法界廣無邊故二隋遠法師以法界品內明善財童子已去屬流通分三靈裕法師以法界品末九十五頌而為流通以歎德終極故四有師云以九十五頌末後二頌為流通以結說無盡歎益勸脩故五有師云流通分不在此中以經來未盡故六有師云此經假使十萬頌來盡亦不合有流通以法無盡說無休息故故大般若前後諸會一一各有流通此經諸會前既並無流通當知後來亦不應有七有師云餘眷屬經為此流通以彼皆是此流通故按前七釋第四為正所以者何前三非是勸學付屬二種相故第四釋內有勸學故來未盡經品在華藏毗盧相海隨好等內不在八十卷後故第六釋云以法無盡說無休息故無流通翻例大般若者斯甚不可違五義故一違自引例謂大般若十六會經各別證信是以亦別有流通此經諸會共一證信不可翻例無流通也二違自所立謂以法無盡無終極故無流通者亦應不許有序分也所以者何證信本為後代疑經故以六事證之令信今既有序豈無流通邪又此寧是不結集經若許結集不許流通未醒人也三違現事謂此經今既現行於代如何現見而執為無若謂雖有佛不付屬令流通者此豈文殊阿難專輙結集也四違自教謂此經發心十住出現等品皆云我等諸佛護持此經令久住世為未來菩薩未曾聞者令得聞故五違二機教謂佛於十地諸菩薩所未曾滅度說亦無斷不假結集故無序分亦無流通正宗之名於茲亦癈無縛對故或彼如來說一一部時有發起勸學容具三也若於地前諸菩薩所或有現前見佛滅度或有滅後根熟應聞對此即須證信流通二分安立今若以地前有流通之教同地上無結集之經乃是混亂兩機不分二機也第七釋云以餘眷屬經為此流通者此亦不然有五過故一彼眷屬經應無序正二分此經序正即彼正序故二彼經不合更有流通全部總為此流通故又有三過同前第六說二問答相屬者此科直就正宗中說九會總有五番問答初第一會現相品中大眾起四十句問當會答盡此名舉果勸樂生信分二第二會初名號品內諸菩薩念請有五十句問訖至第七會末答盡此名脩因契果生解分中間雖更有諸問答並是隨問隨答非大位問答也三第八會初普慧菩薩起二百句問後普賢菩薩以二千句問答當會答了此名託法進脩行德分四第九會初大眾念請有六十句問佛入師子頻申三昧示法界身雲為答此名大眾頓證法界分五善財童子於福城東問文殊師利文殊教問善知識法自後展轉指授乃至到普賢所前後總歷五十三處見五十五人五十三處問五十二處得五十三法門此約大位問答得法斯總名為一人歷位漸證分亦可前名果證分此名因證分或前是別門之總後是總門之別總別不相離鎔融無礙思之三以文從義科中二初序分後正宗就正宗中總有五周因果即分為五一初會中一周因果名為所信五品中初四品明毗盧遮那依果最後一品明佛往因即大威光童子也二從第二會至第七會中隨好品一周因果名為生解亦名差別謂前二十六品歷會顯因次有三品明彼果故三從普賢行品至出現品一周因果名為出現平等非差別顯故四第八會中一周因果名為成行謂普慧問中一百九十七句問因三句問果或成如來力一句通在因果答准可知對此所明而成行故五第九會中一周因果名為證入謂此品初明佛現法界身雲是所證之果後顯善財求法脩行是能證之因也四前後攝褺科中有十重一始從初品至第九會中文殊未出重閣已來是其本會亦名佛會佛為會主故後從文殊出閣已去乃至普賢已來皆是末會亦名菩薩會以諸善知識為會主故二前中有二謂前八會明信解行因果後第九一會顯證入法界因果三前中復二謂前七會明信解因果後一會顯成行因果四前中復二初隨好品已來明差別因果後普賢出現二品顯平等因果五前中復二初第六會已來明因中自分行後十定已去顯因滿勝進行六前中復二初第五會末明凡位行後第六會顯聖位行七前中復二初第二會末明外凡行後次三會顯內凡行八前中復二初光明覺品來明所依所信之境後問明等三品顯能依能信之行九前中復二初世主品顯於教生信後現相等八品明於佛生信初五依果後三正果十前中復二初為後代根性引證令信後爾時華藏下為現前機器發起信樂五隨品長分科中有十分一世主品是證信發起分二次四品是依果殊勝分三次一品是正果因脩分四名號等三品是三業應機分五從問明至住處品是生解脩因分六從不思議法品至隨好品是生解成果分七普賢行品是出現成因分八出現品是出現成宗分九離世間品是頓攝因果分十入法界品是證入法界分六隨會次第科中有十分初妙嚴品是九會都序分餘九會各一分故謂第一會是舉果生信分第二會生解之信分第三會解脩十住分第四會解脩十行分第五會解脩十向分第六會解脩十地分第七會解脩因圓果滿分第八會進脩成行分第九會證入法界分七本末大位科中有六十四序分分為一分九會中本會即為九分末會中有五十四分具顯如前通前總為六十四分八本末遍收科中有三千大千世界塵數餘一百二十四分謂序分為一九會為九六千比丘聞法為一善財已去一百一十三故彌勒云此長者子曩於福城受文殊教展轉南行經由一百一十善知識已然後而來至於我所釋曰即准此文善財未見彌勒前已經一百一十知識既後更見彌勒文殊普賢明知總見一百一十三人後文殊處云文殊師利為善財童子示教利喜令得阿僧祇法門乃至云於是善財得見三千大千世界微塵數諸善知識故後別依二釋者謂於上八例科中今依初二依初科者妙嚴一品是序分也現相品下是正宗也流通有無具如前說問若妙嚴品是序分屬初會不設爾何失二俱有失若言屬者信聞成就應唯初會若不屬者處眾成就屬何會耶答屬初會不所以者何處眾唯是初會序故餘四通為九會序故信聞二種文局義通時主二種文義俱通依差別門且爾分別若約融攝則相遍無礙就前序分中二初明此主序後如此世界下明結通十方世界海序前中二初明證信序後爾時華藏下明發起序前中二初總料簡後正釋文前中三一證信所由二證信所為三科文差別初中兩說一依智度第二云佛涅槃時於俱夷那竭國娑羅樹林中北首而臥欲入涅槃阿難親屬愛未除故未離欲故心沒憂海不能自出爾時長老阿泥盧豆語阿難言汝是守佛法藏人不應如凡人自沒憂海一切有為法是無常相汝莫愁憂又佛手付汝法汝今愁悶失所受事汝當問佛佛涅槃後我曹云何行道誰當作師惡口車匿云何共住佛經初首作何等語如是種種未來要事應當問佛阿難聞是事心悶少醒得念道力於佛後臥床以是事問佛佛告阿難若今現在若我過去乃至廣說身受心法以除世間貪憂又云從今日後解脫或經即是大師如解脫或經說身業口業應如是行車匿比丘如梵天法治若心耎後應教迦旃延經即可得道復以是我三阿僧祇劫所集法寶藏是藏初應作是說言如是我聞一時佛在某方某國土某處樹林中是我法門初首應如是說何以故三世諸佛經首皆稱是語今我經初亦應稱此如是我聞一時等語二依大悲經第五云佛告阿難我今以是正法寶藏付屬於汝汝勿令毀滅阿難白佛言我今云何脩行法眼乃至云我復云何結集法眼佛告阿難我滅度後有諸大德比丘僧眾集法毗尼時彼大德摩訶迦葉最為上首阿難時彼大德諸比丘眾應如是問世尊何處說大阿波陀那何處說摩訶尼陀那乃至云何處說聲聞藏緣覺藏菩薩藏阿難時彼比丘如是問已汝應答言如是我聞一時佛在摩伽陀國菩提樹下初成正覺如是我聞一時佛在伽耶城乃至云如是我聞一時佛在拘尸那城力士生地阿利羅䟦提河邊娑羅雙樹間乃至云佛說經已一切大眾皆大歡喜頂戴奉行阿難汝應如是結集法眼有人云大悲經中優波離教阿難問者今勘無此文二證信所為中六一為斷疑故真諦三藏引微細律云結集法時阿難昇座身變如佛於是大眾遂生三疑一疑大師從涅槃起重來說法二疑他方有佛來此三疑阿難轉身成佛阿難說此如是我聞語已大眾三疑一時頓斷謂身若是佛無此言故二為生信故智度論第三云說時方人令人心生信故三為異外道故外道經首置阿謳二字表斷常故四為息諍論故智度論云若不推從佛聞言自製作則諍論起故五為離增減過故佛地論第一云應知說此如是我聞意避增減異分過失謂如是法我從佛聞非他展轉顯示聞者有所堪能諸有所聞皆離增減異分過失非如愚夫無所堪能諸有所聞或不能離增減異分結集法時傳佛教者初作是言為令眾生恭敬信受言如是法我從佛聞文義決定無所增減是故聞者應正聞已如理思惟當勤脩學六為順同三世佛故如前所由門中智度論說三科文差別中三說不同一依真諦三藏七事記中科此證信序以為七事一如是者標所聞法二我者出能聞人三聞者親承音旨四一時者善合時宜五佛者顯能說師六摩竭國者彰說有處七觀自在等者表非獨聞二依大智度論龍樹菩薩科為六種成就一信二聞三時四主五處六眾此望前七合前二三餘皆同也三依佛地論親光論師科為五事一總顯已聞二教起時分三別顯教主四彰教起處五教所被機此望前六但合信聞餘皆同也上來第一總料簡訖自下第二正釋文者今依龍樹六種成就科釋此文於中三初總標五成就二阿蘭若下別顯四成就後有十佛下總別標顯眾成就初中分五一如是者信也二我聞者聞也三一時者時也四佛者主也五在摩竭提者處也初中二先別解信後信與聞合釋前中略敘七家一智度論第二云問曰諸佛經中何故初稱如是語耶答曰佛法大海信為能入智為能度如是義者即是信若人有信清淨是人能入佛法若無信是人不能入佛法不信者言是事不如是是不信相信者言是事如是二真諦三藏云真不違俗名之為如俗順於真稱之為是真俗無二故稱如是三肇法師云如是者信順之詞夫信則所信之理順順則師資之道成經無豐約非信不傳故建言如是四智者師云以文為如以理為是文以巧詮為如理以無非為是文巧理當故言如是五融法師云如是者感應之瑞也如以順機受名是以無非立稱眾生以無非為感如來以順機為應經以名教出於感應故云如是六隋朝遠法師云阿難所說如於佛語故名如為簡相似之如故復稱是七梁武帝云如是者謂如斯之言是佛說故言如是後合釋信聞中略有九說佛地論中自有六解一云如是我聞者謂總顯己聞傳佛教者言如是事我昔曾聞此總句為一釋二依譬喻謂當所說如是文句如我昔聞三依教誨謂結集時阿難告眾如是當聽我昔曾聞四依問答謂有問言汝當所說音定聞耶故此答言如是我聞五依許可謂結集時諸菩薩眾咸共請言如汝所聞當如是說傳法菩薩便許彼言如是當說如我所聞六依傳無增減謂如是法我昔曾聞此事如是齊此當說定無有異七功德施論云如是我聞者顯示此經是佛世尊現覺而演非自所作八長耳三藏依三寶釋謂依佛寶故言如佛所說是我所聞如我所聞是佛所說依法寶故言如我所聞是稱理之說如彼稱理之教是我所聞依僧寶故言如我所聞是諸菩薩同聞如諸菩薩同聞是我所傳九梁朝雲法師云如是我聞者將傳所聞之法先當提舉一部謂如是經教我於佛聞上來諸說雖各有理然今且用三家所說謂智度論信相釋佛地論無增減釋雲法師釋二聞成就中二先與如是合釋此如前說後單解我聞今應正辨於中二初釋文後問答前中二先釋我後解聞前中佛地論第一云我謂諸蘊世俗假者釋曰依此經宗傳此教者既當位極而稱我聞即是無漏蘊上隨世流布假立名言即此名言稱實稱我謂即四德真實之我八自在我因分有故二解聞中二初明小宗自有三說一薩婆多宗耳聞非識二法救論師識聞非耳成實同此三譬喻論者和合能聞如大婆沙第十三說二依大乘亦有三門一依法相二約無相三就無㝵法界初中四說一耳聞非識雜集第二云耳界何相謂能聞聲瑜伽三十五云數於此聲至能聞故名為耳二云識聞非耳佛地論第一云聞謂耳根發識領受瑜伽釋論云聞謂聽聞即是耳根發生耳識聞言教故釋曰上二論以耳不能聞要待發識然後得聞故或此二論取二和合文並通也三云六法合聞智度第一云爾時耳根不壞聲在可聞處作意欲聞情塵意和合故耳識生隨耳識生即意識生能分別種種因緣得聞聲四云八緣故聞謂即於前智度所說加七八識為染淨依通依等故成唯識第四云由此五識俱有所依定有四種謂五色根六七八識隨闕一種必不轉故同境分別染淨根本所依別故二約無相中二說一依二緣能聞顯聞無性故雜集第一云問曰為耳聞聲為識等耶答非耳聞聲為識等耶答非耳聞聲為識等耶答非耳聞聲亦非識等以一切法無作用故由有和合假立為聞眼等亦爾廣如彼說二依智度第二云問曰聞者云何耳根聞耶耳識聞耶意識聞耶若耳根聞耳根無覺知故不應聞若耳識聞但唯一念不能分別故不應聞乃至意識亦不能聞由先五識識五塵然後意識識意識不能識現五塵但識過未五塵若意識能識現五塵者盲聾之人意識既行應識色聲答曰非耳根聞乃至亦非意識能聞從多因緣和合故聞不得言一法能聞乃至云爾時耳根不壞聲在可聞處作意欲聞情塵意和合故耳識生隨耳識生即意識生能分別種種因緣得聞聲是故不應難言誰聞聲佛法中無有一法能作能見能知能說偈云有業亦有果無作業果者此第一甚深是法佛能說雖空亦不斷相續亦不常罪福亦不失如是法佛說三就無礙法界者謂傳法菩薩以無㝵法界耳聞無㝵法界法能聞所聞皆遍法界如是之聞是此聞也上來釋文竟二問答中四一問依上諸說耳等能聞何故言我聞耶答佛地論云癈別就總故稱我聞二問說此經時聲聞在會如聾如盲又傳教弟子當時未有此稱我聞定是誰耶答此有三釋一云餘人稱故無前難也然有三說一弘廣菩薩稱此我聞故涅槃第四十云我涅槃後阿難比丘所未聞經弘廣菩薩當能流布阿難所聞自能宣通故二通諸菩薩稱其我聞故菩提留支譯金剛仙論云佛在鐵圍山外二世界中間召集阿羅漢八十億那由他菩薩無量無邊恒河沙數結集大乘當於爾時菩薩聲聞皆云如是我聞佛在其處說某經廣如彼說三文殊師利稱故智度論云迦葉阿難於王舍城結集三藏為聲聞藏文殊阿難於鐵圍山結集摩訶衍為菩薩藏亦不可說阿難對於文殊作結集主稱我聞也二云展轉從他聞故稱此我聞亦離前難故報恩經第六云阿難從諸比丘邊聞或有諸天向阿難說三云阿難親聞故而稱我聞為有四說一如大集法經說有三種阿難謂阿難陀持聲聞法阿難陀䟦陀羅持緣覺法阿難陀婆竭羅持菩薩藏金剛仙論及真諦般若疏引闍王懺悔經等並同此說此諸經論既說阿難有其三種海稱我聞則離前難也二阿難先未聞經佛重為說故稱我聞亦離前難故報恩云阿難未為佛侍二十年中佛所說法因阿難請並為重說三阿難得勝定總持等故金剛華經云阿難得法性覺自在王三昧故如來前所說經皆能憶持與親聞無異涅槃云阿難多聞士若在若不在自然能解了常與無常義四阿難是大菩薩故得親聞不思議境界經云爾時復有千億菩薩現聲聞形亦來會坐其名曰舍利弗目犍連乃至云阿難提婆達多䟦難陀等而為上首皆已久脩六波羅蜜近佛菩提為化眾生於雜染土現聲聞形釋曰准此經文為究竟說前諸說者皆方便爾三問傳佛教者何不稱名但云我聞答恐濫同名失故他亦有我豈無濫耶己身稱我定屬自故故無濫失四問一切佛教說無我人何故經首乃稱我耶答此有兩釋一依智度第二略由五義一佛弟子輩雖知無我隨俗說我非實我也二世界語言有三根本一耶二慢三名字初二不淨後一是淨一切凡夫具三種語見道覺人有慢名字無學聖人唯有名字內心不實法隨世界人故共傳是語三除世邪見四順俗無諍五若佛弟子著無我相容可難言既知無我何故稱我聞諸法尚不著何況著無我二依瑜伽第六略由四義故稱我聞一為世間言語便故二為隨順諸世間故三為斷除決定無我諸怖畏故四為宣說自他得失令生決定信解心故顯揚第九雜集十三皆同此說問答竟第三時成就中四一通顯時分二別釋一時三辯體四問答初中二先述古德後依論釋前中三說一菩提留支云時有多種謂一念時日夜時百年時一劫時春夏秋冬時今言一時非此等時正是如來說此經時二長耳云時有兩種一半音時對緣不遍二圓音時對緣普遍又云梵音劫波自有三種一迦羅時此云別相時如說戒律時大戒時得聞小戒時不得聞出家時得聞在家時不聞國王得聞餘人不聞二三摩耶時此云破邪見時謂五部阿含九分達摩不簡白黑一切得聞五部者謂長中雜增一百部也九分者謂一分別說戒二世間三因緣四界五同隨時得六名句文七集定八集業九諸蘊一分各有六千偈六九五十四合五萬四千偈如真諦部執記第一卷及智度論說三世流布時如說一時佛在恒河岸一時在申恕林等今言一時依後二說或依第三三真諦云時有十種一佛出世時二說正法時三聽時四持五思六脩七下善根時八成就善根時九解脫善根時十平等捨心時謂心離退離動棄法拔沈抑浮調停得中念捨平等得入正法今此通四也二約論釋中二說一梁攝論云時有三種一平等時謂無沈浮顛倒故二和合時謂令能聞正聞故三轉法輪時謂正說正受故今云一時通此三種也二智度論云時有二種一迦羅時通假及實內外通用二三摩耶時唯假非實今云一時者是後所攝二別釋一時中三一依功德施般若論云一時謂說此經時餘時復說無量經故二依佛地論自有三說故彼第一云言一時者謂說聽時此就剎那相續無斷說聽究竟總名一時若不爾者字名句等說聽時異云何言一二云或能說者得陀羅尼於一字中一剎那頃能持能說一切法門或能聽者得淨耳根一剎那頃間一字時於餘一切皆無障礙悉能領受故名一時三云或相會遇時分無別故名一時三依此經始成正覺時一剎那或無量劫融無障礙乃至具攝一切法界無不皆盡方名一時三辨體中一云與時大小宗中通有四說一依薩婆多及經部宗蘊門俱以五蘊為性界處門中有為為性二依大乘法相五蘊門中行蘊所攝界處門中法處法界意識境故佛地論云時者即是有為法上假立分位或是心上分位影像色心等上總假立故是不相應行蘊所攝三依無相者智度論第二云問曰佛法中數時等法實無所有蘊界入所不攝故乃至云如是等種種除邪見故不說迦羅時說三摩耶時答曰見蔭界入生滅假名為時無有別時所謂時方離合一異長短等名字凡人心著謂是實法以是故除棄世界名字語言法釋曰此以離相為性也四依相無相無礙者謂一之與時皆是德相應機之具是故一收一切數盡為一體一時攝一切前後際劫盡為時體乃至各具無邊無盡理事無礙法界以為其性所以者何一切諸法不離此故染界妄心所現一時於此一時即是不是故四問答者問說處城國既具標名說時日月何不別顯答且依標總由二義故但云一時若據別顯許亦無失言二義者一言略義同故云一時謂佛說法或一剎那乃至多劫一期究竟總名一時故二語言便易故言別顯無失者即如此處文云始成正覺故又別行十地經云成道未久第二七日故涅槃云二月十五日臨涅槃時故仁王云年初月八日方坐十地故如是等文處處皆有不可繁引上來第三時成就竟第四主成就中三先得名次出體後問答初中三一佛謂佛陀此翻為覺即圓滿大智照用者也所照是何謂菩提法即真俗無二無障礙法界境也二依佛地論第一云具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛三依此經宗始本無異之智照法界法無有差別名之為佛下文云於一切法成最正覺故普照境界同一法性始本冥會境智一如名之為佛二體性者依佛地論五法攝大覺地謂四智及清淨法界依此經宗具攝無邊無礙法界一切諸法乃至三種世間總攝為體三問答中三一問說此經者或佛自說或菩薩說或佛菩薩光明中說或神天等種種類說何故今此唯稱佛耶答說雖多類莫不皆承佛力佛為主故證信勝故但標佛也故智度云若不推從佛聞則諍論起故二問大師具有十號何故經首唯標佛稱答依真實論佛具十義餘號不爾故但云佛十義如前具釋題目中說三問說此經佛為他受用為麤化身設爾何失二俱有過若他受用則不應在摩竭提國又與十地偈頌相違彼云人間最勝世中上釋師子法加於彼若麤化身則不應名毗盧遮那現相品云毗盧遮那大智海面門舒光無不見如是等文諸會皆有如何釋通答說此經佛非唯他受用亦非唯麤化所以者何十身說故謂如來身應機而有機宜無盡佛身亦然故說十身意顯無盡然佛一身與無盡身非一非異何以故由是佛故入法界名號等品皆說一身或稱釋迦牟尼或稱毗盧遮那或稱悉達多等故無違也十身者如別行章說上來第四主成就竟第五處成就中總標摩竭提者西方諸佛六說不同一云摩竭提者總相而名謂之善勝善中之勝故或善即勝故二云摩不也竭惡也提處也由此處所無惡法故三云摩不也竭害也提處也以此國無刑戮有犯死者置之寒林故四云摩遍也竭提聰慧也言總慧之人遍其國內故五云摩竭星名也提處也以此國界屬彼星故六云摩大也竭提體也言此國於五印度諸國之中境界最大故上六說中今用表法第六為勝謂所明法界廣大包含故或通初四理亦無違自下第二別顯四成就者一別顯處深二始成下別顯時遍三其地下別顯處嚴四爾時世尊下別顯主德初中二先釋文後問答前中云阿蘭若法菩提場中者今勘梵本正云達摩阿爛攘此翻為法閑寂亦曰法無諠諍此名簡異事無諠諍謂事寂事諠時處必異法無諠諍諠即無諠故曰達摩阿蘭若也即由此理凡譯梵言不必皆迴故阿蘭若有其三類一檀陀迦阿蘭若謂沙磧處也二摩登伽阿蘭若謂塚墓間去村落一俱盧舍依婆沙一百三十六說四肘為一弓五百弓為一俱盧舍今計二尺為肘四肘即八尺總有四千尺也依正量部一俱盧舍一千弓量八尺為弓總八千許步當此減四里少許真諦釋云阿蘭若者名無聲處謂無聚落聲無採斫聲無鬪諍聲故三達摩阿蘭若即此所明具釋如前言菩提者此云所覺法即真俗鎔融無礙法界於此證會故場謂檀場譬類之名如世壇場靈祇棲託佛為眾聲靈祗之最託跡所依假其名爾按西域記摩竭提國在中印度界王舍城處其中去此王舍城西二百餘里有山名伽耶山南有樹名畢鉢羅由佛於下得菩提故改名菩提樹也後問答者問說此經處為淨穢邪設爾何失二俱有過謂若是穢不應云寶樹寶池又此品末亦不應說言爾時華藏界其地六種動若是淨者說九會處何故皆在娑婆人天答准上下文華藏娑婆就相說異以相從性無礙圓融是故依如此處說如此法也問此初會既在摩竭國說彼國眾生有預會不設爾何失二俱有過若有預者經何不言若無預者何須此說答此有二義一為表法二為應機言表法者謂摩竭國是諸國之上首第一會為九會之最初故此說也言應機者會中菩薩除十方新來餘皆隨願生於此國斯即應機何必要列凡俗方是所化之眾第二別顯時遍中二先釋文後問答前中始成正覺者謂前但總標聞法一期究竟然未別指的在何時故此別名始成正覺時也謂初成就正真覺智然此約教總有五說一依小宗說菩薩於菩提樹下脩三十四心已得菩提時名始成正覺如婆沙八十二說二依權教大乘自有兩說一約八相化身於覺樹下現降魔已示成正覺時名始成正覺二約報身三無數劫備脩萬行十地滿足無間道後四智創圓時名始成正覺三依實教大乘亦有兩說一以始覺智同本覺智無始本兩異之時名始成正覺二以十佛法界身雲周遍法界時處皆盡無處無時無非應現新成佛名始成正覺即前化相亦即是此所以者何眾生須成始成無不應故今此所明是最後也第二問答中五一問此雖別顯教起時分而云始成正覺然未定說成道已後幾日說耶答准十地論經說佛成道後第二七日即說此經故若爾何故佛不思議品說一切諸佛現身說法周遍法界一切時處故彼中云一切諸佛能於一身化現不可說不可說佛剎微塵數頭一一頭化出若干數舌一一舌化出若干數差別音聲一一音聲演若干數脩多羅乃至云未來際劫猶可窮盡如來化身所轉法輪無有窮盡又乃至云所有音聲文字句義一一充滿一切法界其中眾生皆得解了而佛言音無變無斷無有窮盡答此中第二七日者即是攝盡九世十世之第二七日是故此日說即是彼一切時說故不相違問若爾諸時相望相攝力齊何要在此不在餘時答此即是餘不得說餘又亦不礙表初之說以不懷相故問世親菩薩釋十地經云此法勝故在初時及勝處說豈初二會及七八九會所說佛果不如十地又密跡普曜二經同說成道已第二七日於鹿野苑說三乘法而普曜云說十二因緣三乘俱益者以十二因緣通三乘故若以初說即為勝者此說三乘亦應勝耶答世親且依一相故作是說謂涅槃心中十地為勝六欲天中他化為勝一代說法此日為勝非謂一切也問世親既云此法勝故在初時說初時即是第二七日何故諸經律論說初轉法輪曰與此異同如前所引密跡普曜所說轉日與此經同若依法華第四七日說四分律第六七日興顯行經七七日五分律八七日智度云五十七日十二遊經云一年方說有云智度五十箇七日與十二遊經一年說同如是異說如何會釋答此由根器差別宜聞不同望佛赴感無時不說望器無感未曾有說是故已入大地諸菩薩眾不見如來初說後說於一切時處恒見如來常說純說大乘一味不思議法品中據此而辨第三別顯處嚴者此下亦可辨三世間嚴又前雖別顯阿蘭若等然未具明場中所有故此別顯於中有四一道場地嚴二其菩提下明菩提樹嚴三如來所處下明宮殿樓嚴四其獅子下明師子座巖就初地嚴中有十事分四初一地體嚴謂標以堅固釋以金剛此總句也俱舍第十一云唯此洲中有金剛座上窮地際下據金輪一切菩薩將登正覺皆坐此座起金剛喻定更無餘依及餘處所有堅固力能持此故此中望彼有同有異思之次四事地面嚴於中一寶輪離相之極二寶華三淨寶四現眾色相廣多如海次四事地上嚴一寶幢於中復五一體是摩尼二光業不息故云常三說法無間故云恒四寶網隱顯莊嚴五華纓體香名香華纓周垂瑩助為幢嚴故二寶能現身通故云變現一能雨寶說法也二能雨華成行也皆能任機即應並云自在三法性生華麗而且普鎔融行位四繞幢寶樹為眷屬行列枝葉繁悉發光故云光茂也後一事佛力加嚴謂場中所有之物皆於地面現影第二菩提樹嚴中九事分四初一樹形嚴謂高無與等故云殊特此總句也次三事樹體嚴一身是金剛二幹是瑠璃三技是雜寶次四事體相用嚴一唯用嚴謂密蔭垂涼二唯相嚴謂華雜色相間技間三體用相嚴謂摩尼體發焰用間飾相故華果同時自有二義一從觀同時因果行所生故二從佛行所起故佛行如出現品說四展轉用嚴於中三一遍樹光二光雨寶三寶出菩薩此顯依正無礙寶及菩薩非本嚴事故總為一設開為三亦無傷也後一佛力加嚴謂說法無盡故云恒也第三宮殿樓嚴中十一事分五初一量及相嚴謂廣而且麗於中四句一標主次二舉事廣麗後句釋廣此總句也次一體嚴謂眾色摩尼成故次一相嚴謂寶華莊故次七勝用嚴一嚴其出光如雲涌出應用無來用謝無去二宮殿間影成幢勘影字梵云阿嚩無賀皤蒲賀娑此云照曜亦云影亦云光雖通三義量所宜用今此應云光華成幢三眾海所集勘梵本云阿難攘菩提薩埵曼荼羅娑揭羅三摩嚩薩攞囊羯此云無邊菩薩部類眾海湊入之藏其曼荼羅音通於五義謂泥壇日輪圓滿境內部類今此即當部類之義以道場眾會無邊品類周帀遍滿不但集在宮殿邊故讚宮為藏者以其包容菩薩眾故四出佛光聲有二種一佛光出聲二聲與光別然是法界體事又能說法界門名不思議五寶網周垂六現佛力境七現染影像問染淨不俱如何淨中現染答染以無性為性仍不壞相故淨證無性成與染令為體不壞淨性故染淨相望非即離也後一佛力加嚴謂於時處體事而現廣促業用一念包法界也一念者仁王觀空品云一念有九十剎那一剎那中九百生滅下文說念准此應知第四師子座嚴中十事四一量及相嚴謂高廣而復妙好上無加故高旁無外故廣即事而理故妙即理而事故好此總句也次四事體嚴謂一臺是摩尼二網是蓮華三輪是妙寶四纓是雜華次四事相嚴一諸事脩嚴二技果間飾三寶光相照四主伴珠寶俱放光瑩後一事佛力加嚴謂說佛境界上來四段是第三別顯處嚴竟亦即三種世間中器世間莊嚴訖第四別顯主德者前雖總相標佛為主然未具明主之德用故此別顯於中有二先總牒前所處之座後於一切下別明其德德中有五一三業普周二身恒下明遍應群機三一一毛下明毛端容剎四身遍下明身智皈寂五三世下明光現佛事初中二先法後喻法中三業即為三初意業中二先標後智入下釋標中云於一切法者真俗二諦法也成正覺者獲得曰成至極名最離倒為正開悟稱覺於何開悟謂即前一切法云何開悟此有三釋一云於真諦境證離言性際於俗諦境窮盡差別相二云法差別境即無差別故如瑜伽三十八云如其勝義覺諸法故名等正覺後釋云智入等是也三云證真即俗而不壞真證俗即真而不壞俗真俗二境及智鎔融不二而二二而不二如是開悟為正悟之極故云最正覺也後釋中言智入等者釋前於一切法正覺也此二句一義前約隨俗入之言達謂了達過未之事分明顯然與現無別故云平等後約會性入之言證謂證會三世法體同一法性故云平等二身業中云其身等者有二義一即此座上坐時即充滿法界眾生前故二佛身全收三種世間故云充滿三語業中云其音等者此通三種一音聲二言音三言所詮法文雖通三意在說法能順十方故後喻中二喻初喻喻前意業後喻前身語兩業初喻中兩句一含容義喻量智照俗不礙萬像二平等義喻理智照真萬像一性然不礙萬像後喻中兩句初句普遍義喻前身業充三世間後句遍入義喻語業普說逗機故云平等隨入或圓音合機各隨影像解故名入也第二遍應群機德中二初身業後演一切下語業前中三初明普遍超勝德先明普遍後明超勝前中言遍坐一切道場者其類有五故言一切謂一一切同類世界中道場如名號品等說二一切異類世界中道場謂樹形等如世界成就品說三一切世界種中道場四一切世界海中道場並如華藏品說五一切微塵中諸世界內道場乃至重重如是五類佛皆遍坐後超勝者彰超劣非奇故云菩薩眾中等如日映星也二三世下明果滿行因德亦主伴顯發德三無邊下明光遍法界德二語業中兩句初法後喻配合可知第三毛端容剎德中二初明容剎無礙然有二義一一毛端有多剎是小大無礙二多剎互容不失自相是相在無礙後各現下明於諸剎內調化自在第四身智皈寂德中二初明身不動而遍此有二義一用而常寂身應十方而常寂故無來往二佛身如理圓遍一切在即是彼故不待來往也後智入下明智無寂謂了相無依故云入也第五光現佛事德中二初光現三世佛神變後一切下光現一切佛土莊嚴上來別顯主成就竟自下第三總別標眾成就中二先料簡後釋文前中略顯三門一眾數二新舊三位地初中通辨九會眾會數總有一百七十二眾謂都序中有四十一眾謂同生一眾異生三十九眾佛師子座中一眾此四十一眾遍九會第一會中有三眾謂舊眾新集十方眾佛眉間眾第二會中有新舊二眾第三第四會中各有三眾謂舊眾證法眾及天王眾第五會中一百一十一眾謂舊為一昇天品內供眾有一百七并天王眾及偈讚品中新集眾又十回向品中證法眾第六會中有四眾謂說偈天女眾同生異生證法眾第七第八兩會各唯一眾謂普賢普眼等舊眾第九會中三眾謂菩薩眾聲聞眾天王等舊眾上來且就別有此不同若依融攝一一會中有餘會眾稱法界會互相在故准計可知二諸會新舊者或有會中唯舊無新如七八兩會或亦新亦舊如餘七會其三四五六會中證法菩薩皆新來故三位地者此中略有五類眾以辯位地一常隨眾亦名嚴會眾主伴眾謂普賢善德等同生異生眾同生有一眾異生有三十九眾一一皆有十佛剎微塵數如實廣說盡法界一切佛互為主伴常互莊嚴果位十身菩薩身故二表法眾如說十住解位以慧名表解等然皆因位極也三證法眾此中通八地已上故四所被眾此中不定或始從凡位乃至十地等故發心功德品云十方諸佛告法慧菩薩言汝說是法皆無量眾生發菩提心乃至云無量菩薩一生當得阿耨菩提等又如天王天女等皆是初地已上由見法界身故五供養眾多是初地已上上來且依行布德說若約圓融行位則不如是謂所修之行既一即一切故所成位亦無礙也約教思之二釋文中二初各通列名通讚德後爾時如來道場眾海下別標名德以德讚佛前中四十眾分二初一是同生眾後復有佛世界塵數執金剛下是異生眾問何類何位為同異生復云何名同異生耶答古來諸德種種解釋或云聲聞為同菩薩及雜類為異或云菩薩聲聞為同雜類為異或云菩薩為同聲聞雜類為異或云地上為同地前為異或云八地已上為同已前為異或云菩薩及雜類俱為同異或云雜類為同菩薩為異或云菩薩為同雜類為異雖此八釋後三可通前五難用所以者何同異生名非地位故十地論釋請分之中唯言解脫月是同生眾首不判聲聞故就後三釋中初依實義不據分相今既科文須依分相二約菩薩形非隨所化異生作彼同類生身故雜類不爾故名為同所以者何異生之名有二義故一者造異趣業受異趣生故二者異聖人生故此中同異雖俱菩薩約形相別而立其名三約雜類為隨所化諸異生類作異生形同生之名但約同得法性生身作菩薩形故今於三中依最後釋就前同生文中有四一標數辨類二其名下依數列名三如是等下結略顯廣四此諸下依名歎德初中十佛世界者十是一周圓數表無盡故佛世界者凡一佛上報化有異權實宗殊今取共許者為量則一三千界也或名佛剎或名佛土體無差別微塵者七極微量也下文有此並准應知菩薩摩訶薩者此通名也具釋如前藏部攝中然今意取果位菩薩示跡因極者也二依數列稱也文中略列二十菩薩初十連枝普者顯具法界總相德故准下第五卷列名得法中次音賢下有一菩薩名淨德妙光今此略也後十名異者表具法界別相德故然總之與別莫不同一法界而不礙分相顯德立其名爾又此十名中或依福行德行或通福德或德用或離障或據蘊德或約三業勝用如是種種准釋可知三結云十佛等者如前可知四歎德中二先一句標後往昔下釋標簡餘位故云也釋中總有二十四句分三初二句就緣歎德次二十一句就行歎德後一句總結多門今勘梵本總有二十一句其中同異各如下注就初約緣歎德二句中初句歎宿因同行後句歎從佛海生前中云以昔與佛同善根故今得同言毗盧遮那者此翻為遍照光明此有四義一身光遍照事法界乃至塵道二智光遍照理法界三身光照事理四智光照理事所以者何身智理事互鎔融故此彼或俱皆無礙故後句云皆從等者如何菩薩自體乃從如來善根生耶本疏兩釋一如來善根為增上緣真善知識為令梵行就彼勝緣故說從生二彼諸菩薩所脩之行皆如來所有據彼令行行滿成身故從彼生今助兩釋一從他如來善根海生主伴善根之所生故二從自如來善根海生果德十身故所以通此自他義者文無簡言故梵本云與佛同一善根海生故此有二意一顯類會有因二顯大人類會前主伴有三一迴向主伴二同行主伴三如相主伴後從自如來者如下兜率偈讚品云如是菩薩皆與毗盧遮那如來於往昔時同種善根乃至云已得佛身與佛同住獲一切智從一切智而生其身又如如來不思議境界經說如上釋稱我聞中顯第二就行歎德中二十一句分二初九句歎自分因行德後十二句歎勝進果行德前中分三初三句自利行圓次三句利他行滿後三句得法位極初中一諸度行圓謂多劫積集六度十度八萬四千乃至無盡行海莫不究竟或照諸度境界畢梵本云圓滿曜一切波羅蜜境故二慧用殊勝決擇名慧照矚稱眼見一味理故云明微等觀三世者照三世境同一法性無差別故或智遍照梵本云智照光明妙極清淨普照三世故三顯定深勝三昧正云三摩地此曰等持離沈掉故名等攝心一境名持言具足者無定不獲故清淨者定障皆盡故又於一切定境皆明徹其際故云具足清淨梵本云照一切三昧梵極清淨故二利他行滿中三一語業正教輪言辨才者巧顯深理曰辨善應機宜曰才如是辨才稱理深遍事廣難測如海二身業神通輪謂以佛德類身令物尊嚴上二句梵本合為一句梵云照佛廣大功德威德無盡辯才海故三意業記心輪謂知根利鈍大小生就耎中上別稱其所宜謂之如應勸善制惡故云化伏梵云照一切世間調伏成發趣平等等智故三得法位極中三一證理法謂大智證入平等真法界藏言智無差別者能證智與所證境冥合一味無智外如為智所入亦無如外智來入於如不即不離說智證如本來無二不壞能所如是證入為究竟證也依佛性論有五種藏此即是彼第五藏也故彼云一如來藏者謂在纏合果法二自性清淨藏謂在纏不染三法身藏謂在果為功德依四出世間上上藏謂出惑障超過二乘菩薩五法界藏謂通因果染淨外持一切染淨漏無漏法故名法界內含一切恒沙性德故復名藏梵云照無差別智地一法界藏故二證果法中證佛解脫者謂於佛總相別相解脫法門各皆互得此則於出離道及作用皆自在無礙故名解脫如下不思議法品云於一念中建立三世一切佛事等廣如彼說有說離愛無明得心慧解脫者非此所宜甚深廣大者謂解脫事無不包理不極故梵云照佛所行甚深廣大解脫境界故三得位極者謂此諸菩薩身遍六位隨在一位能以方便攝持一切地行願海梵本中分成兩句取意復殊謂上句明與佛同一地照履出生等下句明以願力持力照無邊眾生梵云照曜隨順履踐出生一地故住加持智入一切願海照無邊故第二歎勝進果行中十二句分三初得果法二於一切處下起果用三一切如來下攝果德初中五句一同佛三業隨智慧行無間無盡窮未來際此句梵本入前句中二入佛密境此有二種一佛即密境謂佛三業業名非餘測量故如密跡力士第二卷說應持菩薩量佛身不得限目連尋佛聲不得邊佛心無思成事等廣說如彼又佛身非色現色色現非色非量現量量現無量不分而遍不去而至應見者則遠感無限未宜見者現前不覩自身一多多一及與餘佛一多多一皆各同時鎔融無礙應聞聲者無隔遠近遠聽不異近未可聞者對語不聞一音應多類各謂同己言意所照燭等覺菩薩不能測是則佛為菩薩密境二佛之密境謂佛所知見甚深陀羅尼三摩地微細因陀羅等非餘境界故言希有窮其源際故云了達如下文說第十地菩薩入如來十種祕密處處即境界此文或通前二義也梵云遍照如來廣大秘密希有境界故三入佛平等法謂一切諸佛體性平等以法身無二故智平等無增減故用平等悲願普應故梵云智光隨順恒照一切佛平等法故四得佛位者佛有十地如大乘同性經說一甚深難知廣明智德地二清淨身分威嚴不思議明德地三善明月幢寶相海藏地四精妙金光功德神通智德地五火輪威嚴明德地六虗空內清淨無垢焰光開相地七廣勝法界藏明界地八最勝普覺智藏能淨無垢遍無礙智通地九無邊億莊嚴迴向照明地十毗盧遮遮那智海藏地釋曰其毗盧遮那地即是此中普光明地斯經文略故無智海藏言此諸菩薩皆先成就故云已踐又為舉後攝前但說此地理實皆踐踐者遊履謂得究竟圓滿之智照佛大智所行之境准此應云已踐如來普光明地所行之境地即是智約位名地或可以智照智義亦無傷梵云安住如來所行普光智地照無邊門遊行一切三昧海故五得佛三昧海謂佛無量定深廣如海菩薩已微其深故云入等也梵本此句入前句中二起果用中三一現佛身業遍世同事梵云見一切世間行海智善安住隨順一切行故二得佛意業謂大總持持多法故三得佛語業能轉法輪不退有四一稱理不退無改說故二應機不退一發即中無初後故三利益不退令一聞已畢竟定故四制伏不退能伏魔軍制外道故法輪義如別章梵本上二同一句前句是陀羅尼之辨才不分二業梵云得一切法海左右旋陀羅尼善巧辨才故三攝果德中四一佛德入身謂一切如來無邊功德皆入其身梵云一切佛功德海入身周遍故二自在遊剎中二初標現德謂十方佛土隨願遍至後已曾下顯宿因謂往昔曾事彼諸佛故梵本中兩句意各別又是願力出光遍住諸剎非身去也梵云願海出生光明遍一切佛剎故無邊際劫愛樂供養一切諸佛得法門光明故三一切如來下常遍為伴梵云一切如來道場皆往禮觀故四恒以下純授大法勝果智身即是佛身異名梵云以普賢無餘願海令一切眾生智身顯現故第三成就下總結多德謂諸菩薩德齊佛海別歎難周故此總結云無邊也第二大段明異生眾中二先科文後釋義前中異生總有三十九眾分之為三初金剛神下明諸神眾二阿脩羅下明雜類王眾三夜叉王下明諸天眾又此三十九眾為顯守護三世間故有三類別初金剛及足行神二眾守護智正覺世間二道場神已下至主晝神守護器世間三身眾神及阿脩羅已下並守護眾生世間隨有兩判且依前釋就初諸神眾中有一十九眾一一眾內文皆有四謂標數辨類依數列舉略結廣略歎其德初金剛神眾標數可知辨類者神執金剛杵衛護如來靈祇不測故曰執金剛神此從所執為名有財釋也二依數列名可知三舉略結廣易解四歎德中十句分二初一句宿願多劫故預斯會後隨願下九句昔願所行今並圓滿故預斯會九中初一句總後積集下八句別別中一福行願滿二定行願滿三通行願滿四證解脫行願滿五威光行願滿六隨應現身調生行願滿七隨佛化往行願滿八守護行願滿第二身眾神眾中文四同前辨類有二義一身謂神之自身眾即同生同名及所隨者凡有其二共有其三三故名眾此從所化得名身之眾故依主釋也此神即是菩薩同生同名隨類生身二謂此神專以變化多身而為佛事故立其名德中二初云皆往昔成大願者標也此文亦應云往昔大願今皆成就後供養等者釋也謂昔發願願得供養脩供佛行此願今遂故云成就第三是行神中文四同前言是行者因他足行成自供養此即足行之神依主釋入法界品云善現比丘行時足行神布華足下是也德中多劫親事如來第四道場神中四同前下亦並同更不載此語也釋名如前菩提場處說若尅梵字翻名應曰覺場然道場是佛所有此神守護依彼得名是依主釋德中二一宿值多佛二供願今遂此中前歎願成後歎身供第五城神者依所護得名亦依主釋又表守護法城心城故德中以己德行嚴佛宮殿如何佛威神之依果此義如前共集互融主伴之因今將顯此嚴之義故說佛宮殿用神善根嚴向若說果從自因生無由能顯互融因果也六地神者又表深重行願如大地故行願生成佛智住持故雖餘神等亦名此義今但偏就此門而讚亦即攝餘一切德盡此一即是一切一故餘眾准此德中二初發深重願等者標也後願常等者釋也釋中二一願當近佛此願德身二願同脩行此願成行由前願故感異生身由後願故與佛常為主伴主伴必由善根互融互融必由互相迴向及觀所脩同一法性故七山神者又禪行寂靜離囂塵故德中得淨法眼見法性故八林神者表具德義德中身光悅機令樂增行九藥神者又表不空三業滅惑成德如藥樹王無空過故德中二一能除惑病故云性皆離垢謂性能令他離垢故如阿伽陀二能增壽命色力故云慈仁祐物如七十八中蓮華藥十稼神者又表法力精氣增長行故法味逗根令滋義故德中應機授法生大法喜十一河神者又表法河流潤益生亦表無住悲智於生死河無間運濟德中勤作意者濟無蹔停如河流不息也言利益眾生者設有安樂亦為利益故但言益也或上句明菩薩船師七地已還下句八地已上也十二海神者又表智深福廣德中以佛功德大海者明所護也言充滿其身者顯融攝自在不爾如何菩薩以功德充於自身故知由主伴互融善根共集成故具顯如前其所表及德准此一處通外事內行餘異生眾並准應知然其內德多是持業即如此中功德即海故外事多是依生謂主海之神故餘並准此十三水神者又表法水洗濯德中救護眾生者法水除世渴愛也言為利益者法水令增出世福慧也十四火神者又表慧火焚惑薪故成就善故破愚闇故德中二一身語智光復各多類故云種種又如下文云善財入火得三昧樂等二即前諸光明破嗔恚等三毒熱惱十五風神者又表慈悲心現大智風輪能令眾生身心清涼又表智風能滅一切眾生煩惱習氣如劫壞時有散壞風壞器世間並如出現品說又表願風能起一切佛事現身說法散滅煩惱成就善根利樂眾生如賢首品說風能起一切世間乃至安樂眾生等德中歎慈風智風等散滅我慢如劫壞時旋藍猛風散金剛山等又散滅雲等亦爾十六虗空神者又表法性虗空離染廣大德中三一自性清淨心為無始客塵䨱不顯現今此斷障顯淨德如事空雲霧等除本性淨故二法性虗空無外故廣大如事空無際畔故三性淨真空本來明潔如事虗空性本淨故十七方神者又表正慧離迷謬使行無邪僻示導眾生各安其所德中二一教光善巧故云方便示方隅正位令離迷錯此表正教示現正真之道二轉教於人故云相續不絕十八夜神者又表生死夜以智炬示導即是然正法燈令尋正路德中翻生死中於夜𥨊息將為安隱故此以精勤進道為樂十九晝神者又表於深法中勝解分明無有闇昧德中於理事圓融行成就三德故云於妙法法即行法一生信二起解三成行故云勤嚴飾等第二雜類王眾中四眾皆約所領為名是有財釋初阿脩羅者亦云阿素洛大婆沙中名曰非天或有釋云此類業報神通及所受用多同於天然以飲酒放逸乖失天儀故曰非天佛地論釋天趣所攝然由諂詐無天實行故名非天如人惡行責曰非人或曰非端正謂行惡故或云不酒於大海中作酒不成故正法念說諸阿脩羅住處有五一在地上眾相山中二在須彌山北大海下二萬一千由旬有阿脩羅王名曰羅睺此云障礙由能以手障於日月領無量眾三從彼更下過二萬一千由旬王名勇健亦領多眾四過彼二萬一千由旬王名華鬘亦有多眾五復過彼與前數等王名毗摩質多此云響高是舍支父身如須彌山與帝釋戰時發自海底揚聲大叫我是毗摩質多我是毗摩質多由此響聲令閻浮提所有山岳一時震動今此經列並是位極菩薩隨類生身大智度論亦云羅睺脩羅是大菩薩又表菩薩隨能自在出生死海遊諸淨剎而為眾生常在有海德中略顯斷障精勤者大智勇猛也摧我慢者謂諸凡夫隨類皆恃大力而起我慢今菩薩現為彼王就或偏重者先權及諸煩惱者餘或隨斷故二迦樓羅者或曰揭路荼此金翅鳥亦云妙翅以此鳥翅有種種寶色莊嚴故海龍王經云其鳥兩翅相去三百三十六萬里閻浮提止容一足涅槃云此鳥能食消龍魚七寶唯除金剛不能令消又食應命終龍又龍曾過去受三歸者及現以片袈裟著身乃至一縷繫之者皆不食之增一經云四生金翅鳥而食四生龍其卵生鳥從金剛山頂鐵杈樹下入海取卵生龍水未合間還至本樹上食之若住胎生龍其鳥即死若胎生鳥得取胎卵生龍不得取餘二生龍若濕生鳥得取三生龍不得取化生龍若化生鳥得取四生龍然日食大龍王五百小龍繞四天下周而復始次第取食其鳥命將盡時至海取龍為龍吐毒不復能食飢火所燒聳翅入海直下至風輪際為風所吹還復却上如是七返無處停足遂至金剛山頂命終以食龍身毒氣散火自焚難陀龍王恐燒寶山降雨滅火而滴如車輪其身完消散唯有心在大如人䏶紺瑠璃色輪王得之用為珠寶帝釋得之為髻中珠今此經所列皆是位極菩薩大願所成隨類生身為王化導又表大心妙觀開生死海澇漉沈淪令至涅槃故出現品云以十力止觀兩翅鼓揚生死大愛海水使其兩闢撮取善根熟者置佛法中離世間品頌云菩薩迦樓羅如意堅為足方便勇猛翅慈悲明淨眼住一切智樹觀三有大海搏撮天人龍安置涅槃岸德中菩薩悲願現作彼王以大善巧力救攝彼類及餘一切又案大方便力者十力止觀如彼鳥奮勇猛力以兩翅搏開海水也善能救攝者即前十力止觀等用如鳥於海取龍將出也三緊那羅者亦曰緊捺洛此云疑神以其頂有一角面復似人而端正見者生疑為是人邪為是畜生耶為非人乎因此名爾亦名歌神以能歌唱作樂故也又表菩薩雖示眾生形類而非眾所攝不可字名也德中四一精勤二慧觀三禪樂四遊戲神通此如凡夫緊那能歌唱戲樂故也四摩睺羅伽者亦曰莫呼洛迦此云大腹行亦云大蟒以其無足如蛇腹行而軀貌復大故名也又表菩薩雖常遍行一切萬行而無所行故也德中二初自脩離相三輪故故云大方便復教眾生脩離蔽障故云永割癡網以有漏脩是癡是網故第三諸天王眾者此中略敘三界安立器及有情云云天是自在義光明義清淨義依智度論天有三種一人天謂帝王二生天謂欲色界天三淨天謂佛菩薩第一義天今此所明即第三菩薩天也於此天王眾中總有一十六眾長分為二初十一眾是欲界天王眾後大梵天王下五眾是色界眾就前欲界眾中初夜叉王者即是北方天王毗沙門也此云多聞以其福德之名聞四方故此王雖是六欲初天以其所部名夜叉等故從彼為名此即夜叉之王有財釋也夜叉此云輕揵又領一部名曰羅剎此云可畏德中勤護眾生不使煩惱惡鬼害於慧命故云守護此四大王眾天三法度經云身長半由旬衣長一由旬廣半由旬衣重二分食天甘露人間五十年為彼一日以三十日為一月十二月為一年壽五百年歲二龍王眾者此初總標眾名從所領為名毗樓博叉此有兩解玄莾三藏云毗樓魄也博叉月也日照三藏云毗遍也多也樓謂樓彼此云色也博叉謂博說叉此云諸根也謂此龍王眼等五根皆有多種色相莊嚴故此王主領龍及富單那富單那者此云熱病鬼列名中娑竭羅德叉迦等者並如音義中釋言無熱惱者謂一切諸龍有四種苦此龍無故得此名也四苦者一熱沙墮頭二行欲時作蛇身三為金翅鳥食四風吹寶衣露身之時依謗佛經此龍難初三苦大智度云此龍是七地菩薩依須彌藏經此龍是馬形龍主又一切龍總有五種形類一鳥形善住龍王為主二蛇形難陀龍王為主三馬形阿那婆達多龍王為主四魚形婆樓那龍王為主五蝦蟇形摩那斯龍王為主德中菩薩以隨類攝故於外則降水雨除炎灾疫毒於內施法雨文中二先興身雲布法雨後滅惑業苦一切熱惱三鳩槃荼王眾者南方天王眾從所領為名能領名毗樓勒叉者此云增長主此王部領鳩槃荼薜茘多二眾不令損惱眾生得便增長色力壽命故鳩槃荼此云冬苽鬼以形卯特異諸類得名薜茘多此云魘魅鬼廣釋並如音義中說德中兩句初句自分自利行勤脩無礙法界法門二勝進利他行謂既自脩學後將化生故云放光明也四乾闥婆王者東方天王眾亦從所領為名也列名中提頭賴吒者此云持國謂任持國土擁護眾生也此王領二部鬼一名乾闥婆此云尋香亦曰食香此類止住十寶山間唯食諸細末香常供忉利番設奏樂二名毗舍闍此云噉精氣鬼謂食噉有情及五等精氣問四王皆領二部何故每唯標一以名王耶答理應具標從穩便勝略故德中二初總後別總云大法者謂大法界緣起法也別中六一深信二起解三生喜四愛樂五敬重六脩行此上六德從始至終展轉因起如次應知五月天子眾者月是所依處天子是能依者從能所依為名故云月天子是依主釋俱舍第十一云月去此幾踰繕那持雙山頂齊妙高山半半即四萬由旬經五十踰繕那下面頗胝迦寶水精所成能涼能照長阿含云其城正方一千九百六十里高下亦爾二分一分天金一分瑠璃王座二十里遙看似圓而實正方其中天壽五百歲子孫相繼一劫不斷又表菩薩大悲清涼照生死夜饒益安樂下文云菩薩清涼月等是也德中外事則如月夜分開發蓮華或顯眾生於生死夜長眠無所開覺今菩薩月天開發眾生菩提心寶或開發本覺智寶謂一切智自然智無礙智如出現品說釋云菩提心有二義能生佛果故如華可貴故如寶今約後義故也六日天子者亦所依為名也日輪去地如月數量依俱舍說徑有五十一踰繕那下面頗胝迦寶火珠所成能熱能照長阿含云其城正方二千四十里高下亦爾宮城純金七寶瑩飾王座二十里其中王壽及子孫相續等並同月天又表智慧日多所饒益如出現品說德中外事則日光增長百穀華葉乃至令身安隱快樂內德則以智日恒照眾生令增善法七三十三天眾者佛地論第五云妙高山頂四面各有八大天王帝釋居中故有三十三也帝釋之名梵本具云釋羯羅印拏倈此云帝主拏音搦雅倈音良遐舊云能天主者謬也若梵稱釋迦則此云能也迦音甄何反三法度經云此天子身長一由旬衣二由旬重六銖壽一千歲德中利他令脩普賢行故云廣大業八須夜摩天王者須此云善也妙也夜摩此云時也佛地論云此天中隨時受樂故名時分天又准大集經此天中以蓮華開合分晝夜故又云以赤蓮華開為晝白蓮華開為夜故名時分隨其時別受樂亦異故云隨受樂此天身長二由旬衣四由旬廣二由旬重三銖壽二千歲德中廣大增善也法善充足亦如彼天隨時受樂也九兜率陀天王者此云喜足天王佛地論云後身菩薩於彼教化多脩喜足行故名喜足謂得少即悅故喜也更不復多求故足也長阿含云此天身長四由旬衣八由旬廣四由旬重一銖半食甘露壽四千歲德中憶一切佛名常持不忘十化樂天王者佛地論云樂自變化作諸樂具以自娛樂故又但受用自所化樂名不化他故名為善化三法度云此天身長八由旬衣十六由旬廣八由旬重一銖食甘露壽八千歲德中成利他行謂調其因行使得解脫果解脫亦是離障也十一他化自在天王者佛地論云令他化作樂具顯己自在受用故名也三法度云此天衣輕重壽命等皆准前增減一倍德中勤脩不思議解脫因故云自在方便彼果即是廣大法門自下第二色界諸天王眾中有五眾謂大梵光音遍淨廣果大自在眾所以此界總為五者謂前三靜慮各有三天第四靜慮通攝九天正唯三天以四靜慮各為一眾大自在天亦為一眾故成五眾若但明靜慮則有十八若并自在合有十九若無想屬廣果還是十八者薩婆多宗第四禪中應唯八天故瑜伽第四述彼云色界有十八處自下有二先通別名得名後隨文一一具釋前中謂梵眾梵輔大梵少光無量光極光淨少淨無量淨遍淨無雲福生廣果無想天即廣果攝無別處所復有諸聖五淨居宮謂無繁無熱善現善見色究竟天復有超過五淨宮地大自在住處十地菩薩得生其中又順正理第二十一釋云廣善所生故名為梵此梵即大故名大梵由彼獲得中間定故最初生故最後歿故威德等勝故名為大也大梵所有所化所領故名梵眾於大梵前行列侍衛故名梵輔自地天內光明最小故名少光光明轉勝量難測故名無量光淨光遍照自地處故名極光淨意地受樂說名為淨於自地中此淨嚴劣故名少淨此淨轉增量難測故名無量淨此淨周普故名遍淨自此已下空中天所居地如雲密合從此已上則無其事從首為名故云無雲更有異生勝福方所可往生故說名福生居在方所異生果中此最殊勝故名廣果離欲諸聖以聖道水濯煩惱垢故名為淨淨身所止故名淨居或住於此窮生死邊如還債盡故名為淨淨者所住故名淨居或此天中無異生雜純聖所止故名淨居繁謂繁雜或謂繁廣於無繁中此為最初故名無繁又廣大中此最劣故亦名無繁或名無求不求趣入無色界故以善伏除雜脩靜慮上中品障意等調柔離諸熱惱故名無熱或下生煩惱名熱此初遠離得無熱名或復熱者熾盛為義謂上品脩靜慮及果此由未證故名無熱已得上品雜脩靜慮果德易彰故名善現雜脩定障餘品至微漸見極清徹故名善見更無有處於有色中能過於此名色究竟或此已到眾苦所依身最後邊名色究竟有言色者是積集色至彼後邊名色究竟薩婆多宗不立大自在天故彼論不釋後隨文一一具釋者初大梵天王眾者佛地論云離言寂靜故名為梵具名云梵摩此云清潔寂靜謂創離欲染故名清潔根本定故名為寂靜言尸棄者此云持髻謂此梵王頂有肉髻似螺形故長阿含云於梵眾中以梵音語故立其名其貌如少童身白銀色長半由旬衣金色衣非男非女禪悅為食壽命一劫德中四一慈心內充二外愍群品三身放慈光四令獲樂初二句或合為一可知二光音天王眾者准瑜伽應名極光淨又釋智度論云第二禪中通名光音彼天語皆口出淨光故名也長阿含云此天身二由旬壽命二劫德中四一慈廣大二定寂靜三智喜樂四證無礙法界三遍淨天王眾者以三禪中離喜故身心遍淨也長阿含云以上方便生於此天其天王名淨智四臂持風輪御金超鳥德中二初明自住法界法門後以此門化利眾生四廣果天王眾者謂此第四禪報是世間善果中最勝故名廣果德中外同彼天得最寂定故內德成就法性其寂智契其中名安住宮殿仁王經云爾時世尊入大寂室三昧是也問何故第四禪眾唯列初三不顯後六答初三是正餘是兼攝故未堪受化者何故下文六十九云喜目夜神入大勢力普喜幢解脫時於身一一毛孔中出色究竟等天相似身雲出種種聲為彼天等說法耶答彼據已堪者此約未堪者各依一義不相違爾五大自在天王眾者此天王於三千界最為自在故智度第二云此天有八臂三目乘大白牛知大千界雨滴數量此經賢首品中亦同此說又智度云然第四禪總有八處五處淨居阿那含住所餘三處凡聖共居過彼八處有十住菩薩住處亦名淨居號大自在天王德中正智入理故云觀無相後智雙行故云平等或由觀解無相而行成平等上來眾成就中初各通列名各通歎德竟自下大段第二明列標名德以德讚佛前段中敘眾次第從近向遠先列同生後列異生此段之中從遠向近先列異生後列同生何故爾耶本疏釋云前表依本起末今明攝末歸本又異生眾中前則先劣後勝今則先勝後劣者謂前表法增微今顯尊位次第又此皆顯法界緣起逆順自在無障無礙總合為一大法界眾故作是說今更助釋有其二有一者顯佛於諸眾會無遠無近然亦不壞遠近之相故逆順互列別二者顯眾同生異生共四十類表四十心皆是因位然一一位悉極因門但舉初後俱隣近佛中准可知然亦不壞位相次第若不爾者二俱過故思之可見就此段中總分為二初明異生眾後復次普賢下明同生眾前中二初明眾集見佛後所謂下明大眾各別得法述以歎佛此判順梵本如次下顯前中二初總結眾集後此諸下明見佛所因前中五一總結眾集二無邊下明品類多種同滿道場三形色下就諸品類中皆有首從各多形色四隨所下各依本方皆得親近參而不雜五一心等明佛非散境謂異體同心前後無間眼意根識并緣不易故謂之一二見佛所因中先辨意後釋文意者前同生預會各有所以今異生見佛還有其因故此辨也文中二先一句總指其眾後已別離下別顯中三一離障故見二如見下宿緣故見三種無量下具德故見何以須此三義者若唯離障及具德而無宿緣則無主伴之因若唯宿緣而不具德及離障則見佛法界身不盡亦不與佛僧遍法界初中三一法說謂已離煩惱者煩惱障盡故心垢者所知障盡故一切者通顯分別俱生種現盡故及餘習者彼諸無堪任性盡故二喻況云摧重障山者二障力重如山劣慧莫能碎滅此諸大士獲金剛智殄彼障山三正明見佛謂障盡故見無疑也二宿緣中四一總舉多時攝受緣謂昔劫海脩行時故二一一佛下多善根攝受於彼多劫一一佛所故三種種下隨機多門成就故四令其下置於勝道令立大菩提因故此中梵本云皆以毗慮遮那如來昔於劫海菩薩行時往詣彼彼諸如來所以四攝事善根攝受以此諸方便門成安立一切智性道三具德中八句一善根多二善根大三入佛海四行圓滿五具出因謂已治所治故六於彼劫海常見佛分明七以因行勝解入果德海八以因解脫門得果解脫用此中梵本云已種無量善根獲大福德勢力各已入方便願海各已積集圓滿淨行各已於出離道出各已照見彼諸如來各以勝解力入如來功德海各以解脫門見佛自在釋曰此異生眾由具上三義預會見佛也言解脫門者謂佛果自在稱為解脫王神等各所得法名之為門由此得入佛自在故此即解脫之門依主釋也或此各所得法能令自他離縛無礙入果德此解脫即門持業釋也又解脫有多種類廣釋如章問准下文諸解脫門皆佛果法如何於中有因行耶答佛果海中具因果行由雖得果不斷因行然俱是果顯主伴故二別明大眾各別得法述以歎佛中三十九眾各有長行經家敘列各有偈讚當對佛頌就中分三初明天王眾次摩睺羅下明雜類王眾後主晝神下明諸神眾就初天眾中有二初色界後欲界色界中五一大自在眾二第四禪三第三禪四第二禪五初禪就大自在王眾中二初長行後偈頌長行中列十王各得一法初云法界虗空者大用所遍之處也然有二義一就事謂大空無邊名虗空界於中事物無盡名法界佛身大用於此普遍二就理事謂外於空界容一一塵處各有無邊剎海佛身充滿虗空內則於彼所遍之處勢同真性如理圓滿故云法界云寂靜者亦有二義一明前大用用無相用相不礙常寂二由此智用即寂同真是故大用得圓遍一切也方便力者亦有二義一明前寂靜即寂無寂相不礙大用二內不異真性外不失應機故云方便益物不虗故云也又虗空者處廣也法界者多物也寂靜力者佛身普遍廣處多物之中一一塵內用而常寂寂而常用也二普觀一切法悉自在者亦有二義一以普眼觀見一切法不壞多事相令同理性故云自在二於一法中普見一切展轉不相妨礙故云自在三知一切法不生等者亦有二義謂知不生等內證真理無功用行外應羣機又不生等有二義一就境二約行就境有五一據所執謂由是妄執無法可生滅也又情有即是理無故云不生也理無即是情有是故云不滅不滅不生是一法也又求執所相不可得故不生能顯無相性故不不滅即不生唯一法也二據緣起性謂法無自體攬緣而起即生無生既本不生故無可滅也又緣起無性故不生無性緣起故不滅論云以有空義故一切法得成是故不生即不滅不滅即不生為一物也又推緣無起故不生能離無生性是故不滅三據圓成性謂非是有為故無彼生滅相故又非妄心境故不生證智所證故不滅又體離有故離無故不生不滅也又約用隨緣故不變故不生不滅不滅即是不生不生即是不滅唯一物也四通約三性混融於一法上據所執故不生據圓成故不滅據依他故亦不滅五約三無性非不生非不滅然此四句合為一法圓融無礙頓思可見二約行者謂智背情證理而無來去謂背捨妄執而無去應機現前而不來又往應羣機而不去恒歸寂滅而不來不來即是不去無二為一味也又應機無從來化畢無所去常遍一切處時不來不去時處相寂稱一味法界故不來不去也由此大智無念應機如末尼天皷無思成事故云無功用行也四現見一切法等者從慧海深廣而現見法實五與眾生等者謂巧授深定令得法樂六令觀寂靜等者謂觀真滅妄捨生死怖七善入無邊等者謂巧現世故名善入無邊境令解無性無依理故名不起有業八中勘梵本天王名愛樂大智無可字得法名普往十方等者依體起用故普往十方說法用不離體故不動無所依九入佛寂靜等者佛是寂靜者世間是佛之境寂靜者入世間現眾生前名入普現光者現身語光物十住自所悟處等者菩提是廣大所緣境眾生是無邊取緣境依自所悟無二悲智起通化生以求菩提故頌中二先辨頌之因緣後正釋頌文前中二先通顯頌類後明頌意前中總有四種一名阿耨率覩婆頌此但數字滿三十二即為一頌其中八字成句四句成頌此則無簡長行及偈皆約字數為定也二名伽他頌此云諷頌或名不頌不頌長行之頌故或名直頌謂直以偈頌說法故三名祇夜頌此云應頌四名蘊駄南頌此云集施頌謂以少言攝集多義施他頌持故上四頌中初一字數常定後三不定或七字六字五字四字三字等句四句成頌令此即常四中第三七字句也若據當時對佛說偈即是第二伽他頌也下並准知後明頌意中二先通辨意後別屬當前中有八一少字攝多義故二諸讚歎者多以偈頌故三為鈍根者重說故四為後來得聞故五隨意樂故六為易受持故七為增明前說故八說前長行所未說故後別屬當者此中於前八意正有初二或五六也第二釋文中二初長行標舉後佛身下正顯頌文前中云妙焰等者牒前初天王名承佛等者顯非自能無我慢故普觀等者示無偏心普騰眾意故顯非唯己與眾同說故後正釋頌中十偈依次各頌前一法門初中前二句頌法界虗空界次一句頌寂靜後一句頌方便力以此一頌是說偈者自法故不結天名下並准知二中初二句頌普觀諸法謂然法燈法名普觀次句頌自在下句結天得法下並准此三中初二句頌知法不生滅等次一句頌無功用行又亦初句同頌無功用行四中初二句頌智慧海次一句頌見實相謂前約天王故說自見今以此歎佛故說令他滅癡即是見真也五中初二句頌與眾生大方便定謂定中觀佛能滅煩惱次句頌無邊安樂六中初句頌癡闇怖以一句頌令觀寂靜法次一句智燈破暗頌前滅字七中初二句頌善入無邊境界境界即十方處也次句頌不起諸有業謂令解無性無依即不起諸有也八中初二句頌普往十方說法次一句頌不動無依九中初二句頌入寂靜境謂依寂起用名入次一句頌普現光明十中初二句頌無邊廣大境次一句頌住自所悟處謂悲智緣彼二境起通攝化第二明第四禪長行十中初云普觀等者依本中有三一觀已信佛境者根應何門入法二觀未信佛境者應何法令信三觀已布法雲降法雨俱令益故梵本云普觀一切眾生根及疑廣布法雲二隨憶念等者謂能隨一切眾生心念現佛形色令作意者得見故梵云能示現佛一切形色令作意隨念見三法性平等者謂佛莊嚴身無所依與法性列到故云平等故頌中法性無依為喻喻佛身無依也四中云了知一切世間法者了眾生世間心法差別一念安立者隨機心現種種相身身多如海也五於一毛孔等者此中無礙有二種一一多無礙一毛孔現難思剎故二小大無礙毛孔中現剎准頌中約業用門說六入普門等者此文未迴應云觀察法界入普門解脫門謂加行觀察法界根本證入普門普門之與法界眼目異名爾七為一切眾生等者謂根器無邊現身亦爾根熟者無已故云無邊劫常現前八一切世間等者謂觀世間生滅法即無生滅名入如日光於水現影水離遷流而影不動故頌中云幽奧處常寂然等此即離言念故云不思議法也九示一切眾生等者謂說圓滿法輪一即一切等難思境界名為出要法也十觀察一切等者謂觀根器授以佛法如納物於器中故云入也頌中觀自眾內三類天此中同下三禪皆有三天准餘可知十偈次第頌前十法用歎如來初中初二句頌觀一切眾生根謂根類多端唯佛能了非餘所知故云諸佛境等下二句頌為說法斷疑令未信者令信已信者令解佛境生大意樂二中初句頌通憶念次一句頌梵本中現佛形色次一句頌令見佛或後二句皆頌令見佛三中初一句頌法性平等無依次二句頌佛現莊嚴身平等無依二俱無依故平等也四中初一句頌了知一切世間法次二句頌一念中安立不思議莊嚴海五中初二句頌一毛孔現不思議佛剎次一句頌無障礙謂佛力自在故六中初句內一切法門者頌普門也無盡海者頌法界也次一句頌入字會同一法故次一句頌觀察七中初二句頌為一切眾生種種出現次一句頌無邊劫常現前謂身遍滿故無來去或初二句物頌前法次一句發明前句謂雖多劫為眾生種種現然佛自體本無來去八中初句頌觀世間境次二句頌入不思議法謂觀世生滅無生滅名入幽奧處如日光於水現影影常在遷流中而不遷流世間即是所現境故此境即如故法性常然亦即離言念前云不思議也九中初二句頌示一切眾生次一句頌出要法十中初二句頌觀一切應化眾生次一句頌令入佛法第三明第三禪長行中十三各得一法門初了達一切等者謂了達眾生大涅槃因即觀察惑染性不可得及諸行海故梵本云觀察一切眾生解脫資糧方便方便即是離相巧脩也二隨一切等者隨樂現形如日光水中現影即相無相廣說如前且約天王眾同分說理實普現遍周法界勘梵本光影之影簡異映質之影三普嚴淨等者謂離相名脩名脩行海名大方便以彼行迴向一切淨土名普嚴淨淨土佛為主故名佛境界也四隨諸眾生等者謂深厚大悲常隨眾生化無竟期五憶念如來等者念佛過去種種調生方便行念佛當來此行無盡六普門陀羅尼等者謂佛有世間海塵數普門陀羅尼多故云海一一總持者一切法門名普門將彼總持海中普門義示教眾生名所流出也七能令眾生等者梵本云能令眾生於佛出世生難遇意樂清淨勝解藏按勝解即是信信即是藏故名信藏由信出生眾行珍寶亦是攝受義故賢首品云信是寶藏第一法為清淨手受眾行八能令一切眾生等者謂令聞樂法生信聞理法生喜聞行法出離或令眾生聞法已未信者能生信未解者能解故喜未解脫者令解脫故出離九入一切菩薩等者謂菩薩善巧調眾生行廣如虗空數無邊際用無窮盡十觀眾生等者謂佛以普悲智觀眾生煩惱海欲杖彼皆令出離故普悲也然不見實眾生實煩惱故智也還以此法為眾生說令得出離也頌中有十一偈於中前十次第頌前十法後一重述前第四隨眾生流轉生死海中所化事前中初頌內初二句頌了達上句明佛下句化處次一句頌方便謂說佛境界令信入下句頌解脫道之果二中初一句頌隨天眾所樂謂處世應機也應體相盡故無所依次一句頌如光影普現釋光影言廣如前顯次一句合前法喻重顯無依義三中初一句頌大方便謂具脩行海次一句頌普嚴淨佛境界次一句重顯大方便稱法性脩四中初二句頌眾生永流轉生死海由無慧眼見出路故次一句頌隨字悲深不捨故五中初二句明佛調生行高勝難測次一句辨巧行多門總相頌佛調生行六中初二句頌普門陀羅尼海次一句頌所流出七中初二句頌能令眾生值佛生難遇意樂次一句頌生淨信藏八中初二句頌令眾生所聞之法次一句頌信喜出離九中初二句入菩薩調生行等前就因名菩薩今據果云如來如空無盡名不思議次二句頌天王名及得法十中初二句頌觀眾生無量煩惱次一句頌普悲智十一中初一句重顯前第四頌中初二句於癡覆盲闇眾生處先放身光照燭次二句重顯前中次一句如來示以清淨道妙音即是須彌音故第四明第二禪中長行十王各一法門初云恒受等者有二義一內證真樂二外應成益謂消苦因令苦滅也二大悲等者緣悲無量境起無量行行稱彼境故曰相應其行深廣喻之如海令物離苦得安樂生於喜樂喜樂從悲行出故名為藏也三一念中者法界體事之時也一切眾生無邊劫所脩福德力者善業力所感器世間也多劫中多剎隨性融通在一念時中現也四普便等者謂佛以神力變成壞世界作嚴淨佛土如虗空不生滅如密嚴土同無為性又如足指按地變此界成清淨剎按此中文迴不盡應云普便成住壞一切世間皆悉清淨如虗空變穢成淨故名清淨變相遷成不遷故如虗空也五愛樂信受等者聖人即佛菩薩也愛樂聖人親近學行信受聖法故聽聞生解即增進菩提心故梵本云愛樂信受一切聖人法增長無比歡喜六能經劫住等者地謂十地菩薩智也義謂證淨則地智所緣十地理趣梵本云說諸地奈耶故方便謂阿含淨教是入地方便故經劫住說者顯說者辨才及所說法皆無盡故七一切菩薩等者謂雖佛一念遍十方現八相處悉開供養此云菩薩是佛菩薩故與偈無違此云方便是現八相故此云降神舉初攝餘故八觀察無盡等者謂觀佛現身神通無盡領佛說法智海無窮九一切等者謂一切諸佛雖皆功德海滿不須臾脩但以大悲無障㝵願誓當徹窮來際利樂不斷言方便力者即無障㝵願力也十如來往昔等者謂宿願供佛於彼佛所初立誓及信次行入證名愛樂藏頌中十偈次第頌前法門初中初二句宿因後二句現果由昔信佛內證寂靜樂外能府就眾生令苦滅故令悉見其果也二中初二句頌大悲心相應海上句悲者下句悲行已上是能相應海次句頌喜樂藏謂悲能拔憂苦生喜樂是藏義已上是所相應海三中初一句頌一念中此云佛法者此一念時是佛之所有假借世俗名言法謂不相應行法然實非行密嚴云如來蘊界常無變易以此念中能現廣剎故名廣大梵本云佛之法廣大多剎海能示現如彼諸成壞如亭主音少分解脫次二句頌普現無邊劫眾生福德力謂即所感剎也梵本云諸佛如是廣大法悉能顯示多剎隨彼壞成如實現四中初一句頌普便成住壞等謂佛神通普便故次二句頌皆悉如虗空清淨五中初二句頌愛樂聖人次一句頌信受聖法六中初句頌經劫住次二句頌說地義方便無倫是一切也七中前三句總頌八相普周略不頌供養八中初一句頌智慧海謂說法無盡次一句頌無盡神通次一句頌前二剎益九中初二句頌功德海滿次一句頌方便力出現世間謂無障礙願力常現世間十中初二頌頌往昔願力等次一句頌發誓生信等
