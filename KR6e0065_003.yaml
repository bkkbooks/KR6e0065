body:
  text: 如來現相品第二將釋此品四門分別一辨名二來意三宗趣四釋文初中三一分名二會名三品名初分名者此三分中名正宗分正謂簡序流通故名為正分謂折總成別此乃正即是宗二正宗即分皆持業也若五分中此當第二舉果勸樂生信分謂欲物生信舉佛果示之此舉果勸樂生信之分亦依主也二會名者九會中此第一也約處名摩竭提國法阿蘭若菩提場會會者遇也謂機緣感起赴互相遇故餘如上説約法名説佛依果會義易可知三品名者如來是能現人相是所現法現通能所故名如來現相如來之名略顯三義一唯就理謂法性名如出障名來二唯就行瑜伽三十八云言無虗妄故名如來涅槃三十亦同此説三理智合説轉法輪云第一義諦名如正覺名來正覺第一義諦故名如來又成實云乘如實道來成正覺故名如來下十定品中名義解釋引來此説現相有四種一為召他方衆現面門光相二為示法主現眉間光相三為表此會明佛果佛前現華四表能證從佛所流白毫現衆亦可如來是體現相是用品中辨此故以為名二來意中三一分來謂三分中前明序分名辨正宗故次來也五分內前明證信發起分今顯舉果勤樂生信分故次來也二會來謂九會中此為創首故先來也三品來者前品敘此會衆今辨衆起疑問故次來也三宗趣中三一分宗趣謂顯佛依果無盡法界為宗欲令菩薩信樂為趣二會宗亦同當會辨盡故三品宗趣者謂現光華等相為宗集衆表詮等為趣四釋文者自下第二大段明正宗分於中有五段問若即五分列名配品並如前説問五分中第五分內善財問答非一何得總為一分耶答問者及問詞不改易故答者及答詞乍雖似異然皆同答一問者一問詞故就初舉果勸樂生信分中五品經及勒為兩節初現相三昧二品為當會正説之方便後成就華藏遮那三品即為正説就前二品中初品明集衆顯説法主此是遠方便也後品明入定許説即為近方便也就前品中文分為八一大衆同請二爾時世尊知諸下口光召衆三爾時十方下所召衆集四爾時世尊欲令下先示法主五爾時佛前下現華表義六此華生已下現衆表嚴七即於衆中下偈讚佛德八如此四天下下結通廣遍初中二初中長行令請後爾時諸菩薩下供聲偈請前中二先通辨諸會請法儀或後釋此文前中四門分別一請會有無二所問法異三能問人別四言念等殊初有無者於九會中前二後二期並有問餘皆無也所以者何初會據果起因故有問也第二會初尋因至果故有問也由因位有升降客六會以答之果唯是一更無高卑故第七當會答也然六會諸品更有問者自顯當會別義或即重明前問非是大位別問也第八會中明因果淳熟故有問謂行修無礙六位頓成故當會答也第九會中稱性因果故有問謂俱入法界無差別故然當會答也二所問異者謂初兩會問果廣因略為成信故第八會問因廣果略顯行淳熟故第九會問唯果無因顯唯證果故若依末會多是問答因問法界與本會相望亦可因廣果略也三能問人別者初及第九皆有同生異生二衆第二第八唯是同生四言念等練者有二種一約言念二約通別前中以門望若得有七句然此不具謂問有言念若有言相初會中具二句謂現相品初同異生衆念請聲中言請答中佛放眉間光示相答謂光佛事已從足下入及佛前現華眉間出衆等三昧品中以言重請普賢菩薩以言説説下三品經為答前問也第二會唯念請佛以示相答菩薩言説答顯佛他心最自在故不待興言顯佛神力最殊勝故示相令知第八會言請言答此顯菩薩不同佛故第九會中念請佛示相答二通別者初會第九會別問通答第二第八會別問別答二釋文中三初總標心念次云何下別顯問端後佛下請説初中諸菩薩等者此是前品內四十一部衆意念不殊故同標也次別顯中總四十句分二前三十句問佛果後十句問因行前中三初二十句通問佛果德體業用於中若隨相分初十是位次六是體後四是樂二唯願下請佛解釋三又十萬下十句別問佛果語樂利他就初二十句中此欠二句下頌中有神通及自在恰此成二十下答中亦同此説初云佛地者略顯二釋一名二體名有二種一依智德分位差別名地如大乘同性經説佛有十地初名甚深難知廣明智位地乃至第十名毗盧遮那智海藏地證契經中亦同此説若準此經非但有十智德分位量過恆沙名亦隨爾二約用從喻名地如十地論釋菩薩地有能生成住持義故此亦如是佛果就生世出世善根成熟善果三乘依住攝持無盡功德海故佛地論説所依所行所攝義故名之為地依攝同前所行者是諸菩薩智所照處故如云已踐如來普光明地二體者佛地論説五法攝大覺地謂四智及清淨法界今依此經若就泯絶界四智法界亦不可説若約不礙則非唯理智乃具無邊過恆沙德無漏蘊界法界為性以要言之包攝法界一切諸法以為其體所以者何證具分真性方究竟故具足十身過三世間由此義故二境界者所知所知緣及分齊故體類十問明品説因度入智法説知證現廣等是也又出現品亦有十種謂一切世間三世剎法衆生真如無差別法界無礙實際無邊際虗空無分量無境界等又不界思議法品有十種無比境界具如彼説三佛加持者諸勝力住持令有所化廣有無量如不思議法品及法雲地説又離世間品有十種佛攝持謂能始發菩提心生不忘菩提心等又有三類佛力住持一如加持化身及舍利等二如加持耆域入火不燒等三加持草木等一切非情作佛事問此與神通何別答別不謂六通中神境一種有加持義餘五但是於境無所擁滯名此加持亦即神力四行者是佛所作不思議法品云諸佛世尊有十種為衆生作佛事謂不現色身乃至寂漠無言為衆生作佛事亦是所行之行如出現品説如來行謂無礙行真如行法界行等具如彼此上是異二乘功德五佛力者謂處非處等十種智力是降魔功德又不思議法品説廣大力等十力六佛無畏者是制外道功德謂一切智等四種無畏不思議法品説十種離過清淨中第八云一切諸佛獲四無畏離諸恐怖於衆會中大師子吼明了分別一切諸法離過清淨上來總相大智功德七佛三昧者果位等持其數無限不思議法品略説十種無量不可思議佛三昧謂恆在定一念中遍一切處為衆生説法等廣顯云云八準答及頌名佛神通通有六種謂神境智證等其名雖通二乘然深淺有異下文十通唯屬菩薩佛不思議法品中云一切諸佛有無邊際無礙解脫示現無盡大神通力九準答及頌名佛自在謂所作任志無礙成就略有十種謂諸佛世尊於一切法悉得自在明達種種句身味身演説諸法辨才無礙等廣如佛不思議法品説十無能攝取者頌中各無能於答中名無能毀壞謂佛所作無有天人魔梵外道二乘及菩薩神力能制伏者舊經名佛勝法略有十種如不思議法品云諸佛世尊有十種最勝法所謂一切諸佛大願堅固不可阻壞所言必作言無有二等廣説云云十一至十六問眼等六根者如佛不思議法品中云諸佛有十種法普遍無量無邊法界所謂無邊際眼乃至無邊際意一一用廣具如彼文十七問身光十八問放光者如出現品説佛身十種相內第五云如來身一一毛孔放千光明五百光明照下方五百光明照上方種種剎諸佛諸菩薩諸菩薩見已得十頭十眼等云云十九佛音聲者不思議法品云一切諸佛皆悉具足六十種音一一音有五百分一一分無量百千清淨之音以為嚴好出現品説佛十種音聲謂遍至音普遍無量音聲故乃至第十各無變音至究竟故二十佛智者佛不思議法品云諸佛有十種智謂知一切法無所趣向能出生回向願智等廣説云云第二請佛為説中何故問果未終中途遽清解者此有兩説一云回文者誤此文夜安問果了後一云此文中安通有二意一為簡通非別故謂前二十句通顯佛果體德業用後十句別辨佛果語樂利他故二為兼顯請説前後通別果故第三別問佛果語樂利他中十句初世界海者如下華藏界説可知二衆生海者説法所被機故三準下頌中是法界安立海即是一切世界海之都名如下文七十一中寂靜音海夜神處説今此脫其文四佛海者多化主故五佛波羅蜜海者化所成行也六佛解脫海者化所得果也七佛變化海者身業化也八演説海者語業化也答中開出法輪海以為二句九佛名號海者謂佛號隨宜立名差別如名號品説十佛壽量者謂佛壽隨應住世修短無量差別如壽量品説下答中此上句就能感機名諸根欲海二問因十法中八法如離世間品二百法門中説此初名誓願者彼中第七十二門也二發趣者彼中第二十四五六出顯其門謂發菩提心因緣為趣向悟入一切智智近善知識得諸清淨也三助道者如彼第一百二十七門説四乘者彼中無此然其乘體即鎔融理智也乘樂謂運菩薩假者從因至果或智為能乘理為所乘運他行廣故云海也五行者如彼二百門中第三門説六出離者如彼一百二十一諸離生道也謂煩惱未治其性生鯁惱亂行者身心不安如生食在腹若調伏已則離剛強煩惱勞惱亂故名離彼生出離彼生故名出離七神通者如彼五十三説八波羅蜜者準梵本加多聲波羅蜜是彼舉義多是到義謂施等十行皆三輪淨與法性相應修故能到佛果彼岸也如彼二十七説九地者彼中無此然此即是歡喜等十也十智者如彼第七説上來所引二百門者一一皆有十句顯示廣如彼説此上十句因行通一切位一一皆攝法界深廣無邊故但云海也上來先彰三十句問果法後明十句問因法總辨第二別顯問端竟三請説中云亦者謂四十句中初二十句前已請説後十句果法及十句因亦為我等問前解脫又此二十句既十方世界中佛為諸菩薩説令亦請如彼為我等説故此亦字通其二義二此聲偈請中二先顯偈聲出處因緣後正説偈前中菩薩神力為因供具為緣因緣具故不待咽等擊發出聲故曰自然出也後正頌中十頌分二初三別歎請後七重述請前中亦二初二歎佛請明説有因故後一歎衆請明其聞法與説為緣故前中初一歎佛積因成果盡未來際為物現身此大悲大願功德也後一歎佛能巧改疑令生信解離苦得樂歎衆請中菩薩同瞻顯無畏念願隨意等請據法除疑後重述請中初四頌述前長行初十句問具釋如前次一頌述第二十句影略可知後二頌述後十句及因問第二句云法界所有安立海者長行中無得次合在衆生海下準上下文此是一切世界海之都名餘文並準可知第二口光召衆中二先長行後偈頌前中分為九段一放光意謂知衆心此領問也二放光處謂示嚴進舒三顯光數四列光名略辨十種準釋可知五結光數六攝眷屬七顯光色相八光所照處九今彼見此後偈誦中十偈分四初六歎佛三業自在勸彼觀禮於中一歎二利行咸次二歎利他行成次一放光次一説法後一行圓力具六偈了次一讚有多衆已集興供次二讚佛圓音能應機説能剎那顯三世佛願勸彼遠觀後一述放光意將喧待衆觀及聽第三所召衆集中二先十方衆集後如是坐已下讚其德用前中三初總辨二所謂下別顯三如是等下總結初可知二別顯中十方即為十段一一方有十事一土海二世界三佛名四主菩薩五眷屬六興供七作禮八供佛九化座十本方坐三總結中八一結剎海具十信之言即前齒光照處也二結主菩薩三結眷屬菩薩準主數此合有十信剎海塵數箇剎海塵數菩薩四結興供五結禮六結供養七結座八結坐二明德用中二初長行經家敘列後顯當時偈讚前中九一菩薩數量即前十剎海塵數二菩薩毛孔放光三光中現菩薩四所現菩薩入遍法界諸安立海塵中言安立海者梵云奈那安立海即剎海之都名如前所引下七十一中説五塵中有廣剎六剎中有佛七菩薩往供八念念助佛開化略標十法門理實無限九化答謂由前十法成後十答此文本疏作三釋一各自別釋二相配屬釋三圓通釋就初釋中文二先明以十法門各自開悟剎海塵數衆生此以得法生信解等為答故後結云如是普遍一切法界隨衆生心悉令開悟後念念中一一下明衆生得十種益以但言各令如須彌山塵數不云如剎海塵數不云如剎海塵數故前中二先別顯後如是下總結前中一於念念中以夢自在等者念念之言與後九同非名別令下並準此夢自在示現者略有三義一夢中唯依意識能見色聞聲等今此亦爾菩薩於一根門示現自在見色聞聲等以此開悟故二於夢中示現順違境界或為説法令開悟故示現之言亦宣説故三如於夢中夢經多年於小屋中多人各夢山河大地而不逼迫此中亦爾菩薩以此轉變外境小時現多時小處現大處自在無礙令開悟故二諸天歿生等者為耽著天樂者説諸行苦有生滅故三菩薩行者謂以無所得遍修行海普為衆生故四動剎等者降伏恃大力起我慢衆生知佛力最大令讚益故五説淨土從大願起故六説佛具有一切衆生同類言音故出現品云一切衆生言音皆為如來法輪音聲所攝是也七説佛身如雲就雨法雨故八説佛神變就放光照遍法界土故九説佛解脫力就普現身光照滿法界故十説普賢主伴身遍十方佛剎衆會由大願違立故後總結可知後明衆生得十益者一令造十不善業者令修十善離苦此舉地獄意亦攝餘故二令未入十信者入故三令修五戒及不動行故四令住二乘道故五令修事善發福行故六令發大心悲智願故七令得三賢趣向十地故八令證如得無分別智眼故九令得八地已上大力大願無盡智淨國土故十令得佛本大願願衆生得大菩提故云生如來家非謂得初地名生佛家也第二相配屬釋者謂將前十法如次配後十益所以者何前十雖云念念開悟剎海塵數衆生不必同一念間總令獲益故中間結前起後云如是普遍一切法界隨衆生心悉令開悟又開悟但是警覺之調得益或復遠近多少當不相違況其開悟遍法界得益乃云一一國土此何爽也梵本中呼此開悟之言為散住達寧此云於先警悟也第三圓遍者前十法門於後十益一一遍過謂一一開悟能成十益乃至一益如是互遍無有障礙此中若從前向後粗相十重可知若從後向前細分十七一其十須彌山塵數衆生得十種益方是一法門所開悟也二如一法門餘十剎海塵數法門一一皆爾三彼多法門方是一念中所開悟也四如一念中餘念念亦爾五彼念念開悟方論一廣剎中六如一塵剎如是十剎塵數廣剎亦爾七彼十剎塵數廣剎方論一塵內如是於一安立所有微塵亦然九如一安立既爾如是遍一切法界諸安立海當知悉然十其遍法界安立海中業用方是一化菩薩所作十一如一化菩薩如是世界海化菩薩一一亦然十二彼十世界海化菩薩方是一光所現十三如一光明現化菩薩如是十世界海塵數光明一一所現菩薩亦爾十四彼十世界海塵數光明方是一毛孔現十五如一毛孔所現光明如是遍身毛孔一一皆爾十六彼遍身毛孔現光方是一菩薩十七如一菩薩如是十信佛剎塵數箇世界海塵數菩薩遍身毛孔所現光明一一皆爾此諸菩薩所現業用遍一切法界諸安立海所有塵中世界內者顯此會中將欲説期稱法界法故上來明結集家敘竟二當時偈讚中十頌分二初一頌光音自述可知餘九頌歎菩薩德用於中分五初三歎昔因深厚次二歎身智寂用次二歎身業自在次一歎意業無礙後一歎三業殊勝第四光示法主中六一放光意謂復所明光之業用是佛神通之境欲令時衆得承佛力見彼境界故二光出處謂於眉間悉平等普照離偏為故三顯光名謂令諸菩薩得智慧明普見佛力所現境界故云普照十方藏是眉間出此光故四光色相謂色如紺寶照用如燈周遍潤澤雨法猶雲五遍照下辨光業用於中一照現十方剎及衆生二遍種動剎網或誓機或嚴剎剎網謂一剎種上所管二十重內凡一重中有三重主伴遞相圍繞十方觀之似網孔縱橫上下皆悉相當故三剎網塵中現佛説法説法中三一説三世佛波羅蜜海此法三世佛同説故名三世法輪二説出離生死法門三説諸佛大願法門明普賢道場遍十分世界六明事歸本謂平等法界佛已圓證從此流教被機遂令機來證此修因順果從下漸上故眉間放光作佛事已右繞世尊從足下入也第五現華表義中二初總標華現彼其華下別顯德用前中華生佛前顯所詮華藏是佛果所有故忽然出者化現難測故後別顯德中略陳十一種理實無盡十一中初一總餘十列列中前六明體備衆德後四顯妙用自在前中云藏者謂蓮華臺中蓮子住處有含藏之義故悉法門一含一切華藏之名從此出也後妙用四中無邊諸佛應機神變及應衆生隨類言音皆依華出前云摩尼寶王未顯何等摩尼故此顯云影現一切佛身之者前云發起一切未顯音所説法故顯云説菩薩行願法也此則華現佛身圓音説法於一念間周遍法界佛事究竟唯此一華之妙用也第六現衆表教中二初標人後其一切下辨德前中三一現衆時謂前華生之後尋即現故此顯教義相應無間然矣二現出衆處謂佛高毫相中表與所論不二而二故三有菩薩下明所現衆於中有五一主菩薩名勝音者謂主教之音勝彼一切眷屬教音或説一切勝法之音故云一切法勝音也二眷屬菩薩有剎海塵數者夫一主教必有無量眷屬相應三主與眷屬於一圓音同時各應無前無後故曰但時而出四主伴雖殊莫不皆顯修因順果故皆右繞也五主伴能詮名與所詮共相應故又主伴相對正助異故是以主據臺伴坐鬚也二辨德中以主教是此正所明故此中唯讚勝音德也文中十句一理智了深法界二量智無礙入佛所行三內證果海四外應諸剎五毛孔現遍六內觀法界七外感佛故八恆住三昧九見佛十力遍法界盡來際十總結多故門云乃至三昧等第七偈讚佛德中有十一菩薩説偈即為十一段初一是主餘十為伴一一有二初承佛力則顯説有依離我慢故普觀十方表説通緣無偏心故後正説俱稱揚德用就初主菩薩十頌分二初三偈歎佛勝德餘七歎菩薩德前中初一身遍衆生界勘第一句梵本云勃陀迦瑜佛身也塞普吒充滿也達摩馱都法界也諸也是故應云佛身充滿諸法界不偈云於以是即理之事差別相故二毛孔現諸佛三毛孔含剎海以佛具有三世間身故於三位自在不起覺樹現業用以下頌中説剎皆是此也後七偈中一佛坐多剎菩薩咸集二具福慧數菩薩其歎量三由行普因得普現果同多剎多劫積行之菩薩感來坐聽稱根故喜也梵本云住最勝智諸菩薩多剎修行經劫海遍坐一切佛會中聽受法雲生喜悅五行願滿證佛果六神通大用滿法界七現多身演嚴光隨樂説法初兩句梵本云一切剎出微塵相似身雲常示現應筆削云常能示現諸身雲等一切剎微塵數第二觀察菩薩十偈歎佛三業自在德於中分五初二歎佛權實雙行智次一歎佛他心智次一歎佛身業次四歎佛語業後二歎佛神通就初二中一雖證平等法界而就隨世導引二雖證法身離相而隨機現形次一他心智中知一切法者法是心法次一身業中上半相勝下半用勝次四語業中二謂前三別明後一通顯前中一化佛音深廣二毛光音調生三光明音讚果德因德行後一遍顯中三初一句顯前三種音説法出正離於耶小次一句顯前三説出多下二句顯前三説皆勝非下所及後二神通中一八相身現通二重化身現通第三法喜菩薩十頌歎佛寂用應機德於中分四初三明佛身語應機德次一三業廣應次三寂用自在一寂用無礙無生二寂而常用三會用歸寂後三應機無盡德一法雲無盡二衆會無盡三身相無盡第四香焰光菩薩十頌歎此會中菩薩自分勝進德於中分四初三歎自分業用謂遍剎見佛次二用等普賢次三勝進同佛後二定用自在並可知第五師子菩薩十頌歎佛轉法輪德於中分八初二頌總歎遍一切處轉正法輪前頌明轉輪果後頌出因次二頌明以種種名號轉法輪前頌輪果後頌出因次一頌明轉無生平等法輪次一頌明轉本行法輪次一頌明化佛法轉輪次一頌明於無差別身現差別色身為轉法輪次一頌轉三世佛名號法輪後一頌總結但是三世所説法輪皆此處説第六法海菩薩十頌歎會中菩薩助佛揚化德於中初一智滿得法謂得如是深廣方便故就周遍一一國等此亦是總門標舉後並別顯故云能入如是方便此即指後別顯也二一切處化廣三一切時觀真四一時佛內行勝謂以常在佛身內從眉間出也五一切塵中用行無得六一切剎中見佛自在七開佛遍法界圓音八契入平等妙音智地九獲識達凡聖音聲智十地位成滿第七慧燈菩薩十頌歎菩薩悟入佛深廣德於中分四初二歎菩薩見佛真體一見佛離相智二見佛自在體次四明悟主法一證深理法願力受身二觀深法修事行名最勝行由此得果是福生住智地三連果法體四廣因得廣果次二歎佛身能普應一深二廣後二歎得佛加持菩薩令見一切佛一當貪佛加持二餘一切佛第八華焰髻菩薩十頌歎佛攝生自在德於中分四初二明佛身語廣大攝生前頌初後二句明輪業攝生處中間二句正顯攝生用後頌上半體下半用次四明攝機漸次顯深一約地前菩薩內則深信歡喜外則佛力加持方能出生地上實智照了真體也二簡劣顯勝謂二乘智劣不就覩實體菩薩眼淨方見真身三明地上菩薩承力觀察於諸地中入住及出明了見真四明第十地滿成一切智方能證入佛果法海次二明佛寂用無礙德一即用常寂二即寂常用後二明大用無涯一毛孔現遍普眼方覩二以一一身各遍法界於一切處恆轉法輪重疊無盡不可測量第九威德菩薩十頌歎佛身語普應德於中分四初三明身光普遍一身遍道場二光應群機三示塵中剎次二明所樂剎剎海殊形亦是轉法輪處次句正明周遍轉一遍塵內外剎中轉二遍佛身中一切剎內轉三於無相法轉而説法相四圓音演無盡法後一明佛身普應曾無起滅第十法界十頌歎佛勝德菩薩能入於中分二初三顯佛勝勝德一色妙令喜二相中現佛遍入塵內三多身現遍常續不絶後七明菩薩能入佛境於中初四明入佛境界一內具證智外蒙佛力知佛神通方便現遍塵身二具普行願方覩三四二頌由具信正解大願證智住真法界方了佛色聲自在境界前一具信等四法後一觀佛色聲無礙後三明所得利益一證佛所行則於佛地能速入於法界能普攝二能念中現剎於塵中三能一剎中現多剎及通第十一精進菩薩十頌歎佛圓音妙色神實自在於中分四初三頌明佛圓音説法一謂一音中具一切音音聞十方説法二以隨類音一切佛剎中説法三一切剎中見佛神變説法趣菩提次一以佛解脫力於一切剎塵中現身次三體用無礙一法身如空無礙無別色身如影如像隨類現殊二重彰前門並顯能了者三明前體用無二如空後三明佛神通願力謂一十方佛入遮那一毛孔現通智眼乃見二遮那昔願今得遍法界剎中説法三毛孔中諸佛神變一切佛同説欲尋涯際多劫不得也上來別明十一菩薩各説偈讚德第七段竟第八結遍廣遍中二初舉此四六下道場中菩薩雲集後應知下續通廣遍此文漏略準梵本應云如此世界四天下閻浮提場中以佛神變十方各有一信世界微塵數世界海中菩薩雲集開顯法門如是一切四天下一一閻浮提菩提場中以佛神變十方各有一億世界微塵數世界海中菩薩雲集開顯法門亦復如是普賢三昧品第三將釋此品四門同前初釋名者德周法界曰普柔順調善曰賢若依理趣般若釋得法界智遍證自體如故故彼云普賢菩薩自體遍故三昧名如前釋普賢是人三昧是法人為能入法為所入能所合為其稱故曰普賢三昧此則得名也六釋中依主釋以普賢依佛三昧入故或有財釋以三昧是普賢所有故若依能所證非即離義有依主持業二釋可知今勘梵本具名普賢三昧威德神變品普賢三昧謂標名召體威德神變即定用也攝用從體故但云普賢三昧二來意者前品明衆集次應説法法是玄妙非定不宣故又前品是正説遠方便今是近方便故次來也三宗趣者入定受加為宗為説剎海為趣四釋文中二先通料簡九會中定後正釋文前中一有無者唯第二會不入定以表信未成位因行之中此最粗故二出不出者唯第七第九二會不出七顯此是唯勝進故九顯法界一證無退故三因果者初及七八九會皆是果定四中普並有果故餘之五會並是因定以彼皆顯因位行故四能入人者七九二會佛自入定表果用故二正釋文者此一品內分為六分一三昧二加三起四類剎雨寶五毛光讚德六大衆重請就初分中二初明此處佛前普賢入定後如此世界下類通十方及諸塵道道中四一法主所在亦入定處謂親對佛前證説真故二表佛力加無自慧故三顯三昧名名一切諸佛者盡法界中所有佛故佛者為説果法故毗盧遮那者智光遍照於何謂如來藏身故此則盡法界一切佛智同遍照法性性皆如來故名藏又是依故名身此即一切諸佛光照之藏藏即身也此出定用從用名也何故入此定者為顯所説華藏界等離如來藏無別自體故四普入下明三昧業用有十三句攝第六對初二明體用一對亦於理事一對謂平等性性即體故影現法界影現是用故二次二深廣一對亦是體用謂定體廣遍虗空令智深入理奧海水至深有施復法海至深用此名三次二出網一對亦是定慧謂出生多定令定心包網法界四次二依正一對亦境智謂三世佛智照用從此定生十方剎海中所有事物依此定現五次二依正含容一對亦是內外謂此定內含諸佛十力解脫及菩薩智故曰含藏外令剎塵內廣容事法界謂三種世間也六後三成佛持法一對謂由此定成佛德海顯佛願海護持遺法侍化不絶持正法也此亦對可名為行教謂前二句行後一句教故二類遍中二初舉此界後如是下類遍盡法界類遍中二初一重遍後及此下重重遍前中十一句初一句總總顯即理之事法界中故別中十句一遍空二遍方三遍時四遍細色處五小空處六廣色及空處七日月星等處八盡佛眼見處九盡神力到處十盡佛身現處二遍重重處中四初及此國塵者總牒前一切國土所有塵也其一切國土之言若準屬佛身所現不通前者則此定力準能遍內身重重不能遍外重重也又前通微細等處皆有普賢在佛前入定具亦不在世界中有此會耶二彼一一塵皆有塵數剎三彼一一剎中有塵數佛四彼一一佛前各有塵數普賢第二加分中三初口加次爾時十方下意加三是時十方下身加初中四一諸佛現身謂前一切時處重重內普賢前各有盡十方佛現由此口加復無結遍故此總舉一一普賢前也二彼諸下同讚得定此雖果定以普賢是佛菩薩故名佛菩薩定三佛子下明得定所由中二初總顯謂諸佛同加得定後以毗盧下顯此同得加者有其二因一是遮那本願諸佛加普賢二普賢行願願堪受諸佛加因緣相由故云亦也四所謂下顯加所為中十一句初一總謂總相為轉諸佛法輪故別中十句攝為五對初境智一對謂為開顯佛智能知十方安立海盡故何故為此欲説此故即世界成就品説一切世界海成就因緣是也二行果一對謂為令衆生聞淨依果離穢剎行修淨土行攝無漏土故三能入能示一對謂令普賢入佛所知剎海無礙顯其功德莊嚴故四義理一對謂令普賢得佛契實性之智見一切法相故五機教一對謂令普賢了此法門所應之機任持能應之教久故梵本中教字是音聲久是文字舉文攝名句合為能詮二意加中二先明加相後何以下釋因前中二先顯此世後如此世界下類遍十方前中佛與普賢十種智初一總餘九別總中與能入佛果智海之智以能入果智故名力別中一與普知即理之事法界智二與知佛淨土三與知有漏土智有敗壞故四與知有情界智多故名廣大也五與住佛解脫定門業用智非因位知所故甚深住字梵本中亦是行謂能行其大用也六與了此法所應器智七稱根詞辨智八身雲普遍智九與普應圓音智二類通可知二釋所因中二先微意云諸佛有力能與有悲能普何以以十種智唯與普賢不與餘菩薩故後釋云以普賢得彼三昧故法合與也又問餘菩薩何故不入此定耶答為説普法故普賢本願故三身加中二先此土復如此世界下類遍十方前中二先明手摩頂後其手下明手相用前中十方佛手摩普賢頂明加持與力印許之相十方佛同摩頂時身不成就碎亦不退各親觸頂手不相礙也二明手相用中略有十義初五相德圓滿後五妙用自在前中初相好類者謂圓傭纖直十指端皆有千輻輪相十指面諸節一有本囊伽吒相一有褰囀悉底迦相如是相間莊嚴二手指間網縵三金手常光恆舒四香氣流散五放光焰發是放光也後五中初二句恆出二事謂身語二藥妙音神通後三句顯影現三事一現三世菩薩普賢願海者謂彼三世起願之人及所願事無不出世佛手中現二一切佛及所轉法輪亦於中現三三世佛身相及光亦於中現影是故此手亘十方括三世收因果攝人法體用深廣自在無邊思之類遍可知第三起分中二初此界後如此世界中下類遍十方前中二初起定後普賢菩薩從如是下明衆益前中二初起此一定後從此三昧起時下起一切定前中準梵本從之所摩頂已即從定起無爾時普賢菩薩及是字而字也就起一切定中十句分二初一句總顯一起一切起後所謂下九句別辨一切定名前中以此定即是一切三昧海之一故是故起一即起一切也別中一名巧知三世中念念平等智二名知三世中所有事法界塵數三名現三世中所有佛土同名現一切染界中衆生所廣五名知衆生心海六名知衆生名字七名知十方事法界名名差別八名知遍法界微塵中皆有諸佛無邊身雲九名説一切法門海此上定名皆約業用謂能知能現能演説等二明衆益中二初明此處普賢起定時得益後如是世界中下類遍十方前中二初總標得益時亦是辨益所因可知獲其諸下正明益相於中九句分二前五得菩薩諸門益謂三昧總持方便巧辨修行等法各剎海塵數一人所得餘皆同然故云一一菩薩各得故也後四得果法益一得佛福藏智光二得佛十力巧樂等三毛孔各現多剎海四得能現八相業用益二類遍可知第四類剎雨寶分中四一十方剎海微動由二力為因以是光相故微也二寶嚴剎三出聲説法四佛會雨寶略論十種以類無盡前四事相衆寶後六法化傳通其寶並是純淨無漏應衆生之體事也第五毛光讚德分中二先長行標舉後正顯偈頌頌中十偈皆讚普賢深廣無盡德於中一述前普賢遍在諸剎入定現遍二身滿法界定通方便圓音亦爾三述上普賢遍諸佛前三昧業用四述上普賢在塵內剎中入定現遍佛願力起五讚普身土鎔融依持無得有四句謂色身依色相土法身依法性土色身依法性土法身依色相土故此文云身相如空者顯無礙義有前諸句諸大地依空空依色顯法合可知法云依真住等者此舉色身依法性土就難偏顯餘準可知後半明此能現普應之身等彼根斷按梵本中第二句云依真如住不依剎第四句云普示現身等一切六普賢住大願獲多遍一恆在諸佛身中一切剎內梵本中初句云安住普賢大願者第四句云悉入其中無限際七身能遍入無邊衆海現淨土剎那現多劫第二句梵本云以無量身皆遍入第四句見字亦是現字八動剎令親悟法得果九以三昧力現佛果德及彼往因十總結難且出世三昧中現光聲自結所出之處第六大衆重請分者問此與前品衆請何別答此有四別一前雖令請而未發言故此言請二前唯舊衆請今此兼彰三前請化主今請助化四前真舉法請今此歎座主德兼舉所問法請所問同前品故此略顯十頌分三初八歎主請次一舉法請後一歎衆請初中二前五頌歎普賢因果深廣德明有説因後三歎普賢遍廣剎能雲雨説法明有説果前中初一歎普賢三種功德一依佛果生二大願起三法身淨二中三德一普應佛會二福海廣三智光等照三中三一德海廣二遍近佛三諸塵中剎四中四一近諸佛二住定境三住諸土四塵劫住五中三一普身詣十方二濟度生海三入法界塵剎內後三歎普賢能雲雨説法一身遍塵中説佛廣法二遍衆生海説佛勝行三積行多劫大音演法次一頌舉法請中前品請問雖多取要不過三種世間故今前三句總顯後一句結請後一頌歎衆請中世尊前恭敬者明衆樂欲身住心敬堪為法器請為其説佛所隨喜也世界成就品第四將釋此品四門同前初釋名者世謂隱覆界即分齊謂諸有為可破壞世則隱覆無為不可壞法從真性起同無為法則隱覆有為可破壞世各不相雜是其分齊是故感見娑婆者對華藏而不同感華藏者見華藏故感見華藏者處娑婆而不同感娑婆者見娑婆故然則世界是所成就成就是能成就今此品中但辨能成能成非即世界從所成以立名世界成就依主釋也若依梵本云嚕迦馱都世界三慕達羅海也涅第奢演説縛怛囊觀察三牟陀儉摩合集娜忙名也鉢里冗多品也若依逈文總云名觀察十方世界海演説合集品今但名世界成就品者譯家存略太甚也縛怛囊亦照曜義謂智照於境觀察同也合集成就也謂説諸緣合集能成就世故二成成意者前明方便今辨正説故此成也三宗趣者通説十方一切剎海能成就本末為宗為明華藏剎海為趣亦可觀十海説十智為宗為説剎海成就本末為趣四釋文者自下三品經明當會正説於中初二品通答前問三十句果相後一品明佛昔因通答前問十句因相問此中既亦明因何故分名舉果勸樂答多説果故説因為顯果故就前二品中初品通辨法佛剎海能成立因緣後品別顯毗盧遮那所成立剎海就前品中二先總標綱要即為本分後爾時普賢菩薩告語菩薩言佛子下正陳本義即是説分也前中二先總陳前問後是時下誡衆聽受前中二先牒前問後為令衆生入佛下顯所為答前中先牒前問後如是等下正明許説前中四十句是前問果中三十句內從後向前牒以總歎於中初二十句是前問中世界海等最後十問也於中初十問約所觀境深廣其中第九句首梵本中加積集二字餘句準前後釋並可知次十句約佛能知智歎其難思謂一前問及觀但云世界海此中兼辨成壞者是略釋也知無不明故云清淨智以其廣故多故深故細故重疊難知知非下位言念所及故皆云不思議餘並準此問豈世界海有成壞耶答此是言總意別謂意在剎海所持世界今但就總言剎海爾按梵本十中句內皆下有智字上無知字譯家準義安也二於中衆生報類差別及衆生所作業海差別梵本云一切衆生業出現海智今釋出現即是業所生果地三一切法界安立海智者梵本云一切法界安立法或海智不同前説剎海異名名安立海四能化諸佛數量無邊五所化根欲亦多難知前問中名波羅蜜海者以諸度行相隨根解欲故互舉也六前觀三世海此中一念普知三世一切等者略釋智勝問中名佛解脫海者以一念即三世是佛不思議解脫法故準梵本是離障解脫故梵本云一念平等覺悟一切三世無量智七稱性大願為現身説法之因前問中號海壽量海皆由願力故梵本云合集一切佛無量願海智八應機作用神變無方九轉性法輪海若據前問攝轉法在演説中據觀中攝演説在轉法輪內此文分異十隨方施設言音差別亦是法輪隨機差別故云演説海第二佛身等十句牒上佛六報三業等十問於中但廣其身及光明等者以總收別故一應機之身修短難測二現衆寶金銀等色色各輝耀皆悉無邊三室利瑳等十華藏剎海塵數相圓滿王等隨好數復倍多四圓光隨身色相周徹隨見多種五舒光勝上如雲涌起色相復多六於常光處復更發焰色如衆寶形如火焰發無休息焰色復多七圓音無盡一一深廣難測八三輪攝化謂神足正嚴記心等輪未成熟者調令成熟九於根已熟者策進令夢猛修行隨應獲果故云不空也上來九句一一具德深廣故皆云海難測量故稱不思議此則減數十也第三安住佛地下十句牒上果問中初十句前問中略無變化及自在二句以攝在無就毀壞及上無能攝取句中神變在身自在屬智由無異道及二乘乃至菩薩之力能攝伏摧制故曰無能毀壞等也餘義準釋牒問略歎竟二説説中三初結前所牒問次我當下明承二力謂當界及他方顯無我慢故顯多佛説故所説圓極故後具足宣説一句明説無遺問既云具宣何故後文但説世界海耶答此有二釋一此會經來未盡故二下文雖但説一剎海於中遍具如上所問三十句義也二明所為益中十句攝為五對初二福智一對謂令入佛智海住佛福海次二時處一對謂一切剎海悉皆嚴淨於一切時恆續佛種次二理嚴一對謂顯諸法真性隨多解欲施設言嚴次二生滅一對智斷一對謂隨根令生佛慧隨樂令摧障山後二行願一對謂修對治行住普賢願海中此上十句亦是此會嚴起所因中所為門也二明誡衆聽受中二先長行辨意後偈頌正顯前中十一句初一總標謂令必聞法是故生喜餘十句別顯喜義初二樂法生信一對次二顯性立一對次二了時達處一對次二任持法顯佛境一對後二闡法增智一對二偈頌正顯中十頌分三初二明佛出現意謂現身説法及嚴土調生次六簡持法器一簡非器謂佛以自所悟境普示令入二乘凡愚力所不達故云樂小及著有也次五顯是法器初一具四力堪聞一有淨信二堅其心三近善發四佛力加次一令八心堪聞一離矯現順恭二離詭詐惑亂三離異求心四慈心五悲心六善心普無怨嫉違諍等故七廣大心為遍法界衆生故八深信心於離思法無猶豫故具上諸依方堪為此法器次一列舉普賢法器謂具四德堪知佛自所悟處一具普賢願二住普賢地三修普賢行四觀真空法界次一結歎此衆具普賢行得現見佛神變次一通結一切衆生但得聞法皆是佛護念力後二舉所説法勸衆觀聽以將所説剎及佛皆身中現復欲宣説故勸先觀又誡當聽也第二大段正陳本義中前釋所牒三十問內之一謂世界海餘並攝在其中細尋皆有或可以經來未盡故此中闕譯者在彼中爾於中文分有二初總告令知彼諸佛子下正陳所説説中二初略標十章後諸佛子略説以十下依章廣釋前中三一總標引證二何者下徵標別列三諸佛子下結略廣初中云世界海有十事者以諸世界及種皆海所攝故總云海理實十事於剎及種有處有無非皆遍也下同準之寧三世皆説者此有二義一明此所説如實無異二顯此要勝無佛不説二別列中二先徵後列列中十種一起具因緣者謂能起剎所具因緣此起即具因緣或起是所起剎海具具因緣是能起此即起之具因緣通兩釋也二所依住者種等身所據也三形狀者種等外相也四體性者種等質也五莊嚴者謂種等中勝行人法及諸勝境界也六清淨者謂種等中人修淨業七佛出興者謂種等中佛現佛事八劫住者謂種等成已住時經停分位九劫轉變差別者謂種等剎或由佛菩薩神力等轉變或由居人修漏無漏善不善等猛利行業轉變所居剎及質具望彼前後時分中異故名劫轉變具如釋文處辨十無差別者謂種等中都望諸剎共同有者説故三就略顯廣中云有剎海廣塵數者此總相言爾可知二依章別釋中約十章門即為十段一一中二先長行後偈頌就初段長行中三謂標釋結初標中六以十種故者謂能起因此門通論染淨言已成等者所起剎也三世剎因皆同此故二釋中二先徵標後正釋正釋中一佛通慧力二法如是者依梵本云達磨多此云法性亦曰法爾即如是也若依法性以釋即真如為出因如何理性為因緣耶釋曰如何因緣非理性耶若依法爾以解即剎海成立法合如是輪此因緣二義雖殊皆遍因也三多是有漏苦樂相雜以但云行業通善惡故四依金剛道後功行成滿得菩提時自受用土或他受用土説故五多染少淨因凡聖二因互有增上力同處不相障礙也六純淨無漏因如歡喜地十大願中修淨佛國土願故七第八地菩薩功用不退行所成因故八自在位中以勝解力為因或由此力轉染成淨現於淨土九佛赴感善根往無佛界或於當界此二並約粗化土説多染少淨因也十普願為因於依正體事中現微細帝網等剎若廣分別具如別章三結略顯廣中云有剎海塵數者此有兩説一云此約一一剎海中所有諸剎各各一因總相之數非據多因及除同類言故以一剎海中有剎海塵數剎故即如此段及諸段中標結大數並第十段無差別中説若除同類則聲數有欠若依多因則都數有賸其因緣形體所依住劫等五但可除同有欠不得有賸以果一故其莊嚴清淨佛出轉變無差別等五非唯除同有欠亦乃無數不竟何以故淨剎多嚴穢或金無故清淨一向唯淨剎故佛事隨機現不現故轉變但約淨染染淨或穢土中純無漏剎無此門故又造善惡不可例故無差但依共同者説非一切故一云此中標結都數皆是依實無有欠賸有剎或雖多因所成然則同是一果之因故雖或多剎因果同類然各體別故頌中九偈初一頌佛神力二次一超頌第五衆生菩薩同集善根三次一超頌第四菩薩成一切智四次一超頌第六菩薩嚴土願前舉願力此明願所起行故云無量劫五次一超頌前第三衆生行業此中兼辨煩惱及欲樂六次一頌第八菩薩勝解力七次二超頌第十普賢願力兼行力普現佛前身包剎海八末後一頌頌第九如來善根及成道自在力其第二法如是因及第七不退行因皆略不頌或通攝在第四頌中或在所脫一偈中頌也第二剎所依者通染淨剎也於中長行內文三同前初標中云一一剎海有剎海塵數所依者以一剎海內所管世界有剎海塵數一一所依皆各別故二釋中十種一依衆寶嚴具二依空如雲三依寶海中出光之處名光藏此是無漏依果常體事故可為剎依下聲光等皆準此釋四依佛光五依如衆寶色之光明六依佛圓音説法之聲此亦剎中説法任持剎住七依金剛掌如幻業生者以觀諸法如幻無生忍因回向力所生故八依一切世主身者謂如世主品説三十九類異生衆形也如何世界大體依有情小軀住耶此有四義一外由內感故説依身此復二種一宿因力頌中云業力之所持故二現在轉變力如下説二由攝屬己故名依身如因園屋宅等物雖在他處屬己身攝故曰依身非要擔負三由世主神通力任持令住故通力在身故説依身故華嚴頌云雜染及清淨無量諸剎種隨衆生心起菩薩之所持四由無漏依正體事大小無礙德相依住或約業用亦無得故雖通四義多依後二九依五位菩薩身者同前會釋隨其所應十依普賢願所生諸嚴事者謂無漏依果數多如海從普賢願生自在持剎故頌中二十二偈分二初一總舉勸衆令觀故梵本云汝等觀此諸剎海一切依佛神通現由此十方虗空剎一切世界皆明觀後二十一頌正頌前文於中總分為十三段初一頌頌前依一切莊嚴住以彼嚴具皆衆寶成故二次半頌前依空住三次半頌前依一切寶光明住於中上句無長行或兩句同頌謂摩尼海內後有光藏為剎依故四次二超頌第六依佛音聲於中前一正頌所依後一明能依剎形體嚴覆等長行四五無頌五次二無長行於中前一純淨住華海後一依圓海住故後頌初句梵本云剎土隨海輪此顯剎形如香海圓圓輪二言梵音同呼云曼荼羅故六次一頌前二依住於中前半正頌所依住上句頌金剛手下句頌世主身後半佛於中説法七次二無長行皆依佛神力八次一半超頌第九依普賢願所生嚴事長行第八無頌九次一廣頌前依空十次一半無長行依菩薩冠者會釋如前四義中後二十一次一半又廣頌前依空十二次四頌半依微塵住長行亦無佛力所現此業用門十三次二依業力住亦無長行第三明剎形狀者通染淨剎也於中長行文三同前初標可知二釋中一周圓二普方三長短相稱而八楞非圓三角非方或共一名非方非圓故餘易可知頌中十偈初二略頌前文兼嚴依等二次二剎狀兼嚴淨等三次二通顯染淨剎因果四次一佛在毛孔內剎中説法五次二佛在塵內剎中説法謂先舉一塵內剎中説法謂先舉一塵後類一切六末後一頌結佛大用後四多顯剎嚴第四剎體中唯明淨剎釋中略辨二十種於中云以種種香為體者多不香質或通香氣以心所現境為者體謂佛菩薩定心所現或明或勝解等所現寶等種種境界至華藏頌中照知以佛言音為體者謂佛以神力變現聲為清淨剎故或諸菩薩聞佛言音修淨土行由此感剎故云以言色為體如云佛子從佛口生亦猶禪定説力起等餘文可知頌中初一頌中初一頌前初二及第六謂一切寶一寶不可壞金剛等二次一頌前第三第四一切寶光及種種光三次一頌第五一切莊嚴光明四次一超頌第十寶影像五次一頌前日摩尼輪六次一頌寶焰及寶光七次一頌前妙寶相及華冠並佛變化八次一頌前一念普現境界言一切是分別者謂佛心所現種種境界皆隨衆生分別成異九次一頌前佛力持及通攝佛言音十末後一頌菩薩寶第五剎莊嚴者唯明淨剎於中長行內十種一嚴具出雲為嚴二剎中説大法為嚴三剎中説業果為嚴四説菩薩願為嚴五嚴具現三世佛影為嚴六念須現劫為嚴七現佛與為嚴八寶香雲嚴九以佛得菩提處珍寶等物放光為嚴十説普賢行願為嚴頌中初一總頌所嚴剎海後九正頌前文於中一頌初妙雲二頌第二菩薩功德及第四菩薩願海次一頌説衆生業報次一頌三世佛影次一頌念間現劫次一頌現一切佛次一頌寶香雲次一頌一切道場妙物光嚴末後一頌普賢行願第六剎清淨方便者唯淨剎也方便即是諸善巧出生諸剎因緣隨諸行門皆有淨方便故是以頌中明同類因而長行辨等流果等也如云由久親近善知識故得生有善知識剎中餘並準此又此中有與莊嚴處同者據門望異故釋中長行內十種淨一親近淨可知二增長淨修神通因故三勝解淨四住境淨唯住菩薩悲智境故五諸度淨淨三輪故六觀菩薩地淨於入住出皆善巧故七願淨恆發淨佛國土願故八對謂淨離繫縛故此句梵本云觀察出生一劫行海準頌及此文此句是利他對治謂觀衆生所宜出生一切對治行門令修出要也九巧智入淨以自所修入佛德海十力淨利生供佛故頌中九偈初一總明所淨剎海餘八頌前文一頌近淨二次一頌增長淨三次一頌勝解淨四次一頌住境淨五次一頌諸度淨並超頌願淨六次一頌對治淨七次一劫頌觀菩薩地淨及巧智入淨八末後一頌力淨上來且約長行相應如是屬配其間兼餘準釋可知第七明剎內佛出興者釋中略顯十種一佛現身大小二現壽延促三示現淨土多少梵本云或佛神力加持嚴淨一佛國土或佛神力加持嚴淨無量佛土四説乘多少五度生多少上各開二即為十種此差別相都望一切剎海或一剎海或一種中非唯一剎內則有此多也頌中十偈分三初一總明佛出次五別頌前文後四通頌標中塵數內事初總可知次別頌前文中一頌佛大小二頌壽命長短三頌淨剎多少四頌説乘多少五頌度生多少後四頌標中顯佛德用一毛孔出佛二圓音應機三身赴衆會四隨念應機五通多剎海準釋可解第八明劫住劫住者剎住經停時分也隨能感因有長短異長行唯舉勝剎久住頌中並顯染剎住時促也釋中長行有九種從阿僧祇至不可説若唯下文阿僧祇品合有第十不可説不可説也此十即是一百二十三數內後十大數也言大數者一一有兩重故如云阿僧祇是一也阿僧祇轉為二也餘八皆爾唯第十句文有四重謂不可説為一也不可説轉為二也不可説不可説為三也此又不可説不可説轉為四也若依梵本俱但有三重初二同前三云不可説不可説轉晉朝所譯大同梵文而差別者三云不可説轉轉其轉字乃有兩箇不可説言唯一學也此中此中結略顯廣據大數定有剎海塵數以都數實有若干剎剎各唯有一住時故若望時節拾同者説則無爾許數量此且總相言爾頌中十偈初一頌劫差別二劫長短三劫多少少上通頌前文四劫染淨五釋劫淨因六顯諸劫名七劫中佛出八一多劫相入九劫中嚴具相入十結歸心相故得無礙也第九劫轉變者此或從初為名或通後為稱從初者成劫壞劫因緣變故通後稱者謂隨現居人造善惡業為勝緣故到昔所造外器世間善不善種未成熟者速現前轉變受用及佛菩薩神通等變此即不同順現受業此轉變故彼非轉變故此或依於劫增咸時佛及輪王出現而説出時轉勝歿後變惡時分異故名劫轉變雖有多釋從初為勝問此所轉變與因緣分別相攝盡不答準此文中唯攝因緣不攝分別所以者何有實受用非但境故然有二類一者正因緣變如初成壞劫轉變故二者類因緣變類中二種一牽列因緣變謂由居人造善惡業到昔善惡外器種熟轉變現前故二神力因緣變謂佛菩薩神通力等及由所為宿善根力轉變現前故釋中長行十種一成壞轉變謂有漏心為因緣成咸壞剎此不待因成故云法如是故問豈世界海有成壞耶答此有二義一義如前歎智中釋唯約所持成壞説故二就所持中亦有二種一無壞滅二有壞滅謂由佛菩薩應於彼化故增上力同處共感然以衆生漏業有成壞故隨先一分成後還一分滅佛及菩薩無生滅觀因緣滅故本無有成故無後滅華藏頌云一一剎種中劫燒不思議所現雖敗惡其處常堅固又如法華壽量品頌云常在靈鷲山及餘諸住處衆生見劫盡大火所燒時我此土安隱天人常充滿等此句是後諸句總故顯彼別中各隨因緣力所轉變無有差失都云法如是故也二染汙轉變謂於多淨少染或半淨半染或少淨多染剎中住者造善惡業引苦升器染污種熟轉成純染三染淨轉變謂有修勝有漏福者於純染剎住或昔已修今來此現變成少淨如輪王等故四淨染轉變謂地前菩薩信謂十信解即勝解三賢通稱謂未證真如依勝解力而修行故總名勝解行地此本住剎或多染少淨或半染半淨由此住故變成多淨經本云轉變成染淨者譯人謬也故梵本云毗戍提敬吉履瑟吒此云淨染五菩提心令得純淨轉變言發菩提心者發心有二種一世俗發心謂地前也二證法發心即初地已去也發此心者來住多染少淨等剎變成純淨故六莊嚴轉變謂諸菩薩遊戲神通時以十剎百剎千剎等嚴嚴一佛出等七大莊嚴轉變謂諸方菩薩因此土佛光召來集悉持無量大莊嚴雲嚴此界故八嚴威轉變謂佛示滅度勝事隨滅故九廣嚴轉變謂佛興世世界莊嚴故十佛通令淨轉變謂佛神力變雜染剎令清淨故如維摩佛國品説足指按地等頌中十偈次第頌前十種轉變然初一頌亦總品別謂云皆隨業力生即別顯成壞轉變是正因緣變業力起故又亦總攝後九轉變類因緣變亦由自業引昔因熟成佛神通等故二頌前純染轉變三頌前多染少淨四頌前少染多淨五頌前菩提心念純淨轉變六頌前莊嚴轉變七頌前大嚴轉變八頌前嚴滅轉變九頌前廣嚴轉變十頌前神通令淨轉變第十無差別者都望一切世界海中悉共同有之事故也前九但約一剎海內剎種等説問若爾如何起具中云佛子以十種因緣故一切世界海已成等耶答此是總相之言非定説一切剎海一一中皆用此十而得成就所以者何如泥土金剛銅鐵等界彼豈如來神力因耶日𨊨華旋眉光等剎彼豈衆生業行因耶故知不爾問剎所依住及佛出現中亦云一一世界海有世界海微塵數等者彼云何通耶答彼大段雖同而事狀各異不爾與此第十門同豈應別立釋中長行十種一包剎數同二諸佛示威力同此句與前佛土何別前據一剎海中諸剎諸種明望差別今約一切剎海一一中悉同有彼差別故名無差別故此即差別之無差別也三諸佛道場遍剎海同四諸佛場中衆會同五諸佛光遍同六諸佛化名同七諸佛音聲普遍同八説法善巧應機同九依色中業用多入一大入小同十據身處業用亦身色業用中色內現大身亦一色中現多身亦一依中現多正此皆業用中微細同以一向現他故頌中十偈按次頌前然前約屬漫同此據遍塵同初一頌包多剎剎塵泥沒有剎仍互相入二頌佛興三頌道場四頌衆會五頌佛光六頌化名名召於體前後互舉七頌法輪梵本云一切塵中法海音猶如諸佛轉法輪種種方便自在門一切皆演無差別八頌音聲九一切剎海入一塵言神通業性者釋其無礙所因德用二門也十頌塵中現佛言願力者由苦願力得通用上來略釋世界成就品竟華藏世界品第五將釋此品四門同前初釋名者梵本於此品中五品初一是本品後四是子品今此本品梵本具名拘蘇摩多羅驃訶阿楞伽嚕迦馱超三牟達羅鉢𭌆輪入呼陀懼囊三牟達羅阿縛婆上呼婆此云華藏莊嚴嚴具世界海之遍清淨功德海光明謂地山河海等住在種種光明蘂香幢大蓮華中所含藏故名為華藏此華即藏故持業釋也又以所持香水海中各生一大蓮華持世界種由此出生多華故名為華藏此即生華之藏有財釋也若據刻字翻名則名華藏世界海梵本音云拘蘇摩多羅嚕迦馱都三牟達羅故若依有財應名蓮華藏世界海莊嚴嚴具者即彼地山河海衆寶香光樓閣樹等為剎海之嚴具共莊嚴故遍清淨光明功德海者即彼地山等皆是無漏福慧遍成就故世界海之者謂所管攝諸世界廣多如海既非即是華藏自體故云海之之聲即是屬主聲故依主釋也或有財釋理亦無違後四子品者一名説華藏莊嚴世界海輪圍莊嚴品此即説輪圍山處是也二名説世界海大地上莊嚴品此即説大地上河海等處是也三名説剎種安立品此名在説諸世界種前安也四名説世界安立品此名在説二十層諸世界前安也而翻譯之家以隨方當簡故略子留本於本名中復取省易唯存四字今所具載者欲使傳燈之人和本末矣二來意者前品通辨一切諸佛剎海成立因緣今此別顯毗盧遮那所成依果前是一之一切今是一切之一前通後別故次來也三宗趣者顯毗盧遮那依果為宗令諸菩薩生信起願成慧行等為趣四釋文者文中有二初辨住因深廣後諸佛子此下明果相寬博前中二初指處所後是毗盧下明修因廣於中三一修因廣於中三一修時廣謂剎海塵數數劫故此即因顯權實教説修時不同彼唯三祇此乃剎海塵數差別之相如寶雲經等説撿二親近廣謂彼多劫一一中近剎海塵數佛餘教三祇中逢事佛數云云撿三行願廣謂於彼一一佛所修剎海塵數淨願行故此剎海因深廣也第二果相寬博中二先明華藏自體後爾時普賢菩薩復告大衆言諸佛子此中有何等下明所持剎種等前中文分十段一所依風輪二風持香水海三海中出蓮華四華持剎海體五剎海四周輪山六輪內金剛地面七地面香水海八海外香河九河間閣樹等十總結多門此十段中前四共一長行同一偈頌後六長行偈頌各別相屬就初段中三一標數二略列十多及顯上所持寶地一一相屬其最下名平等住者遍持諸德故風望所持皆有二義一諸風輪間皆有寶嚴各以下持上二諸寶嚴並在臺地面上以風輪力遙相任持三結最上者勝力能持香海故云勝滅等也此中從風至地上海樹等初唯就持後唯所持中各有其能所持義皆可準知第二所持香海名者以摩尼發光普照一切嚴海底岸及寶色香水故名也第三所出蓮華名者謂此蓮華衆香為蘂蘂放衆光光能降伏諸魔外道及諸煩惱故名為幢從此諸事立名也第四所持剎海體中先總後別總中四義一總舉華藏在此臺中二地普均平三純淨四堅二別中下文六義此略舉四一山二地三海四樹頌中十偈分二初二頌前修因所成亦頌第四剎海自體後八頌果相相亦頌前三段前中初一上半舉因下半顯果後一上三句行深後一句果淨後八中初二頌前三段一頌風二上半頌華下半頌海次五明剎自在一摩尼生菩薩二寶光救衆生三寶中出諸佛毛孔出衆四光演佛名五塵含法界寶光現佛下句結剎自在後一頌舉因釋成以因普果圓故得重重自在第五剎海四周輪山長行文三初一句總舉輪山所依處次十句別顯山之體相後如是下總結塵數初中山所依處在剎海地面四周文云此華藏莊嚴世界海大輪圍山故前文云華藏住在大華中故準後頌中日珠等但是所依處地若以有蓮華之言即云在大華之內其所依處亦有寶香真珠燈焰等豈香寶等亦是華耶夫文通兩勢光依有證據者為定二別釋山體相中初句山身三山峯三山輪者準師子座以半月為輪準此即在山半腹出走輪相莊嚴今勘梵本云殊勝妙香威光遍照摩尼為藏今謂藏即山心內也四成輪助緣謂香摩尼為本出𦦨金剛成輪體五山間香水六寶林開華七地布香果八果間光珠九香華遍滿十寶納覆周後總結廣數可知頌中十偈分二初六明嚴山衆事之體相亦頌前文後四辨嚴山衆事之業用前中初一總顯輪山於中初句通説所依剎海廣次句辨山輪色次句讚嚴皆壽下句出因問華藏剎海依大蓮住此即分量照然何故初句云無邊耶答此言無邊與前説邊但是一義所以者何不性相而即真故相隨理而無邊也不礙隨相而即邊也二頌前山輪三頌前山體四頌助成輪體之出焰金剛五六二頌潤澗等諸嚴後四明衆事業用中一菩薩在山説法二佛身入樹寶塵光中三諸事中出佛遍往化物四諸事中説佛本願結歸佛力第六明輪山內地面長行文三初總舉大地二別明地體狀等三總結塵數初中可知二明地體狀等中十句一地體堅二地相平淨三地德圓備謂輪相外現寶藏內充四地上衆形寶互相間嚴五寶末為塵蓮華覆地六常發香氣摩尼間嚴七嚴具應念而現廣遍如雲八三世佛土嚴具而嚴體攝三際故九寶網覆地成隱映故十盡佛所有嚴事於地布列交洛相當展轉重現故云如帝網也後總結可知頌中十偈分二初四頌前文後六明地用亦是佛境界事前中初二頌地體相德滿後二明衆寶及華遍地嚴後六中一雲光説法二寶現共行三佛地衆寶塵諸剎來入彼剎塵內剎亦同來入四菩薩遊化五充法界六結能知此中業用境界者唯佛普賢也第七助地面上香海長行文二先總舉海數後一切妙寶下別顯海嚴前中準後剎種梵本香海及種皆有十不可説佛剎數至彼具顯後別顯嚴中應云一一香水海各有若干莊嚴略故不説或後第十門中總結準知然此所別莊嚴一切香海共同故無別簡言於中有二十句初十明海體狀後十攝異莊嚴前中一妙寶底二音寶岸三光遍照寶為細覆四香水衆寶色五寶旋華布六檀泥七言教光八菩薩持蓋九菩薩現通十現他多剎嚴後十句中一階陛二欄楯三白蓮四寶幢尸羅此云美玉也石也五依鈴網幢六華閣七華城八寶林網覆九寶珠十寶墻皆繞海岸頌中十偈一頌底二頌岸三頌水及華旋流四頌階及欄細五頌樹林六頌華敷七頌幢八頌城及珠九頌墻及閣十舉佛結嚴一昔因二現力第八明海間香河長行文三初舉河數次一切下辨河嚴後若廣下舉廣顯略初中云各有四天下等者諸海皆爾無差別故次辨嚴中準後結文應云一一河有若干莊嚴略故不説又以嚴事普無對故通云一切皆也於中十句一岸體金剛二摩尼岸三現佛光四出隨類音五旋流出佛昔因行時身六摩尼鈴網七現他剎海中嚴八以現本師化身及餘佛通事之摩尼為雲覆上九妙音稱三世佛菩薩名十水出光雲後舉廣顯略云一一河有剎海塵數嚴者如何河在剎海地面香海中間少分處所乃容剎海塵數嚴耶釋曰此剎海自體一切所有一一皆是純淨無漏無得法界一一塵中當容一切無邊法界況河間也故前文云華藏世界所有塵一一塵中見法界上下文中皆準此釋頌中十偈一頌岸地二欄纓等嚴二波浪説法四檀泥與寶同旋流五涌寶流光六摩尼現佛七鐸網覆河八寶音説法九旋澓出菩薩十珠同毫相第九河間樹林等長行文三初總舉次一一下別顯後如是等下結廣初中香海有四洲塵數河一一河有剎塵數嚴事此亦少分處所容多嚴事同前會釋次別顯中七句一白寶華遍嚴寶樹林三樹出嚴具四摩尼間照五香華遍六樹説法七散寶玉寶王有八準釋可知後結文易頌中十偈初二頌寶樹嚴地次五頌地上散寶次一頌樹果現嚴次一頌嚴具現佛身後一地塵有諸菩薩當成佛之土第十明前九門所説境界一一嚴事長行文三初舉事難測次何以下徵後諸佛子下釋初中云世界海莊嚴者別不離總但舉總也不思議者此有二種一廣多難測二融涉難限言廣多謂境界既多一一境界嚴事各廣廣事一一各從多因融涉謂一一嚴事各從剎海塵數德成一一德各令遍成一切嚴事此則一因生一切果一果從一切因一因是一切因一果是一切果故難測難限也次徵云以何不思議故耶後釋中文易不煩具顯頌中十偈初一寶光雲嚴二雲作佛事三寶者説法四嚴具現佛五剎中現佛六寶現依正七因現果用八普行能入九廣行頓現十體真用淨上來十段合是第一明華藏自體竟第二大段明所持剎種等者於中文三初總告衆徵起許説二諸佛子此不可下標所持種及界二章三諸佛子彼諸下廣釋二章初中云此中者此華藏中也何等世界住者諸剎及種俱是世界故通名爾二標二章中準下文香海及種皆十不可説佛剎微塵數今經無十字譯人謬漏故梵本中並有十字是則諸剎依剎種剎種依剎海三位寬狹差別不知三廣釋二章中二初通顯剎種剎依海後爾時普賢菩薩復告下別辨香海依剎海剎種依香海諸剎依剎種前中二初長行後偈頌就長行中三初告衆總舉剎種依剎海二各下別標十事三諸佛子此下依標廣辨初中以香水海及種所依華並即是剎海故但總云於世界海中也二列十事中一各依香水海別二形狀別三體性別四面向方所別五趣入其中所從路畢梵本云鉢邏奢此云所趣入處也六莊嚴殊七廣狹不同八部望諸種行例位分九部望諸種中有相似之事者十衆生業力菩薩力佛力或共力任持別故三依標廣辨中於前十事但顯三門一位二形三體餘略不辨初所依中二先略列十海後總結廣數此十海是不相似中十箇用釋各各之言亦可但是住處別故名為各各非簡異同以凡一種依一海即是各各故二形狀中亦二先別辨二十種後結塵數前中回轉形者準梵語應名回曲形謂攝褻往來之形也壇佉依勒迦等並如音義釋三體性中亦二先別顯二十種前十以諸色相為體後十以音聲為體後結塵數可知頌中初一頌依住次一頌形狀次三頌體性次一頌方所及莊嚴並分齊謂差別門是分齊也遍十方是方所也大莊嚴是莊嚴也次二頌趣入謂初多入一後一多互入各不惟本相次一頌無差別謂塵容剎海等無差別後一頌加持謂如來自在也後別辨香海依剎海剎種依香海諸剎依剎種中文二初長行後偈頌前中亦二初總舉所依諸海後諸佛子此最中央下次第廣顯前中云諸香海等在剎海地面如帝網分布者大部分布似車輪形中間有別謂帝釋殿面向東其網貫天珠而成以一大珠當心安置次以其次大珠貫穿匝繞如是展轉𮞏繞經百千匝若上下南北四角望之其珠皆行列相當今此香海雖在地面分布相狀可以準彼故云如天帝網等也復次廣顯中長科為三段初明中央一香海內種及諸剎二爾時普賢菩薩復告大衆言諸佛子此無邊下辨繞中央海周匝十海內種及諸剎三爾時普賢菩薩復告大衆言諸佛子彼離垢焰下明十繞海復各管十海此中且辨一百一十一海若總顯者有十不可説佛剎塵數香水海十不可説佛剎塵數世界種有剎塵數諸世界也就初段中二先明諸剎所依剎種及華並海後有不可説佛剎下辨能依諸剎前中三初香海名者謂多華各發光明故海底名者謂諸摩尼中此最尊獨出名幢王故又有文像如菩薩形故二海中出華以香寶嚴體故三華中剎種名者衆寶嚴具為體故常有熾盛光照諸方故二明能依諸剎中三初總標大數次其最下方下別辨二十層廣大剎沒諸佛子此遍下總結大數及所依等初中唯標有不可説佛剎塵數據文但有二百一十一佛剎塵數世界依後結中復有兩説不同初總結有不可説佛剎塵數後更結云此一一世界各有十佛剎塵數廣大剎繞一一廣剎復有十佛剎塵數眷屬剎繞何故有此三説異者以最後結云此一一世界之言但是此前二百一十一佛剎塵數世界非是此於不可説佛剎塵數世界數世界若不爾者前標及結豈應標結二百一十一佛剎塵數剎為不可説佛剎塵數剎耶次別辨二十層中二初廣顯後諸佛子此遍照下總結就中最下層內文顯七事一舉名二辨際際即邊際剎之下面金剛為嚴發光輪也三所依謂以衆寶為華故四形狀八楞如末尼珠五衆寶為華如雲覆上六眷屬剎繞然以所依等與主剎異故云種種等也剎中自佛名淨眼等者二障淨二智明故餘佛非不亦然此且依此爾已上諸層內或八事以但加相去遠近數故或九事有加純淨言故準無此言者通染淨故又從此上準層漸次加眷屬剎數中間諸事並準可知其第十二層主剎內佛號超釋梵者梵本中名勝妙梵主第十三層主剎即此娑婆也言形如虗空者大小乘教並説虗空體無質得不可見相今云有形此乃回綴之人不學經論未間法式叨預譯場誤纍聖教一朝至此深可悲愍今勘梵本云三曼多周圓第嚩皤嚩囊天宮伽伽那虛空阿楞迦囉莊嚴具覆僧塞怛那形狀回文應以形狀置周圓之前虗空安天宮之上然後合綴飾云其形周圓以空居天宮莊嚴之具而覆其上第十五層主剎形如室利瑳法餘層內所有衆事隨應準釋後總結中五一舉本剎種總結所管剎數二通結所管諸剎十事三於十事中廣説形狀此準前説剎種形中無須彌山形及嚴具形餘十八同也四此一一下顯兩重眷屬會同大數若不將此以會大數一則此剎種中非唯有一不可説佛剎塵數廣大世界二則三處説數量相違也五通結二十層剎當下所在謂當香海及繞海四洲塵數河上此易可知第二大段辨繞中央香海周匝十海所持剎種及諸層剎中二初牒前中央香海為所繞後次有下正明就繞十海等約十海別即為十段就初段中四一香海二海中生華三華上剎住種以菩薩説法行增上業成此剎種體也四明二十層諸剎一一層中文各有七一相去遠近數二剎名三形四依五覆六眷屬七佛或有説體或説清淨言尸利華光者尸利此云德也第九層內主剎形如難提迦物多經本作室利搓想形者誤也佛號廣大目如空中淨月者梵本云廣眼虗空月第十一層主剎形如室利搓諸剎名等隨應準釋此中略無結數準例知故第二從離垢焰藏香海次南無盡光明輪香海上置剎種者略不説華理實應有二十層剎內第層剎名妙音者梵本中名莊嚴嚴具次第間錯第三層剎名準梵本應云衆寶莊嚴光色照曜佛名準梵本云善佉法界音聲幢第四層佛號梵本云金剛光照音第五重梵本中佛號最勝月精進力第六重梵本中剎名寶蓮華莊嚴清淨佛號法城慧雷音第七重梵本佛號十方廣大名稱智慧燈第九重梵本佛號大智開敷蓮華光第十二重梵本佛號普眼照明法界光幢第十三重世界梵本名離垢藏莊嚴佛號清淨覺威光第十四重世界梵本名寶身光明佛號一切智力虗空燈第十五重世界梵本名出生寶旋纓絡第十七重佛名梵本大名稱廣持功德音遍照曜第十八重剎名不思議嚴具普莊嚴其初一文有七最後文八中間十八各但有三種相去數量剎名佛號解釋準知第三從前無盡光明輪香海次南右旋有金剛寶焰光香海上置剎種者亦略不説蓮華其二十重剎中初一文七後一文八中間同前亦各有三其第二十剎形如室利瑳諸文隨釋可知第四從前金剛寶焰香海右旋次有帝青寶莊嚴香海中出蓮華持剎種其二十重諸剎內初後各一文亦同前中間略亦可知第五從帝青寶莊嚴香海右旋有金剛輪莊嚴底香海上置剎種亦略去華也二十重中初後同前中間略亦準知第六從金剛輪莊嚴底香海右旋有蓮華因陀羅網香海出華時剎種其二十重內諸剎初後及中間具略同前準釋可知第七從前因陀羅網香海右旋次有積集寶香藏香海上置剎種亦略蓮華其二十重諸剎具略同前第二十重剎形如欄楯者梵本云謎你迦此云形如土壇餘文隨釋第八從前積進寶香藏香海右旋有寶莊嚴香海上置剎種其二十重諸剎所明廣略亦不異前餘文差別亦隨應釋第九從前寶莊嚴香海右旋有金剛寶聚香海上置剎種其二十重諸剎初後中間廣略同前準釋可知第十從前金剛寶聚香海右旋有天城寶堞香海上安剎種其二十重諸剎文段廣略亦並同前本疏云此上十海名字十海即辨百海及所持種等於中二初依前十海各辨一可説海復諸佛子如是十不可説下總結都數就前能管十海即為十段其一一段中有二先標能管海名後列所管海等就所管中三初略列九海種等名字次結種內剎數三廣説最後一海及種並剎其結文廣應回安最後海之後不爾此最後海乃在結外非不可説剎塵數內攝故與前後文有相違故就初離垢焰藏海所管十海中欠一海初八鄰次排列自後存略直越至一不可説之最後近輪山海下並同此今勘梵本此別八海次第稍亂故梵本中一變化微妙身二金剛眼幢三善安布蓮華四寶王輪五善化香焰普莊嚴六寶末閻浮幢七威光色普熾然八一切莊嚴具莊嚴境界就此文中二先舉海名及種名體後此中下別顯所管二十重剎於中超間略舉四節一舉最下層二超至第十層其金剛幢世界是中央香海剎種中第十重者此亦第十與彼齊第三更上超至第十三與中央第十三重此娑婆齊等以存略故所以超説恐失次第故辨齊等四更上超至第二十層至其剎種所管剎之邊際故此文云此上過七佛剎塵數世界至此剎種最上方有世界等也剎既終極不慮失次故不説齊等剎名又此中三節略舉皆云此上過者準梵本是超至之言謂從此超至十佛剎塵世界等故若不爾者初節已至第十二層謂説初層後指云此上過十故二從第十二層從沒指云此上過三佛剎塵世界此則已至第十六層從此後云此上過七乃是至第二十四層豈非上下土相違耶餘並準此第二無盡光明輪香海者是前離垢焰藏海次南之海從此已去一道布列不可説剎塵數海至逼輪山海於中先略舉九海名及剎種名後結不可説剎塵數後並準前辨釋可知第三金剛焰光明香海是前第二海之次右旋也亦從此海已去一通行列不可説剎塵海乃至逼輪山海中間名等雖異於前而分齊不殊並準可知第四帝青寶莊嚴香海是前第三海之次右旋也亦從此海已去一道行列乃至近輪山海於中剎種等並準釋可知第五金剛輪莊嚴底香海是前海之次右旋也從此已去一道行列乃至近輪山海中安剎種此列唯有九海九種餘準前後可知第六蓮華因陀羅網香海是前海之次右旋也餘並同前準釋可知第七積集寶香藏香海是前海之次右旋也餘並同前準釋可知第八寶莊嚴香海是前香海之次右旋也餘並同前準釋可知第九金剛寶聚香海是前香海之次右旋也餘並同前準釋之第十天城地寶堞香海是前海之次右旋也其近輪山香海河管二十層內最初文云此中最下方有香水海名因陀羅華藏者從香字至藏字並賸也應從有字直至世界名發生等餘並同前隨應準釋第二總起結數中五一結香海超數有十不可説佛剎塵數二有十不可下結剎種數同香海三皆依下結前香海及剎種皆依剎海蓮華住前名海種光明蘂香幢今此名現一切菩薩形摩尼王幢莊嚴者是彼華之異名與最中央香海底名同故也四各各下結衆剎種諸事不同略顯十事一下際嚴異梵本云際無間斷有字賸也二放光異梵本云光明雲輪三上覆異四嚴具別五住時別六佛事別七説乘別八居人殊九超詣路殊以面所向覆仰側等通十方故十剎種既異佛出亦殊衆生別故佛力加持剎不同五此一一下結剎種所管衆剎諸事不同略舉三事一所依二相望連樓交絡相當如天網珠故因名世界網三通舉多門差別不同如上來説形體方所等第二重頌中總有一百一偈分三初一明所依華藏剎海次九明剎海中諸剎種後所餘頌顯剎種中諸世界事初中初句標名總舉次句顯分量次句明具德後句辨所依第二有九頌辨剎種中分六初一頌明諸種種種因力種種莊飾故不思也各住自分故無雜也二有一頌明依形嚴等諸事不同三有三頌剎種形體差別四一頌明俱依蓮華五有二頌明種中大用光中現剎嚴具網剎六末後一頌總結多剎種嚴皆歸佛力第三一切剎種下有九十一頌明諸剎種中諸剎差別於中文分為十初十頌明剎異由因起於中初四由生滅業因合依果有成壞次三由淨業因故見淨剎後三通結染淨因一隨心染淨因二隨分別心業因三隨欲樂因所感二一切諸剎際下六頌明世界染淨相一有二頌總舉淨相次一唯染相次三通染淨相後一唯淨相三一一剎種下四頌明剎存敗一粗壞細存初偈梵本云一一剎種中為染衆生現不思議劫燒剎輪常堅固二業存處立三性無生滅四佛力常現四有剎泥土下十頌明世界中苦樂事於中初六明惡道苦第二偈上二句梵本云或剎鐵所成或有赤銅作次二明人天業次一明身微細境此唯淨快樂後一總結苦樂由業五有剎衆寶下十頌明剎體性兼餘義隨釋可知六有見清淨下十頌明剎莊嚴於中初五明一多互嚴後五明普攝三世嚴七或有衆多下十頌明剎形差別八有剎住一劫下十頌明剎住時分及佛出有無多少於中初二明住時分後八明佛出有無多少九有剎無光明下十頌明剎中有光無光於中初一無光後九有光十有剎甚可畏下十一頌明剎中音聲善惡於中初二惡道聲次三人天聲後六佛菩薩法輪音並隨應釋上來華藏世界品竟毗盧遮那品第六將釋此品四門同前初釋名者毗此云遍也盧遮那光明照也謂身智二光覺機照法具如妙嚴品初難菩薩德處釋二來意者前此因明之果今辨前果之因故次來也又為答前問因故來也問此若明因何故品標果稱答若不標果因是誰因三宗趣者明佛昔因為宗證成前果令信為趣四釋文中二先明如來本事處後諸佛子彼勝者下明佛本事時前中三一通辨所説去今近遠即二剎塵數劫也二有世界下明剎海名字依淨慧光修普門行德嚴淨成故名也三此世界海中下明依剎海有世界此中應説依剎海有剎種依剎種有世界略故不説種也就世界中文有十七一剎名勝音者多佛出法音勝故二剎所依三剎眷屬四剎形狀五剎體嚴六輪山繞七剎頂覆八剎中淨九城宮高十衣食應念十一劫名三種世間皆勝具足故云種種莊嚴十二剎中有香海十三海中有妙高山於中三一山形似華二名三寶欄繞十四山頂有林於中十一句一林名二華樓三寶臺四香幢五山幢六自蓮七寶網八樂音九光為香雲十多城繞十一城中居人十五林東有城文中二先略標三事復清淨下廣辨三事前中一標主城名二人王下標居者類三百萬下標眷屬城數後廣辨中亦三初廣辨主城文中十一一城體二分量三郭等三嚴四寶塹香水華等嚴五寶樹六宮殿樓閣七網八塗香散華九寶門十門前寶幢十一園林林中二謂香寶重鳥和鳴細分有十九事如文應知二廣辨居嚴中三一成就報得通二行同天無諂三隨欲應念三廣辨眷屬城中文二先別明城名及居嚴後此一一下通顯莊嚴前中二先略別七城後如是等下總結同前標中大數城耳也十六顯前第十四山頂林內有道場文中八事可知十七道場前有大海海中七事一海名二海中出華三華量大小四華莖等悉寶五華眷屬六華常放光七華恆出聲並隨所應釋第二大段明佛本事時中二先總舉初劫多佛後其第一下正明威光所逢事佛前中云最初劫者即前種種莊嚴劫也後亦名為大莊嚴劫有十須彌等者將欲説別先舉其總然準下文此大劫中有恆沙數小劫人壽二小劫初佛壽五十億歲威光歷事三佛轉根生天今云最初劫中有十須彌山塵數佛者為彼剎中更有多箇大劫此初大耶為諸小劫中取小劫耶若就小劫不應威光一報但遇三佛若就大劫一剎之中寧有多大故知此文最初劫之三字應回云劫最初仍移此三字於後行出興於世其字之下即無過也後正明威光所逢事中四佛別明即為四段一逢一切功德須彌勝雲佛二彼佛滅度下明逢第二波羅蜜善根莊嚴佛三諸佛子波羅下明逢第三最勝功德海佛四諸佛子波摩尼下明逢第四名稱普聞蓮華明幢佛就初段中文有七一先瑞熟機二爾時一切功德山下佛現華內三爾時彼佛下佛光驚機四時一切世間主下機覺來集五時彼如來下佛為説法六是時大威光下威光獲益七諸佛子汝等下佛現涅槃就初中三一標佛名謂衆德圓滿高出十地從茲德山現勝身雲遍周法界故名也二諸佛子下佛興先現於中二初總標時謂百年前林遍嚴淨後所謂下顯十種瑞可知三其世界下諸王都覩瑞根熟樂欲詣佛二佛現華內中二先別顯勝處現勝德身後如於下結通現身遍彼世界前中略顯十種勝德一等同真如遍一切世出世事法界中一一皆全乃至重重無盡故云等也二普示出生謂以圓遍之身於一切剎現圓滿身三遍諸道場或主或伴四色身圓淨五力無能奪六衆相明顯七現像普遍八應無不覩九化身無盡十衆光滿剎後結通可知三放光警機中三一顯光名謂所化時至待緣覺悟是故放此發起善根音光也二十佛下明光主伴同遍三若有下辨光勝能勝能有二種一觸物令益二開覺令集益中十種一自覺智開二息現行惑三壞五蓋網四摧二障五淨惑種六發地前信解七生地上善根八離八難五怖九棄分段苦十見佛趣求此十種益是光之能但觸者則得非當時之事四機覺來集中二初諸眷屬城中主及眷屬光覺來集後諸佛子彼焰光下明喜見王及眷屬光覺來集於中五一敘喜見王內外眷屬二爾時大威下明威光見光得益三爾時大威下明威光説偈讚佛四諸佛子彼大下明喜見聞威光偈聲亦説偈命眷屬詣佛五爾時喜見下明王及內外眷屬詣佛初中三一標威光父王之名二統領下明攝外眷屬三夫人下明攝內眷屬言王子五百人別本云二萬五千人者按纓絡本業經上卷曰佛子世間果報者所謂十住銅寶纓絡銅輪王百福子為眷屬生一佛土受佛學行教化二天下十行銀寶纓絡銀輪王五子福子為眷屬生二佛國中受佛教行化三天下十回向金剛寶纓絡金輪王千福子為眷屬入十方佛國中化一切衆生處四天下歡喜地百寶纓絡七寶相輪四天下王萬子為眷屬百法身百佛國中化十方天子二地寶纓絡八寶相輪忉利王二萬子為眷屬乃至三地已上至淨居天王第十地菩薩皆二萬子釋曰第十地菩薩示現為王當無二萬五千按喜見統領及末見波羅蜜善眼佛前猶未至第二地恐二萬五千誤也或可約教説異理亦無失餘文可知二威光見光得益中二先明宿因得緣獲善十益故云以昔等也後正明益中二先徵後顯顯中一證得一切等者此定能令見一切佛國圓滿德海此功德即輪故二一切等者謂此總持包含一切佛教法故三廣大等者謂遍法界巧化之慧名為廣大方便方便從慧生慧生慧即名藏四調伏等者謂以慈為藏調衆生故五稱名之音救苦如雲蔭息毒熱之惱此悲不限時方名普六見衆生利樂皆度脫故喜也七覺屬等法不取著故捨也八依無功用思覺起通名平等大方便通從方便生方便名藏九得初地證真信解及願故十證佛辨無得解智所作上十皆云證者或皆於彼得通達故不爾威光此已成佛初二第十證同佛故然此證字梵云鉢攞底末地地智田賀反此云貫徹即亦通達之義不必皆是如契真性故後第二佛所見通得益云是通達也三威光偈讚佛中先結前後正説偈偈中十頌分四初七頌歎佛勸衆觀一佛坐道場二佛出難遇三化現多處四神通自在五身圓普現六圓音普應七光照滅苦次一頌歎菩薩集次一頌歎道場出妙音後一頌讚已集衆喜見佛瞻無厭四喜見王説偈命眷屬中二先舉王説偈所因後正説偈偈中十一頌分三初三誡衆集往佛所次七勸令辨供後一勸賫詣佛普可知五王與內外眷屬詣佛中二初明焰光城人以王力乘空詣佛此內眷屬也復設有妙華城下天龍等九城主伴衆乃至結有百萬億那由他大城中主伴衆詣佛此皆外眷屬也五明佛説法中四一説經意故云為欲等二説主經名普集等者謂三世佛所有自在果法皆集在中故三眷屬隨轉故四隨所樂欲務令獲益六威光聞法得益中四一聞經得益二爾時大威下以偈讚述三諸佛子下傳示衆生四爾時一切功德山下佛讚威光初中二先總明得佛宿世法海智光明可知二所謂下別顯十一種智光明者約所知十一境以別能知智名然皆委照明達故曰光明此則智用名也十一中大定發智照諸法體平等平等故二照菩提心中具攝一切世出世法明也以真心即是一切心中之二門內真如門攝一切法也三照十方事法界即如來藏明也淨眼也六照無功用進趣行二行中來一切行故名藏也不為功用退故無功成故大也不分遍故速也七照化生法輪明也三輪中正教輪令物從化故云變化非神通化也八照佛圓滿德海徹其底明也決定入言到其源故九照佛勝解究竟具足明也十照遍法界佛應機現前明也十一照佛十力四無畏明也二威光以偈讚述中二先顯偈因後正説偈偈中十偈分四初一述己聞法益二次有七頌由獲益見佛宿因於中前六法説後一喻況法説中初二承事行次二施行後二嚴剎行喻説可知三次一頌由益故見依正自在四末後一頌有二義一願承佛力還如得佛修治依正二行二如佛因時願修二行得二果三傳示衆生中二先明傳衣佛德後令如下辨益物前中以自所得之法為衆生説令得利益此十與十前自得十一有同有異一總舉行海二修之方便三所成德海四證淨法界五現成正覺六功德無別七身雲普應八自在難議九嚴淨剎海十普賢行願二益物中兩句一令發大心二令修嚴正行四佛讚威光中有十一頌初一歎發心二三歎必果滿四歎過芥五歎修猛六歎悲深七通供八滿願九知巧十歎二利十一行周並可知七明佛涅槃中三一明大劫中有多小劫欲説其中人及壽量數故此大劫名即是前種莊嚴劫之異名爾二顯衆生命長三辨佛壽乃從意欲釋威光歷事三佛之疑餘文易了第二明威光逢事第二佛文有四一明佛出世二爾時大時下明童子見佛獲益三爾時大威下威光説偈勸衆詣佛四時大威光王子下威光興眷屬等詣佛初中佛名以無所得智為衆行眼莊嚴究竟故出現處不異前佛故亦於彼也二威光見佛得益門前中一於念佛定中出現廣多佛故名海藏二智力持深教義名大三與樂為先名隨調伏卒令解脫名度脫四現身如雲蔭覆狀在境界是悲所救故五慶悅衆生所有利樂名喜佛已具滿此喜福海從此出現剎生勝境名威力藏威光通達此故名即得六於一切法通達如虗空清淨無二相無二故平等平等故名捨七通達自性清淨性慧故身是體性也八應緣即現之通九於深妙法略言易解十智照等流無漏教藏後總結有十千皆得通達者釋前十中即得之言以此準知前於初佛見光證十法門者還只是此通達之言爾三威光説偈勸衆詣佛中二一威光説偈後諸佛子下明偈聲益物前中十頌分二前八歎佛後二勸衆同詣前中分四初一明佛難遇次三歎佛身業自在次三歎佛語業自在後一歎佛意業自在後二勸衆同詣中初三句勸見佛後五句明見益二偈聲益物中以佛力故聲遍諸剎有聞之者皆發菩提四威光與眷屬等詣佛中四一明大衆詣佛二其佛下佛為説經三彼諸下衆聞法益四時彼佛下佛以偈讚威光初中可知二説經中主經名法界體性清淨者所詮理也莊嚴者所詮行果依彼理成也修多是能詮教從所詮以立故云也眷屬經應次劣機同時而應隨聞異也三衆聞法益中有十種總相而説不必人人得此十益或有同初得二及至有得第十益者初得淨智者謂聞法生信成聞慧故慧因信得故名淨方便二得地者聞法生正解十解成位位即地故解慧照徹名離垢光三得波羅蜜輪者聞法超行行以離相為彼岸因此因當成遍法界現可愛莊嚴果故從果為名也四增廣行者此亦同前得十行益前依自聞法行此利他成行故名普入諸剎無邊光照令得淨見五得趣向行者有因聞法成回向行此約回漏向無漏説故名離垢功德幢幢是皈向義如猛將幢釋金剛幢同此上四皆言輪者由行與證摧惑義勝故六得隨入證者隨是不離義謂有聞説法性真如無間而證得入初地名法海等者正智光照法性海故七得轉深發趣行者此有多人或得二地三地乃至七地今同一別俱望地前為轉深行望八地已上是發趣行發趣即加行方便等異名名大智等者望地前故引六波羅蜜行故八得灌頂智海者與灌頂菩薩同遣無明緣習故取灌頂名撿仁王記由此地中得十自在名不思議智者無量智者廣大智者無能惟智者般若波羅蜜增上故云智慧海也又此地與灌頂菩薩同無功用然此為首據極而言餘如前説九得顯了大智光明者謂前諸地菩薩聞佛説法得入善慧地前諸地準亦起法藥識根病隨應為説非如此地大智光明分明照了以四十無礙解智自在宣説故得善慧名此中名如來功德海光影遍照者遍照根藥現光影身辨説成益同於如來故十得出生願力者或有聞法乘前得至此法雲地此地菩薩以自願力起悲雲震法雷通明無畏電光福慧密雲身一念周旋百千億那由他剎塵數世界後倍是數剎中隨心樂雨法雨滅惑塵焰清淨智者得智自在依止法界故名無量等即由前所説願力所作令無量衆生生信解故彼名藏也四佛以偈讚威光中十頌分二前六歎自所成行後四歎所修行與佛成主伴善根前中二初二歎大智德一智趣菩提二智入佛境後四結行勸進皆上半結所成行下半明所得果後四中一與佛對治行成主伴二與佛供養行成主伴三與佛誓願成主伴四與佛嚴土行成主伴第三明威光逢事第三佛中四一明前佛示滅二喜見下明父王升遐三大威下明童子踐祚四波摩尼下正辨佛興前三可知四佛興中文五一顯佛出時處及號言最勝等者謂佛功德海滿更無能過故名也二時大威下明威光與衆詣佛供養可知三時彼下明佛説經名菩薩等者謂此經中詮顯菩薩稱法界行此行一一智光照修稱法性故一即一切一切即一融無障礙故名普眼光明菩薩行經攝眷屬可知四爾時大威下明威光聞法得益於中先標名後辨用謂此定力能普照了一切衆生福非福故後從用為名用準可知五時彼下明佛以偈讚威光於中十一頌分二前四明自成行後七顯與佛成主伴前中發心行二大悲行三精進行四大願行後七中一以願回前行成主伴二見諸佛因同節根主伴三四隨諸佛修主伴行五與佛嚴剎行成主伴六令中間説威光願者亦並同成主伴善根七多處多時所修普行皆以願滿成主伴也第四明威光逢事第四佛中六一明佛出興謂身不如三界見三界故名蓮華明十方讚德名稱普聞聞皆歸向謂之幢也二威光壽盡德二得轉報天主其天城前焰光之鄰三共諸下與衆詣佛興供四時彼下佛為説經名廣大等者謂此經中詮顯以普門智遍照法界廣大體性之方便故從此所詮為名攝眷屬可知五時天王下明聞法益益中初定名後定用名普等者謂萬法絶殊無非法性體既同一故一一包含一切依此鎔融法界名曰普門能知此者普門智然則普智契普幢名歡喜喜從境生境即名藏用中能入等者普智契普境也六獲是下事説故此中經來不盡故無結會古今又彼剎中既有十須彌山塵數佛出威光從初方事四佛不可但此即顯華藏因了上來此品隨分答前問因上來五品總明第一會竟卍按如來名號品及四聖諦品之記恐不傳歟
