body:
  text: 靜法寺沙門慧苑述光明覺品第九將釋此品四門同前初釋名中二先顯得名後辨釋名先得名者梵本中名如來光明網能覺悟品謂佛足下輪網相中放光還名光網照十方佛會覺悟菩薩令發意來此故釋名者如來是能放光主光明網是所放光體能覺悟是光業用此斷如來之光明網依主或有財簡菩薩等故是佛所有故光明網之能覺悟亦通兩釋曾音聲等覺悟故光明有此覺業故若總言如來光明網覺悟之品唯依主也二來由者略由二義一由答前八問故來謂一佛放光照遍法界此答威德如日威光一舉能現一切事物二光所現剎答開示之意遍歷諸句三光現剎中有佛菩薩答剎莊嚴四文殊說法顯佛功德及真實理答佛性五光所覺悟諸來菩薩各於本剎淨修梵行答佛剎清淨六諸來菩薩本剎金色乃至平等色等其中有依體立名者答剎體性也如以金為體名金色金剛為體名金剛色等七諸來菩薩本剎各各別別成名體亦異此答剎成就八光所照剎中皆有百億如來成正覺此答佛大菩提亦可眾見世尊遍空世界中皆坐蓮華藏師子座是答佛住佛知大眾心念請已各隨其類為現神通令眾皆見是答佛威德餘如前說二顯前二品名諦別遍即是此品融遍故來也謂前所明名諦一切方遍一切今此品明佛及眾會一即一切前後共顯是故來也三宗趣者以佛光照一切剎中菩薩為宗覺悟彼諸菩薩令來此為趣宗趣門中但說宗趣不煩強說餘法四釋文者此中光處照所大數有二十六節於中前九別顯後十七同辨則為十段此非二十六度放光亦非一放而次第巡照但一放光同時頓照盡空世界然以言不並彰說有前後又為引機入法令漸覩見故說有二十六節也就初段中二先明佛以身光照現事境令眾目覩後爾時一切處文殊下智光讚述令眾悟法或此智光之言但是分文非顯經稱經名如來光故今正文殊菩薩門故前中二初顯能照之光後照此下明所照之境前中文云足輪下者謂足下輪相中也足下放光表三義故一涉達所因起自足下時行萬行信為至初為表說信故此放光也二信望後住最為至劣足下於身獨為至卑表說劣門故此放也三表為本所依之義謂身能步涉依足下為本將詣菩提信為根本故此放也下文云信為道元功德母智度第九云足下放光者身得住處皆由於足與此得也言百億光明者顯光數也以所照世界雖無邊限然彼悉與娑婆世界及密訓等是得類剎皆有百億四天下等為所照境是故光明亦放百億二所照境中二先照現本剎染淨等事二如此處下現自法會普遍之相前中三初總標次百億閻浮下別顯後其中下通結初中照是能照光此三千等是所照境然此界量諸說不同若依真諦部異執記云以一四天下為一數從此一數至十十至百百至千是小千世界三倍小千為三千謂一倍至十小千二倍至百千三倍至千千此為三千世界也又作三倍增以為大千謂一倍至三千二倍至百三千三倍至千三千此為大千世界也若依長阿含第十八云千日月千須彌山千四天下六欲天千梵天是名小千世界千小千名中千世界千中千界名三千大千世界雜阿含第十六亦得此說若依俱舍十一釋有二義初明依處分量後正明三千大千言處量者彼云夜摩等天宮依處量有幾有餘師說此上四天依處量同妙高山頂有餘師說上倍倍增有餘師言初靜慮地宮殿依處等一四州第二靜慮等小千界第三靜慮等中千界第四靜慮等大千界有餘師言下三靜慮如次量等小中大千第四靜慮量無邊際言三千者彼云齊何量小中大千頌曰四大州日月蘇迷慮欲天梵世各一千名一小千界此小千千倍說名一中千此千倍大千皆同一成壞順正理三十一大同俱舍然說三千大千唯至梵天故彼云聖教唯說至梵世故依大乘中亦諸異雜集第六佛地第六瑜伽第二智度皆同前引長阿含等若依顯揚第一大意同前然說三千世界三灾所壞故知初禪小千二禪中千三禪大千若依金光明三千世界遍無色界彼云是諸仁王手擎香爐供養經時其香遍布於一念頃遍至三千大千世界百億日月乃至百億非想非非想天若依此經唯至第四靜慮故次下云照百億色究竟天問此上諸說何者為定答若約至教定量則此經為定若依各隨機說則一切皆定二別顯中三初辨照現人中次百億菩薩下明照現八想後有百億須彌下照現欲色天初中三一四州二大海三輪圍四州者按俱舍等說中印度當閻浮提中從中向北三處各有三重黑山黑山北有雪山雪山北有香醉山香雪兩間有阿耨達池池側有林名為瞻部樹形大高生果甘美洲因林稱亦依果名號瞻部提提此云洲綴文習古猶曰閻浮弗婆者此云勝身勝餘州故提如前說瞿耶尼者或曰瞿陀尼瞿牛也陀尼貨也交關貨易用牛如錢故怛羅句盧此云勝生亦曰勝處以彼洲人定壽千歲衣食自然故佛本行集經第十三云此閻浮提縱廣正等七千由旬西瞿尼八千由旬東弗婆提九千由旬北單越十千由旬俱舍十一云南瞻部如東三邊各二千南邊有三半東洲如半月三邊如瞻部如東邊三百半西洲圓無缺徑二千五百北俱盧畟方面各二千等釋曰此中二千三半等數皆由旬量也四洲人面各象當洲地形二大海者謂外醎海三輪圍者帀此四洲鐵圍山謂須彌山在四洲處中四寶所成北金東銀南吠瑠璃西頗胝迦從此外有重金山周帀圍繞一由乾陀羅乃至第七尼民陀羅此七山外有四大洲四大洲側各有二中洲八中洲外有八十億小洲此外方有鐵輪圍山周帀如輪此上九山皆下入海八萬四千由旬住金輪上若依俱舍九山入水皆八萬由旬若論高量唯須彌與入水等餘八望須彌半半漸卑謂由乾陀山四萬二千乃至鐵圍三百一十五由旬半餘一百八十步此依三十里由旬計也九山縱廣皆等高量若依俱舍高廣數准折可知出其九山間有八大海前七名內廣同內面山量第八名外廣三億二萬二千由旬此依十十變數量也問一三千界內計有萬億四天下何故此中但云百億答此之數量諸說不同然有二種一經論翻異二數法差別初翻異者如俱舍翻洛叉為億此經譯俱胝為億故此中云光照一億十億百億千億等梵本皆曰俱低為億故此中云光照一億十億百千億等梵本皆曰俱低測法師深密經記第六中云俱低相傳釋有三種一者十萬二者百萬三者千萬謂此一俱胝三千大千世界或至百數或至千數或百千數二數法差別者按此方黃帝笇法數有三等謂上中下下等數法十十變之中等數法百百變之上等數法倍倍變之諸經論中數乃四等謂下中上上上上下等數者如俱舍第十二云解脫經說六十數中阿僧祇耶是其一數有一無餘數始為一十一為十十十為百十百為千十千為洛叉十洛叉為度洛叉十度洛叉為俱低乃至十大䟦羅攙為阿僧企耶印度俗中亦同此說又諸經論億萬已前亦同此變中等數者百百變位故大婆沙一百七十七云積一至百千名洛叉洛叉至百千名俱低百千俱低名阿庾多佛本行集經第十二云一百百千是名俱低乃至廣說皆百百變位一百百千者一百千是萬也一百箇百千是億也梵文巧略千字兩用又此經阿僧祇品晉朝本云百千百千名一俱梨今此本云一百洛叉名一俱低斯並依中等數也上等數者千千變之故大智度第四云一一名二二二名四三三名九十十名百十百名千十千名萬千萬名億千萬億名那由佗上上等數者位位變之謂將總位為後別不數積此別數等前總位故此經阿僧祇品云俱低俱低為一阿庾多阿庾多為一那由佗乃至廣說皆倍倍變若依十十變數則一三千界有百億四天下若依百百變數則有百億四天下今計一小千界有一千四天下數此至百萬名為萬是則中千總有十萬計十中千乃有一億百中千有十億千中千有百億也二照現八相中但顯五種餘隱略故不說問佛此放光是成道後第二七日如何現前生受出家現後涅槃答下文云佛於一念顯現三世一切佛事八相微細也一一相內具餘七故三照現欲色天中及後總結並易可知二現自法會中二先現本會二佛神力下現新集會前中云百億如成亦如是坐者此明一會遍一切處非是多處各別有會餘遍法界世界中亦如是遍此乃圓融自在法會非餘境界二集新眾中佛神力者是前各隨其類現神通也問前品已說文殊新集何故今此更說新成答今言新集只是前品新來說法所由事須還牒彼故問此中現同前品文殊金色界來復言文殊遍一切處定不相違答法界之身常來遍不相障㝵何以故即體即用故此即佛以法界身放法界光令眾以法界眼覩文殊法界身如方為行所似跡境二頌中十偈總意顯一切相即平等無差於中分二初一頌反顯其義後九頌順釋初頌意云答謂離染外得解脫不染著世者此非證理之智眼梵本云彼聖道眼下九順釋中一出佛體即無體無體即體二見剎及佛不㝵依正歷然而一性平等曾無動搖是不壞二相也三即佛及所說平等也四見佛及自身位平等第三句釋無能證智無住法性五知五蘊即無為故不墮數數即差別之異名六遠離世出世三見名超越若知法者知彼二性平等之法七於迴向菩提能所心平等大品云須菩提言迴向心不在菩提心中菩提心不在迴向心中帝釋難云何故爾耶須菩提言不以世諦如幻夢說但以第一義諦說是二心虗空非心相乃至云若有二法可有迴向譬如我東西行南有止宿故迴東趣向東與迴向處有異故可有迴向不得但有東而言迴向無有異故八出眾生生與我平等九解了一多平等謂解多由一起解一由多生無一不成無一不成來多無多亦無一多彼一多相由生盡故一多之念息一多相平等此會差別歸平等性是理事無㝵非事事無㝵應審其文勿謬解也第二節光照十方各十佛土長行得義十偈分二初六歎佛德後四歎菩薩前中初一歎佛苦因為物求菩提上半所為謂無明故造業貪愛故潤業生死境轉此二為彼除此求菩提也准梵本中第二句應云愛刺但隨遂下半明能為可出二欲佛為物轉不退正見法輪謂今生求一切法離斷常二邊之見故云普也此頌亦即釋前頌中第三句謂與眾生說此法即是為物自求菩提三歎佛精勤弘掉挃生四歎佛慈力降魔五歎佛大智斷惑唯在一念六歎佛法皷警機後四歎菩薩德者一遊剎不取捨難二念佛深廣生喜難三為佗苦己難四護正法捨命難初中意云遊諸億剎化眾生時不壞無邊有壞亦不著者不取不壞者不捨以此遊剎是自在也二念佛中上半所念佛謂德廣如空障盡常淨下半能念心若憶念生喜所願皆滿三為佗苦己中上半為物受苦之時處下半為物受苦之心謂若自業自受雖多時多處之苦未足為難此皆為佗故為難豐四護法捨命中上半正無我所時不㝵捨命護法下半正捨命護法時了了見無我第三節光照十方各百世界長行同前十頌分二初一內德盈滿後九外化普周前中初三句能調之人末句所調之器前中初二句了俗如幻達真無㝵次句於真心淨於俗無著亦可俱淨俱無著下句所調可知後九是佛悲願自在其云或見者有多義一或多機異處各感見一二或同處各見三或異時別見四或同時異見五或同時異處見六或同處異時見七或時異處異見八或同時同處見九或一人於同異處互處見多人所見十或一人於同異俱見時處見一切人所見以是普眼機故然佛不分身無思普現也九中一頌生時如闇夜月現二行七步時現具德丈夫三顧盻時觀方現笑四師子吼時說我獨尊等五出家時示行三事一脫俗繫縛二脩古佛行三捨喧觀寂六坐道場時障盡德圓七轉法輪時因悲度生八現神通時調伏難化九入涅槃時示滅常在第四節照千世界頌中十偈初一歎佛悲智德上半智深下半悲濟二歎佛身從無義義所觀智百生故如來身非有而有有即不有三歎佛解脫等德准梵本中亦通勝解此中有五一解脫者此復二種一離縛解脫德謂離三界貪故心得解脫離於無明故慧得解脫親光意云由離貪心及無明故證得無為解脫涅槃涅槃二十五云貪嗔痴心永斷滅故心善解脫於一切法知無障㝵故慧善解脫二無㝵解脫德謂於一塵中現不可說不可說諸佛興世等十種解脫如佛不思議法品說二明行者禪慧德瑜伽三十八云明謂三明行謂止觀二品涅槃十七云明者名得無量善果行名脚足善果者名阿耨菩提足者名戒慧乘戒慧足得阿耨菩提又明者名呪呪謂解脫者名行吉吉謂阿耨菩提足名果果謂大涅槃又明者名光謂不放逸行者名業業謂六波羅蜜足者名果果謂阿耨菩提又明者名三明一菩薩明二佛明三無明明菩薩明者即是般若波羅蜜佛明者即是佛眼無明明者即畢竟空行者無量劫為眾生脩行足者明見佛性三無數者相得無為德謂佛所有六根三業及一切德不墮諸數非待對法事即理故四無等倫者超下位德謂唯佛與佛互望說等餘無齊匹五世間等者離過失德謂因明比量但依世俗分別名言定有定無取相得失故曰世間今此顯佛一切功德超世名言離有無相故非彼法能出其過如說佛聲非定有無非常無常三科皆爾假名三科實離名相法性生故諸因量者謂自他共等三種比量比量雖有三支五分因是量主故曰因量因明之稱亦從此立也四歎佛六根三業一切境界非是有為三科所攝五歎佛離心境妄念德以心境本寂本寂即是解脫六歎佛寂而常用七歎佛寂用無㝵八歎佛無染了染九歎佛平等度生十歎佛非有遍有第五節光照十方十千世界頌中十偈教諸菩薩盡十種行一大悲行中四一盡大心二正救物三令出離四結勤令修二信佛行謂信堅親近三者樂佛德行謂於佛功德希望不息由此明非相應之慧四學念佛行謂於四威儀晝夜常念此無間修也五觀三世佛行謂三世諸佛得修行海常觀脩學心無厭倦此無厭足脩也六學如實相觀行謂觀我無我二俱不著所以者何觀彼二性平等寂滅故七學觀眾生平等行謂於一切種種眾生等心觀察皆歸一性所謂無性八學佛神通行謂擎持一切剎飲盡一切海九學知諸佛國土行謂觀諸佛土所有色形體性覆際等相即得法性故云思惟色與非色一切悉知或佛土中十八圓滿內有色非色者故或佛國土有根化法性等殊故云色非色相也十學知數多行文易第六節光照百千世界頌中十偈分三初六頌歎佛即應而寂次三頌半歎佛即寂而應後半頌結知此法者益就初六頌中前五明身後一明身心前中一歎佛難取若以相等取佛則乖真見倒也於中三一離威德取二離色相取三離雜種勝取二歎應無限謂色相雖應物莫測其量如前所引普曜經說應持量身目連尋聲色相類知三釋疑前之二頌乍似相違謂前頌不許取相後頌歎相無邊故此上半會前不違後以即應而寂故不可威德色強取也下半會後不違前以即寂而應故乃身相具足隨皆見四明佛所有法超相故云微妙是則心不能量口莫能說下半重釋即應而寂故非和合即寂而應故非不合體性寂滅重釋應寂五明六根三業得無為性不可蘊界攝戲論有二種一四句中戲論謗謂非非有非非無句二言念戲論謂於離言念法而以言念稱量皆墮戲論今此是後餘可准知後一明身心即應而寂中皆可互標釋謂得身平等故外解脫得心平等故內解脫得身心平等故永住正念或由正念得平等也內解脫故無著外解脫故無繫或通無失二次三頌半即寂而應中初一顯心寂而應謂他心智無照而照說法利物次二明身寂而應於中前頌隨應現形一多互為後頌無依之身隨染業行見色種種後半明心用而寂第二句梵本云亦未曾分別謂無分別智本無分別而分別故後半頌總結知上聖者即為見佛准梵本應云如是見佛身此知如來法正應云知如來自性第七節光照十方百萬世界者梵本中云照十百千此是萬後億前中間之數謂百千為萬百萬為億此死但是十百千未至百百千當知猶在俱胝數前即明此依百百變位得無惑矣偈中十頌分二初五明離分別後五勸眾順法觀佛前中初二明佛體甚深德具用廣後三明佛三業離妄前中初內初句總標後三句如次體深德具用廣後內初三句體深末句用廣後三業中初頌明意業智是意所故此有五一光治所知二淨治煩惱三洗蕩餘習四分別不盡方能斷證五此斷證之智離斷常見亦離能所斷證二見下句結智樂人二明佛身業離妄中顯身與前智俱非分別所得餘句明見益三明佛語中轉稱性之法輪此中有四一轉法輪處二稱性體三稱性用四巧應機宜故云方便說後五勸眾順法觀佛中初三觀正法後二觀身土前中初一深信諸法離戲論分別如此方是念佛菩提二了差別相即無差別謂一多差別唯在心言法本離言故不可以一多而說此會相歸性也三辨無差別之所由即是釋前頌意云無一無多者約體與名體者謂多望於一多不自多由一故多一望於多一不自一由多故一一不自一故無一可能有多多不自多故無多可能有一是故一多不能相有體性既爾名字亦然故一與多此二俱捨二俱捨者會相歸性由此普入佛功德也問上下皆云一中有多多中有一此乃非耶答彼約事事無㝵此依理事鎔融各據一義不相違也後二頌觀眾生國土初頌顯依正歸空以國土寂滅故曰無依以眾生寂滅故無妄分別後頌明此二俱空一異不可得也第八節光照十方各一億世界者前第七節梵本既云過百千照十百千明知百千是中等萬數十百千是中等萬後億前之數百百千是中等億故此中梵本云過十百千照一俱胝胝中等俱胝翻為億後與下文百千百千及一百洛叉名一俱胝同也即彼洛叉是中等萬也後第九第十節等所有億名者皆應准釋頌中十偈皆讚佛權實雙行善巧方便初中歎無相示相方便謂佛功德海平等一相不㝵應機有多勝劣此中有六一能知智無等二所知法無邊三超有四到岸五壽無比六光無比下句結善巧二中雖常明三世境界而不分別三中雖勸生趣住無生定而亦不為定心所繫四雖善通達一切諸法而常脩習涅業平等解脫即涅槃異名五中雖勸眾生向大菩提趣一切智而化生證真無智無得如稱順也諦實性也六中隨說證語嘿無㝵隨語所及即隨證會以證智至所言及處故云一切行處悉已臻此說法證雙行也若准梵本言行雙盡無㝵故梵云一切處行決定發定發趣七中雖住涅槃而化周遍此寂用雙行也八中以佛真實智了知假時數時數雖不實不㝵於佛真智現此真假雙行也九中同前真假亦有名無名雙行也十中雖分明照了三世言說差別之相而知彼相平等一味此言無言雙行也第九節光照十方各十億世界頌中十偈歎佛因果度生行於中二初一明果成度生行後九明發因誓願度生行前中初二句因行圓上句梵云極難苦行次一句果滿度到也末句通結利佗能行後九中一誓斷物或行初三句舉古佛此行末句立誓同古結行梵本云至仁勇猛直入中我亦當然是其行悉斷除言與直入中語異意同謂佛直入生死海中除斷眾生無明愛欲二誓度放逸眾生行初二句行境次句行所末句立誓盡行及結三誓為眾坐說法行初二句行境次緣末句起行及結四誓度惡趣行初三句行境末句行心及結五誓燃法燈照迷行初二句行境後二句盡行及結六誓造法船救溺行初二句行境後二句盡行及結七誓建法橋度迷行初二句行境不見本者本取我本所謂無我後二句盡行及結問此中既云佛哀愍彼何故前判後九是佛發因行耶答今言佛者說佛因故故云佛也八誓度險道眾生行初二句行境次句行緣末句盡行及結九信解法性度生行初二句行緣後二句盡行及結第十節光照十方總結無盡世界於中二先明世界數量有十七節漸廣至法界虗空後彼一一下明諸世界所有物現同前中知頌中十偈分三初四欲佛因果等流次四勸物順法見佛後二歎佛體用廣多初中前二明等流果後二明同類因因果相配後二因中前因感前果後因感後果謂由前因意業順觀諸法性相神力利物獲十力智見劫平等而不㝵三世之事歷然故云獲相似果也後因意業柔忍禪觀法性證業教物故獲常歡喜普遍宣揚等流果也次四勸物順法見佛中前二求法宣說後二聞法見佛悟真離著前中先求後說求中謂求法為具眾福除二見更無別意故云情無異句標無異求次二句顯正所求末句明順求見佛後說中初二句說法益物次句顯正宣說時心不離實際末句順事理故得見佛也義利者令眾生得離惡攝善故此世佗世益故福德智慧益故上四對中皆先義後利應知後二中先聞菩提分而悟真後見十力空而悟真前中初二句聞菩提分次句悟真末句悟故見佛後中會上求說聞等三見佛義若見佛如幻此即離著真見若取相分別見如盲見非見初三句取相不亡故不見末句離執故見後重讚佛身普遍無盡中前頌明用應無盡上半喻顯舉眾生隨業受身無盡下半法合明佛身隨器應現無窮後頌明體真普遍上三句喻顯末句法合佛體湛然遍而無易上來三品明答初十果問竟無餘涅槃何以故此少善根究竟故第六正教甚深中先問後答問中二初直難後然其下遮難前中二初總告勤首後佛教下正顯相違前中以勤修速脫故問此菩薩也後相違中二先按定後云何下相違前中二義一佛教唯一斷惑之法二感者同見此理共許故成按定准涅槃經見有眼見聞見今此聞見後相違中亦二義一違教力邪機見斷惑之教而惑不斷二違同見謂見教同而斷惑不同故云不即悉斷後遮難者是文殊假說之言而謂勤首設汝救云雖多同見一斷惑教然由見教者勤情有殊故斷惑不等者理亦不然救在文外故此遮云然其色等於中文二初明見教者不別謂皆稟五蘊界繫惑傳故云無有差別故不可偏以勤惰救難後是則下明教法唯二故反顯云若言唯由勤惰有遲速者是則不由教一與不一何殊應不藉此一味教般下答意由教力勤力因所成斷無斷斷無斷無方斷故頌云當於佛法中勇猛常精進答中十頌分二初一許說開章謂上半除偽稱實而說下半開二章門後九依章別釋於中初一頌釋前速解脫章文顯可知後八頌釋前難出難章於中一樵濕火滅喻喻惑障厚淳者蹔得聞教即望惑滅由障厚故不能復進所聞速失二鑽火頻息喻喻聞教數間斷生意良難三闕緣求火喻喻於教不能正聞受持四閇目求見喻喻對明師我慢懈怠不能諮啟五無手足欲遍射地喻喻無信手以持定弓無戒足以遍步惑地以劣聞慧箭射破厚煩惱地不可得法望滅一切八端坐望遍騰空喻喻離聞望自悟第七正行甚深中先問後答問中二初總法首者謂欲明行法故而此菩薩後如佛下正顯相違於中二初直難後難後能受持下遮難前中二初按定後何故下相違相前中心領義理名受受已恒觀不失曰持由此受持悉能斷惑此理共許故成按定後相違中三初總顯次隨貪下別明後勢力下結成初中云既常觀察正理現前則應悉斷煩惱無由間起何得亦有不斷者般次別明中十一句總相言者持法本望滅惑今乃舊惑不除更增新起惑法能滅惑其理安立文中一於諸有情及資具名等愛樂染著故二於諸有情被譏毀等起植害心不安隱故三於真俗境不如實知隨毀譽等故四恃財法等貢高陵物計己勝故起解法等慢五於自遏惡不欲他起恐失利譽藏其短故六因他語難或為餘緣故憤發現前乃至執杖故七由先忿發結怨不捨故八於財法等已之者生不忍耐慼行轉故九於財法等祕恡不能捨故十為求名利憍現有德詭詐惑亂故十一為罔冒他曲順其情憍設方便故結成中云勢等者謂雖聞義理以諸惑勢力強故心隨被起是故諸惑常不離心此顯唯聞教其力少不能令惑滅也後遮難者是文殊假縱之言救在文外而謂法首云縱汝救云受持正理是善心貪等是不善心善惡既殊故不妨持法而復起惑者此亦不然此中文未迴應云何故復於能受持法心行之內起諸煩惱謂解法是善心起惑是不善心此二心僧理則可爾何故正於自法涅槃我我所心中起惑我我所貪等上來難者偏以自法應斷惑而不斷為難下答意不可偏取解法即斷惑要賴依法起行所曾故惑方能斷如燈破闇緣曾方破由從緣故破即無破無破方破此亦然矣答中十頌分二初一勸聽略說後九就喻廣明前中初句勸聽次句歎問攝順一正理故云如實下半略說謂非唯多解義理即斷煩惱要及脩行方成斷證入證也法喻也後九喻中皆上半喻說下半法合初中水漂渴死喻喻畏行難而不行失於常命謂三時捨命得於常命以不堅身易堅固身等善戒第一云應生畏處不生畏故二飯他自餓喻喻說脩行他依自不依三善毉自病喻喻自解治法而不治四貧數他財喻喻廣說菩薩行自涅槃無片修行五王子飢寒喻喻雖解義理然以諸障所障不能修行故無道火之焰燈如之味不能資顯法身為飢寒爾梵本云如有生王宮應獲曾之樂乃受飢寒苦多聞亦如是六韻樂脫他喻喻說法益他不自益七盲書示他喻喻與他悅他證自不證八船師溺海喻喻與他說法他濟自不濟九巧說德行自闕喻喻為他說德行自身無德行問准上所說毀責多聞有人乘此說多聞有過其理如何答愚者不了將為毀責智人了達正讚多聞所以此多聞是成種覺正因故責不依行向若多聞為非豈應責不依行其猶閻羅責罪人偈云汝得人身不脩福如至寂所空手歸等斯豈責彼得人身乎此亦如是又下文第三地中盛讚多聞豈一望教前後相違故文云菩薩見諸眾生隨煩惱大苦失涅槃樂思惟救法不離無礙解脫不離一切法如實覺覺不離無行無生慧光光不離禪觀察智智不離善巧多聞是故菩薩陪於正法勤求修習日夜唯願聞法喜法乃至行法為求法故無所恡惜不見有物難得可重但於說法者生難遭想為法悉捨內外所有無有恭敬而不能行無有憍慢而不能捨無有承事而不能行無有憍慢而不能捨無有承事而不能佐無有勤苦而不能受廣說如彼又如善財廣求諸善知識意在多聞若得多聞則識流無流法可棄可脩般法正法可捨可依知佛方便說正直說密意說顯了說有餘說無餘說隨自說隨他說世俗說勝義說權說實說如是遍智方能普應眾生種種根欲與菩提心相應若不爾者心便劣故與大菩提不相應也如婆沙三十二云多聞能知法多聞能離羅多聞捨無義多聞得涅槃第八正道甚深中二先問後答問中二初總告知首者謂所顯正道智為其體故問此菩薩也後於佛下正顯相違於中二初直相違後而終下遮救辨違前中二初按定謂智是眾助道主故云為上首此理共然故成按後如來下顯其違相知既上首則唯應讚智餘度非首何亦同讚為無正助勝劣耶為有正助謬讚助耶文中十句六度四無量名釋如章後遮難者是文殊假縱之言而謂智首縱汝救云知雖上首然以根性宜果故略隨佛讚者理亦不然救在文外故此遮云而終無有唯以一法得出離成菩提者謂若由諸度各獨出離容各別讚既不如是何各讚耶此則難者以正則讚難下答者以隨根性分異各隨讚勝答答中十偈分二初一歎問許說謂上半歎問應機下半牒問許說後九正答前問於中二初二頌標隨非隨二章後七頌依章別釋前中初一據非隨按接引接實而說正助論要謂三世佛無有以一法而得出世者今經本第三句中准梵文脫以字故翻直本云不有以一法已出說中尊亦不現出有亦不當出復迴文應云過去未來世現在說中尊無有以一法出現於世者後一依隨根接引各別讚中言隨其所應度者顯引攝方便故且隨讚非即究竟唯此一也餘文可知後七別釋中二初三頌釋前依權隨根各讚後四釋後依實正助皆要前中初二頌半明眾生各有煩惱偏重處及欲樂不同佛即就彼先治引攝故此治引於此相應即於此讚於餘則非餘亦如是文中六度四無量准釋可知後半頌總結別讚乃順曾脩之義後四頌據實釋中各上半喻顯下半法合初中萬行之本不越防惡進善施為進善之首或為防惡之初此二若堅萬行有據故喻室基也二中由忍外順違則外壞不能破壞善法策進自勵則內行增順故以城郭防外養內為喻三中菩薩眾或唯賴定慧降伏故喻王力能靜中外四中四無量行利他即菩薩自利故喻輪王也第九一道甚深中亦先問後答問中二先明告賢首者能會此違唯柔順勝惠故問此菩薩後諸佛下顯相違相於中二先舉法直難後無有下遮救逆難前中二先舉共許以為按定謂諸如來因皆齊一故云一道感果不殊故云而得出離後云何下正示違於果違因故於中三初總標次所謂下別顯後各有下總結初中可知次別顯中十事此十多分同上世界成就品中諸門所顯又第一世界異者此有十種一染淨二大小三形狀四體性五所依六莊嚴七佛出八劫住九轉變十無差別今略顯二門餘如成就品說初染淨異者如下文壽量品說始從娑婆釋迦佛土終至勝蓮華界首佛剎總有百萬阿僧祇重麤妙差別謂純染純淨半染半淨多分染淨少分染淨等二大小異者如釋迦佛土唯一三千界法華第四說法明佛土如一恒沙三千界量智度云以三千界為一數數至恒沙為一世界性數性至恒沙為一世界海數至無量恒沙為一世界種數種至無量十萬恒沙為一佛土釋曰准智度釋法華法明佛土是世界性土若准上文華藏界品說藏剎海中有世界海徵實數世界是毗盧遮那佛化境者按智度以恒沙為量數至無量十方此以剎海塵數為量塵是一剎殊非比也更有多重稱普賢等境如理應思第二眾生異者即前染淨諸剎種種差別人隨異或唯地上或地前或通前二或兼二乘或曾凡夫惡趣等故等第三說法異者如十卷楞伽云佛告大慧非一切佛土言語說法何以故有佛國土直視不瞬口無言說名為說法有佛國土直爾示相名為說法乃至云有佛國土動身名為說法廣說如彼又如維摩香積品說說法多種曾如第一教體門辨第四調伏異者即如前說隨土淨染眾有勝劣各隨起病設對治門故第五壽量異者如佛名經第七卷說梵聲佛壽十億歲月面佛壽一日一夜餘廣如彼阿彌陀經云彼佛壽命無量無邊法華第二云華光佛壽十二小劫第三云多摩羅䟦旃檀香佛壽二十四小劫大通智勝佛壽五百四十萬億那由多劫第四云法明佛壽無量阿僧祇劫普明佛壽六萬劫山海慧自在通王佛壽無量千萬阿僧祇劫第六光明異者或光色不同或遠近照異或常放差別如釋迦佛有常光放光普明佛唯有放光以常放故無別常光如法華第四說阿彌陀佛唯有常光以彼常遠照十方國不得放故第七神通異者謂諸如來隨染淨剎眾生異故現通亦異第八眾會異者此有三種一根類二多小三會數初根類不如前眾生界異說二多少忘或菩薩多聲聞少或反上佛名經云彌留勝王佛初會聲聞眾八十億百千那由他師子佛初會聲聞眾有九十九億等廣說如彼或三乘眾多人天眾少或反上或僧多少隨剎淨染故佛壽脩從故三會數者如佛名經第七云彌留勝王佛四會說法華勝佛一會說法聲德佛三會說法放焰佛十會說法或一經多會說或一會說多經廣顯應知第九教儀異者此有三種一立乘教別二位名同異三互說不說初謂有佛唯說一我乘或有說三或有說五或曾說三五會歸於一或說無量故下文云十方佛土中聞說一乘音或二三四五乃至無量乘或有佛說漸教或有說頓教或有僧說權實亦爾二位名異者謂諸世界眾生名宜聞不同佛名諦名乃至一切法門名字藏經立稱皆各差別三互說不說者如根淨土中不說地前諸對治教會涅槃等或於藏教有說不說謂有佛土無殺盜婬彼佛不說得犯方制因緣經故無有文字言說佛土攝機示相令會經故有脩多羅亦示相本生本事曾成佛身示未曾有方廣大用心諸用不請自現無餘五種廣說應知第十法住任異者如華光佛正像法各三十二小劫光明佛正像各住二十小劫山海慧佛正法二無量千萬億阿僧祇劫像法無量千萬阿僧祇劫廣如法華第二三四中說更有應說上來別顯竟三總結可起遮救者諸文殊恐賢首救云諸佛因行雖皆曾具然由願樂各異故感剎等殊為遮此救故云無有不具等謂若以願樂各異故界亦異者則應諸佛因行互有勝劣互背若爾不應得界果齊等謂海不渴不應成佛不得名為應正等覺理既不然故云無有不曾一切佛法而成菩提蓋知諸佛因果曾同異義言因同者一切行海皆同脩故因異者用彼同因皆同迴向種種應機果故因果者行海同行感果同故異果者由將同因迴向成體種種應機果故謂斷於彼同果之體能與種種見異之機為增上緣令得隨見故此如錦窠線又如十樂佛常同常異融無障㝵今文殊於二種因果中以因同果異作相違難賢首以因同果異作相順答非但不相違亦乃極相順所以者何若無同因異果不成無可以迴向故若無異果同因無用又此遮救文亦是結成前難會釋應知答中十偈分三初文殊二字標告問者次法常爾下牒問中共許後如本下八頌正答初中謂今問者領答故先呼其名二牒問共許中二先想牒後一切無礙下別牒前中二初三字明諸佛共同之事不待因成故云法常爾此不待因成之事諸佛無異故云唯一法別牒中二先兩句牒前唯一道而得出離後一頌出離果不異之相此中言一者同類之一非一二之一餘文易了三正答中二先七頌別明後一頌總結前中三初二頌明異因果之應感次二頌明同因之果應感後三頌通辨同異業果初中前頌明異因感異界上半因下半果後頌明異果應異見上半能應果下半所應機次二中前頌明同因之果非劣所見後頌明彼因果唯德齊及分階佛境者方覩後三中二先一頌半明三因所見剎等異頌文巧略舉剎攝餘故但說剎三因所謂一感者因行心樂異二佛共同異業力三佛地同異果力神威神力即二果力也後一頌半明由因見剎等異舉隨機心攝餘因緣頌文略故初後各兩句苦明見異所因中間兩句明所見果異前中上二句順釋下二句反顯謂由心異故異見異非佛使然後一頌總結云一切剎中見佛種種異者皆如上說法如是故第十佛境界甚深者上來九段問答明文殊一人別問九菩薩各別文殊一人此則以總顯於別別設顯總總別共成信中觀解也今此一段問答明九菩薩共問文殊一人文殊一人文殊通答九菩薩此則以別顯總總復顯別總別共成信中觀解也文中三初明諸菩薩同問文殊者非上首無以明佛境故問之也二我等下明問答次第謂九菩薩是總之別前已各說文殊是別之總今次當演三唯願下正顯問詞於中二初總標後何等下別列前中云妙辨才者剖析分明曰辨稱根合理曰才說契佛境入玄為妙如來者如上說境界者略有二種一所緣二分齊此中通二准文可知後別中十一句一總謂佛境深廣徹理遍事故別中一因是佛因非餘分故二佛所度生佛所緣故三諸器世間佛所緣故四緣三世平等境之智故五理事鎔融無㝵法界法故六佛知一切眾生言音性相以一切眾生言音為說法言音不壞相而無相唯佛境故七佛能證智唯佛能知故八佛能證智證所證如此唯佛所證故九佛現世照世唯佛事業故十三世總心佛一念知盡非餘境故答中十偈次第答前十一句初一答前總句上半標理事二境下半明二境所證謂佛境界唯有二種一理二事理是事理則至近難測故初句云深也事是理事則小分亦無限次句云量等空也理事非即故次句云眾生證入也理事非離故末句云入無所入眾生即如不待更入故二答因境界中有三義一稱法性二熾盛脩三無間順故無終極如文可知三答度境界中物心樂皆令獲益此非餘境四答入境界中佛於眾生及器二種世間智身潛入密作利益或現色身顯益於物五答三世平等知境界中上半明知用下半顯知體六答法境界中上半明所緣無㝵理事之境下半彰從能了以得名七答說境界中佛了世言音即相而無相八答智智境界謂所智性淨法界非染識智非妄心境唯佛能知為眾生說九上半答之證境界證謂能證於中上句明障無不離故云非業非煩惱也下句明理無不契能證智寂故云無物也所證相盡故云無住處也此能所俱泯方為佛證也下半答現境界中雖能照智寂及所行境泯即以此能所平等而現世間是故常行世間而無所行是名現世照世也十答廣境界中上半明可知廣上句能依心廣下句所依時廣下半明能知智廣上句舉知下句委細智上來初文殊問九菩薩九菩薩答為別相後九菩薩問文殊文殊答為總相正辨十甚深竟第二明明現諸事者謂前品云如來之下光照此三千界內四洲大海圍山八相欲色界天等其中所有悉曾明現是也此中略顯九種初一總句法即是下八種法多類不同故皆云差別二業者一流無流業二就流中善不善業或是營為種種生業三世間者謂五趣器世間四身者謂五趣總根五根者謂二十二根及利鈍等六受生者謂四姓家或賢不賢聖非聖等七持戒果者人天身及端嚴無缺陋等八犯戒果者三途身及缺醜陋等九國土果者謂器世間別處種種國界洲郡縣屋宅等如是種種差別佛光照故悉明現會眾觀也上來明現諸事竟亦是前品所明光二十六節之初節也自下第二明結通中二初結東方後南西下結餘九方此結亦是前品從第二節已志光所照處此中略舉十數其量分齊如阿祇品說餘文可知上來滿段總明第一信中解竟淨行品第十一將釋此品四門同前初釋名中二先明名者梵本云具折羅波唎戍提戍音作輸律反言具折囉者所行也波唎者皆也遍也戍提者清淨也謂由善用心令三業六根於所行三性境皆隨所應成信願行故云所行皆清淨也後釋名者既由於境用心巧願令眼等所行皆得清淨此則所行之清淨依主釋也二來意者前品明信中之慧解今明信中三願行故次來也三宗趣者以隨何巧願離遏為宗成諸勝妙功德為趣亦可成後德用為趣四釋文者中文二先智首菩薩問舉法微其因後爾時文殊下文殊菩薩答標德顯其因前中文有十一段一無遏三業二得堪傳法器三成就眾慧四曾道因緣五善知三科有及三界三世六善順七覺三脫七圓滿六度四無量心八得十智力九世主敬護十能為饒益十一於眾尊貴問此十一段所成功德在何住中答或有唯在佛果謂第一第三第八或唯因位謂第二第四第六或通因果謂五七九十一也就初段中十句初總餘別總云無過失者謂後不害等九種是也二別中一常心已非可害況與諸法平等之性而相害耶二三業印機而現則應無不宜故無可機毀三不為諸魔外道破壞四自力不退他力不能轉五任運成就故六念念昇進七自體離染八於他不染九常隨知轉第二段堪傳法器德十句中一生中國有佛法處二種族尊貴三崇心三寂之家四色貌端正五曾丈夫相諸根無缺六記憶不忘七決釋分明八性行仁和九處眾無畏智度云菩薩別有四種無畏一總持畏於法記持不懼忘失二智根無畏知根授法不懼差失三決疑無畏隨問能答不懼不堪四答難無畏有難皆通不懼屈滯十性自覺悟厭生死求涅槃亦常自劣察不造眾惡第三段十慧者一尊故二首故三上極故四尊極故五無分限故六非籌算得故七非心言到故八無正偶故非以校智故十非口能宣故十中後六非十大數中量無等數所以者何彼十大數有分限故今此皆是稱法性慧深難表詮約遮顯也第四段十種曾道因緣者一已有習種無倒聞重梁攝論云多聞熏習與阿梨識中解性和合一切聖人以此為因無性攝論云此聞習熏即是有流而是出廿心種子性故二有勝欲樂七求大菩提故三諸所順行皆善巧故四諸波羅蜜順違境界皆現前故此所即是有境能生心也五於前順違境皆成順道相心中現故六具信等根故七曾決釋明故八會相即性不止而止故九了性即相不觀而觀故勝天王云奢摩他者一心不亂毗婆舍那者如實見法又如涅槃深密等說廣如別章十審細籌量故此十皆能資道令增長故俱名力也第五段十善巧者唯義應云於蘊善巧餘九皆爾此中有十者一蘊二界三處四緣起餘六三界三世也善巧者謂於十法善知其相然不動實性謂一一釋名出體諸門分別即此體等如幻不實若自觀察若為他說皆如應是初由色等皆有重擔義積聚義同名為蘊世間苦說蘊名為藏物所聚故二由生長門義名之為處謂依諸根境生心心法故三由種族義別義持義故名為界種族者如一山中有多銅鐵等族說為多界此亦如是於一身中有十八類諸法種族名十八界別者六三互望各差別故持自種類不相雜故曾釋三科如別行章四由無明緣故行起行乃至有緣故生老死起如是十二皆從緣起五由有男女形因欲愛受身故名為欲望上地別故名界六由無男女形別因色愛受身名為色望上下地別故名界七由無根生色形然以無色界愛受四蘊身望下二地別故名界也八由謝往色心無有體用名過去九由當起色心未有體用名等來十由色心體用已起未滅名現在於此十句皆明了性相後鎔融自在名善巧也第六段順七覺三脫者先七覺後三脫前中一於可觀諸法自相無相而明記故名念二觀察二諦了不了法門名釋法三順善退惡名進四原法心悅名喜五身心調暢名猗六專注所緣名定七遠離沈掉而平等寂靜名捨然不同權小順故名為善順皆是佛果盡無生智四智十智因故俱名覺分諸門分別具如別章後三脫中一知一切法實相所謂畢竟空二知一切法無相故不受不著三知一切法空已不觀諸法若空不空若有若無三中後二依初立故總名為空若從方便名空等三昧若從方便及根本名空等解脫門門即三昧是趣入解脫之方便故解脫即是出離般涅槃即方便淨法界廣顯如章第七段六度四無量如別章說第八段十力者一善惡因果各相稱順名是處翻此名非處乃至知一切事理稱與不稱皆爾如智度二十四說二三世自業各有三世根或三性心中受三性業根釋曰理實業唯二性論約名種言感三性根故作是說或若原不苦原根各等隨自因緣受等三信等諸根有上中下或依乘不同或得果遲速或宜說廣略或宜以挫誘等四積習成性性即界種種不同或入道遲速或受化殊異或宜讚毀或起見各殊或貪等厚薄五於種種境勝解各異彼彼境中深忍樂欲故智度云知眾生種種解智力者欲名信喜好樂好五欲成唯識云信謂於實德能深忍樂欲乃至云忍謂勝解六於一切善道一切惡道一切聖道各知處七四禪八解脫雜愛見慢名染不雜名淨智度云禪攝一切色界解脫攝一切定乃至云禪定解脫即是三昧此力唯降魔次第三根力以已去七力同一降故八一切眾生謝往色心名宿住此智悉能記憶現前故九一切眾生未來隨業因緣所有生死悉明了知故十煩惱流住佛斷無餘聲聞但能知自流盡佛則不爾知自流盡亦知他盡如是十力各緣境時無能勝故名為力曾顯如別章第九段十王敬護文易可知第十段十種饒益中一為依或名舍長養善根故令免一切苦事故二救亦名護念脫煩惱故令得大安穩故三歸者令離怖畏故與作大依處故四趣者令至一切智五炬者令得曉悟實法故破一切眾生無明暗故六明者令得智光滅癡闇故示現如來自在故七照者令入光明地中故八導亦名導師引彼令入真實法故令得無上出離故九勝導亦名大導師此其無破大智慧故十普導者今見圓滿法界故第十一段於眾尊貴福知超絕德中十種一第一者亦名為首首有二種一勝首即後為勝是也謂光明功德故二大首即後為大是也謂猶出無二故第二大者有二種一上大即後第七為上也二無上大即後第八為無上也第三勝者即後第五妙也謂智自在勝故第四最勝者即後第六極妙也謂離一切煩惱自在最勝故第七為上者即後第九為無等也謂為一切之上無與等故第八為無上者即後第十為無等等也謂無與等者互齊等故曾釋如十地論第三卷首於前開後以後釋前此約在家菩薩以悲願力於人天中受攝根果自體功德勝也若依佛果治說如來功德海滿更無所少故稱第一此亦總句大者體包法界故勝者自利圓滿故最勝者利他究竟故妙者煩惱障盡故極妙者所知障盡故上者望下無及故無上者望上更無故無等者望下無倚故無等等者望倚皆是無等者故上來總明舉果徵因竟第二文殊答中二初歎問成益後佛子若諸下正答前中二初明歎問謂所問益廣故曰善哉後汝今下明成益於中二初明能成益心後哀愍下明所成益境及結問前中云饒益者利益也安隱者安樂也多所者顯廣也故佛論第七有五釋一令順善因名利益令得樂果名安樂二令離惡為利益令攝善為安樂三伏眾生苦名利益與眾生樂名安樂四令得此世益名利益今得他世樂名安樂五令得世間益名利益今得出世樂名安樂後明所益境中利樂滿字唯配可知後正益中二初總答後於諸下別顯前中亦二初答問云何得故云若諸菩薩善用其心此顯能順因也後答無過失三等業十一段德是所成果故云則獲一切勝妙功德此所成果皆從大智已相不求三有願成故名勝也皆從大悲為眾生願所成故名妙也亦可前妙後勝後別顯中二先標所成果德後佛子云何下顯能成因行前問中盡舉果後因令此答亦標果顯因爾前中十句一於諸佛法心無㝵者是前問中十慧德二住三世佛道者是前順七覺三脫德三隨眾生住等者應云眾生隨住恒不捨離是前十王教養德四如諸法相等者是前於蘊等十善巧德五斷一切惡者是前無過失等十種三業德六具足眾善者此有二種一是前六度四無量二是為一切眾生中第一等於眾尊重福智超絕德七當如普賢等者是前生處具足等十種堪傳法器德八一切行願具足等者是前因力等十種具道因緣德九於一切法自在等者是前十力德決釋無礙故十為眾生第二導師者是前於一切眾生中為依等十種饒益德下賢首品中說勝功德只是廣說此爾後顯能成因行中三初總徵成德之用心二佛子菩薩下別顯用心之行相三佛子若諸下總結用心及所成德初總徵者將欲別顯故二別顯用心行相中二先通斷簡諸願四句後總科別釋前中三初通顯三事六法二別明三事三以初後二事相對辨例初中諸願每有四句三事六法三事者謂初句是願所依事次句是願可為境後二句是願所為境得成益此中願是希望善欲為性若發語言則兼善色等為性若通心語加行則根及尋伺共為其性六法者謂初事中有二種一者內謂菩薩自身根識等二者外謂他身或依果或資具等經云菩薩等故在家等故次事亦二種一能發願者二所願眾生經云當願故眾生故後事亦二種一者自益由此諸願成前諸德故二者他益由此發願願眾生故此中願即是行成迴向故一一曾成所行清淨善業行故經云知家性空等故此後二句或有前句是因後句是果如云所行無逆成一切智等或有二具是因如云巧何師長習行善法等或有二俱佛果如云永離煩惱究竟寂滅等成俱通因果如云以法自娛了技非實等或有三四共成一句如云演說種種無乖諍法等第二別明三事中初願所依何二標願所為境三願所為境得利樂初願所依事中略據十二門料簡一三性二三業三十八界四依正五情非情六內外身七內外受八內外心九內外法十六度非六度十一三學非三學十二三寂非三寂初三性智如孝事父母等善性背恩無慚等是不善性菩薩在家等是無記性其中或有通二三性者如理思之二三業者謂上昇樓閣等是身業論義說法等是語業敬心觀佛等是意業其中或有通身語身心心語身語心等並准思釋三十八界者謂見昇高路等是初三界技樂集會等是二三界洗滌形穢等是三三界得義食等是四三界洗浴身體等是五三界敬心觀佛等是六三界餘類應知四依正者謂山林河池等是依也端坐結加等是正也入堂宇昇樓閣等亦依亦正修定修觀俱非依正或是正攝意業順故餘准可知自下情非情等諸門分別隨所應釋二標願所為境者此中二願該盡法界一切有情不同獲小小教不顯普使有情成佛願故大乘權教願他成佛五種性中一性半故三願所為境得利樂者由此菩薩依種種事願他成種種德故自獲如前所說功德今略舉十種願他成德自成勝德用相屬當謂願他不行一切不善之法及得堅固身心無屈等自得無過失等十種三業及斷一切惡等德二願他皆如普賢端正第一等自得生處具足等十種德及尚如普賢色像第一德三願他深入經藏智慧如海等自得十慧德及於諸佛法心無所礙德四願他具足成滿一切善法等自得因力等十種德及一劫行願皆具足德五願他具諸方便得最勝法等自得於蘊處界等十種善巧德及如諸法相悉善通達德六願他能行佛道向無餘法等自得七覺三脫德及於一切自法在德七願他勤脩諸行趣佛菩提等自得六度四無量德及具足眾善德八願他所作皆辨具諸佛法等自得十力德及於一切法自在德九願他善事於佛一切護養等自得十王護養德及隨眾生住恒不捨德十願他同佛出家救護一切等自得為眾生依等十饒益德及為眾生第二導師德喜相如是若細分別一一願成一切德一一德一切願所成以此菩薩心口起願時不住事不住願不住自不住他不住自行果不住他行果是名菩薩善用其心一切諸願同此一性是故一願即一切願一切諸願即是一願以如是因成如是果因既一多無㝵果亦多一鎔融第三以初後二事相對辨例且依三性相對有二十四例一以修善順對修善如自詣大小師願他巧事師長習行善法等二以順善對得果如自歸法願他深入經藏智慧如海等三以修善對修善得果如自受和上教願他入無生智到無依處等四以修善對惡行如乞食不得恭敬願他不行一切不善法等五以修善對離惡果如乞食見鉢空願他心清淨空無煩惱等六以修善對離惡行果如乞食得麤澁願他心無染著絕世貪愛等七以修善對修善離惡果如入里乞食願他入深法界心無障礙等八以修善對離惡行得善果如右繞塔願他所行無逆成一切智等九以離惡行對離惡行十以離惡行對離惡果十一以離惡行對離惡行惡果十二以離惡行對修善行十三以離惡行對善果十四以離惡行對修善得果十五以離惡行對離惡行得善果十六以離惡行對修善離惡果十七以無記行對修善十八以無記對善果十九以無記對修善得果二十以無記對離惡行二十一以無記對離惡果二十二以無記對離惡行惡果二十三以無記對修善離惡果二十四以無記對離惡行得善果上來且約自修善行等略此屬當未顯見聞他修善等發願若廣分別如迴向品等說其約離不善行及行無記法亦未辨見他略舉其例未配經文或有或無要者思惟恐繁不載經標一百四十一願者非菩薩弘願只有若干務示體或令准為之爾上來總明先通料簡諸願四句竟第二總科別釋者就此一百四十一願長科為十段一從初至在厄難明在家時願二捨居家下明出家受戒時願三若入堂宇下明坐起裴束時願四手執揚枝下明揩洗身口等時願五手執錫杖下明為乞食路行時願六若見眾會下明在路見何物時願七見嚴餝人下明路見人物時願八若見城郭下明入城乞食時願九若入水下明洗浴修行時願十若洗足下明眠覺時願就初段中有十一願初中家是拘繫迫迮之義類身如家故以自居家迫迮願他觀身性空離於逼迫二以己事親願他修事佛因得一切世主等守護供養果三以己愛見悲願他得無緣慈四以己得欲適悅願他除欲得安五聲色所成非實即是以法自誤六初地永害分別欲貪及十六心已各隨地害俱生現起七達偽即真八正法如樓令見普徹九於我若愛於所則著不能行施亦不稱理准梵本應釋云捨己物離於我所謂己及物是我我所俱不可得故云悉捨其愛字有作受者謬也十智眾聚緣成則捨聚見成佛智也十一以自在厄願他得解脫身意第二段中有十五願一願他捨三界惑家故云心解脫二以已入和合地願他說無諍一味法三以己近善友願他同己四以己求所求願達故願他心不退得達五以己出俗入道願他修善離苦六鬚髮姿飾是貪愛今剃落如斷惑證寂七自著不正色衣意為不生染著故願他行無染行得無果八以己凡身自為出家願他同佛為眾生故出家九以己歸佛為弟子願他為佛真子發大心繼佛種梵本云勃陀防捨寫阿弩彼猘駄耶防音浮望反捨音作啇反寫音作相我反猘音昌曳反耶音作余何反勃陀云覺謂能覺者舊云佛略也防捨寫云種也阿弩不也彼猘駄耶者斷也譯家翻不斷為紹隆爾十以己歸教理法願他得深廣智證教所詮十一以己歸和合眾願他以法御眾便無乖礙十二准優婆塞戒經云受菩薩戒先應遍受五戒十戒二百五十戒若尼則五戒六事五百戒此云受學戒者是其三戒以己心作願他亦然善學作持也不作止持也十三由前受三戒時有闍梨和上故次明此以己受二軌範師教願他亦具二相似益十四以己依於和上生智故翻此願他得無依無生智和上此云近讀亦曰親教具釋如音義中十五以己具前諸戒為方便今後受菩薩最勝戒是教願他亦得二相似益第三段有十三願一以己入堂止住願他安住大寂室三昧心無教動二以己將修止觀先敷座故願他善行華開真實果相現前三以己正身坐願他得無著正體智坐佛座四以己降魔願他慈善根圓不為魔動五以己修止願他永心息煩惱六以己修觀願他得稱實見法七願他於有為法捨堅固見八願他離住縛不為住動九以己移步願他移出生死十下衣蓋形醜有慚愧故願他以慚等善根為衣遮諸不善十一以己結束衣願他修忍進防護諸善不令散十二以己著上衣願他波羅蜜善根圓滿十三以己著三衣中第一衣願他預覺位第四段有七願一楊枝為治口齒之物願他得治惑永淨之法二嚼楊枝則口淨齒堅以嚼食願他調惑令心淨三便利為穢不可不棄煩惱為穢願他除滅四水為洗穢之用事說須就法為除妄之要故速趣求五以己除穢願他惑永柔淨六以己洗手願他得信手受持佛七以淨面門願他淨戒之法門第五段有十二願一執錫入摶食會得充虗實腹願他為諸施大會示眾實道二持品受供願他得佛果諸器為應供尊三發步趣向人所行路前有所依願他履佛因行證無依法界四以己在道願他履信等五位是佛因路無餘法者梵本云煩惱無餘五行道路願他心遊出離真如六七八九並可知十願他離六塵坌十一悲如水柔而濟故朽潤心十二險道有二種一路險賊處二地狹山阻此二行險惡行住不正法以己見險依果願他住平等理不作罪難險因梵本云遠離眾惡安住諸法界第六段有十九願一見眾人多人名眾苦和合義是故見眾即是見甚深法眾是緣成成即無成故願他說如此法也二見大柱有荷重之能翻此願他離我能之使忿恨永息梵云薩擔婆去聲輕呼此云樹也薩擔婆入聲重呼此云柱也由茲二物呼召聲濫古今譯異三叢林有二義一由兩物呼聲相近故從近為願偈呼叢林梵云摩曩呼敬禮梵云磨擦娜二由叢林人見皆瞻仰願他具眾梵云摩曩呼數禮梵云縻捺娜二由叢林人見皆瞻仰願他具眾德如林見者悉瞻禮也四五可知六樹葉密盛暑月蔭人得清涼以己所見願他禪定樂解脫樂七以己見華開願他得現通說法等方便開曉眾生八九可知然九中道字梵本云菩提可翻為果十見大河預法流者證具分法性水預聖行流真至果智所證性海或境智一如冥同果智豈不權小所證法流展轉方入果海若非大河便同小水不能直入大海展轉諸流皆亦入海故十一波澤但是當處福水不同河海等諸流和雜故十二池沼者得近穿鑿引水充盈此可同於巧思穿鑿淺深尋伺使辨說圓滿十三見波更相尋取水究竟此可同於得無斷辨具演諸法十四涌泉不待方便翻顯方便十五十六十七十八十九普可解然清流可以洗身垢愛欲法如水願他以善欲法水遣心惑垢林名無憂西域號為河叔迦此方雖無類困可園苑內有華果可知第七段有二十四願一二三四五可知六願獲根本智滅眾苦根本智有二種一正體無分別智望加行後得名為根本二本覺智與始覺為本故名根本獲者得也得正體根本智斷惑滅苦雖通見脩諸地皆有然二處最顯謂見道及無間道雖有流善法行苦所隨解脫道同一剎那不足為別約見道說獲根本智滅眾苦者眾苦不過三八由得此智斷惡道業無明故三塗苦滅生老病苦亦隨喪滅由斷此惑不造十不善業故無怨憎來會由斷分別欲貪故無求不得及愛別離從此唯有怨及取蘊至無間道得金剛心根本智斷彼二苦雖有流善法此時猶在己被勝智照同法性於解脫道不得釋滅三苦八苦相配准知得本覺根本智斷滅苦者此唯解脫道證理之時始本冥合乃名獲得本覺根本從此永無死及蘊雖斷惑理證立二道名然同一剎那獲智亦爾是故無間頓斷見脩二障種時即是解脫道時斷也七願他入真實慧永無病惱者此有二種一約入真見道之慧斷病之苦惱及煩惱病謂一切惡趣諸煩惱品所有麤重是分別起亦為身病遠因於歡喜地真見道中一剎那斷頓證三界四諦真如身病及惑永不後有二約金剛心慧頓斷一切諸煩惱病及習氣隨眠證極圓滿真實勝義諸惑永亡故八大乖違故身病願他知乖違體空寂故得離九願他信佛菩薩端正從忍或信是深忍欲樂此忍是法名為真實端正之因也十願他不樂不忍十一准梵本願他常念諸佛菩薩恩德十二准梵本願於有怨處不加其報十三沙門此云止息今願他於止息不調不靜中得第一謂大般涅槃十四十五十六並可知十七見他善甲願他行被甲精進准梵本中亦有加行不怯弱二種故下句趣字梵本是勇求之言無師者梵本云自然即是佛之異稱謂願眾生勇猛求佛果如著甲入陣而求功賞十八鎧杖不祥之器以己不見佛他不為十九可解二十正命為正業以活命故邪業活命有五種一誰現奇特二自說功德三占相吉凶四高聲現威令他畏敬五為他說法行此五事皆為利養墮於邪命今此第三句通願他離第四句但攝初四二十一二十二二十三二十四並可知然長者以年耆諸事長於人故能明斷也第八段有二十三願一城郭防難牢固身命是故願他得非四相所遷之身非勝智令屈之心二王之所都多有勝福慧人聚集喜樂故願他與具勝功德者共會恒得法樂或能巧集諸善根身心適悅三見處林宴坐幽捿可讚願他成佛居閑寂法林人天歎仰四五可知六未入其家則諸家差別入一家已則唯一無多故願他入一佛乘會三無別與三世佛所說無異七八九十十一十二並可知十三見有依自法力崇賢人重善法耻不造惡者即願眾生還爾藏隱守護眼等諸根不令放逸如藏護猫不令殺鼠亦如以衣藏護男女形醜十四以己見無慚不仁者願他行無緣慈以救物十五自於義食希望得遂願願他於佛果希望滿遂更無所欲十六以己在間愛味故翻此願他得無生等禪悅之味十七十八十九二十二十二二十三並可知然諸願他句初三通因果後四唯佛果入佛者於大菩提智證究竟故梵本云遍了佛智第九段有十四願一以水性平等而能潛入故願他通達佛智所知之境謂知過未事同現在梵本入一切智智二以己洗身願他身光心光身淨心淨三准梵本初句云殟瑟南此云凡所受熱今云盛暑炎毒者乃唯互熱時下滿句應云離煩惱熱永盡無餘四中第三句菩提第四句涅槃五順文誦及持在心故願他順佛說得總持六七八九十並可知十一以己右繞願他所行無逆者梵云鐸乞尼此翻為右右是順義故離世間品云攝右足不違一切佛所說故普曜第二云菩薩便從兜術降靈趣於右脇菩薩所以處於右者所行無逆故十二再三鄭重故願他勤求十三十四可知第十段有三願一二可知三云周顧十方者謂願他成一切智示八相生時周顧十方攝我獨尊顯無與等上來初通料簡諸願四句後總科別釋總明第二別顯用心行相竟第三總結用心能成勝德中二初結前用心可知後則獲下彰其勝能於中二初彰感果勝則前問中一百一十句及答中十句是也後一切世間下彰歎勝於中有二初世間眾不能動略舉七類後及以下出世眾不能動略標二類言不動者有其二義一正修願時彼世出世眾歎成壞而不能所以者何心專注故不住相故以心轉事非事轉心故二此願善根感果決定如不動業不動果非餘善不善等諸猛利業能引故上來有三一總徵成德之用心二別顯用心之行相三總結用心之勝能總明第二能成因行竟上來有二一先標所成果德後顯能成因行總明別顯了上來有二初總答後別顯總明正答了上來二初難問後正答總明文殊答了上來二先智首問後文殊答總明第四釋文了上來四一釋名二來意三宗趣四釋文總明淨行品了賢首品第十二將釋此品四門同前初釋名者賢善也首勝也謂性善德勝故曰賢首此則賢之首故有財釋也賢首菩薩說此品故名賢首品此則賢首之品亦依主釋也二來意者前品明信中願行今明信中德業故次來也三宗趣者以信德用為宗為後成位為趣四釋文者夫科此品總為四分一經家敘述文殊前說分二我今已為下文殊勸說分三爾時賢首菩薩下依勸演暢分四時賢下顯實證成分就初結前已說謂別品中明由善用心使六根三業於所行境悉得清淨無濁無亂後欲顯下起後宣陳謂欲令賢首說信滿菩提心功德大用故說偈也第二勸說分中一頌分二謂前半結前品已說所行清淨准亦應云說行及德但偈最略故後半正勸說前品修行所成勝德之用第三依勸演暢中二初經家述其說人可知後善哉下正顯偈詞於中總即三百五十七頌半曲科為七分一歎廣說略二菩薩發意下略辨行相三信為道元下略示勝能四若常信奉下所具行位五或有剎土下無方大用六一切如來下喻況玄旨七第一智慧下校量勸持就初分中四頌分二初一頌總標德廣難量於中少說初句歎問歎聽次一句明德廣次一句少說末句喻顯後三煩別辨難量難說於中初兩頌重顯前德廣次半頌重顯前小說後半頌別顯前喻就初兩頌中二初一頌半明所量德廣故顯量德難量後半頌明能量人大故顯德難量就前所量德廣中初一頌明初心少時少行德已難量後半頌明多時具多行位比況前少以顯難量後舉能量人大中謂一切凡夫二乘及諸菩薩於此難量不足為廣一佛二佛乃至多佛不能稱量亦或非廣今舉十方一切如來共說不盡此則因當難量之極也二次半頌明說少分中上句明初發心之廣德五句顯彼難量故說少分三末後半頌明廣前喻況文顯可知問此中發心與初住及發心品說何別答總是其一但所望異謂此中望前是住終發心即起信論三種發心中名信成就發心也初住發心即全是此後名為初發心住亦是約位顯其心故發心品說約心行相寬廣舉喻況德問十信之初豈無發心耶答雖有發心非正發也所以者何如輕毛故仁王經等名信根故問既是初何德具後一切行位答法性行故廣如懸談第七門說問據法性相収卷舒可爾約人修行豈十千劫即得然耶答人無別體攬法以成法既鎔融故人亦無礙十千之與一念一念之與多劫於此亦無定限可得時無別體依色心立色心既從性而無礙故念聲亦隨理而融通如下善財及兜率天子等所行所得並斯人異第二略辨行相分中五頌分二初半頌總標餘文別顯標中三一發菩提心二發心因三發心緣菩提者佛果大智所證法界也發意求者於彼法界創起必定當得心故因緣有多種或云自性住為因習所成為緣或云二性為因善友及見聞等種種境界為緣今此不爾如後當知若廣顯因緣如菩提心章後別顯者此中因緣各有多種初半頌淨信為因三寶為緣次五句四字大悲大智共為因緣於中悲因智緣總八法五反顯三順釋亦可前五智緣後三悲因五謂不求五欲王位則利自安安名稱三謂滅苦利樂嚴土嚴土為安生故悲門攝次三字半頌智為因佛法法界為緣敬養持法求證皆智故次一頌信知為因三寶為緣前據唯信次約唯知後據信知次一頌信為因佛法菩薩行法界為緣上來因緣深重尅實因有三種謂信悲智也緣有十三謂三寶八法法界菩薩行於中異凡小等如理應思第三略示勝能分中七頌分三初兩句總標次五頌半別釋後一頌總結初中有兩門四義道謂菩薩萬行元者首也由信為首萬行隨起梵本云布曾凡蒲含伽摩此云導首俗云行顯是也功德母長養一切諸善法者准梵本母有三義一能生二守護三長養故梵經云母所生者守護長養一切功德此信於功德為母亦然次別釋中有二十一種勝能謂初半頌有三義上句兩義一能斷疑二度愛流梵本愛字亦是病義謂喻貪惑智下句一義謂能示涅槃對二乘涅槃故云無上道道即果也故梵本云憩忙布囉寫此云安隱城謂大涅槃城即果也從此異已下二十句每一句為一勝能初明信體無偈今心王淨二信於諦寶故滅慢於眾生及三寶三七聖財中信為其首由信修善生德故後名藏即十藏中信藏是也四修諸正行由信受行五由信於施福而能放六由信佛法不思議故方能趣入智度云佛法大海信為能入智慧能度故七由信知波羅蜜增長彼所修德八萬行成就由信為根故到佛地九於五根中信為其首解因順習得明利故十五力之中信亦為首餘如根說十一於所對治信妄倒無體於能治道信與所證體非即離如是斷惑如是證理此即皆由信為本也十二佛為究竟歸故專向由信十三信唯識理故不著境界由信十四信生死為險難無安隱故離難由信十五信佛十力不受四誑故超天魔路於見修道各隨對治故超煩惱魔於等覺位捨有流善法及變易根故無死蘊魔路者是彼行處故十六解脫即是出離涅槃道是其因由信生慧慧是了由之體故云示現十七信佛無礙境界之德成金剛種十八由信佛菩提修菩提行外增上果由內行成內行既由信能生長故依果亦同內行生長十九由信藏喜常能觀察理事理事二無礙相故得佛智漸漸增益二十有二義一者一切諸佛皆由信為根本成佛出現二者由所應機信根熟故佛方出現三總結中二初半頌法說謂資粮等五位行中此信行終即住初心資粮位攝故於行位次第之中信在最初為後之本本故勝也若無此初後皆不有故云最也十信已上於無礙境界信不為難在具縛地即能信向故難得也後半頌喻況世間中者言總意別也雖言世間意在人間摩尼難得唯輪王現方有此寶故喻行難得准梵本中此頌更有一句云如鷄菩梨師子王亦如摩尼世難得釋曰鷄菩梨者謂但有師子頂上毛卷如旋華華形者則已難得況後是王者倍更希有也第四所具行位分中五十頌半分三初明所具行二若為諸佛下明所具位三菩薩勤修下結歎功德初中八頌半分二先四頌半明德三寶以成諸行後四頌明依信展轉以成諸行前中初二頌信佛故成學戒行於中前一通辨學戒能具一切德後一別顯戒與學處成德各各異然學處之名有二種一通二別通謂戒定慧三俱得攝學別即唯局持戒方便謂先習學解持犯相名為修學依解起行名為持戒故此以地喻學處以本顯持戒解行同異猶墨路鑛道爾次一頌明信佛故成供養行次一頌信法故成求法無厭行次半頌明信僧故成不退行後依信展轉成行中四頌一成根力堅明行二遠惡近善行三廣大善因行四勝解依護行皆具二種故成八行可知第二明所具位中三十九頌分四初三頌明十住位謂發心是初住名也對修等是治地修行二住生如來家是生貴住善巧方便是方便具足住信樂心淨是正心住增上是不退住最勝心是後三住准釋可知二若得增上下二頌半明十行位波羅蜜是十行總名摩訶衍是異二乘行則初二行収法供養是順理行則次二行攝念佛心不動及常見佛准一是定慧行則屬後六行位攝釋相可知三若常觀見下三頌明十迴向位謂佛體常住及法永不滅是如相及法界無量等辨才演法等是救護眾生離眾生相等前五迴向慈愍等是等心隨順眾生迴向堅固大悲是第六隨順堅固善根迴向以普悲廣施故也四若得堅固下三十頌半明十地位初半頌是初地謂深法是所證真如愛樂是極喜異名二次半頌是離垢地以離犯戒有為過故三次一頌離慢等是三四兩地以三地中於禪不著故無慢又以求法不懈故亦名離慢第四地得出世間道品故云無放逸然不捨攝生故云兼利四次一頌明五地位謂雙觀真俗故雖得出世處生死而無疲厭既於真俗互違之境難令能令餘地不過故云勇徤無能勝便釋地名又莊嚴論第十三云菩薩化眾生有二難一勤化心無惱二生不從化心無惱此菩薩能退二難於難得勝故名也五次二頌明第六地無住悲智現前謂神通攝物故知十二緣生眾生行故六次一頌半明第七地謂初一明有中殊勝行後半明空中方便智准釋可知七若具最勝下三頌明第八地略辨五義一道勝謂無功用道故云勇猛無上二力勝謂智力摧魔三蘊勝謂超四魔境佛地論第一云煩惱魔者一百二十八煩惱并隨煩惱蘊魔者謂五取蘊死魔者謂有流內法諸無常相天魔者謂欲界第六自在天子如是四種皆能損害諸善法故名說為魔既超天魔既不為此四魔所動故云不退也四行勝謂得無生忍五因勝謂此位正當大授記處故次以有兩頌明第九地謂此地菩薩為大法師略有四義一諸佛加持名佛現前二解了諸佛深密法三為佛憶念增長慧力四以德嚴身為眾說法九若以佛德下十九頌明第十地位分五初八頌明三業殊勝德於中初三頌明身相殊勝次二頌半明身業大用次一頌半明語業益生次一頌意業殊勝謂智導三業故二若以智慧下四頌明三業廣大即三輪攝化初一頌身業次一頌語業次二頌意利可知三若智煩惱下二頌明得結法位四若得十地下三頌明三昧分文盡分受位分並可知五若蒙下二頌明大用難剛也第三結歎其德中三頌分三初二頌法說次三句喻顯後一句法合初中三初一頌結前具諸行次二句出因後二句結前具諸位初具行中初二句明利他悲願悉已成就故云無不果菩薩行海悲願為首故偏舉爾後二句顯利他成就之行相謂此菩薩但成就不空三業即是度生悲願果遂故云見身聞名聞說法供養等無不獲益次二句出因者釋此菩薩具一切行位所由也上句標人謂具諸行位故名大士等於此行位相即在等無礙自在名威神力下句釋義謂彼大士所以具諸行位無礙自在者以得法性緣起之智根名法眼照即理之行位故常也無有一行一位不具一切故全無缺減也此兩句准義令迴文於後後二句結前具諸位上句標位十善妙行者謂舉十地行行位等前諸行之位諸道者謂資粮加行等下句難勝謂此諸位出諸行寶故次喻顯中初句喻大士次句喻威神後句喻常全二義後一句法合可知第五無方大用分中二百三頌分十並顯三昧業用一海印三昧門二嚴淨下華嚴三昧門三一微塵下帝網三昧門四若歎下現供三昧門五菩薩位在下現法三昧門六有妙三昧下攝生三昧門七菩薩種種下同世三昧門八有勝三昧下毛光三昧門九有勝三昧能出下主伴三昧門十有勝三昧名方網下寂用三昧門此之十門初門依體起用末後明用不異體中門並顯妙用自在初中有六頌分二前五正明業用後一結用所依前中初一頌明現佛說法二次一明體用自在於中四義一無思念分別二無動佛功用三一念遍十方四方便多門故攝無量不益名化群生日喻四義准法應知三次一應現八相謂前云無量方便者略示八相也四次一現三乘攝化五次一現雜相應機後一結用歸本於中初二句總結所現諸類廣多不可具說後二句結歸其定海印者從喻名也如修羅四兵列在空中於大海內印現其像大集經第十四云如閻浮提一切眾生身及餘外色如是等色海中皆有印像以是故名大海為印菩薩亦爾得大海印三昧故分明見一切眾生心行於一切法門曾得慧明是為菩薩得海印三昧見一切眾生心行所趣釋曰彼經但說定中心現眾生心行宜化不用今此略舉十種謂一現佛二說法三現通四現舍利五成小果六現多劫七眾生形貌八現心樂九行業十音聲第二華嚴三昧中二頌半分二初二明業用後半結歸所依前中略辨行用有七種一嚴土行二供佛行三光明行四度生行五智慧行六說法行七十度行後半中上句一切自在者總結多門所成之行無礙成就下句結歸本者萬行如華以嚴十身故結行歸之第三帝網三昧中四頌分二初三頌半明定業用後半頌明定用所因前中二初三句明定心境一多無礙後兩頌三句明定境一現一切前中二初二句明一即一切謂以三昧等力入一塵定即成一切塵定後一句明一切即一謂前一即一切時不壞不一故云亦不增後明定境一塵現多剎中二初明於一塵現多剎後半頌類通一切塵中現剎前中二初七句法說後二句喻顯前中二初一句總標現剎後六句明所現剎差別之狀略顯十種五對一佛有無二染淨三大小四成壞五正傍後喻顯中緣成似有實則非有故如焰也諸塵互現各各一切復不雜亂布列成位曾無障礙故如帝網也後類通中如定一塵現剎既爾餘一切亦爾後所因中三初三昧力者此得標中二解脫力者謂不思解脫力現此業用如下文不思議法品說於一塵中現三世佛剎等三神通力者謂約通自在並如下說第四現供三昧中一十八頌分三初一頌通標次十六頌供一切標意入別顯後一頌通結初中二前半頌通定後半頌明遍供一切皆供依可解次別顯者欲彰定力殊勝但就一手供一佛即明爾所多供於中初五明手內出供前三色後二聲後十一頌明手光現供後通結中四一結略顯廣上來是略廣有難思二結廣供方供一佛三供一切佛亦爾四結用所用可知第五現法三昧中八頌分四初一頌總標多門二次五頌別顯多門略有二十種法門攝化眾生三次一頌顯多所用四後一頌結用難測第六攝生三昧者四攝攝生也於中十六頌分二初一頌總標名用後十五頌別顯業用就別顯中分四初四頌明布施攝於中初二是令身安樂攝後二是令悅自心喜攝二次二頌明愛結攝大品云為眾生說六波羅蜜是愛語攝故種種梵音者謂八種梵音或六十種義如別章三次四頌明同事攝於中初二頌正顯得事作親識八法共同後二頌明攝義謂既與有緣故以出家攝彼令明解說四次五頌明利行攝於中初一頌總辨謂十行是佛十度也大人法佛所行諸佛等謂菩薩二乘或世五通等次二頌示過患攝於中前頌顯為長壽眾生煩惱輕而著樂者示四相令厭後頌顯為煩惱重者現四相令厭後二頌示佛功德令樂求於中前頌略舉三攝生後頌總以三輪通結攝生第七得世三昧中十八頌分二初一頌總標示後十七頌別顯大用於中分三初六明身得世間利眾生一備眾藝次一為主為救次一外器資具次一亦巧利物次二得仙苦行二次六頌明身得外道轉彼邪徒初五別辨後一總結三後五頌明語業大用於中初一總辨次三別顯於中初云或邊呪語者梵本云達邏鼻荼曼達羅鉢底言達羅鼻荼者是南印度中邊國名也此云銷融曼達邏者呪也鉢底者句也謂其國人稟性純質凡所出言皆成神呪若隣國侵害不用兵杖但以言破之彼即喪滅故曰銷融呪句國也或云唯童男童女方得言成呪句餘不得也次頌中云善破於他者謂以因修比量真能破破彼無因論等今信因果非外所動者謂以真能立立因果此量不為他動故末頌結意謂一心說法名為三昧亦是依定起用爾第八毛光三昧中九十頌分三初八十一頌顯光業用二如其本行下七頌釋外疑三若有下一頌明聞光益初辨光業中有八十一頌分二初八十頌別明一毛光用後一頌類通一切毛孔光用前中二初七十九頌明四十五門光用後一頌結略影廣及光所依就前四十五門中一一各有四義一標光二名辨光用三出光因四結光果類例相從科為十三段一初一光救度二有一光明現佛法僧行塔形像等有三一光照用二三中出因並可知四濟度光下二光明救生用兩光因中各有二義一事法因二法因可知五歡喜光下二光是愛戀三寶以益生初中因內一造像令見者喜二歎佛令聞者喜後光明用中一令樂三寶為因當在佛無㝵忍為果行六福聚光下四明福智成就一施無福二具四無多解智說法正解喜法善說法義無虧減者梵本云種種宣揚法句義無㝵慧令照見理自在即是無㝵也四得總持即由於法持者敬護故七能捨光下七光辨六度或光中用及因各有二義一持淨戒二發道心慧光中二初法慧令悟法二佛慧令用見佛餘可知八無畏光下二光慰眾生用一怖者施安二疾者令愈九見佛光下五光顯見佛樂法妙音說法聞三學勝法用一令見佛西域道俗有親識或餘眾生臨修之者即延尊像安置其前隨取一物或繒或線懸佛手指令病者手執一頭一心專注作隨佛真起如起如是為之豈直利益亡者亦自當得此見佛光矣二令樂正法三令聞佛音四施甘露法令捨施逸脩功德五令聞三學最勝法十寶嚴光下八光辨令得寶藏供佛等用一無盡寶藏二香嚴益物三寶幢等多種名雜四令地平嚴塔等五興香雲雨香水灑塔等六施嚴身具七施珍饌八無盡財施三寶及貧乏十一眼淨光下六光顯六根清淨用各一頌可知十二色淨光下六光辨六塵用於法淨光中初一頌標名及用後一頌因結成餘並可知上來別明四十五行光用竟自下一頌明結略顯廣及光所依謂前所說廣中少許具說則有無量恒沙其中一一業用各別並是菩薩一毛孔出上來明一毛孔光用訖自下一頌類通一切毛光用謂一毛孔光用既有無量恒沙數等餘一切毛孔光用一一皆爾上來總明第二光業用竟第三釋外疑者謂恐外人聞上所說光用中云此光覺悟一切眾生而生疑云此菩薩悲一放光無時處之限何故現今眾生不得見耶為斷此疑故有斯文文中七頌分二初總釋謂初句牒前隨光因得光果次二句正釋疑謂隨彼彼眾生宿緣同行等今放光彼彼如是見後一句結放光智在用後六頌別顯於中二頌法說後四頌喻況并合前中有七種眾生得遇此光一發得業二愛彼行三隨喜彼此上二三或通遙聞或令為一四見所作五自修多種施行六修供佛行七迴向大菩提行後喻況并合二初二頌明生盲不見日喻於中初頌喻顯後頌法合喻後二句釋不見疑凡夫是未修者次二雖修其道邪劣謂外道邪信二乘解劣後二頌明香塗寶宮寶乘喻亦初頌法後令配釋可知第四聞光益中有三一生淨信二起勝解三不疑慮以此因速成佛果故云功德幢也第九主伴三昧中六頌分二初一頌標門顯意後五明業用用中二初四頌舉一方業用後一頌類通餘方就前一方中初一頌明主定次二頌明伴相於中一標一釋後一頌主伴合舉故以星月為喻也第十寂用三昧中三十四頌半分三初一頌標名總辨次或東方下正顯業用後是名下一頌總結初中謂於一切方出入交絡猶如羅網故名方網也二業用中三十三頌半分六初二頌明於十方處交絡入出以於器世網得自在故二有五頌明於十方佛所入出三昧無礙自在於中前四別辨東西二方後一總結十方此辨智正覺世間自在然菩薩於三世間自在有二義一以自身作三世間二菩薩於三世間處示現自在上下文中通有此義不可局配隨文當說如眼根下不必唯是眾生世間亦不唯是菩薩身作毛孔微塵毛端顯等入出定也今此文中前二頌明東入西出寂用得時後二頌明西入東出寂用同准義翻前非直正東入時即西出正西入時即東出亦乃正東入時即東出西出時即西入復西入東出亦爾何以故結文云三昧自在故何故三昧得此自在從如是因感故謂觀察理事不即不離不即故理隨事而不壞事各各差別不離故事隨理而融通一即一切一切即一是故入出定心雖異而即一一即異也一切世間一切佛菩薩一切身雖殊而即一一即殊也後無礙行得無礙果法爾如是准後結頌十方世界互望同時各具入出菩薩一身遍一切佛所此亦隱顯義也三於眼根等下十二頌約根境相對以明定用一一對中各有八義四對一根境無㝵謂觀根入定令從根出乃從境出故二入出無礙准前文正入出此此時入故三境根無礙謂於塵入定令從塵出乃從根出故四理事無㝵謂眼是事正照境時體無生用無起以性本寂滅無有能作者故問境豈不然何故不說答理實亦然略故不說又境從根起根既如是塵豈有異故不得說四於童子下有六頌半明於他身得自在此有二義一自身相廣化速疾轉變一一化身相應化或以自作他或以他作自如下八地中說十身根作等故此云於彼身入此身出等而彼眾生不覺不不知唯應度者乃得見也五有二頌半明微細自在謂毛孔約正根體事中極細也毛端約虗空界體事極細也微塵約色體事可見有對中極細也此通二義一於彼微細境入出一多無礙二身在彼境入出一多無礙六有四頌半明於金剛地等中周遍入出謂菩薩以定業用其身普遍略顯五位一普遍一切十方剎海二遍彼剎內地樹等物三遍彼一切塵毛等中四頓遍非前後五圓遍非分限也三總結中一頌二意一近結此第十定用無盡二通結前十門定用且是略說若廣分別十方佛多劫說亦不盡上來第五無方大用竟第六喻況玄旨分名舉勝顯劣分於中七十九頌分三初二頌總標顯意二聲聞心下別辨三彼菩提下一頌結說顯德初中意者為上來所說自在業用乃似因圓論二頌前頌通舉一切諸難思力後頌彰喻不全似法前中四種一眾生異業感果互望難思謂有於他見小處而見大他見大處而見小時節延促色淨穢奴醜聲諠靜麤耎知或香臰味甘苦觸澁滑等皆互不同乃至一切又由業力六趣循環大身小身長命短命乃至一切改易迅速實難思也二龍變化力難思如下說海龍王不出自宮於六欲天等興雲雷電降雨各各差別等三佛自在力難思如下不思議品等說四菩薩神力難思如下離世間品等說然梵經別本中無此菩提力用而有神定力用何故不同者以禪定即是菩提所入故也後頌顯非喻能喻中以三昧業用從法性所起鎔融因感法性既無世間法喻所感定用當知亦然喻既不合似法聞者仍解所喻自非智慧聽達焉能致之故斯稱美二別辨中有二十大喻初有三頌半明聲聞現通喻喻菩薩自在益生德先舉劣後顯勝下並准此東方入正定准之二譬如日月下二頌明日月遊空現影喻喻菩薩普應群機德三如淨水中下二頌明水現四兵喻喻菩薩海印現像德四海中有神下二頌明善音巧辨喻喻菩薩辨才陀羅尼稱根令喜德五有一婦人下二頌明蜜授辨才喻喻菩薩授法益生德六譬如幻師下二頌明幻師巧術喻喻菩薩不思解脫德七天阿修羅共戰下二頌明修羅隱顯喻喻菩薩勝通自在德八釋提桓因下五頌明象王隨變喻喻菩薩三三昧自在德九如阿修羅下二頌明修羅大身喻喻菩薩現法界身其德如上文主伴三昧用中說准梵本晉朝謂為其首廣大如須彌者悞今課為首與須彌齊等者正也十天阿修羅下四頌明帝釋降怨喻喻菩薩降伏魔怨德十一忉利天下六頌明天皷說法喻喻菩薩無思現身說法德初頌中第二句梵本云從天業根而出生十二天阿修羅共鬪下三頌明天皷安慰喻喻菩薩慈音除惱德十三帝釋並應下三頌明天王普應喻喻菩薩圓身悅眾德十四他化自在下二頌明魔王繫縛遇夫喻喻菩薩十力攝生同行德十五三千世界下二頌梵王殊顯喻喻菩薩解脫自在德十六摩醯首羅下二頌明摩醯數滴喻喻菩薩一念普知眾心德十七眾生業根下三頌明風輪持散喻喻菩薩大願宿成德十八男子下二頌明眾聲悅意喻喻菩薩妙辨悅機德十九海有希奇下二頌明大海包含喻喻菩薩禪慧普修德二十大海龍王下二十四頌半明龍王自在喻喻菩薩普雨法界德於中分三初半總標龍遊自在次二十二頌別明自在之相後二頌舉劣顯勝初標可知就別相中分四初四頌半辨現其色異經本云閻浮提中青寶色者再勘梵本云南閻浮提其如青山色次四頌明現電光殊經本云閻浮提中豪青色者今勘梵本云天帝釋火焰摩尼色釋曰此是珠名也第三頌第二句中云寶藏色梵本云室利揭波此云勝藏勝藏即是異色寶義此句應云勝寶色龍宮現次三頌半明現雷聲別後十頌明所雨不同初頌第四句云曼陀羅華及澤香者澤香即是香油也故梵本云阿奴里婆此云塗香此句中亦云雨鬘故總應云曼陀及鬘升塗香釋多羅名如下第三十三中音義釋文第六頌第二句有本云一一雨滴如車輪者謬也梵本云裒訖叉此云車軸也此上所現雲電雷雨於一十五處各各差別皆是娑竭羅龍身不移動心無分別而能如是種種應現此喻菩薩以無功用三業隨應而現後結說顯德中三頌分二謂前二頌總結龍現自在後一頌結喻非喻就中前半結非喻後半結所說略說其末句梵本云略說彼之自在力第七校量勸持分中九頌分二初一頌約六慧結前所說初第一慧者慧中之首故二廣大者照無礙法界故三真實者無虗妄故四無邊者照無限量故五勝者慧中尊故六殊勝者尊慧中極此亦可配纓絡經六慧即三賢十地等覺妙覺也如是法門今已說者總結前說故後八頌明信受難得中分二初一總歎法前信器少難得可知後七別顯難信難得於中二初約乘校量器少故信者難得後有以下約事校量法深故難信前中四一初頌前半正明人天乘器信此者不可得故言甚也後半釋疑謂有疑云我亦信受此法豈非世四凡夫故此釋云今所信者以現修淨福及由發曾聞熏力故二次一頌明求三乘從聲聞至大乘展轉漸少三次半煩明信一乘信更微少不可有也四後半頌舉劣說勝謂但信者尚陪難況有能如法持誦宣說實解修行者耶後舉事校量中二初二頌約身力校量顯法深難信後二約福力校量顯法深難信並易可知上來七分不同明第三大段依勸演暢分了第四顯實證成分中三初明現瑞現實證成謂動地故二魔宮下明利益顯實證成謂降魔救苦故三十方下明佛印許顯實證成謂十方佛三業印故上來四分不同賢首品竟
