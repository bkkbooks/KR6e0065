body:
  text: 第六隨順堅固一切善根回向中二先長行後偈頌前中二先明位行後菩薩摩訶薩住此下明位果前中三初牒名徵起二佛子此菩薩摩訶薩或為下依徵廣釋三佛子是為下依釋結名初中名者前本分內列名與此不同前名入一切平等善根此云隨順堅固一切善根晉本云隨順一切堅固善根按隨順是前入義堅固是前平等義謂所修事行皆順入堅固平等法性故若依此釋前本分中名及晉譯名皆須更回向此安置以一切之言屬善根故若取義使亦應云回向一切善根隨順堅固釋名謂隨順入是能隨順入也堅固平等善根是所隨順入也即所修事行莫不順入平等堅固法性此則順入堅等之善根順入堅等善根之回向皆依主釋也本業經釋云習行相善無漏善而不二故名隨順平等一切善根回向第三依徵廣釋中二先明行所依身後具足下明依身起行前中二先辨類後威德下讚德前中云或為帝王等者謂菩薩行檀之身不唯一種隨機所宜故置或言問若爾何不舉餘答由三義故先舉帝王一此身具有堪施物故二舉勝可以策劣故三舉一類餘故後讚德中十句一威稱廣遠二凡諸下正化等覆一蓋有二義一以十善法為蓋蔭蓋羣品故如下施蓋中云為令衆生得自在蓋能持一切諸善法故又云為令衆生能一一蓋普覆一切等云云二以慈心蓋於諸衆生普心蔭覆故如施蓋中願云為令衆生得平等心覆衆生故為令一切以諸善根普覆一切故為令衆生得大回向普覆一切衆生故又如下文第六十六中大先王謂善財言我唯知此大慈為首隨順世間三昧門如諸菩薩摩訶薩為高蓋慈心普蔭諸衆生故乃至廣說三以離垢下表尊第一四於法下十善導物五以四下四攝攝生六菩薩下一句是結德之言其文宜安離業障下七有大下感難壞眷屬八離衆下體相嚴修九獲那羅下身堅力大十得清淨下無惡業障並顯可知第二依身起行中三一隨相回向行二佛子菩薩摩訶薩以諸善根如是回向時身口下離相回向行三以何義故說名回向下釋此回向名初中二先略標列回向因緣後佛子菩薩摩訶薩隨所下依標廣顯回向因緣前中三一列施者并所施物二其中下辨所施田三佛子菩薩摩訶薩如是下巧攝施行成回向行初中二先一句總標後或施下別列列中除施身王位妻子等重說之外有七十五門若分園與林別則有七十六種謂飲食上味車乘衣服華鬘雜香塗香床座房舍住處燈明湯藥寶器寶車象馬座蓋二十傘幢幡寶物嚴具寶冠髻珠王位身及妻子財贖獄囚繫閇身代囚死三十連膚頂髮眼耳鼻舌牙齒頭頂手足四十血肉骨髓心腎肝肺大腸五十小腸厚皮薄皮手指足指連肉爪甲求法入火護法受苦求法捨海內所有以法導化六十斷害男形佛興示令見施大地僮僕施身與佛及衆生供養給事施城邑聚落宮殿七十園林妻子一切資生設大施會七十五二辨田色類中三初一句標總多類次或從下別顯後等皆下總結普施初後可知別顯中有七句初五五對十類後二各多類七十一來處異二量行異三儀觀異四男女異五趣異六心性異七求覓異並顯可知三巧攝施行成回向行者謂將顯修行隨順堅固善根回向故先標列一切善根隨順堅固回向之相所以者何前所引施者及物并田顯所今隨順堅固回向之心行今此善攝十句顯能令隨順堅固回向故云如是施時發善攝心悉以回向謂色即如故攝施行所有色物回向色如乃至回向識如當知亦爾何豈不所回善根先已稱性答今正顯此以稱法性善根回向法性方名隨順堅固善根回向如下釋名中說此第六回向名從此文立應知後廣顯中一一回向行皆依此修文中十句分三初句總標次所謂下別顯後善攝慧施下一句總結初中二先牒前施行後發善下正顯可知次別顯中八句初五句總明受者五蘊於中雖漏無漏別皆蘊名收次一句明能施者五蘊攝及顯位是不相應行蘊所攝尊卑次第故次一句明所施有情具五蘊攝次一句顯所施外物非情故唯色蘊攝後一句總結者謂總結前八句不攝施行回向故後廣顯回向行因緣中二先料簡後釋文前中略以四門分別一前後差別二內外分別三三施四三科初中謂以後廣顯望前略標互有無別即施傘施頂護法受苦等三前有後無也前救獄囚中無施法必顯有也前施城邑中無門防輸稅後顯有也前為求法捨海內所有即是略攝後顯國城人民等多類也前中以法化導即後顯中禁殺令住戒也餘皆大同後廣顯中都門總有六十若單數色類中間除重則有一百七種若巨細而論乃有無量謂於八十七中類中復有異類如末香有多種蓮華有多種等又如施國土中一切諸物故資生中一切資生故又云隨所施物無量無邊故又云菩薩隨諸衆生一切所須以如是等阿僧祇物而為給施故准此諸文色類甚廣且粗相言之不可刻定一百七等昔光統律師將前標顯之文總為一百二十門施一一行具十回向一一各具十善七施等相乘添成八萬四千施行七施行謂心三時喜即為三事有三謂施者受者財物入理有一謂照三事空一寂之理按此安立雖欲廣其施門翻乃狹其行相所以者何如前所引五處文故二內外者有二種一自身為內他身為外謂菩薩捨身救囚代死求法護法或割身宍或作僮僕或施力供事皆名內施若施妻子眷屬僮使乃至象馬皆名外施二有情為內非情為外即前內外皆名內所餘之物皆名為外三三施者導示佛出興皆是法施救囚代死斷殺救毀男形等皆無畏施所餘皆是財施或施衣食令離飢寒等怖或為說法令其修行離惡道惡等怖皆無畏施攝四三科中三初五蘊次十二處後十八界初五蘊者謂施自身妻子內宮眷屬僮僕乃至象馬等皆是施五蘊故所餘施物非情數者皆色蘊攝法施中能詮名句字行蘊攝聲色蘊收所詮義理非蘊所攝是無為故次十二處者施自他身具內六根故施外物中華香音樂飲食衣服及法施中能所詮等是外六塵或一物施中具二三四等如衣食中具色聲香味觸等自餘一切思准知之後十八界者且內外十二界准處可知中間六界依內根故隨根布施然此十八有暫施用有永施體如理應思後釋文中三一總明以諸施行成回向行二所謂下別明以諸施行成回向行三佛子菩薩摩訶薩隨諸衆生下總結前諸施行成回向行所為初中二先總舉所施物後以彼下牒前起後然此文應移安後具足行施下或通總別兩用望總屬前望別屬後二別明中都有六十門者第一施食中三一明施行二願一切下明回向行三是為下雙結二行前中四一所施物勝二施衆生明所施田三其心下明能施心於中五句分三初一句總明心淨次三句別顯淨相一無貪思相應二三輪淨三無慳思相應後具足下一句結施行圓後回向行中二先牒前起後此文應在前已如前說後正回向行中十願一食能資神故願得智智資法身故名智食二食資心力用則無礙八識不礙即第一義故三耳香味觸變壞方資食性非有故四知食性空貪不起故五於無所有歡喜愛樂得出離故六食能充虗願彼智滿七食非久住翻願彼得堅法八食資能有成辨願彼能有攝善九食資身心能遊能思願彼得二身周遍法界十願彼得化身應世作受供田後雙結二行可知依涅槃第十五末十六初亦說施食飲車乘衣華香床敷舍宅燈明等一一發願回向與此各有同異應引彼此說第二施飲中三一略舉施行二以此下明回向行後是為下雙結二行初後可知回向行中二先牒前起後可知後正顯顯中十願一法解濁愛故二水恆涓消雖小成大故三水多具辨故令渴愛息四故五佛智離世貪愛水故六法喜樂性是離染愛故七證法性水成法身故八定水調心故九證圓滿智海故十現法界身雲應法雨故第三施上味中四一明施行二以此下明回向行三是為雙結二行四為令下回向意初中二先總舉施味可知後所謂下顯所施物於中三一辨味具足二潤下明體細膩三能令下顯功能十三句可知二回向行中二先牒前起後後所謂下正顯顯中十願一佛凡所食得味中上此是三十二相中上味相佛大牙後有甘露泉故二了法利生智故三了味寶性證會處名法城四身雲周遍說法調化五智解法味喜遍身心六於世味得無貪相應思勤習佛法味七得平等無性味八法味資智不退九證佛平等法智所化根真俗無礙十於法味漸深主究竟無礙三結四意並易了第四施車乘中三一略舉施行二以諸下明回向行三是為下結初後可知勘梵本中通呼車乘之名云野囊野音作余我反若別呼車云奢羯吒若呼車輅云遏邏他如後第十六施車中辨就回向行中二先牒前起後後所謂下正顯顯中十願初總餘別別無異體皆即是總但約異義立別名爾一唯至大菩提二非小三非如㩲小等初立後廢回入此故四獨尊五無劣六慧深七悲廣八備福海九超有漏十普運非一方一有情故第五施衣中文三同前就回向中正顯內六句一慚愧外著如衣覆身二不行無慚故離倮形法三衣嚴蓋資故令得顏色潤四妙衣細觸故令得彼細膚耎五妙衣細觸故令得上樂六鮮潔衣施故令得無垢智第六施華中四一明施行二布施之時下明回向行三是為下雙結四為令下回向意初中二先列所施物後以如是等下明所施田前中二先標後所謂下明物色類有十可知後所施田其類有十自身為田者此有二義一由自身是福田故如為菩提求食以資身獲菩提故二由自他平等故謂若心不等者則要以他為田等者不爾自亦田故餘文易了二回向行中依華十義起十願一開敷謂依金剛喻定智普照境界開敷實性故二見喜無厭義三見皆順愜義願彼得凡有所見觀察皆順實性不取幻相四離染著義五令見者專注愛樂不捨義六見皆喜令瞋不起義七大願華令行果滿義八大智發行如日開華涅槃第十云譬如蓮華為日所照無不開敷此赤蓮也九大悲起行如日開華涅槃第二十云譬如月光能令一切優鉢羅華開敷鮮明此青蓮也十善知識如華見必成行歡喜如入寶州既蓋且喜三結四意並可知第七施鬘中三一略牒起施行二以諸下明回向行是為下雙結二行初後可知就回向行中二先牒前起後後所謂下正顯顯中以鬘飾為用有十義故起十願願衆生得佛菩薩身謂人樂見欽欲親善愛樂渴仰除憂生喜離惡者離嫌惡心故得近佛者與佛為侍如鬘飾故清淨者鬘體珠華淨故樂見興愛樂見未見時別故除憂與生喜有憂無憂別故離惡興清淨惡無惡別故第八施香中四前三同前四為令下顯回向意餘門可知二回向行中二先牒前起後後所謂下正顯顯中十二願前十一願因行成就後一願結因成果前中初一總後十別總云具足者即得十也此言香者無破惑臭氣故有清淨梵行氣故令聞氣者鼻根淨故人樂聞故不嫌惡故別中初一得字貫下九句不缺者持三聚或如護浮囊故二即前所持離外道惑故三離染心故四離二乘惑故五離中退失故謂設誤起深懷慚愧況其故犯數犯不生慚愧深愛著犯見是福犯耶六離惑業苦故七常持如初故八離斷常見故九離我相持故十成彼岸因故後結因成果中云五分法身此有兩說一云此應唯願成佛戒身今但言總意別故一云菩薩戒性不同二乘具五蘊故法性戒蘊得法性五分融無礙故故後回向意中云為令衆生悉得圓滿無礙戒蘊是也問蘊是擔纍義積聚義佛法性色既非積聚鎔融無礙何得名蘊答實非是蘊但假名爾第九施塗香中三一牒起施行二以諸下明回向行三是為下雙結二行初後可知就回向行中二先牒前起後後所謂下正顯顯中十願即十度行前六句可知後四一巧方便法二大願功德三菩提心力四白淨智法謂無漏智能斷惑故十行皆有熏發資長辟除之義離蔽障故熏發資長菩提心故第十施牀座中四一略牒起施行二以諸下回向行三是為下雙結二行四為令下回向意初中牀座者梵本中云設祁祁音余何處反此云臥具縱牀字無違而座字令爽所坐之座非臥具故晉本云牀敷深為稱順也回向行中二先牒前起後後所謂下正顯顯中十願一得與諸佛同生解脫牀名得諸天牀涅槃第二中名佛為天中天故二菩提心牀賢聖共依故三大菩提果牀此對凡夫牀息疲苦以得樂故四通力自在樂為牀此翻凡夫睡眠之牀身心不自在為樂故五平等說法牀為衆生熏修所依故六出世淨業牀是最勝果所依故七涅槃是究竟安隱牀故八真如牀佛智所依故九善知識牀信解行等所依故十佛是人中師子臥常右脅顯有為法依順無生本不起故今願得佛牀意令成佛故三結四意並易了第十一施房舍中文四同前初一後二並可知回向行中文二同前正顯中十願一嚴飾以施故二勤力嚴飾故三居中攝散故四施時捨著故五淨三輪施故六施者捨生死受者住菩提故七常無功用調化衆生故恆正安住聖天梵住聖謂無相等謂四靜慮梵謂四無量八住菩提因九住法性相應善根十有二義一即前第七表遮說異故二住大寂室法界故初願中願一切衆生五字貫下諸願應知餘如前釋第十二施住處中文四同前初牒起施行可知二回向行中二亦同前後正顯中十一願初一總餘十別別中一簡依邪師涅槃第七云依法者即是如來大涅槃一切佛法即是法性是法性者即是如來是故常住不變乃至云不知法性不應依止其願一切衆生五字貫下諸願二簡依妄識三簡依惡友四簡依不了義經應依了義大乘實教涅槃第六云是大乘經名為佛乘而此佛乘最上最勝五簡不善無記行故六七同簡邪濟故八簡有漏行故九簡生死心恆住深直悲心故十簡二乘道三結可知四顯回向意中十句易了第十三施燈中五一明施行二以此善根下明回向行三菩薩如是下明施燈意四是為下雙結二行五如是回向下顯回向意初中二先列所施物略標十種可知後施如是等下明施所為於中略顯利益攝受理實多門並可知二回向行二中先牒前起後後所謂下正顯於中十願一照教法智二了佛現世色身智三了生空智四身光照物身五照所詮智六遍處無㝵七一多無㝵八遍時無㝵九摧魔外道智十神力相應智三明施意中二先略標利安二門義如上說後以此下十句廣顯其相可知四雙結五回向並易了第十四施湯藥中三初略牒起施行二以諸下明回向行三菩薩摩訶薩下雙辨二行所為初門可解二回向行中二先牒前起後後所謂下正顯顯十願一藥遣疾故蓋纏者蓋即五蓋謂覆真實義故能令善品不顯了故名也五者貪恚疑惛沈睡眠惡作掉舉初三以根本惑中三法為體次一以四不定中染汙性者為體後一以隨惑為性初二障戒蘊次一鄣解脫及知見蘊次一鄣慧蘊後一鄣定蘊具顯如章纏謂十種纏於現行心等纏繞令不自在故即無慚無愧惛沈惡作慳嫉掉舉睡眠忿覆也無慚愧慳嫉忿覆等六以隨惑為性餘四同前蓋說諸門分別具如別章二令身離病強健故三疲愈者復能救物故四施行不息故五藥能令彼身命故故得佛身身即是藥也六教病服藥故故得四近三慧也七施最勝藥服除病源故八施心悉治一切病患故九用思善候病藥故十為救物檢尋方法故三雙結二行意中三謂標釋結釋中十句內前六易了七云得金剛等者如下佛不思議法品說十種廣大力大那羅延幢勇健法中第一云一切諸魔天龍夜叉乾闥婆阿修羅迦樓緊那摩睺人非人毗舍羅剎等盡力雨大金剛如須彌山遍三千界一時下佛無驚怖乃至云假使不制縱雨終不為損若佛所持及佛所便尚不可害況如來身釋曰准此願彼得佛身也八得堅力等者亦是前法十力中一力故彼文云廣大力最上力乃至七名堅固力具顯如彼九謂佛所受樂無能遮奪故十亦如前十種廣大力那羅延法中第一所說故彼云一切諸佛身不可壞命不可斷世間毒藥所不能中一切世界水火風灾皆於佛身不為害也第十五施器中四一施行二摩訶下回向行三是為下雙結四為欲下回向意初中三一施物略列十類二或施諸佛下明田及施心所因亦十種三如是施時下明行體並可知二回向行中二先牒前起後後所謂下正顯顯中十願一器貯物不散失故二施淨器故三寶器亦容持故四廣大器亦納受故五最勝寶器故六淨器成光寶施故七器納受光明寶故八施堅牢器常置光寶故九細密器堪持醍醐等故十施廣大器故得遍法界會中上首身能讚請說法主及領受所說法故三結四意並可解第十六施車中二先總標列所施物田後佛菩薩摩訶薩以如是等下約五類田別明施等二行前中二先牒起章門後車施下別顯前中准梵本呼車為遏邏地即同此方呼車輅之車是故與前施車乘別也後別顯中二先明所施田後菩薩是時下顯施行前中二先標田類有九種若并取後願中塔廟僧衆則有十一類或但十類以貧與獨一悲境故後此諸下辨田來由有六種可知後顯施行中十種易了上來三段文家存略實各多類問准瑜伽四十九中云若有衆生來求種種能引戲樂能引無義所施之物不應施與況令此中乃施采女美色令引貪愛不善行耶亦不可說菩薩但自行施餘事不知所以者何違前所引瑜伽說故彼論又云施妻子時不應施與怨家惡人藥叉羅剎凶暴業者施王位時若知乞者擬得位已損害有情不應施與又無性攝論第八卷云菩薩雖得財位自在見諸遺乏財位有情有五因緣菩薩不施一者見彼於財位有重業障故二見彼有情若施與財位障生善法故三見彼有情若乏財位厭離現前故四見彼有情若與財位則能積集不善因故五見彼有情若與財位則便作餘無量有情損惱因故是故菩薩不施於彼此有頌云見業障現前積集損惱故現見諸有情不感菩薩施答能施有二人一者的知乞人得所施物擬損衆生則菩薩不施亦無違犯若不的知菩薩但作利安之心施亦無咎況此采女等皆是菩薩同行主伴施彼定知有益無損或先順後化誓願力故問菩薩持戒不惱衆生如何自為行檀乃將男女等施他答此所施男女等通有二類一者先與菩薩同結志佛互為主伴今得將施乃遂本期喜得行成豈復憂惱設說悲苦皆示現爾二者延發誓願志力尚微雖將施地再三本問故瑜伽四十九云施妻子時先當曉喻令喜然後將施終不強逼令其憂惱又不施與怨家惡人藥叉羅剎凶暴業者釋曰此教即是為初根設也後約五類田別明施等行中即分為五一施佛及塔廟回向於中四初牒前二以此下正顯三是為下總結四為令下明回向意初中三一牒前施物二田三善根因辨應起塔人及塔表位次長阿含云四種人應起塔一佛二辟支佛三阿羅漢四輪王依真諦三藏引十二因緣經云八種人應起塔一者佛其露盤八層已上二菩薩露盤七層三緣覺六盤四阿羅漢五盤五阿那含四盤六斯陀含三盤七須陀洹二盤八輪王一盤若人見一盤塔不應禮拜非聖人塔故依僧祇律有四種比丘得起塔然不得安露盤一持律二法師三營事四望德異諸道俗有為先已師僧起塔應審尋此所引聖教二正回向中有二十願初中二義一解修因二信福廣如般涅槃一說施不退菩薩及最後身乃至世尊得福無量無邊不可稱計不可思議二中二義一專向佛二過淨田三中二義一是離世間品中十種清淨施果故彼云菩薩安住此法則得如來無上清淨廣大施二是彼後文十種捨無量果故彼云若菩薩安住此法則得如來無上廣大清淨捨四中三義一非劣願二得佛解脫三得正後二智或唯後得五中三義一能無盡施二入佛福智六證佛智有二義一超劣二自在七得佛通八得無限智契實教理九中利物與作生佛智緣二堪為勝田十中一愛佛二勤善三樂佛智十一中一無功用遊剎二違疾遊剎十二中一分身通二事佛十三中一得勝身二遍遊無倦十四中一得大身二速至三任意往四無退十五中一得佛威二速通現化十六中行安樂行順菩薩道如法華安樂行品說安樂行有四種一者菩薩行處親近處行處謂住忍辱柔和善順不卒卒暴亦不驚於法無所行觀法實相等於親近處謂不近國王大臣等外道文筆凶戲不律儀求聲聞四衆不問訊不與小女等語不近五不男不畜年少弟子等二者觀一切法空如實相乃至云但以因緣有從顛倒生故說常樂觀如是法相三者於末法中欲說是經住安樂行不說人乃經過不輕餘法師不說他長短不讚毀聲聞人不生怨嫌有問難不以小乘答但以大乘令得一切種智受持讀誦此經莫懷嫉妬諂誑勿輕罵學佛道者求其長短勿惱令疑悔於一切衆生平等說法以順法故不多不少乃至深愛法者亦不為多說四者於末世持是經者於在家人中生大慈心於非菩薩人中生大悲心念言是人失如來方便隨宜說法不聞不知乃至不解是經我得阿耨菩提時隨在何地引之令住是法具說如彼十七中一得普賢行少功力疾得菩提故二十力圓三智慧滿四神通具十八證平等法乘十九中一普行究竟二成佛二十證佛所證法性法性是所乘智能乘故三結四意並可知二施菩薩知識中四一牒前二以諸下釋三是為下結四為令下回向意初中三同前可知二釋中二十願一憶持所聞教二中一同善善友義利謂現當益世出世益離惡攝善福德智慧或此四對並同善友或除世益由菩薩於唯世益或不作故如瑜伽菩薩地說二攝取衆生共同善根三中於善友四事一親近二尊重三供養四凡所為皆隨發心四中一得樂欲善二身不離善友五中一常值善友二順善友教六中於善友心有四事一愛樂不離二相續三不更樂惡友四不曾錯誤妄失七中二種一捨身事二順命事亦忘已見事八中三一為友攝二修慈三離惡九中聽聞善友正法十中三種一與友同善行果二與諸菩薩同行願三成佛十力十一中二種一受持友說二得友定用智通十二中二種一受持正法二修說行滿十三中一願令乘二乘人及乘權大乘者同乘實教大乘故由三權是積漸行無別實果實果唯在實乘有故言無障礙者願彼假名菩薩等速同乘一無㝵乘而離行布趣寂等稽滯之礙故一切智道者梵本云鉢也縛娑囊此云究竟成就一切智性其兩箇乘字梵本中前云阿魯囉後云衍那准此方語法前是平聲後是去聲昔來以兩字俱用平聲呼者由所乘理從能乘顯故上下文中同此者並准知之二願令成滿果梵本云鉢也嚩娑上囊此云究竟成就一切智性性即是體謂成佛智體經本云道者譯家謬也十四中一乘佛所乘二至佛所佛三無有中退十五中一解稱理行二隨聞永記十六中一諸佛攝受二得佛智三達法源十七中一通用不失二隨乘處速到十八中一化物自在二化令住大十九中一令得不空三乘二乘昔所乘三至佛令所至二十令得果乘如仁王云佛乘薩婆若乘來化三界故三結四意並可知三施僧回向中四一明施行二以諸下回向行三是為下雙結四為令下顯回向意初中二先牒前施物及田可知後起學下明施行之行於中起十種心起字通下諸句一無餘施心十種施中一切施行如十藏品說二無漏施心三除障施心四順無貪思五貴重田六至信田七依教行施八生難遭欲九無限大心十於檀教堅信二回向行中二先牒前起後可知後所謂下正顯顯中約物田田通大小有十九願勘梵本二十願足所缺者是第十五後如次顯一約入車坐者為車住持故二約升車免灾三約升車巡遊適性四車是尊貴者所乘尊貴者言人多信服五約田和合了法一性無差別故六約田無乖一切同證一法生證法性互為主伴故七約田聖衆離染故八約菩薩僧田故九同菩薩僧具智福故十約車運轉不住著義軸在衆輻之中轉動無㝵是自在義故云如王在衆中自在也十一法輪如車輪轉動義故十二乘者不履而至所詣處故十三以車中虗得受用故此願初准梵本有得字謂令衆生得神通之身此顯伐灾等流故智無㝵者車迅疾故十四車中虗得入坐為二義一入遍空佛會二成真空行十五梵本云願一切衆生得大神通自在波羅蜜不移本處其身普現一切世界此約乘車者不起而遍至一切處故十六車載彼身彼身安隱故願令得十智身或八地已上無功用智身謂變易輕舉故十七車既令人不動而往故願得無功用神足如水中月不往遍應欲勤心慧變現所依如身依足故十八車以不住轉動為能故願得無依住身有感則應如鏡中影有質斯現故十九施車之心無限乘之者隨所欲往皆至故願得多自在通隨化即應故二十入車虗無㝵故願證入亦然乘車不倦而遊故願得速至十方三結四回向意並可知四施聲聞獨覺寶車中四初明施行二以此施車下明回向行三是為下結前二行四為令下明回向意初中二先牒前施物及田可知後所謂福田下明施之心理實無量說十表多十句皆帶起字後九句皆依初句第五句顯二乘為無為德皆從佛生第六句顯修此行無厭足時八九十句皆顯不與慳及有所得相應前二句變顯後一句順釋餘並可知二回向行中二先牒前起後可知後所謂下正顯顯中有二十願多分翻劣就勝及用共名行不共行於中一劣信劣田行故二中三一翻不傳教但遮無益語二處喧常寂三普觀一性後二用共名行不共行故三翻田及劣利他四翻識智及利物少故五翻劣行田故六用共名行不共行及翻於法見有體用故七翻劣田及少福故八翻共化業名成不共化業及攝物多故九翻劣田劣益物故十有二義一先標能為勝田後釋勝田所生二先明利他勝田後明自利勝果皆亦翻劣就勝十一願得滅罪法等者此翻聲聞不勘堪聞受大乘難思消殃滅障之教又彼教中未曾聞故如佛名經說一聞佛名滅無量劫生死之罪又涅槃第六云我涅槃後若有得聞如是大乘微妙經典生信敬心當知是等於未來世百千億劫不墮惡道又云若有衆生成就具足無量功德乃能信是大乘經典信已受持其餘亦生有樂法者若能廣為解說此經其人聞已過去無量阿僧祇劫所作惡業皆悉除滅第九云譬如日出衆霧悉除此大涅槃微妙經典亦復如是若有衆生一經耳者悉能除滅一切諸惡無間罪業又第十云若比丘比丘尼優婆塞優婆夷及諸外道有能受持如是經典讀誦通利後為他人分別廣說若自書寫令他書寫斯等皆為菩提因緣若犯四禁及五逆罪若為邪鬼毒惡所持聞是經典所有諸惡悉皆消滅又三十一文云見有受持讀誦書寫解說之者恭敬乃至四事供養讚歎尊重稱說其善不說其短乃至云是人能令地獄重報現世輕受釋曰准經受持讀誦等皆依解心中作然能供讚者當轉重苦況所供者自有重苦極重尚轉況輕苦耶如是等文大乘經中處處皆有不可繁引問受持小乘經律得滅罪不答非不能滅但其力微大乘教中有毀無讚也十二翻獨覺不聽受教聲聞雖在法界會不聞不受雖聞不解無益空過故十三翻二乘不廣利物餘多同前十四翻二乘外道外道無正信等二乘無深信等故十五翻劣善根十六以共名取不共信樂十七以共見聞之名取不共見聞之業十八翻二乘不能以䇷別實護實人十九翻獨覺不依聞教持誦思演故二十翻二乘於實教不能生解故亦不能敬養故三結四回向意並可知五施貧等諸田回向中四初明施行二以此下明回向行三是為下總結前二四為令下明回向意初中二先牒前田物可知後隨其下正顯施行於中三初明行施時安布三業語業中云仍向彼人白悔責言勘梵本云於彼人所愧謝而言也餘並同次或時下重標施物此中有少異前都列故更別顯後佛子下總結並易了二回向行中二先牒前起後可知後所謂下正顯顯中有二十一願一貧難成功多諸障礙為事狹劣故翻彼為願二施童女故願彼以白淨法智修行無退或翻一切女施三貧無所有於願彼了諸法無所有故貧無物可執捉故無分別執著也智道道字梵本性字四女人多分諂誑不正直及不自在故翻彼為願五施車願彼得住佛智所乘法界施伎女得佛法相娛樂六翻所施女人故乘淨行乘車有運出自境至他境故願得十到彼岸出離之因乘車身安樂故願得定樂七唯就施物故願彼乘四輪乘第一好國土者四事易求故國主善治無諸障癘故有同或見故無喧閙故第二依善人者有多聞者故有見諦者故有巧說法者故有為慈說非為利說故說無退倦故第三集勝福德者善法為緣故善聚福智故善修心觀故巧說法不求利故善敬法修行故第四發大誓願者可樂故無難故無病三昧故智慧故具顯如章八翻貧田願彼得富法財十力智九由乘車者達所住處故十中藏乘也翻施貧田願令得難思衆福又乘車處處巡遊於平正之路故十一中大施者檀度具故無慳相應故心等故普遍故捨於難捨男女等故稱法性故故名大也十二或度由前檀度或得淨故十三忍度由行施時彼與男女妻妾既無嫌恨唯生歡喜故十四勤度謂施心常堅無暫懈退十五禪度謂施淨三輪專注不散十六智度由慧擇力施成淨故十七車載灌頂王子施故車是人王車故法王車類願故十八車行不住終不離地智乘遍化亦然十九中而不失等者梵本云而於大乘無有失壞其道字無謂法乘類車所施男女是同願行伴非惱衆生失壞大乘悲行二十法王乘類人王車最上滿因行類滿乞者意三結四回向意並可知第十七施象馬中四初明施行二以此下明回向行三是為下總結四為令下明回向意施中四初別列施物二菩薩以此下雙牒象馬三或奉下通顯施田四其心下通辨施心初中二先明象德及相於中云猶如蓮華者梵本云如鉢特怔華此云赤蓮華今譯人真白蓮華華有多色是何華也後或復下明馬德相及餘文並可知二回向行中亦通象馬於中二先牒前起後可知後所謂下正顯顯中依象等十義起於調順性象馬十願一施得無漏調順智二象馬有慧性能擇路故得巧智三象馬調柔知主意信住使令四乘者由象馬得有所進趣故五由施心平等故六象馬是王七寶數亦以寶嚴故無漏智可貴故名寶七三昧華類乘此寶象馬令身心調暢適悅行嚴類寶嚴八多劫精勤由施迅疾乘故九契性無違智名調順類性調順乘十實教大乘望餘最高但含識者運載類所施大象馬故三結四意並可知第十八施座者勘梵本中云施王賢座彼方訓釋云賢好也舊云賢王者乃是直本末回向文爾文中四一明施行二以此下回向行三是為下雙結四為令下回向意初中三一明座德相嚴等二灌頂下居座者德相嚴等三時轉輪下明所施田初中二先牒起前標後或施下依牒別顯此座望前第十門前是牀敷臥處譯家之謬具如前說今此正是朝會群臣大衙殿高座餘文可知二回向行中二先牒前起後後所謂下正顯顯中依座十義起二十願一由施佛故二施輪王座故三同第二前約權威此約尊勝四施王寶嚴座故五由是王座最勝故願彼佛座三世間中最殊勝故三世間者辨法師云地前願樂世間初地至七地名功用世間八地至等覺名無功用世間衍法師云三灾名三世間本疏云三世名三世間今按西域相傳衆生界中有三世間一地下世間龍修羅等二人中世間三天上世間此座於彼三世間座中最為勝故六施座供佛法法界身故七同第六約能所異爾八隨乞者意施故九由施佛菩薩聲聞緣覺神通者故十衆寶十一衆香十二衆華十三衣十四衆鬘十五衆摩尼十六衆琉璃十七等者等餘車渠等一一獨成座故十八多座十九清淨嚴二十金剛上來十一種座同一願令於如是等座上現成正覺三結四回向意並可知第十九施蓋中四一明施行二以此下明回向行三是為下總結前二四為令下回向意初中二於中先牒起章門可知後此蓋下別顯顯中三初明所施物二以清下能施心三於佛下所施田初中二先總顯勝於中三一受用者貴二貴寶嚴衆蓋中最後衆寶下別辨莊嚴可知二施心中清淨三輪故三所施田中有十五類塔安舍利廟置形像僧寶有二種一菩薩通在家出家得道果者二聲聞或局出家得道果者或通在家見諦已去有理和故一切佛法者謂依佛法中修福慧行者皆是勝田謂十法行及造寺齊會等師僧謂或師及受業等尊宿謂在家出家中年耆德艾者故種種衆生謂外道闡提神天鬼等故已上田中或有一身但應一田或有一身應二三四等思之可見餘文易了二回向行中二先牒前起後後所謂下正顯顯中十願初中二覆蔭故佛田故二蔭覆故變顯離或覆心故三中三覆蔭故辟塵故遮執故四中三物及心勝故由內心善友言善令他見面愛樂故由蓋覆身令淨潔令見者愛樂故五中由定持心蔭覆不失壞一性故六中觀身無生忍為蓋辟除有所得故七佛田所致故八蓋辟塵故九堪為蔭覆衆生者故十佛智蔭覆更無上故三結前二行可知四回向意中有三十種一由施輪王自在行十善者蓋故願令得佛自在智蓋住持善法令見者皆得此亦專持善法如持蓋者用心也二中以蓋處處為佛事故三以蓋處處為嚴為供故四中并幢幡處處同供佛故五莊殊勝處處蔭覆供養六廣大蔭覆令發心故七多蓋供多佛故八得佛所用蓋供諸佛故九得摩尼等六種蓋普覆一切佛故十得佛無障礙智者謂一切佛同以此智為身故云為蓋覆諸佛也十一物第一故十二嚴勝故十三施心欲願淨故十四約因則大寶嚴蓋此寶亦名心王寶蓋是尊人所用即是自在所有依主可名自在約果則佛智是寶王可貴故自在故方便善巧無有限量故云無量無邊十五團圓之相是滿足義自在如前十六善根利物故十七所施最勝故十八辨施持蓋者力故十九稱法性施故二十所施物是行十善法輪王之蓋故此中自在是自在者物施故并有前義故二十一施行發自輪王心故威德者故蓋顯尊威故二十二隨覆不離令身安淨智有此能故二十三隨用一期蔭身安淨福有此能故二十四庇身安樂福有此能故二十五普心施故二十六等心之施智有此能故二十七願令如巧回向故二十八所施不為己故二十九願令皆得大菩提故三十皆令願得回向果故第二十施幢幡中四一明施行二以此下明回向行三是為下雙結二行四為令下回向意初中二先列所施物後菩薩摩訶薩下正辨施相前中按幢與幡幡是幢上嚴具故文云衆寶為竿寶繒為幡乃至廣說諸嚴具等准此即非二事合說詳後願中亦但說幢文云隨諸世界等者菩薩隨願生處所感依果種種異故遍大地等者不但於一世界行施利生故後施相中二先明能施之心謂於十田生淨信勝解定無疑故後或施下列十類田可知二明回向行中二先牒前起後可知後所謂下正明回向依幢等十義起十種願一植如金剛福以不可壞義故名幢二修行佛法以尊重等四行建立得自在故名幢三於佛所說菩薩藏法書寫護持故名幢四高幢置明珠寶施故五幢能摧伏義故六幢能不為他壞如智度論二十一說帝釋幢及二侍者幢故七幢上有光明寶相續照曜故八高幢珠寶光遠及故九嚴事多故供心廣故十能摧伏他故名幢佛能摧邪故佛即是幢言九十六種外道者餘處有說九十五種如涅槃十一及藥師等但有都數而無別名若依九十五種外道防難經雖列別名但有九十二種初名裸形最後名愍陀旃陀利其經亦名九十五種耶道神呪目録疑僞又有別本云佛臨涅槃時梵忘須跋陀羅問佛佛為說其名字與前令異其數具足初名時呪術乃至第九十五名多誦外書種種方術求解脫具如別録恐繁不載問何故此文言九十六耶答由有聖教說二乘人同外道故寶性論第二云犢子等見身中有我不信第一義諦不信真如法空佛說彼人無異外道又七卷楞伽第一云大慧云何為外道惡見謂不知境界自分別現於自性第一義見有見無而起言說釋曰二乘人既取心外法有實自性不信唯心即外道也又彼第二云復有說言見一切法因作者有此是涅槃大慧彼無解脫以未能見法無我故此是聲聞及道種性於未出中生出離想應勤修習捨此惡見三結四回向意並准可知第二十一開藏施寶中文四同前初明施行中三一出衆寶二施多田三心無吝如文可知二以諸此下回向行中二先牒前起後後所謂下正顯顯中依佛法等十種皆有可貴希難得義俱名為寶約施因緣起十種願一寶有光照使離暗不迷故二寶有光照令成守護故三寶能雨物周給如輪王珠寶故四施寶心重堅信故五施心稱理決定故六施寶及照用故七同前體用及回向故八施寶照用及心稱理不亂言十六智寶者古來三釋一云此即見道十六心始從觀欲界四諦境苦法忍為首終至無色界四諦道類智為後莫不皆是出世之心可貴難得稱為寶也二辨法師云地前明得明增真義一分無間地上大乘光明集福德王賢首健行等八定各有自分勝進依此十六定所友生智為十六也三本疏云佛地四智智各有四為十六也雖有三說初解稍勝然助一釋菩薩初地相見道時有十六觀智謂八觀真如八觀正智此十六智雖皆擬真見道立然是無漏究竟智體故此文云究竟成滿等前十六心依觀下上諦境別立法類今依觀所取能取別立法類十六種心如成唯識及雜集各第九卷說九供佛因故或於餘田翻顯說故十所施寶是衆寶中尊故有光明顯現於物故三雙結四回向意並易知第二十二施莊嚴具中四一明施行二行布施時下明回向行是為下雙結二行四為令下明回向意初中四一總標施名二所謂下別顯嚴具三菩薩下明施意四以如是下總結行施並顯可知三回向行二先牒前起後可知後所謂下正回向中十願一妙寶嚴具有光照用故二磨瑩鮮明施故三嚴身同於身相故言百福相者其因諸說不同肇法師法華疏云十善為本一善以九善莊嚴故瑜伽決擇分說百福行者謂十善業道少分離煞乃至少分離耶見是名初十行若多分離煞乃至多離耶見是名第二十行若全離煞乃至全離耶見名第三十行若少時離煞乃至少時離耶見名第四十行若多時離煞乃至多時離耶見名第五十行若盡壽離煞乃至盡壽離耶見名第六十行若自離煞乃至自離耶見名第七十行若勸他不煞乃至勸他不耶見名第八十行若稱揚讚述不煞乃至稱揚述不耶見名第九十行若見離煞慶喜大悅乃至見離耶見慶喜大悅名第十十行以此百行成百福相又涅槃經第二十四云菩薩修不煞或有五種心謂下中上上中上上乃至正見亦復如是五十心名初發心具足決定成五十心是名滿足如是百心名為百福德具足百福成於一相乃至具足三十二相釋曰若依第十一說三十二相其因各別又此且約化身相說若依此經相海品等說佛有十華藏剎海塵數相一一相以一剎塵數福成非但百福成一相相有三十二相此約十身相說故上文妙嚴品普興雲幢主水神頌云清淨慈門剎塵數共生如來一妙相一一諸相莫不然是故見者無厭足四施心應理不亂故稱身所宜施故皆新妙故五施耎言慰安屈辱來取慚謝等故六施時讚彼不憚己勞成我檀行故七施時隨應為說正法故八施時照三輪淨心不亂故九施時心攝一切波羅蜜故十施時明照法界故三結四意並可知第二十三施寶冠及髻珠中四一施行二以彼下回向行三是為下雙結四為令下回向意初中可知二回向行中二先牒前起後可知後所謂下正顯顯中十願皆云智慧者以髻珠有光明照見義故二中云具足頂髻等者梵本中云得佛螺髻成第一智餘同八中寶海等者佛智尊貴稱寶深廣如海第九中云至大地頂者菩薩地盡處故餘文約頂及冠成就最勝等思之可見三結四意並可知第二十四施妻子財寶及身救獄囚中四一施行二佛子下回向行三是為下結四為令下顯意初中三一無畏施二既救下財施三然後下法施無畏施中二先明所救者受苦可知後菩薩見已下明救苦救中三一捨難捨物二於牢下救難救苦三如大悲下引例證成初中三一財寶二妻子三自身引古中此行菩薩雖多略舉一俗一道為首亦顯菩薩通達道俗化故已下並准此知餘文並可知二回向行中二先牒前起後後所謂下正顯顯中十願一救脫撿繫身故二救死令生願證不生死智故三救脫地牢暗心憂惱苦故四救脫繫閇等故五救脫繫縛憂惱不自在故六救脫禁時憂惶萬計起故七救遂不樂禁繫心故八救遂樂出獄心及法施故九救遂厭惡禁閇不得自在故十入獄法施及脫苦故三結四意可知第二十五捨身代死囚中四一施行二佛子下回向行三是為下雙結四為令下顯意初中四一明所救者受苦二菩薩見下作念捨身代彼三如何逸下引例證成如前說四菩薩爾時下正明捨身救苦於中四一陳救意二顯不救失三徵四釋並相顯二回向行中二先牒前起後後所謂下正顯顯中十願一救脫命斷逸夭灾故二依菩薩力得預不死者數故三救脫死怖畏故四救脫不令命不死故令得證無死智境界五菩薩攝護免死難故六救脫造惡行刀劒死故七救脫死怖因及令得降四魔故八無畏施時亦法施故因及令得淨信離大衆畏決定說法九救脫繫閇身心不自在故十救脫死畏苦故三結四意可知第二十六施連膚頂髻中四一明施行二菩薩摩訶薩下明回向行三是為下總結四為令下顯意初中二先牒起章門後如寶髻下正顯顯中二先明寶髻等諸菩薩同修此行後是故我應下明此同彼一切菩薩隨其施行前中二先標修行者於中亦二先略顯別名後及下通結多數其無量兩字梵本中但是諸色顯其多故後菩薩是時下明所修行相文中二先明行前方便後便執下正明行相前中四一見者喜以彼與己成檀行故二而語之下明喜心不易無吝以畏苦等故三不念下明無畏救謂不希現在名利報當來貪樂及二乘果四明正所求中二先明涅槃後釋精勤下明求菩提後正明行相中十種行施一忍苦二恭敬三仰念尊德亦此行故四歡喜五勝志樂六月開解故七於苦受心不著八知五受無體九知五受受本不起十知五受從因緣起亦皆變異為行所遷後己亦應同一切菩薩修此行中二先總謂同三世菩薩修此施行後別中五一發深信二染樂三求一切智四勤勇五悟無師理二回向行中二先牒前起後後所謂下正顯顯中十願一得正見等者謂令得出世因果二位中勝相一佛果無見頂相二菩薩如塔髮相此通二義一菩薩髮髻盤環層級如塔形故二其髮堪受人天供養得如供塔福故若准梵本應云得菩薩髻為世間塔無能見頂二中色紺德剛體細耎德剛者非相遷不可壞故此但標三事即是願令作佛也下八願中所願者皆是佛髮應知三中准梵本應云願一切衆生得潤澤髮稱於髻額頭面圓滿如補那伽吒此云滿瓶其瓶肚圓今但取肚之圓相不取瓶頂及底也四中可解五中准梵本令得二相髮謂室利瑳相髮塞嚩悉底加相髮此以如音義中釋六中得佛相髮者梵本云得難提迦勿多相髮餘文同七八願中可知九中梵本云得堪為友提應供頂髮餘文同釋曰堪安支提堪為應供即是佛髮安佛舍利髮爪等名支提故十中可知三雙結四回向意中三益一定二持三佛十力智第二十七施眼中四一施行二以此下回向行三是為下結四為令下顯意初中二先起章門後如歡喜下正顯中二先引例證成後菩薩摩訶薩下正明行相於中三一於行起治瑩心二於其乞者下明行所為三佛子菩薩下於乞者起益己心初中二先標人後起請下明用心用心有七一淨三輪相二不取相三依教生解光明破不解暗故四中道字按梵本云菩提謂觀菩提現前見故五回向佛智六與一切菩薩同施故七於佛無㝵眼信心難壞故二行所為中三初總標次為究竟下別顯所為後於如下總結別中五句並易可了三於乞者起益己心中十句初一總餘九別別中一以愛樂益己為設會二以愛為法故增行法三以愛是無緣捨世愛見四以不起世愛捨放逸五以法愛除欲縛六為成行而愛即是修菩提七以遂物心為自安八令意充足前句隨何物此句隨幾除九順無差別施二回向中二先牒前起後後所謂下正顯顯中五十願所令得眼皆是佛眼與此下離世間品說十眼但一二別餘多相似文顯可知三結四意亦易了第二十八施耳鼻中三一通顯施行二佛子下別明回向行三是為下通結二行初中三一牒起二章二如勝行下引例證成三菩薩如是下正顯行相初中可知二引例中二先列名數後布施之時下明彼行相前中二先列後通可知後行相中十五句初一總餘皆別於中具佛種性者十解已上也生如來家者初地已去也其清淨兩字配諸根及功德并智慧餘文並可解三正顯行中十一句初一句總牒前起後後十句正別顯入大施海者即是此回向中所說八十七門或盡人間所有一切情非情類金輪王所管內物或云無量無邊或云隨衆生所須阿僧祇等色類之物也餘文易了二別明回向行中二先施耳回向後佛子菩薩下施鼻回向前中四一牒前起後二所謂下正顯三是為下結四為令下顯意初中可知二正顯中十願初二及七皆名無㝵耳者准梵本初名無著耳二名無㝵耳七名無所住耳四中云不因耳處生分別心者謂不因耳能聞聲即執耳有體性執有體是分別心耳是十二處中耳處故由離分別名清淨也五中今蒙昧識畢竟不生者使明利耳常現行故八云無壞耳者梵本中名無斷耳善知諸論無能斷者九十云廣大清淨為諸耳王者謂於諸能遠聞耳及離分別耳中無㝵自在最勝故十中梵本云願一切衆生具足天耳得成佛耳餘願及結意等可知後施鼻回向中四一牒前起後二所謂下正顯三是為下結四為令下顯意初可知二正顯中有二十願前十正願後十相從願何故施鼻願中說面者謂鼻於面最為中樞好醜由生故此施鼻發願得面也就前十願中二云得隨好鼻者八十種好中云鼻兩孔不現故三云善相者謂有大人相故如下相海云如來鼻有大人相名一切神道智慧雲清淨妙寶以為莊嚴衆寶色光彌覆其上於中出現無量化佛坐寶蓮華往諸世界為一切菩薩一切衆生演不思議諸佛法海六云隨順所宜現非定一故八云伏怨者魔見婦伏故九善見者見必發善心故餘願可知後十中二云一切法面者面是正向義謂心正向諸法性故善見隨順同前鼻說餘願及結可知四顯意中有十門謂鼻香所入故攝受香故了知香持香氣住故覺香氣如眼見色故合中知如觸證故於香辨了即是有所成就故根照識了故香為供養嚴潔等故五分法身皆名香故三通結可知第二十九施牙齒者以此二物業果相似故合說也文中四一施行二菩薩爾時下回向行三是為下雙結四為令下顯意初中三一標起章門言安住堅固自在地中者智度第十四云如象王牙齒是法身菩薩故二猶如下引例證成言六牙象王菩薩者十輪第四云乃往過去有迦奢國王名梵授敕旃荼羅有大象王名青蓮目六牙具足住雪山邊汝可往彼拔取牙來若不得者汝等五人定無活義乃至云時大象王即自拔牙施旃荼羅廣說如彼三菩薩摩訶薩下正顯施行於中二先標後所謂下明起得心希有難得有十二種一無竟期二畢竟無礙三永無悔四貪瞋癡不起五無餘吝六為大菩提七利有情八有二種一上大二無上大上大亦名無等謂於諸施餘無與等無上亦名無等等謂於諸無等施中互相齊等故九於諸施中最故十亦名妙以自在智施為勝故十一亦名極妙謂離一切煩惱自在施為最勝故十二𨷂己濟物喜過濟己故二明回向行中二先牒前起後後所謂下正顯顯中十願願得佛牙齒以堪起塔受供故二願得佛三十二相中齊平相齒三舉心取智言總意別或依主或鄰近也智能調柔或柔則善趣彼岸之行而牙能調食食熟則堪充資身力之用四是佛三十二相中白淨相齒五如相海品說右輔上下牙及齒相皆有衆寶香華光明等莊嚴及現佛神力說法等悉是可憶念事故六是佛三十二相中四十齒相七梵本云願一切衆生得牙齒文理如勝蓮華塞縛悉底迦相難提迦物多相皆悉成就八及十亦多分同前所引相海品說九易了三雙結四顯可知第三十施舌中四一施行菩薩二爾時以諸下回向行三是為下結四為令下顯意初中三一標能施者二若有下引例證成三佛子菩薩下正顯行相初可知二引古中二先明安布其心後猶如下正引三正顯中二先明能施者趣中逢乞者後菩薩爾時下明施時三業初明意業十種心二兩膝下明身業慈心耎語下語業二回向行中二先牒前起後後所謂下正顯顯中十願一同下相海品廣長舌遍覆一切世界乃至云佛放光中現佛演法遍一切剎三亦同前引相海品說所緣願并三結四意並可知第三十一施頭中文四同前初施行中三一牒起章門二如最勝下引例證成又如報恩第五云過去阿僧祇劫波羅奈國王名大光施婆羅門頭云云三佛子菩薩下正顯行相初可知二引例中二先舉名數後為欲下明施行所為為中十種三是佛一切智六是佛地地位智也七是佛一切智智十堅固智智為前導故同首也後正顯行相中二先總辨後於諸下別顯前中云安住是法者住此回向法故入諸佛種性者成就道種性餘文易了後別中十種一信佛長善二施喜三離相四度彼五照法六發心七往捨八自悅九善欲十好施二回向行中二先牒前起後後所謂下正顯顯中十願一如來頭者此初句總相故二無見頂相三無能映四得上首淨土亦於淨土聖衆中上首五准梵本云頭如本那伽吒相髮如難提迦物多相光淨潤澤六卍字嚴飾准梵本中是第八云室利瑳相嚴飾七世所希有八具足佛首者同三世佛具足無缺故九成就智首一切世間最第一首者梵本中但云最第一無復首字十為具足首已上總是一願梵本云具足清淨首智圓滿成熟故為坐道場之言譯家謬置以其同一曼荼聲故三結四顯可知第三十二施手足中三一施行二佛子菩薩下回向行三是為下結初中二先牒起章門後如常下正顯顯中四一引例證成二於諸下略明施行三願得下明行所為四佛子菩薩下明施時用心初中可知二略明施行中二先明施處後以信下正顯修行三明行所為中八句一以願力得雨寶之手施之二施必契菩薩道三不曾暫吝按西域方儀呼舒手為不慳縮手為慳其擬將廣慧四字勘梵本云恆作施心四不怖難捨五無少疑心六不擬休歇七慈悲心施故惡道苦滅也八智慧心施故菩提因成也四施時用心中二初總後別別中十句應一一皆帶總句一為與衆生開解脫方便故二為證佛深廣智故七為法身無斷故八為智身無壞故此義云何客塵隔斷法身故愚癡損壞智身故十為與古今諸菩薩同此行如前引例是也餘文易了二回向行中二先牒前起後後所謂下正顯顯中大位十願細分有三十四願謂初中四二中五三中十一四中三謂往諸佛土摩諸界持彼衆五中二謂妙相施光六中三謂覆護衆成佛鋼手銅爪七中三謂覆生求菩提生功德八九十各一其二中云自然神通者報得神通足故三中無邊無量者如何僧祗品所說數普是無盡九是證佛所證十是供佛成主伴善根餘文及第三雙結並可知第三十三壞身出血施中三一明施行二以諸下明回向行三是名下結初中三一牒起章門二引例證成三於諸下正辨施行起十二種心文顯可知二回向行中二先牒前起後後所謂下正顯顯中十願二無功用故三非有為色故四有機斯應故五出世相嚴故六證法性而生離一切故七身如寶光故八身是智之藏佛界是常名不死界於彼示無常名為自在故九見無不益身如出寶之海十身如虗空世苦不及三雙結二行中以十種心成施行用回向欣悅是加行慶幸是正施歡喜是施後餘文顯可知第三十四施身髓肉中四一施行二佛子菩薩下回向行三是為下雙結四為令下顯回向意初中二先標章略顯後如饒下依標廣釋前略可知後廣中三一引例證成二於諸下正顯行相三佛子菩薩下施時運心初引可知二行相中二先明施處後歡喜下正辨行施中有十四句十云審觀等者有諸法從緣耶無體可緣耶從緣與無緣體前後耶十四平等行不感差別果故餘文易了三運心中十種一一皆有標釋其文顯不煩解解二回向行中二先牒前起後後所謂下正顯顯中十願三中云意生身者此有兩釋一依成唯識第八解云隨意願生故名意生二依七卷楞伽第二解云譬如意去速疾無礙名意生身然此身類有其三種一三昧樂二覺法自性三種類俱生無行作若廣分別如別行章四中以百福成一相計三千二百福成三十二相故帶說百福已如前解三十二相及後五中八十種好並如別章八中如下出現品說一切諸佛身唯是一法身等其義如十色藥相作十佛配十方等廣說云云十是三世間身餘文及三結四意並可知第三十五以心施中四一施行二以諸下回向行三是為下結四為令下顯意初中二先牒起章門後如無悔下明修行行中三一引例證成二學自下正顯起行三菩薩摩訶薩下明行所為初引可知二正顯中作十種心行施一不為慳所礙故三於波羅蜜慣習四中成就是圓滿亦究竟七於一切施慣習八無儔伴施餘文可知三所為中二先總後為度下別應知總句配別六句文顯二回向行中二先牒前起後後所謂下正顯顯中二十願初二中有願一切衆生五字餘並略無於中一藏是堅義其猶樹藏金剛亦堅即是地智此智非世法能壞如下佛不思議法品中說十種廣大力大那羅延幢勇猛法第一中云一切諸魔天龍八部等盡力雨大金剛如須彌山及鐵圍山遍三千界一時俱下佛無驚怖等廣如彼說二中卍字相者准梵本應云室利瑳相次云莊嚴金剛界心者十地品說第十地菩薩受智職位坐大寶蓮華時十方所有受職菩薩皆於金剛莊嚴臆德相中出大光明等云云佛不思議法品十種大力大那羅延幢勇猛法第六中云一切諸佛皆以德相莊嚴𮌎臆猶若金剛不可損壞等云云離世間品說十種心中第十名字相金剛堅固勝藏莊嚴心一切衆生數等魔來乃至不能動一毛等云云釋曰界是性義金剛之名從心智立謂佛心智體性堅固不可損壞然能損壞難壞惑障其室利瑳相莊嚴胸臆近心所依處故從鄰近名莊嚴金剛界心第九回向中說金剛界根金剛焰根者義亦同此所以者何清淨心王於無分智等有所依增上義故如在因位八識名根謂同境分別染汙通依等離世間品說十種根於中亦有金剛焰等二種根名同前會釋三四五六八九十一十二十四十五二十此後十一心與前第一心大同小異具檢下文皆有其相又六云大勇猛幢者下文七十八中云菩提心者如猛將幢降伏一切諸魔軍故七云得如那羅延堅固幢者三十涅槃一云菩薩修於定慧如帝釋幢不可移轉釋曰不可移動是堅固義第十六云被金剛甲胄者是大誓願心餘心文及三結四意並可知第三十六施腸腎肝肺中四一施行二佛子菩薩下回向行三是為下結二行四為令下回向意初中三一牒起略顯二如善施下引例證成三行此下廣釋前二可知廣釋中二先總後以愛眼下別別中四一為菩提施二不中悔施三觀不堅施四觀穢汙施梵本中從作是觀下與漢經少異彼云作是觀時知身穢汙畢竟無常如是思惟知法體已見乞者來心生歡喜起善知識想謂欲易我不堅固身與堅固身下同二回向行中文二同前願一切下正顯中十願初智藏者此願佛身佛身所攝無非皆智故二亦願佛身謂無漏福資無漏慧得此身故任持義也三五六七是因位四八九十是佛果然六七是八地已上餘文及三結四意並可知第三十七施支節諸骨中四一施行二菩薩摩下回向行三是為下結四為令下回向意初中二先牒章略顯後如法下廣釋釋中二先引例證成後施其下正明施行行中二先總標後生愛下別顯別有九心可知二回向行中文二同上後二所謂下正顯中有二十願一佛所化人本非骨肉故二三四五十一是佛身八十四十七十九通三賢位二十唯初地生佛家故餘皆八地已上三中云無繫界生者佛果非界繫等生故生字為異二乘從無生忍淨法界生故六中無散壞者非分段故八中具那羅延支節者諸支節頭鈎鎖相支結故九十相續不斷絶者變易無定限故十一不空三業故十三中有感則形無別自住故又亦不依內外中間根境識故十六中有二義一說法之身故二如鏡面現諸法故餘文及三結四意可知第三十八施身皮中四一施行二菩薩爾時下回向行三是為下雙結四為令下回向意初中二先明修行後猶如下引例證成前中二先標章後心生下正顯顯中四一歡喜施先法後喻二逢迎下恭敬施三而作下難遇施四歡喜下慰安施引例中金脅鹿王者菩薩本緣集經第四云菩薩住世墮畜生中而為鹿身兩脅金色背似琉璃餘處雜廁種種難名髀如車渠角如金精其身莊嚴如七寶藏身色光焰如日初出為諸群鹿而作饒益於大暴河見人欲溺投身救之其人得濟後遂背恩告王將兵欲煞鹿取皮將王及兵至鹿指示兩臂俱落王知背恩發心禮鹿謝過而去廣說如彼二回向行中二同前後所謂下正顯顯中十願皆是佛果所得文顯三結四意並可知第三十九施手足指中四一施行佛子下回向行三是為下結四為令下回向意初中二先牒起章門後如堅下廣釋釋中二先引例證成後菩薩爾時下正顯顯中十句一慰乞者心故二不退轉故三不起見故十唯趣向大菩提故餘文可知二回向行中二先牒前起後後願一切下正顯顯中十願皆是願得佛指五中隨好者十指端皆千輻輪相也十力者十種大力也七中梵本云願一切衆生得十指端裏面皆有千輻輪相所餘節中裏面皆有本那伽吒及以塞嚩悉底迦相相間莊嚴八中梵本云願一切衆生得如大蓮華難提迦物多相指十力業報相好莊嚴釋曰十力業報者身手營為皆十指力施指為因得十大力大那羅延幢勇猛法相好莊嚴者好謂赤銅爪甲相即細湧指間餘文及三結四意並可知第四十為求法施連肉爪甲中四一施行二菩薩爾時下回向行三是為下結四為令下顯意初中三先顯行相次如求下引例證成後為求下明施所為初中二先明施緣後若有下正顯施行次引例後所為求文顯可知二回向行文二同上後所謂下正顯中十願皆是佛爪一中云赤銅相者相是小相以赤銅是好故二云隨好者即赤銅光潤故五中云於世無染著者有二種一佛爪赤色非染成故二約智爪於境無所取故八入一切等者亦智爪故九云得善生爪者善生之言西域語方儀語法語之端正也餘文及三結四意可知第四十一求法入火坑文中四一求法入火行二菩薩爾時下回向行三是為下結四為令下回向意初中二先標章略顯後有能下正明行相相中二先問答顯行輕身重法後如求下引例同修並文顯可知二回向行中文二同上後所謂下正顯中十願初及第九緣求法願餘八皆緣入火願故云離惑苦險難恐怖得樂等中間文及三結四意並顯可知第四十二為衆生求法受衆苦中四一求法受苦行二以此下回向行三是為下結四為欲下回向意初中二先舉能修行人後為求下明所修行修行中三一明修行所為中十一句初句總次九句別後一句結為受苦總中為字貫別九句文並相顯二如求下引例證成三為求下正顯行相中三初標受苦所因次乃至下明代惡人受苦舉重顯輕故云乃至也三以求下結受苦所以並可知二回向行中文二同上後所謂下正顯中十願三云得照現身者梵本中云鉢攞底婆上娑上塢簸忙此云得如影像身言恆受安樂者謂八地已上得如鏡像身隨機照現益物為樂故四超苦獄者出三界故成智行者佛因滿故餘文及結并意可知第四十三處王住求正法能捨海內一切所有中四一求法施行二菩薩爾時下回向行三是為下結四為令下回向意初中三一明求法行二能悉下明施行三如大勢下引例證成初中三一處王位有三義一高可勵下故二具施物故三顯法尊故二求法時下顯非餘為故言乃至等者舉少況多故三生難一句明重法極故按諸經說此行菩薩乃有衆多今略顯少分一如菩薩本行經說處闍那伽梨王為求一偈剜身千燈二如大品說薩陀波崙菩薩往曇無竭菩薩所求法割身肉賣三如法華提婆達多品說有王求法於阿私陀仙捨身為奴僕牀座四涅槃二十二云佛昔為菩薩時為於佛所聞如來證涅槃一偈賣身割肉日取三兩滿足一月其瘡苦痛以佛神力平復如故三十三說菩薩為求正法身釘千釘五如薩埵王子為求半偈高嚴捨命六如慈力王於五夜叉邊求法任就身上食熱宍血七下文入法界品中普賢謂善財言我法海中無有一文一句非是捨轉輪王位乃至一切所有而求得者如此等文廣如別録恐繁不具也三能悉下正顯行施可知二施行所為中云一切智道者道字梵本中是菩提也三引說證成中二先舉人後勤求下顯行行中十一句初一總餘十九別九云離世戲論者戲論有二種一四謗中第四句二但法隨言詮即為戲論餘並相顯二回向行中二先牒前起後後所謂下正顯顯中十願初二唯施行願三六七兼求法行願餘並唯求法行願九云菩提光明者謂無師智光照性成行故餘文及三結四意並可知第四十四辨為王斷屠煞中四一施行二以此下明回向行三是為下雙結四為令下回向意初中二先總後別總中三一行所依身謂王身施法令自在故二普行下明無畏施三普施一句結後別中九句一不恃自在欺陵奪命二廣修大行三御物以慈四不恃勢侵惱五令衆生安如如意寶六志願菩提七自住三聚戒八令他住三聚戒九令不能持三聚戒者令住五戒防初最切二回向行中二先牒前起後後所謂下正顯顯中十願於中皆有等流願願壽命長而差別者由施無畏離惶怖失念故初及第十中願得智慧也由施無畏令彼歡喜故第二第八中願得供養恭敬佛由施無畏令彼不恐怖斷命顏色不衰變不受苦命盡故第三第四第十中願修及得不老病死由施無畏令彼不恐怖故第三中願離灾毒由隨彼意再得壽命故第四中願得壽命自在然隨意住并第七中願得成滿大願由依王教命得存歡喜故第九中願得學佛學得法喜由王教於斷命畏得無畏故第十中願得勇猛精進第六中云壽命門者即此施無畏為壽命之方便故即從此施長佛善根餘文及三結四意並准可知第四十五救損男形中四一明施行二菩薩爾時下回向三是為下結四為令下回向意初中三一唯無畏施二菩薩爾時下以財法施成無畏施三復以下唯法施成無畏施初中三一見所救境二見是下明能救心三令閻浮下正成救行並可知二中三一珍財施成無畏施二汝之下法施成無畏三作是語下正財施成無畏施文並易了三唯法施成無畏施中二先標後所謂下釋前說法令悅等慈俱救故後釋中二先釋為說妙法後彼人下釋令歡悅前中三一示苦因果令畏苦斷集能息流轉名寂靜法二修行淨業一句示果令修道名淨業三互起下勸改前心翻怨成親後釋令悅中法既稱悅如說行故捨罪惡也此是菩薩善巧救生慈悲平等不爾但救被損見苦不救損他當苦菩薩行於衆生何愛增也今令歡悅者即聞法解怨非王勢抑又捨惡業苦果此彼親和菩薩自行復立展轉相因共成道伴擬行菩薩道者說之二回向行中二先牒前起後後所謂下正顯顯中十願一一中皆有與前行等流之願文顯可知而差別者初願中令得成佛故云得馬陰藏相二中以想不具者心怯弱故不成修持梵行故故云發勇猛等救行既令免彼怯等故回向還令得似彼所免三中具丈夫智可為主導餘同前四中離欲同前梵行五中善男子法同前修梵行有智亦如前說六中根不具者身力心志多不能堅強故云具大人力等七中翻彼無志力不能堅修故非世所有之物智故八中同前修梵行九即是佛智能伏物令宗信故十望於九是因位丈夫故三結可知四回向意中十一句分三初一總次九別後一結意總中云具丈夫形者此有二義一具男子根故二具丈夫根故二根何別謂男子但異女人丈夫兼顯道德今意取後故云丈夫不言男子也涅槃十八云一切男女若具四法則名丈夫一近善知識二能聽正法三思惟其義四如說修行又二十三云若有人能供養父母恭敬沙門及婆羅門修治善法所言誠實無有欺誑能忍諸惡惠施貧乏名大丈夫言守護等者由護衆生不令壞男形是故回向令能守護行丈夫行者使其不退生佛菩薩家等次別中一令自修丈夫行成二修丈夫勝行者即此章中救苦施無畏行也三有丈夫者即此功能顯示七丈夫道也道字勘梵本云揭底底音丁夷反此云業七丈夫者古來三說一云是七賢聖也一隨信行人在修行地中由他得廣隨他而行故從方便時為名二隨法行人在因時以依法隨法而行從本為名三信解脫人由信根而得度故四見到人由慧根而得度故五身證人滅定無心由身尅證第八解脫故六慧解脫人但離無明等諸煩惱障慧得解脫故七俱解脫人離煩惱及定二障得慧解脫及滅盡定故此七人初二在見道三四五在修道六七在無學道此七人梵本名補路沙此云丈夫舊翻為人問何故回向為令衆生成小果耶答此但願令成七人事業由此事業是丈夫行故非是願令得彼小果一云此依七地分別名七丈夫一種性地二勝解行地三淨意樂地四行正行地五決定地六決定行地七到究竟地此中初二地前次一初地次一從二地至七地次一八地次一九地後一十地及佛地一云依本業經分因果位地亦有七類丈夫一十信二十住三十行四十回向五十地六等覺七妙覺上三說中若據名順則初釋為勝若約理當則後二為勝四具足等者種字梵本中是形字謂如師子王身故五教令嚴笈故六三時不惜身命故七代衆生受阿鼻獄苦雖無邊劫無暫退故八善決斷決釋故九淨治惑障故後一總結意可知第四十六歎佛出世中四一法施行二佛子菩薩下回向行三是為下雙結二行四為令下顯回向意初中三一見佛興說法二以大音聲下法施益生三以無數下結所作業初中可知二法施益生中六一令聞佛名離我慢益二復更下勸速見成六種行益三復為下說佛難遇令得淨信等四益四復於下令得聞諸佛名等四益五爾時下令得清淨等二益六彼諸下令彼得愧恩益三結所作業及前文並顯可知二回向行中二先牒前起後後所謂下正顯顯中十願一以勸往行令得不待勸往二以勸見佛令得自常樂見三以聞法令得智慧受持等四令聞法修行回向五令憶念佛及觀察佛回向六令速見佛回向七同前觀察然差別者乃佛遍空界無在無不在故八令感起相應回向九令遇佛聞法回向十以歎佛出興回向三結四意可知第四十七布施大地中四一施行二菩薩摩訶下回向行三是為下結四為令下顯意初中三一總顯所施地可二或施諸佛下別辨施處約田有十四類謂佛菩薩善知識衆僧父母別人聲聞獨覺貧孤四衆塔廟此或十七種謂四衆即為四故別人謂自有資財者如不思議境界經說菩薩通一切故善知識局是益我者故問准此文及施蓋車僮僕等中田類除重總有二十五種謂此有十七施蓋中名聞法師一切佛法種種衆生師僧尊宿初發菩提心者施僮僕中病苦正法等其一切佛法之言通備十法行者種種衆生之言通神天鬼等若施食飲等中通有畜生故後總結諸施行中云種種趣生皆來集會若約回向施善根田則遍通法界一切聖凡數類難量問且如上諸田望三種田如何配攝答此有二門一正二兼若唯正攝則佛法菩薩聲聞獨覺塔廟衆僧四聚衆名聞法師一切佛法尊宿師僧初發心等皆是敬田父母恩田貧孤病畜是悲田若約兼攝有八句一是敬非恩悲謂聲聞獨覺合四衆僧一分二是恩非敬悲謂父母俗善友三是悲非恩敬謂貧孤病四是悲敬非恩謂前初句有病者五是恩敬非悲謂父母入道及出家善友六是恩悲非敬謂前第二句有病者七是敬亦恩悲謂出家菩薩貧病八非敬非恩悲謂別人自有資財或外道故問諸田相望勝劣云何答此事繁廣不可備載如別記說三於如是下明施好處地及施處中營具所須按此中回文稍異梵本梵本中云於如是等所施之處感備資生令隨意用其處悉是安隱無畏無諸怨賊毛竪等怖菩薩下同漢本二回向行中二先牒前起後後所謂下正顯顯中十願地有多義謂生成住持不能分別等一是生成義喻無分別佛智生成人天二乘菩薩行果故二三是持義四無中分別義五中持成義六七八九是住持義十是生成義三結四意可知第四十八施僮僕中四一施行二菩薩爾時下回向行三是為下雙結四為令下顯意初中二先總顯後供養下別辨別辨中三一明所施田二以百千下所施物三又皆下明感因初中可知次物中二先明數量後其諸下顯三業德能文易後感因中二先辨其因是淨業謂同行菩薩道以願力回向諸善根所得非是竊盜罪業所感故後才雖明德能然欲顯是淨業所感方有此能故從感因判文二回向行中二先牒前起後後所謂下正顯顯中十願約所施僮僕性調順順主教命善事順宜等於中初願約性調順作益事二約順主以事受持故命三約一向歸主四約勤順行事五約勤事六約受教不忘亦無違拒七約於主信樂敬護八約淨業所感施時不戀亦約亡相九約一向樂主無背捨心十約信順教命行事三結四意可知問以僮僕施他還令作僮僕何如放之從良善根回向益菩薩行海無善不修此二善根皆須修習但放從良有三義關一行海不具二彼僮僕本願不滿三佛果𨷂此應機之德第四十九施自身為給侍中四一施行二菩薩爾時下回向行三是為下結四為令下顯意初中二先標所施身後布施之時下明能施之心前中准梵本應云以身布施為給侍時其能施心中梵本云布施之時生謙下心生地敷心生大地心悉能忍受一切諸苦不取自在生給侍衆生下同依現文中三初布施之時一句總次生謙下六句別後安住下結並可知二回向行中二先牒前起後後所謂下正顯顯中四十願總分為三身是總相願通多種准釋易知初十願中三云義利者現當益故世出世益故離惡稱善故福慧故五中了菩薩行一法性故六在三賢數故七言必契真故八令自他具信他中得淨佛法者淨即信也餘文可解次文此下十願缺一於中前八別明願後一總結謂一供佛二解法三受四持五讀六誦其不忘等釋上持字七自調行八不調下調他行後結可知後又以下十願一塔者具云窣堵波此曰歸宗之所今此願云令與衆生作歸依尊崇田中第一故五云第一好施處者如好地少種多收故十中證得第十法界無量回向行如風行空無所障礙證字取契會相應之義餘文及三結四意並可知第五十聞法喜悅身供佛中四一聞法以身供佛行二菩薩爾時下回向行三是為下結四為令下顯意初中二先明以身施佛後佛子菩薩下結前重顯前中二先聞法施身行後心常憶下法施利他行前中二先明施身後欣樂下聞法自利前中二先施身所因謂聞法喜信故後能以下正顯施行後聞法自利中十種一聞法欣二樂三信四解五尊敬說者六讀七誦八受九持十行謂由修行普入諸法善根方便故此句亦是總結上九種各多善根悉能趣求獲得故云善入後法施利他中三一同佛敷演二說佛果乘三利物根熟後結善重顯中三一結前聞信善二安住下結前聞法自利三亦令下結前法施利他於中八一斷疑二心悅三福具四利物心恆五成十地智六近佛七修淨土行八供佛行二回向行中文二同前後正顯中十一願多分依前四行發一由聞法二法施三施身四供佛初二願但依三四行第三願通四行第四願依一二四行第五願依一二三行謂聞說此義施身復為他說此義所聞何義謂聞佛身應現常一常多非一非多機見無來機謝無去如水鏡中影悉能分身梵本云悉能普現第七願同第六然無功用第八願依三四二行謂但有佛身處即隨往生在佛衆會第九願同第六然三忍中諦察力大依此為因故不可壞餘文及三結四意並可知第五十一以身施一切衆生中四一施行二菩薩爾時下回向行三是為下結四為欲下顯意初中二先明施身後為不欲下明所為中二先為衆生所得有二謂一為令修善圓滿二為令修善不忘後菩薩摩訶下為自身所作有十種一能法燈照二法樂攝三法藏持四法光覺五隨應現梵本云為世影像六為行增上緣七為解增上緣八行平等慈九行無緣悲十普隨所應各令獲益二回向行中文二同前正顯中十願既捨身與衆生而願中乃多分屬佛者翻劣成勝故初中施身與衆生即是近他屬他家今翻彼故近佛入佛地下翻准此二翻順愚拒施行三翻處凡家不調慳四翻不依教行施五翻迷教理不得涅槃六知足是佛今施身具知足者之行故生佛家七捨受身癡欲得樂佛身之淨欲八施身是生勝善九害慳身賊十依教施身是護持行法三結四意可知第五十二施身給侍佛中四一施行二菩薩爾時下回向行三是為下結四為欲下顯意初中二先標施行可知後於諸下釋所為所為十句三云護佛菩提者謂為紹繼佛所得法故餘文可知二回向行中文二同前正顯中十願初二約侍佛用心三約近佛八翻勝劣之差及劣不自在故餘文及結并回向意中十二句並可知第五十三施國中一切物及王位中文四同前初施行中二先總標施物可知於後於諸下顯施所為於中十一句初一句總餘十句別總中云於世事自在是標無繫下釋標中世事者即王德等釋中無繫者心不繫住無縛者為彼所捨物縛心故無戀者愛心不起故無著者不取其相故別中一但為益生不為惡業二為了業果無實三為不樂世富貴等四不貪上二界勝生等五但為利生處非為自身故云非此處生梵本云雖住世間而無所依六不執蘊等實有自體可得故無依住如前所引智度論說七可解八未曾之言於所為不便應同常不遠離九十兩句易知二回向行中文二回向同前正顯中十此既施王位王復法令自在故皆願成法王轉法輪等二中梵本與三中同佛王於覺中最自在故又王降賊故五中王子繼紹王位故六中成就菩薩亦准五說七中及國土施故八九亦准七說餘文及結意等可知問若有人與他人有怨從王乞其王位若得擬害彼怨菩薩施不答瑜伽四十九云若有上品逼惱衆生行暴惡業者來求王位終不施與第五十四施王都中四一施行二以此下回向行三是為下結四為令下顯意初中二先標所施物後心無下顯能施心初中可知後能施心中三一明施所依心二發心下明施所為三而行布施一句通前兩伴心初所依心中五句若分慈悲則有六句二所為心中前十一句三於智求證據能證說故四淨修者一一離相對治故八自然覺者契無師故餘文可知二回向行中文二同前正顯中十願王京都嚴飾是勝住處故喧𠅈故願中初及第十依勝處也二三四願翻喧𠅈處也五七兩願但施得捨也六八兩願約住處愛著也九約京都中無邊塞山野等灾怖也三結四意可知第五十五施內宮眷屬中四一施行二菩薩爾時下回向行三是為下雙結二行四為欲下顯回向意初中二先明所施物後菩薩爾時下明施行所為前中二先明施物勝後而於下辨畜物心有十種七云無分別無簡報故餘文易了後所為中十句其回向兩句皆應安為欲下謂修此善根為將回向欲令衆生得出離等故回文者不曉此文將謂是後回向行語又此亦能令人謬解謂是釋回向所由解文可知二回向行中十願皆云得三昧者謂翻美色妾樂得禪悅故釋文及結可知四回向意中有十五種初不壞者不為他人所離間故三云滿足佛法者有眷屬是圓滿義故四准三說五得無上智者施有材能女故八具福智者施中有福智故九清淨翻施女是染著相故十一淨法身者翻施以女故十二辨才等者施能談哭歌詠女故如理翻彼無記談等十三捨等滿善成無漏行故十四同前滿足義釋十五以法得明為嚴翻彼眷屬嚴故第五十六施妻子中四一施行二佛子下回向行三是為下結四為令下顯意初中三一明所施物二猶如下引例證成三菩薩爾時下明能施心初中可知二引例中具如須達拏太子經說現莊嚴王者如大王莊嚴經說三施心中二先施所依心後菩薩摩訶下施所為心前中九句初一總餘八別總中行一切施四字通下八句應知後所為心中二先結前生後後自觀下正顯顯中十二句一觀身緣成無有適主況有妻子二中四法喻合結三作第一婦處四同一子想五除惑熱六與樂七誓與一切智八為成無上田願願字應在末九以守護生為自利十解法智光照世十一十二可解二回向行中文二同前正顯中十一願一妻子是己所有同於起變化多身故二由於我身能捨故又同前故三由施於妻子不愛貪於乞不憎恚故四約施子願五妻子被施如自開許無違皆故六同五說七妻子比王是未極自在翻彼為願故八離愛貪惑故九妻子施劣法施願成勝故十妻子被施心無違背決相順故十一同初等說三結四意可知等五十七施宅舍等中四一施行二菩薩爾時下回向行三是為下結四為令下顯意初中先標所施物可知後行布施法下明能施心心有十二種一不取著家宅之相而施文中句例梵本云如理行施於家無著二不起尋伺云是我家宅餘並可知二回向行中文二同前正顯中十願一自施舍宅而願他捨妻子者依假說真故繫縛家在妻子故二云入非家者道門無縛非是家故六云得無㝵法者觀如幻故七得自在位示生三界故八善說不離家之過盡化誘令離故九十兩句同前七說餘文及三結四意可知第五十八施園林等中四一施行二佛子下回向行三是為下結四為令下顯意初中二先標所施物可知復作是念言下明施行所為於中二先辨施所為心復佛子下明廣菩提心前中二句一作善友園林令得可愛善行華果故云好也離世間品云示現一切菩薩威力自在神通是菩薩園林以大神力轉正法輪調伏衆生無休息故此總句下兼並從此開顯第十慈父者常覆護故十一施資具者令得成佛道具故餘文可知後明廣菩提心中二先牒前起後後於惡下正顯顯中十句一本為惡衆生發心修行今何疲歇二誤尚無況有故也三本不求彼恩彼不知何恨四雖不求彼恩然求彼苦滅五心如虗空香臭不能熏毀讚俱不著六觀法無性七誓滅物苦八志願廣大九滅身邊等見十普為物修故諸樂菩薩道者思此十句二回向行中十願一心園林中無間生善草木等二園林是遊戲散亂處今翻彼令得定心故見佛三得遊法園五樂四得定心見佛神足遊戲化生之樂五得佛智真俗非即離境大菩提樂六得菩薩神通足遊戲往佛剎會七以轉變自在化生多劫不厭生死八以多佛為園林住中瞻仰故九以園林之遊戲令得遍往佛剎十園林是遊戲快樂莊嚴之處令翻彼無記不善故云願得善欲等三結四意並可知第五十九大施會中四一施行二菩薩爾時下回向行三是為下結四為令下顯意初中二先標所施會後普令下明施行所為前中二先舉會廣大數量後一切下舉會營緣如法後所為中十五句一離惡二成智三開施門安置清淨福田七三時決定印持無相餘文可解二回向行二同前正顯中十四願一亡二我為衆生故二中九施初是總句謂即大會施時自但有物竭盡施故不選田故勝物施故無過故起超下故與超下者手齊故離我我所故即前之施稱佛心故三中云第一諦主乃至證自境智者謂法施令脫苦乃至令得證無智外之境故四由施所要彼心安靜或施食得命施乘得通或為說法得慧地等十中云應時者隨時隨欲故十一佛是施行之果故諸願中多云到彼岸者各隨所應皆究竟故餘文及結意等並可知六施資生中二先明施行後佛子下回向行前中三一標所施物二心無下施所依心三為欲下施所為二中五句三中一句並相顯可知後四向行中十願資具多種故願亦多此中略顯隨事准知一施沐浴調身資具願二施掃拭資具願三施舟船願四施造食資具願五施成就損補二藥資願六施車乘資具願七說法時資具願八施修行者道具九施具解行者資具願十亦施法師資具願上來第二別明以諸善根成回向行竟然其六十門內第十林座但一床敷無二物也施車中并有駿馬象師子座采女百千丈夫十萬幢幡所愛男女女寶伎女童女太子十五類施象馬中二種施幢幡中二種施冠中及髻珠二事救囚中并財寶妻子眷屬自身七事施耳中及鼻二事施牙中并齒二事施手中并足二事施體中并宍二事施腹腎肝肺中四事施手足指中二事施為法中施國土城邑人民庫藏園池屋宅樹林華果珍奇妙物宮殿樓閣妻子眷屬王位二十一事施大地中并造精舍塔廟什物等五事施國土中一切諸物乃至王位中物類無量不可知數且總相為二種施京都中城闕防輸稅四事施內宮眷屬中伎女侍女二事施妻子中二事施宅舍資具中二事施園林臺榭中二事施大會中色類甚多且為一事施資生中既云一切資生其類難名亦且為一此上除重已外粗相且有一百七類為據施國土中一切物及大會施并一切資生中一一名數則無量無邊也第三總結前諸施行成回向行所為中二先總結前施行所為彼佛子菩薩摩訶薩以此善根為欲下總結前回向行所為前中三一結前施所為二時十方下結前所施田三菩薩見已普下結前能施心初中二先總二牒前施物種數後為令下正顯所為前中言阿僧祇者總相之稱非尅定量即如上說施國土中一切資生等是也後所為中十句前七句通令自他得如是後三句唯令他衆生得如是文相易了二結田中回文不次應云種種趣生形類福田求索以趣中辨生生中辨等故三結心中三一正明能施心有八可知二時諸下明受施者心中謂大慶傳讚遠近歸三菩薩見已歡喜下明施者心喜中二先假說比況後菩薩摩訶薩見乞下明由喜獲益前中三初標喜次假使下正況後悉不下結勝初可知正比況中始從帝釋於百千那由他劫受樂乃至淨居天受不可說劫樂此則舉九三所受決樂皆不如此菩薩見乞者受施稱心歡喜時其心慶悅此中色天排次闕第二禪少光天等又依阿僧祇品從那由他數直越其末後十大數中闕不可量排次正當第二禪王此應梵文缺脫也問何不以不可說轉不可說轉數配無色界天受樂耶答此回向菩薩慶樂之心猶未究竟故無色攝報非顯現故本業上卷配攝報果亦到淨居問四禪已上捨受相應如何此說彼地有樂答此有兩說一云彼地無報樂有禪樂故禪定必有調暢適悅故一云此但假設非實有樂故問金輪王但王一四天下何故此云王三千樂答此亦兩說一云此假使言非有實金輪王王三千界故梵本云假使轉輪王受用三千界中人間一切資具快樂經不稱劫一云准本業經上卷輪王有十五種謂從十住菩薩作銅輪王乃至第十五佛果為千輻輪相此中是第十四覺德光相輪作三界王當等覺菩薩也後明由喜獲益中有十種文顯可知二總結前諸回向行所為中十句一利益二安樂三中義字是利益利字是安樂此三句相望但總別爾更無別相具如上釋餘文可知上來隨相回向了第二離相回向者前正隨相時即作此離相同時成就然以言不並彰依發教之施設故致此前後爾文中五一廣顯三輪相離二何以故徵三無有下釋四菩薩如是下會違五佛子此菩薩下結初中二先標二章後無衆生下別釋前中一三業解脫二三業無著三三業無繫繫即縛也身口二業與縛著相應者此俱離故別釋中准標分三一顯於施者受者及施物中一分假者我差別相心無縛著二佛子菩薩摩訶薩如是下明於前假者所依蘊及施物一分非情色法心無著三佛子菩薩摩訶薩若能下明於蘊等不著故亦無縛初中二先明於成成差別相無縛著後如是下顯其成行前中有十八句謂菩薩行施及回向時於施受及物一分有情謂妻子等上一一不起此諸見故若施自身時離二事縛著釋我差別相具如別章後顯成行中五對十句初如是兩字貫下諸句如是等者牒前無衆生等離我差別相謂前云無者即是於衆生等了無縛解等由此故成回向行也初二句了生等性離而不縛故亦不解次二句了其因果亦本無實次二句能了之心非一向見故次二句施及回向無貪思并行後思皆與法性相應故後二句與前相應思心王亦同思准二於假者所依蘊及施物一分非情色法相離中二先總牒修行時心後不著內外下別顯顯中八對十六句初兩句約自他身或情與非情中一分說次兩句約心境說次兩句約因果法體次兩句約真俗或俗真謂以有生滅事行回向無生滅時俱不著故次兩句回向業思及思離相次約色蘊三句成對謂法體及生滅後約心蘊三句成對亦爾此皆通前施物中說三由於蘊等無著故亦無縛中二先牒前起後後則不下正顯顯中二先明不縛後若能下顯不解前中五蘊各三謂體及生滅文顯可知縛著何別者久染曰著久著名縛謂於施行及回向行中三事人法蘊體及生滅等離彼縛著等故後顯不解中兩句初句牒前了法本無生滅故云不縛後句正顯謂了本無縛故亦無解二徵意云聖教現說從業生果心為能著境為所取何以此云無業果能緣所緣等故三釋中二先總顯後非一下別釋前中二先別釋後一切下總結前中三一以法無性故三世推不得言無少法者如沙中少油亦無故二以法無性故境無可取三以法無性故心無能著後總結中二先結前無生等體相後無有下顯前無性義言無有自性者謂諸法從緣有此有即不有故云無自性性即體也言自性離者謂有此性成性即離故後別辨中十對二十句第九句是勝義世俗法故餘文可知四會違者前徵云聖教自說有業果能所生等何以今乃皆說無故故此會云聖教說有約隨俗說故今說無者約勝義說各據一義不相違也文中三初法說次了知下喻顯後解一切下總結初中二先明菩薩依勝義諦觀說諸法空後言語下明教隨世俗說業果不失前中云一切法非法者諸法當相離故後隨俗中二先總顯之非法為法者謂於離名言法以名言說故後不斷下別釋中二一不斷壞世諦因果二不退捨出世因果文顯可知次喻顯中二先喻顯勝義後而亦下法說隨俗前中四喻一業緣感果雖歷然不失然如夢所見覺已都無二說法音聲雖利物成用然應緣如響音竟無作者三衆生果相從因所起如影起質自體非真四諸有為法如約緣成本來無實後法說隨俗中二先明勝義時不乖世俗後了知下明非直了真不乖於俗亦乃由了此故知業廣大亦可由此了故方是廣大了知業用以了業實體故三總結者上來約真俗會違顯非即離非約各別說也此中初句云一切諸法皆無所作者此顯真不離俗故正起作時相盡離作非不作名無作也後句云行無作等者此顯俗不離真故正起作相盡時不滅壞起作之相故乃至云未曾暫廢言行無作道者道行也五大段總結者總結上來所有回向心皆安住離相中三一明能回向心安住離相二若處下明所有善根皆向佛果處者謂與無漏心相應修故非處者有漏心修及二乘心修故三於一切下明所有回向皆悉離相言不退轉者離相心常現前故第三釋此回向名中二先總徵名後永度下依徵別釋前中可知後釋中三一釋回向二字二佛子菩薩摩訶薩如是回向時則為隨順下釋隨順二字三佛子菩薩摩訶薩如是回向時則為了達下釋堅固一切善根六字初中十釋一回可破壞虗僞因向不可壞無虗僞果故此總句後皆別依總建立二回有擔纍因向無擔纍果三回依語言因向離言果四回取相心因向離取相心果五回有身見因向無身見果六回有所依因向無所依果七回有有功用因向無功用果八回有漏善根因向無漏善根果九回向有所取著因向無取著果十回世所有諸法因向出世所有應生諸法果彼岸之名是究竟義故贊以果名釋以因言前所回施行也二釋隨順中二先標後釋釋有十義皆准回向所說謂若如前回向之所向則具十義故一順佛果二順教法三順正智四順圓智所證真俗非即離境五順教所詮隨機分別六順三世佛回向方便七順所為境八順道諦九順真如十順斷障皆云住者一一依彼修行故三釋堅固一切善根中十句分二初四句總標後六句別釋前中一由能隨順回向故則已了達理教行果真俗諦法二由能隨順回向故則已承事一切佛故三事一切佛故上二何別者前但隨順回向則當事佛後實承事故別顯示四供理教等法後六別釋者別釋前初了達之言如何了達一了無滅壞以本不生故二了無乖違如性無異故三了好法好無故無可貪四了惡法無惡故無可顯五了內外法有少滅壞違因緣道不壞俗諦故大法力等者真諦常存故上來第二大段依徵廣釋竟自下第三大段依釋結名可知上來第一大段明位行了自下第二大段明位果中明得十種堅固不退初一總餘九別別依總故於中四能順教及所詮八凡所生處即具此回向修行緣九云一切金剛等者准梵本應云堅如金剛一切不能壞謂喻此中回向志願也十於五欲境不為貪愛等所縛著故云自在餘文中可知上來第一大段長行了自下第二大段偈頌中二先明說頌因緣後菩薩現身下正顯偈頌前中四一標說偈者名二觀察下說頌儀式三入於下說頌所為四承佛下說頌所依初中可知二儀式中三一顯無漏心故二彰說稱根三表說順理三說頌所為中九一為依教契理二為修大心三為悲覆世四為長佛種性五為所修行與佛功德冥契無二六為成佛自在力身七為知所化欲樂八為隨機善根而成就九為現法性之色身四顯頌有憑可知後正顯偈頌中總四十一頌分二先三十五頌半頌前位行後隨順思惟下五頌半頌前位果前中二先五頌頌前行所依身後飲食下三十頌半頌前依身起行前中可知後依身起行中二初一十九頌頌隨相回向後菩薩觀察下十一頌半頌離相回向其中第七頌云諦觀等者梵本中云諦觀己身十八界六根六塵及五蘊釋曰准梵本文義無乖殊若依漢經乃違大意此中大意頌前隨相回向中施身時觀身蘊處界體性非有豈曾觀外及自身耶又十二處言為起滿七字而云十二種處者此潤文之因也讀漢經者將梵本中有此種字不敢輒論今見乃知餘文准釋第七等隨順一切衆生回向中二先長行後偈頌前中二先明位行後菩薩摩訶薩成就此下明位果前中三一牒名徵起二佛子此菩薩下依徵廣釋三佛子是為下依釋結名初中云等隨順一切衆生者等是平等能隨順心一切衆生是所隨順境謂於一切時處以一切物施一衆生如是一一衆生所施亦爾此即等之隨順依主釋也若依本業釋云以觀善惡父母無二一相一合相故釋曰善父母者親也惡父母者怨也謂觀怨親平等俱生法身故皆父母依此釋者應名平等隨順回向一切衆生第二依徵廣釋中三一施行二佛子摩訶薩以所積集下明回向行三佛子菩薩摩訶薩修行如是下明行所成益初中二先明積集過現善根後佛子摩訶薩復作是念願我下明以願積集未來善根前中三一列所積集善根名字二佛子菩薩摩訶薩於此下明前善根積集成德三佛子菩薩摩訶薩以得下明積集堅固集前諸善根初中有三十一句晉本有四十句光統法師判云初十是行出自中次十起從緣發後十功成在己本疏云初十直說善根體次十約境以明善根後十約度以明善根今謂此文布列前後猶依梵本未回文也若回應以初十一句為第三段次佛境界等十句依定為第二段後勤修一切下十句為第一段所以者何十度即明善根體故須先說也佛境界等是生善緣故次應列也小善根等是前善根分齊數量故宜後也若不爾者十度等善應無小大等善應別有體佛法僧等應不能作善根緣故如是一一廣說應知排次雖爾釋且依文初段中前四及第六句約分量說餘七約數量說前中初云小者謂如施行中施粗物少物輕心簡田劣田等或中五或一分二分等餘行准知二大者翻前可知三廣者普為衆生平等施故或等准知四多者所施未至無量已來皆名為多五名無量者阿僧祇轉阿僧祇轉也六種種者色類衆故微塵數者一三千界塵數也阿僧祇者至至也無邊際者無量轉無量轉也不可思者不可稱轉不可稱轉也不可量者不可思轉也此中數名准阿僧祇品不令次第應知中十句皆名境界者凡所屬齊若親若疏但此攝者則此境界七云心者通八識所以者何末那不令違方成似無漏賴耶不受熏善根無種故八九內外者想塵故也餘文及後十句准釋可知二明前善根積集成德中二先明修時所起方便後得堪下正辨積集成德前中十種初一總可知餘九別一正修時住作意二加行三修成攝屬四收攝眷屬相因起者五修善根時辨諸緣具六聽法得解七修時亡相八說法勸發他心時此十方便不唯局在修一菩提乃至總相述一切也後正辨積集成德中三十七句分二前二十二句明自利後於虗下十五句明利他前中初云得堪忍心者成諦察法忍故十云長佛善根者增長成佛之善根故二十二云住究竟道者梵本云具道資糧利他中云嚴淨大道者梵本云淨治佛道餘文易了三明積集堅固前善相中二先牒前可知復作是念言下正顯顯中十句初一標起念所在次五善根所從次三善根所為復作是念時下一句結念成益後明以願積集未來善根中二先總標願心後願令下依標別顯前中謂以願攝持前諸善根盡未來劫所感依正令與施行為資及以回向故後別顯中二先明外施願後佛子菩薩摩訶薩復作是念我為下明內施願前中四一別所願施施物略列十種皆阿僧祇世界施滿者顯廣大施故二假使下明無限施有三種一時無限盡未來故二心無限未曾厭倦故三乞者無限一切衆生故三佛子菩薩摩訶薩如是下明施心行相略顯十種前五離過後五順理可知四佛子菩薩摩訶薩以諸下結前無限後明內施者內謂有情簡外非情故王位依有情內身故內攝也文中四一列願所施物二菩薩摩訶薩以如是下明無限施三大悲普下結前六種無限施行四菩薩摩訶薩如是施時下明施心行相初中略列十種施一衆生二無限施有六無限一物無限如經以如是等種種諸物故十顯無盡故二時無限如經盡未來劫故三心無限如經安住廣大一切施心故四乞者無限如經如施一衆生盡衆生界一切衆生皆如是故五隨求無限如經如是給施一切衆生皆令滿足故六施處無限如經如於一世界於盡虗空遍法界一切世界中悉亦如是故三結前六種無限施行中文即為六一處無限故大悲普覆二時無限故終無間息三乞者無限故普加哀愍四隨求無限故隨其所須供給供養五物無限故不令施行遇緣而息亦心無限故乃至不於一彈頃生疲倦心准此內施有六無限前外施中當知亦爾略故不說或應文通四施心行相中二先牒前起後可知後所謂下正顯顯中有十九心一不染施因或此行不為心著二不繫施緣或不為緣緣縛三前二俱離四施行不可令退壞五與法性相應六巧施攝生七不與二執相應八於能施者不見現在存活之相或不見有接後之相九巧治我所十與定相應十一不起身命之計十二梵本云具種種寶性心具是獲得在己義種種者諸菩薩種種知解心可貴如寶即此可貴心成種性故云性心也十三施不望報或不見當果有實自性十四明教法十五具如此品上下文說十六違所詮十七令得佛正體智十八以教法照機十九令得佛後得智第二明回向行中二先明隨相回向後佛子菩薩摩訶薩如是回向時不著下明離相回向前中二先明自以善根回向衆生後又勸衆生下明令他以善根回向衆生前中二先正明回向後佛子菩薩摩訶薩如是回向時發歡喜下明回向所為前中二先牒前中二先牒前起後可知後所謂下正顯顯中十句皆約前所施內外物等流回向一約前施財貨及寶二約前施善根所感依正果報悉施衆生及以善根回向乃至六種無限施是無盡功德藏三約前施牀座准梵本中具臥具牀數四約前施行皆為衆生是順菩薩道業五約前施物皆殊勝皆離相六約前施象馬寶七約前施象馬迅速巡遊四天下故八約前施伎女及男女翻顯染情及恩愛故九約前施心平等無簡擇故十約前施身頭眼血宍骨髓奴婢作使等難處有苦不自在施身肉忍苦奴等不自在願衆生得生無苦之處自在無礙故後明回向所為中二先正顯所為後佛子菩薩如是悲愍下結前所為前中二先牒前起後謂牒前回向時智所回善根衆生定得故發生歡喜後為令下正顯顯中有一百一十句依本疏科分為六段一從初有二十三句為令修善趣賢首位行於中第十一句云無悔者施已慶喜故無惱者自樂施故第十三云住隨順施心者隨乞者所須滿其意故第十四云住攝取施心者以施攝生故第十九云住如金剛極大力施心者施心堅固不可破壞故第二十云住如日光明施心者慧光破慳蔽障故二十一淨三輪智成佛智故二十二有二義一以衆多善根為眷屬故二以具多善根者為眷屬故二十三巧能生長善根之智慧相續現行故餘文易了二從得不可壞淨心圓滿下有八句令成種性中修行初句約令得信究竟故三從成滿菩薩無量清淨神通下有十句令成解行位中修行第十句無量心者四無量也廣大心者無限量也最勝心者無加過也悉清淨者皆與無我相應也餘文可知四從成就清淨等施心下有八句令成十地位中修行十度等行第七句令得成就純淨無漏無邊體事此是理事理事無㝵法界餘文可知五從住平等行積集善法悉圓滿下有十句令於等覺位修行第九句令證得巧生功德之智第十句令成同體大悲所生善根乘薩婆若來化有情是一切智乘餘文易了六從嚴淨一切諸佛國土普圓滿下有五十一句令成佛果行第四句云令得六十種音聲發言誠諦皆可信受百千種法而以莊嚴如來無量功德妙音悉圓滿者下文佛不思議品云一切諸佛皆悉具足六十種音聲一一音有五百分一一分有無量百千清淨之音以為嚴好是也大莊嚴論第六云如來有六十種不可思議音聲如佛祕密經中說云寂靜慧如來具足六十種聲語所謂潤澤柔軟可言言樂清淨等如是廣說此中潤澤者衆生善根能攝持故乃至第六十名宣諸德音釋曰祕密經者即密跡力士經也論文但五十八種經中數足具顯如章第六句明佛無盡辨逗機說法第八句衆生一聞說法不墮二乘中故第十句應時佛物修利他行故第十一句中等字是皆義第十二句云於一莊嚴無量莊嚴者佛依正二果中一一皆爾嚴故第十三句等入等者皆令入三世佛境界盡故第十七句云行不動業得無㝵果者其因有四一就機法施二無障礙願三悲心亡已為物受生四修法性鎔融行感三業無功用盡衆生界同時普應無所障礙第十八句諸根者眼等根也第十九句云一相者謂無相也知一切法皆無相故第二十五句云大力田者如出現品說於如來所種少善根能壞一切有為煩惱乃至究竟如來涅槃智慧故第二十六句云堅固第一等者悲願決定不可破壞故第三十二句以一行願普滿一切行願三十八云以一心知一切心四十三云於一處出興一切處出興四十四云嚴淨一衆會一切衆會皆嚴淨四十五云於一佛土普見一切佛土等者皆一即一切一切即一故也四十九云得非一等者此有二義一修因謂觀有為無為非一異故修諸善根二得果謂由前因得法性相應神通轉變一切染淨體事相即相作等非一非異自在無礙此依業用門說上來且約一相分此六段理實不然所以者何第六段令成佛果位中第三十一四五六等句內方說令得修菩薩行遇善知識等故故知諸句一一各別回向所為不必依位排次而說故不可科段配位也後結前所為中二十句初一句總牒前能為心後咸令下正結前所為將此一十九句屬前一百一十句流類可知恐繁不述後明令他以善根回向衆生中三一略明回向之善根二為令一切衆生悉得安住下明回向所為三又以諸下正顯回向問何故明菩薩自以善根回向中則先明回向後辨所為今此令他以善根回向中則先明所為後回向答理實不別為異自他故作是說言不別者如言為此事故回向或云回向為此事故此但語言異勢義無別也就初略明善根中三又勸下八字標簡前文教他非自次普為下明修善根後方便下八字顯所修善為將回向初後可知修善根中有二先八字是大悲伐苦行後以大下是大智觀察行可知二明所為中有六句初句令住佛果果位德海皆是殊勝純無漏故二中性體也義用也功能也餘文易了三正顯回向中二先牒前起後後所謂下正顯顯中十願初云安隱者非相遷故三云安樂者適悅故餘文可知後明離相回向中二先正明回向後佛子菩薩摩訶薩如是回向時以此下明以回向善根復將回向前中二先牒前隨相後不著下正明離相前中何故牒前者以正隨相時有此離相故後正離相中十句一離施因二離施果三離內施四離外施五於起行處離六於起行方所離七於足者離常八於乞者離斷九於所施物及行等離有見十於前句境離無見後明以離相回向善根復將回向中二先明牒前善根將施後願一切下明以施善根回向衆生於中六一果智圓二惑障盡三智明四定心五離緣縛六成佛種第三明行成利益中二先正顯利益佛子菩薩摩訶薩如是修習下校量顯勝前中二先牒前後超出下正顯顯中十一種一超世間二普修下修下修普行三悉能下見多剎無障於中二先詣後見四又能下見多剎菩薩修行五以善下巧說深法於中二先義辨後得陀羅下無斷辨六念念於下供多剎佛七念念嚴下嚴多剎於中二先果嚴後修行下因嚴八念念令下清淨成就多剎衆生九於彼下多剎中勤修諸度攝衆生成淨業十得無礙耳下聞多剎佛轉法輪不生厭心十一住無所得下住菩薩無所得神通於中二先辨名後於下顯用言與諸菩薩等同一見者因一無所得無依無作著見故後校量顯勝中二先正顯校量後一切佛剎下逐難重釋前中二先舉劣後況復下顯勝可知後逐難重釋者謂前舉劣中云尚能成就無量不可說清淨功德之言恐餘未解故重別顯文中分三一明得法門二如是回向時衆生不違下明成就行三佛子菩薩摩訶薩如是回向時得業下明觀利益初中二先別說後佛子菩薩摩訶薩如是回向時得一切下總結前中十句各約同類法互望一性無差別故皆云清淨平等餘文及結可知二成觀行中有十五對分三初六對明異類事事互望無㝵次法性下兩對明同類理事互望無㝵後剎平等下七對明異類事理四句無㝵初中一依正二二業果約引業說三王所四二能所緣五滿業果六業道是業所依因即五六識中造引滿相應思由思能造業業依思故晉本云業不違跡跡今道也本疏云決定思是身口業所遊履處名為業跡又初剎那思為道引發第二剎那思為業體道即跡也又思體為業熏在本識成種子為業跡又思為業業有感諸道果報功能為業道道即跡也隋遠法師云解惑等心起業所依名為業跡辨法師云方便造作名業根本業道名跡次兩對理事無㝵中前一性相互融後一生無生互融後七對事理四句互融者謂如初對中一剎望衆生為兩事相對二兩事各有平等為一理相對三剎望剎平等為理事相對四衆生望衆生平等亦為理事相對分相雖此句四互融觀中一一句即具餘句無所障礙其離欲際句亦是單理事無㝵中攝餘文准可知三明觀剎益中二十句文易可知第三依釋結名可知後明位中果中二先牒前回向行成可知後則能下正顯顯中一十九句一以勝解力摧四魔一摧伏煩惱二慈心增上摧天魔三了蘊實性不能為障道四深解不生非死能繫二貪欲為刺欲傷戒足無漏菩提路三得成初地歡喜因故四住中道實性故五敬福漸增故六悲心深厚故七攝福自在故八現通自在故九遊剎無礙故十勝解契入即事理故十一以一切身修行故十二隨願所修皆成故十三了教法十四為供事佛至一切佛土勘梵本中雖但云悉能遍一切佛剎然其遍字之下往至之義十五十六可知十七凡所緣皆生善根十八心常平等十九得一性體此與第四體同方便異行總結可知第二偈頌中二先經家長行標舉後菩薩所作下正顯顯中二十一頌分三初一頌通顯一切善根悉以回向末後一頌通結上來回向之意中間十九得正頌前文於中分三初三頌頌前施行二菩薩為度下四頌頌前回向行三菩薩回向到彼下十二頌頌前行成利益第八真如相回向中二先長行後偈頌前中二先明位行後菩薩摩訶薩住此下明位果前中三初徵起名字二佛子此菩薩下依徵廣釋三佛子是為下依釋結名初中云真如相回向者謂以所回善根願同真如體相業用多分說相故偏為名此即真如之相真如相之回向依主釋勘梵本中名真如相自在性回向謂相是德相性即體性然性與相非即非離故雙舉也本業經釋云常照有無二諦一切法一合相故名如相回向第二依徵廣釋中二先明隨相回向後佛子菩薩摩訶薩以此善根下明離相回向前中二先明觀察先修善根回向後佛子菩薩摩訶薩見可樂下明觀現境發願善根回向前中三初明善根成就本末二以諸善根下正明回向三佛子菩薩摩訶薩恆以下明回向所為初中二先明善根行相後菩薩爾時下明觀察善根前中有十四對一念堅明二無染修三無功用業跡四堅趣佛果五勇求大法六二利行七超凡小八悲智行九憶持佛法十堅信樂十行十一成多無漏善十二對行福慧十三調物生善十四功巧能回向後觀察善根中三初總辨次其諸下別顯後其中下總結別顯中二先明修時衆生緣後如是下明衆緣中復各多種可知後總結中三一皆依向佛乘心成二皆已回向佛果三皆悉一性二正明回向中二先明回向自身後如為己身下明回向衆生前中三初總標次所謂別顯後佛子菩薩摩訶薩以諸下總結別顯中二十願初身業應機無㝵二語業隨樂無㝵三意業住無我我所四不與四惑相應故無㝵六得教法明智演說無㝵七達智境照悲境是菩提心八常念法界性唯心現前十二厚悲化物久而不疲惡而不厭十三有二義一三慧性中無量善巧思慧方便以修菩薩道二得尋何體性思慧體性為說法方便雖有兩說前釋為勝十六智契諸法本淨性見世相即常住十七得見利平等智一多無㝵十九諸剎各同示即理之事法界此上或有約德相或有約業用詳之可見餘文可知後總結中略舉三願攝前二十願謂初一嚴剎願攝前第十一十二二十次一遍剎願攝前第十五十八十九後一智慧願攝餘十四願其身口二願以隨智轉云清淨也後回向衆生中二先牒前起後後所謂下正顯問此文既云先回向自身後回向衆生者與此經上下文及涅槃經說如何會通故第八難得行云我於衆生無所適莫乃至云盡未來劫修菩薩行未曾一念自為於己欲度脫一切衆生第一回向中云我所修行欲令衆生皆悉得成一切智王不為自身而求解脫又云我為救度一切衆生發菩提心不為自身求無上道涅槃二十一云佛告琉璃光言若聞法已當生敬信乃至云亦莫生念我聽法已先自度身然後度人乃至云應生常樂我淨之想先為他人然後為身答此中先回向己身後以回向一切衆生者此亦無違所以者何回向自身亦為衆生回向亦為衆生既俱為衆生何先何後後正顯中八願除八難業五得佛無垢智光照機六三慧中得了如思慧八展轉示智斷果處餘文可解三明回向所為中二先結前可知後為令下正顯顯中十句初二逢佛三心即是藏藏即名堅入此堅菩提心藏自護不退故六得水月鏡像身應現無㝵故云自在八不起分別名無動搖餘文易了第二觀現境發願善根回向中三一觀現境隨應發願二菩薩爾時下正明回向三佛子菩薩摩訶薩修習下明回向利益初中二先明觀現見種種境界後見是事已下明隨應發願前中見種種境者如淨行品說後發願中二先牒前起後後為諸下正顯前中牒前可知起後中以方便等即如淨行品中隨境發等流願出生勝妙功德亦如彼品云能得一切勝妙功德是也後正顯中十句一勤求善二不造罪三廣集善四以善覆生五作生善依六離相回向七示善令修八智觀機九心境生善境十常修等如回向二正回向中二先牒前起後後所謂下正顯正回向顯中三十一願一得佛平等見六得受樂見善知識眼七見三性境皆成菩薩道緣八寶愛證如智九證智增照十能捨施心是可愛十四善觀真俗不合不散十七於無差別法隨根說差別是方便也二十無漏聞熏成金剛種二十三有堪化機處是可愛樂剎二十五得知諸法無本之方便二十六知諸法無二即是離欲除無能所之斷故即是斷障二十七同前門但無斷障二十八有二義一於諸法無非有非無之戲論二但於法無所分別即為無戲論令取後義二十九金剛藏者堅固義也智道者佛因也三十法性相應善根是無礙善餘文並可知三明回向益中二先牒前修回向時可知後得智慧下正顯顯中十句一得智明二善友攝三佛慧照心四滅癡五策勤六修學入十地智七由回向離相故布善滿法界八由回向離相故能盡因行源應知以智回向四字通上下句九智契善巧回向海十成廣大福慧第二明離回向相中三明初回向時離相二譬如真如下正顯回向三佛子等摩訶薩如是回向時得一切下明回向益初中有三十六句一不著器世間二不取衆生世間三心無所依四離分別見五不捨智慧六順三世佛回向門七順無差別法八不壞佛真相九觀三世衆生等無相十行順佛所行道十一巧說十二解義十三證他智十四悟真理十五智圓十六信堅於業性權實雙行十七了法如幻化十八知法無自性十九觀境及行隨世言無著二十餘執二十一知如實理二十二觀法性寂滅二十三了諸法一實相二十四知諸法相不相違二十五與諸菩薩同出二十六修道攝生二十七入三世菩薩回向門二十八聞佛深法心不驚怖二十九以四無量心令衆生淨三十不起我我所執三十一不分別世間三十二不染著諸境三十三勤修出世行三十四了世法無性故云無依無依故無可執取又無依謂不依根塵識和合有故三十五於深理正見堅三十六離妄了真二正顯回向中有一百門古來諸德莫裕意炬等法師並科此文作十段配屬位地然復各殊遠法師判為二分初十門配地前餘屬地上本疏云今謂諸門各是一法並收真如體相用盡不可相從科為分段今按諸說科分段者說無聖教文非明白不可詳用但依本疏不科為定所以者何此略顯真如無量德相中始一百門得即將配地位耶若爾者百外所餘德相更配何處益蓋知不也然今諸門多辨如相少論體用相是德相如起信論云真如相大者具足無量性功德故此中且顯百也又此一一相中文有三句一標所同之如如經譬如真如遍一切處無有邊際故二舉能同回向善根如經善根回向亦復如是故三合所同如相如經遍一切處無有邊際故或總作兩句謂束後二句為一句故下諸門並准此知其初句云譬如者勘梵本中但應云如非譬如也所以者何梵本只云曳他不言烏簸忙故曳他即是指前准後之詞是曳他之下必對怛他之語此謂亦然若不對曳他則是如也此門顯示善根回向願同如之德相遍處無限二回向了諸法實性三隨緣之不變六證如之智不退轉八即智之如為即如之智證會故云離境界等九十皆是隨緣真如十七如有大智光明義遍法界義二十二法性力故一切行法皆向菩提故同明眼也二十三無分別故二十四無倦故二十五如曾不以一法有性而為性故二十六諸法相即無相是如體性故非出現三十四非有相心行無相行三十六隨緣即不變故本來不取作五十一如能內熏令起厭求問此百門中亦說如體及用何故都名真如相耶答真如尚與一切諸法同其體性不相捨離無所不在況於相中無體用耶是故無㝵也七十了有無無性同如在有無中七十一無㝵故明無餘惑故潔也七十九四無㝵解智全如為性九十五云捨離諸漏者勘梵本云阿那含薩攞嚩此云無有諸漏九十七云過去非始等者晉本云過去非同未來非故現在非異古德於此盡妙思沈研鑽極範法師云此破小乘三世之執謂彼執過去為有若是有者便同現在今既滅無故云非同言未來非故者小乘亦執未來有法流至現在若爾應是故法今既未來緣未至故畢竟無法故云非故現在非異者彼執現在決定是有今明待緣假合推之則無故不異過未之無故云非異裕法師云過去非同者集起而無集起未來非故者轉變而非轉變現在非異者相別而非相別發起新新稱過去也除滅生死者同未來也清淨生者似非異也遠法師云過法無常同歸盡滅於理本無故曰非同來法新生非本有性故曰非故現法皆空故曰非異名此三非以之為如炬法師云過去非同者明如體離雖在過去而非遷滅不同於無未來非故者雖復集起而無起相明已起之處非故現在非異雖在現在而無形處不異過未莫法師云過去滅法與如相似名之為同今明依如起新行願不同彼無故曰非同微塵故業當報方受名之為故今明證如捨彼故業故云非故現在業結不同過未名之為異今觀業結本無造起畢竟清淨故云非異發起新新等釋過去也除滅等釋未來也清淨等釋現在也本疏云泛論三世法有二門一性空門二成有門性空門者謂過去已滅故空未來未生故空現在不住故空今此文內約成有門謂前念法是過去滅以能引起後念法生是故過去非同一往唯斷滅也後念是前念家未來雖由前念滅令此後念生然無前念法可傳至後念故云未來非故是故前念中舊法今無彼也現在法望前念同未來望後念同過去故故云非異是故前念謝滅雖非同盡然無法至後後念續前雖依前現然法新非故是故回向中發起新新菩提心者以前念非同令後念續起令菩提心不斷也由後念非故所以念新念新令菩提心不常也除死淨生顯心作業又現在念念成正覺者了達現在亦平等故見理名覺晉本此中錯翻後門入此門內故有九十九今此勘出故一百足也古德不知此謬又以同故之言難曉雖各盡巧思不符元旨今此新譯文既顯露舊缺復令不待彽徊居然可了言過去非始等者謂真如之性無彼三世初中後相然不礙三世初中後相是故過去非始然不礙過去為始乃至現在非異亦然現是始末之中望前後立故名為異也回向云為一切等者謂菩提之體非去來今然不礙念念中起菩提行故曰新新也九十八回向同始於三世平等九十九諸佛菩薩皆證如為體一百如不與惑俱餘文思准可知三明回向益中十句一嚴剎二為物轉法三與諸菩薩同智願四觀佛體五知不變如六解世語無性七善皆回向八勸善無間九照漏無漏善一性十等順物現通此十句皆有標釋文易可知第三大段依釋結名可解第二大段明位果中三初總標次能為下別顯後佛子是為下總結初中云證得無量而別顯中只列十者是略舉爾次別顯中十句一得決定說辨二得巧化辨三得一多無礙身四得一多無㝵音五小得正報中容廣依力六得小依報中容廣多正報通七得一凡正中容多聖正報解脫八得一多無㝵定三昧九得一句即無盡辨十得遍法界示成佛化物神力後結可知第二大段偈頌中二先長行標舉可知後菩薩志樂下正顯顯中二十九頌分四初六頌頌前隨相回向二以妙下九頌頌前離相回向三如是聰慧下九頌頌位果四若能下却頌回向益第二十九頌云菩薩觀心等者梵本云菩薩觀心不在內於外亦復不可得了知心體無所有由分別有離即無第九無著無縛解脫回向中二先長行後偈頌前中二先明位行後菩薩摩訶薩住此下明位果前中三初牒名總徵二佛子是菩薩下依徵別顯三佛子是為下依別顯以結名初中云無著無縛解脫回向者總徵十種無著縛解脫非別別徵故不云心等釋名者此菩薩於心等十法作無著縛解脫觀行所生善根回向願成普賢所有三業等法謂觀察時不隨相縛見著故無著縛即是解脫故十願無盡非只十法此則無著縛解脫是能觀十法是所觀若據都徵名釋無著縛即解脫無著縛解脫即回向皆持業釋若據別顯名釋則能所觀合說應云無著無縛之心回向乃至云智回向通持業依主也本業釋云以諸法無二般若無生二諦平等三世一合相故名無縛解脫回向二廣釋中三一明所回善根二以諸善根下正明回向三菩薩摩訶薩如是回向時如三世下明行成利益初中二先明尊重諸善根後佛子菩薩摩訶薩於彼下明尊重善根益前中三初總標尊重諸善二所謂下別顯所尊諸善後於如是下總結尊重初中何故一切皆尊重者以其悉是菩提因故若𨷂一則佛功德海不滿足故別顯中九句文顯及結並可知後尊重得益中二先牒前後究竟下正顯顯中一於諸善根歡喜愛樂永無休息二於諸善根勝解不可壞三能自修行四亦令他行五離相修六積集純就七意樂殊勝八心住真俗鎔融境九善根力增時十悉了種種善根因緣准梵本中初一句總餘九句別故彼云隨順忍可時究竟欣樂依正彼善根時堅彼善根時運致自身於彼善根時於彼善根安立威德大心時於彼善根心無著時於彼善根能積集施得自在時於彼善根成勝志樂無滅壞時令彼善根安住如來境時普見彼善根得勢力增長時以彼善根如是回向下同第二正明回向中有十門無著無縛解脫回向一心二身三口四業五根六世間七佛剎八衆生九法十智於中初一門廣攝餘九門准同然初門中二先牒前起後可知後所謂下正顯顯中二先明隨相回向後佛子菩薩摩訶薩以無著無縛解脫心回向不分別下明離相回向前中有六十一願但依文相別分為十段初有三願回向前諸善根願成普賢身口意業二有一願願能起普賢勤行三有四願願得普賢總持四有十二願願成普賢自在力用五有十八願願成普賢行六有一願願成普賢法門七有三願願成普賢方便八有三願願修成普賢行九有三佛願修成普賢智十有一願住菩薩行十一有一願願修賢賢智十二有十一願亦願修成普賢行初中三願如次身口意業皆即之事法界果因故二中一願顯任運無間勤故三中四願願得總持一可知二諸佛常現前三了他言同他言四普遍時處修行四中十二願願得自在力一遍時及衆生身中修行二普現身佛會三成十身中因果無㝵力用於一門者隨於一化方便中現故此純門也四雜門方便餘同前五令衆生住十力者自在力加持故六於衆生身中現佛通并令住行七令一切言中各作一切言皆令住佛地八令一一身容一切身自謂是佛餘四願可知五中十八願成普賢行內第五云不違等者有六句顯能說法不違能詮詞無㝵樂說無礙等六云入一等者一即一切即故智契於一時即契一切言放光者智照教法故七有五句到於等者謂說法時皆以四無㝵解智觀察演說名莊嚴到岸九得法光明等者得諸菩薩行法智十得智一切方便中二先總標可知後所謂下別顯十句初二知數量次二知果因次一知根次一知法次一應時次一巧說次一廣說不畏盡後一說皆了義十一有五句身業稱機現故十二有三句文顯十三有八句廣大衆生等者根器廣大堪為說廣大教故廣大莊嚴圓滿等者實教修多羅藏顯理無缺故十四有十句境界等者智即是印印佛境故十五有總別總云諸根等者根謂二十二根中除男女外所餘皆通別中十四句一慧二定三四亦慧於教自在故解法無盡義故五勤六慧七勤八慧謂妙觀察智相應意識識即是根如前第六回向中說釋界及金剛並如前說此句唯就照理而說故云金剛界根了知一切佛法故離世間品解十根中云如金剛根證知一切諸法性故九釋根名一同前說境異前了法性此照佛智故云金剛焰根光照一切如來智慧故離世間品云金剛光焰根普照一切佛境界故前第六回向施心中云金剛界心與此相類釋曰此上兩句願得普賢與法性及諸佛智非即離之智慧十知根無礙智十一調化方便智十二稱法界器十三因極十四障垢盡十六有標列列中十種神力於中第八定無功用示現第九依性觀餘可解十七有總別別中五一一身速入多土二多土在一身三嚴土智四觀土智五絶小心十八有總別別中六第六了即理之事餘可知六中一願成淨法門此即不思議解脫法門依業用說文顯可知七中成普賢方便內有三願一一念心中現一切衆生多劫心念二以遍法界身一一納一切衆生身三捨三倒常見一切佛身相嚴口說法令機受持了悟八中修普賢行有三願初有總別別中二先明剎相入後而亦下明本相如故前中明一念中十種入剎前六辨一剎入多剎後四顯多剎入一剎十中初二可知三四二句共明一層中三重展轉遞相繞如網之剎五當一剎種上二十層內諸剎由此剎種在華藏剎海內如天帝網次第行布故從此所依攝處而云以因陀羅網分別方便謂以帝網布列喻方便顯示故六盡剎海中所有剎故云普分別一切法界七衆雜類剎入一剎入多入一九盡法界剎入一剎十盡空界剎入一剎後本相如故十對應度者現之故云悉令見二有二先明知諸想後斷一切下明知想益前中三初總明知想所因次所謂下別顯想名後如是等下結知行相初中謂願成普行得灌頂乃至能了知諸想次別顯有五十二相後結能知行相中二先結知速後而離下明離取相二明知益中八句文顯可解三有三初顯修行得他心智次於一一下別顯隨彼何心智皆能智有七類心可知後種種下總結知之行相九中成普賢智有三願一於一切處中各知多處二於一切業中各知無量業三於一切法中知多法多法中知一法十中住菩薩行有一願於一切言音中各知多言音十一中修普賢智有一願文中三一因智成行二由行住位三依位說法說法中七一一一法中各說多法二多法中一一各多差別三一一法攝化多相應機四攝化多時五相應有四一欲二解三根四時宜六由欲等令多衆喜七一切佛衆各滿法界令得益文家且顯一佛餘略不說得益有七一立勝志二生廣慧三了諸行四住普賢位五證所說六剎那增長多智至盡未來七一切剎中修行成滿十二中修普賢行有十一願初中有總別別中三一一一根知多根二了多欲樂三生多行有二先明得細境之智後而心下顯能知行相亦是了知之益前中三初總標次得色下別顯顯十細境智後如是等下結能知速別顯中云微細者准無性攝論釋微細名由難知故後能知行相中云不恐怖者境雖微細不怖難知故餘文准釋三有三初總標次能知下別列十細境後如是等下結能知下別顯境智後如是等下結能所知別顯中有二十一門前十一門明細智後菩薩見前境下明細智前境中初九名智者亦是境故勘梵本餘文易了五有二先明細境後成就下明了知之益前中三初總標次悉知下別顯細境中間有云智者亦是所智境故後如是等下總結能知就前顯中四十一門分二前三十門約因後十一門約果前中三初十明一生菩薩身智行位等事次十明補處菩薩在天宮事後十明最後身菩薩降生人間事中間文及結並可知後了知益中有二十四句一於世現身八數見道緣九修行巧無障十一得因位極十四十九凡修行一一無盡同法性故二十於一念間知一切衆生生滅心心法即如藏如藏即生滅心心法為無為非即離如幻現如通示二十四能示四業用一衆生二劫數三隨妄心立語言四依願起通餘文易了六有二先明細境之智後廣攝下明知境利物前中三初總標所謂下別顯別顯中九智可知後如是等下結能知能知中一知速二稱境後利物中五一法施攝二示法愛語攝三利行攝四同事攝五令悟攝五勘梵本七有二先明細境之智後如是了知下明能知利益前中二先總標後所謂下別顯顯中二十一向分二前九句約所化處後十二句約能化人法前九中五云無比者最勝妙故如勝蓮剎密嚴土等餘文可知後能化十二句中一總顯知佛出二知說法三現身業四放光五等通六一音即多七入會八多作一九一作多餘三知理性後能知益中十三句二云入普賢行等者謂智行通行九十十一亦皆云想者是決定心非取境之想餘文可解八有二先明所知境後於法自在下顯能知行相前中二先總後演說下別此中皆約即理之事名法界別中二先列所知後如是下縛能知攝境知故云如實餘並可解後能知中十句一云普行令攝修二於能所詮離取捨三出生一相智四於為無為離存壞五不染世六墮世言七開示真寂八不依住境九見法界相十了諸法無性九有二先明境智後得諸下明知益前中先總後別別中先列十智九云非劫者謂日月歲時不名劫故餘文及結能所知並可解後知益中得十種心一云行王者中行最尊貴故五云世界網者眷屬剎故餘文可知十有二先明境智後得入下明能知成益前中二先總後別別中二先列十智後如是等結能所知前中八云非法者諸法無性故非法也九云無法者以無性理有諸法故餘文可了後結中云與彼同等智稱境知故後能知益中十種一入即理之事諸法界一一中定心不散起行二眼等皆具佛智三得佛善權四得佛廣大善根五入佛身六現身業上兩句或共一義謂能入佛身中現菩薩身業七順時處語說法八得佛力加意業九生善巧慧十以佛智釋法上三句或共一義謂佛力加得一切智善巧簡釋諸法十一有二先明境智後生如影下辨知益前中二先總後別別中二先列後修菩薩下結稱知境故云文義皆如實知前中十一種末後中如來道等三箇道字今勘梵本皆是道路之道此亦義言意取所行故後知益中得十智可解第二明離相回向中有十對不分別三中云出離道者道是能修智行是智所修成梁攝論云不見菩薩所行行及能行道此之謂也上來別顯十種無縛中初一無著縛心訖從此下應辨餘九准例同故但列名爾初雖已說相從故同列也第三彰行成利益中十句分四初三同行法次一同教法次一同理法後五同果所有法就初三中一總顯行同類故云如也二古行應學未行當成現行正住住即是行住其修行故三於行恆修同三世故云安住不捨隨順等安住亦行也次一同教法中同昔說勤行同未說當成同現說了知次一同理法中同昔佛證理圓同當佛證理當成同現佛證理正住後五同三世佛果所有法中一佛果應機體德業用唯佛自境於昔已得令行彼因當佛未得今同住彼行今佛現行得齊其所因或齊所得就一體說故二得善根三具種性四住所行謂無礙行無有住處普為衆示所行等廣如出現品說五順境界謂非境界境界等亦如出現品說第三依別釋結名者上來但別釋初一無著縛心回向故云心也第二大段明位果中十二句初二及七准身業三六八准意業權魔業是摧自造四魔因故四九十一十二通三業依十通說具三業故五唯語業並可知上來長行了第二大段偈頌中二先標舉說大後正顯正顯中五十一頌分二先四十九頌頌位行後二頌頌位果前中三初三頌頌所回善根二所修下四十四頌頌回向行三過去下二頌頌行成利益初中第二頌內云不為自己及他人者此有二義一不以情私為自他故二不見自他有所為故二正頌回向行中初一頌頌普賢因位究竟餘頌因圓滿果滿中初一頌頌知世間後細智次一頌頌知衆生趣微細智次一頌頌知世界智次一頌頌知心智次一頌頌知根欲性次二頌知業次二頌入劫智及知心行次十方世界一切佛下二十七頌頌菩薩所住成滿大用於中初一總頌次一頌住兜率天次一頌入胎是微細故胎中具八相也次二頌初生次四頌行笑吼成佛各一頌次一頌在宮及出家次五頌坐道場降魔成佛正覺次五頌說法次三頌餘趣現自在次一結此菩薩善根回向次三頌回向大果之行儀次有數無數下四頌頌入劫及剎菩薩所行行次二頌出生無餘智於中前頌第四句梵本云住行力已皆了知謂住普賢行之力故次一頌衆生性微細智後二頌行成益又後二頌位果並可知第十等法界無量回向中二先長行後偈頌前中二先明位行後菩薩摩訶薩以法施等下明位果前中三一牒名徵起二佛子此菩薩摩訶薩以離垢下依徵廣釋三佛子是為下依釋結名初中云等法界無量者等是能等回向行法界無量是所等事謂盡十方虗空所攝事法界無可限量今逈法施等善根令成無漏體德用願彼所得數量等彼事法界故准後十六門回向中或願能起等法界無量行或願成等法界無量德或願感等法界無量果此皆是等彼之法界無量從所等為名依主釋若總言之即等法界無量之回向亦依主釋本業云覺一相法第一義諦中道無相一切法皆一相照故名法界無量回向二依徵廣釋中三初明所回向善根二以此善根下明用前善根成回向行三佛子菩薩摩訶薩如是回向時安住下明回所成德就初中三一行所依身二廣行下依身起行三佛子此菩薩摩訶薩以法施下依行所成善根初中住法師位者如第十地菩薩得離垢三昧受智職位由得此定灌心首故外示表彰以白繒繫頂繒名離垢從喻稱爾二依身起行中十二句一法施二起二大心三令他住大心四以出世利利物五大心養善根六調生示正因七破迷真實義愚之智八等心利物九心心所淨離見縛修行故名自在十導衆正道十一導衆法行十二作衆真友三依行所成善根中略舉六善根此六於前十二種行或通遍或別屬通遍可知別屬者一由前初行故發生自他清淨無漏善也三由前第三行故得攝受衆生趣向佛智之心善根三由前二五八九行故得勝願堅固善根四由前第四行故得增益威德善根五由前第十二行故得於善友心無諂誑善根六由前六七十十一行故得觀察一切智無邊境界善根謂佛果所有應衆生法無邊限故名無邊境界餘文可知雖有通別兩判約通為勝二用前善根成就回向行中二先明隨相回向後佛子菩薩摩訶薩又以此善根如是回向所謂以住法界下明離相回向前中二先正顯回向後佛子菩薩摩訶薩以法施等所集下明大段回向所為前中有十六門回向就施初門中有七願一於大菩提無礙智願修成增廣此如下回向所為中云為令一切衆生皆得無限量大菩提周遍法界無所障㝵是也二願於教法得授持說三願得於多佛之憶念因行四願得修彼多五願得用前憶念佛善根施衆生成行六願常見佛及善友七願修行佛菩薩所說梵行於中二先明為己修梵行後佛子菩薩摩訶薩若能下明為衆生修梵行准次後文前是自修後令他修且依前判前中二先總標所行後所謂下別顯行類別中有二十八行一離增上纏二合具三不雜見四不雜愛五不誤犯六離障七順教八緣離九果離十對治離十一同佛因修十二稱法性十三離取十四離彼我十五了不生十六離危十七超下乘十八堅力任運之義十九寂靜二十忍力所成後為衆生修行中六一牒前起後二令一切下正顯三何以故徵四菩薩摩訶薩自於下釋五何以故重徵六菩薩摩訶薩住無下重釋初中二先牒前後則能下起後謂一一皆通為己及物故云若能等二正顯顯中十二句並約梵行清淨義為衆生可知三徵意云菩薩先應化物利行何以先自利行耶四釋意云若不先自住行則不可令他住行故文中十句可知五重徵云軌物為導雖爾大悲齊物云何故云何以故六重釋意云菩薩但身住無倒行口說無倒行三業說無倒清淨則俱不違也文中二先總標後菩薩摩訶薩下別顯總意可知別中十句五對一得淨心二修和忍三離疑悔四得淨信五住正法並顯可知第二回向願得於無盡法門海分別演說文中二先明用前善根回向願得法門以施後作是念言下回向願得等法界身業等前中二願一願得無盡法門稱機說法摧異道二願得三世佛法海為物演說於中二先明演說後為欲下明說所為前中二先明所說教後悉得下明能說辨前中十相一說法海時於一一法先生起其端後方正說二所詮三能詮四立前後五正說六顯意七趣入前方便八正悟入九觀意此應在第七七應在八八應在九十起盡法喻主客等分段各別故後能說中先明心於彼一一中悉得法無盡後獲無畏下明辨說無窮後說所為中四可知後回向願得等法界身等中十種初二云遍法界餘八云等從多分說此第十回向名亦從此立於中六云住者所依住此有二義一外依住處二內所住位如十住等十云入者趣入回向門亦隨順義餘文易了第三回向願得見等法界無量佛十種及得十種平等文中二先明用前善根回向之所為有九句此第十回向名亦依此立可知後又願下正顯回向於中二先願得十種平等後如我下以己所得願普同等前中願得與佛無異故名平等第四回向願得如法界無量智慧中二先牒前起後後所謂下正顯回向有十願皆約真如法界為願一得智二見佛三諸剎四修行五住佛智六與衆生同一智性七令衆生永淨八令衆生順普行九令衆生以普行為嚴十令諸菩薩不失淨行文並易了第五回向願得事一切佛皆令喜等中二先牒前起後後所謂下正顯回向有十四願文顯可知第六回向願善根同真如法界無起性正等中二先牒前起後後所謂下正顯顯中十願亦得真如法界為願一不變如二隨緣如三諸法無性四緣相離五九世法一念顯現故六空無煩故七本來寂故八不住方所故九常堅故十平等故第七回向願衆生成法師中二先牒前起後後所謂下正顯顯中有二十願一從菩提心發言佛必護念故二令衆生得佛智故四令得了教理智故五從無分別智中出巧辨說故七令得現證之辨如眼識現量緣境非如意識待五識引故若據梵本乃云為眼法師非是如也謂為衆生眼令見正道故八得念持力不違佛說句義故九無相之相是妙相故十一說實教大乘是建無勝幢十二巧說法彼諸疑暗故十三智於法藏顯出義理自在無㝵故十九以無我我所心傳法攝生故二十菩薩說法皆願回向安世間故餘不釋者並准知第八回向願得離諸取著修回向行文中二先牒前起後後所謂下正顯中十句於業等皆不以取著而為回向可知第九回向願得為成一切智不為世間故回向文中二同前正顯中二十八句分二前十七句變顯後但為教化下順釋前中二初二於六塵不耽四不求五不著八不求樂十一不求樂緣令和合餘文可知後順釋中七證無生極故八衆行海嚴種性現成果故九求明教法無㝵智故餘文可知第十回向本性平等心等文中二同前正顯中三十句分二前十句明能回向心後又為下二十句明回向所為前中一了諸法緣成來即無差別二了諸法無自體四無諍者無此彼故五了諸法不生六了不失因果分位十地智心餘文可知後所為中七云入十力輪者證佛十力智摧魔如聖王輪摧敵故八清淨行法之願十四無畏菩提心者其心勇猛不畏生死拘礙違順動搖不畏菩提難成衆生難度苦行難行故餘文易了第十一回向願得正念清淨回向等文中四一牒前所回向善根二正念下明回向所為三佛子菩薩摩訶薩如是回向時不應下明回向不應為四佛子菩薩摩訶薩如是回向時得淨下明回向利益初中有二十二種初三皆應有為字略故不說十云離二著者謂人法二執或我我所著十一思惟緣起故有緣起故無有無無礙非即非離如是觀察如是演說十二云勇猛者入生死海運度衆生不畏諸難如帝釋幢降怨勇猛十三幢即帝幢怨不能勝為建立十地智幢更無能勝藏是堅義餘文可知三不應為中三一標謂不應貪有等回向二何以故徵徵意云菩薩大悲願常處三有何以不回向耶三菩薩摩訶薩下釋釋意云若貪著五欲回向非大悲也是故應以無貪等而為回向文中九句可知四將回向利益中十句一得淨信二於菩薩行歡喜忍受三修淨大菩提道文云大菩薩道者恐是寫人誤錯四具佛種五佛得智六捨惡七離魔業八近善友九已成大願十請與衆生設會第十二回向音聲文中二先牒前起後後所謂下正顯中願令衆生得四十四種音聲第十四十五十六十七加智字者依智發聲故云智意亦在聲二十七總持金剛句音謂此句音中攝持多法門而能壞灾危不為天人魔梵等音所制持故二十八於其聲中演出多字句故名智藏餘文可了知第十三回向願衆生得離過惡身等十法文中二先牒前起後後所謂下正顯顯中七願令得了信等善巧智八信解者勝解也信中深忍是勝解故餘文可知第十四回向願自得十種身文中二先牒前起後後所謂下正顯顯中三一列所願得願身二於一切下明依身現三業化三菩薩摩訶薩下總結現身利益初中有十身一全體是光二不暗昧三水不沾汙四性自清淨五淨中之極六不為塵坌七極微亦不著八常無垢穢九具相可愛十有機斯應無限近遠二依身現三業化中二先總顯示諸衆生大菩提下別辨前中二先約處彰現後如何明下明所現任運前中三一剎中現身業二世間現語業三宮殿中現意業善巧安立諸事後任運現中各隨所應不待作意稱其現故後別辨三業化中有十種分三初六語業次三身業後一意業三總結現身利益中皆令得佛身第十五回向自得不空身等文中二先牒前起後後願身下正顯顯中二先明願得道器三業後入一切衆生下明契語諸法前中十種一不空身業二無厭修三大悲廣四恆契說五常念發六念佛常現前七實心修善八置物於道九得教法智用十得廣受持修後契悟諸法中二先明所契悟後於此下一句結依十入以修行前中十句一悟物實性七悟菩薩能生衆生善根智八悟菩薩觀法性智餘句可知第十六回向淨土中二先牒前起後後願一切佛剎下正顯顯中二先總顯後其一一下別辨前中七一剎淨二剎嚴三剎量四純善五淨光六佛現七諸剎淨境中各互現諸剎後別辨中二先明寶等十二種外物各九十四阿僧祇嚴及無限量菩薩人寶為嚴如法華云大寶莊嚴剎以菩薩為大寶故後次第乃至下明前寶等十二種各九千四百阿僧祇嚴及無限量人寶為嚴前中二先廣說寶嚴具嚴及人寶為嚴後如寶莊嚴下略列餘十一種嚴物名字前中三初總標等法界寶嚴二所謂下別顯九十四阿僧祇外物寶及人寶嚴剎三是為菩薩摩訶薩以諸下總結善根回向成二寶嚴剎初標云悉以者同用如此數量寶嚴故等法界者其嚴具難量故以事法界數為其量故二別顯中二先外寶嚴後佛子菩薩摩訶薩於彼下明菩薩人寶嚴前中二先十五阿僧祇別結讚勝言寶樓閣廣博崇麗延袤遠近者梵云寶樓閣廣博嚴麗見者悅意諸佛遊往次後第四云寶多羅形如半月衆寶集成者梵本云寶多羅樹半月形寶為葉莊嚴後七十九阿僧祇多分各別結讚中間有顯具三業等者以其皆從人法理事無㝵觀修善根感故後人寶嚴中二先明一剎中數量後如一佛剎下結通盡虗空界剎中乃至一毛頭處數量三總結寶嚴可知後略列餘十一種嚴物名字文顯易了後總明寶等十二種各九千四百阿僧祇嚴亦易了第二明回向大段所為文中通此十六及前十五段於中有三十七門分二先二十三門明為衆生後十四門明自為成就佛事前中第四為令信心不壞故十云眼者智也十一是宿住智相應念十三形對二乘菩提有限量故十四得與一切佛及大地菩薩同體善根如上第一卷讚菩薩德中云皆從如來善根海生是此義也十七同體淨剎如上文云普賢身依如住是也後為自成就佛事中先種後顯文易可知上來第一明隨相回向了自下第二明離相回向於中二先牒前標舉後所謂下正顯顯中二十九句此中云法界者皆理事無㝵法界也初云無量住者智依無量行法住故五云色平者以其即事之理故皆准此十內十一外者情非情故十二發起者方便令起行故十四善根方便二十二教法二十八事法界上來第一明用前善根成回向行了自下第三明回向行所成德文中二先牒前後安住下正顯顯中十句皆言安住者能得故法界無量者事法界數量多故平等會相歸性故九云能以等者得佛圓音故十住於等者得佛力無畏等功德故第三依釋結名可知自下第二大段位果中二先牒前標起後成滿下正顯顯中三一總標二於念念下別顯三如是等下總結在己初中二先兩句自利果謂成多行願嚴多佛剎後令一切下兩句利他果謂前句同前得二利後成就下一句了多法智二別顯中二先總標後所謂下別顯總中兩句可知別顯中二先見佛自在力後又得下明得佛清淨前中有十四句一遍法界二離相三任志四事事無㝵五淨其惑障六現剎七隨應言八隨時通九任通智十說窮法界十一法界眼照用十二問持耳十三稱法界身十四證法圓智後得清淨中二先總標後所謂下別列別中十句言清淨者智照於境明淨無障故三一切處遍智知者一切至處道智也餘並可知三總結在己中十句一圓滿二辨已三淨已四於前諸境無自在不自在清淨不清淨故五如對面六審了七證契八簡擇九明自十究竟上來明第十回向中長行了自下第六大段瑞應分中二先動地後佛神力故下明興供前中三一動因如經爾時佛神力故故二動處如經十方各百萬佛剎塵數世界故此望住行勝故云百萬也三動相有二先總標如經六種震動故後別顯如經所謂動遍等具顯如前世主品末說後興供中二先明供因有二種如經佛神力故法如是故後明供事有二一空中雨華香幡蓋等外事供二阿僧祇下雨諸天三業供謂語讚等音身敬禮作樂放光現化身等供心希佛功德等供文顯可知第七大段結通十方中二先牒前後用遍下結通此文或結前瑞應分勘梵本第八大段證成分中八一證因如經爾時復以佛神力故二證來處如經十方各過百萬等故此望住行勝故以百萬表之爾三來衆數如經各有百萬佛剎塵數等故四讚說回向如經咸作是言等故五述己及彼佛同名并來處剎名如經佛子我等皆同等故六述本剎中說法同此如經彼諸世界等故七述己來意如經我等皆承等故八結通十方如經如我來此等故此上瑞應結通證成三分皆應在偈頌後安所以者何有五因故一瑞應等三分通十回向而後偈頌唯局第十回向故二未說第十偈頌則是經猶未了不應預瑞豫證故三瑞證本為說經既瑞證長行而不瑞偈頌則應偈頌非經故四證不應云彼諸世界以佛神力悉說是法文詞句義皆亦如是無增減故五若許二分合在頌前即應頌中頌此二分借使梵本如此安置即合譯者回文文說不回致令文有殊誤此譯人之謬非結集之過上來長行了自下第二大段偈頌分中二先敘說偈意後菩薩成就下正顯前中二先總標有二謂一顯無我慢如經承佛力故二顯無偏心如經觀察十方等故後善知下別顯於中十句一為善知文義乃至第十為現清淨妙色身並顯可知後正頌中有四十七頌分五初九頌頌前所回善根二隨所下兩說頌通頌前十六門回向三十方佛剎下二十三頌前別頌前大段回向所為四過去未來下十一頌讚勝勸修五一切衆生下兩頌校量功德頌回向所為中分七其頌不次應知初一頌頌為嚴淨一切佛剎二有一頌頌為令衆生皆成滿清淨一切智三有一頌頌獲一切法大神通智四有一頌頌為令一切衆生皆得同於普賢行五有一頌頌為一切衆生皆得無能過清淨功德六有兩頌頌普入一切衆會道場七有十六頌頌欲於一切衆會道場親近供養為一切衆生演一切法咸令歡喜餘文並可知
