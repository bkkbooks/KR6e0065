body:
  text: 十地品第二十六將釋此品四門同前初釋名中二辨品前中他化自在天會元言他化樂具具得受用任同一法筵相遇故名會等於此天宮説十地者表真智證如自他存泯非即離故後辨品名中二先總後別總中亦二先得後釋前中十地者仁王上卷云入理般若名為住住生功德稱為地本業下卷云地名持持百萬阿僧祇一切功德亦名生成一切因果成唯識云與所修行為勝依持令得生故十地論云復此十地生成佛智住持故後釋名者諸説雖異統收不出十地論釋生成住持也十是總言十地即帶數釋若廣分別如別行章後釋別名者如後本分中顯二來意中二先會來後品來前中二義一前會明賢位終極今辨入聖位故次來也前會顯證相之因此會明教相之果成故無性攝論云此聞熏習雖是有漏而是出世心種子性二品來者前明以行回向今此辨回行成證故來也問既前會明賢此會辨聖何故地前尚辨圓融行願地上乃顯行布行願者何答圓融是行布之圓融行布是圓融之行布若地前説行布地上説圓融令受持者生二謬解一品謂前後淺深義次第爾二謂行布圓融各別教行不知圓融只融行布不知行布行彼圓融是故當知地如説色空非即離義法性教行理必應爾故世親菩薩於六相門融教義是也三宗趣中二先會宗者以淨治地智斷惑證如為宗為成佛果門趣趣名義通於寬謂通別部會品章段義等必不可將寬説挾用狹説寬亦不可榮古陋今依人棄法學者得意詳而用之二品宗有二種一即同前會宗所説以品即會故二以隨地修行寄位行相為宗即此以顯圓融無得行相為趣或此後義亦通會宗四釋文中二先料簡後正釋前中以晉朝經本脫十定品其品乃是第七重會之首離世間品還居前處為第八會由此古來造疏諸德皆云此會有十一品經今既文隨會別故此會中唯十地一品就此品中分二先明此土所説十地後爾時復以下明他方菩薩來證此説前中二先明此界所説十地後如此世界下結通十方無世界説此十地前中十地不同即為十段依十地論別十地總共有四十八分謂初地八二地二三地四地九地各四五地六地各三七地五八地七十地八所以偈不分者由其但述前文無別相故然古德云此四十八分地地中通有者此解難用縱使準義應有據文不通謂初地中不説戒故無彼二淨不説禪枝無起厭等故不説解法慢對治等故不説身淨我慢對治故不説取染淨法對治故不説樂無作行對治故不釋第八地各等故無法法師方便等故不釋第十地名等故假令欲於初地等説慳對治等釋地名等者更須金剛藏重説一本十地經也夫科截分段本只依文在文既無如何融易故難依也今按可通者初地八中前六第十地八中後二餘皆偈也問初地説分豈不通邪答説分但説初地不説餘地故論云已説請分自此已後正説初地故若許通者此一品經總有九分無四十八無四十八也以除初地八中前六并第十地八中後二餘皆是説故既存除分復欲存説義甚相違故不可也是故約通數之初地十分二地十分三四九地各十二分五六地各十一分七地十三分八地十五分十地十四分總一百二十分據通雖爾今且依論別釋其文從此已下引十地論但言論云即是十地就初地中八分者一序分二爾時金剛藏菩薩承佛下三昧分三入是下加分四摩頂已下起分五普告下本分六爾時金剛藏菩薩説此下請分七佛子若有下説分八佛子菩薩住此歡喜地能成下校量勝分就初中顯五種勝以表法勝一教起時勝如經爾時故爾是也是前始成正覺時故此品論經云婆伽婆成道未久第二七日故二教主勝如經世尊故於世特尊無與等故三教起處勝如經在他化自在所表已如前説言天王宮者王亦自在義自在者所居處表地智是佛果所依生成住持故摩尼寶藏殿者寶顯地智可貴之極故能隨出生世出世間善因果故故言摩尼寶藏等殿亦依義與所出生為依處故四時勝謂初成道第二七日在如是時處説此法者表所説十地勝彼小乘及地前教故論云時處等校量顯示勝故此法勝故在於初時及勝處説此處宮殿等勝是名處勝釋曰勝下天宮殿等故若爾已上更勝何不彼説者彼無機感故論云何故不色界説此處感果故釋曰機為能感果為所感也問若二七是初表法勝者初七最初何不表説耶答初七非是説法時初故論云何故不初七日説思惟行因緣行故釋曰思惟行因行者謂思惟昔行菩薩時所有善根回向菩提成菩提已廣度衆生故思惟行緣行者謂今既成佛依彼往願思所化緣欲行度行故此如仁王上卷説思緣放光同也論云本為利他成道何故七日思惟不説顯示自樂大法樂故何故顯己法樂為令衆生於如來所增長愛敬心故復捨如是妙樂悲愍衆生為説法故何故唯行因緣行是因緣行顯示不共法故釋曰不共法者謂三業無失等十八種及善戒第三説相好力無畏等一百四十此法不共菩薩及二乘故言不共菩薩者謂此唯是佛果所得非菩薩有故二乘得果入無餘依涅槃界身智永滅無所利樂佛今得果方大利樂事非預二乘故云顯示不共法也問此所思惟既為利樂何故論主乃更徵云本為利他成道何故七日思惟不説答此但徵其七日不説不徵思惟行因緣行謂云既思惟行因緣行何不即説乃經七日邪故後答云為令於佛增愛敬故五衆勝中三一簡異二住一切下歎德三其名曰下列名初中四一簡尊異卑於中二種一簡下位如經大菩薩故二簡下乘如經菩薩故二簡多異少如經大衆俱故後列名中云無數無量等是也三其諸下簡住異退問此中菩薩是何位地而言於阿耨菩提不退轉耶若依實行既非地前非位不退既因位極非證不退及無功用又論經云皆一生得阿耨菩提者若依示現此諸菩薩一切悉是他方諸佛依何説為一生不退應作是説文雖通二示現為正言通二者且實行中以最後身是一生故依仁王經此一生正得下寂滅忍於菩提不退者不復退入無生忍故依本業經得中寂滅忍故言示現者既此皆是他方諸佛其身即是十身之中菩薩身故此佛菩薩不限地位通作一切菩薩身故是故通諸不退亦通一生由此論經無自違也若不爾者一身具有不退一生甚相違故退之與轉有差別者彌勒問經論云自分堅固名為不退勝進不壞名為不轉勘四簡新異舊亦簡主異客如經悉從他方世界來集故二歎德中二先別顯後一切下總結前中十七句一下遍因位謂此衆皆是佛菩薩十身中菩薩故故云住一切菩薩智行住境境有二種一理謂所觀真性二事即所化衆生二中入有二義一以智貫達二行彼境中二境同前勤行不息者意彰無聞入非顯功用常三隨宜轉變神境之事故曰善能四調化應時五無障得願遍時處修六福圓益生無闕七巧慧至極八權實雙行九中二先列德後諸所下辨業前中如論第五釋云禪者四禪解脫者四無色三昧者四無量三摩鉢底者五神通釋曰言解脫是四無色者謂八解脫中後五皆依無色界故所以者何謂空處識處無所有處非想非非想處此四解脫皆約離緣空等心拘得名解脫第五約能觀心有勞慮過患厭之乃至令前非非想細心種不現行約防心不起名想受滅解脫故具顯如章論主今者從多分説故云解脫者四無色也三昧是四無量者以慈等作意皆依定故三摩鉢底是五神通者以三摩鉢底此云等至即是定根本由加行力伏沈掉故至定根本故然發五通皆依四禪根本定故未至中間慧多定少四無色地慧少定多無支相助不發此通婆沙瑜伽亦同此説若準論釋第三地中無色亦有四支相助然今但約定多慧少不發五通非約無支助也若依雜集雖通四禪多依第四明智者無分別智斷惑照理故又明謂三明十明智即三智後辨業者謂依前禪解脫等作利衆生事並任志成就故云皆自在也十無功用神力速詣諸佛會十一上首請法十二弘護教法十三供事諸佛十四勤修勝行十五身業普現世十六説法遍法界十七心照三世後總結中二先結修行圓後於不可下結德量廣並可知三列名中三一列名二如是等下結數三金剛下顯衆首初中總有三十九菩薩前三十八同名藏者表將説地地有堅義藏即堅故其猶樹藏後一名解脫月者謂請法上首除衆疑暗其猶夜月獨除暗冥此則託名表法月有脫暗之能名解脫二結數中略列九數謂於一百二十三數中從第一百五數至第一百二十一數仍於中間各隔一轉具如下説三顯衆首中名金剛藏者表所説法故論云一切煩惱難壞此法能破善根堅實猶如金剛故不異名説又藏即名堅其猶樹藏人如懷孕在藏是故堅如金剛如金剛藏是諸善根一切餘善根中其力最上猶如金剛亦能生成人天道行諸餘善根所不能壞故名金剛藏釋曰言煩惱難壞者欲顯要待無分別智方能斷故善根堅實者無漏善法至佛果故不異名不異所説故一切餘善根者謂地前菩薩及二乘等善根故第二三昧分中二先釋文後辨意前中二初明能入定所依後菩薩下顯所入定名前中云承佛力者顯能入定非自力故入者心與理冥一境性故菩薩者簡異果定故説因行故菩薩名義具如上説大智等者謂二無我智異二乘故亦異地前菩薩智慧故云大也又力能斷惑證理生佛果故名大也即此決斷簡擇成斷證故名智慧光明三昧名義具如上説後辨意者略有二種一為受加故如經得此三昧法如是故釋曰若不入定散心無能住持佛加二為顯法離著故論云顯示此法非思量境界故因定所生淨覺方説非散尋伺為加行故第三加分中三初總明作加所因二欲令汝下辨加所為三善男子汝當下正顯加相初中三一明佛加二以毗盧下顯加所因三依論問答初中二先一句牒前後即時下正顯顯中二先現身同名後作如是下同讚顯加前中六一即時者明正在定故二十方者顯教通方故三各過等者明來處數量故四各有等者顯佛數量故望前會加十倍以百萬為億約第二等數故五同名者為令剛藏增勇悅故六現身者為令衆覩於法生殷重故後同讚中三一讚得難得定故曰乃能二顯能加佛數三正明作加二顯加所因中三一毗盧宿願二現在威神三亦是下一句是剛藏自力三問答者何故多佛加為顯於法及法師增長恭敬心故何故同名金藏加者本願力故何故如來作如是願者顯示多佛故本行菩薩時皆名金剛藏同説此法今成正覺名金剛藏故不異名加又是菩薩聞諸如來同己名已增勇悅故何不言過無量世界者方便顯多佛故釋曰言何故作是願顯示多佛故者謂彼多佛因時同依此十地行願故言方便顯多佛故此中方便有二種一者不以一二三四及至百千等數數但數剎塵為量者是善巧顯多也二者不以多數顯多但説十則顯多是善巧顯多也何故定言十億佛土者為説十地故此經多説十數故言同名佛加以本願故者謂十方及此佛雖皆有本願加即同時然以不失主伴義故亦得説為此佛先加餘佛後加論云盧舍那佛本願力故加第二明加所為中二先總顯後所謂下別辨前中云欲令等者總明加所為意言為一切菩薩者是所被機論云謂住信行地菩薩此通二種一者三賢菩薩自來證如一向依教生信修行故二者大地菩薩雖聞此教然是自證見如生信修行故言説不思議佛法者分別出世間道品故出世間是無漏義道是智品是流類謂等流無漏教法從佛無漏智所流名不可思議佛法地前菩薩聞已還生見道無漏智地上菩薩聞此教已智更增明此智是佛無漏智品類等流故名道品言光明者論云見智得證故遠法師云見智得證義一名異其猶眼目別則見智是其觀解得證是行解有始終見始智終推求名見決斷名智行有始終得始證終法顯在心名得心冥合如名證今釋此文宜總相説若摘字解便失本意謂光明有破暗合空二義似無分別智有斷惑證理二義故以法釋喻故云光明者智見得證智見即是斷障得證即是契如若依解深密第三智為總緣見為別緣此中論意顯二種機聞教利益若地前菩薩聞此教已能生見道無分別智斷惑證理故云入者信樂得證如無性攝論云此聞熏習雖是有漏而是出世心種子性若地上菩薩聞此法已地證增明斷惑證理故云明者見智得證今為説此地上見智得證法故云説不思議等也後別辨中有二十二句前十句明自利後又令下十二句明利他大判雖爾若細分別俱通二利故論云菩薩教他衆生即是自成佛法是故利他亦名自利前中初十句準論經與前總句同是一句論於初句開出後九初云令入智地者智地即十地智令入者入猶得也亦趣入義謂令諸菩薩得入四位即後九句寄配顯示一初四句令地前信樂位菩薩得入於地二次一句令得見位三次三句令得修位於中初句從初地相見道十六心後至七地次句八九地後句第十地四後一句令得究竟位若九句別釋一云攝一切等者聞慧中攝一切善根故二簡擇是思慧於一切道品中智善巧故三於所思諸法中得智無量種義故四隨所思義名字具足巧説故五見道時中無分別智證諸法一如故論云平等也智分別離故經云清淨也六論云修道時中離一切煩惱障故者理實修位亦離所知障附文釋義故作是説謂不染世法是離煩惱障故七出世間道品無貪等三善根無漏故云淨也八於第十地勝進時等覺位中得佛智祕密然此祕密非下位言念及故名不思議此祕密智即境界或密智所知之境界此至菩薩地極如下文大盡分中説第十地菩薩入如來十祕密智是也九得佛位究竟智此亦智即境界智之境通二同前然與前別因果殊故上來九別句與前初總句非即非離今但為顯地智有差別次第轉勝義故作是別説故論主用後六相顯前總別非即離義故言除陰界入等事者唯約等流無漏教淨緣起説亦是真如隨緣出世法不據有漏三科等故云除也論云總者是根本入別者餘九入別依止本滿彼本故謂總與別為依無總別不立由別方成總無別孰為總同相者入故謂別皆同本有入義故異相者增相故謂皆彼同入取名異相成相者略説故謂諸句和合為一略故成也壞相者廣説故彼諸句合為一時一一推徵無能成者各住自位如是廣徵不成故壞也如此融攝教文十句顯於無得非即離相餘一切法皆隨所應方便類釋廣顯六相如別章中後明利他十二句者論經合六七兩句為一句餘按次同初句總餘句別論云此句是根本始終謂十地中皆有始終故云令得菩薩十地始終者始謂先發信樂十地法門親近善友聽受所説終者謂依善友説憶持不忘就別中十一句寄配三位初三地前思修利他次一見道餘七修道此十一始終狹前十八前中前説聞慧後攝佛盡此不同者以聞慧及佛俱非正地前既已明故不重辨理實皆通如前自利中有聞慧者自成聞慧故聞已方能為他説故今此利他中有思慧者思已為他説故由思惟自增慧故初云如實説等者謂思慧智隨所聞十地差別義受持稱機理説故云如實説二令緣念一切佛法證入故三修慧觀時於地上無漏道品起意言分別帶相解故四見道時法無我智巧分別法我不可得名善擇光明即以善巧成此智名莊嚴過小故名大也五修道位中後所得智巧能趣入能所詮方便決定無疑故論云出世間智力得入法義故上來寄從二地至七地從此已下六句論説菩薩於菩提有障對治寄從八地至佛地對彼説障障在七地乃至十地七地有初障故不得入八地八地有一障不得入九地九地有二障不得入十地十地有一障不得佛地其能治道即經文是所治障如論顯後釋當知六句中一初二句合為對治一障謂不能破邪論障故云隨所住等謂隨彼邪見心住著之處處即彼所宗如聲生等執所生聲是常住等對彼以無過三支次第顯説立聲無常等此於七例是體據莊嚴由立無過心無所畏是論出離也後句是論多所作法謂宜正之詞邪莫能制能破邪暗故曰光明故論云隨彼所著顯己正義對治邪執無畏辨才性無暗故二住大等者對治不能答難障謂九地中得四無得大智巧決斷故論云證大無得智地故三憶念等者謂常憶念求大菩提救薩埵心無忘失對治樂著小乘障四成熟等者對治九地中化生懈怠障五能遍等者一切處是五明處此菩薩智悉能遍至決了開悟未解者此對治無方便智障上來明加所為竟第三明加相中三謂口意身此三次第有二差別一約他方佛加則口意身為次二約此界佛加則意身口為次前中謂加持正在説法是以先須口加説法必賴説因故次與其智力在定未可宣除故身加觸令起説是則口加以益辨意加以塔威身加而令覺或一一業如後分別遠云口先加者乘前諸佛顯加所為因即勸説故後此佛加次第中本疏云為令得定定由意力是故居先身光照觸以增威德故次如雲臺説偈口業加教方能有説故後加就前先口加中十一句初句總餘句別總云汝當辨説等者辨謂法義説謂詞樂故論云辨才者隨所得法義憶持不忘説故此法門者謂十地法差別者種種名相故此法善巧成故云善巧法後十句分二初一句總餘句別前總云承佛等者顯他力辨才謂剛藏得佛明智神力如持令説不暗昧故後別中皆顯自力辨才於中前四顯四種淨後五明三種盡前中一淨自善根者有作善法淨也謂不動第一義而依世俗言説分別法相約法相邊名有作也二普淨法界者無作法淨也謂依世俗言説即顯不動第一義約第一義邊名無作也三普攝衆生者化衆生淨也謂能化衆生令淨故四深入法身智身者身淨也入證契也此句中二種一屬前二攝後前中謂第十地菩薩勝進行等覺菩薩因行至極惑盡智圓法報二身俱非心意識所依唯智依止後攝後者後五句皆此句攝同在第十地故束五句為三種盡謂初二句是菩薩盡前句云受一切等者現報利益後句得一切世間等者後報利益現報利益者第十地菩薩勝進行時受佛職位因位未轉名現報一切佛放光名益一切智入此菩薩頂故云受佛灌頂後報益者轉前因位至成佛處言世間最高大身者謂色形所居大自在宮最高故色形尊大中彼王最大故智度論第二云摩醯首羅天韋紐天鳩摩羅天此三各自稱大自言一切智有從其學一切經書者亦言是一切智若依此經彼王有大自在智故名大自在故賢首品云摩醯首羅智自在大海龍王降雨時悉能分別數其滴於一念中皆辨了問經初云佛在摩竭國始成正覺此何説於自在天得答成佛應機不局方所隨有感化即説在茲是故前據所應此依引攝諸乘報佛閻浮所成是報身故不信界外有佛土故是以權指第十地菩薩攝報果處有報佛也二次二句是二乘不同盡中上句云超一切世間道者勘梵本道字乃是趣字謂惑業苦是世間趣攝非出世攝今此菩薩至等覺位惑業苦盡故云超阿羅漢獨覺未盡彼三故云二乘不同盡故世親佛性論第三云二乘涅槃有三種餘一無明住地惑二無漏業三意生身下句云清淨等者二乘涅槃有三餘故不名清淨今此菩薩所得涅槃彼三盡故不同二乘故三後一句云滿足一切智智者是佛盡盡無餘也謂等覺菩薩德海雖滿猶未能捨劣無漏等今佛位彼三盡無有餘故論云於一切智入智故二明意加中有二十句前十句明正加亦顯他力後十句釋偏加所以彰自力堪加就前中二初一句通總別餘九句唯是別總中二義一與上勝威德無畏色身如王處衆自在無畏如經與金剛藏無能映奪身故悉為他映奪則無威德不得無畏此總句也二與上勝辨才無畏名身此別句有九種一與無得等者也謂不著辨説法不斷無滯得故著是得住義今此反彼即言詞流美中無謇訥稱根令樂故言名身者名有二種一者表義二者顯境前則依聲假立之名能詮表於義辨門所攝後則依諸心品能取於境為辨所依辨門所攝問意加與智何故初句明色身勝答由加智力令色身增威故又準上下文不必口唯加口意唯加意身唯加身所以者何前口加中通加三業故謂加菩薩盡二乘不同盡佛盡等中説故今此意加中與無能映奪身無得樂説辨善分別清淨智等故後身加中令定心起故又以經中但云口加意加身加而不言加口加意等故是故通勝局劣也二與善分別清淨智者堪辨也謂善能分別因緣非因緣法成不成相善達不昧不昧名為清淨論云善淨堪智有四種謂緣法作成遠法師云此文人解非一此言定依相續解脫不得餘釋依彼經中有四種成一者以有成以有因緣名想言説諸法得成二者所作成一切所作各有成辨三者法成一切諸法性相成立四者助成以智言説助成諸法今言緣者是彼以有成也以有因緣諸法得成故名為緣法者是彼法成作者是彼所作成也成者是彼助成今勘解深密第三譯彼四成名四道理謂觀待作用證成法爾經自解云觀待者若因若緣能生諸行及起隨説作用者若因若緣能得諸法或能成辨或復生已作諸業用證成者若因若緣能令所立所説所標義得成立令正覺悟此有二種一者清淨有五相二不清淨有七相廣説如彼法爾者如來出世若不出世法性安立法住法界釋曰此經雖與相續解脫同一梵本譯文既異義還隨別是以古德解作助二種似有影響釋緣法兩相全為落莫今解堪智與道理相會略為二釋一依解深密會釋此論二直解論文以會本意前中一經云觀待者論名為緣緣即因緣謂凡是因緣之法必相待藉有故二經云作用論名為作論文略也謂諸因緣法起已各隨所應有業用有成辨故三經云證成論名為成論文略也謂諸因緣法中須有成立以宗因喻等令得成立故四經云法爾論名為法亦論略也謂前三道理皆約因緣此後一種不待因緣法應如是又前三種唯是有為而此第四通為無為謂無為之法法爾自體不待因緣有為之法法爾如是因待如是緣得如是果又因法爾作因不得作果作緣緣法爾作緣不得作因作果果法爾作果不得作因作緣今論云堪辨者堪謂堪能菩薩得此善淨堪智依四道理堪能辨説一切諸法若是緣成若非緣成後直解論者堪謂堪能菩薩得善淨堪智堪能辨説緣成之法成不成相不過此四一成果諸緣二緣成果法三依法興功四緣合成果若於此四隨闕其一必不成故三與善憶等者任放辨也謂説不待次言詞不斷處處隨意不妄名義故中雖具説結歸不失本義爾四善決等者能説辨也謂隨所應度種種譬喻能斷疑故能以喻顯正五與至一切等者不雜辨也謂三種同相智常現前故三同相者金剛仙云知一切無常苦及無我別翻本云知一切法自相同相及不二相釋曰同共也共有二種一者有漏色心是苦等三相共所依故二者法性真理是彼三相真實共依故其真諦譯本唯初義別翻本通二義以自相即苦等三故共相即色心故不二即法性故六與成等者教出辨也謂得佛十力不壞於可度者令斷煩惱故七與如來等者不畏辨也得佛決定無畏於他言説不怯弱故八與一切智人等者無量辨也於一切智隨順宣説修多羅等法六種正見故金剛仙云一真實義正見謂能知理法二行正見能知行法三教正見能知教法四顯二邊正見知前理法不同情取五不思議正見知前行法成壞出情六根欲性正見知前教法説隨物心九與一切如來等者同化辨也得一切佛無畏身等三種教化隨所度者顯示殊勝三業神化故後十句偏加所以及顯自力堪加中二先徵起後得此下正顯前中徵意云諸佛有力能與有慈悲能普何以以此十種無畏身唯加金剛藏不加餘者故後正顯中十句初一句總餘句別總云得此等者總顯偏加由得此定餘無此定故不得如言法如是者無有得此定不得者如善惡因苦樂果等別中九句準論得定法有二種一本願所起謂金剛藏宿願成就現前故二三昧身攝功德有八種前四自利後四利他一善淨深心者因淨也深心趣菩薩地盡清淨故深心者謂信樂至極即是一切善法根本因故二善淨智輪者輪是圓滿義此智淨也謂趣菩薩地盡修位真如觀內智圓滿普照法界如日輪光遍世界故三善積集助並者身轉淨也謂生生輪勝善行圓滿故四善修治所作者心調伏淨也謂善斷煩惱習故五念其無量法器者聞攝淨也謂堪能受持一切如來所説祕密法故六知其清淨信解者通淨也謂得勝通自在故七得無錯謬總持者辨才淨也謂善知陀羅尼門巧説法義於一一字中攝無量名句字身前後無違故論中舉悉曇初音攝一切書字數説等喻此總持者至脫月第三請處當廣分別八法界智印善印者離慢淨也謂真智教授不異故論主引教配前四句自利因云一精進因二不忘因三勢因力四彼不染因配後四句利他因云一斷疑因二敬重因三轉法理因謂法若壞時假餘尊法誦持故四教授出離因可知第三身加中一十方佛者顯加所為十方同故二各由者顯法界身此彼體用非即非離不離本處而摩此故三右手者表加所説皆稱順故四摩頂者表授與力至心頂故第四起分中二先牒前後金剛下正顯顯有四義須起一三昧事説謂受加竟故二得勝力加堪説法故三説法時至故四定無言説故從定起也第五本分中三一明六決定以彰地二佛子何等下標列地名三佛子我不見下顯地要勝初中二先總後無雜下別何故此中不待請説若不自説衆則不知出定説法為不説法又復不知欲説何法是故自説十地名體歎勝令請總中二先告衆後諸菩薩下正顯言願善決定者願是初地中説發菩提心即此本分中願簡地前願故云決定決定即是證智真實是故決定即是善善即是決定依地持説決定有三一種性地決定為佛種故二解行決定能發心故三初地已上決定證智故今是第三也後別中六一不雜者是觀相善決定謂真如觀一味相故此即正體緣如境智一味不帶相觀故云不雜二不可見者真實善決定謂非一切世間境界出世間故此即超世可壞法故名真實三廣大如法界者是勝善決定論中兩解先別釋廣大二字後合釋二字前中以真如法界有廣大二義此證真之智亦然故云廣大如法界一法界體大包含平等不增減故故云大法界故二法界用廣能令一切衆生厭生死求涅槃故云一切佛根本故後合釋二字中二先約訓釋字義異名一體以顯合釋後引例證成前中謂法界有大義此大即廣廣即大故此智亦爾故云廣大如法界勝及以高字訓義皆然訓釋道理法爾如是後引例證成中三一引法界大真如觀勝諸凡夫二乘智等淨法法爾故此大真如觀等大字亦得名廣名勝等以此名法爾如是通故二引法界大方便集地謂説大乘法此中大字亦同前通廣勝等爾如是三引法界大白法界善法此大字亦同前通廣勝等法爾如是是故廣大或同皆言復者於一所證法界中具三義故也四究竟如虗空盡未來際者是因善決定此有二種一成無常愛果因此因如虗空生諸色色不盡故二常果因得涅槃道故謂由此智修起一切波羅蜜行故成報化身因對治一切惑障盡故成涅槃因經宗報化豈無常乎隨彼於報化身愛無常者所現影像故作是説彼是誰耶謂凡夫二乘及大乘權教根器所以知愛彼聞有為無為非即非離不信愛故聞四智菩提有為無漏生歡喜故見佛久住不能生於難遭想故見佛入滅便生悲感戀善根故不爾世親造論違經依空生色色雖不盡非不生滅真智證會法性之色本非有生故亦不滅取其無盡少分為喻則可然矣遠法師云諸佛菩薩得大涅槃不捨世間是無常愛隨世生滅故曰無常大悲作用理是可樂名為愛果二種涅槃是其常果釋曰此解但會化身隨世生滅而未會報身也五遍一切佛剎救護一切衆生者是大善決定謂隨順作利益他行即次前常果因善是即悲之智故雖得涅槃非一向住前無常愛果因善與此行是即智之悲雖得菩提亦非一向住既其俱是非一向住故此二文亦得互言爾其非一向住言乍謂俱住不如云不住生死不住涅槃斯言無濫六為一切諸佛所護入過去未來現在諸佛智地者是不怯弱善決定謂入大地菩薩證佛無漏聖性之分佛無分別智明所照故名諸佛護由此護故名入三世諸佛智地即復由此入佛智地得諸佛護故不怯弱第二標列地名中四一寄問發起二佛子菩薩摩訶薩智地下舉數歎勝三何等下依數列名四佛子此菩薩下結名顯勝歎勝者以此地是成佛根本故三世諸佛及今同説三依數列中二先牒前起後後一者下正顯顯中依十地論等略釋其相初歡喜者論云成就無上自利利他行初證聖處多生歡喜故此有三義一二利創成二真理初證三聖位新得遂本期心故多喜也二離垢者謂離能起誤心犯戒煩惱垢清淨戒具足故此亦三義一離誤起犯戒惑二離誤起犯戒業三離誤犯戒果謂具淨戒故三發光者論經名明成唯識云成就勝定大法總持發妙慧光名發光地十地論云隨聞思修照法顯現故名明地依成唯識有三義依十地論有二義謂三慧是能照明所聞等法是所照明合一明名也四焰慧者不妄煩惱薪智火能燒故此唯一義謂根本智火燒前地所起聞持慢障故問餘地豈亦不有燒惑薪邪答各依一相不可例難若準下文更有一義謂上彼智法明摩尼寶光明中放阿含光明入無量法門義光明智處普照示現見故此地釋名為焰此約後得安立教説五難勝者得出世間智方便善巧能度難度故此有二義一得出世智者緣真智也二方便善巧者緣俗智也能度難度者度由達也即正智了真時達俗後得了俗時違真真俗二智行相交徹非即非離於斯難達而能達故餘莫難勝故名難勝莊嚴論云此地有二難一勸化衆生心無惱難二生不從化心無惱難此菩薩能退二難於難得勝故名難勝問豈不餘地亦有難度能度及退二難答望前此勝望後此初故六現前者般若彼羅蜜行有間大智現前故此唯一義謂摩訶般若證真行相有間現前非如七地已上常現前故七遠行者善修無相行功用究竟能過世間二乘出世間道故此有二義一此地善修離有無相行故云善修無相行此釋行字也二功用究竟等釋遠字於中三義一功用至極後邊故云究竟二望前三地起隨有行相同世間今此望彼為己超過故云能過世間三望四五六地修道品諦觀緣起相同二乘出世間位今此過彼故云能過二乘出世間道故八不動者報行純熟無相無間故此有三義對劣顯勝一勝前功用故云報行純熟謂智任運起不待加行如報所得純熟現前二勝前有相行故云無相三勝前有間斷故云無間即此無間通於二行無功用行無間故非功用所動也無相行無間故非相所動也九善慧者無得力説法成熟利他行故此有二義一德二位前中二謂一此菩薩成熟四無得解智善能説法名為善慧二即由此善説法故成熟利他名善慧也十法雲者得大法身具足自在故此亦二義一能受諸佛雲雨説法名大法身二能雨法雨無限量故名大法身後位者此菩薩因位究竟受佛智職具足自在勝前菩薩故論云如是受法王位猶如太子於諸王子而得自在若廣分別具如別章四結名顯勝者以地是成佛根本準前可知第三顯地要勝中三初標舉同説謂但是佛土無問報化必説此法説此為令機渴仰故二何以故徵意云地前教亦是説菩提行何唯顯此為要勝故三此是下釋於中二先總釋後所謂下重明前中兩句上句云此是菩薩等者謂菩提行法雖通地前然此於彼是其最上下句云亦是等者謂非但此能親生佛果望前最上亦是證相大乘超彼教相此能顯彼趣無分別故曰清淨光明法門後重明中二先所謂分別業者再明前地前教相大乘故論云顯示世間智所知故後佛子此處不可思議所謂諸菩薩隨證智再明前證相大乘故論云顯示出世問智故第六請分中二先明金剛藏説已默然待三家五請後爾時金剛藏菩薩觀察十方下明請説儀畢剛藏許説示説分齊前中三一請説所因二是時下衆起疑念三解脫月菩薩知衆下正顯請詞初中二先牒前説名後默然下彰不解釋論云何故默然欲令大衆渴仰請説故復增菩薩尊敬法故此句應云復何須請此略故也二衆疑念中二先顯聞名不聞釋起念所因後作是下正明疑念於中兩説一云何因者內因也謂剛藏但知名不知義故不釋耶何緣者外緣也謂聽法衆不堪聞故不釋耶二云何因者謂因何説名耶何緣者緣何不釋義耶三正請中三初明解脫月請二爾時諸大菩薩下明大衆請三爾時世尊下明諸佛同於光明雲網臺中以頌勸説問此説十地正是答前第二會初所問何故此中乃問耶答此中但為説名不釋生疑致請非更別問問何故脫月先請答論云彼衆上首故餘問則亂衆調伏故何故偈請少字攝多義故諸讚歎者多以偈頌故就初解月請中三一騰衆疑請二爾時解脫月聞是下歎衆重請三爾時解脫月菩薩重問下歎法重請初中二先脫月請後爾時大智下剛藏答前中二先標請所因謂知衆心念後何故下正顯顯中五頌大意顯示説聽無過應説於中分二初兩頌讚德徵默後三頌讚德請説前中初頌明説者淨覺無過後頌明聽者無過前中二謂上兩字及下兩句徵默中間淨等八字讚德德中二先歎有説因後功德具下歎離諸過前中論云何故唯歎淨覺淨覺是説因故覺觀是口言行既有淨覺何故不説故云何故淨覺人等問二禪已上尚無尋伺八地已上無思成事何故剛藏有尋伺耶答二禪已上無尋伺者是地法無非永無也八地已上無有思者顯無加行純無分別非無任運無分別思不爾佛果十八不共無不擇捨意業智導皆非有故擇捨是慧意業業是意俱思故歎淨覺有二種一攝對治二離諸過前中二種一對治雜覺二對治雜覺因憶想分別故雜是不淨即執之異名因法執有人執故人執但名雜法執名雜覺因即是其不淨尋伺金剛藏先具念處生空觀對治凡夫常等四例雜覺故真如無相智法空觀對治二乘無常等四雜倒覺因故故云念智具翻彼即讚淨覺也後功德等者顯離諸過則不能説既離過則能説何故不説離過有三一具無嗔貪善根功德故離嗔嫉他勝己及貪惜法不説之過二具精進善根功德故前説十地名離懈怠不説過三前不待請説地名故有樂説辨力功德故離不樂説過既具諸功德不應不能説上來歎能説者無過竟後頌約聽者無過徵讚中論云此歎同法決定同法即是同生衆簡末後兩頌彼異生衆故決定之言明有根器異第三頌彼但欲樂故就初頌中分二上半歎德下半徵默前中決定者於此法中一向信故勇猛者能為法不惜身命等故無怯弱者堪聞深法無所畏故一切減言通其三處下半可知若依論經再釋稍別彼經第二句云菩薩大名稱論釋云決定者黠慧明了故決定有三種一上決定願大菩提故二名聞決定他善敬重故三攝受決定彼説者善知故偈言菩薩故大名稱故説地名故如次三句應知後三頌歎德請中初頌顯有欲樂故論云前雖有決定堪受法器心不欲聞亦不説謂有欲無根雖樂聞聞不能解若有根無欲聞時雖解然不樂今既根具足願為分別請意如是文中二上三句歎德下一句請説前中上二句歎有欲下一句歎具二智前中論云有阿含決定非證決定有非現前決定無現前決定如是決定法器不滿足故不能聽受者謂此衆有證相大乘宿根現欲正能聽受十地妙義願為分別現前是欲非現前是根互鬪不能聽如前頌釋餘文可知下句歎具二智云其心無怯弱者論經云佛子智無畏今此心言即攝彼智智心所故或此心言即是彼智智心法故論云智有二種一證法故二現受故釋曰此衆皆根本後得二種智故聞此地義能受能證故願分別上來歎聞法衆德請竟自下頌歎異生衆淨請中二上一句總歎下三句別歎上總云悉清淨者衆中無有一人不離懈怠等濁故下別歎中離六種濁一離懈怠者離不欲聞法濁故二嚴者離威儀不恭肅不嚴整濁故三潔者離五蓋濁一離為名利貪故聽法二離嫉恚他勝己故聽法三離疑心聽法四離聽法時睡眠五離聽法時掉舉故四能堅固不動者離異想濁謂於説法者不起妬忌心欲求其過來就聽故又不為欲詰難令退屈破壞徒衆敬重讚歎故來聽法五具功德者離不足功德濁謂衆皆具多善根故心專樂聽六具智慧者雜愚癡濁謂於所説法不迷暗故後一頌顯二衆清淨堪聞請於中上半明敬法無雜下半喻顯敬仰轉深前中初二字及下句明二衆專心齊一無雜念故中聞感等三字明二衆敬心齊一無輕慢故下半喻顯中上句云如蜂等者按梵經本云如人念蹻達邏蜜蹻達羅者蜂名也其蜂黑色所造蜜氣香味美而無蠟勝餘一切蜂所造蜜從依屬聲故呼蜜以稱據實而稱應名勝蜜言如人念不言如蜂念者非餘一切蜂念此蜜故此兩句顯敬仰轉深者夫思甜欲蜜患濁念水非過越思念也此乃念最勝蜜思於甘露是過分也而此衆希聞地義過越思念亦其然矣故云轉深遠云齊心趣證如蜂熟蜜專意求教如渴思露此亦無違上來明解脫月初請竟自下明剛藏初答於中二先長行序意後正以偈義前中二先明剛藏聞請言大智無畏者聞前徵請答不難故義不難有二種一堪酬答故云大智二不怯弱酬答故云無畏後欲令下明智衆悵根欲述不説所由令其悅豫故後正偈答中五頌述其不説所由也論經有六頌中初頌即是此經長行序意也就今五頌中分五初一頌顯法難説次二頌明法難聞次半頌喻難説聞次半頌合難説聞後一頌舉結難顯默此上五頌但顯地法難説非為自無智力而不能説由此遣衆何因之疑又但明地法難聞非為衆不堪聞而不為説由此遣衆何緣之疑是故令衆歡喜也就初頌中文與論經雖少前部大意不殊總相意云菩薩出世間智最難故難顯示菩薩勝行事未曾有難故難分別何以智及行事如是難者以是覺證佛智之根本故故論釋云菩薩行者是出世間智地事者諸地菩薩行事最上及分別説等釋云説勝故何者菩薩行引偈諸佛之根本故佛者覺佛智故讀疏者既知此頌大意文雖前部但取釋配屬四句盡縱橫皆得也第二明難聞中有二頌初頌內分三初兩句明法難證以唯根本智境此境依微細等四義及顯非四心境界次一句順釋明是正體智境界末句出非境界之狀初中微細者非聞慧境界難可見者非思慧境界離念非修慧境界論云示現三界心心數法分別世間修道智非境界故者此簡地前修慧也超心地者論云示現報生善得修道智非境界者此簡八地已還加行所以者何彼唯有漏此唯無漏瑜伽五十五説修道位中有出世斷道世出世斷道護法論師云復得雖不親證真理無力能斷迷理隨眠而於安立非安立相明了現前無倒證故亦能永斷迷事隨眠次句顯正境界云此誰境界者謂既非餘境是誰耶故引頌云智境界智字此經云佛何者是智見實義故義是境義何故非餘境界此無漏故無漏者是出世間義此義非世聞智境界此經出生是論經出世勘梵本末句顯非境界之狀云若聞等者謂隨有所聞即作聞解故不得無所聞理執心不了名迷悶也後頌同前明難聞中二初句總餘句別前中云持心等者謂持聽法心堅如金剛方堪聽此法故後別中二先兩句明堅相後一句辨堅業前中有二種先上句明信堅後下句明證堅上句中云深信等者謂於佛菩薩勝智所知所説無邊化衆生法隨所化異説或相達於其教中仰推以信言此唯是諸佛所知非我境界如此推時少無自信全信於佛是名深信信深難動故名為堅如根深難拔名堅固根勝鬘經説三正智中初名仰推即同此也下句云智心地等者智字應安句末此證堅也於中二種一所證謂心地二能證謂無我智前中論釋云隨心所受三界中報又隨心所行一切境界釋曰前是內五根身後是外六塵境皆為所證皆是心所依託名心地也後無我智者論云我空法空如實知故釋曰內外諸法雖通二無我此約一相故作是説此約結證也菩薩具此二堅方堪聞此法斯則但顯難聞非不可聞第三喻顯難説聞中半頌上句喻前難説下句喻前難聞謂於空中彩畫處及風行處其相皆不可見以於空中畫風行故筆彩與風俱不住故然此空中非無彩畫及風行處以不同於餘虗空故此中空喻證智筆喻能詮名句字風喻音聲用此四法詮證真空智詮時能詮不住相故所詮本無相故如是能所相契合時非有非無謂能詮所詮俱離相故非有也不無詮顯十地義故非無也如是方為説十地義第四法合中有半頌上句標名下句釋義標云牟尼智如是者牟尼此云寂默謂智相即性故寂相性同時離説故默即用此義以名其智故晉本云寂滅無無漏智如是者指法同喻故魏譯論者錯謂牟尼是釋迦牟尼佛故翻為佛智故彼偈云智如是分別難見佛無無漏長行釋云如是佛智言説顯示等下句釋云分別甚難見者分別是説也見是聞也説者甚難説聞者甚難聞以其非有非無故説者不可作有無説聞者不可作有無聞金剛藏正説此時即是難説説衆依此聞時即是難聞聞如是方為十地説聞問所難説聞為是果分為是因分答古德皆云是果分以不可説故今謂不然是因分故所以者何由四義顯一三家五請本不唯請説果分故不爾諸佛則應不知果分是不可説而強請故二若是果分剛藏不應默住待請以其果分永不可説故三若為果分難説聞而待請者五請事畢即含説果分何乃許説因分四若難説聞不是因分者許説因分中不應同前還説其難謂云是境界難見可知不可説故問若爾者何故説大中云我今説少分論經云我但説一分答只言説一分不云説易分故不相違其定因分果分之義後説大中當廣分別第五舉難結默中一頌分二上三句舉下一句結默前中二初句及次二字難所説地智離相非説聞所及故云佛慧最勝等名此為佛慧者如前釋後次三字及下句全明聞者謂世間難有證信者故云難思議不能受等受即信受故何故名衆為世間者衆生世間故又古人譯地前為世間故下句結默可知自下脫月第二歎衆重請中二先請後爾時金剛藏義前中二先長行後偈頌何故此請復歎衆者以前云世間證信者難得故不説今此顯衆有堪能故請説前中三初牒前起後二佛子今此下歎衆生講三善哉下結請正請中二初句總顯後善潔下別辨初總云善淨深心者善淨謂教淨證淨深心謂樂廣修行教證二淨各通二義教謂順教修行故地前所行故證謂證理起行故地上所成故次別辨中九句前五教淨後四證淨前中一善潔思念是欲淨謂隨所念教得清淨善巧思念不雜取相故二善修諸行是求淨謂得身口隨順諸佛敬養起求法行故三善集助道是生得淨謂以助道善根願得所生益衆生處名上上生勝又隨所生處大菩薩念常現在前名念勝故四善能等者是受持淨謂於多佛聞法皆憶不忘名善能親近故五成熟等者是行淨謂求地真證法故習行少欲頭陀離著行積集成熟多功德故後證淨四者一捨離癡惑是得淨謂初地真見道斷分別惑無分別智現證決定非意言故真相見道具足現行名為見道初照真如體會理故名為得淨見所斷惑雖通二障煩惱障中執遍計所執實我薩迦耶見而為上首百一十二根本煩惱及彼等流諸隨煩惱此皆擾惱有情身心能障涅槃名煩惱障所知障者謂執遍計所執實法薩迦耶見而為上首見疑無明受恚慢等覆所知境無顛倒性能障菩提名所知障二障惑名略顯如前數總一百一十二者謂欲界四諦所斷各有根本十種煩惱合有四十上二界四諦各十中除嗔各三十六合七十二通界合有一百一十二此等諸惑皆有二用若執我用煩惱障攝障若執法用所知障收今此但云捨癡惑者以諸惑中癡為根本從本説故二無有垢染是不行淨謂修道中一切煩惱不行故從相見道十六心後至金剛心位總名修道數數修習無分別智故此中煩惱名數多分同前見道而差別者於彼數上更加十六謂欲界有六即貪嗔癡慢薩迦耶見邊執見上二界除嗔各五總有十六并同前數合有一百二十八種皆是俱生於中分名煩惱所知亦如前説今此云一切煩惱不行者唯説煩惱障中現起之惑及彼粗重不言其種故成唯識第十卷云煩惱障中修所斷種金剛喻定現在前時一切頓斷彼障現起地前漸伏初地已上能頓伏盡令永不行如阿羅漢由故意力前七地中雖暫現起而不為失八地已上畢竟不行乃至云雖於修道十地位中皆不斷滅煩惱障種而彼粗重亦漸斷滅三深心信解是無厭足淨此有二種一於法謂不樂小乘得大乘上勝悕望心二於佛謂念佛功德悕樂決定四於佛等者是不隨他教淨謂於菩薩位極處所行皆依自證非依教説修故上來正請竟後結請中二先請承力後明衆堪謂衆既內具教證二淨更得承力為説此地義必能證知或此諸下是總結上別顯九句以云於如是等故若不爾者如是牒何等言等何後偈請中二先長行標後願説下正顯二頌初頌舉法請上半舉法願説下半明説有益後頌歎衆請上半顯教淨下半明證淨後明金剛藏答中二先長行後偈頌前中二先明剛藏舉損以違後我愍下結默前中二先牒前所歎舉德兼失故云雖也後然有下舉損以違違中三初明所愍衆謂法深機淺藥病失宜其餘劣解之言通有四類謂樂凡夫聲聞緣覺小心菩薩法者次多生疑惑者愍起苦固後於長夜下愍受苦果結默可知後偈頌中二偈分二前一頌頌前牒上所歎謂隨教信堅如須彌定心證理猶大海後一頌頌前舉損以違行未久者小菩薩也解未得者二乘人也隨識等者凡夫人也餘準可知自下脫月第三歎法重請中二先長行後偈頌前中二先正請後是故下結請何故須此再三請者有二義故一不可以其疑念避之不説二若避不説不得成就一切佛法故前中五一通前推難致默令顯不難故請二何以故徵三説十地下釋四何以故重徵五此是下重釋初中二先勸承佛説者顯説者佛護説無難故後此人下明聽者佛護聞信受故二徵意云若由佛護能令信受何故説有謗正法人釋云有二衆生非佛能護一感報定故二作業定故此衆非彼故可護念若爾者佛無偏心何唯護念説聽此法者故三釋意云但説十地處説聽法爾感佛護念此由法力非餘因緣此十聽者佛護有二種益一聞説信受二速能修行故云能生勇猛四重徵意云十地望餘何所別異有此感故五重釋云由二義故一以此地法是菩薩最初所行教行故二以此他法得證智故能究竟成就一切智就前最初義中有三初法説次譬如下喻況後佛子一切下法合初中云最初者有二義一首二本義首謂上首望地前故本即根本望地後此雖通二故取後為正謂此地行望成佛果是親正因真無流故故名根本因初果後次第名小決喻況中二先喻果以因為本後字母下喻因能滿果前中云書者字也謂字形相亦名字體如呼師子為訶孕多故字像形似師子頭尾也字者字音即阿入阿去等一十四音也數者謂名句二法是數義也説者語也皆以字母為本者謂以十四音各別加於迦佉等三十三字體上和合成母因此轉生一切字一切音一切語言名句義等故名為母十四音者謂阿入呼一阿去呼二縊入三縊去四烏入五烏去六訖默二合七紇𠼝二合八里九梨十曀十一藹十二污十三隩十四已上十四音也喑經呼阿重呼上二字是界畔字也字體者有三十四謂迦上佉上仰虐我伽按聲掣呼昂俄朗者之我𭑥冒我𦂍若我扚時何壤吒擲我吒折我荼搦我荼宅何曩撰仰𭢟多我他上娜陀按聲掣呼曩簸叵麼化復是麼音呼似婆字婆按摩製呼莾經呼邪余我囉卷舌呼攞嚩無我爍傷我屣使我娑上賀上叉楚我如是字母為書等根本亦名為初章故喻地行最初義也後喻因能滿果中由字母令書等究竟故彼書等不離字母攝也後法合中二先合前初義後十地究竟下合前究竟成就書等義此亦釋得證智也後結請者結請者結前説聽既為佛護念是故願説後偈頌中三初半頌頌前願承力説二次半頌頌前護念上並可知後一頌頌教行證智文中三一前半法説二半上句喻顯三下句法合初中上句頌前證智成就一切佛法故云亦究竟下句頌前教行是最初根本後兩句可知上來脫月三請竟自下大段第二大衆同請者上來脫月為衆先請雖説衆堪樂欲聞法然要自陳請儀方具又顯重法故此共請文中二先長行標舉能説頌人後上妙下正顯偈頌頌中二前四頌半歎人請一頌歎法請前中二前二頌歎説者餘歎聽者前中二前五句歎剛藏具證教二德後三句歎剛藏能令聽者入證入教前中二前四句歎證力辨才成就後一句歎教力辨才成就以此二力方能有説故偏讚爾論云以證力等是故讚歎前中上者是總總有二義一寬謂該二力以顯勝故二狹謂唯就證力以顯勝故論云又復上者顯證力等此中歎辨有三種一妙無垢智者是正體智此勝二乘智故二無邊分別辨者是辨體成就無量義辨故三宣暢深美言第一義相應者是辨果謂訓釋言詞字義成就又是以深美言詞顯勝義諦後一句歎教力辨中念持等者受持顯説故是菩薩於正教中淨慧無疑故後三句令聽者入證入教中初句明入證言十力者令已地者得佛力智故集功德者未入地者令入地故後二句明入教謂今得無得辨演説受持十地法故歎説者成就二力竟後二頌半歎聽者中三初一頌明求教及證次一頌喻顯後半頌法合初中下句是總言唯願者有二種一求教二求證謂專求此二故云唯願上句云定戒者是第二句中我慢二使不堪聞教能對治行謂由我慢於法及法師不生恭敬由有定則心調伏故離我相也由有戒則善注威儀故離通慢也既離二使堪聞也又上句中集正心及第二句中見字並是第二句中耶字及第三句疑念字之二使不堪得證能對治行其集字論經作深字謂細意善思惟則得深義故今此云集者謂由細意故於善思惟能積集也心字論經作意字心意識三據通一也耶字論經作妄妄即妄想耶見借名今作耶字正當顯稱既有正見則善思於義故離顛倒見也既有正心則聞不思議得證智境歡喜信樂離疑念也次一頌喻顯中喻四種義一思水喻聞慧謂初聞受持未尋思故如飢水者不呾嚼故二念食喻思慧謂於所聞法思惟得味益智力故如喫食者呾嚼得味益身心力三服藥喻修慧謂已具聞思如法修行離諸煩惱及餘習氣如服藥藥行病得除愈四如蜜喻果謂蜜是衆蜂所依樂處三慧之果是衆聖所依所樂處故後半頌法合可知上來歎説聽等竟後一偈歎所説法利益請中二先善哉兩字是總餘皆是別前中謂所説法中善具足故稱善哉也別中三一廣大智者謂諸地所依二願説入諸地者謂説諸地未曾説法此即地體入字論經作勝字謂校量地勝故此校量勝是趣入方便故三成十力等兩句是地果謂具佛十力無得智所證果法此得論文此經本云一切行者謂佛智所行之境文雖少異大意同也勘梵自下大段第三諸佛加請中二先長行明此界與十方佛光互照顯身業加持眉間是身故後時光臺下明光臺説偈顯語業加請故此則長行但加無請偈頌亦請唯論判文長行及頌總顯光有八業二身今科少異多依論釋問脫月及衆請儀已具何更待佛答為顯法勝故問前加分中已有佛加今何復加答此有二義一前是加今此請加為異菩薩以加為請故二前顯主伴故則十方佛具三業加而毗盧但同意加今欲具故更身語加也此中身加者此光照十方佛所加説法菩薩故即後文云又亦照此娑婆乃至金剛藏身是也問何故前不加衆今此加耶答前已剛藏簡衆違請上首雖即歎堪衆未自陳根欲今以次前自述故此加也問何故不以常身語請以光代耶答為重法故是以有請為不輕尊位故不以口求請不以曲躬請故以光代也就前長行中二先明此佛光照十方佛及大衆菩薩説法菩薩後時十方下十方佛光照十方及照此界佛等前中論經明光有八業二身今此七業二身略無降伏業言七者一眉間出清淨光明名菩薩力焰明者是覺業謂此光照諸菩薩身已自覺如來力加故二百千下是因業謂因主光出伴光故三普照下是卷舒業謂舒照十方卷入常光故此中卷者有二義一略故不説二或取如日身一分義是此卷業謂云作前三照十方事已於上空中成雲網臺住故四三惡道下是止業謂止息一切惡道苦故五又照一切下是敬業謂照諸佛衆會現不思議佛神通力令物敬故六又照十方下是示現業謂如十方佛所加説菩薩大會令此衆見故上來六業竟第七請業如後頌是二身者一即此總結前業云作是事已下是如日身謂於上空成網臺住故二前第三第五第六業中皆云光照十方者是流星身謂往十方故後十方佛光照十方及此界中二先明彼十方佛各光照自各十方諸剎如此照彼同前所説六業二身如文可見後又亦照下明彼十方佛光照此佛及大衆并説法菩薩雖略無光名眷屬息苦等唯別應具按上此彼互照之相此則但照十方彼則照十方又列照此顯主伴異故論主將為證同不復別釋者應留後代令箋之也後明光臺説偈顯語業加請中二先長行標説頌所依後佛無等下正顯第七請業於中先略釋業名後釋頌文前中謂光臺發聲説偈請故後釋頌中五偈分四謂初一頌顯能加者勝次一頌明加所為次二頌明請説法有利他三益後一頌明教剛藏依三漸次説觀證修初中二先總顯能加勝意謂能加請者非尊則不彰法勝而所加不説可知後正釋文此中約義取文故不按次於中分四一第三句全及第四句內加於彼三字並顯能加就中加持彼是總相第三句全亦總亦別以此句亦入前眷屬攝長行中十方佛是此眷屬故論云諸衆首者佛於世間最勝故餘文別相總云加於彼諸佛能加加金剛藏加有二種一令同諸佛一法身二令同諸佛具證佛果能加諸佛是法王故如世人王有四種勝一自在勝二力勝三眷屬勝四種姓勝人王自在者所作無能為得故力勝者能降怨不為怨伏故眷屬勝者有二種一內地眷屬勝二鄰國眷屬勝種姓勝者承藉王胄故佛王四勝者一初句全是自在勝此有二種一佛無等等是一切智故即慧解勝自在勝二如虗空是世法不能染勝無明煩惱習氣威故即心解脫自在勝言無等者非餘衆生能與等故重言等者諸佛此彼互齊等故二次句初二字云十力者是力勝謂處非處等十種智力降魔怨故論經有無畏兩字故釋中云能伏一切耶智等三次云無量諸功德五字及次後句全是眷屬勝此有二種一菩薩眷屬勝於菩薩聲聞諸衆中此衆是第一以具無量諸功德故二佛為眷屬勝論云諸衆首者佛於世間最勝上故故後句全亦眷屬攝通入總別二相中故四第四句中釋師子法四字種姓勝此有二種一生家種姓二法家種姓初釋師子三字是生家勝釋謂釋迦世為于代輪王胄族師子喻名佛於三界獨步無畏故以別簡通故云釋師子又種姓姓字宜從竪心以釋迦之稱是族望非姓望故智度第二云釋迦道人姓瞿曇故佛名經云我釋迦牟尼佛姓瞿曇故雖一切佛生家皆勝今且據主佛現在此故後法之一字顯法家勝謂一切佛皆證一如得大菩提因此如姓生佛身故超過二乘智所證處名法家勝第二有一頌明所為中二先顯所為意後正釋文前中意者為聞顯法王最勝藏故後釋文中二先一句為遮外疑諸佛不能自説生輕慢心故故勸承佛力令開也後三句正顯法王藏中二先法王最勝藏五字總標名後兩句別釋釋中二先上句雙字義二藏謂諸地廣智者字藏也上妙行者義藏也上謂神力勝妙謂真實智行謂諸菩薩初道行法也後句云以佛等者總結請説論云分別者説十地差別故第三兩頌明請説法利他有三時益中分三初半頌明聞時益次半修行時益後一頌明轉生時益初聞時益者謂佛力加故聞法入心是能受持也次修時益者謂十地行漸次修滿得佛十力成菩提故此顯因圓果滿也後轉生時益中一頌分二初半頌順釋信益後半頌反顯不信損前中二初雖之一字總顯福而有難難不能為後住海下別辨難福謂上句中六字明在難處下句全彰福勝難劣難不能為前中論長行釋有二初總相通釋後就世界長壽下舉頌別配前中云惡道善道難處生必得聞此法者惡道難處生謂在大海龍世界故善道難處生謂在色界光音天故後配中二先龍世界等配頌中初句內上四字後雖在色界光音天等等配前四字下三字前別配初云就世界長壽者按此長壽之言或恐是後色界長壽之語若不爾者則三惡道難應唯長壽者是難短命者非難故此文要勘梵本又論主釋劫盡火中云雖在尼界光音天等亦得聞此經下句明福勝中云堪受等者謂於過去曾聞此法生決定信由餘業故生彼難處由前信故成此根器故雖在難而堪受此法故云得聞後反顯中二先上句總標翻前生信故云生疑等後下句正顯其損故云永不聞謂得聞由信無信有疑則永不聞準此道理無問生在難非難處皆不得聞云何知然謂如智度論第九説云舍衛城內有九億家佛住其中二十五年三億家眼見佛三億家耳聞有佛眼不見三億家不聞不見釋曰後三億家雖非八難但是未種決定信根不疑根故問據論主釋住海水是龍世界惡道難者此難豈唯在海及皆不聞答經依一分故作是説非謂一切不爾餘畜應無難故佛會應無龍等衆故問論經頌云劫盡火中如何論主釋為光音天是長壽難今此經本既無盡字復云何通答盡字晉經亦有而今本自略論主釋光音等為長壽是劫火盡中者廣經意也謂經説劫盡火中則處唯局上二界時通前後一切時皆難乃至劫災但遮劫盡水風災中二三禪處不遮初禪以初禪是長壽之首舉初括後故云劫盡火中論主受別生理故釋光音為長壽之首故置等言即由劫盡火中之言復通劫火盡中之勢此即處為二禪已上為長壽天唯遮初禪時局劫火盡時遮彼初禪劫火燒時彼時初禪無天住故不可説有在中聞法不爾初禪何非長壽問如何得知長壽天難通上二界答以多教説長等各異然皆不離彼二界故即此經文是初禪故論主釋為光音等字等上更無限故大智度論三十八云長壽天者謂非想非非想處以萬大劫故或有人言一切無色定通名長壽以無形可作故不任得道常是凡夫處故或説無想天名為長壽亦不任得道故或説從初禪至四禪除淨居天皆名長壽以著禪味耶見不能受道故梁攝論及成實論皆同智度第三師説釋曰按前諸説及餘聖教具二義故名長壽難一是上二界形待欲界名長壽故二沈著禪味不任受道故然此通論總有四句一是長壽堪受道而非難如此經及仁王經等説上二界中有預佛會者故二是長壽不堪受道正八難攝具上二義故三非長壽不堪受道謂所餘七難及欲界人天中有於法不信未種聞法根欲并未熟故四非長壽堪受道謂所餘七難中有曾決定信此法根欲已熟及欲界人天中聞法根欲熟者故廣説八難如別章中第四佛教剛藏説十地中三漸次內一頌分二謂先三句正明三漸次後一句明説利益前中二初應説兩字總顯教説謂云汝應如是如是説故諸地下別辨於中三句如次即為三種漸次謂初句是觀漸次次句是證漸次後句是修行漸次言漸次者謂一一地中皆有從初至終行次第故初中云諸地勝智道者論謂十地勝智道説此十地若觀若依止能生諸地智故此釋加行智緣影像如故名為觀依止此加行生根本智故名勝智亦之道依主釋也次句云入住等者論云入者入地故住者未轉向餘地故展轉者地地轉所住處故此釋根本智親證真如名為入等初證名入在證名住將轉趣後名展轉也次修習者通三漸次次第修行故後句云從行等者論云行者入住展轉成就故境界者此行種種異境界故此釋後得智謂此智行相依二處起一從緣世俗種種異境界起二從倣法根本智入住展轉生故云法智生也所以須此教説者為顯菩薩所説一切皆因佛力又合後代生正信故問若此地正體智親證真如後九地中不應更親證如無二無異故答古人解云如雖一味約智明昧故有十親證今解不然所以者何先難古非後顯正釋難古非者謂境智互相如約智證十如何名境智互相如約境一證如又難加行後智非親證可説彼智有明昧正體緣如不變影何得説此有明昧又難能證有分限所證無分限以限證無限境智豈相如後顯正釋者應知親證之言但望當地加行後得故名為親不望後地説為親故不相違也若不爾者一向名親則智生惑滅證如同佛不用後諸地若一向非親證則應同餘二智涅槃經説第十地菩薩猶未了見於佛性如隔羅縠者是也問十地中既無究竟親證真如有斷惑不答既望當地有親證還即但斷當地惑望後非親證不斷後地惑上來請分兩段中明第一段剛藏説本分已默然待三家五請訖自下第二明剛藏許説未説分齊於中二先長行敘意後如來下正以頌顯前中二先觀察等明説相後欲令等顯説意論云何故觀察十方等無我慢無偏心故此釋有別有通別中二種一觀十方佛欲承力説故示無我慢二察十方機欲令同入十地故示無偏心二通中亦二種一約承力二約授記前中承力示無我慢普觀顯無偏心後中欲顯受佛勸教説地依命觀機故無我慢十方皆觀故無漏心觀察之言通心及眼後顯説意中云增淨信者有二義一前剛藏解脫月初請已令衆悅令更決明故云增信二前來違請皆顯法深大衆已信今此受請更示深令信故云增也後正顯頌中有十二偈分二前七頌明義大後五頌明説大義大者所證故所以故名為義深故廣故名為大偈頌中二先長行敘意後如來下正顯偈頌前中論云何故觀察十方示無我慢無偏心故欲令大衆重增踊悅深生正信是故説偈示説正增益聞者堪受義故踊悅者心清不濁故踊悅有三種一義大踊悅為得義故二説大踊悅因此説大得彼義故又衆聞爾説分齊鳥迹喻之義生喜故又聞許説因分難説故生喜故謂前敘意中二先明觀方後欲令下顯説頌意前中二種一觀十方佛二觀十方菩薩前中二種一觀佛承力故不敢違請故示無我慢也二十方皆觀示無漏也後觀菩薩亦二種一觀器堪聞不輕夢故示無我慢二十方皆觀示無漏心也後説頌意中云重增踊悅深生正信者顯衆先聞地名已生信喜今説正地顯衆堪聞故重增信喜為得二大生此信喜一者義大即所詮地義此義深故名大義義即是大持業釋也説大者謂能詮教以所詮是大故名説大大之説故有財釋也後正顯頌中十二偈分二先七頌明義大後五頌明説大前中分五初二頌總顯地微二次二頌別顯微相三次一頌舉例顯微四次一頌寄對彰微五後一頌引喻辨微就初二頌中二先明難知甚微亦是説時甚微後求見下明難得甚微亦是證時甚微前中二初兩句總顯後一句別辨總中云微妙者謂諸佛也標果取因故云如來大仙通通是因因即地論云修行此道能到聖處故大仙者離染喻名世仙暫離染不得名大故難可知者彼微妙之道難説故後別辨中云非念者轉釋前難知謂非分別境界故離諸念者自體無念故故聖道名甚微也後難得甚微中二先總顯後無生下別辨總云求見不可得者難證得故謂若有所求則不證故別中有四甚微一無姤濁是觀行甚微謂觀智中不雜無明故不同世間定也二聰慧人智所行處是依止甚微謂依佛智所證第一義處菩薩地智依彼生故此中約三智總別分別總者通名見實諦智故別謂加行勝解故正體巧證本不生故後得隨聞明了知故三性淨恆寂然是清淨甚微謂性自離惑非先有後離故上一不同外道不依智者所行及六行伏惑執先有後離也四無生亦無滅是功德甚微謂此地智出世間故無生也為不捨利益衆生非一往滅故無滅也此不同二乘果人一往住涅槃故二別顯微相中二頌分二初兩句明同相涅槃後六句明不同相涅槃相即體也性淨涅槃空無相體一切諸法凡聖同故方便淨涅槃聖有凡無因聖分得果聖圓證由同相故凡聖一體不同相故凡聖恆殊二相非即離故凡夫即佛而非佛佛即凡夫而非凡就同相中初句總顯後向別辨總云自性本空寂者謂此地智本來即如空寂為自體與一切法同故名為本空寂為本本何空寂因緣生法此豈空寂若不空寂無因緣故空寂豈非所執性耶所執執依他識依他執遣便識圓成實不依他性識所執終不滅故無性攝論第五釋圓成性云於依他起上所執永無顯真性故此智豈是因緣生耶因緣無生之所生故無生生法豈非因緣耶因緣豈非無生生耶不識無生者不識因緣故後別辨中云無二亦無盡者此顯總顯中智空寂義遠離地前菩薩三亂意空一離損減謗空二離異體空三離滅盡空初無二顯離前二空後亦無盡顯離後一空前中一以智空有無二故智空不得智有故非損減一以智空即智有智有即智空無二體故非離異也後一以智空是即有之空非即滅方空故離滅盡故論釋初不同兔角一向是無二非智外別有空三非轉滅論經偈中加一有字此無二中攝盡不相違也寶性論中亦有此説故彼第四云此以何義初發心菩薩起如是心實有法斷滅後時得涅槃以是菩薩失空如來藏修行又復有人以空為有物我應得空又生如是心離色等法別更有空我應修行令得彼空釋曰二處三空前後雖異大意不殊準釋可知後六句明不同相中二先總顯後於諸下別辨總中云解脫者謂於三種雜染得遠離故分別煩惱見道斷故捨異生性得聖性故別中二初三字明所脫離染後五句明能脫體前中云於諸趣者六趣也惑為趣緣業種趣因生為趣果六趣修環不出此三此智離彼故云解脫後明脫體中五句即為五相初云涅槃等者此得平等相謂觀世間與涅槃平等一性非如二乘不知此理背世求出世二次一句云非初等者是斷惑相謂此智斷惑三時非斷斷有斷不可斷故論云非初非中後前中後取故遠法師誤取此文將為三時總具方成斷惑一一各別則不能斷故釋云治必階漸非定始終故言非初中後今謂不然先定三時後釋此文言初中後者有通有局局謂一一地中所應斷惑正斷唯在無間道中一剎那時即於此時説初中後若依雜集説十六心一一剎那經多時分故彼第九云心剎那者謂於所知境智生究竟名一剎那非唯於本無今有生時名心剎那何以故乃至於所知境能知智生所究竟名一剎那若約通論如集論説地別四通於中前三正是當地治惑因緣後一勝進為後方便故彼第五云云何加行道謂由此道能捨煩惱是名修道中加行道云何無間道謂由此道無間永斷煩惱令無所餘云何解脫道謂證由此道證斷煩惱所得解脫云何勝進道謂為斷餘品煩惱所有加行無間解脫道故後釋文者經宗法性斷惑依宗不宜異釋故論以前中後取之言釋經非初中後之意謂經説非三時者顯能所斷無自性無非説情無而言非也為遮謬解故反經而釋即由非故智離常即由取故智離斷離斷常故智生惑滅此時何有二體可得同不同時雜集第七亦同此説故彼中釋三種無上云智行解脫如次依止見修無學即復問云從何而得斷耶答不從過去已滅故不從未來未生故不從現在道不俱故然從諸煩惱粗重而得斷為斷如是如是品粗重生如是如是品對治若此品粗重滅平等平等猶如世間明生暗滅由此煩惱離繫令未來煩惱住不生法中是名為斷集論第四亦同此説問照惑無性惑即滅照智無性智應三答照無性理順智違惑故不同也然此斷惑諸宗不同依薩婆多無間道時惑得猶在若無現得使無所斷由此無間斷現在得依經部宗無間道時所斷惑種應生不生説之為斷依大乘宗自有兩説一云二真見道現在前時彼二障種心不成就如明與暗定不俱生如稱兩頭低昂時等諸相違法理必應然是故二性無俱成失此如成唯識第九卷説一説即此經等非初中後之初中後斷廣如前辨問大乘二説何者究竟答成唯識説為引攝小根權立斷義名同實教斷故説道惑不俱義同小宗斷故説稱低昂喻半同實教半同小宗方成引攝若全同異則引攝不成故名大乘權教又小宗説斷能所相敵權大顯後有俱成失權教自立如稱低昂還即不離俱成之過謂稱衡兩頭終是一體無能所治不相違害道惑不爾一向相違體非是一若合同一體則有明暗相乖離別異軀互不相及何以爾者依一向有能所治體欲離俱成失不可得故其俱成而無失唯法性宗爾廣如前説具顯斷或如別行章三次一句云非言等者是觀行相謂此無分別觀智非世間言説所及又不同聲聞依聲悟道四次一句云出過等者是轉依相謂此地智依止真如常住法身以是究竟轉依教或初地已上轉六七識得妙觀察平等性故此智證如依如而成能依所依俱是常故出於三世遷動相故為簡地前未轉依故論釋云依止常身故非如無常意識智依止無常因緣法謂未轉依時智依生滅識故智亦生滅今依常身智亦常故勝鬘云如來色無盡智慧亦復然一切法常住故此經上文十藏品云此菩薩於諸佛一向堅信乃至云知彼諸佛智慧不增不減不生不滅乃至廣説五末後一句云其相等者是解脫相謂二乘果智雖離我惑猶有法執故彼解脫猶有障得今此不爾二障并習迷皆都盡故云如虗空無障清淨也三次一頌舉例顯微中上半牒前深妙下半類顯地微前中云寂滅等者舉二涅槃寂是同相謂諸法本寂故滅是不同相謂滅惑者所顯故佛所行者行證也寂滅之智佛圓證故下句顯上離言下半類顯云地行者地智行相觀理行事悉同上離言四次一頌寄對彰微中上半顯難所由下半標對反顯前中初句云智起佛境界者正體智中觀真如而得起故真如唯佛親證境故大地菩薩無親證耶彼親當地此約圓滿次句云非念等者顯地智不可説故非念謂不同思慧境離心道者不同報生意識智境彼皆可説智非彼境故不可説此亦反顯下半反顯中上句明地智難説不同蘊等彼是色心可言説故地智不爾唯可內證下句顯難聞中云非心及者非耳識知故非意及者非意識思量故五末後一頌舉喻顯微中上半喻顯下半法合喻云如空中鳥迹者證成前頌唯可內證不可説聞之義謂空中鳥飛之迹離四句故難説難示一迹相同空空所攝與空無差別故難説有為二不無空飛之處故難説為無三唯一迹相故難説為亦有亦無四法應如是故難説為非有非無即由此故不可示他令見下法合云十地義如是等者謂菩薩地證智難説示故由於證真空智處以不住相之名等詮故此詮相難説示四句同前一詮相同於證真空智空智所攝故難説為有論云非如聲性故二非無名等詮地差別故難説為無論云非無地智名句字身三唯一詮相故難説為亦有亦無四法應如是故難説為非有非無即由此故不可以示他令見見謂聞見或此四句中但取前二句離有離無其義亦顯金剛藏菩薩正説此時即是難説説難示示誡衆依此難聞聞如是乃為説聞十地之義今此既是示説分齊應知此品所説地義施戒禪支道品四諦六度緣生等法乃至一句一字莫不皆如空中鳥迹離四句相若不作此解未識十地古人云此十地所説淺於地前者應不將鳥迹喻意照後所説故爾遠法師云風畫喻中舉畫為喻相故合之以説今舉迹處為喻相故合之以證有斯左右爾者此雖善議然復詳核或無左右所以者何前合文云牟尼智如是分別甚難見故牟尼此云寂默謂即證智也古人錯謂牟尼是釋迦牟尼佛故翻為佛智比來疏家雖亦解此佛智即是地智然不如此本存其梵言以此校量前後無別問地難説聞前已廣顯今何復説答前顯默因今為誡衆令其用心稱迹喻聽不得逐語失意所望各異無重言過因此而論上下説難非欲不説為顯三義一説難行相示衆便已顯地義故二為顯於法固請尊重難得故三為令衆捨見著故若不捨著隨聲取義有五種過一不正信二退勇猛三誑他四謗佛五輕法初不信者聽既逐教而不會意從此生信信不正也二由信不正故則無勝解於説深意不能決定名退勇猛也三由將自逐教之解為他説言此是深意四由為他説自謬解云是佛説五將本深説同己謬解又謬解成性後聞深不重故上來釋義大了自下明説大中五頌分二先別顯三種成熟大後此處下兩句總結許説分齊但是因分前中顯三成熟文即為三初一句明因成就大謂悲願熏心為起行因故二出生下明因漸成就大謂聞等慧漸次修行生出世智故三圓滿下明教説修成就大謂實智證真名言不及假言寄顯故名教説修問此三俱是説大中開出何故前二不名教説又俱是因中何故後一不名因耶答前二生後功能顯故同得名因體非玄妙不待言簡不名教説後一證智幽微濫同佛果故以言簡名教説修問三成就位差別如何答前二在地前後一在初地故論云聞思慧等次第乃至能生出世間智因故初地智生既爾後後諸地當知亦然就初因成就中慈謂等教衆生修善是等與喜樂因果也悲謂等教衆生不造惡已造者教除滅是等拔憂苦因果也願謂為衆生故求大菩提上三不同二乘狹自度及不等度故俱稱大也二因漸成就中應云次第出生入地行依梵語故倒也謂先聞次思後修次第行為能生入地之因行三教説修中有二種修一滿足修二是境界下明觀修前中云圓滿心者圓滿是所滿正智心是能滿淨心智行非慮境者謂證智非聞思慧等緣慮之境聞等但是彼智因行不能滿彼智地要出世淨心方能滿彼故後觀修中二初明觀境難見難説後佛力下明説聽之過誡衆敬聽前中云是境界難見者謂正體智境非分別能見故次云可知不可説者自心清淨唯可證智不可言説故心清淨者無分別故離諸漏故真如非是有漏心境故後明説聽過誡衆敬聽中有三頌分二先半頌標離三過後三頌重顯前三初中二先明二種過後汝等下誡聽前中云佛力故開演者謂説者聽者皆離二過故不離則不得證故説者二過者一佛不隨喜二不平等説聽者二過者一見諍過言我法是彼法非如是執著種種諸見故二於説法者不恭敬過前中由佛力開演故離佛不隨喜過由誡衆云汝等應受故離不平等説過後誡聽中云汝等應敬受故離二種過謂一由敬受故離此彼是非見諍之過二由敬受故離不恭敬説法者過後重顯前三中分三初一頌重顯開演次一句重顯敬受後五句重顯佛力初中三先一句總標地法次二句明説廣略後一句明略攝廣初中云如是者牒舉地法言智入行者智入是因解行是因行衆生以智解行行因得入地法次説廣略云億劫等者謂智行廣故説之難盡今但略説後略攝廣中云真實等者真實是如實謂智入之行雖多今但説其要略稱實理者還即攝彼廣多行法悉盡故云義無餘也二重顯敬受云一心恭敬待者一心有二種一身異心同故二前後無間故又有二種一身正恭敬如威儀住堪受説法故二心恭敬待如法決定堪能憶持故三重顯佛力中五句分二先三句明承力所作後二句顯承力分齊前中初句明承力云我承佛力説者示已無諂憍慢故承佛力者示非己力無增上慢故次二句顯所作云勝法等者謂以妙音善字説勝法故勝法謂地義與喻相應説故善字有二相一隨方言音善隨順故二字句圓滿不增減與理相應故後明承力分齊中初句顯多佛力後句明力入身中易可知也上來別顯三成就大了後總結許説分齊中上句牒所請説難説下句示説分齊前中云此處者指三家所請之處即十地義也難宣示者廣如前説此牒彼言後示分齊有二種一示説因分二示後所説皆如鳥迹喻意問因分果分之義分齊云何答古來諸德多説不同略敘四説餘不足論一云諸地加行為因正證為果二云約漸增門名因分十地差別可説故苦就圓滿名果分十地無相差別可説故三云教相名因證相名果四本疏云釋有兩重一云此十地有二分就實十地唯佛所知佛智所行名為果分上論云此智是誰證偈言佛所行故又上文云智赴佛境界故又加分中云不思議佛法故又如鳥迹依太空為果海等二隨相十地菩薩所知菩薩所行名為因分是則果分懸絶當不可説因分約機是則可説此通一部經中大意又云問菩薩證智豈可説耶答教説修中滿足修等是也二云十地有二分一約妙智正證智如境故離相離言故名果分則不可説如彼鳥迹同空不可説也二約方便寄法顯地差別如下初二三地寄同世間四五六地寄同二乘等又寄禪支道品諸諦緣生以顯地別令衆因此表解地義故名因分如空中迹約鳥説異名為因分同空無別名為果分一迹通二故為二分又云問約鳥約空迹皆離相云何有説有不可説答迹雖離相就鳥得説就鳥得説所説常離也迹同虗空理不可説所説地智準此可知此釋局斯地品故云雖為難即是一分也今復助釋或此二分唯在十地非預佛果於一證智不壞相邊可言説故名為因分相即無相非言及邊名為果分故此二句非一非異論云如鳥行空中迹處不可説相亦不可見何以故虗空處鳥迹相不可分別故非無虗空行迹如是鳥迹住處名句字身住處菩薩地證智所攝不可得説不可得聞何以故非如聲性故非無地智名句字身又云是地所攝有二種一因分二果分釋曰論既判云二分地攝故知果分非佛果也不爾佛果是菩薩故問若爾者本疏引教當云何通答前所引教或不成證所以者何謂佛所行者益智所證二滅果因非説佛智不爾二滅十地圓滿滿處佛行故作此説又智起佛境界者謂地智所契真如唯佛窮證之境故地智從佛境起非説地智即是佛智不爾十地無十親證又加分中云欲汝令為一切菩薩説不思議諸佛法光明者論釋云不可思議諸佛法者是出世間道品釋曰佛法之言通相之語此中即是十地佛法非地前佛法亦非佛地佛法如前論釋又鳥迹所依太空者論云如鳥行空中迹處不可説相亦不可見何以故虗空處鳥迹相不可分別故乃至合云菩薩地證地所攝不可得説不可得聞釋曰空攝鳥迹與空不別喻菩薩證智攝名句等與證智不別不曾説太空喻果海也問若爾者十山依海復云何通答彼文但説十山依海不説大海即是十山上來明第六大段請分了卍按大段第七説分已下約半卷散逸
