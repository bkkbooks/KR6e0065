body:
  text: 第二地中二先略料簡後正釋文前中二門一釋名二來意前中成唯識第九云具淨尸羅遠離微細犯戒垢故名離垢地十住毗婆沙云行十善道離諸垢故攝大乘云由極遠離犯戒垢故世親釋云性戒成就非如初地思惟護戒故無性同世親瑜伽同攝論二來意者有三一此經論云如是已證正位依出世間道因清淨戒説第二菩薩離垢地釋曰已證正位者初地也依此出世修三學行戒最居先故次説此二前地創證真如猶有微細誤犯戒障不能性自不待思擇護持淨戒要至此地方能故三前施此戒義次第故諸門分別廣如別章第二依文正釋中三一偈讚請説分二爾時金剛藏下正明本地分三爾時金剛藏欲重下重頌分初中五頌分二先三頌述衆度聞前地於中一心喜二身踊三語讚後二頌明解脫月正請後地一知衆樂聞後地二正為請第二明本地分中二初論主約清淨戒明其地行後佛子菩薩住此離垢地下顯其位果前中二先辨發起淨後佛子菩薩住離垢下明自體淨趣地方便生後地中三聚淨戒名發起淨三聚淨戒地中正行名自體淨前中三一結前舉後二何等下正列十心三菩薩以此下結行功能能入離垢初中三先結前次欲入下舉後後當起下勸修趣入二正列中二先徵後列列中初一總餘九別若通科之初六攝律次二攝善後二攝生總云正直者性自離惡清淨成就此於三聚發起方便中為初本故列之居首也列中一柔耎者不雜無記不善持戒唯善性故二堪能者能受他惱故三調伏者善守諸根不令誤犯猶如良馬性調伏故復正地中不待守護性自不誤故與此別四寂靜者不高己持不賤彼犯離高下散動故五純善者他惱不壞持戒之心如純真金雖遭打練色不失壞斤兩固存六不雜者一向進求不暫厭足又唯修遠離行不雜童蒙故七無顧戀者不眷顧生死中豪貴勢要而持戒故若爾者回向品説彼云何通彼為衆生此依自説如後句八廣者大悲利物受生三有願盡來際無竟期故九大者大智處有隨而不染故第二大段自體淨中三種淨戒即為三段一攝律儀戒論名離戒淨亦名正受戒淨二復作是念下明攝善法戒三佛子十不善業道下明攝衆生戒就初中三初總標戒所依地二性自下別顯遠離十不善業三佛子菩薩摩訶薩如是下總結初中云住離垢地者具釋如章二別顯中離十業道即為十段初段中二先總後不畜下別前中云性自等者隨修此戒任運成故列中三一因離二於一切下對治離三是菩薩尚不下果行離初中二種一離受畜因二不壞不離起因前中於緣名因如十因中相應等此中刀杖藥呪等是損命因緣皆不受不畜名遠離後起因中不懷等者此中三一離瞋殺謂於怨家不懷怨恨故二離癡煞謂有羞耻故崇賢人重善法故輕暴人拒惡法故三離貪皮肉等殺謂恕物同己愛命怖死此惑同初仁是慈忍翻瞋心故二對作離者此對治即離不同因離等於中二先總舉所對境後常生下別辨辨中二初云利益者是安隱心謂以善法教化令住善道及修涅槃因故後慈念者是慈心謂令得人天報乃至得涅槃樂果故此上二種是於因果不顛倒求故離邪癡煞生祠祀等三果行離者攬因成煞故名果捨此所作名離於中二種一微細心念害二何況下粗重身行惱害此以細況粗細念猶無況有粗行此中粗行有五一身謂於他故二事謂衆生故二想謂起衆生想故四行謂以重意故五體謂行煞害故梵本中云彼菩薩尚不起微少惱想何況廣大第二離盜中二先總後菩薩下別前中如前別中三離名字同前初因離二於他下對治離三若物屬他下果行離初離中云於自等者此菩薩具無盡財為離盜因故此何不説離起因耶有二義故一準前可知略故不説二即此句中具二因故謂一具外財故離初因二內知止足不起貪故離後因論經云自資財滿足故二對治離中於他等者他有二種一他身二他世於他身慈恕治瞋心損壞他財由今不損他財令自當來得不可侵損財也三果行離中有粗細二行先於屬他物乃至草葉不起盜心是細行離後何況下粗行離以細況粗顯離極故第三離耶淫中先總可知後菩薩下別中三初因離二不求他下對治離三於他下行果離初中離不足因妻有三種一示同事妻謂此地攝報作輪王身自妻第一故不求餘人妻二得法喜妻謂法味稱根身心遍悅不求二乘人所樂法故云於自妻知足三梵行樂妻謂此菩薩梵行具足身心常安樂不求世樂故如有頌言持戒最為樂身不受衆苦睡眠得安隱窹則心歡喜二對治離中不求他者他亦二種一他世妻謂菩薩修戒不求當來人天得多妻果故二他人妻後當説三果行離中二先約身顯無粗犯後尚不生下約心明無細犯前中三一不正二及為法下非時三況於下非處初中五一他妻妾者是不共護女唯夫護故二他前護女者是共護女謂無父母諸親共護故三親者有父母護故四族者高勝族望護非下族迮故五媒定者謂己受他財乃至許致要談故智度十五多同此説故彼云若女人父母兄弟姊妹夫主兒子世間法王法守護若犯皆名邪淫二非時中準智度有三非時一修梵行時縱自夫妻若受八戒時二婦人懷孕厭本習時三乳養時今此名故唯説法護同彼初一後約心明離細犯中以細況粗謂內心尚不生微細染念何況外相身行粗受三非處者謂口隱二道況於者有二義一謂於五護三非時女正處尚不起染心況於如是女非處從事二謂於彼五護三非時女正處尚不從事乃至不起染心況於如是女非處從事此即以正處況非處亦是以輕況重以正處犯者是等分煩惱非處犯者多貪煩惱非分理故輕尚不犯何況重犯若不爾者況字無從又此非處亦是約身離粗犯故不爾此應不離染心上來三戒約身業説三中初後境唯有情中一通於清非情境第四離妄語中先總復菩薩下別別中二先對治離後乃至下果行離此中何無因離者以對治離中實語等離妄語之尋伺是因離故就對治離中實語者依心説故真語者不虗妄故時語者隨時方便故此有二義一知時發言如法師知時等後當具顯二為護正法為救衆生設言不實事成利益非妄語故亦是時語如涅槃二十一云佛為諸梵志將佛説無我而是斷滅故佛告言我説衆生皆有佛性佛性是我彼聞獲益然則佛性豈是彼於所計我邪雖即非是然非妄語法華經三車誘喻理亦同此菩薩持戒本欲安生若護妄語不護衆生是凡小戒非菩薩也若由妄語能脫物苦設入惡道歡喜願入如是持戒非二乘測二果行離中亦以細況粗細中云不忍作覆藏語者論云覆見忍見大婆沙云覆相妄語名為覆見覆心妄語名為覆忍得本見前事實生見想誑言不見此覆己所見又實不見前事妄生見想誑言不見於事雖實於見有違故名忍見此忍已見故知不知等準之第五不兩舌中先總可知後菩薩下別中二先對治離後不作下果行離前中二先離離間心語後未破下明離離間差別前中二種一由欲令衆生和順故離離間心語不將此語向彼説等二由欲令衆生安樂故離惱害心不將此語向彼説等復離離間差別中三一離離間身二離離間心三離離間業此亦即是果行離初中二種一先未離間者不令離間二先已離間者不令增長二中亦二種一未離間者不欲樂其離間二已離間者不喜其離間不隨喜故三中亦二種一細二粗細者如實傳粗者不如實傳謂於兩處有實相毀語尚不傳説何況加減傳不實語第六離惡口有二種先果行離後常作下對治離前中離十七語先列後如是下結離前中分四一初四語語體粗鄙二次四語約對面不對面對面鄙惡庸賤不對面亦爾或對面庸賤不對面庸賤等三次三語語能違行前二違他行後一瞋惱違自行最後六語能違情於中前五翻喜生瞋復一違樂致苦就前五中未起瞋者能令生瞋令聞時不愛憶時不樂胸心閉塞故聞時不愛故心火燒憶時不樂故心熱惱後一能令己有同意樂事自身失壞令他生壞他聞背已失同友故自壞彼失我故壞他後結可知後對治離中作十種語同前分四初一潤澤對前果行中初四語二次二對前第二節四語三次四對前第三節三語可樂聞對前不可樂聞聞者喜悅對前聞者不悅善入人心風雅典則對前瞋忿四次三對前第四節於中前二翻嗔生喜後一違苦致樂或總通二第七不綺語中先總顯往可知後菩薩下別別中二先對治離後是菩薩下果行離前中八語分三初二教化語化令生信二次三教授令起行三後三教誡勸成德初中發言再覆不縱猝暴故言合時宜自他不損故次教授中無倒故有義利故授法令行故後教誡中準地持此開為五句初一是彼第二有罪者制故二是彼第一無罪者聽故三隨前制聽有缺減者如法舉故四數數犯者折伏與念念即是此籌量故五有實德者稱讚令喜即是此決定稱實讚故後果行中以輕況重可知上來語業四戒竟第八離貪欲中初總可知後菩薩下別別中唯明對治離上身業中具顯三離次語業中具治果二離今此意業唯一治離者有二義故一文影略故二此貪等是業道本更無所依故非果故不可對之更立異因故無因行以非果故離此貪等不名果離以無因故不可除之説為因離文中三一他財物者是事簡非己物故二他資用者是物體簡資與用別故資是衣食可以資身用是所用謂金銀等三不生等者是行差別謂始欲名貪次希得屬己名願後往取名求悉治離之故皆云不也第九離瞋中先總可知後菩薩下別別中三一初六句治瞋心二永捨下離瞋障三常思下對治行益初中一切衆生者總明為對治六種衆生一於怨讎多瞋故起慈對治二於惡衆生應危害之故起利益對治令修善獲安三於貪不足順緣者起哀愍對治不與樂四於苦衆生違緣逼者起令脫得喜對治不拔苦五著樂衆生以出世法調潤對治令捨六於發大心衆生起攝受對治故二治離障中永捨瞋恨怨害熱惱者此對前慈等六種所治障説故然惱是妄想欲令他惱故熱是妬忌他勝己心熱故準論經此文應回前後一於未生怨者能生已生者隨順增長二未生親者令不生已生者令不增長三於自身中善法未生者令不生已生者令滅四於不善法未生者能生已生者令增長五於他身中不愛事未生者令生已生者令增長六愛事未生者令不生已生者不念隨順不起隨喜相順之念於中一約怨生長是瞋力二約親不生是恨力三約自善不生是怨力論經名垢四約不善生長是害力五約他不愛事等是熱力論經名妄想六約愛事不生等是惱力論經名垢此六望前能治六種通相而説非一一別屬遠法師攝為三對初二以己對他明瞋恨怨之與親望己説故次二唯就於己釋其垢害後二唯就於他彰其妄妬初對中生怨為瞋敗親名恨未怨生怨已怨令增此是瞋也未親不生已生不增此是垢過也不善法未生令生已生令增是害過也後對中苦他為妄壞樂名妬於他身有不愛事未生令生已生令增是妄想也苦者是他不愛等欲令他苦衰敗劣已倒惑之甚過中最重偏名妄想於他身中所愛之事未生不令生已生不令增是妬過也三對治行益中常思順行仁慈祐益者謂一切時思念衆生隨順行仁慈與衆生福樂助益也第十離邪見中總句不言性離者影略準前故菩薩下別顯中依正見有七種分三初四見對梵行求衆生説次二見對欲求衆生説後一見對有求衆生説就初四中一菩薩住正道者心住大乘故此對治二我見二不行占卜者對治虗妄分別見此治邪見不信因果信占卜妄分別故三不取惡戒者治戒禁取見謂受外道烏雞等戒非善防過名惡戒執取惡戒為淨名惡見四心見正直者此治見取謂外道執己邪見為正見此即非正謂正故次二見對欲求衆生者一云無誑者對治覆藏見謂於追求時藏過顯善求利養故二無誑者對治詐現不實見謂無實德詐現有故後一見對有求衆生樂著三有不能於佛法僧起決定信今此治彼非清淨見故云起決定信上來第二別顯離十不善業道護持十善業道竟第三總結中二種護持一數圓滿護持具持十戒不缺減故二時相續護持常無間斷故上來第一明離戒亦名攝律儀戒竟自下第二明攝善法戒中二先別顯行相後如是方便下總結勸修前中四一明知二是故我當下明願三佛子此菩薩摩訶薩復作下明觀四是故我今下明行初中文二先明知者果處於此句中更開出一句依身生苦後明知者因菩薩自離無因他因知衆生亦爾謂墮惡由不善故非無因也由十不善墮惡故非他因也二願中文三一牒前起後謂依衆生不能自離惡行者果起願心欲救故云是故我當自住等二何以下徵徵意云欲救衆生即須往拔何以乃却自住善故三若自下釋釋意如文易知三觀中文二先思十不善墮惡道是所治障復十善業道下明五重十善是能治行前所治十惡具如別章後能治五種中一人天可知二聲聞十善中文三初總標次心狹下別顯後成下一句總結初中云智慧修者實相觀相應乃成上品故謂總觀十惡及人天十善具四諦理故苦集離是滅能治苦集是道又迷真實義愚是善道苦集因離彼愚是滅能治彼愚是道即真實義智也善惡道雖殊同是苦業諦無差別也次別中四句初有二義一性因本性狹劣故二習因謂宿習狹劣故狹劣謂但為自身修善根是微少故若存五性則一因差別先性後習若不存五性則二因同一先習後成性故今經意不存五性故唯説習二怖等者厭患生死故三闕等者捨衆生故四從等者從師學故若依論主分此句為二謂從他為一句聞下為一句聞聲謂念我衆生等但有名從聞此聲生解證人無我不能證法無我後一句結名可知三緣覺十善中三初總標次不從下別辨三成獨一句結名初中治淨乃成上品故別中三一不從等者不假佛菩薩説法唯自覺故二大悲等者不樂説法利衆生亦無巧説法習故三悟解等者觀深細緣生境行故論名少者不依教故深細者自覺故後結名可知四菩薩十善中文三初總標次心廣下別顯後成菩薩下總結初中治淨故乃上品也別中八句分四一因集二用三明力四地前三句各一後五句合一前各一中初云心廣等者此有三義一依一切善根起行故二依一切衆生利益行故三大乘心廣無量故此三釋因集謂自行他行行體也二具足等者謂見諸衆生習行苦因及受苦所起悲愍故依彼衆生利益是菩薩用也三方便等者謂四攝法是善行力攝衆生故復五合一中初發生等者初地是初阿僧滿處名淨深心地發十大願故二不捨等者是第八地第二阿僧祇滿處名不退轉地得寂滅行已不捨解脫以不住大寂法界故三希求等者是第十地第三阿僧祇滿處名受大位地是故求證佛廣大智受大位者受灌頂位也四淨治等者菩薩地清淨斷二十二愚故五波羅蜜清淨除諸蔽障淨三輪故此後兩句論經攝入第三希求句中後一句總結可知五佛十善中文三初總標次一切種下別顯後一切佛法下總結初總可知別中二初一切種等者所有十不善業道及習氣皆滅得一切智故二乃至證十力無畏者超諸功德直至説十力無畏故云乃至力無畏有二義一降魔摧外力自在故二捨二乘劣力不自在故後一句結可知上來第三明觀竟四明行中二先牒前起後顯自具行十善後應令下明令他具足清淨古德釋此文有二義一近望佛善以結求心故論名無厭足二上既通觀善有五重今乃結已應行十善唯求佛善後如是方便下總結勸修可知問向來五重十善與前律儀戒何別答前望止惡今約作善故分二位問十善翻十惡十惡既唯一十善何得有五重答善惡相翻亦應是一但以十善通世出世四位故有五種十惡不爾故不齊也問十善既五重所翻十惡亦應爾謂人天十善翻惡道十惡聲聞十善翻人天十惡乃至如來十善翻菩薩十惡邪答不爾謂翻善之惡違理損物不善相粗不通上位故唯一也反惡之善順理益物福隨於智乃通上位故有五種是故五位所離惡同故唯一種所成善異故有五重此即止同作別故此地是菩薩十善尚異二乘況同凡位若約寄言亦攝凡位攝善法戒竟第三攝衆生戒亦名利益衆生戒亦名饒益有情戒中文五一顯智謂善知衆生苦因果故二是故菩薩下明願謂依智起願願為衆生自修善故三自位下明行謂依願起行如誓修故四佛子此菩薩下明集謂依行攝生悲為益本故五作是念下明集果謂依悲成正攝生行故初中三初總明苦因二於中下別顯苦果三佛子十不下總結初中雖於一境上復是一人心造罪乃成上中下者此由造時心異成此差別自餘別境別心成差別者蓋不足論今就細説名時差別問雜集等皆説畜下鬼此何別邪答依正法念經三惡趣各有邊正謂大海下無間等八大是正在鐵圍山等諸處者名邊其鬼趣如波吒迦鬼鑊腳鬼鬼子母等名正若在人間遊行者名邊其畜生如熱沙龍苦等名正若在人所畜養等名邊然此三趣地獄邊正望於鬼畜一向苦故更無異説若邊鬼望正畜則畜重鬼輕斯經就此而説若正鬼望邊畜則鬼重畜輕雜集等約此而説各據一義不相違也二別顯中論名三途報為報果後人中受殘報名為習氣果雜集論等名三途報為異熟果人中受殘報為等流果等流中開出感外報為增上果今用自論釋兩果并取雜集等釋增上果初報果者正讎前因名為報故十相無異故皆言同墮三道不更釋也後習果者正報殘餘其猶習氣十相有異故文各別顯於中初煞內云短命等者由本煞時命未盡令他相續受苦故得多病由令他壽命不相續故得短命亦本將被煞時怖畏及死已皆無精光感外器資具等之少光澤二盜中由本令他財少故用不得故貧窮及共財不自若增上果感田苗遭霜雹損耗他財故三邪淫中由本令他妻不貞故亦由令他妻不隨夫意故外增由污穢他身居塵坌處四妄語中由本於他作不實語感被妄説有惡又由誑感外增上由口出覆藏之言外感應須蓋覆之氣五兩舌中由本令他分張故令他相惡故外增上由出不平之言故六惡口中由本口出他不喜聞語故由欲與物競方出惡言故外增上由語粗惡感鹹鹵磽確下惡田土七綺語中由本綺錯之言惑他不令解今感發言於他他不領受又感不分明亦由本不令他解增上由變正成綺故感外時候乖變八貪欲中由本常求欲事故感不知足又多求欲境故無厭外增上由本多貪感果實鮮少九瞋恚中由本不忍他善惡故又由惱害他故外增上由本惱害於他令不安隱所感果實其味辛苦十邪見中由本愛樂邪眷屬故又由愛樂不正理故外增上果所感果實其味辛苦或全無果邪因苦報故無利勤苦故三總結云無量無邊衆大苦聚者明差別果習氣果總別合觀故第二明願中二先牒前起後謂前智知已欲依智發願故云是故等復我當下正顯願前中二先願離不善後以十下願愛樂善第三明行中二先明自修行後亦勸下明依自行成攝生行此依智願起也第四明集中依增上悲念衆生故生十種心文中二先總標起後由生利益下別顯此十心復為八種衆生初利益心者論經中是第一心謂於外道衆生欲令現信佛法故二安樂心者於苦衆生欲令樂具不盡故三慈心者於怨增衆生不欲加報故四悲心者於貧窮衆生欲令遠離彼苦故五憐愍心者於樂衆生欲令不放逸故六攝受心者是論經中第一安隱心謂於惡行衆生欲生住善行故攝受安隱語異意同理無違故七守護心者於同行衆生欲令不退轉故八自己心者於一切攝菩提願衆生取如己身是諸衆生即是我身故九師心十大師心者觀彼衆生乖大乘道者敬之如師集進趣集具功德者重之如大師第五明集果中二先別明攝生後佛子菩薩如是下總結前中救攝亦有十類衆生文相有二先舉所化後明能化前集中為分釋十以寄前十種衆生以釋差別今此十類一一生所皆有如前十心救拔論分為四初一明他顛倒衆生違理乖境故二又作下五段明化欲救衆生求外五欲故三又作下兩段明化有求衆生求三有中果故四又作下兩段明化梵行求衆生妄求出道故今依論判攝十為四段定就初中二先舉所化後我應下明化益前中三初至邪見是總次惡慧下別後惡道下結初總云邪見者顛倒推求非淨謂淨故別中惡慧者論經名惡道按梵本中意云未那慧云未底聲勢相近字形相似故致謬爾今依慧為正此即妄推有我淨也惡欲者妄謂無常無樂法以為常樂故後結云惡道等者皆非正路故稠林者謂煩惱使多而難分故後明化益中二先云令住正見者通顯治前邪見邪四倒後云行真實道者治前行惡道稠林第二明化欲求衆生五中初明化受不共財衆生有二種一於現五欲受用生過此約受果時二於未得五欲時追求起過此約因時前中三一受不共財者謂己得之物不與他共於費用時起瞋過二受無厭足財者求時無厭生貪過三受貯積財者貯而不用順生三毒增於癡過就初中二先明過後我當下明治前中二先明鬪諍於言中後瞋恨下明對怨於心中亦可分別彼我一句亦是心中也能治中為治瞋故令住慈也二明化受無厭足財衆生中二先所化後我當下明能作前中二先貪取等者明貪於心中後唯求下辨於身口中計稱妄語等方便侵奪後能化中住清淨等者令彼衆生隨順對治淨三業正命活故三明化受貯積財衆生中先所化有二初明因貯生三毒後種種下明結過屬癡論云因體過等釋經因字謂貯種與貪為因故下別釋彼染著故者解貪也散用起瞋者釋瞋也彼寶玩等釋癡也數為下釋結成癡過謂不見火燒不求對治後能治中清涼處是涅槃治前大火上來三門是化起煩惱衆生下二門化造業衆生謂追求生過於中二初明追求現報造諸惡業後明追求後報造有漏善業四明化追求現報習諸惡行衆生中先所化有四句一為愚癡等者是無明覆心過謂由無明迷不見現報是苦妄生樂想求此妄樂造重罪業又不知此罪當受大苦二入翳下是增惡遠善過謂由此迷異熟愚故造三惡道業論中是愚癡因等者下釋此第二過文謂依癡起貪瞋等使滿足名癡為使之因言善行障即是遠善令離無流智順處故不善行是造惡業三失智慧下明受至大對過此即受苦報過失論釋云受此業因納果名受到果名至所受苦多有對礙故名對對極名大又大對有二種一受彼苦身二至彼苦處四行曠野下明多作罪因過此即增邪見過失論釋云由多作罪因於臨終時見惡報相心生悔雖見其罪相不能集彼正見對治後能化中三一化令得無礙淨眼二由得淨眼見法如實相三由見法如實故不隨他教以見一切法唯自心故五明化追求後報習行善行衆生謂由迷真實義愚造福不動業求當來人天報故先明所化中九句分三初在於等者是險道自體謂善根既少令人天報危易可顛墜名為險道故次將墜等者是險道障礙於中有七句一求出而隨順世間墮三惡趣故如世險道臨危故二入惡等者入苦果網中妄生樂想故如世險道有藤葛縱橫干蘭難度謂於五欲境妄謂為實句留難出故三為愚癡等者黑暗稠林所覆因彼癡使所覆故為説苦因而不覺如世險道有稠林遮障道路生死中癡暗所覆不見苦因故四隨逐等者隨逐虗妄道行顛倒行故如世險道多有惡獸等徑欲進反回生死中邪法滿世欲進乃回故五譬如等者盲冥得果貪著愛欲所盲故如世人在險道復無眼錯行謂正凡夫無慧目著人天樂癡愛覆心故六非出等者是希涅槃乃趣異處謂梵天等梵世間等以為出世正見如人在險難處迷道誤入餘道此生死中欲求涅槃誤求梵天正報梵世依報言等者等上三禪四無色等彼並謂為涅槃故七入魔等者怨賊行魔境著諸欲劫功德盡令不集故如人在險難處恐賊侵擾難得出離生死中亦爾五欲惡魔干擾五妙欲是魔境貪等是魔心貪著名隨順已有功德劫令盡未有功德不令集名惡賊上來初一次七八句古人將配四諦亦有少理在論無斷不煩強立後一句云遠離佛意者明險道失論經有三句此中唯有一句明作善智識地謂失出世善法若起順佛心名為佛意違背名離上來三段九句總明所化了後能化中二先拔出等治前險道自體後令住等治前障礙及失上二門明造業差別竟上來五段總明第二大段化欲求衆生竟第三大段明化有求衆生中有兩段一道差別謂五趣流轉過二界差別三界繫閇過前中二先明所化後我當下明能化前中初句總顯後入欲下別辨總中沒在大河過謂五趣漂溺煩惱瀑流如大河水求有沒中是其過別辨中十三句論攝為三初煩惱是五趣河體二處多損害名起難三離出世道名失又初名惑體二明障道三失善友初中五一入欲流等者顯貪深且多以是大河具四流故二生死等者往反旋環隨流不斷煩惱常行故三愛河等者愛水所沒故愛比餘惑流轉力勝故偏得名四滿馳等者漂急故如渡流水水緩則易出急則難過煩惱緩聖道可生若無間起惑聖道難發不暇觀察無對治故五為欲覺等者顯廣渡如河水若狹雖急猶可渡此既多起惡覺故難渡亦如河無毒蟲則易渡此有惡覺蟲害故難出次身見等者自下明第二起難有四種此即第一謂執著我我所窟宅不能動離故二將其等者先捨欲已還復轉入欲念中故三於所等者於受用時求欲等樂著故上二是愛一於種子不滅還來二約現行染著故泥溺四住我等於用事時我等最勝三種我慢自高輕彼最後一種是慢如人在河水有四事難出一彼執住二被回流三為泥溺四滯枯洲不到彼岸謂愛令心下喻河深流不證涅槃山也慢令心舉喻陸地燋枯法水不霑也論舉我等等取三種如下三地中一我慢二大慢三憍慢初是於下自高二於等自大三於上不恭後安六處等者自下第三明失也於中三一無出意失二無救失三異處去失此即初也謂善道中無出離心故二無善救等者處惡道中無人濟拔三無能等者生諸難處不值佛世後明能化中二先於彼等者明起化心後以諸等明成化行行中四一令無等者離苦果故二離染著離苦因故三寂靜者令得涅槃故四住於等者令得菩提故後明界差別中先所化內三初總謂處三界如在牢獄難出次別中五種過隨逐一苦事二財盡三愛離四者縛五障礙此示五難一多諸等者無病難多諸病苦妄想愁惱故二常懷等者資生難於愛不愛事中憎愛所縛故三自生等者親難親愛壞憂悲增長故四貪欲等者戒難雖生色無色中暫離犯戒不免戒行相違愛欲使縛故五無明等者見難得世間智彼相違無明使覆蔽故後能化中令彼永離等者有二種一治前難出二治前繫閉上來兩段明化有求衆生竟第四大段明化梵行求衆生中文有兩段一化邪梵行求令捨邪歸正二化正梵行求令捨小入大就前段中二先明所化於中七句分三初一句總次五句別後一句結初總云執著於我者是取我相過此是餘見根本故偏舉通俱生分別也次別中五句一於諸等者彼諸衆生欲趣涅槃城以有我故於五陰舍不能動發二依六處等者依持我想欲起涅槃虗妄我見住六入聚落三起四倒等者欲行正道以顛倒故行彼耶道四為四大等者受三八等苦厭之欲離不得恆隨身五五蘊等者陰怨隨逐不相放捨後一總結云受無量苦者常為種種諸苦隨逐此亦是外苦也後能化中二初令住等者令住道諦治前執我相後所謂下令證滅諦治前別中五句過及結句中過後明化正梵行求同法小乘過二先明所化內三一其心等者是不樂大因過謂於多衆生應作利益而乃懈怠不能廣度二不行等者是依小乘心願過願小乘故上二是求心過三雖欲下是修行過謂不定聚衆生實有大乘出離之法而反樂修小乘行法故是其過後明能化中二初云令住等者治前小乘心願過謂令住微妙無上佛法廣大心故後云廣大等者治前修行謂依持戒行故得此戒力能作善法善巧起諸善行故依持戒行著者謂依前持律儀戒攝善戒起此攝生戒力論名依持戒行得此戒力是故能作善法善巧起攝生善行故云廣生大慈悲心梵本中云菩薩如是成就戒力善能增長慈悲之心上來兩段明化梵行求衆生竟上來十段攝為四段總明集果竟上來智願行集集果等總明第三攝衆生戒竟上來第二別明三種戒竟自下佛子菩薩下總結可知上來三戒明地體了自下第二明位果中三果名同前地初調柔果中三一調柔相二佛子此菩薩下明別地行相三佛子是名下結名初中三法喻合也法中三初見諸佛為練行緣二於諸佛下明能練行三是菩薩下明所練淨能練行中二先供佛後於諸佛下受法以戒地受十善法論云有者同者調柔等三同前地故無者應知者應知者應知無發趣果此中勝事者調柔中勝過前地故三所練淨中謂於多劫離慳嫉破戒垢心成就施戒淨等諸勝事故此地二戒俱性成淨前地戒未性淨令施亦未淨若爾何故前名施增上彼望前為上今至此轉勝然諸地行有四義一就別顯異初地唯檀乃至第十唯智增上二辨勝過劣初地檀勝二地菩薩勝三地三度勝乃至十地十度勝皆是以後兼前故後勝前前不兼後故前劣於後三約實行修行一一地中皆具十度四約證理行唯平等平等非一非多下諸地準之喻及合中並可知二別地相中離口四過故兼愛語也攝報果中金輪過前前百此千者瑜伽云當知威力過前十倍餘如前地及論可知第三大段重頌分中有十五頌分六初一頌頌前十種直心二有二頌頌律儀戒三有二頌半頌攝善法戒四有四頌半頌攝衆生戒五有四頌頌調柔苦果六有一頌結歎所説第二地竟第三地中二先略料簡後正釋文前中二門一辨名二來意初中成唯識第九云成就勝定大法總持能發無邊妙慧光故名發光地釋曰勝定即等持等至大法是教總持是聞持念慧為體妙慧光是聞思修謂由總持治忘失障能發緣法聞思二慧及發依定緣法修慧此地能發如是妙光從果名也金光明云無量智慧光明三昧不可傾動無能摧伏聞持陀羅尼為作本故名明地攝大乘云由無退轉等持等至所依止故大法光明所依止故名發光地世親釋云由此地中與三摩地三摩鉢底常不相離無退轉故於大乘法能依光明名發光地無性釋云靜慮名等持無色名等至或等持者心一境性等至者正受現前大法光明所依止者於大乘法得智光明此地是彼所依因故名發光地解深密及瑜伽意同攝論顯揚云證得靜慮三摩地蘊大智光之所依止十住毗婆沙云展轉多學為衆説法能作照明故名明地智度論名為光地仁王經名明慧地十地論如前釋二來意者有三一前戒次定義次第故二前位能持微細戒然未圓滿世間等持等至及未圓滿聞法總持為得此故故説此地令勸修學如深密説三謂初三地寄世間施戒修前已辨施戒今此顯修故來也諸門分別廣如別章第二正釋文中三分一讚請分二爾時金剛藏下正説分三爾時金剛藏欲重下重頌分初中六頌分二先三頌慶聞前地後三頌請説後地前中三初半頌總標前聞次一頌半三業供養後一頌顯説意後請聞後地中二先兩頌諸菩薩請後一頌解脫請前中初一總請三地行後一別請十度行後解脫請中讚剛藏説地義如師子吼得無畏故下句云柔和等者謂此地菩薩得等持等至故就第二正説中二先依論主科前四分後佛子是菩薩住此發光下明位果前中四者一起厭行分二佛子菩薩摩訶薩住第三下明厭行分三此菩薩得聞法已下明厭分四佛子此菩薩心隨下明厭果分此地修禪厭伏煩惱名為厭地初入地心修起彼厭名為厭行趣地加行起彼厭行名起厭行分所起地初名厭行分正住地中修八禪等名厭分地滿足故名厭果分又四分如次加行無間解脫勝進四道也就初分中三一結前起後二何等下正明十心三菩薩以是下結行入地就十心中一清淨者依前淨戒起此趣禪淨深心冠下九句二安住者堅住自大乘不捨故三厭捨者志求勝法起善方便能厭當欲故二地滿已趣向三地名求勝法四離貪者依現在欲不貪故上二據當貪未起但可厭現貪交捨名為離貪欲障禪是故厭離五不退者依不捨自乘進行故六堅固者依自地煩惱不能破壞故自地者此第三地也遠法師云是前二地辨法師云是四禪四空並難依也七明盛者依等至自在故謂定根本是通所依明盛即是自在異名故八勇猛者依禪定自在有力雖生下地而不退失故謂雖修得上定不隨禪生雖生散地不退定心此明修定淳熟有力自在故云勇猛九廣者依欲界生煩惱不能染汙故謂智力既廣尚用煩惱為佛事故十大者依利益衆生不斷諸有故謂大悲不捨利生常處有故三結可知第二厭行分中三初明厭離有為名護煩惱行二見如是下捨狹劣心名護小乘行三菩薩如是厭離下明修方便攝行初中二十句明觀一切行無常無救前十句觀無常知法體性後十句觀無救就人顯過前中二先總標所觀説後所謂下別釋前中云如實相者謂稱有為法自體觀無常故論云命行不住故者謂色心相續一期分位剎那生滅故此即總相無常觀後別釋中八句分二先六句明有為無常法自體後兩句明彼法上無常之義前中前四句約正報後二句約依報前中一無常者依不護諸惡力橫夭壽等謂以不避履險喰毒之力致損命故此句冠下諸句謂苦無常不淨無常等二苦者依身轉時力生三種苦故謂身命將轉時其報體念念生滅故雖樂住而不自在故生行苦此時與所愛內外別離故生壞苦正轉報時受力風解形故生苦苦三不淨者依飲食好惡力令形色增損又飲食轉變成不淨故四不安隱者依輪回六趣無暫停故謂不停是不安不安即無常故五敗壞者依前世間成力滅壞故謂依成力得有壞故六不久住者依資財無定力能住一主處故後明無常義中二句初句云剎那生滅者少時無常故謂生與滅俱少時不常住故後句云非從等者自性不成實無常故謂三世因果無常皆無自性不成實無常如過去因生現果時推無能所生故現在因生當果時推無去向後現在法正現前時推無住者故是以三世法流轉即無流轉轉以無無常為無常體維摩云一切法不生不滅是無常義故也二明無救中二先總後無救下別前中云又觀此法者牒前所觀無常行法今此重觀故云又觀後別中分四初四句約起説無救次二句約於外受求事中説無救次三句約老少病中説無救後一句通顯前九皆無實不可救就初四中一無依者少壯時死未至望後死至無告詐依託相救令免故二與憂者無常既至無能救者多無憂苦故謂慮恐死名憂憂是心法共心相應名與憂苦相續名多三與悲者中間同悲故與義如前謂生蘊轉壞死相現前名中間憂增名悲悲與心同故四苦惱同住者同苦惱事中憂悲隨逐其力虗弱轉增熱惱故謂正死時同苦事中增熱惱也次二句明於外受求事中無救初句云愛增所繫者追求資生時欲所愛事不欲不愛事如是妄想愛增常護後句云憂戚轉多者受用時中樂少苦多故謂求得已守護多彼侵害乃至失命損惱多於貧窮時苦後三句約老等明無救初云死有停積者身老時望少壯盛色不可復集故謂老無常無救令免二云貪恚等者於少壯時具三種受貪等常燒故謂樂受生貪苦憂二受生瞋三受俱生癡常受三受故常起三毒火常燒自善根不息是常義也三云衆患等者於年衰時無量病苦增長故謂病雖通老少然老時增多故就老説此病苦至無救令免四末後一句云如幻不實者通顯前九皆無實體不可救故謂如幻人雖示老少病相及受求外事等皆無真實無可救故第二明護小乘行中三十句前十句明護小心後菩薩如是見下二十句明護狹心前中二初總後見佛下別總中云見如是等者牒前起後謂於一切有為行生厭離已趣向佛智慧厭心過前故云倍增別中十句分二前五句明依佛智攝功德大後五句依佛智清淨大前中一見佛等者神力攝功德大故二無等者無比攝功德大無有敵對故三無量者大義攝功德大廣能利益無量衆生故四難得者無譏嫌攝功德大希有難得故五無雜者不同攝功德大諸外道不雜故後五清淨大中一無惱者離煩惱使苦得涅槃故離煩惱使者離煩惱習無明不雜故二無憂者論經云無苦謂苦根本盡憂悲隨盡故苦憂在身心異逼迫義同隨一盡時餘即隨盡皆通無違三至無畏城者得涅槃果故四不復退還者菩薩至涅槃城不復退還五能救無量苦難衆生者至彼城不退故而能利益衆生得世間出世間涅槃勝事得人天善化名得世間三乘法化名得出世涅槃勝事又福德名世間智慧名出世此二同是涅槃勝事以見此益菩薩求之也後獲狹心中初十句起悲後十句救度亦可前十悲心後十慈心前中二先牒前起後舉數總標謂見佛智勝益見有為多過故於衆生哀愍後何等下正顯於中初句是別中之總餘是別中之別言孤獨無依者論云無救救即是依眼目異爾世間無父曰孤無子曰獨今此則一切衆生皆佛之子遠佛慈父曰孤無善心子曰獨由此孤獨苦無依救故可愍此句遍在下諸句下別中九句初二依欲求衆生次三依有求衆生後四依邪梵行求衆生初二中一云貧窮等者求財無厭常懷不足名貧窮困乏二云三毒等者於他資財求無止息名三毒火然謂初求生貪散用生瞋貯積生癡三毒燒心名火然次三有求中一諸有等者繫在苦果未免故二煩惱等者苦因未斷故三不善等者無善觀為對治故後四邪梵求中前三小乘後一外道初一無善等者不求大菩提因唯樂小善故二失諸等者不求大果妄取小果恃為究竟增上慢故三隨生等者不求大涅槃界雖入無餘依涅槃界乃是三昧住寂猶有三餘無明住地惑無漏業變易生死由隨此轉名隨生死流後一求外道過妄行邪法怖真涅槃後十句明救度中二先牒前起後總明度心後作是念下別明度心前中謂見衆生多苦起精進行故別中初一是別中總總明救度心後九是別分三初三除三障顯度處次五授三學明度行後一令苦滅是度果就初三中一脫彼業結二淨彼惑染三度彼苦報次五中初二授三學後三授法利益前中一云應著等者勸之置持戒處故二云安住者勸住定慧處令安住故定慧合此一句內者以前地戒成就分戒別辨後地明慧位未至故慧從定説故合云爾論云三昧地故定慧合説後三句中初二約戒後一約定前中初云歡喜者謂受戒者令除戒疑信重戒德歡喜樂受故二云知見者謂彼受戒已示以持犯令知見所應不應故後一云調伏者約定説謂定如行伏於沈掉引得身心安和位故後一云涅槃者度彼令得苦滅果故第三修方便攝行中二先述意後釋前中菩薩因前三種觀故便知生死多過難處衆生離佛智有大利益衆生未得復念衆生墮在惑業苦中以何方便而能拔濟令住究竟涅槃樂即知不離無障礙智無礙智者是如來智智由何生即知不離八地已上如實覺起覺由何生即知不離四地已上無行無生行慧慧由何得即知不離三地禪由何得不離聞法是故菩薩先求正法既聞法已靜處思惟思已起修入禪無色依此禪定觀法無生起出世慧依無生慧起如實覺依彼實覺得無礙智既得智已便能拔去出生死得涅槃樂後釋文中方便有五一起觀方便牒上三心起後觀求二欲依如來下明標趣方便謂標佛慧顯行所起三作是思惟下明觀求方便得觀察推求度衆生法四便作是念下明正知方便謂佛智能救衆生乃至知禪由聞慧得五菩薩如是觀察下明攝修方便謂修間法行攝取正法初中三初牒上護煩惱行故云如是等二牒上護狹心行故云愍念衆生三牒上護小心故云知一切智等論主依此三心能起後行故説此三為三種因初一是離妄想因善厭離一切有為行故二不捨一切世間因愍念一切衆生故三發精進因知一切智智有勝利益故於中知利益勝者能修行彼道故愍念者善化衆生故二標趣中欲依佛慧救度衆生者此三地中方便攝持以知不離無障礙智能度衆生故欲依自當成佛智救度衆生非但依他佛智也三觀求中集上厭離愍念知益三心為因起此觀故菩薩思惟衆生墮惑苦中者論經中及説業今此略故問前救度十心中欲於惑業苦中救度今思衆生墮之以何方便而求度行向前已知三學為救度行何故今云以何拔邪答前雖知彼戒等度法然未知用何智慧能授此法問若爾前護小心中已知如來智慧有大勢力能救衆生何故今云以何拔濟答前雖見佛智能救然佛果在當未可現用而謂佛智之外更有餘法能救濟不故云以何方便此中簡小涅槃同彼化城非是究竟樂故云令住等四正知方便中二先牒前起後後不離下正顯顯中五法四對論攝為三言五者一住無障礙解脫智二一切法如實覺三無行無生行慧光四禪善巧決定觀察智五善巧多聞言四對者一從多聞起禪二依禪起無生慧三依無生慧起如實覺四依實覺起無行無生行慧論攝為三初無障礙智説為證盡末後聞慧説為第三彼起依止行中間從聞起禪乃至實覺起無障礙智攝為第二起上上盡謂佛無礙智證中窮極名畢竟盡故起上上證畢竟盡者聞起禪定乃至實覺起無礙智名之為起起中漸增名為上上終窮佛慧名為證盡故彼起依上行者聞慧為彼起行所依止故言不離等者謂救濟衆生令住大涅槃要得佛無礙智方證其智等名云何得佛智出垢染名無障礙德用自在稱為解脫此智要依八地已上一切法如實覺起謂此地菩薩於佛所説一切法中得稱實教理覺了現前故一切法有二種一於三地聞一切法中得如實覺謂八地中十無生忍及深行等二於七勸一切法中得如實覺謂八地中無量身等及淨佛土十自在也如實覺有二種一稱實性而覺了故二稱佛所説覺了故言無行等者亦有二種一染淨諸法集起名行四地已上證空平等見染淨行不生不滅以無染行可斷滅故名無行若具應言無滅行略不言故以無淨行可修起故名無生行慧實覺依此故名不離一云謂八地無生慧是無功用行慧慧任運應用名光言禪善巧等者謂三地菩薩修厭行時即於中修起善巧決定觀察智故禪善巧者得勝進禪故決定者於他四地決定向故觀察智者是自在智慧非從此後所生智故善巧多聞謂於所聞法得即心自性不由他悟之聞慧故五攝修方便中二初牒前起後後日夜下正顯前中謂先為救度發大精進今觀知已倍於正法勤求修習修習即是此求法行後正顯中二先明求法行後菩薩如是下顯重法心成前中十句初云日夜等者常勤求法無怠慢故二喜法者不為妬勝喜他求故三樂法者自愛玩而問非所伏他問故四依法者依大乘教自求取正見不忘失故五隨法者依讀誦隨文不失次第故六解法者依為他説令解故七順法者依靜處思義隨順觀順觀察故八赴法者依修行定赴究竟故九住法者依出世間智住故十行法者依諸佛解脫法隨順彼行故此中求正法行當求聞法此初二句顯道勤行故喜法已下顯正修行故餘如論釋後明重法心成中二先明能求法因後如其所聞下顯所求行因前中為重法捨內外所有略舉十事於中初二明捨外後八明捨內前中初一牒前起後云由求法殷勤故無所惜二不見下明世財易得法寶難遭後八中初一總句結前捨外顯後捨內故云為求佛法能捨內外財二無有恭敬及隔句云承事明捨身行所作三無有憍下明捨高大意故四無有勤下明捨所應護者謂衆生皆自護身不欲受苦今能受苦是捨其護也五若聞一句下明重法心成於聞少法喜受相應勝財多勝妙財所生喜受故六若聞一偈下明寧聞少法而捨人中最勝王位樂受故七若得一偈下明寧聞少法而捨天中最勝王位樂受故八若有人下明求法能入滿三千界火及地獄中火受苦惱是捨身命故梵本中六七兩事合為一事八中文復少異故彼云若聞一偈未聞正法獲得釋梵轉輪王位多千劫住亦不能及若有人來作如是言我有正等覺句淨治菩薩行句汝能投身大火坑者當為汝説復作是念我為一句法故設有火坑等三千界尚從梵天而自投下況彼小坑而不能入設住一切地獄受苦猶應求法何況暫受人間小苦梵漢有此不同可知此上聞偈句是聞教淨聞菩薩行是聞義後明所求行因者明依寂靜處思惟正觀故第三大段厭分中三初牒前起後二佛子是菩薩下正明厭體三但隨順下明入禪等意初中謂聞説法意次思所聞及念修行以不但口説亦得淨故梵本云非但口業能得清淨此顯他因也二顯體中二先據所住地後即離下正顯顯中二初明四禪後超一切下顯四空處中先以義料簡後正釋文義中二門分別一釋名二出體名中先通後別通者小宗大婆沙一百四十一云問此四何緣説為靜慮答靜謂寂靜慮謂籌慮此四地中定慧平等故稱靜慮餘隨有闕不得此名此依主釋也亦可從果為名又婆沙八十云以何義故名為靜慮有作是説以能斷結故問諸無色定亦能斷結應名靜慮答若定能斷不善無記二種結者名為靜慮諸無色定唯斷無記非不善故不名靜慮復有説者以能正觀故名靜慮問若爾欲界三摩地亦能正觀應名靜慮答若三摩地具有定名定用能正觀者名為靜慮欲界三摩地雖有定名而無定用如泥椽梁有名無用故非靜慮如是説者要具二義方名靜慮謂能斷結及能正觀欲界三摩地雖能正觀不能斷結謂無色定雖能斷結不能正觀故非靜慮復次諸無色定有靜無慮欲界三摩地有慮無靜色定俱有故名靜慮靜謂等引慮謂遍觀故名靜慮依大乘宗意同正理初復次釋瑜伽三十三云於一所緣繫念寂靜而審思慮故名靜慮言別名者瑜伽云依順次數説名為初乃至第四小宗正理亦同此説二體性者小乘宗中大婆沙第八十云四種靜慮各以自地善染無覆無記五蘊為性又彼一百四十一云四靜慮體有二種一修得二生得修得者即彼地攝心一境性并助伴即五蘊為性生得者隨地所繫餘五蘊為性今大乘宗大同婆沙有生及定生即善染無記五蘊為性善用有漏無漏五蘊為性上來略顯二門竟若廣分別具如別章二釋文者前四禪中支類多少雖有異同然皆勒為四義分別一離障二對治三利益四彼二所依初禪中初云離欲等者一離障也謂離五欲故名離欲斷十惡故名為離惡除五蓋故名離不善法如毗曇中説若依成實斷貪欲心名離欲以離欲故亦捨殺等名離惡不善法智度云離五欲故名離欲除五蓋故名離惡不善又諸欲發惡行隨極惡處名欲惡違生善品故或總謂欲界諸不善俱捨離故雜集第八云能斷欲界欲恚害等二有覺有觀者是修對治論云譬如振鈴粗聲喻覺細聲喻觀新譯經論名為尋伺皆是惡慧為性然粗細異尋求伺察欲界過患能除滅故瑜伽十一云以不淨治欲以慈治恚以悲治害故修三行治三患入初定也三離生喜樂者是利益故雜集第八云由尋伺支治可治已離生喜樂謂離彼所治生喜樂故悅心名喜悅身名樂四住初禪者是彼二所依謂定心是能對治及利益所依止故何不説與所離為依者彼是所斷非是支故雜集第一云心一境性是彼二所依自性支依止定力尋等轉故心與境合如一體故名心一境性二禪中初云滅覺觀者是所離障謂覺粗動發生三識擾亂二禪如靜水波動則無所見故二內淨等者是能對治顯揚十九云內等淨以捨念正知三法為性即是彼三禪中支也瑜伽六十三亦同此説一心無覺觀者舍利弗毗曇云欲界地中心行六處六識身取六塵故初禪地中心行四處以四識身取四境故初禪已上無鼻舌識故二禪已上心行一處唯意識身緣法塵故又相續不斷亦名心一等三定生喜樂者是修行利益支前初禪中創背離欲惡慶離生喜此第二禪中法從內生慶得生喜樂喜樂同前四住二禪者是二所依止定第三禪中離喜者是離障謂二禪喜以分別想生動故多過三禪轉寂故須除遣如貧得寶則生喜若失則深憂莫若憂喜俱絶方為快樂二住捨有念正知者是能對治支謂捨是行捨捨彼喜過有念者念前喜過守心一境故正知者分別喜過明見其失又此三深細寂靜下地喜踊躍浮動動靜相違故是所治顯揚云住捨者於已生喜不忍可故平等正直無動安住念盲於喜不行中不忘明記故正知者或時失念喜行於此正知而住三身受樂者是利益支謂喜在意地樂在五識故云身受又樂受有二種一下品適悅在心亦上品適遍身心就所遍處從末為名故云身受言諸聖所説能捨者顯樂深勝唯諸聖能説為過堪能捨離非凡所能四有念樂受住三禪者是彼二所依止定謂常念自地樂受利益住此禪也第四禪中初斷樂先除苦憂喜滅者是所離障謂三禪勝樂雖是樂利益與第四禪極相妨害如重病人觀妙音樂為障四禪故須除遣若爾應俱除樂何須更置先除苦言釋曰理實苦根二禪已離此中更標者為顯此位五受中唯有捨受是不動故喻伽十一云初靜慮出離憂根第二靜慮出離苦根第三靜慮出離喜根第四靜慮出樂根又云問何故苦根初靜慮中説未斷耶答彼品粗重猶未斷故問何緣生苦初靜慮者苦根未斷而不現行答由其助伴相對憂根所攝諸苦彼已斷故若初靜慮已斷苦根是則行者入初靜慮及第二時受所作位差別應無所由二俱有喜及樂故釋曰以初二定俱有喜樂若齊離苦則二受不殊故初不斷苦之粗重然無現行故有樂支又小宗此但是輕安非受故又初禪喜劣猶為苦根粗重所隨故不名滅苦二禪喜勝滅苦粗重名滅苦根二不苦不樂者是利益支餘禪中皆先明治今此先明利益者以我前斷苦斷樂對之則明不苦不樂彰益義便故理實在後問此只遣樂何不但言不樂而云不苦不樂答為明捨受不同苦樂故問前離障云喜憂滅何不亦言不憂不喜答有二義一非此正滅亦非苦樂相對故不類苦二若攝五受為三受憂喜攝入苦樂中故以苦樂寬故是故捨受對彼但名不苦不樂三捨念清淨者是對治支前三禪中為樂所覆故捨念不淨今此離彼下地樂受故云清淨也捨念與樂受相違故成對治四住第四禪者是彼二所依止定也後明四空中二先以義料簡後正釋文前中略以二門分別一釋名二出體釋名中二先通後別通者小宗婆沙一百四十一云問何故此四説名無色答此四地中超過一切有色法故違害一切有色法故色法於彼無容生故説名無色此無他受稱言別者婆沙八十中有四復次釋故彼云初空定者但由加行名空無邊處定謂初業者先無思惟墻上樹上岸上舍等上諸空之相取此相已假想勝解觀察照了無邊空相以先思惟無邊空相而修加行展轉引起初無色定故説此名空無邊處復次法爾初遠離地名空無邊處復次法爾初解脫色故地名空無邊處從此定出必起相似空想現前曾聞苾芻出此定已便舉兩手捫摸虗空有見問言汝何所覓苾芻答曰我覓自身彼言汝身即在牀上如何餘處更覓自身故從此出起虗空想此想即是定之等流是故名為空無邊處具説如彼俱舍意同初釋正理及顯宗同婆沙初三復次第二識無邊處者大婆沙云但由加行名識無邊處定謂初業者先應思惟清淨眼等六種識相取此相已假想勝解觀察照了無邊識相以先思惟無邊識相而修加行展轉引起第二無色故説此名識無邊處復次依等流故説此定名識無邊處謂瑜伽師從此定出必起相似識想現前謂於識想歡悅而住是故名為識無邊處廣説如彼俱舍意同初釋正理顯宗同婆沙第三無所有處者大婆沙云問此何故名無所有處答此中無我無我所故問一切地中無我我所何獨此名無所有處答無有餘地能令我執及我所執羸劣穿薄勢力減少如此地者故此獨名無所有處復次此地無有真實常恆不變易法損伏常見勝諸餘地故此獨名無所有處復次此地無有所趣所歸屋舍室宅能為救護摧伏憍慢懈怠放逸勝諸餘地故此獨名無所有處順正理云若由勝解捨一切所有加行所成名無所有處謂無邊行相粗勤為令厭捨起此加行是故此處名最勝捨以於此中不復樂作無邊行相心於所餘捨諸所有寂然住故顯宗同此第四非想非非想處者大婆沙云問此何故名非想非非想處答此地中無明了起相亦無無想相故名非想非非想處無明了想相者非如七地有想定故亦無無想相者非如無想及滅定故由此地獨寂靜羸劣不明了不決定故名非想非非想處俱舍正理及顯宗等意並同此順正理云此四無色皆言處者以是諸有生長處故謂此四處為有生長種種業煩惱故為明妄計彼是涅槃故佛説為生長有處依大乘宗瑜伽三十三云復次以於虗空起勝解故所有青黃赤白等相應顯色相由不顯現故及厭離欲故皆能超越除遣如是有色有計種種想已起無邊相虗空勝解由已超過近分加行究竟作意入上根本加行究竟果作意定當知此中依於近分乃至未入上根本定唯緣虗空若已得入上根本定亦緣虗空亦緣自地所有諸蘊又近分中亦緣下地所有諸蘊若有欲入識無邊處先捨虗空無邊處相即於彼識次起無邊入行相勝解爾時超過近分根本空無邊識處由彼超過識無邊處所有近分乃至加行究竟作意入彼根本加行究竟果作意定復次從無所有求上進時由於無所有相起粗想故便能棄捨無所有處起想先入無所有處定時超過一切有所有想今復超過無所有想是故説言非有想識或有所有想或無所有想非無想謂非無想及滅盡定一切諸想皆悉滅盡唯有微細想緣無相境轉即於此處起勝解時超過一切近分根本無所有處及非想非非想處近分乃至加行究竟作意入彼根本加行究竟果作意定若廣説如顯揚第三第二出體者依小宗順正理七十七云四無色體總相亦善時攝心一境性以為自性然助伴中此除色蘊無色蘊無色無有隨轉色故是故四蘊以為自性依婆沙八十四説有其二種謂定及生定謂無色定生者有説無色界生若生彼處無覆無記受想行識此言説彼四蘊異熟以為自性婆沙一百四十一大意同此依大乘宗盡相出體同薩婆多而顯別者亦有色蘊定境果色通無色故上來二門略顯名體若廣分別具如別章第二釋文中四空五義然此經略無對治行論主準義安之初空處中初云超一切乃至種種想者是所離障成實論云遠離香味觸想滅有對者滅色香味觸之想以色等對礙故不念別異想者滅緣聲想以聲藉衆緣擊發生故故名別異此依大乘不同前説謂色雖多種統攝為六謂五塵及法處要略唯三一可見有對眼識所行故二不可見有對餘四識所行故三不可見無對意識所行無表色等故此中超一切者離眼識所行可見色想故何不但言超色而云超想邪釋曰以在色地修起此定未捨色形故何故但言滅想不言餘心法耶釋曰理實通餘以想取相強故二滅有對想者離餘四識所行不可見有對四境色故三不念種種想者離意識所緣法處色想故論云意識分別一切法故雖通諸法此中簡取緣色邊意識想滅緣餘意識此中不遣問香味之想初禪已離色聲觸想二禪已除今何故言空定滅耶遠法師云對治有四種一壞對治謂方便道觀下有漏無常等故二斷對治謂無礙道正斷下過三持對治謂解脫為首及後一切無間解脫時彼無為不令失壞四遠分對治謂解脫為首及後一切無礙解脫遠令前障畢竟不起今此空定據第四治故説此離本疏云今更釋於二禪中雖無色聲觸想得借初禪三識之心見聞覺觸是故乃至第四禪中猶有此想今得空定故説滅之若爾香味二想何故亦説釋有二義一亦有借故二以與聲觸同是不可見有對聲故同辨如第四禪滅憂苦等唯之二即辨於所離鄣體顯能所行謂三句超色境等境界想者空定離彼色等境想故名超也云何超以不分別故云何不分別以見無我故此明實治也問此中既有修行對治為有支不答依本業經四無色定各有五支謂想護止觀一心今依雜集等諸無色定奢摩化一味相故無支分建立也四入無邊虗空者是修行利益謂三色想絶廓爾無邊也五住虗空無邊處者是彼二所依定二中初超一切虗空無邊處者是所離障二見外之念粗分別過患是修對治謂外緣虗空心念粗患故能見此失而除彼想故三入無邊識者是修行利益謂捨外住內故五住識無邊處者是定體性無中初超識等者是離障二見其粗事分別過想是修對治謂猶見住識為粗患故三入無少所有者是修利益謂前捨外住內猶為粗念此即內外俱離都無所有方利益四住無等是定體可知四中初超一切等是離障二見彼住無所有想粗念過故能治彼想是對治三勘晉本云知非有想非無想安隱者是修利益此本脫也謂粗想盡故名非有細想未盡名非無約聖智説非謂世定覺此非無四定體可知三明入禪等意中云但隨等者謂入此八定非是自行所樂為俱為隨順所化生故上來八定略釋厭行了第四大段厭果分中三初明四無量名行方便果二佛子此菩薩得下明五神通是行功用果三此菩薩於諸下總結自在初中二先略顯義後正釋文前中四無量義略顯二門初釋名謂緣無量境起無量行故名無量四是數即帶數也二體性者雜集十四云四種莫不皆以定慧為體又慈能與樂無瞋為性悲能拔苦不害為性喜慶他樂不嫉為性令他捨惑則善捨為性諸門分別廣如別章二釋文中二初顯悲無量行後住悲下略指餘三前中又有十三句分三初一句總次十一句正後一句結初云此菩薩等者謂慈心隨順衆生起故次別中分三初八明緣衆生慈論中念念即緣念也次一明緣法慈後二明無緣慈就初緣衆生中八句分四初四與樂次二治障次一清淨後一攝果就初與樂四中一廣者與欲界人天一切樂故與欲樂寬故名廣也二大者大是高大義與初二禪同喜樂故此中樂者喜得俱起故名同也三無量者與三禪已上不同喜樂故此中離苦及喜故名不同也樂極故名無量也四不二者以前三樂等與衆生故次二治障中一無怨者治不愛障謂於怨不加損害故二無對者治與愛障謂於親與樂故若有偏情則有怨對故次一無障者謂離五蓋具慈定清淨謂慈依禪起於色界受正果慈行餘勢後攝果中無惱者於欲界受其習果無苦惱事安隱喜樂如修慈經説又如經云修慈定者臥安覺安天護人愛不毒不兵水火不喪眠無惡夢死生梵天在所得利緣衆生慈竟次一句云遍至一切處者緣法慈也涅槃云緣利生法名為法緣地持云緣法衆生俱是五陰因緣法名為法緣今此地論具二義先知凡聖衆生法及知衆生心所起分別法即用化之後二句云盡法界虗空界者明無緣慈此有二種一前句自體無緣觀法無我世間中最故云盡此明體無緣也二後句遍至無盡觀此明分齊無緣也後一句云遍一切世間住者住字兩用一屬前慈無量結句一屬後三行結前句者住亦行義謂遍一切世間行結成無量之義第二明行功用五通果中二先料簡後釋文前中二先釋名後辨體前中先通後別通者妙用難測曰神自在無得名通五是數即帶數釋也別名者一神境智通謂運用不測名神內身外色為通所緣名境決定推求名智神境即願通者神之境境之願依主釋也若以智體即通持業受稱或名神足通者以欲勤心慧為神通之足通依定定依欲等故或以神為足能往能還神即足故神足即通故皆持業釋二天眼者光明名天見色稱眼通依眼根照矚無得名天眼之通依主釋也三天耳通者天義同前聞聲名耳慧依耳根能無滯礙名通亦依主也四他心通者他心是所緣通是能緣亦依主釋五宿住隨念通者謝往之事名宿事屬謝往名住宿住之事是所緣通是能緣亦依主釋二辨體者依百法中以別境慧為性若依三科以行蘊法處法界少分為體若依二智俱以後得智為性緣俗境故何無漏盡通者表初二三地寄同世間故略顯如是若廣分別如別行章二釋文中五通即為五段初神足通中有十一句分三顯得三種自在謂初總句此菩薩乃至大地等是世間自在能動世界大地故後別中初二句是身自在上句云一身等是合散自在下句云或境等是隱顯自在後八句是身作業自在一石壁下是傍行無礙二於虗空下上行自在三入他等是上行若依論經云入出於地是上下行也四履水下是涉水不沒五身出下是熾然六復兩下身能住水七日月下身能摩捫八其身下明自在乃至梵世間器世間隨意轉變自在二天耳通中三初標得通者次天耳下顯通體後悉聞下辨通業初標可知二體中云清淨者顯了分明故過人耳者能聞人不聞處故後業中若天上人間遠近小大音聲悉能聞故三他心通中三初總標人通業次所謂下別顯通業後菩薩如是下總結總云以化心智等者於他本質影像二種心知何心耶所以者何若知本質惟唯識理若知影像何名化心由此兩義故二十唯識頌云他心智云何知境不如實如自心智不知如佛境即依此義護法安慧立宗各異取執不同謂護法云佛他心智知他心極似本質菩薩不極似故云不知如佛境安慧云佛智知彼本質菩薩影像緣故云不知如佛境次別顯中有二十六心古人云有十三心以每心皆有有無一對故合之為十三今謂雖是相對乃是相反三對行相天求故依差別為二十六論攝為八謂初貪等六心名隨煩惱以隨緣現起故於現起心有間斷名離故離亦名煩惱後皆準此遠法師云離非煩惱相對故來也又名隨煩惱者雖標貪等意取小惑隨貪等起者故二次二心名使以是性成煩惱隨人名使故今謂即是十使大煩惱也三次四名生約所生處相以名故人中心小故名小心欲天以廣於人故名廣色天心大於欲天心故名大無色天中初二空定心緣無邊空境無邊識境故能緣心亦無邊量故名無量此二心是八解脫中二解脫定心也復二解脫定心由捨前無邊心境但觀無所有及微細想緣無相境非緣邊量境界分齊故不名無量也四次四心名字三昧一創習定未深名略二久習能熟漸明得名非略三不專住習定名散心四專住習定名不散也五次二心名得三昧謂得心一境性故名定心不得心一境性故名非定心六次二心名得解脫者有縛無縛謂已脫二障者心未脫二障者心七次二心名妄行正行名於名聞中現起希望順不順故謂順希望名聞是妄行也不順希望是正行論經中云求心不求心是也今此經略無此二心或即此云雜染心非雜染心是也八未得四心名餘凡夫增上慢者粗細習行故謂有上無上廣非廣等此雖隔雜染心排次應爾粗細習者外凡慢粗內凡慢細細慢是彼粗家之餘名為粗細對粗辨細不收彼粗此細是彼粗家殘氣故曰習行上云如實知稱境不謬故四宿命通中三初總舉次所謂下別顯後如是過去下總結總中顯能念知之智別中解所知之境境中二先明念知自身本生數後成劫下念知自身本事本事中有十一種初一劫成壞數乃至第十一知言音並易知五天眼通中二先總後見諸下別顯總中云天眼者顯能見智通故清淨者審見故過人眼者遠見故後別中四一見生死時二好色等見別報色相三善趣等見總報四隨業下廣明造善惡業及所受果如第二地中所説可知第三此菩薩於諸下總結自在於中二先明悲自在謂修定雖純熟出入自在然不隨此因而受禪生後但隨下明智願自在謂雖不隨定因而受禪生然為滿菩提分故亦以願力而生其中前中云諸禪等者論云禪者四禪解脫者四無色定今略無此句由四無色定是八解脫數中故名解脫三昧者四無量三摩鉢底者五神通謂三摩鉢底此云等至等至即是定位身心安和平等由前加行伏沈掉力令身心至此平等位即從此定位起五神通以果名因故謂等至為五通也自下第二明位果於中三果即為三段初調柔果二菩薩住此下攝報果三若以菩薩下願智果初調柔果中四一調柔行體二此菩薩忍辱下明忍行位三此菩薩於四攝下別地行相四佛子是名下結説相初中三先法次喻後合法中云此菩薩觀一切法不生不滅因緣而有者論云於清淨中不見增煩惱妄中不見滅煩惱因緣集生故者此故字有二義一由緣集故無增減故云不生滅也二由緣集故有增減故云有生滅也此一緣集之因成其二義是故常起因緣對治離染成行而恆不見有生滅相也見縛先滅乃至云皆轉微薄者此四縛謂欲界一切煩惱除無明見名欲縛色無色界一切煩惱除無明見名有縛三界無明名無明縛三界諸見名見縛由此四種繫縛衆生故名為縛又能漂流衆生亦名為流又能令衆生為苦所厄亦名為厄也三界分別惑見道斷故云見縛先滅也斷一切修道欲色無色界所有煩惱及因同無明習業皆漸微薄遠離故云皆縛微薄此是貪等煩惱障現起行并種故云及瞋因與當地所知障種同此位滅故云同無明習業皆微薄未全盡故但云薄也不復集斷三毒者以斷細不斷粗故二忍行德中有十三心一忍辱者為他加惡甘受故二柔和者能護他心不發嗔故作惡懷疑者謂有人曾損惱菩薩由此猜疑菩薩懷恨然菩薩將護故彼與其同事愛語誘接故云現同伴等此釋諧順心悅美心身被加惡不報名不嗔口辱不報名不動忍時不憂名不濁無高下者久修不慢下就善言於己不高於化不下故不望報心者不希望他恭敬故報恩心者有恩及己常欲報故不諂心者非不實心作利益行及偏心等作利益故不誑心無險詖心者微細隱覆垢心皆悉遠離故別地行相及結可知攝報果願智果如初地説自下第三大段重頌分中一十八頌分五初一頌頌起厭行分二有十二頌頌厭行分於中初二頌頌護煩惱行次三頌頌護小乘行後七頌頌方便攝行三有一頌頌厭分及行果四有三頌頌位果五末後一頌頌結説第三地了第四地中二先料簡後釋文前中二門一辨名二來意前中成唯識第九云安住最勝菩提分法燒煩惱薪慧焰增故名焰慧地攝論云由諸菩提分法焚燒一切障故無性釋由此地中有焰慧故名為焰地世親釋云能燒一切根本煩惱及隨煩惱皆為灰燼名焰慧地莊嚴論云以菩提分慧為焰自性惑智二障為薪自性此地菩薩能焰慧燒二障薪名焰慧地金光明云能燒煩惱以智慧大增長光明修修行道品依處故名為焰解深密云由所得菩提分法燒諸煩惱智如火焰故瑜伽七十八顯揚第大同此説大智度云施戒多聞威德熾盛故名焰地二來意者有三義一準解深密經前地明定從此地已下明依定所發慧故來也二依十地論前三地寄同世間此地寄出世故來也三亦準解深密經前地雖得世間定及總持而未能得菩提分法捨定愛法愛故來也略辨如此諸門分別廣如別章後釋文中三一以偈讚請分二正明地相分三以偈重頌分初中六偈分五初一偈明菩薩聞法歡喜供養二次半偈明説法感應三次半偈天女喜讚四次三偈天主慶前請後五最後一偈脫月請後二正明地相中二先依論顯依前地淨定總持令此地如實智淨故説焰地後佛子菩薩住此焰慧地下明位果校量勝前中論科此地差別有四分一清淨對治修行增長因分謂是入地方便故云因二佛子菩薩住此焰慧地則能下明清淨分謂是初入地出障行故清淨三佛子菩薩住此第四下明對治修行增長分謂是正住地道品等行能有所除故對治進修上上故云修行增長四佛子住此焰慧地所有身見下明對治修行增長果分謂是地滿即彼清淨對治修行增長之果又初一是地因後一是地果中二是地相又初一加行道次一無間道次二解脫道後一勝進道何故解脫名對治耶以斷障顯地故就初分中三一結前標後二何等下正顯十門三菩薩以此下結法功能初中法明門者法者衆生界等十種明者四地中證智門者方便義論經名入即此衆生界等十法與證智作入地方便故謂由觀察十法得入四地故問若爾何故古人釋此十法為門是所入非能入為智明所入故答十法若是所入門經不應言欲入第四地尚修十法明門乃至云以此十法得入第四地十中分二前五句推能依乃至所依謂初一觀正報假名二觀正報所依染法三觀依報四觀世界所依空無盡境五總觀依正所依心識謂本識是染淨法所依故復五句明超滅染因謂前三句明觀煩惱使染故成三界後二句明觀廣大信解成三界因廣大心信解故煩惱不染故煩惱不染大心信解故不捨衆生此二皆超二乘境界故云廣大言信解者謂於諦寶深忍樂欲忍即勝解決定印持故第二清淨分中三初總顯次何等下別例後是為十者總結初中四一標得住地二住地故能以十智成熟衆生三成熟故得內法四得內法故生如來家內法者有二種一就人顯法即佛自體所具之法故二辨法成人以法顯佛故論云如來自身所有諸法以是法故顯示如來謂十種法智教化成熟故生如來家者此地寄位出世之首故同初地云生佛家二別例中先徵後顯顯中十句攝為四初深心不退者謂自住處畢竟智此即大乘法是菩薩住處住於大乘心不退轉名畢竟智二於三寶等者同敬三寶畢竟智謂於三寶得信不壞故云畢竟三諸行下二句明證如正智前句觀諸行等者此生滅觀假者唯是蘊聚本無有人攬蘊而立隨蘊遷流故名諸行後句觀諸法等者此法空觀謂法從緣生自無有生緣亦如是言無生者理實前觀亦有無生後觀亦有遷流為顯二別文又影略故互舉爾四觀世間成境下六句是分別所説智即後得緣俗智或攝為二謂染及淨或為三謂一染二染淨三淨或為四謂初二句依正二報是苦諦以隨煩惱生故次一句中半句生死論名世間即是集諦故云以隨煩惱次半句涅槃是滅諦故云所有淨後三句是道諦故云隨所淨又初中以煩惱等順感器世間故衆生世間由從業等因生故云同因次分別生死涅槃者是集滅二諦亦是染淨雙觀雖全體不二然兩法不雜故云分別下三句道諦亦隨顯涅槃淨法故云隨所淨一於佛世界中教化衆生成菩薩自業差別故云隨所淨故云觀衆生國土業謂於衆生所淨成已差別之業二前際是生死染法後際是涅槃淨法故云煩惱染及淨三於前際染中不見一法可損以即空故後際淨中不見一法可增以性自滿故又釋觀前後際色心已滅未至之境此即無性與現在緣生無性之性平等後觀現緣無生之性與彼二際已未之性無不別故簡非滅盡之盡故云無所有盡第三大段明對治修行增長分中有二初明護煩惱是異凡夫行亦自利行後菩薩修行如是下明護小乘行是異二乘行亦是利他行前中明菩提分法先略顯名體後正釋文前中先通後別通名三十七菩提分菩提梵言此云覺謂三乘無學盡無生智照境窮了故分者因義此三十七能為覺因故又云道品道謂果智品是類義因為果類故總名三十七菩提分帶數釋也後別名中七謂四念處四正勤四如意足五根五力七覺分八聖道初謂身受心法身等四法是所觀境慧是能觀與念俱故鄰近名念處是所觀境即觀智所住之處故亦名念住以五根大等積聚名身領納順違名受集起名心軌持稱法四正勤者亦名正斷唯一精進隨義立四謂於已生未生惡不善法令滅不起於已生未生善法令長令生於四用中約斷自所除懈怠障故名四正斷皆精進力斷彼懈怠故名正勤勤即斷故持業釋也四神足者妙用難測名神欲等四定能為彼依名足瑜伽二十九云問何因緣故説名神足答如有足者能性能還踴躍勇健能得能證世間所有殊勝之法世殊勝法説名為神此等四皆能到此故名為神足其四者何謂欲勤心觀於境樂欲名欲止惡進善名勤集起名心又包攝心故名心於境簡擇名觀此四皆是神通因故神之足故依主釋也或名如意足者所作從心故名如意五根者增上義名根故瑜伽二十九云信於何增上答能於生起出世間法而為上首及於能起精進念定慧為其增上其五教者謂信精進念定慧信者於諦寶境中忍可清淨勇悍造修稱為精進念者於境憶持定者專注所緣慧者簡釋得失信即是根乃至於慧皆持業釋五力者五名如前力者不可屈伏故瑜伽二十九云問誰不能伏答此清淨信若天若魔若沙門若婆羅門若諸世間無有能引奪者諸煩惱纏亦不能屈故此為上首此為前行餘精進等亦名為力皆持業釋也七覺支者謂擇法精進念喜輕安定謂觀察得失修善退惡於境明記於意適悅遠離沈掉平等寂靜調暢身心專住所緣擇法乃至於定而是覺支皆持業釋八聖道者無漏在心名聖開通涅槃名道或名八正道道離八邪故謂正思惟正語正業正命正精進正念正定正見籌量義理名正思惟語離四非名正語身離三過名正業無漏身語離五邪命名正命修善斷惡勇悍堪能名精進明記所緣攝心不亂推察諦理如次正念定慧謂正思惟乃至正見即是道支皆持業釋二體性中略就二門一約三科二依五聚前中三蘊法處法界為性三蘊謂正語正業正命是無表戒色蘊所攝喜覺支體即受蘊餘三十七行蘊所攝三十七法總以色受三蘊為性法處法法界少分所攝以無表色法處法界少分攝故二依五聚者一心所三色四不相應五無為菩提分法於此五聚唯二為性謂心所及色即四念處乃至八道支中念定精進見及思惟此三十四以心所為體正語業命此三是色聚中無表為性大小宗同諸門廣辨如別行章二釋文中先總標舉能修觀者可知後內身下明所修觀者文有七段謂四念處乃至八聖道就一一中皆有名體助伴所緣修習果等此中不必總具隨要略顯或二三四應知初念處中二前廣説身念處後知是下略顯餘三就前觀中復有三觀一內身修身二外身修身三內外身修身初內身者謂自身中五根內處攝故有情數故修身觀者以分別影像身與本質身相似循觀於身髮毛爪等三十六物污露不淨由審觀影像質故重言身也勤勇念知者修觀之心專精勵故除世間貪憂者明觀利益故智度云行者此時為多生貪憂故偏除之謂創棄五欲念本所愛是生貪未得道法是故生憂所以除也又貪者凡夫多起著境難捨受生之本三毒之初故煩惱中偏説除貪憂心一向貪欲者起障定最重禪中先離故五受中偏説除憂是故若説除貪餘結隨遣若説除憂諸受隨殄如破竹破初節二云觀外身者謂外五塵外五處攝非有情數故名為外餘文如前三內外身者謂自身中五根扶根塵是有情數故名內外處攝故名外又於他身中所有內色處約處建立名內約身建立名外餘亦同前二受念處中內受者因內身所生受緣眼等處為境界故外受者因外身所生受緣色等處為境界故此約他身説故內外受者緣自身中外處為境生受故緣他身中內處為境生受故心法亦爾於受心法修習修觀各隨所應可知廣説此義如雜集第十何故要有此內外等三種觀者修此觀人有三類故一謂一人前後起貪難即不定且依著內先説謂計自身為淨生貪著故二依他身計淨生著三計自他俱淨貪著二約一人次第修觀先內次外後合觀三約三類人修觀各異謂或有多分貪著自身為淨二或有多分貪著他身為淨三或有俱貪為淨故後三念處中內外之言並準此釋二受念處中自有通別謂若觀行苦則通五受皆是變異行所隨故若觀苦苦唯在五識若觀壞苦唯在意地憂稍重故名之為苦三心念處中通於八識皆無常故小教六識四法念處中五蘊性空空故無我名法無我小宗蘊上假者無生宰故法之無我名法無我第二四正勤中二先標能修行者後未生下正顯行相行相中四初二勤斷是止行後二勤修是作行就前止行中初行內二先標所斷惡法故云未生諸惡不善法為不生故後欲生下正顯勤斷行相謂欲者希望也生者起也希望正斷彼惡法故發起精進行也後一斷已生惡法準前可知後二勤修中但正行與正斷為善餘文可準有處云四正斷者勤修二善斷懈怠故第三四神足中先舉能修行者後修行下正顯行相行相中二先別辨初一後修行精進下通顯餘三前中云欲定者欲是此中定助伴能起此定果從緣以立稱此即行體故雜集第十云神足助伴者謂欲勤心觀及彼相應心心法等欲定者謂猛利樂欲猛利恭敬方得此定勤定者謂常精進無時暫間方證此定心定者謂由前生數修定力令彼種子功能增長由令心任運於定隨轉變速能證定觀定者謂由聞他教法內自簡擇證得定也斷行者顯行業用謂由定行能斷結故又涅槃名斷此行是斷之行故成就神足者就前欲定明其所修習依止厭等者雜集云隨其次第顯四諦境修習神足所以者何若緣苦體為惱苦時於苦境界必求厭故名依止厭若緣愛相苦集為苦集時於此境界必求離故名依止離若緣苦滅為苦滅時滅時於此境界必求作證故名依止寂滅回向於捨者謂由此趣苦滅行勢力棄捨苦故是故若緣此境時於此境界必求修習故名回向於捨有處云四如意足者所作妙用皆從心故如欲定既爾餘三亦然第四五根中二初標能修行者後修行下正顯行相行相中二先別辨信根一行後精進下餘四同顯前中信及根義後同顯中説依止等四句義如前説後同顯中此五修習者信謂於諸諦理起忍可行進謂於諸諦忍已為覺悟故起精進行念者於諸諦發勤修已起不忘行定者於諦繫念已起心一境性行慧者於諸諦心得定已起簡擇行果者由此能速發生諦現觀故名根者此增上力不久能生見道故又能修治暖頂法故引發忍及世第一法故即於此身入順決擇分位故依止厭等四句同前第五五力中判文釋義並同根説而差別者此能損滅不信等障勝過前故雖與五根緣境相似然義有別謂不可屈伏故依止厭等亦同前説第六七覺分中先舉能修觀者後修行下正顯行相行相中二先別辨念覺分一行後修行擇法下通説餘六前中念者後修習中與餘六同辨依止厭等準前可知修習念者是所依支由繫念故令諸善法皆不忘失擇法者是自體支是覺自相故精進者是出離支由此勢力能到所到處故喜者是利益支由此勢力身調適故猗定捨者是不染汙支由此不染污故依此不染汙故體是不染汙故由輕安不染汙能除粗重過故依止於定得轉依故捨是不染汙體永除貪憂不染汙位為自性故修習四句厭等準前果謂見道所斷煩惱永斷由七覺支是見道自體故第七八聖道支中二先標能修行者後修行正見下正顯行相行相中二先別明正見一行後修行正思惟下通顯餘七前中正見者後與餘七同釋依止厭等明修習如前説後同釋中正見者是分別支如先所證真實簡釋故正思惟者是誨示他支如其所證方便安立發語言故正語業命者是令他信支如其次第令他於證理者決定信有見戒正命清淨性故所以者何由正語故隨自所證善能問答論議決擇由此了知有見清淨由正業故身業進止正行具足由此了知有戒清淨由正命故如法乞求佛所聽許衣鉢資具由此了知有命清淨正精進者是煩惱障支由此永斷一切結故正念者是淨隨煩惱障支由此不忘失正止舉相等永不容受沈掉等隨煩惱故正定者是能淨最勝功德障支由此引發神通等無量勝功德故助伴及修習如前七覺中説果謂分別誨示欲令信煩惱及隨煩惱義勝功德等障淨故此中所緣境即此後明四諦實性由見道後所緣境界即先所見諸諦實性為體故上來明護煩惱行了二明護小乘行十句中初一句是總餘句是別前中謂菩薩修此道品唯為不捨利益衆生非如二乘為自益而行別中九句論攝為四一始二益三希四行前三護心後一護行前中初一句始者為起行所依故以本願為始二次二句益者以慈悲益物憐愍心故三次一句希者為衆生故希求佛果故云思念一切智智故後行中有五句一成就莊嚴等者修淨土行故二成就如來等者修起佛法行故三求於上上等者修彼地方便無厭足行故四隨順等者修入不退轉地行故五思惟等者修教化衆生行故第四大段對治修行增長果分中論判有六種果一煩惱染生遠離果二此菩薩若見業下明業染生遠離果三佛子此菩薩隨所下明於勝功德中生增上欲心果四此菩薩知恩下明説法等中説報恩心果五此菩薩如是下明方便行中發勤精進果六是菩薩心界下明彼增上欲本心界滿足果六中初二是離障果後四是成就果就前二中初明離惑障果於中三初標得離障之者次所有身見下正顯行相後於如是下結其所離然論於正顯中分五一從身見至出沒有八法三句明本二思惟一句明起三觀察一句明行四治等三句明護五著處一句明過就初本中身見是起慢之本亦是六十二見本故我知是能知大知是所知大法此是三地中解法慢也我修是能修復計禪定是我所修此是三地正受慢也於中我人等是人執蘊界等是法執出謂三昧起者計有出定沒謂三昧滅計有入定又出謂修起諸禪沒謂退失禪定遠法師云出者修起諸定沒者定所除滅二思惟者明第二起也謂起不正思惟欲起定慢也觀察者明第三行觀心行於緣中於己所得八禪等法求覓勝相欲令他知故治故等三明第四護也治謂數數觀察故我所謂起我想故財物謂受用護持故著處故者明第五過也謂堅執自所得定心安處諸事故云著處此定愛也後結除斷可知問何故於此説斷惑耶答準成唯識此是第六識中俱生身見等及所起過得第四地出世道品能除滅故於此説也又釋若約寄位前地寄世間此當出世為分世出世故此説斷若依此釋亦得是分別所起以仁王經説四地名為須陀洹位故第二業染生遠離果中二先明捨離不可作業後若見業是順下明修行可作業前中論云所有不可作業有二種事不應作一尊敬如來佛不讚歎故二畏惡名聞生煩惱故後修可作事中所有可作有二種事一見無惡名利隨順菩薩行故二尊敬如來佛讚歎故第三於勝功德中生增上欲心果者自下明後四種成就果此即第一文中二先牒前起後後如是而行下正顯前中牒前護小乘處智慧方便故行此道品等故此中先標轉起欲樂者可知次云隨所起等牒前所修所為論云隨所隨所方便智所起修行者不捨一切衆生修行故如前説重言隨所者隨所修行非一故修集於道者道正體也及助道分者一切菩提分法是道支故後正顯中十心分二初一是總餘九為別總者依前所起三心正明欲樂心由前策勤所修力故於上功德見其實利是故轉起殊勝意樂令心柔和求彼上法六七二心中有轉字故論云成潤益心者以見勝德能潤益故起深欲心故云深欲愛敬今此云潤澤者意無別也後九心別者於總開出故論云彼潤益心有三相一柔耎者謂證法悅心名樂行勝二調順者調謂調和順即隨順謂定與相應法更相隨順無所乖違名三昧自在緣此上二行是行體三利益安樂者離過對治勝此是行用從此心開出下六心總明離過堪任有用故下別顯離六過一無雜染者此治為食過或説法中妬心過二求上上勝法者此治少欲功德過不樂布施頭陀等三求殊勝智慧者此治少欲知過不好求勝智故四救一切世間者此治懈怠過不勤作衆生故五恭敬尊德無違教命者此治自見取過於尊教法心不隨順故六隨所聞法皆善修行此治捨為首過不隨説行故如説而行比於聞思為首為勝今捨為首故是過也第四明説法尊中起報恩心果者謂前地中從師聞法故稱彼師為説法尊即從前地來依法修行令得成辨稱彼作意故名報恩文中二先標修行者後知恩下正顯顯中二初一句總後九句別總云知恩者謂知恩報之心也別中初知報恩者謂有恩者遍行報恩行故二心極和善同住安樂者依同法者起將護心謂順説法者意無所違故三質直柔耎者依法行隨順受教反事能忍故四無稠林行無諂曲者依受用食於施主所自過不覆不忘説己德故五無有我慢者依自勝功德不起高心故六善受教誨者依教正受語故七得説者意者依教不顛倒受故上第三句準論經分為二句第四句下準論此欠一句云無有諂曲是故并前七句別中有九句第五發勤精進果中二先牒前生後後得不體下正顯前中二先結前後作意下生後前中二先別顯三行後總結三行前中一忍成就者於彼尊所修報恩行成謂能忍難事成報恩果故二調柔成就者是前對治修行增長謂彼對治於此成就故三寂滅心成就者謂對治修行增長力即前二遠離果為寂滅心謂前護煩惱對治力也後總結前三文願可知後正顯中十句分二初得不休息一句是總餘九句別總中不休是不可令轉故別中一離增減過謂非懈怠非耽染精進故二堅住自我乘故三廣念利他故四為無邊衆生作利益願故五熾然者論經名猛利謂勇悍難制故六比劣無齊與勝齊故七一切魔煩惱行不能破壞故八成熟者攝取故九有義一能斷他疑二降伏他言正修習故第六本心界滿足果者滿足今云清淨文中二先標修行者後心界下正顯顯中二先一句總後九句別前中心界清淨者菩提分欲樂心滿故後別中一深心不失者求道品心由前勤修行增益故云不失深心二悟解明利者於勝上證中轉生決定故三善根增長者彼上證之因治過行增故四離世垢濁者除滅諸障故五斷諸疑惑者除此地祕密疑事故六明斷具足者以除疑故於餘處決定故七喜樂充滿者無依衆生力謂佛力加能化衆生故八佛親護念者依勝行內證相應故九無量志樂皆悉成就者依現無量三昧心得智障清淨故自下第二明位果中三一明調柔果二菩薩住此地多作下明攝報果三若以菩薩殊勝下明願智果初中四一調柔行二如摩下教智淨三此菩薩於四下別地行四佛子是名下結説初中先法次喻後合法中先見佛為練行緣二皆恭等下為能練行三又更下明所練淨能行中有出家等者於中五一近佛二聽法三受持四修行五出家此地寄出世故辨出家攝報果不便故不言前二地寄人王報故有出家三地天王出家不便不言也調柔中五地同金嚴具者論云喻阿含現作證智莊嚴顯示得證故二摩尼喻教智淨前法地無者為寄世間故別地行相中二先四攝後十度皆是第四者依地配故餘如論第三重頌分中一十七頌分六初一頌頌前初增長因分二次二頌頌前清淨分三次四頌頌前對治修行增長分於中初二頌頌護煩惱行後二頌頌護小乘行四次四頌頌前對治行增長果分於中六種果分配可知其最後頌中云轉更精勤不退轉者轉更兩字唯梵本中應云彌益五次五頌頌前調柔等三果六末後一頌顯名結説於中云功德義智共相應者梵本云功德義智相應故我已為彼佛子説謂我已為功德義智相應者説故若依漢本則不知功德義智之言屬在何也第四地竟第五難勝地中先料簡後釋文前中略顯二門一釋名二次第前中依成唯識論第九云真俗兩智行相互違合令相應極難勝故名難勝地世親攝論云由此地中真實諦智是無分別智世間工巧等智是有分別此二相違應修令合能合難合令相應故名極難勝地梁攝論及無性釋並同此説瑜伽云今此地中顯示菩薩於諸聖諦決定妙智極難可勝名難勝地金光明云是修行方便勝智自在難得故見思煩惱不能伏故名難勝地解深密云由即於彼菩提分法方便修習最極難名極難勝地莊嚴論云於五地有二種難一勸作無惱難二生不從心無惱難此地菩薩能退二難於難得勝故名難勝顯揚云證得極淨緣諦所知諸法微妙慧成極難成不住流轉寂靜聖道名極難勝十住論云第五地中功德力成一切諸魔不能壞故名難勝地問仁王云初地菩薩四天王雙照二諦平等道何故餘處皆云五地古德云據實初地二智雙照約任運得處故説五地今解不然初地創得圓滿在此故不相違第二次第者有三義一約四五六地總寄二乘如其次第初果第四果辟支佛但舉初後不寄中二此約十地論等問若爾何故仁王云七地得阿羅漢耶答十地論約所觀行相以配二乘道品四諦通二乘行故第六緣生通緣覺行故第七十度唯菩薩行故仁王下卷纓絡上卷約人配位前之三地相同凡夫故復後四地配於四果以顯四別七地未離分段故寄同下位二約二乘行中道品居先四諦居後故四地後明此地也三約前地雖得出世未能隨順世間五明攝化今此地中修證彼法故致此爾上來略顯法門分別廣如別章後正釋文中三分同前初讚請分中有九頌半分四初一頌明菩薩衆三業供養二有一頌明天王及衆光雲供佛三有六頌半明天樂及言讚佛於中三初一頌總標次四頌半別顯後一頌總結總讚可知別顯中五初一頌標二利果次前半自利後半利他次一頌別明利他果用言大海今始動者佛果應機如海即現現用為動也次一頌半別明自利果初半福備智圓黑暗等滅故後一頌二障俱淨超出二乘後一頌歎佛為世勝田德四有一頌衆首正請第二正説分中二先約論科文後佛子菩薩住是難勝地下明其位果前中論分為三初明勝慢對治二佛子此菩薩摩訶薩如實下不住道行勝三佛子菩薩摩訶薩住此下明彼果勝此三分用此地加行道及初住地分無間道合為初分二以正住地分解脫道為第二分三以地滿分勝進道為第三分就初分中勝慢對治者遠釋云慢有二種一他地慢謂前四地中得出世智取彼勝相名為勝慢下以十平等心翻彼名治二自地憍謂於此十心希求勝相復以為慢下以如道行對治本疏云今釋前地解法慢障正地中對治此地所治身淨我慢障是前地中得出世淨取以為慢此地加行觀十平等正伏彼障初入地時無間道中正斷彼種是故此二俱名勝慢對治以勝前地初説治障至正住地但修緣行於世出世間無漏住著故能隨世以攝衆生於初分中分二先明地加行後佛子菩薩摩訶薩住此第五下明初住地前中三初結前舉後次何等下徵起正顯後菩薩下結能入地初後可知正顯中明十心平等者謂於平等中心得清淨故云平等心此十平等與後六地中平等別由於前地取淨法為慢故此偏觀淨法平等後地通觀染淨平等此等並是地背相捨法也十心論分為二初三名諸佛法即果法也謂三世十力悉皆平等又釋舉力等取餘功德法後七名隨佛法即因法也若開見疑句即有八也於中前六自利後一利他前六約行令為三學初一戒次一定餘四慧行離為七淨一戒淨二定淨三見淨四度疑淨上二同一句五道非道淨此前五種大小名同後二名異小教六名行淨七名行斷淨以彼宗中趣盡滅故大乘六名行斷七名思量菩提分法上上淨以此宗中依其行斷起勝求故若就位辨小宗初二在見道前次三在見道行淨在修道行斷在無學道大乘行斷思菩提分俱在修道餘悉同前何故初二在道前謂要依戒定方能發彼無漏聖慧何故次三在於見道以見道中斷身見故得見淨斷疑故得度疑淨斷戒取故得道非道淨入見道時十使俱斷何故言三涅槃經説此三重故謂十使中五見及疑局障見道餘四通見修就六中三本三隨謂身見為本邊見隨戒取為本見取隨疑為本邪見隨是故三結三隨轉斷此三結立三淨復二在修道者以修道中斷障成德故有其二餘如論辨後明初住地者論名如道行文中二先總顯後隨頌下別辨總中云以善修等兩句是牒前四地所修覺分依起此地十深淨心第三第四兩句云復求等者是復依此深淨心轉求此地是不住道行勝破慢謂前四地取道生慢即淨為治又淨心希此勝道復即是慢隨如為治以隨順如行於如法中不取著故亦名不住道行勝後別辨者從前隨順如中開出八句一願力等者是修習菩提心故二於一切等者不疲倦故三積集等者得善根力故四精勤等者不捨衆行故五出生等者正修行故不正修行非善根故六觀察等者無厭足故謂於自他無飽足故轉轉向上觀照七受如來等者得地勝力故行轉勝故得他佛力加持八念智等者德成在己自得勝力故成就不退轉心故謂修慧觀無障礙故第二明不住道行勝中二先釋名後解文前中二種一所知法中智清淨勝是自利護煩惱行不住世間也二佛子此菩薩摩訶薩得如是諸論下明利益衆生勤方便勝是利他護小乘行不住涅槃也此二説時前後行必同時亦不與時相應説為同時故名不住若不爾者初應住涅槃後應著世間故知俱也就前所智皆淨勝中先明四諦實法分別後善知俗諦下明十諦化生差別於前四諦作此十種觀察故成十諦瑜伽住品云此地於四聖諦由十行相如實了知故前中略以二門分別一釋名二辨體前中二先總後別總者聖謂無漏在心諦謂如所説相不捨離故由斯觀察到究竟清淨故決定真實故謂世出世二種因果必無虗妄不可差失如是決定真實相應清淨事理唯聖智境故名聖諦此即聖之諦故依主釋也總言四聖諦帶數釋也別中逼迫名苦生長名集寂靜名滅出離名道第二辨體者諸名色是苦諦業煩惱是集諦煩惱盡是滅諦止觀是道諦諸門分別具如別章論中名此為實法者苦集二諦有佛無佛體是世間雜染因果滅道二諦性是出世清淨因果故後明十諦中遠法師依論四句分別一製立二開合三對實法辨通別四釋文初謂四諦門中義含法界菩薩於中照達無餘且就一周之數説此十諦廣辨難窮此並菩薩自所知境寄所化以顯其別是故論名所知法中智清淨也二開合者或總為一謂化衆生分別故或隨所化大小分二初九化小後一化大或隨作所起分之為三初五化生令其生解次四化生令起行後一化令入證或約人不同離為七分謂初一化根未熟者二化根已熟者三化疑深法者四化謬解法者五化離正念者六七八九化正見者十化於大乘可化衆生或隨法不同分之為十三對實法辨通別者此之十門於前四諦一一皆通一俗諦者通觀四諦法相差別二通觀四諦體空三通觀四諦非有非無四通觀四諦有無各異五通觀四諦緣起集成六通觀四諦由迷成於苦事七由迷四諦起作集八通達四諦得諦滅九通解四諦得成道智十窮達四諦緣起真性清淨法界故成大乘菩薩因果四釋文中二先列十名後次第釋此中兩三名雖新舊稍異於義無違會釋可知也論云小乘可化衆生者非是化衆生令入小乘謂化小乘衆生令入大故也初一根未熟不堪入大為説四諦十二行等名知世諦此是四重二諦中第三重內世諦也瑜伽云依曉悟他故本疏云此經及瑜伽通諸根器論文偏約根未熟者二為根熟小乘堪入大故為説第一義法空經云一乘者令小入大更無餘乘故又理無二故亦名一相瑜伽依自內智三有人不解第一義諦謂一向斷滅名為疑惑深法衆生知相諦者謂知諸法非有非無一實相故又釋既聞真諦將謂斷滅於俗故名疑惑深法令為分別法自相歷然故云相諦瑜伽依俱處所名為此説解云即前真俗名俱處所四為謬解等者聞一實諦謂定是一名謬解等今知二諦差別非一前則疑一此則迷異五既聞差別便為各有體性乖違正道名為離正念者知説成諦者知前差別四諦諸法但隨言説因緣集成無有自性故云説成瑜伽云依於契經調伏本母名由此説六為正見衆生者令得知苦斷集證滅修道瑜伽云依於現在衆苦自性依於未來苦因生性依於因盡彼盡無生性依於修習彼斷方便性經云至不二法者謂道諦智能至無二滅理故十為大乘可化者謂直進菩薩不從二乘來者知菩薩因果於果位而知者但是信解力影像觀智非是佛果無盡智知此簡分高下離世間品中亦如是簡彼文約行此中就解後明利益衆生勤方便勝中二先總顯後佛子菩薩摩訶薩得如是智力下別辨前中亦二先觀有為過後菩薩爾時下明起慈悲前中虗妄者觀內五蘊妄想常等不相似無故虗此明所取非實常非我想慢事故為此顯能取不真是妄是偽謂於前虗相妄取為我等詐為誑惑等者觀外六塵謂世法盡壞故誑此明所取不實但是虗誑世法似續似若有利而實速滅無可得而言有者但虗誑爾世法牽引愚癡凡夫故詐此顯能取迷真謂由妄取令彼世法隱虗詐實令世貪取誑惑愚夫者總結內外不實就人彰過謂妄境引心名為誑心迷前境稱為惑於前有為內外之中各境為誑心為惑論文牒釋可知凡夫者依止彼正取我慢身餘處有譯為異生下明正起慈悲於中悲者憐愍彼衆生故大者勝地前悲故轉勝者不住道行勝故慈者勝利益示現故光明者救衆生方便知成就故後別辨中二先牒前起後後常求佛智慧下正顯前中云得如是智力是牒前知有為過也不捨等是牒前慈悲轉勝也後正顯中常求佛智慧者是救一切衆生義於中二先明大悲觀後佛子此菩薩摩訶薩復作是念此諸衆生下明大慈觀前中悲有二相一觀苦因緣集二佛子此菩薩摩訶薩復是念此諸凡夫下明觀深重苦前中云觀一切有為行前際後際者總觀先際因後際果也知從下別觀也別中先觀前際後如前際下類顯後際前中二初觀流轉後無我下顯無我我所前中但言無明有愛者顯流轉因是凡非聖理實亦有業等諸緣何不説者以無明與愛是發潤生之本故偏舉爾生者有三種衆生生謂欲求妄梵行求有求等此明先際果也生死流轉者是欲求衆生也於諸蘊宅等者是妄梵行求衆生此是外道非是小乘故云妄也言不能動出者梵本云無求出意增長苦聚者是有求衆生後顯無我中二先四句明無我後一句明無我所前中初一句依總義立名餘約別義云稱總云無我者謂諸蘊中推求假者不可得故別中無壽者者謂推求和合現存活者不可得故無養育者者謂推求許有我人假藉衣食得增長者不可得故無更數取後趣身者者謂推求數數往所諸趣無厭者不可得故後一句明無我所者謂我尚不可得何況有我所後類顯後際中謂如前際以何因牒彼癡愛也隨所有衆生牒前果故隨所有苦行牒前無我謂但有苦果及苦因行而本無我我所故云後際亦如是皆無所有虗妄者苦果貪著者集因斷盡者滅果出離者道因也若有若無皆如實知者滅道真實故有也苦集虗妄故無也於此有無境皆稱順而知離顛倒也後明觀深重苦大悲者謂無量世隨逐是深苦種種苦事是重苦初觀衆生可愍後如是盡滅下牒前呵後明種種苦前中二先明可愍後有無數下顯可愍所由云可愍者有二義一受苦不知厭離二於無所有中而生貪著故云愚癡無智後可愍所由謂以無明癡故受無數生死身已今當滅者是無量世隨逐苦也後明受種種苦者謂於苦不能生厭已是可愍況更造集令苦增長機關苦事者喻顯無實受苦者如彼木人隨生死流等者集愛也於諸蘊等者愛樂苦蔭違離滅道不知憂畏等者明有病苦因四大乖違火熱水冷風輕地重如四蛇同穴相違相螫不能拔出等者明具集因故此有四句一妄梵行求衆生不能拔出憍慢見箭二欲求衆生受欲者不能亦滅貪恚癡火三欲求衆生行惡行者不能破壞無明黑暗謂為見少利行大惡行後受大苦名為黑暗其破壞兩字梵本中除滅字四有求衆生不能乾竭愛欲大海不求十力等者遠離滅諦謂大般涅槃故入魔意等者明離道諦失道緣故於生死海等者乖道因故由不善尋伺淨出離故上來二悲觀了後明大慈觀中二初明愍物修善後佛子此菩薩摩訶薩以如是下明發願益生前中二先牒苦衆生處在孤獨無救等明愍物後我今下明修善前中十句初一句總標其苦餘九句別顯苦狀一孤窮困迫者有二義一於彼逼迫中無救拔故二於已受未受苦中無救扶故又世間有眷屬財物能為救苦若孤若貧即苦無救者無救者無有能令脫煩惱故無有令得大安隱故三無依者離善知識故四無洲者離寂靜思惟故五無舍者離聞正法故論經此句是第四句六無導者離善知正道者故論經云無究竟者謂離正見故七無目者彼障諸舊煩惱及客塵煩惱常起邪念不聞正法等故八無明覆翳者內雖先有無師自然智然為黑暗纏裹不得顯現後為物修善中二初牒前所為苦衆生後修行下正顯修行於中三一正明修行二獨一下修行勇志不待儔伴而獨救法界衆生三以是下修為所求求中初令成人天因後乃至下成涅槃因畢竟清淨者勝世間清淨故得十力者降魔怨故得無礙智慧者得勝聲聞辟支佛淨智故後明發願益生中二初總後皆為下別前中謂牒前於苦無救衆生菩薩以正觀察智回自善根盡皆與之為救護故後別中十一句一救護者拔一切苦惱故此救護有十種一利益者住不善衆生令住善法故二安樂者住善法衆生令得樂果故三哀愍者住貧之衆生與一切資生具故四成就者住修行多障礙衆生令得具足故五解脫者世間禁閉衆生令得出離故六攝受者令諸外道信解正法故七離諸等者住病苦及諸外緣所惱衆生皆令除斷故論經此句是第四句八令普得等者疑惑衆生善決定斷疑故九令調伏等已住決定衆生勸修三學故十令入般涅槃等者已住三學衆生得涅槃故上來初二句為救未來苦餘句救現在亦救未來上來總明不住道修行勝竟自下第三大段明不住道修行勝果中有四種勝一攝功德勝二名為無厭足者下修行勝三佛子菩薩摩訶薩如是勸修下教化衆生勝四佛子此菩薩摩訶薩為利益下起隨順世間智緣前二種勝是自利是前所知法中智清淨果初自分後勝進後二種勝是利他是前勤方便果初化他行後化他智就初中初三句論作二釋先配三慧可知次配二巧謂初句總舉二別知法三別知義亦是文義二持以總攝別是故論中名攝聞勝也次二句明戒攝勝初於微犯能悔後能堅持不犯前中雖為他舉過以柔和故能忍其辱即生慚愧悔責受罰由此自罪滅故自護也令他得成無相覆故護他也後中由無微缺名堅心不捨也下五句攝智勝一因緣集智謂由果因名是處反此名非處此治無因又善因樂果惡因苦果名是處反此名非處此治倒因達此之智名為覺者二證理智謂理外分別名為魔事證智能治名不隨他三知義智謂知正義非正義及正不正相雜簡邪得正名為隨慧此曰知義論云説教有斯差別四神通智能治邪歸令向正故五化衆生智謂隨所宜方便攝故第二修行勝中有十一種一集福無厭故二求慧不休故三悲化無倦故四為物勸修涅槃行故五勸求大菩提故六莊嚴佛土行心具能化法所化生故七勸修正報相嚴行故八勸修佛三業作用因故九敬法重人親近供養故十不染三有樂生三有故十一遠自利樂化生故第三教化衆生勝中有九段初一總明四攝攝生二示現下明同事應物三演説下別顯愛語四於菩提不知修方便示修菩薩行五示佛果大用令樂修因六為欲求有求者示世過患令不樂求七為小乘正梵行求不信大乘者讚佛大智利生八為外道無智邪梵行求者示身通語業令捨邪入正九總結行成四句一勤方便者結前四攝攝生二心恆等為化衆生求佛勝力三所作等所得福智皆不退失四常勤等彼所修行欲令增勝勤行也第四明隨順世智勝中二先總後所謂下別別中七段一文字等十種二療病中五種三文筆等八種四國城等十六種五金銀等藏八種六日月等十種七持戒行處禪定神通四無量四無色定等五種總計有六十二論攝為十句一知經書等二金石等三治病等四伎樂等五日月等六施戒等此六正是隨世間智七不惱事八安生事九哀愍令出十令入佛法此四結意此與論經次第前後雖少有異多分無別但於義無違會釋即得不可改動其文就前六中初五是障治後一是染治以戒等離染故就前中初句內治四種障一書治所作事中忘障取與等事中障也聞法等中解障作不作等行業中障一作不作者善作惡不作二於善於中有已作未作三於未作中隨時益生應作不應作二經者論經名論因論治邪見以格量正理故聲論治耎智以解了文章聲字生勝智故三論經印者印記分明不假守護故治彼障又技藝當印又是六藝等文章亦是聲論四以數知多少算記其位令不生疑故治彼障上總是因聲二論也二金石等者是工巧論能治貧也三治病下是醫方論病有三種謂乾消等內四大不調相鬼著等是外衆生相蟲毒等通內外亦四大草毒故亦衆生相是蛇毒故此等或但成病或令致死故為因也呪藥二種通別治也四技樂等治憂惱障國土等治不喜樂障金銀等世間繫閇等障五日月等能治報分過作惡因障謂覩災相修善排惡故説治也曜等攝者謂日月五星為七曜也五星謂東方歲星等二十八宿謂角亢等日月五星於中宿故論云入八業果者一日二月三星四宿五鳥鳴六地動七夢吉凶八身相休咎身相者愛不愛果行故謂由過去愛不愛果之因令此世有好相惡相六布施等是內明是染對治有六句一施治慳染二戒治破戒染三禪治貪欲染四神通治邪歸染五四無量心治妄行功德染謂殺生祭祠求福名妄行功德六四無色定治妄修解脫染謂有外道妄計無色為解脫故下明後四此起世間智有四種相一諸不惱等是異障中無障謂無捕獵等惱衆生障二安衆生是與無過樂不生罪故名無過三哀愍等發起清淨雖令衆生無苦有樂而著欲放逸是故愍彼令離放逸四令入等是所用清淨謂雖不放逸不求出道是故令入佛法受用淨也又釋此四句從後向前結前六句謂此令入佛結前第六施戒二哀愍等結前第五以示日等災祥令離放逸三安衆生事結初四門以同與樂四諸不惱衆生事結前六中初三後二以此五門即五明所攝能除暗障俱能生智故論釋前三句超舉後二其第四但為與樂而非生智故非此結自下第二明位果中有調柔攝報願智等三果科釋同前能練中云既出家已又更聞法得陀羅尼為聞持法師者此障非得義持對後顯劣也教智淨中云以車渠摩瑩金器等者喻依淨教增長智慧光明轉勝前地也以方便慧思惟觀察故慧轉勝以方便智成就功德故福轉勝方便之言皆是真俗合觀而修行故即是不住道行勝報中所作自在等者由善五明故也餘皆準前第三重頌分中二十二頌分五初五頌半頌前勝慢對治於中初一頌頌前十平等次一頌頌前道品次一頌頌勝行為嚴喻次一定等功德為身説法為師子吼後一頌前初住地同念不退心論名如道行第二佛力所加下七頌頌不住道行勝於中初二頌半頌所知中智清淨後四頌半頌教化衆生勤方便於中初三句頌總觀虗偽生慈悲二心次一頌三句頌前悲中觀緣集苦次一頌半頌觀深重苦後半頌頌大悲觀第三名為有念下五頌頌不住道修行勝果於中初一頌頌攝功德勝次一頌頌修行勝次一頌頌教化衆生勝後二頌頌起世智勝第四如以下三頌半頌地果初一頌半調柔二次半頌頌攝報果三後一頌半頌願智果第五末後一頌結説究竟難勝地了
