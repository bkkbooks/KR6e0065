body:
  text: 第六現前地中二先料簡後釋文前中略顯二門一釋名二次第初釋名者攝論云由緣起智能令般若波羅蜜多現在前故名現前地世親釋云謂此地中住緣起智由此智力令無分別智而得現前悟一切法無染無淨無性論師亦同此釋謂由加行智觀察緣起引根本智證無染淨法界現在前故解深密云現前觀察諸行流轉又於無相多修作意方得現前地名現前莊嚴論云不住生死涅槃觀慧現前名現前地十住論云除魔事已菩薩道法皆現在前成唯識論同攝大乘瑜伽同深密二次第者有三義一前地寄聲聞此地寄緣覺約寄超前故二四地雖顯出世不能隨世五地能隨而不能破染淨見此地觀察無染淨法界破見故三無相觀者成唯識云前五地中有為觀多無相觀少第六地中無相觀多有相觀少第七已去純無相令此地中於無相觀進少入多故諸門分別廣如別章後釋文中三分同前初讚請分中有九頌分五初一頌菩薩聞法歡喜雨華等供佛二次有一頌天衆歡喜散寶等天王等以寶雲供佛四次五頌天女歌樂讚佛說法益初一頌除惑次一頌半顯法性後二頌半明說法所為五末後一頌結前請後第二正說分中論說三分一勝慢對治二佛子此菩薩摩訶薩如是觀已下明不住道行勝三佛子菩薩摩訶薩以如是十種下明彼果勝此與四地何別者四地以趣地方便及初住地同名勝慢對治此中初住地入不住道行勝攝以漸勝故論云四地中說衆生我慢解法慢對治五地中說身淨分別慢對治此六地說所染淨法分別慢對治初勝慢對治者以前五地觀四諦法染淨相故名取染得障是故十平等通一切法平等文中三初牒前起後二何等唯正顯十門行三菩薩如是下結行入地就正顯中三初八句約無破有次一句約有破無後一句有無雙破又初一句總後九句別總云一切法無相者論云一切法謂十二入釋曰入是識所依緣今但言入即已攝界及蘊下皆准此言無相者一切法自性無相平等故謂相是妄想所作無別自性由此十二入差別之相即是無相故云平等後中九句論主立九種相對治以顯無相故說相無然既想能現相想應是有論破云十二入自相想故謂十二入之相從自相起無別自體故二無生者外轉立云想從相起可夫無體念別追憶豈非有生破云展轉行相故謂念因前想後方得記但是想之展轉行相無別有生故三無成去外轉云既念因前想後起非有亦可者因集起之應不成何故現見成就論破云生展轉行相故謂苦是集果集從念念從想如是展轉行相成故四本來清淨者外轉救云若由展轉等乃至無成者世俗因果豈斷壞耶論破云淨相故謂彼因果相本來性淨非待斷懷說為不成故此文准論經是第六句五無戲論者外轉立者雜染因果可從相想等無體本來清淨因果應是實有論破云分別相故謂清淨因果非分別相由分別心取之為有還非實有故六無取捨者外轉立云若染淨名義皆空何故菩薩捨染求淨論破云出沒相故謂淨法可取名出染法可捨名沒妄法即空無可捨却真性離念不可取得無捨求但約出沒相爾理實無取捨故攝論云於生死非捨非不捨於涅槃非得非不得維摩云若達生死性即是涅槃於其中不取捨者是為入不二法門中皆此義也七寂靜者此文准義次第及論經應在第四句謂外轉立云苦是所生可說為空集是能生豈非是有論破云染相故謂惑業與苦皆是妄法緣起無性本寂非實有故八如幻等者前來於真妄法起有見故以無破之今於二諦見竝非有應無過失論破云我非有相故謂二諦因果離有衆生之我離無我體亦爾如幻夢若一向無便是斷也問此非有我豈不正理何故以為所治相耶答此我非有相若即是我非無相不一不異則非所治由執一向非有便為斷見故是所謂九有無不二者外轉立云前既有無各別不得今有無並立應無過失論破云成壞相故謂成之與壞是相違法不得同時有無亦爾謂有是無之有無是有之無有無無有非一非異故名不二平等問法非一異今云不二非異何在答但解非一即解非異以將非一作非異非異作非一故又有與無非一異無與有非一異相望無別故云無二平等三結行入地中二先總結入位後自性下別結前總中牒前所觀十平等法觀後別中五一自性淨者遠離障垢故二隨順平等真如法故三無違等者不生分別想違無生故四得明利者微細慢對治故前四五二地同此地得順忍除障未細不名明利以四地解法慢最粗故得耎品忍五地除身淨慢障中庸故得中品忍此地取染淨所分別慢故得上品忍故名明利下品能治對上品所治乃至上品能治對下品所治障治相翻理必然故五隨順忍者耎中忍故順者隨順無生法忍故未得無生忍者以七地已上是無生忍位此非彼地故云未得然此順彼名為隨順理實初地即得無生為寄五忍配諸地故分滿異故謂仁王經說三賢法中名伏忍初二三地名信忍七八九地故名無生忍十地及佛地名寂滅忍若瓔珞經寂滅忍位亦有三聖謂別前二加等覺故又於初地分得非滿七地已上圓滿得故勝幔對治竟第二大段不住道行勝中二先約初住地明不住行二作是念下就正住地以明不住前地劣故唯正住地方名不住此地勝故初住地時即明不住就初住中二初牒前起後二大悲等正顯不住於中四句初三明能觀之心後一明觀所觀生滅然此三以作六重釋一辨相者愍心創起故云悲首論意釋以殊勝大悲攝三世衆生故二求果殷至稱為增上又上求佛果故論意釋於所知緣起令知淨智為佛果本故三厭離有為心論意釋觀一切種微細因緣以生厭離緣觀細極故云滿足二次第者我前觀空須念衆生虗妄所纏故先起悲以悲念故求佛果智以益衆生以起增上佛智必由離果而成是故末後起觀緣生過患終極三約二利者初一利他後二自利四約二護者前二護小乘一護狹心二護小心後一護煩惱五約因果者初後攝因中一求果六約不住者初一不住涅槃後一不住生死中一俱無所住就所觀生滅中十二緣生順生逆滅故云觀世間生滅此是總觀亦以十門別觀彼法二就正住地明不住中廣顯緣起於中有二先以義分別後依文正釋前中總有二十八門於中前一十八門引餘教別說後之十門隨當部文便釋前一十八門義具如別章後依文正釋中二先料簡其文後正釋文前中有三一就經本二依釋論三經論相對初中本經內二重先別明十觀後顯名重結前中十觀者一有支相續二一心所攝三自業差別四不相捨離五三道不斷六分別三際七三苦分別八因緣起九生滅十隨無所有盡觀於中各有順逆觀以為不住行故二依釋論者論以三門一就有為門中釋此十番此即是前大悲滿足觀二就深念衆生心中釋此十番名大悲隨順觀此即是前大悲為首觀三約求佛心中釋此十番名一切相智分別觀此即是前大悲增上觀此與前三次第少異者謂前約生心次第今據正行次第謂先自利過次念衆生後求大果故與前別於此三門各觀十番成三十門復各有逆順成六十門分別緣起觀三經論對攝者有二門一相對二相攝前中論但取經初住地處三心分別十門緣起各各具逆順成六十門若將下文彼果分中三解脫門觀因緣集歷前六十門乃有一百八十門顯緣生觀論主更依初住地三心一一各通有此十觀是故經論合舉物為四重釋此緣生一一各十即為四十門又各有逆順即為八十門以三空觀之總成二百四十門分別緣生法二相攝者論初門內開為三段一名成答相差別此攝經中初一有支相續觀二名第一義差別此攝經中第二一心所攝中半門觀三名世諦差別此攝經中後八門半於此三中初一顯於妄我非有二真俗非無義理圓修第二大悲隨順觀中攝十為四一名觀衆生愚癡顛倒攝十中第一門二名餘處求解脫攝第二門三名異道求解脫攝次後四門四名求異解脫攝後四門第三一切相智分別中攝十為九一名染淨分別觀攝初半門二名依止觀攝初中後半門及第二門三名方便觀攝第三門四名因緣相觀攝第四門五入諦觀攝第五門六力無力入依觀攝第六門七增上慢非增上慢信入觀攝第七門八無始觀攝第八第九門九種種觀攝第十門釋相可知後釋文中釋此十門即為十段一一段中皆四門釋一依經別釋二約論厭離有為釋三約大悲隨順釋四約一切相起分別釋如是四重依經及論收攝方盡了就第一段中四門之內先約經文名有支相續觀者此中正顯有支無我觀於中二初明倒執有我妄起緣分後佛子菩薩摩訶薩復作是念下約迷諸諦理起緣次第前中三一明無我二復作是念下成緣起三菩薩如是結依位行初中二先云世間受生皆由著我者反舉惑情執我非理若理有我則起我者應得出世既生世間明知執我非理復云若離著我則無生處者此順舉若理有我則離我理應生世間既得出世明理無我二迷諦起緣者迷於無我勝義起彼有我於中二先順觀緣起後此因緣故集下逆觀緣起前中初云凡夫無知等者此無明支體用謂無知即是無明體餘是業用求有無愛斷常故二不正思下明行支謂不正思者示無明因故起妄行者於解脫處不正行故行邪道者示菩薩勝義故菩薩雖行於有不名妄行由迷隨無明故起罪行由迷真實義無明故起福不動行謂感三惡道業及人天別報苦業皆是惡行感欲界人天業名福行感色無色界業名不動行三積集下明識支餘論說此識支有二種一是所引本識中異熟識種子二是能引謂五果種所依本識名為識支即現行第八今此說後不論其前以行支為能引引起識中五果種子令至有故云積集增長乃至復起後有順義此文應云於諸行中植心種子積集增長有漏有取復起後有謂隨三行種植識中五果種子積集漸增乃至令熟至有故此是能引所引一對言有漏有取復起後有有生老死者謂由愛取有故生生老死此是能生所生一對以五果是名言種子通無漏位今行所引明非無漏故云有漏也無愛字者略故四所謂下明識生名色等然有六緣如世福田種植一業為田者望所生根為增上緣故二識為種者五果種子為彼親因故如種子但以能依種子不離所依之識故云識如種子此舉所依通取能依故也三無明暗覆者謂受生時無明迷父母如世種植地中雖有種子要上有土覆四愛水潤者於父母起染愛心潤其受生如種植雖有土要須濕潤五我慢溉灌者計有己身能有所依如雖濕潤須人溉灌六見網增長者以我我所及慢我生不生等種種見網蓋覆夫無漏法不能侵損如種子入土以網覆護不令衆鳥侵奪五生名色身者次上六緣了自下明識緣名色此即顯所生果隨識入胎時五果種子為無明業引愛水潤故並熟生果雖同潤同熟然現起則有前後皆前引後起故云名色增長生五根等此但增上非謂名色是諸根親因餘亦如是後六緣起及憂悲等文易可知後逆觀中以因緣集即無集故顯無我此非對治性自滅故三結位所行相顯後約迷諦理起緣次第中二先順觀後如是但有下逆觀前中云於第一義諦不了故名無明者此有二義一通舉第一義諦是十二有支所依之本明依真起妄顯有支無體以無明最初故無明依起餘支類皆依真起二別顯此是無明所迷謂此無明由二諦造於三行是故論經名諸諦第一義前段明所造三行此中顯所迷二諦文綺互爾由各為增上緣力所前起後令相續成立故生四取蘊者能引所引諸教四說一此經以二支為能引四蘊名色等五種為所引此約識支有二義故一若賴耶為識支餘識即屬名色支中名支者攝也若通第六識亦入識支者即色受想行四蘊為名色支今依後義或同集論故作是說二依成唯識說能引二支謂無明行所引五支謂五果種者以本識內親生五果名言種子是因緣性為曾業種是增上緣故三集論所說三支能引五支所引者依本識中有二種說一以業種為識支故二異熟識種是名色攝故四緣起經上卷云於諸分中無明與行及識一分名為能引後一分識及名色六處觸受名所引者此異所說通取二種為識支非如集論偏取問彼經亦用業種為識如何種非名色攝論主為通此難故出彼經意說識是名色依非名色攝故後逆觀中無作者是人空無作事是法空依經釋了第二依論約相諦分別釋中三段內初門名成答相差別於中門別有四相相從為三要攝為二總別為一四者一舉彼解惑顯成無我門二論經愚癡下經本凡夫無智下責情顯理門三依論經無智下依經本行邪道下名辨相顯實門四不知第一義下明依實辨相門二相從為三者四中初一名成謂釋成無我以二名答顯無我後一名相謂依諸諦理立緣生相要攝為二者前之三門宗顯無我故一處舉釋後之一門宗顯緣生依真起相故別舉別釋總為一者謂第一成答相差別也論云五道中所有生死等者釋世間所有生處等下開三門就初釋成中四句一總釋成無我二一切世門下牒舉經即無我義成者但攝經即見顯成無我義三若第一義下即事顯成無我三義有二句一若實有我不成凡夫過二若我實有不成聖人過何者若第一義中實有我者定其所取著我之心即為第一義智者辨定能取也不應世間生者正出過謂若第一義中實有我相者凡應是聖此為立宗以有能證第一義中實我智故此出因如諸凡夫者同法喻此則凡同聖智過應無凡夫現見不爾明知無我又二聖應同凡立宗以理實有我聖證為無違理倒或非聖智故出因如諸凡夫應生世間舉同喻此則聖同凡倒過應無聖人理既不爾明知無我此境失中准前此文缺一句應云離著我心即應非是第一義智無我既非第一義諦離我之心豈可得名第一義智言應常生世間者以理正徵謂若離我以非勝義智應不證涅槃常生世間故別句中凡者既有第一義智屬道諦攝應得涅槃不在世間此文顯於無我真理顯然可見四顯示下舉經對顯第二釋答中謂難在文外故云答也此有兩難二答初執情徵理難情乖正理答難云若理實無我云何著我既著於我不著無我明知有我如虗空無人豈有計人立量亦可知下答以癡所盲故於無我處而執為我如目有翳空中見華豈可空中實有華也比量可知二如是實無有我下執相徵實難相不依我答難云若當有我可令無明作緣行次第既云無我我誰為次第乃至老死此示現下舉經正答由癡造業業行起識乃至老死如世種植相生次第何用我耶答意如此於中希常為有求斷為無希求是愛無知是癩煩惱雖廣以此二種是有支根本故偏舉爾次釋行中三句一釋邪念二邪道三妄行以菩薩行有不妄行故以釋識支等先儀舉經文是中下釋以異熟賴耶正是報體故云示生老死體又釋種子識為彼因故云體也又釋如來藏賴耶為生死性故謂此識體復能隨順攝持餘支種子令得成就能所引生故云隨順攝取等也罪福等業為地遠釋云以如是住者是色如是生心者是名色支結所生名色也本疏云今更釋如是住者是識種業地如是生心者是癡覆愛潤此結上四文又釋此物標經中我心灌等謂作如是安住生如是心我是我所等謂見已為我如男子受生見父精為己有故為我所又見母為己妻亦是我所女人反此言我我想是慢者牒前我及我所二想為慢自見與父共競女色謂己得勝便起想慢女人反此亦爾言我生等釋見網遠云見己唯在此處生不餘處生故云我生不生又云見常為我生見斷為不生本疏云今釋見己正報以為我生見所遊戲依報名為不生以受胎時或見遊華林或居殿堂等異見非一故云種種以見執難捨如網網覆也下遊逆觀以緣起法無性故滅非是智力斷故名滅下結前生後若緣無我更依何法緣相得住下舉經對顯明緣起相依真而空論中無明作業稱名色者遠引婆沙云名色有二種一方便名色二報名色若言名色緣識是方便名色若說識緣名色報名色今既說行以為名色故知是彼方便名色言彼依止者阿賴耶識是彼名色等所依止故此約依持門說二名色與識共生者是相生義三相依義謂色由名色得起名色由識得起下釋逆觀作者作事人法皆空是名結前云何云彼證此真諦得解脫答今舉緣生以辨彼觀故三約論大悲隨順四段之內此名第一愚癡顛倒者不解無我名曰愚癡謬執有我稱為顛倒論中總釋謂菩薩觀此第一門十二有支想是癡倒隨順菩薩大悲之心故云此事觀也下別釋中先解愚癡後一切凡夫下釋顛倒前中先辨癡相謂著我故生離我故不生舉離不生顯著是癡次釋癡名云何問也無明暗者先無慧明體是暗故名為愚癡經帖可知二釋倒中癡盲著我如是倒者是取我之倒有相支中疑惑倒者是取我所倒此釋經中無智求等乃至盡此一門皆是顛倒菩薩觀此於諸衆生深起大悲四約一切相智分別者明此十二有支總是一切種智所知之法攝十為九此初門中前半名染淨分別觀謂著我為染離我為淨然此一文具含多意且舉四釋謂經中明是妄取我故知此緣生次第之相二論家初意舉此解惑以顯無我成無我觀三舉離我不生顯我是癡順成悲觀四取此解惑以為所知染淨之法下半門以是依真起故屬彼依止觀攝釋初門竟第二就一心所攝中亦四門同前初約經文釋分為三段初總標二何以故徵三隨事下釋總中二先顯義後如來於此下引說證義前中云三界所有唯是一心者謂十二緣起是三界所有此無別體唯是一心此一心言通有二種一者同類一謂八識心品同能積集熏變種子成因感果此則所變現境依能變心起攝境從心名一心故二者一性一謂即前所明八識心品及所變現三界所有總是生滅虗妄緣集緣集無性即是一心此則會妄歸真攝相從性名一心故若爾世諦云何差別若無差別一心亦無要由俗諦得證真故論云隨順觀世諦即入第一義諦故云何隨順觀觀世緣生故云何即入第一義諦觀世緣成時便顯無性故後引說中云如來於此者於此緣生門中故皆依一心者真心隨緣成有支故前云唯是一心則約會事歸理後云皆依一心則為以理從事其義是一言左右爾二徵意云十二有支既作一心則有支皆無自性既爾何有前後相緣三釋意云一心不壞世諦緣生相故論云此是二諦差別一心雜和合因緣集觀謂二諦差別一心等者是生滅與不生滅和合非一非異為阿賴耶識故云二諦雜和合因緣集也隨事者隨其行業於何趣中從中陰內起求生愛心故云生欲心此心起時與本識中識支種子同時起至生陰時此求生心滅唯本識託哥羅邏等如外種依牙生等故云心是識論經云貪欲心生者謂第六識中求生時貪欲共阿賴耶識同時起故於中陰末貪惑心續名為受生彼所造行變為境界謂殿堂等名為誑心以不知故雖取之為實名曰無明此是受生無明非發業無明此中大意明受生時行事是能引欲心是能潤此二於識支前故名誑心無明亦是能引心誑故令取亦是能潤此二居後引潤本識中五果等種生所生果現起分位有次第故說名色等是故十二有支皆唯是識二約厭離有為就相諦分別者論釋此是染依止觀言二諦差別者論主意將所依心體是真諦能依有支是俗諦故此一文名為二諦此釋總標文也言一心雜和合因緣集觀者釋所以者何下文如別釋竟三約大悲隨順分別者論名餘處求解脫是諸凡夫如是愚癡顛倒常應於阿賴耶識及阿陀耶識中求解脫者此是舉正顯耶言乃於餘處我我所中求解脫者此顯邪乖正以諸愚夫背正從邪深為可愍故此對治下舉經顯治可知四約一切智分別者論名依止觀謂分別有支依止有二種謂真性及依止識此中二諦通為二緣明是大智所了之法第三自業差別中亦四門同前初約相用分別此十二有支皆有二義一明自行相二助成彼用謂令衆生迷於所緣故是無明自相與行作生死因是助成業用論經名自業成問此十二支於四緣中具有幾緣答成唯識第八云諸支相望增上定有所餘三緣有無不定契經依定唯說有一愛望於取有望於生有因緣義若說識支是業種者行望於識亦作因緣餘支相望無因緣義而集論說無明望行有因緣者依無明時業習氣說無明俱故假說無明實是行種瑜伽論說諸支相望無因緣者依現愛取唯業有說無明望行愛望於取生望老死有餘二緣有望於生受望於愛無等無間緣有所緣緣餘支相望二俱非有此中且依鄰近順次不相雜亂實緣起說異此相望為緣不定本疏解云緣起經說唯增上緣一切定有因緣有四位謂二是實一但增愛為取無別種故二有支中望五果種望生有親生義若說業以為有支則無因緣二是假說無明時行種識為業種等無間緣四位謂無明行愛取生老死所緣緣有六位於前四加有望生受望愛所餘六支總無所緣及等無間二約厭有為分別者於染因觀內名他因觀以前支望後異故名他前能起後與他為因故云他因若辨行相顯他義名能生後顯因義論釋死支以不見知令相續者此是無明何故屬死釋此是死時無明因死而起故三約大悲分別中四門內此當第三異道求解脫於顛倒因中求解脫倒因三種中此文治彼自性因故云不應如是求何以故者將欲廣釋故徵也謂我佛法中因前支起後支斷前因故後果不生即得解脫汝說冥性為因縱知之何由可脫故云不應言因緣有支等者總舉經文四約一切相智分別中九門之內此當第三名方便觀因緣有支二種業能起因緣事者略釋顯謂前巧起後名方便等餘文可知第四不相捨離觀中亦四門同前初約不相離者謂前能起後離前無別後依前起離前無後不相離故各無自性無性緣起如心現前此為順觀逆成一真理平等觀經文可知二約厭有為分別論名自因觀無相等自生因觀緣事故者謂無明生行是自生因問無明行異云何名自答以行賴無明無自體故緣力全攝非是分故前明不即故說他因此顯不離名為自因有人引此子果之文證無明支有種子現行者非此文意又遠法師以五義釋此文明子時是前無明能生後無明令行不斷與行別時果時是後無明從前生助成行故與行同時等本疏云今尋此文意只發行無明為子時所發之行為果時以行是無明果故說無明有二時問無明望行無親因義云何說行即是無明果時答無明是行增上緣故名為子時行是無明增上果故名為果時文中有四初開義門二自因下釋不相離義三若不離下釋不即義四自生下總類結初中先開後是中下釋言子時令行不斷者以無明為行因故二種義緣事示現者以子時為緣果時為事故餘文二義類此可知故云餘因緣分等二釋不相離義中三句展轉釋成初自因者不相離故二云何不離以現見離前支無後支故此顯離子無果故說果為子果三云不離無明則成行者此順釋不離子無明成果故名離三釋不即義中無明二種過失後引中論頌釋成言不即因以是所生非能生故不異因者從於能生生所生故以果不即因故果不斷因不常以不異因故果不常因不斷又以不即因果俱不斷不異故因果俱不常又亦反此思之又以不離是不即故即不常為不斷四總類結可知三約大悲分別者謂邪見衆生執顛倒因內自在天為衆生因為可傷愍今此文中顯無明行等故對治彼執故為因觀四約一切相智分別者當第四因緣相觀有支無作故者明此有支非直後依前故後無性亦乃前能作後前亦無作故諸緣起是種智境界第五三道不斷中四門同前初約經為三道不斷者此中煩惱有二謂能發能潤雖諸煩惱皆能發潤然發業位無明力增潤業受生愛取力勝是故偏說由元熏發立一無明數數溉灌故分相顯名行業立生因愛取已潤近生當果立名為有此約唯業有說在名有二謂在因及果識等五種唯是報因生等二位但是報果以就所引因位難去差別相故據當果位別顯立支謂續生時因識相顯次根未滿名色相增次根滿時六處明盛依斯發觸因觸起受爾時乃名受果究竟依此位立因為五支果位易了差別相故總立二支以顯三者然所生若在未來為生厭故說生老死若至現在為令了知分位相生說識等五具如成唯識第八卷顯又此惑業苦三為流轉之相如淨意菩薩所造十二因緣論頌云煩惱初八九業二及與十餘七說為苦三現十二法從三故生二從二故生七從七復生三是故如輪轉一切世間法唯因果無人但從諸空法遂生於空法此依三道顯二無我也二約厭離有為分別者論名攝過觀所謂三道攝苦因苦果深厭離故三約大悲分別者論名異道求解脫內對治苦行因謂邪苦行但是煩惱業妄想因故非樂因故如經無明愛等四約大智分別者觀名入諦觀三道是苦集諦故是大智所知法也瑜伽云幾支苦諦攝及現識為苦答二謂生及老死問幾支苦諦攝當成為苦答五謂識乃至受種子性問幾支集諦攝答所餘支謂餘五因二果俱是苦諦惑業五是集諦攝又成唯識第八云皆苦諦攝取蘊性故五集諦攝業煩惱性故此中苦通十二以是取蘊性故集唯攝五第六分別三際中亦四門同前初約經分別先後際者此十二支初二是能引次五是所引次三是能生後二是所生於中分別三際諸聖教中略有三說一依此經開能所引分先後中際合能所生總為後際以行遠故開之生近故合之二依成唯識論開能所生合能所引是故前十現在後二未來以十因二果分二世故三生引俱開如智度論初二過去次八現在後二未來故成三世如成唯識等十因二果定不同世因中前七與次三或同或異若二三七各定同世如是十二一重因果足顯輪轉及離斷常又由此三際因果輪轉人法二我永無所有問何故此經不言生老死耶答略故不說二約厭離有為者論名護過觀謂外人與此緣道理出三種過一一切身一時生者列過名何以故者外人自徵立過所以無異者釋立過相以無我異同何為不得五道之身一時竝生二中列釋名徵立可知無作者故者釋立過相若無我作業誰受來報三中別徵可知釋中既無有我誰持是業令夫至果是故應知前不受報據前望後說此中失業據後望前說此三種下總牒顯護謂過現因別名為異以此答前三種難故名為答亦通取下句未果異因云何得有一時生過又差別因得差別報云何乃言有不受報差別之報由異因生云何得有生業之過下釋文中先釋過去內無明緣行是見過去者牒舉經文下釋中二句初明過因能作現二果由過因說現識等以為當來此中但從過去因即足何須彼說現為其當欲以因果相屬防三過故即是見下釋已總結過去是因義二釋現在中言識乃至見現在者牒經文釋中二句初明現由過因二復能下明過因得現果現在是彼過去之未來故云得未來果三愛取下釋未來中先牒文言後有生者釋從愛取等起有生死名有生也問前釋過現皆二世相對今解未來何故不然答以彼過現經中自分為兩世故須相屬以成護過經中自說愛取有三從果為未來不假論主相屬故不論也言一往定結別前文以上來所說是一分三世名一往現數如是稱為定下釋展轉三世相生無盡故云復有彼世生轉故也此說何義下釋相護過有三義一泛明業不得果二舉經明得三雙結得不前中先總舉由三義故令過去業不能得報一或有未作者就過去求愛所有等爾時未作故於現在不得生老死果本疏云問觀此文意以說過去無明未作業行何因乃云愛等未作答若無明未作業何因乃言過去業三義故不得報言式有已作未得報者就現以求愛取有等雖已作竟以未熟故現在不得生老死果或於此生若得聖果者斷愛取故今已熟業即便燋亡不得報二是中無明下舉經三義得報謂過去既有無明緣行故知已作不同愛等現在得識等五果明知則是業已得果由現在愛取無聖道斷令未來生死相續不絶三是故下雙結中已作是行支未作是有支已得果是識支未得果是生支等聖人已斷凡夫未斷下正結護業既有如是差何容有一切身一時生過謂有作未作何緣一時有得報未得云何一時有斷未斷如何一時若示下重牒顯示非一切當受者是前已斷也亦非不受者是前未斷亦非一時者顯前作未作得未得若自作下護第二不受報過謂自作自受何不他受以他不作故三離彼三事護第三失業過謂由離於三種不得是故諸業無不得果故無失業過下結可知三約大悲分別者菩薩見諸外道行異道求解脫中計無因等起大悲心觀此緣生救彼邪見執論言先中際因者過去二支是先際與現在識等中際為因言及中後際因者中際愛取有與未來後際為因言中際前後二際故者於中際內識等五果分屬前果愛等三因分屬後際既有此因云何言無是故結云若無如是同事則種種衆生果事亦無也四約大智分別者名力無力信入依觀過去二支望現有力望後無力愛等三支望後有力望前無力又釋過二有力現五無力現三有力後二無力以皆能生為有力所生為無力菩薩舉此化人令離入正故云信入依菩薩智照故云觀也言先中後化緣者重釋成先中後是力無力化緣是信入謂照三際以化衆生為種智故第七三者聚集中亦四門初約經明此有支皆是苦聚將釋三苦因辨受俱分別瑜伽云幾果受俱行謂除二所餘即除受及老死餘十有樂受以受不與受俱故老死位中多無樂故幾苦受俱行謂即彼及所除中一即唯除受支餘十一是苦受幾是捨受俱行如樂受說以老死位多無容捨故幾不與受俱行謂所除中一即受支以受不與受俱故成唯識中亦同此說次三苦分別有二門一理實遍通門如瑜伽中壞苦攝十支全及受支中一分謂樂受除受支中苦及老死支苦苦攝十一支全及受中一分謂苦受行苦攝苦攝苦皆是行苦或有十苦非二支所攝謂不苦不樂受是故行苦通攝十二成唯識第八同此二隨相增顯門如此經說謂初五支遷流相顯故稱行苦觸受二種觸對生苦故云苦苦餘為壞苦者但壞樂名壞苦老死支既無樂可壞何故名壞者釋曰壞有二種一樂壞為苦望所壞說二以壞即是苦故名壞苦此老死支能壞生故屬壞苦也餘文可知二約厭離有為論主世諦觀亦種種中此當第五名不厭厭觀謂凡夫不厭菩薩厭故云不厭厭此約粗苦又二乘不厭菩薩能厭此約細苦故云種種微苦以分別此等皆苦故及厭種種粗苦者二乘所厭菩薩亦厭又亦得前細是行苦此粗是彼餘二苦故三約大悲隨順分別者愍諸外道不達真理求異解脫真脫有四舉正顯邪一離一切苦相者涅槃樂德也二無為相者是是常德三離流相者是淨德四出世相者是德涅槃云於世間法自在遠離名為我言彼諸行苦下辨邪異正於下四段經文各配一義今此當初言苦事隨逐乃至無色有轉者舉此三苦顯彼外道求非想等為涅槃者菩薩觀之皆是十二緣生三苦之法何有涅槃樂德之義故順起悲四約一切相智分別者此當第七增上慢非增上慢信入觀者聲聞人不覺細者自謂無苦名增上慢然覺粗苦名非增上慢舉此彼二乘信入大乘緣生微細苦事菩薩照此故名為觀不如實知下釋成慢相此之一門前約大悲以化外道今就大智以攝二乘以文言多意論重善取故也第八因緣生行者亦四門初約經文理實無明望行無因緣義而言因緣生行者有二義一自種為因無明為緣合說故云因緣然隱彼親種顯此勝緣故云無明因緣二但彼增上緣望自增上果還是親因故說無明為引因緣餘亦如是欲明果不自起要從因因緣形奪復各無性是故言因緣生乃顯無生此從順觀逆觀一泯非生不生可知二約厭離有為中世諦觀六門內此當第六名深觀此深觀中攝後三門合成四句一不自生二不他生三不共生四不無因生釋此四句諸論不同略有三說一約破外道謂諸法非自性生故云不自生二不從梵天自在天等生故云不他三亦非劫初極微和合生故云不共四不無因生離因緣外無別果法故云不無因生二約因緣形奪雜集云自種有故不從待衆緣故非自作無作用故不共生有功能非無因凡諸緣起但亡雙苦已為甚深況總亡四句是故緣起最極甚深三約緣起無礙門但因緣生果因緣相望各有二義一全有力二全無力謂因望於果有全不生緣必全生故因不生緣生故二緣望果亦全不生因必全生故云緣不生自因生故三二力不俱故不共生四二無力亦不俱故不無因生言無明因緣生諸行者論經云無明緣行生也此彰因起果明非他作言因緣能生行者明果由因顯非自作又以無明是行自因故非他作亦先無行體在無明中後還生行故非自作餘亦如是准思之此門中論主開為不自不他二句也三約大悲分別者明諸外道求異解脫中顯彼所求非想天等以為涅槃觀之但是有支緣生法非是無為涅槃常德是故菩薩隨起大悲也四約一切相智分別者於九門內以第八第九二門合為一無始觀遠法師云是真諦觀見法緣集無本性故名為無始本疏云因緣起法約無元本依之始起故云無始維摩中依無住本立一切法同此也中際生故後際生者舉法釋成謂此緣生即是不生故名無始是謂大智所知之法第九生滅繫縛者亦四門初約經無明緣行是生滅繫縛者謂此十遞互相望順則相生逆則相滅然生與滅不離有無之縛若觀相生無生則滅亦無滅方離於縛經意在此文中先明順觀後無滅下明逆觀可知二約厭離有為深觀四門中此是第三不共作言非二作者或因為自以緣為他或果為自以因緣為他此二自他俱不作故若自他俱不作何得為緣生為釋此疑故云但隨順生謂隨俗說生理實無生言無知者正由因緣互相待故各無自能可以相共也豈無成辨果耶正成辨時即無成辨故云作時三順大悲分別者謂諸外道求異解脫以非想等為涅槃菩薩觀之但是有支非離染縛失於涅槃真淨三德故生大悲故云如是復染生縛也四約一切相智分別門無始觀中名隨順縛故謂生滅唯縛隨順無本故第十無所有盡觀中亦四門初約經明此有支虗相既盡隨順無所有緣至第一義此顯不壞俗而恆真故云無明因緣諸法行生是隨順無所有問無明生行是順有何故言順無所有耶答乘諸行次第至此顯無明正生行時即順無生入理故問順觀既爾逆復云何答生既性盡則所有無所有俱離故云隨順無所有盡觀思之二約厭離有為中名第四非無因作隨順有故何故經中順無論名順有釋經意以緣歸理說論意以性從相說各顯義別不相違也又論中順有意顯無生是故與經意亦不別下別破無因中一縱破謂應常生二奪破謂恆不生故三此非法下呵詰破謂說無因最大邪見若爾下結非無因是名下釋訖總結言相諦者相是前成答相也諦是前二諦差別三約順大悲分別者謂諸外道求異解脫以為涅槃我德菩薩愍此順起大悲四約一切相智分別者此是第九名種種觀謂三有總別各多類狀云種種也隨順下釋顯其相此是三有世俗之境大智照此故以為門上來別釋十門竟二如是逆順下總結十章既云逆順十種明知前十門中皆有逆順前文中有無逆觀者是略故也一有別行別二攝歸一心三力用相生四前後相屬五三道輪還六三際因果七三苦過失八從因無性九似有若無十泯同平等配結前十文皆可見釋不住道行竟第三大段彼果勝中二先明彼果勝後佛子菩薩住此現前地已下明位果前中論分為五一得治行及離障是前勝慢對治果二佛子此菩薩摩訶薩大悲轉增下得修行勝是前不住道行果三佛子菩薩住此現前地得入下得三昧勝望前治勝以說果謂前修三脫以說對治彼治轉增故四佛子菩薩住此現前地復更下得不壞心勝望前離障以說果由滅障故三昧之心不可破壞五佛子菩薩以此心順佛菩提下明得自在力勝謂望前修行心說果法依前修行上進無礙名自在力釋此五果即為五段就初文中二無明治勝後菩薩如是下顯離障前中三解脫門義五門分別一辨體二釋名三治障四攝行五差別初體者以前壞中定教為性二釋名中二先得名後釋名前中初通後別前通者通名解脫即出離涅槃門者方便之義謂此定門是涅槃前方便故解脫之門依主立稱若總言三解脫門帶數釋也後別者若依薩婆多宗約四諦苦下空無我行名空門滅下四行名無相門所餘十行名為無願依大乘中遍計所執生法無我名為空緣此三摩地名空解脫門相謂十相即色聲香味觸男女生老死等涅槃無此法相故名無相緣此三摩地名無相解脫門願謂求願觀三界苦無所願求故名無願緣此三摩地名無願解脫門具如佛地論說又智度第六云知一切地實相畢竟空名空三昧知是空已不觀諸法若空不空若有若無等名無作三昧知一切無有相故於一切法不受不著名無相三昧復次十八空名空三昧於種種有中心不求名無作三昧於一切法相知破壞不憶念名無相三昧此中釋名初從解脫行及壞為名後二皆據無他受稱餘門分別如別行章門中二先總顯前十門有支皆有此三空觀門後知無我下正顯顯中先明空門論分有三初三句明生體空言知無我者主寄無故無人者人以現住為義觀現住者不可得故無壽命者壽以攝後為義觀從此壽命與後壽命相攝者不可得二次一句自性空者此顯法體空三後兩句無作者受者者此顯前生法上用空即得結名可知二云滅此事下明無相門亦三義一滅障者觀彼有支自性滅故云滅此事問此與前無我何別答前就諸法以明無我此中欲遣能取相心故不同也二得對治者論經云常解脫現前經云在畢竟解脫也三相念相不行者見因緣處無少法相可生故云餘不相續遠曰此三中初滅障者取性心亡二得理為治三取相心滅不見少法生故離分別取相之心前滅取性不同凡夫今離取相不同二乘三知此下明無願門亦三一前二則是無願所依故云依止二受不樂有者顯無願故云體性三唯大悲等緣出二乘故云勝二明離障初中初離彼我等是空門所離也二離有相者是無相所離也三離無相者是無願所離故云離有無相以不取無相故說無願心無相故無所願求論云如是次第於前五地下舉劣顯勝初舉五地顯此空門離我之勝此文是倒若正應云以十平等深淨心故遠離即遠離四地身淨我慢令以深空滅彼二我故此勝也二舉四地離障此文中離作者受者勝三此六地等舉此地初十平等處破有無等顯今地滿無相無願破遣有無一切蘊盡故云勝故第二明修行勝中二初正修行後即得下明修行勝前中二初明勇猛修行後菩薩如是觀下明丈夫者修行言勇猛修行者初修更絶故丈夫者修行者果決修成故前中二初修行心謂以三空觀彼有支愍諸衆生處而不覺故云悲心轉增由悲增進是利他心未滿菩提等是自利心下明修行勝中二先修智不著有為後他衆生下修悲不住無為前中亦二先知後厭就知中煩惱業生合散具闕有增有減二既知此法有是過患即生厭離不應令合故云我知有為等故論云知有為法多過遠離生業煩惱等下修悲化生可知後文者志修行中先智後悲智中論名厭對觀者有為名對見多過觀者重釋成也滅對者明有為性滅故云無性等後明修行勝中二先勝相現前論云智及大悲勝隨順者牒前二行中各有悲智能上順也依不住道無礙般若現前者明依前悲智不住之道令佛地無礙智光現前知有為與涅槃平等解智悲不住所以不共住者解不住義謂智不共有為法住故云而亦不住等又悲不共無為法住故云亦不住其中等彼助道行不滿故者釋不住所為為滿智助道不住有為功德助道不住無為故云欲具足等第三明三昧勝中二先明空定後顯餘二前中先舉十空上首後結多門此中一萬論經名百千萬也前十空中論攝為四一觀是觀解二不放逸者依解起行離過為名三得增上者因修成德得上功德四因事者依德起用三昧是大用本故故名因事初中除第四三昧餘五名觀一生空觀二法空觀三合取二空名第一義四依本識觀二種如來藏中是空如來藏故云大空五觀七轉識不離如來藏和合而起皆無自性故云合空楞伽云七識亦如是以俱和合生又云不壞相有八無相亦無相是也二不放逸者分別對修是自分也修行無厭足勝進也二修滿足故云究竟三得增上功德者勝德依空生起現前故云生空四因事去餘三三昧一依此空定令智障淨因是事故名如實離妄二依空起悲不捨衆生是故論經名不捨空三依空三昧願在三有遠離染著名離分別然隨順有離不分別餘文可知等四得不壞心勝中十句分二初一總深心者深微難動論經不壞心者謂堅固不退餘九為別一於理信觀二行堪受調三於深祕密法心不驚怖四自分不失五勝進無歇六不嫉他德不破己戒二行普淨故云廣心七慈普益生八求上地智九巧化衆生第五自在力緣中三初標舉信行滿更起進之心次滿足下正顯後佛子菩薩以此下總結標中云後更等者修無厭倦故正顯中十心分二初一總餘九別總中開出故一下伏力二解力三捨小力四信深力五摧魔力六治惑力七遍治力八巧他力九治障力並如論顯三結可知自下第二明位果中三果同前初調柔中三調柔行內聽受正法如說行者論經得三昧慧光釋以得義持能如說行因事彼者因彼義持事是故說此依勝三昧得奢摩他是如實三昧毗婆舍那是前智慧光明勝行行已憶持者能持彼行故所練淨中云是人乃至明淨者解脫彼障釋所練淨證彼義故釋知佛法藏釋喻中出世間智增上者顯證智體淨光明勝者亦現用勝以顯體以教智光勝顯證智亦增上乃至以方便智等釋合喻文無礙般若是佛智光明也方便是前不住道智二釋教智淨中前地取月輪喻故小此地取月光喻寬大故勝前隨順四流是魔所引故云魔道此名惡魔是彼魔道三是名下結說相攝報願智准前可知自下第三大段重頌分中三十四頌分五初二頌頌前十平等法勝慢對治二次有十一頌頌不住道行勝於中初有一頌頌初住地心總觀緣起二有二頌頌初因緣分次第觀三有一頌頌一心所攝四有一頌頌自業差別五有半頌頌不相捨離六有半頌頌三道不斷七有一頌頌三苦差別八有一頌頌三際差別九有半頌頌生滅轉觀十有半頌却頌第八緣起觀十一有一頌頌隨順無所有盡觀十二有一頌頌結十門名三次四頌頌彼果勝於中初二頌頌前對治勝次一頌頌修行勝次半頌頌不壞心勝次半頌頌自在力勝四次四頌位果於中初二頌頌調柔果後二頌頌攝報果略不頌願起果五後一頌歎勝結說第六地竟第七遠行地中釋有二種一料簡二釋文前中略以二門分別一釋名二來意初釋名者略有三種一約功用盡故為名攝大乘云至功用行最後邊故世親釋云謂此地中於功用行得至究竟雖一切不動搖而於無相猶名有行二約二義解深密云能遠證入無缺無間無相作意與清淨地無相鄰接故名遠行本疏云無缺無間遠於前六鄰接淨地近後第八三約三義成唯識云至無相住功用後邊出過世間二我道故故名遠行地同十地論釋金光明云無攝無間無相思惟解脫三昧遠修行故是地清淨無障無礙名遠行地莊嚴論云菩薩七地中近一乘道名為遠行問誰遠去答功用方便究竟此遠能去由此遠去故名遠行地十住論云去三界遠近法王位故身地仁王經名遠達地於遠已達故二來意者今三義一前寄二乘今顯菩薩漸次第故二於無相觀前地未純今此觀進入無相故三前地功用未滿今此滿故更有諸門分別如別行章說後釋文中三分一讚請分二爾時金剛藏下正說分三重頌分就初讚請中十二頌分四初三頌明供讚於中前二天衆供寶讚說法主後一天王香光供佛二有一頌天衆自慶讚得聞地法三有六頌明佛力令天女樂中讚佛初一述讚所依後五正顯讚詞詞中初一頌明無住行三業次一明無取行三業次一興供三業梵本中云由得智慧自在故剎佛我想皆除滅也次一二剎三業後一離過三業四有二頌明請法於中前一結前供讚生後有欲後一讚衆請說心得願說有想有欲第二正說分中二先明地行論分為五一樂無作行對治分二佛子菩薩摩訶薩住此第七地已入無量下彼障對治分三佛子此菩薩以深智下發行分四爾時解脫月問下前上地勝差別分五何以故菩薩從初地下彼果差別分初云樂等者前六地中愛著三空名樂無作此地隨有不著於空故名對治此是地皆修捨法也二彼障等者前加行中雖治前地樂空之心以其有量有功用故即復是障是故初住地時修無量無功用行以為對治故以為名三發行者垢障既除上觀俱運故四前上等者此地功用過前六地勝後三地故五彼果者地滿足故前發行究竟故名彼果自下廣釋就前初分內有三初結前舉後勸修趣入二何等下正顯行相三菩薩以如是下結行功能初中二先總舉前地樂無作障後當修下能治方便者不捨衆生法無我智對治攝取增上行此治無作行中生樂心也修十種等者此行修空不滯空行有不著有由此能治一向住無作行故名方便慧能成此地智故云殊勝道因也又此行於前世出法中最勝彼皆劣此故云此勝即初二三地寄配世間四五六地寄配出世故二正顯中先徵後釋釋中十行一一皆是權實發行法無我慧論中明四種功德攝十行為四門謂初三各別一德後七合為一德此中初句云雖善修空等者論經大同但無量與助道稍異爾此初功德謂財及身勝因事隨所須隨意取得財及身勝因功德集故言財及身勝因事者舉方便智謂菩薩無盡財果無礙身根由不滯寂福行所成故說方便為彼勝因隨所須是財隨意取是身謂隨意受生故二云雖得諸佛等者論經云入諸法無我無壽命無衆生而不捨起四無量故准論後釋與此經異謂此文意顯證得己身之佛平等三慧然不礙樂常供佛論經乃是明護惡行因事得勝無量修於衆生中不起妄行言護惡行因事者舉方便智謂慈不惱衆生名為護惡方便與此為因故名也以即空而起悲名不妄行此是有第二功德也三入觀空等者此中先空智後集福德論經先起福德後觀無所取文雖稍異大意同也此是第三功德謂護善根因事得彼勝因增上故功德法增上行以波羅蜜行謂以方便智攝護善根令得生長故以為因下明發起勝行言得彼勝因增上者牒前起後言功德增上等者正顯勝相故云廣集等論主判意前三句自利行後七句利他行故同名攝衆生因事俱以方便智為攝生因七中初一此云雖遠離等者隨物受生次二他令離障下四攝令住善初中願力受生作彼上首故云莊嚴三界論經云莊嚴三界行故何故唯作首以將衆生隨逐受化故二畢竟下令離煩惱障說對治故去斷惑之智必不見有惑可斷也故畢竟寂滅諸煩惱焰也正此不見惑正是斷之行相故斷不斷不相礙故言雖也三雖知諸法如幻等者令離智障故四雖知一切國土等明為物嚴土集起法會維摩云雖知諸佛國及以衆生空而常修淨土教化諸衆生同此說也五知諸佛法身等者為物現正報三業先辨自業法離相何故現色者為與衆生化生福五緣故一見二聞三親近四供養五受法修行故六知諸佛等者語業為生轉法輪故七隨諸佛等者意業了差別多時不離一念然不礙隨機種種別說三總結勝能可知上來釋殊勝下釋方便智論云此十發起勝行共對者明共方便智對謂於空不著名方便智即空之有名殊勝行今明釋方便智攝取對治者明不礙空而起有行故此有行方能對治樂空之心是為方便智所攝故言攝取下略舉經初二句以對顯餘皆等之也第二明彼障對治分中二種相一修行無量種二此無作是念下明修行無功用行前中修行無量種者前樂對治有量為障故修無量為能治後修無功用行者前樂對治作意修習功用為障故修無功用為能治先明修無量中二十句攝為十對一一對中皆先明所應境後明能隨行准論十對修行以六句攝皆云入者隨也謂能隨化者業隨所所化之故皆云入也初一對云衆生界諸佛教化等者是隨所作利益何等衆生謂於無量衆生界中以無量業教化故此亦總句也二次一對云世界網諸佛淨土等者是衆生經何處謂於無量世界中令依淨土行故三次二對是以何等智慧謂一云種種差別法諸佛現覺智二云劫數諸佛覺了三世智等謂以無量種種法界智慧覺故無量劫數通達三世亦入智慧覺故四次二對是以何等心謂一云衆生差別信解諸佛樂現種種名色身二云衆生欲樂諸根等諸佛語言等謂有衆生信種種天身以隨同行隨彼信說故知過去心習耎中利根如應說法故五次一對是以何等行謂云衆生種種心行諸佛了知廣大智德隨衆生心說對治故此一或屬前三品心內利也六次三對是置何等乘謂一聲聞乘中信解諸佛智通令信解故二辟支佛中信解諸佛說甚深智慧門令入故三諸菩薩方便行諸佛說大乘集成事令菩薩入故謂於三乘中各隨應運置故後無功用行中二先明觀解方便後佛子此菩薩下正顯修行前中亦二先舉修行無量中諸佛無量境界可知後我迷應下起趣求心於中云無分別者論經云自然不以分別等論釋云自然者自性緣無分別故謂八地已上無功用心名自然等以純任性能起善行故名自性依彼能起佛境勢力是故修習以分別心不能亡緣等照法界不成要以無分別不取相故即無功用也後正修行中修習方便慧者是前十種方便智何故前以為障今復為治謂治障有二種一染為障淨為治二行生為障行熟為治今約後說以前是創修勵力而起功用故是障今此段修純熟故是治此是修學無功用故不同八地也安住不動者行堅不退不同八地功用不動也第三發行分中四一二行發無間二常不捨下是信勝三此菩薩於念念下能作大義四佛子此十波羅下明菩提分差別論主判此大義結文入菩提分中似錯所以者何若此十度菩提分攝大義亦應名菩提分俱十度故雖然且依論主此四段中初一自分後三勝進初謂內證行熟止觀俱現名二行發外修常續名無間前中三初一念等明二行發現無礙故論云一念中奢摩他毗婆舍那二行現前故二行位等明二行無間常起論云一切行中彼修行時無間不斷不息行故不斷者不全停絶故不息者不暫休廢故三乃至睡夢等明離惡住善二信勝者始起信心於上決定名勝論云彼無量智中殊異義莊嚴相現前專念故謂於隨佛所現應機境專注故云常不捨於如是想念三能作大義者依信起行行有義利義利勝名大修稱作故於中二先總標後何以故下別釋別釋中先釋能具之智後所有下釋所具十度前中二先徵意云十度行廣何故念念中能得具足後釋中以大悲為首者救衆生也修行等者求菩提也後別釋所求十度中一念念捨己善根與生名檀度即此念中能息煩惱名戒悲物不損名忍進求無厭不起異念忍法無生巧起此行大願轉增異論不壞妙達所宜是故一念起一施時即具十度餘念相續皆爾雖前諸地皆欲修此要到此地最勝成就論釋後四度釋方便中云起無量智事者釋方便體相以是下釋方便功能謂以方便能起施等無量行時能以願力具足攝故二起上上智者釋願體相以是下釋願功能謂以願功能能起上上智以此智能起彼施等令上上行生皆攝取殊勝故三魔等不壞顯力體相以是能離施等障者是力功能四如實前法者顯智體相以是下明智功能謂由智力顯施等差別以化衆生故也四菩提分差別中四一依大乘行謂十度自利故二依他衆生者謂四攝攝生故上二明攝善行下二明離過行三依煩惱障淨謂住菩提分法以般若觀修三解脫門照於障理淨煩惱障淨障苦果此淨煩惱障因緣都名四家亦名四持四別名者謂般若二諦捨煩惱苦清淨家者各住分位義故亦名持住持自分不相離故四依智障清淨謂依一切菩提分法於念中具足修故第四明前上地勝差別分中二初明六地後明勝三地就前中二先問後答答中先總後別總中先標次何以故下釋謂既諸地齊具菩提分法何故此地獨名為勝下釋中以此地中功用行滿故云功行具足能入第八無功用道論經云得入智慧神通行舊經入智慧神通道今此經云得入智慧自在行行與道俱是因義自在與神通名用有殊皆無違也智慧是八地證智因行等名即是此地也下別釋勝相中論主先總問起云何此地中方便行滿足者方便行是功用行彼餘下更起殊勝行舉此第七是故下結勝劣初地願力緣遍滿真如名為大法二地戒除以惡三地求於佛慧以益生名轉增得四地智光名得法明四地入出世道五地還能隨世六地入深緣起上六各是一行中具一切今此地中一切中具一切故過別也論中下地上等是結前也云何下生起後彼修行下略顯智方便是前方便慧菩提分是前所起菩提分行於此地中功用行滿總結滿也二何以故下正顯勝後地前中二先明此勝過後解脫月下因辨諸地染淨之義前中先徵意云既言此地菩提分勝故得名勝此勝前後有何業用下釋中先法次喻後合初中慧所行道是發行之道以此力下正顯勝相謂以此勢力令八地已上任運之行自然成更無加行二世界者無功用位如淨世界有功用位如染世界隔位難超故以此喻又前六地喻染界後三地喻淨剎喻第七地名染淨位以能超染到此淨處既染由此越淨由此到是故此地極為安勝合中云行雜道者是染淨道故論經名染淨世界也後因辨諸地染淨義中先問後金剛藏言下答答中二先通明諸染淨之相後佛子此第七地無超下別明此地染淨相前中有法喻合法中先總標次徵責云前言是流今復云淨此有何義下釋以回向菩提名離煩惱業論中二句釋一向菩提大心故名離染業二隨道行如是深心故名離煩惱喻中二先舉輪王喻於七地未名純淨後舉梵王喻後三地乃名為淨合輪王中五句一菩薩亦如是以合輪王二始從等合乘象三知法等合知貧者四不為等合而不為等五然未名超煩惱行等合然未名超過人等合梵王喻准釋可知後別明此地染淨相中二初明此地離障勝前故云過多貧等後住此地下明此形前望後得名不定以不能常在純無漏觀是故出觀求佛以為煩惱故第五彼果分亦名發行果於中二先明彼果分後佛子菩薩成就如是智慧下明位果前中理實此果通前諸分以彼發行是正地體故名彼果於中論分為四一業清淨是前彼障對謂果二佛子菩薩住此地入下明得勝三昧是發行果三是菩薩得此三昧善治下明過地是前上地勝果四解脫月菩薩言佛子菩薩從何地來下明得勝行是前樂無作作對治果以彼方便及起勝行滿足在此故初中四一戒淨有二種一就具明戒故言以深淨心等二待行明戒謂斷惡修善故云所有一切不善等二世間所有下明世間智清淨勝三於三千下明自身勝論云心行二平等無與等者者謂深心及妙行為二也四諸禪下明得勝力得禪等現前勝者略釋謂等取神通等禪是四禪定是滅定故云寂滅等行故云滅定三摩鉢底此云等至謂作意專注唯在定心不同等持通於五識謂定位身心安和平等名等此由定力令身心至此等位又等義如前由於加行伏沉掉力令身心至此等位故名等至神通依根本定起故云等至神通也二明得勝三昧中二先別列十門後總結多類前中先五起解分別後五成行分別前五中一依未之義伏心令觀二依己之義重更審思上二知理法三依義持力一句無量義進益心慧四由文持力依一義說無量名故能分別義也上二知教法五依通一切五明處智此知事法故云如實分別後五中初一煩惱障淨顯其行深後四智障淨顯其行廣初中以真如觀堅固不壞故治惑障後四謂智障中一勝功德障者謂不能發起智通勝德故以為障對治可知二不能具起無礙法界自在業行故以為障依定起此故以為治三前深上佛法怯弱障者謂如來所說深玄之法情礙不入故以為障對治可知四不住行障者不能寂用無礙俱行故以為障對治中皆二種生死向無住涅槃故結可知三明過地中三初行修善巧過二佛子菩薩住此地善淨無量下明作業廣大過二佛子菩薩住此第七地得甚深下明行修勝業過初中四句一巧智二深悲三過聲聞等對下彰出四趣佛智對上彰入謂能入八地已上法流水中止觀俱現任運流注入佛果海故二作業廣大中二先正顯過相後解脫月下彰過分齊前中亦二先對下彰出過二業故後得無生下對上明入前中論云無量三業無相行論云入定遠離相無量聲聞緣覺亦有淨業遠離相然無量不能利益一切衆生故此釋過二乘後次此無量勝餘下地者此顯過於六地等後對下明入云得無生忍等者得八地無生忍光明相故能照明也後彰過分齊中先問後答問中脫月將後同前難剛藏簡後異前答答中法喻合法中二先彼超過是縱也後然但下奪也奪中先簡非後今第下顯是論云方便行盡念觀住故者方便慧及殊勝行滿足名盡於上境界念觀相應名為位合中求大法者求佛身所得法二乘無心求此故超也三行修勝入過中云甚深名遠入故者能上入故遠離名彼障滅者離前障故無行者彼餘出世間地不能行故言身口等者論云聲聞辟支佛雖離彼相業不如是得少為足不求上行故謂二乘雖亦離相業用不如菩薩以少為足不求上故雖行實際等是雙行果過二乘地也四明得勝行中二先明三摩鉢底勝行謂在空不住故後佛子此菩薩得如是下明發起勝行謂起殊勝行故前中先問後答答中從六地等明得法分齊生住此地等辨勝過劣於中有法喻合法中先總明得而不證後此菩薩下別顯以不捨衆生即寂起用故云成就不思心等喻合知具釋滅定如後十通品第十通中後發起勝行中十句分二初一句明能發起緣為後九行所依亦名為總後九行是所發起行為其能依亦名為別謂由定慧力而得善巧於生死涅槃等真俗界俱無住著故皆言雖雖者即是非一向義亦名權實發行義以此言之十句共是一向一義也然論中攝此十句為八者以後三句合為一故八種行共對治攝者謂此八行皆共所治俱而不汙又障能治俱而常立如示現生死而恆住涅槃等以能所治俱故名共對治二門互收故後云攝初中三昧智力是能發起雖現下是所發起行二既現世間以何等身謂上首之身方攝生故三既處世間何得不染謂以願力取有故四處世不染者與世逈異作不染耶釋云不爾示有妻子名家不斷在斯熾然而不為燒五不唯同凡而行攝化亦得能轉二乘上入佛智故名入行六示資生行謂飲食資身睡眠長養皆順生是魔境界七示有衰退老病死三是魔所行上二轉魔行八轉行者轉諸凡夫煩惱之行所轉煩惱不出三種謂見愛無明故有三句初化轉見謂外道著見名為見貪化離名轉轉亦滅義二化轉無明謂智不能達世及出世名障礙化三令離為轉三化轉貪結菩薩現受勝妙樂具過天龍等受而不著為令覺之生尊重以即便令彼捨貪五欲故名攝取轉彼貪心又此三亦是菩薩自行常正欲明菩薩處邪恆正居礙不礙在貪不貪俱名轉也自下第二明位果中三果科釋同前練行中云護持正法論云於三千界得為大師故能護法次二句釋師義方便行滿者功用行終自行勝故守護上首利他行勝故堪為師所練淨中云利益衆生法忍清淨者法忍轉顯也此地釋名應知者謂利生是有中殊勝行法忍是空中方便起此二發行名善修無相行言善根勝者修行功用盡至故名遠行言盡至者是功用畢極故喻中衆寶嚴金者亦顯一切菩提分法方便行功用滿足故釋教起淨中日光如前地說者前地取日光勝月輪今取日光不取輪義同前地月光故指彼也此地勝者日勝月故餘文准釋第三大段重頌分中此一頌分七初四頌頌十妙行樂無作行對治於中第二頌雖等如來者梵本云雖行平等勤供佛次云雖觀等者梵本云雖了法空福無厭二次二頌頌彼障對治分中無量行略不頌無功用行三次三頌頌發行無間分於中第二頌內斯字梵本是為字即字是是字四次五頌頌上地勝分於中初頌云攀緣者梵本云緣念五次三頌半頌發行果於中第二頌云菩薩等者准梵本應云智者住於第七地超過聲聞緣覺行昔願利物今智成辨如王子力具足次頌云成就等者梵本云得甚深法又進行六次二頌半頌住果七末後一頌歎勝結說第七地釋竟第八地中二先義料簡後正釋文前中略以二門分別一釋名二來意前中二先得名後釋名得名中三一攝論云由一切相有功用行不能動故名不動地無性釋云第七地中行動相不動今此地中行相俱不動世親同此金光明云無相正思惟修得自在諸煩惱行不能令動故名不動成唯識云無分別智任運相續相用煩惱不能動故解深密云由於無相得無功用於諸相中不為現行煩惱所動故名不動十住論云若天魔梵沙門婆羅門無能動其願故名不動後釋者攝論有二義一無他受攝無彼功用故二有財釋謂功用是所有不為彼動故餘多同此二來意者有三一寄世出世謂初三地直寄顯世間四五六地寄出世間從彼此已去寄出出世間故二行用差別謂前地雖純無相觀然有功用作意現前此地任運不待加行故三分段變易有差別故若廣分別如別行章後正釋文中有三分初讚請分中有十二頌分二初三頌天王天衆慶法興供次九頌天女歌樂讚德供養於中分四初一頌經家標能所供讚次一頌佛力令樂音說法次六正顯法詞於中一小處有多佛二小中有多剎三小處有多衆生四於前第二頌多剎中有佛為能化五於前多剎中有生為所化六神力化末後一頌經家述衆聞樂音法已默住欲聽後地後一頌上首讚衆請法第二正說分中二先明地行論分為七後佛子菩薩住此不動已下明位果前中七者一總明作集地分二入一切法本來無生下淨忍分三佛子菩薩成就此忍下得勝行分四佛子界住此第八地以大下明淨佛國土三世間自在行分五佛子菩薩成就如是身智已得命下明自在分六此菩薩如是入已下明大勝分七佛子此菩薩智地名下明釋名分就七分中初二是趣地方便謂前是遠方便總前七地作起此地集成方便故彼是近方便前地所得無生忍光明至此修熟令深淨故第三是初住地行依前淨忍發起勝修故第四是正住地初依前勝行更起淨修佛國土行第五是正住地滿由淨土行成德無礙第六是地滿行此地望前通皆是勝今復地滿足勝中之勝故云大勝第七約德顯名德通始終釋在地滿就初分中總攝七以為二相諸地通行名為同相諸地異修名為別相同中三句妙行慧者是證道謂二無我上上證故從初地來證二無我轉勝至此故云上上二方便道淨者是不住道清淨謂悲智俱遊無偏住著三善集助道法者彼方便智行攝滿足助菩提分法謂行是前證方便智是前不住彼二所攝助道之法下明別相有七一初地十大願能令心住二地中行十善等行是佛力護也三地中厭得不退禪定等者等取神通無量等名自善根力也得通達故名得力也四地中所說十種法起教化衆生前者論中名智障淨勝也念通達佛法者釋此同彼謂彼十法智此名佛法五地中十種深淨心平等名直深心六地中前大悲為首及大悲增上也觀因緣集是大悲滿足亦是舉成觀法成就福智釋此同彼七地二句初是前空中方便智有中殊勝行言不捨衆生者釋彼同此謂大悲等二以無量衆生界故入無量智道是前十種無量也何故前六各唯一句此第七地有二句耶釋云以是近方便或可但求於理語言多少不煩問答問何故於此總集前地答聖教中其例有四種一十住初總集十信如本業經說此約成位不成位分際故二初地加行總攝地前如前回向品說此據此證分際故三第八地初總集前七地功行如此義說此就功用無功用分際故四第十地初總集前九如下說此約因位成滿總攝前因分際故又初約十千劫滿二約初祇滿三約二祇滿四約三祇滿故有此說第二淨忍分中文有三初十句正明無生忍次四句明衆生忍淨後一句結忍入位論中但釋前二攝為四種一破相二破性三因泯四果離又前二破相入如後二證實捨相又約寄法初一加行次一在正體後一在後得其數差別一種通始終佛法論三性品云如經中說若人既得無生法忍則不退墮此云何成立者由三性故則得成立如來為約分別性故說本來無生忍約依他性說自性無生忍約真實性故說垢苦本性無生忍就初事無生中論攝為七初四明不增後三明不減即是無增減法界四中第一立七實對治此實以顯無生一入一切法本來無生者對治計淨分法中本有實謂計自性住性為有為事物故二無起者對治新新生實謂斗習所成性為實故三無相者治計前二性所生行相故四無成者治計後際實謂於佛果計後際出纏故無實纏可出故無成佛也五無壞者治計先際實染分中煩惱故對佛果後際說佛凡夫時實有惑本淨先壞故論經云不失失壞義不相違六無盡者治盡諸衆生實向涅槃故般若云如是滅度無量衆生入無餘涅槃界實無衆生得滅度者七無轉者治雜染實淨分中謂修法中背染向淨來實無來論經云不行行與轉義不相違第二自性無生中云無性為性者是法無我自體無性故論經云非有有性文異義同論云彼觀事故等者明理不無謂前諸地諸觀事故亦是此地所忍法故不得言無下明理不二謂非事外故名不二同上文有不二不盡第三數差別無生中云初中後際皆悉平等者謂於三時中染淨法不增減故第四作業差別無生中云無分別如如智之所入處者謂於真如中淨無淨分別佛智故如是下總結十句釋無生忍次釋四句無生忍淨者一離一切心意識分別想者一切有二種一離報心境想分別故云現行遠離等二離方便心境想分別故云攝受分別性相故想者遠離障法想非無作法想者簡無濫也彼治想於下地中有三種勝事一無所取著者謂無功用自然行故云無所取著謂於上佛果不待起貪求任運起行故二遍一切法相者顯能治廣故云猶如虗空入一切法三入真如不動自然行故者顯治深也故云入一切法如虗空性此入一切位四字論通前後句共用應知第三明得勝行分中二初明深行勝謂對別彰出二佛子此地菩薩下明發起勝謂對後障入前中二先總明深行謂此位行玄奧故下別有七相從為三初三一分明此地中境分殊絶次二一分明此地中正行廣大後二一分明此地中離障寂滅喻中有三從後向前喻此三分七中一難入深故名深行菩薩二同行深諸淨地菩薩同故謂純無漏位名為淨地與此位人同故云難可知差別如麥在麥聚中不測無差別故論經名無能分別三境界深能取可取不現前故云離一切相等言護一切障想者防護一切障法之想為簡持法想故名離執著四修行深自利利他廣大故云無量無邊五不退深謂彼二乘不能形奪壞其勝故云一切聲聞等六離障深謂離功用障故云離法喧諍七對治現前謂能治之常現在前故云寂滅現前下釋三喻喻前所說滅盡喻中示彼行寂滅故者釋顯喻意釋喻中云無彼依止故者謂滅盡定中心王不行想等心數無所依故亦不行也此亦傍顯菩薩滅定與此差別以得無功用自然行者釋勤方便三業行息滅故論經報行成有二釋一約教道故云得彼相違法二約證道故云善住阿賴耶真如法中者謂本識有二分凡時住妄染分今此住真淨分若至佛地唯住真如不云梨耶真如今此為有變易報在是故雙舉釋第二夢窹喻中示此行護彼過想有正智想者如從夢窹雖無夢想而有窹想所喻如是雖捨前地妄修過想非無此地正智之想言此行寂滅者顯此正智即用常寂故不同別顯此深行故是中依下重分別依清淨世間涅槃二心不行者此釋經中二行相行悉不現前謂夢中度河此岸喻世間彼岸喻涅槃既覺窹已此彼已名依清淨故云二行不現前釋第三生梵天喻中云如生梵世六結不行下地心一向不行得報地故者對此彰得說離勝結明喻意下重分中順行是世間心不順行是出世間心故名二分也心等者舉心等取意之與識及憶想等即是順行佛等者舉佛等取菩提涅槃等即是不順行也就不順行分中更開三門經中但就大乘論主對辨大小一言差別者非是大小不同但是大小乘中生法兩異二言大小乘中衆生生法差別非生法異名差別明此大小乘中生生行自異法法自別三言無學學行差別者就小乘中辨人差別非學無學不同但學學不同無學亦爾上開門竟佛等涅槃差別說者舉經對顯謂菩薩心是第一句等取中間二句涅槃是第四句應知何故世間行中而不開異出世行中開此差別以出世是大人所求恐有染取故委釋令離下釋顯中先釋順行後釋不順行中言大小差別是總舉下別中大小同佛菩薩是人涅槃是法小乘中涅槃是法羅漢是人二釋人法各差別小乘羅漢者如毗曇中六種不同謂退思護住勝進不動成實有九廣說如彼二明發起勝中二先明本願力住諸佛勸發後若諸佛不與下明勸利益前中二初本願住後諸佛世尊下明勸發前中本願力故者釋住地所由准論經云本願力住故謂從前地來同求此地無生忍門名為本願得己心息故名為住然住義釋有二門一顯義二說意前中明諸菩薩住與不住泛釋有四一觀入分別謂初時不住終則樂住從前地來求趣無生以未得故是以不住今既得樂之故住二起用分別謂初時樂住終則不住今此地中初得無生樂寂故住後以佛勸發起勝行所以不住三就寂分別初終常住謂佛菩薩隨所證入無暫時捨四起用分別謂諸佛菩薩一切不住常隨世間利益衆生今此文中約後二說二明說住意亦有四義一為漸悟菩薩有寂習故云本願力住二為引定性二乘明菩薩此地大寂滅處猶有觀起況彼所得豈無究竟三為顯此地甚深玄奧難捨故住四但有此深奧法流之處必有諸佛作七勸指是故無有一人墜墮後明勸發中三一總勸二作如是下別勸三佛子諸佛世尊下結勸初中法流門中者在無生忍不起功用任運起行趣於佛果如大河水不待人力流趣大海何不前地與智以得法未深故何不後地與以依此勸發修不住故何故唯與智理實通與餘行以智是行主故何故在此位與以此忍門攝德本故下文云亦莫捨此忍門依此力能成大行故何故與如來智以約果說故後別勸中二先歎所得第一是上法後然善男下明所未得勸令修習於中七勸攝為二前六舉多未作轉其住心後一明其少作能成增其去心凡勸如是前六中攝為三對自利利他初對中一明自總未成後一所成未出第二對中一化願未滿後一身得未勝第三對中一明化業未廣後一明自得法未窮初中句別有三初舉力等彰其未得二為得正勸修習論云不得修釋此句三亦莫捨等明起行所依論云若不捨此等明反釋可知依彼有力能作者順釋第二勸中云汝雖得此等明自所得然諸凡夫下明他未出於中亦三初就凡夫總勸名依彼衆生無利益事二種種煩惱下顯其過失謂在家去種種煩惱覺觀侵害恆現行故三汝當愍念等結勸第三勸中二初總後別總云汝當憶念者追憶明記本發誓願故別中顯本誓願有二種一普大等欲利益衆生是廣心願下化有情故二皆令得等令得不思議智是大心願上求佛慧論中伏願化生釋上句智行廣釋下句能轉者依前二義勸持名依名轉第四勸中三句初此諸法法性等舉所得理法爾常事不令將為奇生於樂著二諸佛不以等明上未得於佛謂佛具大用非唯寂滅三一切二乘等者明下同二乘謂定性住寂捨離益生此為抑挫之言論云不共義者釋第二句功行疲者釋第三句有此二過名為彼垢依此勸轉名依名轉第五勸中二初云汝觀等者舉佛六種化業後汝今宜應下結勸起修論中牒舉經文彼佛法成就有力者彼身等佛法修成之時明此有能化衆生力言示現依利益衆生者辨定其行謂其六法皆依利他而說次此利益衆生事下廣釋六種皆為化生於中攝伏者謂善者以光攝之惡者以輪伏之謂三輪也二如來作無量下釋結勸起修之文第六勸中亦三初云汝今適得等明所得勸之令起論中三種謂入作轉入是所入法門作是法門業用轉是業用不斷餘准知第七勸中明少所作在增其心於中三初舉三種無量次悉應下勸通達論云少作去望佛果不遠故云少在隨所見等釋三無量也少觀即成釋如實通達以此增其者心故云轉也後佛子諸佛世尊下結勸自下第二明勸利益中二先對上本願住彰不勸之損論釋即入涅槃者又云與如是等無量無邊起智門等者此釋經意謂舉此滅為顯佛與智故二以諸佛下對上佛勸彰勸之益於中有法喻合法中亦三初明佛與智者論釋彼行中攝功德因緣者明與智所依謂彼發起行之無生法忍攝功德同最勝故佛與智也同作教授說者正解與智諸佛共勸名同教授二於一念下明由勸故起行速疾三何以故下問答辨釋謂向前二大阿僧祇所修比此一念所起之行不及者何下釋中先以一身等明知不及今此無量者辨過前問前初地百身二地千身何故言一答實報唯一變化百等故非實也於中十一句初無量身者一切菩薩信解如自身故者勝解力故以身身合同一切菩薩身故是故一切所修是自修也此是同體智力又釋以勝解力令自身無量如一切菩薩所量分齊等此豈非是變化耶釋以此菩薩既不出觀即攝法界而起身雲實德非化此是文意音聲等類身應知言此十句一依化衆生者十中初六利他二依助道者次二句自利行三依障淨者明後二句德用淨應知十句有此三義下別顯之隨身住者是無量身謂隨住法當現彼身如觀世音住大悲身等二隨說者是無量聲謂隨所說法音聲亦多三隨依起多隨所知故四隨所取生者多生形類異此是種類俱生無行作意生身也五隨何國土者多得國六得教化衆生多化衆生次釋二句明德用淨一神通障淨二無量大會明正覺障淨以於大會知根說法等故言此一切處隨順無量身口意業等此釋結文無間不斷釋不動義二釋喻中中船行疾應知因緣勝者顯疾所因以無生忍是行勝因令行疾三善集下釋合文善集等是前七地中所修行助發於此故曰資糧餘文可知第四淨佛國土分中有三自在行一器世間自在行二佛子此菩薩隨諸下明衆生世間自在行三佛子此菩薩遠雖下明智正覺世間自在行初是化處二是所化三是能化具後二淨方淨土於此三種知化無礙故名自在就初中二先總標舉後所謂下別顯前中云大方便善巧智者是此地無功用智因也所起等者此地智也觀者智用也等一切等者即器等是佛所行境故後別顯中論分為五第一所謂觀世間成等是隨心所欲彼能現及不現此有二義一於此世界隨自己心欲知即知二隨衆生心欲知即知此是智自在也彼能現及不現者是通自在此亦二義一能現是成不現是壞二能現是能壞不現反上由此業下明隨何欲彼能現謂隨何業成及壞即知能現同前業集故成業盡故壞智能彼知故云業集盡智三幾時成等下明隨時欲彼即時現故謂隨世間幾成壞成住壞住即能隨現及知智能隨知故云皆如實知論釋名隨世間成壞智四又前地界下明隨廣狹欲彼能現故者於中二先明外四大差相後隨何下通顯內外前中後二先粗後知微下明細前中四相初三名境界相後一名起相前中一小相者非定地故謂欲界所知境狹故二大相者定地故謂上二界所知境廣故三無量相者謂佛所知境無限量故上三俱約所緣分齊同名境界知彼之智名境界智後一差別相者謂自相同相互望別故自相者謂四大色是變礙為相故同相者諸有為法同一無常故空相故同亦名共知此相之智名為相智後明細中細是小相差別同前餘二相略而不說並准前知後通內外中三初總標二隨何下別辨三知衆生身下逐難重釋初中云隨何者通相之言不定方所故於中二種塵聚者塵集成事物故差別者不集別住故二別辨中三一顯知差別塵聚塵二顯內大塵三顯前內外所依世界塵三逐難重釋者謂前略標衆生身言今此廣顯故於中二先顯大小身塵後辨六趣塵數此中大身小身者論經名粗身細身此是三界差別論云身粗細者色粗無色細色中欲界粗色界細故云如是次第准此文大乘宗無色界中亦有微塵此乃定自在生色以知六道身微塵成者以假想慧分折所成顯塵無實性故第五又知欲界下明隨心幾許欲於中三一知三界成壞二知欲界下知大小等相三佛子此菩薩後起下知衆生隨之現化初知成壞者如俱舍世品中說可知後二論釋云欲界等境界智相智者亦開二門舉欲界等取上二界於此三界知事分齊境界智知法分齊名相智知三界小相等者謂欲界人境界名小相天境界名大相色界初禪有覺有觀中間禪唯覺無觀名小相二禪已上無覺無觀名大相言無色界佛法中等者為簡外道彼將無想天報為得涅槃故云佛法中凡夫境小相聲聞菩薩大相一切三界是佛所知境寬廣故云無量相差別相結准前復可知三知衆生隨之現化中三初衆生二隨其所應下隨知現化三此菩薩下起化自在論釋初中先牒文善知身不同總釋所知衆生方便等者釋現化巧同彼生也異生同生差別應知者是所現同類身也諸佛國土下彼處處去身體示現者釋起化自在身遍三千界等法喻合可知第二明衆生自在行中三一總明自二所謂下別顯自在三佛子如是下總結自在論云彼調伏自在者是總釋其相以此菩薩調衆生中得自在故能作種種方便言彼行化衆生者此釋經中隨衆生信解於大會現皆往示現名行化生言身自同事釋別文同化同物身謂菩薩自身隨衆生心以自己身同形事故云身心自同事也言身心等示現者此釋經中化物應以菩薩隨身隨衆生心稱機而現名為等分如云等分煩惱稱境起故此中稱所化現於世出形類且略顯一十九種若盡菩薩化力分齊其類無邊故下文云此菩薩能放光明照百萬佛剎微塵數世界令諸衆生滅煩惱火而得清涼故第三明智正覺世間自在行中有二初明第一義諦智後佛子此菩薩下明世諦智前中遠離一切身想分別者於身取相之分別悉遠離故住於平等者顯得身平等於自他身不見二故謂己身為自十身為他照同一性故不分別何故說此欲顯法身相作所由故此不同二乘第一義諦智以二乘第一義諦智不知無差別身即差別身差別身即無差別身勝義世俗不一異故菩薩久修此觀觀得成就三昧通明總持不思解脫能以諸身相作無礙後明世諦智中三一列所知十身二此菩薩知下明法身相作三此菩薩知衆生業下廣顯十身義初中十身內初三是染分次六是淨分後一是不二分皆言分者同一法界中分別為十故論重分別中染分三身內云彼二生因業煩惱者是第三業報身顯前二身生起之時因煩惱業故名為報言是染分者結其三身也次明淨分中云三乘淨者聲聞乃至如來四身也此三乘隨何智者舉智身隨何法者舉法身是彼能知及所知法彼顯示者結上六種是淨分虗空非前二相故名不二分二諸身相作中以十身及此地菩薩自身轉次互作計十一身有十一翻合起一百十一身今文家略示四翻餘可思准四翻謂一以十中初身為首作自身及作餘九二以國土為首作自及餘九三以業報身為首作身身及作餘九四越第十虗空身以自身為首作衆生身及作餘九其相作義廣如懸談第九門顯義中說論云以衆生身作自身者彼自在中所作攝取行故種種示現者謂起正覺中作攝他行法身相作名種種示現皆隨物心現也三廣顯十身義中初釋衆生身內五句一業二生三煩惱此三亦名雜染四色五無色界差別二國土身有十相論云千等者千是小千等是等中大二界即初三相謂小相大相無量如次應知淨不淨差別者釋染淨相廣等釋餘指同初地然有異前須此會釋謂云普入者入是趣入意彰入剎由路普是都言欲顯諸剎趣入方網者十方諸剎如因陀羅網故次四身假名差別者論云自相差別假名分別無我人故謂諸身各各當體名自相而假名義齊名同相若就人說假佛身之處何不說耶以佛勝德超餘人故七如來身自有十身一菩提身示成正覺故二願身者願生兜率故三化身者所有佛應化故四力持者自身舍利住持故五相好莊嚴身者所有實報身故六威勢身者所有光明攝伏衆生故七意生身者所有同不同世間出世間心得自在解脫故謂隨意現生示同世間故名同理實出世故名不同次釋所由云以於出世自在解脫故能現同以於世間自在解脫能示不同八福德身者所有不共能作廣大利益因故謂福超凡小名不共因此大福廣現無量身財等相廣攝衆生九法身者所有如來無漏果故謂諸佛斷德名無漏界即十佛中涅槃佛又是如來內證法身名無漏界十智身者謂佛所有無障礙智故此智能作一切事彼事差別皆悉能知謂能作一切釋無障礙義彼事下結能知八智身者論經有八釋初二句三慧分別一思量者聞思慧二善如實觀相是修慧三果行所攝者因果分別所得名彼因名行四世出世者就位分別道前名世見道已上名出世五三乘者大小分別六共不共者粗細分別粗則因修細則唯大七乘不乘者種性分別已習三乘種性名乘未習非乘八學無學者約修分別習求名學果極無學第九法身者有五句一平等相者無量法門明等一法身故謂佛無量法明同一法身故云平等此是理法二不壞相者如聞取故此是教法中實教稱理而聞故云如聞三隨時隨俗假名差別相者謂隨所化根性相應時說差別故隨彼世俗言音所宜差別說故四衆生非衆生者謂有根性堪可授法名衆生不堪授法同於木石名非衆生五知三寶者名知第一相謂三寶殊勝故十虗空身有六句一無量相者廣大無限故二周遍相者周匝遍滿色法故三無形相者不可見故四無相者一切處同故五無邊相者無初際後際故六顯現色身相者能通容受相因色彼分別謂因於色顯空成此處彼處等差別故第五自在分中二先牒前亦是顯得此自在所因後得命下正明自在於中十自在義六門分別一釋名二辨體三對治四行相五顯因六問答初中二先總後別總名十自在者謂於命等十種隨應轉變之力在自不在於他此即在之自故是依主釋都云十自在帶數釋也後別中一命者謂隨悲願力住壽分位非隨業轉故又能令壽隨所欲樂爾許時住故二心者證智定故又隨所樂於諸三昧入出無礙故三財者資用無限故又令淨土莊嚴及變化財寶隨應現故四業者造淨因故五生者隨益物處受報故六願者隨所希求必稱遂故七解者於所緣境得決定故又隨自勝解轉大地等為金銀等故八如意者隨心現通故現神攝化有情皆遂故九智者隨應成正覺故又於法義訓釋言詞無滯辨說圓滿究竟故十法者隨宜宣教無障㝵故又以無量種名句文身建立素怛纜等無上教法隨其所應故上十種名有其通別若直云命以等即為別名自在之目是其通稱十中唯如意一名是有財釋謂如所意樂故所餘之名皆一字故非六釋攝若依通稱皆依主釋謂命之自在乃至法之自在故依攝大乘兩家釋論竝云忍為勝解因精進為願因即合解是第六願是第七今此第八地中經本乃願在第六解在第七此回文者誤也又第九第十唯此第八地云第九是智第十是法離世間品及十地論等皆云第九是法第十是智其因既同是般若於義者無違也又解是勝解廣略可知十地論名信解者亦勝解也以勝解是信深忍故又此第八自在名如意餘處皆神力世親釋云神力者五通所攝准無違餘門分別具如別章第六明大勝分中二初牒前亦是顯得大勝所因後則為下正顯於中三一智大二此菩薩如是下明業大三佛子菩薩住此下明彼所住功德大初中四句初句總謂於生死涅槃俱不住故寂用難測名不思議後別中三一修盡至不思議證理甚深二所知不思議照境廣大三除障不思議破取相極二業大中二先牒前後畢竟下十二句正顯業大於中初三句明三業淨是業大體下九句約修辨業攝為四一起能起起同時者謂前三業是所起智慧起彼是能起彼業起竟共慧相隨名曰同時故名身業隋智行二般若下智攝不染作利衆生行等者明智悲一對故云般若增上大悲首等三善起願下因攝自行他行因等者此能感所感為一對謂自起大願名自行此自行與他佛行能加為因故名他行因等故云善起願善為佛護四常勸下作業所持者謂三業行成不壞名持於中三句初二利他成就一說法益生二普住下淨土神通化後一自行增三明彼二所住功德大中十三句於中前十句正釋後此菩薩下三句結成前中論攝為七初四為一是住德體故名善住道功德後六各一是約修辨德前中四句初二自行一淨心離障二深心攝善不離道故名對治堅後二利他慈悲不捨救也後約修辨德中一不忘德是意業總持德二成就語業說德三定以自在是身業德依定發通故四依願力起行五修行成就者明行力集法六與智者行成證入佛境名佛與智此後六及前一合七也後三句結定者初智力者牒前智大無增愛不分別衆生有惱無惱故能現下牒前作業大謂平等作業故無過咎者是前彼二所住功德大以得前七種功德故法行事中無過矢也第七釋名分中二先顯地釋名約法明位後佛子菩薩成就下辨智者釋名約人彰得前中十句論攝為六謂第三第八各為一餘八兩兩為一故有六也一初二句明染對治一下地功用行小乘願諸魔業故名不動二謂煩惱習行故名不轉二次一句明能得難得甚深無生故名難得三次二句明發行清淨一友淨謂如童子無染欲之過純無漏慧世莫能測故論經云王子者如王子生在王家尊貴無有譏嫌卑門之過菩薩亦爾得在此地一切所作無功用失二行得者住生地所欲事自在成就故四次二句明世間出世間有作淨勝謂教道修起名有作有作名成福德名世間慧名出世出世之慧善決擇智障淨故名究竟五次有一句明彼二無作淨勝謂證道真理非修行作梵云無與變化相似故二譯致異由願非滯寂故云變化六以二句明菩薩地勝謂位分過前故一力持者願力任持故論經名加地者願力所持如他力加故由先願護持故他不能動由先善起導行今得無功用也此勝六地者發起殊勝行故此顯過前也他事念動故彰前劣也此即六地觀空以有為他動其空觀今則不爾故過前也二先修善名無功用地者明勝七地有功用顯前劣此此地善起等彰此勝彼餘文可知後明智者釋名中二先總牒前所成能起前後後入佛下正顯前中謂何故此菩薩得名不動有二義故一一向不動謂行修上順故二一體不動謂與諸菩薩行同體故後正顯中二先廣釋二種不動後於無量下總結前中二先明一向不動後佛子菩薩如是入下顯一體不動前中十四句先四句釋明一向義後十句明不動義前中初云入佛境界者論經名入佛性由梵云馱都此云界亦云性故二處譯異然義無別言此菩薩智契佛所證境界故滿足勝者近同佛果故隨順因者標後三句隨順佛因也二佛功德照者名攝功德善清淨義故明觀解攝德三順佛威儀者名為正行故依解起修四佛境現前者近佛境故佛即是境非佛之境後十句釋不動者初一是總常為等者上果下加故餘九是別論攝為五謂前四各一後五為一前中一釋梵等者是供養功德明感天供養二金剛等守護功德先來密護從此現形護三恆不等依止功德謂依定成德四能現等國土清淨功德謂前淨土分中現身差別也次五句五一者是化衆生功德於中一於一一等是願取諸有中生此身業化益二報德等是報心便智智力能知衆生諸根欲煩惱等此意業化也三三昧自在者是無量法力轉法輪故此語業化依定證法以此法力能轉法輪故云語業四能受無量記者是受力謂堪能領受多佛記故此句論經有今此脫勘梵本五隨有等者是護力謂示現成佛說法度人後明一體不動中十句初一句總餘九別別依總開出總中云入大乘會者謂此菩薩得預此無功用位菩薩大會衆數言入大乘衆數者是不破義後別中九句一獲大神通者是智不壞以內證法實故二數大等者是說不壞以依證起說故三入無礙等者解脫不壞以無礙法界業用自在四知世界等者佛國土清淨不壞以於諸佛大自在無礙故曰善知五示現等者入大乘不壞意業入法能示現六隨意等者神通不壞是身業七善能等者能解釋義不壞是語業八普伏等者坐道場不壞謂降魔怨九深入等者正覺不壞心能現佛說法後總云心修行得不退轉無礙不斷絶故名不動地菩薩第二明位果中三果同前就調柔法說中云受世界差別等者等取衆生及智正覺二世故以依此三能無量淨土作用名為法明故說所受為彼因相喻中依人顯勝謂得清淨地身心勝故即純淨無漏也善根光明更明淨示現者釋教智淨攝報果中云能與聲聞辟支佛諸菩薩波羅蜜道者梵本中無諸字道字餘准可知第三大段重頌分中二十二頌分九初一頌半頌前方便作業地分二有一頌半頌淨忍分三有七頌頌勝行分於中初二頌頌勝行後五頌頌發起即七勸等於中初一頌第三句梵本云語言我等佛法力智廣謂佛法廣大力廣大智廣大四有六頌頌淨佛國土分於中初二頌頌器世間次二頌頌衆生世間後二頌頌智正覺世間五有半頌頌自在分六有一頌頌大勝分七有一頌頌釋名分八有二頌半頌位果分九末後一頌結說分齊釋不動地竟第九善慧地中二先義料簡後正釋文前中二門一釋名二來意前中亦二先得名後釋名前中七釋一攝大乘云由得最勝無量智故名善慧地世親釋云由無㝵解智說名為慧此慧妙善故名善慧無性釋云謂得最勝四無礙解無㝵解智於諸智中最為殊勝智即是慧故名善慧二莊嚴論云於九地中四無礙慧最為殊勝於一剎那三千世界所有人天異類異音異義異問此菩薩能以一音普答衆問遍翻衆疑由此說言名為善慧三金光明云說法自在無患纍故增長智慧自在無礙故名善慧四解深蜜云於一切種說法自在獲得無罪廣大智慧故名善慧五瑜伽住品云由此地中一切有情利益安樂清淨建得菩薩無㝵解慧由此善能宣說正法是故此地名善慧地六十住論云其慧轉明調柔增上名善慧地七成唯識云成就微妙四無礙解能遍十方善說法故名為善慧第二來意中三一前地雖得無相中無功用行而未能以四無礙解隨機說法今此進修令彼證法二為知衆生三性等諸法行隨其化故三為知衆生心業等諸稠林隨應化故略說如是若廣說者乃至為無量因緣故諸門分別具如別章後依文釋中三分同前地初讚請分中有十三頌分四一初二頌顯前地益二有二頌明菩薩天王供養三有八頌半辨天女供讚於中初二頌述天女喜樂音讚佛次有三頌歎說法菩薩於中初頌云寂靜等者後半頌梵本云利益十方得自在心如行空演佛行次有三頌歎說法菩薩應機巧說後有半頌結諸天女美讚佛四末後有半頌顯上首請說第二正說分中二先明地行論分為四成就後佛子菩薩住此第九地下明位果前中四者一法師方便成就二佛子菩薩摩訶薩住此善慧地如實知下明智成就三此菩薩以如是智慧如實知衆生心下明入行成就四住此地已了知衆生諸行差別下明說成就初成就名者此地能起辨才說法師地趣地行立名方便成就文中二先牒前起後後欲更下正顯前中謂無量智者是前八地深廣之智後正顯方便中依他利自利一一五三句示現者初一句利他次一句自利故云一一也次五句亦利他後三句亦自利故云五三示現也初云求轉勝寂滅解脫者依無色得解脫根可化衆生作利益故化彼令得真涅槃故二復修等者依未得究竟佛智自利益故下五句亦明利他三入如來等者化根熟菩薩令入深蜜四觀察等者化耶念修行可化衆生令得正念之行五淨諸等者化未知衆生轉法輪令得謂總持定智皆是說法所依故大具廣等者以大神通化耶歸依衆生令入正法七入差別等者以通達世界八修力無畏等者欲得佛內證正覺大智等故九隨諸等者欲得外化攝生法輪大智十不捨等者欲得佛無住涅槃不捨悲願後入結可知第二智成就者知法智成故文中二先總標後有漏下展轉別聞前中總知三性淨染不二後轉別開中有三重一就前淨中開漏無漏謂見道前善名有漏見道已上善名無漏或我我所心修善行名有漏為此相違名無漏就無漏中復開世出世謂依修阿含行名世間正證真行名出世間或加行所修行名世間正體智證真行名出世間後得智所修行法名世出世間又若行法是可破壞墮虗妄中名為世間與此相違名出世間二復就彼淨中開思不思謂地前可思地上不可思就可思中間定不定若大乘權教十回向已名定已下名不定若依實教十住已去名定已下名不定故仁王受持品云習忍已前行十善菩薩有退有進譬如輕毛隨風東西乃至云是不定人三復就淨中開出三乘謂四諦緣生六度等法行故云彼復於三乘中也就三乘中開為無為謂能證修起名有為所證真理名無為又若約教分別大乘權教依事觀修行名有為法行依理觀修行名無為法行若大乘實教依即理之事觀修行名有為法行依即事之理觀修行名無為法行若雙觀為無為非即離性而修行名有為無為非一異法行言依順行者謂依三乘法各隨順行故第三入行成就者知所化器故文中三初略標十一章門二此菩薩如實知下依章廣釋三佛子菩薩隨順下總結安住就初標章中論釋有三初略解二別釋三結釋名義初中一依共者是心稠林以是染淨所依故名為共煩惱業是次二也生是第九以與煩惱業是三雜染次第故向前列也次言共者是根解性欲此四根似故名為共共同故次云染者是隨眠雜染種子次云煩惱染淨等者是習氣此即是前種子殘餘氣分未斷絶故謂之根續次云依定不定等者舉三聚稠林也二別釋相似義言根次第者明依根起解等故言次第何故依起以相似故云何相似謂宿習為根依根生解解必似根論經名信者信之深忍是勝解故又即由深忍方起樂欲即由樂欲數習成性由後後得起必依前前故實相以信等後解欲性三故後起必依於前名定能依所依名字時分別故名為不定故云依定不定時三結釋名義中衆多釋林誰知釋調者應作四句此是亦多亦難知句也行是不正信義者遠云法理證信能滅心根心根滅故一切不行由無證信心等集起故名為行問此行一字貫通十一章如遠所云則此菩薩但能了地前菩薩及凡小等心等諸法不能了知地上菩薩心等諸法所以者何由彼地前無證信故又心集起既釋行義根等既不名集起應非是行又心章中清淨相論云自性不染故幻所作相是因相諸菩薩願力生故知此二不是地上證信菩薩心耶今助一釋謂此所有心等諸法相是有為性即無為由未究竟契會為無為非一異故是不正信名之為行若反此者一切契會是離不正信不名行也第二依章別釋中即為十一段初知心稠林中三初一句總標二所謂下別釋三如是下總結標中云種種者略顯則十種廣辨則有百千萬億故是中一一皆云相者行相義也別中論經有九攝之為八令有十句可攝為九謂前八各一後二為一遠云八中前四忘心後四真心者此判未定所以者何謂三中不壞非唯妄故四無形覺論云第一義相故又論云以自性清淨心故第六第七染不染故心練故此二句煩惱染示現第八句隨道故生染示現釋曰詳論所解真妄明矣就九中初云雜起者雜相故謂八識緣境各異名雜雜即差別並頭生名起故云心意識六種差別謂心及意并六識故釋心意識異同如常可知二速轉是行相者謂四相遷流是行剎那生滅一滅已是遷速況一剎那復有九百生滅此速轉極也三壞不壞者前句顯行心速轉故名壞此句顯行心正為生等相轉時能轉所轉俱不可得故名不壞此句論經元脫全本與晉並有故前科十句論攝為九此與古說不同是也四無形質是第一義相者觀彼心離心心身不可得故五無邊是自相者順行無量境界取故謂心隨境界無限而取此唯心之所能故云自也六清淨是自性不染者謂本性清淨故七垢無垢是同煩惱不同煩惱者在纏而不染故八縛不縛是同使不同使者謂心與貪相應同緣愛境境縛心故名為同使與此相違名不同使餘使餘縛准此應知下二句合為第九句言幻所作隨諸趣生同是因相者謂菩薩以悲願受生餘衆生隨身業生此二受生心俱是感當報之因故然菩薩不自為己求於生處但有利樂衆生處願生其中生既不定方所隨緣而現故云幻所作也餘衆生生皆隨自業業不離繫故云隨諸趣生第二知煩惱行稠林中文三同前別釋中九句論攝為三謂初二各一後七為一故初一久遠隨行者謂遠入乃至有頂故小宗中說惑最後邊是有頂地故依大乘宗至金剛心但緣界說非根地惑為最後邊大小通說理亦無違二無邊引起者修諸善根時煩惱隨行難知故謂惑因修善起此惑細難知也自下七句分三初三明煩惱深次二約生顯煩惱後二約業明煩惱妄根初三中一俱生不捨者是隨所縛故謂所緣縛心不得自在由貪等俱不相捨故二眠起一義者是以何縛故謂隨眠與現起種現各別惑性是一故此中現行是使以有使故不得解脫言煩惱使一義者舉經會釋謂此辨煩惱何故說使以是一義故若一義者何故下文復明使行使但有繫縛義及隨逐義此依前義下約後義故不相違三與心相應不相應者是所縛事謂若心與惑不相應者可得解脫不爾縛次二句約生明煩惱一隨趣受生而住二三界差別者論合釋云謂身是生道界因故上句道生下句生界後二句約業顯煩惱妄根一愛見癡慢如箭深入過患者於三分中業因障解脫故謂愛是欲求癡是有求見是耶梵行求俱障解脫其過如箭入木深難出彼入惡道亦爾二三業因緣不絶者隨順世間身口意業故不斷起因故謂憍慢愚癡造重罪業而煩惱是三業造罪因故云是不斷起因也後總結中云八萬四千者依賢劫經世尊一代施化總有三百五十度功德始從先輝光極度終至分布舍利度一一各以六度為用則為二千一百以此對治四大六衰十種惱患即成二萬一千四大是內報六衰是外塵衰損善法故以此二萬一千各化四種衆生一多貪二多瞋三多癡四等分總成八萬四千諸度法門能障之惑即是八萬四千煩惱下業等諸門亦爾並准知之第三知業稠林中文三同前就別顯中十句初善等者道因差別故謂通說三性為六趣因故云差別引業唯善惡滿業通三性名言熏習中表義唯無記顯境三性故又准俱舍十七以三性因對五種果分別說有無記業故彼頌云善等於善等初有四二三中有二三四後二三三果五果謂異熟等流士用增上離繫也論曰最後所說皆如次言顯隨所應遍前門義且善不善無記一一為因如其次弟對善不善無記三法辨有果數後例應知乃至釋第四句云後無記業以善法為二果諸士用及增上以不善為三果除異熟及離繫等流云何謂有身見邊執見品諸無記業以諸不善為等流故以無記為三果除異熟及離繫二有表示等者自性差別故此有二種一籌量時二作業時籌量在意地有審慮決定二思作業在身語各唯動發思此中意顯三業業體皆思為性故云自性別也又若通說三乘則唯身語若唯菩薩則通在意地表業如此又小宗身語二表即色處聲處以為其性身語色聲即二業體意相應思為意業體大乘不爾色聲二處是身語表而非二業以身語二業思為性故成唯識云動身之思名為身業發語之思名為語業以身語色聲是無記故若廣分別如餘處章三與心同生等者方便差別故謂心共生熏心不別生果故明此業思與意識共生隨其善惡生已即熏本識成種種似能熏故云不別生果此釋不離義也四因自性剎那壞而次第集果不失者盡集果差別故謂無始時業自然念念滅壞而集果不失故云有為作業者釋自然滅壞謂有為法必無常故因盡集者顯功能不已釋集果次第此念念滅因全能引果也五有報等者已受果未受差別故謂過去報業現在已受名為有報過去後報果現在未受名為無報非謂全無約已未說故六受黑黑等衆報等者對差別故謂黑業對白業白業對黑業不黑不白業對二業二業對不黑不白業此中重言黑白者各因果二故言對二業者前單黑白業故雜集第八云有四種業差別一黑黑異熟業謂不善等由染污故不可愛異熟故二白白異熟業者謂三界善業不染污故可愛異熟故二黑白黑白異熟業謂欲界繫雜業善不善雜故如何一業亦善不善此約意樂及方便故總說一業非據一剎那業即善不善謂或有業意樂黑方便白謂如有一為誑他故先現其相令他信已行於慧施方便黑意樂白者謂如有一欲令于門徒等遠危處安由憐愍故現發種種身語粗惡遂於此時發生雜染四非黑非白無異熟業者謂無漏業故又俱舍第十六云諸不善業一向名黑染污性故異熟亦黑不可意故色界善業一向白不雜惡故異熟亦白是可意故契經中說有處亦說欲界善業名為黑白惡所雜故異熟亦黑白愛非愛果雜故此黑白名依相續立非據自性以無一業及一異熟是黑亦白互相違故七如田無量者因緣差別故謂隨多因緣皆能起業故八凡聖差別者未集已集差別故謂出世業未集世間業已集故九現受生受後受者定不定報差別故謂現作現受名現報業現作次來生受名生報業現作至第二生已後受名後報業於三種時定不定故十乘非乘定不定故乘者三種乘定不定故非乘者世間定不定故謂有退不退故於非乘者於世間中易度難度為定不定故論經於乘非乘各有定不定樂下結八萬等可知第四知根稠林中二先別說後略說下總結前中十句論主攝為九謂五六兩句合為一句故一耎中勝者說器差別故謂說法時授法之器也耎下也勝上也非二中也亦名鈍中利速受名利遲受名鈍非二名中也二先後際等者根轉差別故前後根者釋先後際根也前根下增平故者釋別異不別異謂前是能生後是所生所生若增前根則下所生若下前根則增根以則平三上中下者三性差別謂三乘性上者菩薩乘中者獨覺乘下者聲聞乘四煩惱等者煩惱染差別故謂喜樂等五受根隨煩惱習使染故云俱生不相離故俱舍第三云於雜染中樂等五受有增上用所以者何由契經說於樂受貪隨增於苦受嗔隨增於不苦不樂受無明隨增故釋曰增上用是根義五乘非乘者定不定相淳調柔相者定不定差別故於三乘中於世間中者釋乘非乘也定不定熟不熟故者總釋也謂大乘中熟者定不熟者不定小乘中熟中不定轉向大故於三乘中各定者各於自乘中解脫故云一一乘等也報定者捨者於世間中定不可化令入道故捨者暫捨也謂依三乘各在自乘未發增進時說故六隨根網輕轉懷者有三種順行一依身順行遞共相轉六入展轉故此釋隨根轉也二生滅順行輕壞故此釋易壞也三觀行取相故者此釋深取相相七增上等者聲聞淨差別行增上障滅能成義故望凡為行增此釋初句次斷障行成釋不可壞八退不退差別者菩薩淨差別地前轉地上不轉又前七名轉八地已上名不轉九遠隨等者示一切根攝差別故謂始行方便報熟根差別也即根與行俱名為共生以行有始終根亦隨爾後結可知第五知解稠林解謂勝解於所緣境使即持故第六知性稠林性謂積習成性故第七知樂欲稠林於所樂境起希望故此中三章皆各略顯耎中上一句即云略說等結者論云如是性入故此釋不廣說所由以根等四法性相順入故唯廣說根餘皆略者以其相似無別義故也第八智隨眠稠林中二先總標後所謂下別顯前中晉本及論經皆名為使彼依現行此約種子故然按文意通取為勝使者從喻為名如使逐賊得便繫縛煩惱亦爾隨逐衆生得便繫縛故隨眠者謂二障種子隨逐行者眠伏不起故信等善種不名隨眠故瑜伽第二云若信等善巧品所攝種子不名粗重亦非隨眠何以故此法生時所依自體有所堪能非不堪能故後別顯中十二句論攝為二謂前六句名何處隨逐後六句名以何隨逐前中初二句論經合為一言與深心等者報非報心故此約心明所隨處謂報生心名深以久遠來有故修行心新有不名深也今云此使常修行心相違起故故云心不離現事故二相應等者欲色無色上中下差別故謂約界明所隨處欲界下色界中無色界上言不離相者唯與異界心相應故不相應者不與異界心相應故又當界起心名相應異界相望名不相應使仍不爾一切相應故云不離相也三久遠隨行者隨順乃至有頂故此約位明所隨處謂非想地惑窮盡處已來故四無始不拔者無邊世界唯智怖畏如怨賊未曾有聞思修智是故不滅謂此使與三慧為留難知常怖畏恆隨繫縛惱衆生故五與一切禪乃至相違等者世間禪定等不能滅心隨順行故此約行明所隨處謂由此使故令禪解脫等不得出世禪等名義如五地中釋後明以何隨逐六句中一三界等者有不斷隨逐以有不斷相似使作轉故謂以有使故能令三有相似相續故云三界繫此約前處以明隨逐二令無邊心等者遠時隨逐故謂無始來心雖無邊然念念相續未曾間斷為使逐故所作共集相續既起亦無間也三開諸處門者諸處即內六處論經名入與此同也一身生隨逐者使遍一身根識境故眼等諸入門六種生集識同生隨逐者依根生識所集與使同生故及阿賴耶熏故隨遂者依識緣塵熏本識成種時亦隨逐故四堅實難謂者不實隨逐對治實義故謂不得其實以為對治也五地處成就等者微細隨逐於九地中六入處煩惱身隨逐故謂遍三界九地一切處隨逐難除無想非想處不成就此使行相微細難可知故六唯以聖道出者離苦隨逐出世間行餘行不能離故謂此使最極微細唯無分別智起對治出離非六行等也第九知受生稠林中二初總標後所謂下別顯總中云種種者受種種身形類異故別中八句從前總中開出故亦即顯前受種種生之所因一隨業者由業種種身種種故二六趣等者住處故謂六道也三有色等者色想上下種種故謂約界上下有色無色也四有想等者想無想上下故五業為田乃至後有身等者同外色因種種故謂類同草木依地等生故云業為因等六名色等者自相種種故謂名色共色生是報自體故云名色共等七癡愛等者本順生因種種故謂順本生因從癡愛生還順彼故云癡愛八欲愛等此下兩句合是一義集苦諦種種故謂現在能集未來之苦三求衆生集苦不同名種種言欲受者樂貪共取受受求故此是欲求衆生以貪及取處處追取故欲生者後有樂有衆生愛自身他身心著相往來上下界取著故此是有求衆生愛自他身者自界他界也由心著相上下往來也無始樂著相等是耶梵行求衆生謂大無量是通顯貪求欲色無色界此中實無出離妄謂有出無想相出有輪者彼將無根是涅槃云三有輪轉而實而諦展轉不離也第十知習氣稠林中文二同前此中習氣者非種子非無堪任但是慣習故名爾別顯中十句一行不行差別者與果現在非現在差別故謂過去慣習如恆河女惡口習舍利弗蛇習故聞佛訶責食不平等所食吐出大迦葉聞乾闥婆王鼓琉璃琴起舞習等此中云行不行者謂雖有宿習有現起不現起者故二隨趣熏習者道熏差別故謂隨六道中後受生趣有受前趣中習如人曾生地獄受苦見同受罪者雖不憶識然見之不喜或怖畏若見曾同人天中受樂者歡喜樂見愛淨習不淨習臥樂仰覆等習乃至廣說應知三隨衆生行者親近衆生重故如人狎習善人則善狎惡則惡唯上智下愚其性不易其中庸者畜亦有之如說戰象近寺安之即不復肯戰近屠安之戰鬪如故四隨業煩惱者功業煩惱重故謂內心放逸或由富貴自恐好行淫欲飲酒等言成就慣習如涅槃云如人好眠眠則滋多貪淫嗜酒亦復如是五善不善等者三性業重故謂凡所營業不出三性營善業者通漏無漏不善業及無記者一向有漏此三性業人乃至夢中亦營習其業六隨入後有者中陰重故謂在中陰時有前本有習如人樂修梵行至中陰中亦無欲染故七次第重者與果次第重故謂隨一慣習於諸趣中次第受身皆有彼習故八不斷煩惱等者離世間禪因重差別遠入重不斷煩惱煩惱掌故差別下釋上句謂由禪中不斷煩惱煩惱掌故生於上界猶有彼習故云遠入也九實非實等者同法異外道行解脫重者謂以諸外道不同佛法故名為異彼取無想以為解脫於此邪正各有習氣故云有實不實實是小乘不實是外道十見聞等者乘重差別故謂大小相對三乘人法隨有見聞親近皆有重習故第十一三聚稠林中文二同前別中五一約種性以分三聚謂無涅槃法者是邪定有涅槃法者是正定正定中三乘各別一向各自定離此二種是不定性論約位言非定五性不會意者妄紛淨爾二約解惑以分三聚謂正見是善行因三善根中正見一種定起善業名為正定無貪無瞋不定起善名為不定邪見是惡行因謂煩惱中邪見一種定起惡業名為邪定餘名不定三約行業以分三聚謂五逆中一一逆罪定招惡道名為邪定梵本中名五無間邪定相者此但因果名義不相違信等五根定感善趣名為正定與上相違名為不定四約邪正二位以分三聚謂翻八正名為八邪因此以立外道邪位名為邪定正性離生名為正位因此以立聲聞正位名為正定五直約大乘菩薩得失以分三聚言染著邪法邪定者論經妬吝惡行不轉邪定相謂捨可化機名妬不善施財名為壞波羅蜜相違者此中六蔽障六度行故名相違謂妬障後三慧定進吝障施行惡行障於戒忍二行由此障故令諸菩薩正行不成說為邪定正定不定准即可知第三總結上三種成就結善安住地可知第四明說成就中二先總標後佛子此菩薩善能下別顯前中知衆生諸行者牒前入行知法器令得解脫者明稱根說法故後別顯中四一智成就二佛子菩薩住此善惡地作大下亦智成就亦口業成就三以無量下唯口業成就四佛子菩薩住第九地下法師成就初中二先明隨所知者是所說法後一切行處下明隨所依是所逗器前中云善能演說聲聞乘等者說解脫器得熟故謂說化法令衆生解脫器熟也解脫體正度故解脫差別以三乘法乃至令得佛果解脫故後隨所依中三初總明隨器說法二能隨下別顯所說三令生信解下總結化益初中云一切處行者隨所對器心等所行處故茲入行成就中有心調林此中脫也智隨行故者謂就說者智隨彼器者心等行處行故論云何者隨所依說所法對器故名釋隨根等言於隨應者授對治法故者釋論經隨使謂隨使對治故上二句是化法即此中總句是也言所說法器成者明法器釋隨根等以器成說法故隨根隨信而為說法此義二句說者此是末後結文二別顯中能隨衆生四字及後而為說法四字遍配中間十句此文與前入行稠林大同略無心行與論經多少數異名目有殊此經有十稱論經有十三種一心者論經有此經前文亦有明此文無二使者此中云眠縛三根者此彼同有四信者此云解前已會釋五境界差別種種行習氣者此是樂欲謂於可愛事起希望故差別者與不希須境異故種種行者境非一故六隨順一切境界智者此是報生智通三性非聞思修七性八生九煩惱十業十一習氣十二三聚等六此彼同有十三乘者此無也論總科為六種器一初五名譬喻器然後即引第五句證以前四若無樂欲為器不成故所以者何聞重聚集成教體中只言隨墮樂欲聞者識不云隨餘心所法故言譬喻器者謂若化物令成器性如稼穡法具五因緣彼所種物成就堪用一種有心堪生者此喻心王二除生礙緣喻治使三有根增益益生力喻信等根四是決定究竟生喻勝解五種已後根等運運速能長進此喻樂欲故名譬喻器二次一隨順一切境界智名種種異行器者此是報生智通有漏善等三性故三次一隨順性行稠林名乃至得成就器此是譬喻器家果彼是此因從因數習究竟成性故云乃至成就四次一隨生煩惱業習氣名隨詞辦器者謂彼起生煩惱業三障與作同行功辨化之重成習令轉故五次一隨聚差別名定不定根轉器者謂隨其所宜轉令勝進故六後一隨乘信名隨乘因能乘出器者各依自所乘乘之出離故此文是今經木總結前諸器隨自乘獲益也三總結前諸器由隨順信解增益智慧各隨自乘解脫也二亦智成就亦口業成就者論中先微問口業結云智成從前為智知說儀故從後口業具二十種法師德故論中說者是口業入深義也持者是智成就顯守護法也二十種法師具如論說三唯口業成中二先明無㝵智能起語言後何等下正顯四無㝵前中四一明法師行謂護法二以無量等者名前所說為善巧智以能起此四辨故知菩薩四辨不依尋伺從淨覺起三用菩薩等者言詞柔耎故四常隨等者一切時所說不離無礙智故後廣分別中四無礙解略以四門分別一釋名二辨體三所依四漏無漏初釋名中二先總後別言無礙者說法稱根自在成就總名四無礙帶數釋也別者法義詞辨辨亦樂說軌生物解及持自性名法教所詮顯名為義剖折明白名為辨亦說稱物根令其生喜名樂說四是所緣境解是能緣智謂即能緣教法之智於所緣一名句等中能現一切能詮句故此法之無礙解依主釋也餘三准知餘門分別具如別章後正顯四無礙中先略明後廣釋前中二先徵後所謂下釋釋中先列四名後此菩薩下正顯此四無礙體但一後得智就所緣境分為四種一法體者明法自體二依境界體者於法體上有差別義三正得與衆生者依自所得說與衆生四正求與無量門者隨諸衆生正求差別與無量門下重釋中初釋法無礙內遠離二邊生所攝者遮餘法故名離二邊表自體故名生法攝如色礙相舉例顯示等餘一切二釋義無㝵中彼遠離等牒舉前法如實智下就法辨境菩薩住彼約人辨境如色下亦舉類顯虗妄分別正顯差別之義若小乘說色有苦無常等義今約大乘說此色法但是妄情理實本無是色之言三釋詞中隨他所喜言說正知者解於他所樂之言釋正智也隨他等釋與也四釋樂說中先牒舉前詞無量後約辨樂說無量種義語是詞中差別釋無量門也隨知下釋與也亦名辨無礙解者謂剖折分明令他樂說故自下廣釋中理實此四於一切法隨說皆具今約一周圓數之則列其十門以顯無盡一自相二同相三行相四說相五智相六無我慢相七小乘大乘相八菩薩地相九如來地相十作住持相於中初五泛知理教後五知三乘淨德前中初四正就所知明無㝵後一約能知智前中初三知義後一知教前中一約知事法事法緣別各住不雜名為自相二知理法理法遍通名為同相此二當相明法三約時辨法謂三世遷流故名行相四對機宣教名為說相五約能知智分四無礙非是知於智故名為智相後五中初一總知三乘離相淨證名無我慢後四前中一通知小大餘三別知大乘菩薩地因後二知果一體二用可知下次第釋中釋此十章即為十段就初自相中法義是總別一對於緣生法總知自相別知差別詞及樂說廣略一對少名顯法名為詞衆多異名堅固彼義令他愛樂名為樂說言想堅者想是起言所依是故餘論中或云想或云聲或云名或云字或云施設皆是名之異稱以言名顯義令義堅固故名想堅想堅多種名想差別重釋中不壞牒詞隨所覺明自解此云無錯謬說也隨彼等顯應機說也次第不斷名不息者是常說也無量衆多等於一一法就以無量異名廣說也為堅彼義者謂以異名多說意成本義故令堅固也第二下明同相於中法義約二諦分後二約廣略分初一切法同一無性二有為法同無常相三假名同者法同無俱假以說四假名假名同者復以假名更重顯之下重分別無常入無我者釋義順法謂觀無常即解無我是故第二門入初門智境如第六地中云隨順觀世諦即入第二義諦是也次牒詞文於前假名法上復以餘假名隨應根說故云不斷次不壞無邊者牒樂說文不壞前假名而能以餘異假名說謂異名雖說不乖前詞故云不壞也第三明行相了知一念緣生現行名法知過未緣生行名義於前二法假設名字詞即以此名宣說彼事名樂說下重釋中一一世現在故者通論過未各有現在故云彼彼世間攝是一一世中各有多門異說言見過未知現在者釋義順法如是菩薩下結後成前謂以後義成前法無礙境下釋樂說言事行相不出三世者釋前所說事經中一一世皆不出三世言無邊法明者異法明異法明則是聞思慧照法故第四明說相中就教本釋以分法義約所隨心言分詞樂說謂隨物言音說故云隨順說隨心異說意義不殊故云相似說餘文可知第五明智相中法義約現比智以分詞與樂說約淺深以分故論云一現見智二比智三欲得方便智四得智謂計智現前見法謂四行相境境非一故差別也比智不現前見比類知故餘如前說然法比二智諸宗說異菩薩婆多宗最初證知諸法真理故名法後智境智與前相似名為類智如俱舍二十三說若經部宗知現在世名法智知餘殘名比智如成實論二十六說依大乘宗法類差別自有三對一三心法類依別總緣於生法假故謂治二障各分二品一內遣有情假緣智能除耎品分別隨眠二內遣諸法假緣智能除中品分別隨眠三遍遣有情諸法假緣智能除一切分別隨眠前二是法智是無間道後一是類智是解脫道除二障上品隨眠如成唯識第九卷說二二種十六心法類約能取所取別故八觀真如八觀正智故亦如唯識及雜集第九說三據觀現不現境辨法類異謂欲界及上二界故亦如唯識第九及瑜伽十六說此中法有二義一教故二所緣理法故類有一義謂種類故今此論文通諸說以現見之言即是緣現所取如境亦緣欲界現在境故詞中云欲得方便者謂詞說世諦與得第一義作方便故樂說中云得智者說第一義令正證得故重釋中釋初法智云知諦差別者是二諦不同又一義如前釋言不異方便者釋不壞方便謂見不異法名不壞法智等舉經對顯釋比智云如此如實等釋顯此義以現所知類餘知法釋樂說中非顛倒異說者稱理說故也第六明無我相中真俗二觀以分法義謂觀真一相無我不壞故觀俗蘊界等方便入無我故說中勝妙分詞樂說謂令世歸敬故說法言詞愚智共識名易解了音聲慈耎聞者皆欣名為美妙樂說中理漸深益轉多故下重釋內釋初無礙中先順釋謂無我不壞故下反顯謂取己能解名為我知取己能得名為我證如是壞則明不取名為不壞也陰等方便下釋義順法謂觀陰等以為方便得入真諦無我法故是故下結後成前故是菩薩智境也一聚積下釋顯無我謂迷陰故計聚積我以迷界故計異因我以迷入故計欲著我以迷四諦緣生故計作者我說此陰等對四我以顯無我雜集第一中廣顯蘊等所治之義云云第七明大乘相中約權實以分法義謂同觀唯是一乘約權異性說三差別詞及樂說依總別以分總說三乘令得解脫名詞無礙隨物心念於一一乘無量種說名樂說下重釋中文顯可知第八明菩薩地相中約地體相以分法義詞與樂說同體義分謂說地名為詞詞中差別名樂說也智相是地體說相是地相謂隨相說十地故巧授十地名與方便隨物心樂於一一地以無量門令具入也下重釋中釋菩薩行內法行智行示者以此二行合為菩薩行謂證法成行名法行即智成行名智行以此智行能入地故名隨智行言觀智說故者釋所由謂何故智行是菩薩行答以說觀智為菩薩行故釋義無礙中云十地差別謂心者此出地體謂地別由心說為口言釋門中云不顛倒釋不壞說教授釋隨順地道第九明如來地相中約佛體用以分法義依彼廣略以分詞樂初一念證得名法身相二時處應現名色身相三謂前二身中智德差別名正覺相四隨物樂廣顯佛德無量差別名為說相下重釋義中隨何等劫成何等佛者釋事中言隨以何國是成道處也隨何等佛是現佛身釋相中云隨名所記可得見聞者謂如名所記身土聲色可見聞故釋詞無礙中云隨正覺等者以十佛中最初名為正覺佛故云依說第十明作住持相中依知佛說總別以分法義即說法義名詞詞中差別名樂說初覺相者是佛起說住持德二差別相者是佛隨機現差別德三說相者依前差別為衆生說四彼無量相者隨物心樂異說故下重釋中佛語者此本云如來語謂能說故力是神力破憍慢衆生故無畏降邪不共異小悲能常說智為說依轉法則是隨順正說此上皆是一切智攝釋義無礙中隨心性者是種性差別根欲可知言諸佛智行等者釋樂說中智行名法身此行利生不壞名圓滿隨彼信等釋隨信說故第四大段明法師成就中四一持成就蘊法在心二此菩薩得如是百萬下說成就依持起從三佛子此菩薩假使下問答成就善答他問四佛子此菩薩後更下受持成就能更受勝法為他宣說初中二先牒前起後後得義陀羅下正顯總持於中先略列十名並依樂用後如是下牒略結廣謂初三起意一業知義二知教三知起化通次三起身業一身放光性善耎者慈光攝取二性剛強者以威巧攝三上供佛下攝貧乏後四起口業一於大乘中狹劣衆生示大乘教救拔威德令捨劣歸趣不難故二無間斷障礙常說故三無盡樂說四種種義樂說廣說也後牒略結廣可知第二明說成就中三初明能受多法二此菩薩得如是陀羅下明能隨樂廣說三此菩薩受於法座欲以下明能起說自在於中云初見於佛等者梵本云才禮佛時即於無限佛所得無量法門光明所得法門下同次後云坐於法座而說於法准梵本應云而演說法第三問答成就中二初明一世界答難後如是乃至下明一切世界答難第四受持成就中二先於一毛端處後如一毛下類一切處領受可知自下第二明位果三果同前不煩重說第三大段重頌分中二十四頌分六初二頌頌法師方便二有二頌頌智成就三有七頌頌入行成就於中初頌云若欲等者梵本云智者能入無邊識推求衆生心稠林種種心行速疾轉以微細意得是智第二頌初兩句云煩惱等者梵本云隨眠起作趣相續此速為一句也第四頌中第三句云與者等者梵本云意樂隨眠同伴主謂同伴及同生故第四句云常等者梵云與心相隨練不斷第五頌云但等者梵本初句同下三云不住於心亦不離雖難可了禪能退除金剛道餘無斷第七頌第四句云惑溺等者梵云雖行智道溺諸見四有九頌頌說成就於中第八頌云十方等者梵本云十方所有諸衆生一切咸來同會坐一念悉知其意樂能以一音使充滿五有三頌頌地果六末後一頌歎深結說第九地釋了第十法雲地二門分別先以義料簡後依文正釋前中略顯二門一釋名二來意前中略有六處一攝大乘說法雲地者大法智雲含衆德水譬如大雲無性論師自有三釋一由得總緣一切法智總緣一切契經法等不離真如此一切共相境智譬如大雲陀羅尼門三摩地門譬如法水智能藏彼如雲含水有能生彼勝功德故者此通二釋若智雲含功德法水名法雲是有財釋若依共相境智含德水名法雲是依主釋前釋為勝二又如大雲蔽如空粗重猶如大雲隱覆虗空如是總緣一切法智隱覆如空廣大無邊惑智二障言隱覆者斷義隔義者此總緣一切法智名法即此智法如雲隔斷廣大二障虗空此法即智故持業釋也三又如大雲注清冷水充滿虗空如是總緣一切法智出生無量殊勝功德充滿所謂無依法身者若依總緣一切法智雲出功德法水此即從所出名法雲是有財釋若依所充滿法身名法雲是依主釋後釋為勝二依成唯識第九三釋同前不煩重敘三金光經云法身如虗空智慧如大雲遍覆一切故名大雲真諦釋云如虗空者譬三如如虗空有三義一容受義譬自性法身不礙生死故二無邊義譬顯了法身雖得顯了猶未究竟如空有清淨處有塵霧處譬道中法身通解惑故三清淨無塵霧空譬聖果法身也智慧如雲者譬如如智有三道一道前性得二道中修得三道後至得者雖有三釋經意本詮障盡智圓證法身滿名法雲此即智從所證得名依主釋也四莊嚴論第十三云二門如雲遍雨法雨名法雲者菩薩第十地中由三昧門及陀羅尼門攝一切聞熏習因遍滿阿梨耶識中譬如浮雲遍滿虗空能以此聞熏習雲於一一剎那一一相一一好一一毛孔雨無量無邊法雨充足一切所化衆生由能如雲雨法雨故名法雲地者二門如雲能受佛法雨復能與所化降法雨此即法雨之雲名為法雲通二釋望受上法是依主釋望下降法雨是有財釋五解深密第四云粗重之身廣如虗空法身圓滿譬如大雲皆能遍覆故名法雲依梁攝論由二重障不得圓滿法雲地一六神通慧無明二入微細祕密佛法無明此二無明所感生死名粗重身滅此障已入第十地等者此依斷障證法身故名法雲即從所證得名依主釋也六十住論云此菩薩於無佛世界能雨法雨名法雲地者此即能說者名雲所說名法有財釋也上來六處十釋中間除唯識三釋全同攝論二來意者略有五種一前地雖得巧辨廣說然未能證法身圓滿為於此地圓證現前故二為令地滿足故三欲令修行智覺滿故四為得受一切智勝職位等百萬阿僧祇三昧故五為得受職位故來也略此二門料簡更有諸門分別如廣章辨後依文正釋中三分一讚請分二爾時金剛藏菩薩摩訶薩告解脫月菩薩言下明正說分三爾時金剛藏菩薩觀察十方下明重頌分初中十六頌分五初一頌明淨居天衆供佛二次一頌明菩薩衆燒香熏衆為供三次頌自在天王及衆天衣供佛四次十一頌天女供佛讚佛於中四初半頌明供佛次八頌半讚佛次一頌勸修利益後一頌結讚默住初半可知次讚佛中二初半頌標讚詞所從後正明讚讚中先八頌讚佛體用無礙德於中分三初五法說以半喻況後二半法合就法說中三初一頌明一身即多身次一頌讚毛孔光滅衆生惑後三頌讚佛以八相等應機於中云或現出家等一句梵本云為諸世間現出家次半喻顯可知後法合中四初一頌明隨俗即真次半頌明於真現俗次半頌明即俗依真次半頌明真俗平等次觀修及後結讚默住並可知結讚第三句云身心等者梵本云心樂止息諸攀緣末後兩頌明上首請自下第二正說分中論科為八分一方便作滿足地分謂攝前九地所修諸行總為方便滿此地故二佛子菩薩摩訶薩以如是智慧下明三昧滿足分謂初住地行行德無量以此地受職必依三昧故偏舉之三此三昧現在前下得受位分謂正住地行依止勝定能攝佛智故四佛子菩薩摩訶薩住此法雲地如實下入大盡分謂此地望前諸地已是窮盡就此地中此復是地滿之行此既盡中之極故名大盡也五佛子此菩薩摩訶薩通達如是下地釋名分謂地學窮辨德顯稱故六佛子此地菩薩智慧下神通力無上有上分謂地滿足已妙用不測用過前地名無上比如來神通力故名有上也已下二分雖通十地由將前攝後故此地攝也七佛子此菩薩摩訶薩十地行相下地影像分謂以喻顯法如因像知質故八佛子此集一切種下地利益分謂彰說勝益勸信趣入故就初分中二先總標告後以如是下正顯顯中二初總說後善滿下別辨前中云無量等是廣智已善思惟等是深智前諸地中具起此二通名善擇智業即是從初地至九地妙慧使擇故後前辨中十句論攝為七種相一初三句名善修行相謂於諸地皆同善修證助不住似前八地中同相也一善滿足白法者是證道二集無邊等者是助道三增長等是不住道不住無故論云此三句次第相釋者謂何因得證由起助道故何因成助由不住道故二次一句廣行大悲者是隨順自利利他相謂普遍釋廣餘通釋大悲行以自利亦為救衆生故此句攝前七地二利行相第八地初已辨七地差別之行故此總攝一句顯之爾三次一句知世界差別者是合佛土淨相謂此顯第八地修淨佛國土行故自下四句別舉第九地中行初一句自分行後三句勝進行初句即是從前第四句入衆生界稠林者是教化衆生相謂此顯第九地中自分化衆生行故五次二句入如來所行處等者是善解相謂解佛所行真如境處又順佛解證寂滅行故六次一句當觀等者是無厭足相謂當觀趣求力無畏不共法等故七次一句名為等者是七地盡至入相謂十地位極名地盡依行證名至入以此地中受佛智職故云一切種一切智智受職位自下第二三昧分中二初牒前起後後即得下正顯所得所得中四一別顯十種二如是下通結百萬無數三菩薩於此下明於三昧乃入出及善知業用四其最後下顯定名表位極故初中論意舉初等後故云離垢等舉後百萬等故方眷屬離煩惱釋顯其相以此位中是障盡極處故不加功力任運相應故餘九是別以六七二定共離垢一故離垢有八種一入法界差別是入密無垢謂法界深奧名為密處二莊嚴道場是近無垢是行近佛果三一切種華光謂身光業四海藏者是口辨總持五海印者是意業起通六虗空界廣大七觀一切法自性者二句俱顯淨土無量者釋廣大也觀一切者釋觀也上來明自利德八知一切衆生心行者是化衆生謂利他德上二利是自分行九一切佛等者是正覺無垢是勝進行上覺名正覺謂將成菩提時一切諸佛遞共現前證知如此下文受職受說二通結可知三巧入出等善知定方便及所作故四定名表位極中一切智智無分別者釋前文一切種正體智也一切智智平等受位者釋後得智受職位也第三明受位分中六一隨何等座者如世王子受職位時在閻浮金白象寶座菩薩亦爾受佛職時在大寶蓮華王座二何等身者如輪王子玉女寶生具足王相為得位身菩薩亦爾姝殊之形為受職身三隨何等眷屬者如輪王子受位時文武百僚咸共輔弼菩薩如是受佛職時諸大菩薩共所圍繞四隨何等相者如王子受位時嚴治國內懸繒幡蓋鳴鐘擊鼓宣布遐邇菩薩亦爾受佛職時震動大地惡道休息光明普照世界嚴淨以此為相五隨何等出受者如世王子受王位時告令宰臣思赦天下大施無畏令脫苦厄賞錫群臣菩薩如是十受放光休息惡道菩薩增行六隨何所得位者如輪王子受國位時父王手執金鐘盛四大海水灌太子頂爾時得名灌頂輪王菩薩如是受佛職時十方諸佛於白毫放一切智光入菩薩頂此時名為受佛職位此六段中前三論同處釋次二亦同處釋後一別釋就初座中有十相一華王是主相以自在故二周圍等是量相以廣大故三衆寶等是勝相以具德故四超過等是地相以是生處故五出世等是因相以從彼生故六知諸法等是成相以空慧所成故如世蓮華種植成故七恆放光等是第一義相如世蓮華開敷四照菩薩華座善照法界八非諸等是功德相是所照所生果故九琉璃等體相以華等為體故十其華常等是莊嚴相以德修故二爾時下明隨何等身身相妙大稱可華座三無量下明隨何眷屬謂受座得定心敬目瞻四佛子此大下明隨何等相其相有九一光音充遍二動地三息苦四嚴界五衆集六奏樂七益物八供佛九佛現五佛子此下明隨何等出處以出光明故此總釋時出處也文中有三一十五處放光中間二二同者合名一光總是十光二爾時諸佛下明因光明照諸佛菩薩咸覺知三佛子是時下明由覺知故下位菩薩俱來供養初中此十光明論攝為三一前九是利益業於中初五是凡夫次二益二乘後二益菩薩又八九十此三名發覺業以第八能發覺初發心及乃至第九地者故第九能發覺第十地菩薩第十光能發覺諸佛故又八九二光名攝伏業光謂第八光能攝九地已還菩薩令咸來供養第九光名能伏業光能使魔宮隱蔽就第十頂光中有四初照十方二成光細三設供養四入佛足下初二可知就供養中三一顯供勝二正供佛三見知者益言於阿耨菩提不退者論二釋一於地中決定義謂於地決能證故二後有異義定不放逸所作之事決定心故謂定能離惡集善故言入佛足下者遠法師三釋一就教相頂光入足顯深敬故二約相顯實菩薩智光證入佛境從下趣入名入足下故論名為平等智攝三約實論菩薩自己因行趣求果時從下證入名入佛足第二由光照佛菩薩智覺中文易了第三知己佛菩薩來中二先下地菩薩來此與供後常爾之時下同位菩薩德光相助前中二先供後得益後相助中亦先光入德相後明益此表示內德圓滿而外彰其相其相梵名室利瑳此曰吉祥海雲衆德深廣利物如雲海雲即吉祥吉祥即海雲古人誤譯洛剎曩為惡剎攞遂謂相為字又以相表利物深廣多故稱之為萬理實此中無萬無字唯云金剛莊嚴臆室利瑳相其萬字之言都為謬妄爾第六明隨所得位中四謂法喻合結初中亦四一放光二入頂三得益四結位初中光有十業一名益智是利益業二眷屬是因業三照示佛力令他恭敬名敬業四開悟是勸進等名勸進業五十方等名震動業六滅除惡道苦是止業七蔽魔宮是降伏業八示一切下示現業如是普照下卷舒業十示現下論經有示大神通光明之言此本闕此名變化業二入頂者事光入身頂亦表法光入心頂增位故爾論名如來光明彼菩薩遞互智平等授者謂菩薩頂光入佛足是上進故佛光入菩薩頂者下攝故因果遞合故云平等身光即知故云智三得益可知四結位中入佛境所證同於十力行德因故隨在佛數如才出家雖未受具即墮僧數喻合結位並可知第四明大盡分中五一智大依正覺實智義故二佛子菩薩摩訶薩住此地即得下解脫大依心自在義故三如是乃至下三昧大依發心即成就一切事義故四無量百千下陀羅尼大依一切世間隨利益衆生義故五無量百千下神通大依堪能度衆生義故前二自利一內知二外用後三利他一意業用二依發語用三身業變化用就初智大中七種智一集智大謂智法緣集智力斷疑二佛子此菩薩摩訶薩以是下明應化智大謂化智業用依身而起三又如實知佛持下明加持智大謂化業住持化用非一故重言如是常化不絶名轉行力四又如實知諸佛下明入微細智謂一法中現一切法是難知境界故於示成佛八相中一現一切故依彼應化等牒前三智依顯微細一化二如三集合此三智名為不二依此成佛故名為作正是微細五又入如來祕密處下明密處智者此是祕密隱顯門謂將獲初心根未熟者顯粗隱細令彼不怖依彼說此微細智也六又知諸佛所有入劫下明入劫智謂善解諸劫互相涉入名入劫智時劫相續說為命遷流名行一攝一切名曰加持一入一切名為捨廢己隨他故劫隨心轉名自在意七又知如來下明入道智謂知諸世法堪為出世對治用名為入道初集智大者論釋云因緣集智應知彼復隨所有分染或淨或滅者此是總釋於中有六重一或唯染謂初三句及識集衆生集一分世界集諸見煩惱集二或唯淨謂涅槃集及聲聞等集三或唯滅謂虗空集四染淨合謂世界集有為界集及一分識集五通淨滅謂無為及涅槃六通染淨及滅謂法性集論經名法界即不善法界名染善法界名淨無為法界名滅論別釋中言隨所有三界處者釋三句可知隨所有衆生者釋衆生集可知隨所有染淨等心者釋識集可知隨所有有為無為法無知知故者釋有為有心故名為知無為無心故名無知隨所有處虗空等者釋虗空集次是世界等所依處故隨所說正不正法者釋法界集即淨法名正染名不正等取滅也隨所證不證等者釋涅槃集以聖人所證故隨所邪見下明不證即釋邪見等集謂何因不證以邪見故是誰邪見謂餘外道等彼不能證故隨所有器世間成壞者准釋可知隨所有二乘彼集差別者釋聲聞等應知結文可知第二釋應化智中三初標次衆生下別顯後如是下總結別中十句初三句明衆生世間自在化謂化現衆生及所化業化現貪等及示諸惡見故論云應示煩惱染見作故謂現起貪瞋等十使煩惱諸見等化令衆生見名見作次一句是器世間自在化法界化者所說法行故謂作法師處衆說十二分教等名法界化彼應化故次四句是智正覺世間自在化化現三乘皆有有覺義故末句結云一切分別等者此有二釋一云分別化者化作有情類故無分別化者化作非情類故一云作意現化名分別化任運現化名無分別化雖有兩釋前釋為勝第三明加持智中文三同前別中十一句初三是境界持謂常化不絶名佛持法僧亦爾後八是行持初二是運行持如觀佛三昧海經第七佛為化諸淫女現馬陰藏相化作三男童子與淫女行欲令厭發心又為降伏外道令發心故現馬陰藏相故煩惱持者如罵調達為食小既故此皆加持所應度者故皆示現故如論應知王示瞋害相婆須密多示貪欲相故皆示煩惱相任持行故次五句是順行任持謂多時積行名時持由願起行名願持由於佛所供養福力成金剛種任持究竟不毀滅故依行起行名行持依說劫令樂修即此說為能持故一切智智名為智持謂佛後得智緣俗化世論云此智能作一切定故第四明入微細智者謂知佛化用於一法現一切法炳然顯現難知之境佛智能知彼微細境名微細智於中文三同前別中十句初是示出家修苦行故二示命有盡故三示王宮生故乃至住壽命者示八十闕一故般涅槃者為隨所宜種戀佛善根法事故餘並可解第五明入佛祕密處智謂知佛所示祕密義等於中文三同前別中初三樂密者一身量密量即無量在此即在彼故二語密一言應一切言尋聲無邊際故三意密如來心識無有所作然能成就隨時隨根不失其宜如來所有施作佛事猶如化人無心想念而能成就廣說如密跡力士經四籌量根器生熟堪度未度時故善根微故遠故劣智不測故云祕密五授記密者謂為誘進實聲聞人與變化者授記或恐有退非時與記等六攝衆生密者呵罵調達愛語羅睺等七種種乘密者如法華云雖後說三乘但為化菩薩此之謂也八知根行密者謂信等五根或二十二中隨其所應或利鈍等差別多種非下位能測故名為密九業所作密者或過去所行遠難知故或於一事三性同造或多業同時造異時熟或同時熟如是無量十得菩提行密者或逆順起故或依法性相應所修非二乘凡夫等境界故密也第六明入劫智中八句論總相釋云是中入者平等解脫一切劫遞相入故謂知諸佛依業用門不思議解脫法力能以互差別時分彼此相入不異名平等第二句云有數劫入無數劫者有兩釋一云有數劫者是僧祇劫即是阿僧祇品中第一百二數也無數劫者即是阿僧祇劫是彼第一百五數也一云有數劫者可以此剎中劫數量所及故無數劫者是阿彌陀剎等已上諸剎中劫故第四句云劫入非劫非劫入者此約劫時分與不至劫之時分說相入廣顯古釋順違并釋餘文並如上發心功德品說第七明入道智者善識衆生入道不入道方法故文三同前別中十四句一入毛道智者依凡夫地有微信心感道緣發為說世間聞等三慧等法故二入微塵智者為我慢衆生此有二釋一云為恃異術起高慢衆生佛將彼入塵中彼不知己所往示之令知摧伏故一云為我慢者令觀色蘊但是聚塵破其慢故三入國土身智者依信生天者智現淨土令見轉彼信天為勝之心故四五六入衆生身心行三種智者依覺觀衆生謂煩惱亂心通名覺觀隨說對治故七入隨順等者謂衆生萬品對各異故總言之一切處故八入示現遍行智者衆生思覺心多佛悉遍至彼心所至先與同後說過斷故九順行等者衆生造順世間行者亦先同後斷故十逆行等者無漏行能違生死佛久修滿今示修故十一十二十三十四等皆是為衆生故說同其事同世故思議所作難測故名不思議餘准思釋自下第二明解脫大中三初標次略辨後此十下結廣略辨中十句一不思解脫者謂依神轉變外事妙用難測故二無礙者以願智力能速至十方無量世界而無礙故三淨觀察者淨智所知故淨行有三一知世出世約位分別二知學無學約因果分別三知聲聞等隨人分別此是所知自在前二是通後一是智此知三乘根性有障無障上知佛下知二乘智優劣故並是淨境故名淨智差別四普照明者隨意轉事謂隨衆生於一切色像門示現種種自在身故五如來藏者是法陀羅尼謂所知真性蘊恆沙德故六隨順等者能破他言而不退故七通達等者於三世劫隨意回轉故八法界藏解脫解脫者梵本唯有一筒解脫無重言也謂一切法一切種因緣集智此中法者世諦萬有非唯一故名一切法衆生所迷多在世諦生著不會真諦要善達世諦因緣稱虗實而知得名善化此同上集知九光明輪者光不離身而普照故十無餘境界者依一切時知無量世界衆生心故後結可知第三三昧大第四總持大第五神通大並准前解脫大中略廣標結等應知大盡分竟自下第五大段釋名分中三一能受諸佛雲雨說法故名法雲地二佛子此菩薩以自願力下明能注法雨滅衆生煩惱塵𦦨名法雲地三佛子此地菩薩於一下明能注法雨生物善根名法雲地初中若從所受應名法雨若從能受應名法海今但就彼受法之處名法雲地是故論釋一雲法相似以遍覆故此地中聞法相似者此所聞法寬廣遍覆是故名雲與法相似也言如虗空身遍覆故明能聞法身謂受雲出處其唯虗空故說能受法身如空若隨對於佛則佛身如雲說法如雨此所受若雨能受如海若對所說法如雲遍覆則所受若雲能受如空二滅塵三度生論顯可知就初中先總明成就念力者近說受持義二於一念下明能受法於中三初於佛所聽受多法二佛子譬如大海下於多佛所聽受正法三解脫月下問答顯前二分齊就初中有法喻合論釋中二先總釋謂十方諸佛同時說名說衆多故後別中三一釋初法說內無量法明也二入如來微密處釋合中微密法雨三速疾釋一念須能受以此地中聞勝故能多受法所受雖多若是粗淺不足為難故復云密法雖多密若積時漸受亦不為難今復一念速疾能受故是勝也論云是中無量下別釋前三初二是所聞法後一顯能聞之德先解所聞法謂性故作故開為二相謂三慧所知名法自性說授衆生名之為作別釋性中大法明是聞思智攝受故大法照是修慧智所攝受故云何作大法雨如大雲與他法雨故下釋能聞起信名受領教名安是文持取義名攝是義持也攝受前文義不失名持論經名安為堪名攝為思第二釋於多佛所受法中大海喻有四義相顯可知第三問答辨分齊中二先問後答答中亦二先授量顯示所聞廣大顯前初段二如一佛所下類多佛顯前第二段也前中云三世法藏者論釋於法界中三種事藏謂明照雨為三種蘊在法界名為藏也第二釋名中二初寄雲電等以顯菩薩能化之德後一念等下明化時促於上等處明化處廣餘是化益勝又雲雷電等如論應知第三釋名中八相現成漸增物善文易可知第六大段明神通力無上有上分中論開為六一依內者通依內德此有四種謂一不思解脫二三昧三起智總持四神通此亦是前大盡分中五種大以智與陀羅尼大合說為四以並是此地德用故同說此文略也二隨其心念下依外大神通業用依外境起三即前門中互相作力名自相謂轉變作用是神通相此後二門經文是一義開二釋故為二門四或隨心念相一念中示現下作住持相常用不絶五爾時會中下是令喜相斷衆疑惱六佛子此菩薩摩訶薩已能安住下是大勝相超過前地就第二依外通業用中外事地等是所動剎依報故也復有外事自他身等是後現身等即正報也何故身等說為外邪釋以對前解脫大等是內得故說此身等以為外事三自相亦二種一轉外事等云及他身俱名外等二應化自身等此二亦攝此一段文也初轉外事有三一是同類略廣轉二垢淨異事轉三塵容世界等是自在轉第三自相可知第四作持中三初總標次示現不可說下別後佛子總結別顯中十一者身語供讚二八相應機三身現三世之事四身內容剎五毛孔出風六海華現佛七身光遍照八口噓地動九示起三灾十身剎作相後結可知第五令喜者斷疑故此有二種一顯示自體通力以斷衆疑二佛子此菩薩住如是智慧下明說法以斷衆疑前中有二問答前問答顯神力無上令衆歡喜後解脫月菩薩言佛子若菩薩下明後問答是神力有上令衆歡喜前中亦二先大衆疑謂舉佛疑菩薩非是疑佛也後解脫月領疑為請剛藏答中四一人定斷疑二爾時解脫月下顯定名字三又問下業用分齊四佛子菩薩住法雲下類顯廣多就初中亦四一法主入定二衆現入身三身內見佛四攝用還本二顯名中先問後答前入定時已顯其名何故更問釋云當時法主默然入定後結集家取以安之既當時不顯故此問也答中言佛國土體性者入此三昧能現佛國故三業用分齊中二先問後答答中非但如前現一切剎其身乃能現過恆沙剎塵佛剎四類顯廣中三一所得廣多謂此地所得非一二故故云得如是無量等二故此下明業用難測於中十二種分二先別說後略說總結初三業業具難測二神通是前神通大三觀三世是三達智四三昧是前三昧大五智力是前智大六遊戲解脫門是解脫大七變化等是變化外事等及後結並可知第二明有上問答中二先問後金剛藏下答前中舉菩薩疑與佛齊問詞同上疑意有准答可知後正答中二初總呵問非後復次下別顯問非前中二先喻況後法喻中一塊土者論經云二三豆土餘並可知後顯中二初總明佛不可以法雲德比後佛子我今下方便顯其非比之相前中先喻後法喻云如四天下取少許土者此喻前來說法雲地德餘者無量者此喻前說之外多未說者也後法中此法雲等者即是合前餘未說者也況如來者具說菩薩地德當無量劫況今始說少說即欲比如來邪此中有三重一豆許土二四天下土三無邊世界地土將四天下土比無邊世界土當自不可況以豆許土比邪以法雲具德當不比佛況其少分比如來邪後方便顯非比中二先總標後佛子假使下正顯顯中二初能比後此一如來下所比前中三一所依處多諸十方各無邊剎數剎二能依人位高謂得此地菩薩三彼位高者多謂於前多剎中肩排相次住如稻麻等四彼多菩薩各是多時積行謂百千億那由他劫後所比中二初明以多比少謂多位高者多劫之行比一如來故後百分下明猶非其比謂非直前多望一非其比亦乃相一佛德中百分之內比一分乃至少相近分比亦不及後明說法斷疑中二初明調柔行後此地菩薩智慧下教智淨上二文皆有法喻合並准可知第六大勝二二初明說自在後佛子是名下結其地相前中二初明神通勝後攝報中若勒行下算數勝以此二空勝前諸地故名大勝前中二先牒前後諸佛下正顯顯中六句初五別後一總結別中五句論攝為三初二各一後三為一也一三世智者是斷疑行以通三世為出世道故名道義二法界智者是速疾神通行聞說如來祕密法故三下三句名等作助行謂於衆生平等化益故於中一遍等者作淨佛國佛平等化衆生故二照等等者作法明平等是教智化故三慈念等者作正覺平等證智化故後一句總結可知第七大段地影像分中四喻喻地四德前三阿含後一證也前中前一池喻修行功德謂諸地中起修之行二山喻上勝功德謂依前修成德德位高出三海喻難度能度大果功德謂前修所成德能至大果度取到義四珠喻轉盡堅固功德謂從初地進階法雲故名為轉位極障盡名為轉盡證理終極名為堅固就初修德中有法喻合法說中始從歡喜終至法雲名次第行因成大果名趣一切智喻中阿耨達池此名無熱惱池從龍王得名此表地德離障惱故出四河者勝鬘經出八河阿含經云二十河下出現品中但云閻浮出二千五百河水流入大海不言出處出四大河據根本說故俱舍十一云此瞻部洲從中向北三處各有三重黑山有大雪山在黑山北大雪山北有香醉山雪北香雨有大池水名無熱惱出四大河餘略同下十定品說而十定最具尋即可知其二十河者大婆沙云四河去池各四十里外復各分四從池一匝各於本方流入大海是故并四根本成二十也檢法合中四攝利他合四河滿足無盡至一切智增成自利得大菩提合入大海論云依本願力修行者釋菩提心流出善根大願之水以四攝作利益他行者釋彼四攝滿衆生自善等釋自利可知第二山喻上勝功德中三一總舉法二如因下喻顯三佛子此十下總結初中十地因佛智故有差別者謂由佛智為所依因超此十地此則佛智一味平等為十地差別所依如大地平等為高下山之所依論云依一切智增上行故二喻顯中二先列十山名後佛子如雪山下一一別合前中云陀梨等諸山梵名並如音義上卷中顯後別合中初藥草者喻初地聖智善五明故二諸香者喻二地或香故上二不約慧為名故以土山為喻餘八依慧立名故皆取寶山為喻三地是定以三慧為體故亦慧攝故云諸寶喻者喻八種地又厭地善清淨者從三地已上八地是寶此重顯也三一切衆寶者彼以淨禪厭離煩惱此禪與慧皆可貴故四五通神仙者喻四地出過世間神仙人間超勝故五夜叉神者喻五地於真俗善巧難合能合通自在故六諸果者因緣集觀寄聲聞果故七龍神者喻七地空方便智寄獨覺果故又此上二地前寄聲聞菩薩超彼說彼果證問答不可窮盡故彼山出果無盡喻此也後寄獨覺菩薩超彼說彼果證問答不可窮盡彼山出大力龍神無盡喻此也八諸自在衆者喻八地不起功用普應如水鏡像得十自在故九阿修羅者喻九地菩薩巧攝生大力之相故十諸天者喻殊勝義第十地於餘地中最勝故論云復次諸山下釋諸山中所有物謂神仙等是衆生數藥寶等是非衆生數其藥等能資內報名受用事謂除病名增損對治香果資身名長養事其寶體非是資身但可貯積以除貧乏名守護等言依雪山等者指定其處謂初三及第六是非衆生數所依下釋是衆生數於中治六種難一五通福田供以得富治貧難喻四地菩薩行道品化治身見貧窮益衆生故二夜叉威制眷屬不令害衆生故治死難喻五地菩薩行不住道雖俱無住常在生死救苦故三龍降雨治儉難喻七地功用究竟行十度益生治功用儉故四得自在衆治不調伏難此喻八地菩薩有二義故一得密跡金剛現形守護剛強衆生見之受化故二得十自在調衆生故五阿修羅說呪治惡業難喻九地菩薩得四十無礙辨才善說法況治惑業故六大威德諸天論云自在四天王治怨敵難經論說異名經云大威德是顯帝釋等三十三天王能降阿修羅怨敵故論云治四天王怨者鄰近釋故喻第十地受佛位時得力無畏降伏魔怨外道故論云此一切山集在其中者如所從事能生一切物故謂諸山中所有物也言集在其中諸不可窮盡者順行不斷不休息故謂次第相續名順行不永斷故名不斷非暫無故名不休息下釋山海相因名者謂山因海故得高勝名海因山故得深廣名前說依地今說依海者由彼十山依此二處故互舉爾釋法同喻謂佛智如海依起十地高深相顯故云因果相顯此則一一山下皆有大海一一地內悉有佛地當知佛體遍在諸地若爾佛身亦即遍在十地諸菩薩身此依性相非一異義說第三大海十相顯難度能度大果功德於中二先喻顯後菩薩行下法合各有總別前中總云不可移奪者謂此十相同一大海不可移易奪其一味地法亦爾同一佛智義分為十不可移奪令異論云難度能度大功德者因果相順故十地如大海能度難度得大菩提果故謂能度世海得無價寶故下釋別中攝十為八以六七為一以九十為一故成八也一易入功德初地漸起大願故二淨功德二地不與破戒死尸住故三平等功德三地諸世間假名數故四護功德四地護自一味恆無失故五利益功德五地無量方便起世間所作多利樂故六不竭功德六地觀甚深緣起集法故七地即空方便廣大無量故七住處功德八地菩薩一念分身遍十方如船入海因風濟故得等衆生類身故具足十身故名為大身此地如海如此大身者住處故八護世間功德九地菩薩應機說法不失時受佛說法無厭足如海潮不過時受百川水不厭足故第十地菩薩能受一切大雨無厭足故第四寶珠十事喻轉盡堅固功德於中二先喻後佛子當知下合各有總別喻中論先釋總內轉盡堅固功德者大摩尼寶喻過十寶性謂摩尼寶過毗琉璃等以出故取者此是經中初句謂從大海出故取之為用放光是第九示現是第十越中取後故云乃至攝十為八以合六七八故此八中初後二句喻顯法餘但釋喻初出海益物故云功德以善觀者顯法也謂初地聖智出煩惱海善觀察故二體色明巧匠治故三形相圓妙故四無垢穢故五光淨明徹故六異相莊嚴名為起行三句合釋七神力放光故八隨王意雨寶是無護惜也能與一切衆生一切寶物正智受位故一切衆生同善根藏故過十聖性者過聲聞辟支佛等四向四果八種行性故並可知影像分竟第八明地利益分中三初顯法利益二如此世界下結通十方三爾時復以下他方來證若依論經更有第四如來隨喜第五結說究竟今且依此初中有二先明生信功德後雨華等起供養功德前中二初聞經益後爾時下動地明起生信功德謂以神通力動地令生信故前中二初總舉法難聞後問答顯益中二先正顯謂舉類法舉法類聞後何以故下釋成以得至一切智地要由聞此法故釋十八相震動具如前說及別行章結通證成等亦並如前初會中釋自下第三大段重頌分中二先長行明說偈意十種所為釋同前會後正說頌中有四十二頌分九初十三頌半頌方便作滿足地分於中初三頌半總頌九種地中善擇智初頌第三句梵本云遠離諸垢住智道次一頌半別頌初地次半頌頌二地次半頌頌三地次一頌頌四地次一頌頌五地次一頌頌六地次一頌頌七地梵本中第二句云我體無受離有無次一頌頌八地次二頌半頌九地二有一頌半頌三昧分三有五頌半頌受位分四有三頌半頌大盡分五有三頌頌釋名分六有四頌頌神通力無上有上分初頌云神通等者梵本云大威德住此地現佛境界滿十方神通無量億千數世思其行皆迷惑次後云舉一足等者准梵本中此是前頌中於十方說佛神變七有二頌半頌調柔行等八有七頌半頌地影像分於中三初三頌半頌山喻初半頌云如是等者梵本云此具功德淨者地常住佛智如山王次頌第二句梵本云三如毗陀多妙華次後頌初句梵云五如乾陀不思議次二頌頌海喻後二頌頌珠喻餘他及地利益等並略不頌也九末後一頌結說無盡第十地釋竟
