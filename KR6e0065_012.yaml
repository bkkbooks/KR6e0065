body:
  text: 十定品第二十七將釋此品四門同前初釋名中二先解會名後明品稱前中此名重會普光明殿會謂前第二會已於此會今復來此故云重會普光等言義如前説何重此耶前來歷會答問問是此起今答將結歸於本故還來此又顯果不離因故得果不捨因異二乘故出現所説何結歸耶因前方成出現世故此正得果不捨因也後釋品中二先得名後釋名前中按梵本內名為如來十三昧品具三昧與定雖非敵對然以三昧離於沈掉專注一境持心不散是定住義故以等持而名為定如來兩字譯家在略此雖菩薩定由是等覺亦得名如來故依十標稱帶數釋也別行經本名等目菩薩所得三昧經第二來意中二先會來者謂前説十地正位今辨位後勝進及所成果或前明十地位今顯等覺位及妙覺位故來也問勝進等覺今此依何答二俱無礙所以然者此但名殊而行相無別約開合故諸教説異謂仁王經以第十地位中位後二行合故不立勝進亦無等覺故彼上卷教化品云五忍是菩薩法伏忍上中下信忍上中下順忍上中下無生忍上中下寂滅忍上中下乃至云寂滅忍佛與菩薩同用此忍入金剛三昧下忍中行名為菩薩上忍中行名為薩婆若共觀第一義諦釋曰寂滅忍既唯有上下佛與第十地同用此忍即明不立等覺位也若依本業經開彼二行立等覺位故彼上卷初品諸菩薩請云開示我意佛本纓絡十住十行十回向十地無垢地妙覺地為我説要等云云又賢聖學觀品云六種性者所謂習種性性種性道種性聖種性等覺性妙覺性復名六堅六忍六慧六觀并十住等六位名總有六六三十六名名名差別廣説如彼瑜伽亦同開出等覺故説八義與佛不同勘若依此經自有兩種一同前仁王及餘教説唯立五位故此品等所明行相既異地中又非佛果然不別標等覺之稱雖此後文説此菩薩即名佛等然云於此十大三昧得成就者也二同前本業瑜伽等説許有六位具標其稱故下離世間品説十種智慧助道其第三中云常隨順住六堅固法如前具顯由是此位應名等覺也問此位菩薩既名等覺即是佛齊更有何劣非妙覺耶答依仁王經與佛同用寂滅忍入金剛定中但得其下忍不得上忍故不名佛又云無相名薩云若覺有相名等覺故又瑜伽菩薩地云此菩薩雖已修行功德海滿由未能捨三種法故不名妙覺一由未能捨劣無漏法二由未捨白淨無記法三由未捨有漏善法謂佛身不得有劣法故不得有無記法故不得有有漏法故此三不障道故能至於此障佛果故於此須捨捨此三已方名妙覺勘二品來中有二義一此品是十地後勝進行六品中第一故二其六品明等覺位行前明十地位行今辨等覺行中初品故先來也第三宗趣中先會宗者顯第十地勝進行相并其果相為宗明生解因果及與出現因果所依為趣第四釋文者就此會中有十一品經於中前九品明生解因修及所成果後二品明出現因果前中初六品明第十地勝進行亦等覺位行後三品明佛果德相前中分五一初二品明業用廣大二次一品明行相深奧三次一品約能數數顯所數多行四次一品約時以彰行廣五後一品約處以明行遍就初二品即分為二前一品依定時用後一品據智辨用就前品中分為三分一序分二爾時普眼下明請分三普眼普賢菩薩下明示説者分就初中二先辨時主處等三種成就後與十佛剎下明衆成就前中二初總相舉三種成就後始成等下別顯時等三種成就前總相釋具如初會後別顯中初始成等約主顯時亦如上釋二於普光下約主顯處問此會既在普光明殿何故經首云阿蘭等答此義如上第二會初已廣分別三入剎那下別歎主成就中十二句分四一明能現二現如來下明所現三能合下明益物四恆住下總結現因初中二句初一顯定名體是能發起後一辨智及通是所發起前中名剎那際者有二義故一為顯所説行相是於有為界修行行至後邊際故本業下卷云菩薩爾時住大寂門中品忍觀功行滿足登大山臺乃至云唯有纍果無常生滅行過十地解與佛同坐佛坐處其智見常無常一切法境界當知如佛名為學佛下地一切菩薩於此菩薩不能別知於佛名菩薩於此下菩薩名為佛二為説有為行相即真際故後所發起中二初一顯正體智故云一切後一明佛神通故云自也此通為二能一能顯自三業二能令他見不應見故不應見有二種一上非下境故二意業非眼境故二次二所現中七句於中初三身業先一總舉後二別顯別中前一無障後一無著問佛身元不隱何故言現耶答現其身中三業作用故初但云身者言總意別故次二意業中前一離緣外境後一內住於止次一身業謂福慧內充而外威敬畏後一意業謂常處世而不著世三次二益物中初一正明令見聞悟益不應見見故後一益悟應時謂感赴合符然有二種一稱根漸頓故曰隨宜二相會如期故云不失於時四末後一句結總上所現不離定心定心恆住一法性故上來辨三成就竟第二明衆成就中五一舉數同前會釋二靡不下歎德三其名下列名四如是等下結數五往昔下集意就第二歎德中十句分二初五歎自分德後五歎勝進德前中初一時位極故云灌頂若依仁王經此是第十地若依本業經則為等覺位此經通二廣如前説二行修滿足如文可知三明所具之行深而且廣此行既廣無邊量也四成就大定普見無涯故云獲諸等上明自德深廣五大悲等明悲德廣大利物難量後明勝進德中五句初三同佛三業一身通用同佛果二深智入際語演實義三意業種智降伏四魔後二明無住行初釋後結前中不住涅槃故入世間也不住世間故心恆寂也下句結德屬人此是彼菩薩無住解脫三列各四結數並可知五集意者謂此皆是往昔與佛同行故令預會餘同前序分説竟自下第二大段明請分中四一普眼請問二佛言普眼下許問三普眼菩薩言下正顯所問四佛言善哉下歎問利益第三大段明示説法者分中二先示法所屬人後爾時如來下答前所問法前中文有十段一示人令問二爾時會中下聞名獲益三爾時普眼白佛下重問重示四佛言如是善男下顯普質德深不見五爾時普眼菩薩聞下聞普賢德獲三昧益六佛言如是如是下重顯普賢解脫自在七善男子若有下見聞普賢獲益八爾時普眼及一切下衆於普賢渴仰九爾時佛告普眼下教起方便十爾時普賢下為現令見就初段中三一示入令問於中復三一示其處二已能下歎德三汝應下教問初中可知二歎德中十句一成勝通二出過下最上難過三從於下兩行生身四大願已淨五行成不退六度七據八辨九悲益物十本願無盡三教問中令見其意故第二段中三初得十種益二其請下希欲見然不見三此由下釋隱所以為欲令希仰普賢重獲勝益第三中同前不見可知第四中二初徵不見後善男子下釋為德深不見有十句一住離言真如故云甚深不可説二智德無邊三大定奮迅四勝通自在五入最清淨無礙際一切三世間等並在其內六生十力智七法性為藏一切三世間等並在其內八諸佛共與力九念頃證諸佛平等智十是故下總結不見第五中普眼聞普賢深德獲三昧即用此定觀彼不見白佛申意第六中三一初一句標不思解脫二普眼於汝下以法喻於中二先喻況後佛言下法説前中二先問後答問意云幻字中諸相住處有能説耶答意云幻相無實彼無住處故云不也後法説中二先牒前幻相是虗假粗淺境界猶不可説普賢三業俱祕密境而可入見入謂意識觀察趣入見謂眼覩三何以下重徵釋前能入是言於中二先徵後普賢下釋前徵意云普賢既是因位有何深德不可入見後釋中十一句分二初一句總後十句別總中三一讚德深超言慮二讚德廣過數量三過量故不可具述俱應舉要而言別中一以金等者慧力威猛照相皆云如世執金剛杵者以杵擬須彌等使碎為塵此亦如是如上文云以金剛智普照境界同一法性是也二於剎常行而無行由前慧力故三無住者義如行釋上三據依果辨四知衆生身等者身相泯故五無去來者於剎中能行者不可得故上二約正報説六得通名無斷盡者化用無息故無差別者平等化故自在者所作無礙故七無依者通加行心回寄首離根境識故八無作者離於功用成辨業故九無動轉者往還變現相故十至於等者法界無餘故上來十句初舉普入末舉至際是舉要言之所餘無量略而不論第七中明於普賢見聞等十種事皆益不空文易可知第八中衆於普賢心渴口稱身禮並亦可解第九中二先教後行前中二初十句明正教後若能下總結正教中一教禮求請二普觀十方三想念其人四思遍法界五欣德厭失六誓同行願七入不二法門八身普現在九悉知下知法器十遍一切下遍修普行後總結可知第二行中謂依教而行爾第十中有四一以解脫力為現色身者難見已表得應現故二令彼下正明得見於中四一見在此處二見餘處來三見彼説法略明五種一説行法二説佛後得智隨世俗方便化三明菩薩通四説菩薩威德五現三世佛境四是時普眼下衆菩薩見普賢身及前狀已喜躍頂禮尊如見佛三是時以佛下其文兩勢一由衆見普賢現身等狀慶喜之瑞二為普賢將説十定豫先瑞應雖通二種今且依後文中二先明瑞因後自然下正明瑞應前中可知後瑞應中七一興雲雨物故云雨雲先總後別可知二不可説下動剎三奏下鼓樂四放下放光五令下息苦六嚴下淨剎七令不可説下益衆於中三一創相應者名入二先已習者名成三久修者圓滿四爾時普眼下歎普賢德於中二先普眼歎後如來印述前中十句約人住位以顯其德皆是果位名字初名如前釋二除佛所餘無與齊等三衆惡已斷四衆德無退異二我故五等現衆生六言教真實七大悲隨俗八大智稱如九善巧調御十解脫業用後如來印述中亦有十德於中二先印述後普賢下正顯顯中二初總顯無數後所謂下別説十種皆約數數顯其多德數名如阿僧祇品説一誓願二法財三戒四忍五身業應感六語業稱揚三寶七意業思法八但顯數不明德檢梵本九同諸佛德十無盡善根上來答第一示法所屬人問竟第二答前所問法中二初列名歎勝佛教令説即為本分二爾時普賢菩薩承如來下依教廣陳即為説分前中四一舉益令説二何者下列名示法三此十下歎其功德四是故普賢下結勸令説初中二先佛誡普賢説益此衆後諸菩薩下後益三世菩薩此文須勘梵文令出離前中初始善入後終令成滿普賢行願二列名中此十定是因滿者之定故皆云大顯定加行共為名故皆結云三昧善巧智列普光等名即為答前何定問也顯其十數答前幾定問也一普光明者有二義由住此定了知身心無有實體其身普住一切佛境以佛智光明修菩提行故二由住此定觀察法身見諸世間普入其身於中明見一切世間及世間法釋曰普是外境光明是內智雖有兩釋前釋為勝二妙光明者由住此定能現多身放多光明現多妙用故三次第遍往諸佛國土神通者菩薩由住此定能以神通遍往十方各過阿僧祇剎塵剎中皆入此定故四清淨深心行者由住此定能知一一佛身等衆生數見阿僧祇世界塵數如來一一佛所皆以深重清淨心種種供佛請法稱讚故五知過去莊嚴藏者此菩薩住此定故能知諸佛出世即為莊嚴國界從佛出生無盡善法是故佛即是藏依過去門顯佛比德故名為過去莊嚴藏亦名過去清淨藏者佛是清淨者故能淨世間故餘如前説六智光明藏者由此菩薩住此定故能知未來一切世界一切劫中佛所有事業能以智慧皆悉了知依智起於照用故曰光明七了知一切世界佛莊嚴者此菩薩住此定故於現在世能次第入十方世界皆見諸佛示現種種佛事利益世間八一切衆生差別身者此菩薩住此定故入定起定內身入外身起外身入內身起等差別多門雖亦通依三種世間且依衆生一相而説九法界自在者菩薩住此定故知事法界邊際與理法界邊際不一不異得如是知見自在無礙故十無礙輪者此有二義一由此菩薩入此定時能住無礙三業等能圓滿佛果即初十句釋無礙義得菩薩下十一一句牒前起後能成圓滿佛果釋輪義二但取初十句釋無礙輪謂住前九種無礙故能成就第十轉無礙清淨法輪也三歎德中三初總歎謂大人能入三世間説二若諸下別歎行人所得功德三是故普賢下結勸令説別歎行人德中二先明受行後如是之人下顯得益前中略舉四種一於十定深生愛樂二尊崇貴重三習學修行四精勤不懈後明得益中五一上同佛果二此菩薩下周遍普入三此是諸菩薩下明該攝諸法四若菩薩入此下明勝德無限五得法界故下明智德自在此五段中各有十種初中十種皆是佛果異名準釋可知二周遍普入十中一普入世界通帝網等處下諸句皆通帝網準知二普入衆生界三普入法身四普入即理之事法界五普近三寶初佛次法法中二後僧之中二六普得三世佛知七普知三世法八普説佛教九普轉法輪十普成菩提三該攝諸法十中攝為五初二境智一對次二因果一對次二三業一對次二佛法一對後二嚴土攝生一對四勝德無限十中一稱法界力故云無盡二行等虗空三位齊法王四智無不達五十力圓滿六心無不寂七大悲自在八智力有餘名為丈夫九燃正法燈破無明暗十結德無盡非二乘了五智德自在十中一理智不動二量智隨俗三無相入相四得種性家生五説別了無六法施知時七開悟名智八攝生令淨九示得果而不捨因十得果智巧現通四結勸令説可知上來本分竟第二説分中三一承旨總告二佛子云何下別釋十定三末云佛子此是下總結初總可知二別釋中十定則為十分一一分中復各三分謂徵名釋義結名就初定中初徵可知二別釋中四一智無盡二佛子此菩薩摩訶薩發下明無邊心三佛子此菩薩摩訶薩有十種入三下明入定差別四佛子此菩薩摩訶薩有十種入大下明入定善巧智於此四中末後一段文明入定方便次前一段明定業用又次前兩段明定利益此四段文倒安布者隨方語言儀式異故未回文也今且依文次第解釋於四段中各有十種就初兩段二十種同辨定益中初十明智無盡後十明發無邊心前中初二品能化所化智無盡次二任運應現照徹無性智無盡初二善攝不退智無盡次二能轉所轉智無盡後二始修智無盡後明發十種無邊心中初二救生事佛次二供佛見佛次二轉法現通次二為得果不捨因以入微細智説法次二入佛不思境於佛辨起志樂領受法末後一現自在身入一切佛會此增數十故三明定業用十中約諸方入出不同故云差別從加行心共名故復云智其十種者約四方四維方及上下方相望入出故四明定方便善巧智十種中二先十種法説後佛子如羅睺下喻況前中十內一依定起巧智現大蓮華二身遍華坐三身內現大千界以是百億箇百億故重言爾此數亦合著小百億成大百億也六於彼下現菩薩修行七一一菩薩下牒行生勝解故云決定解八一一決定下牒解令根性滿九一一根下牒根成法業十就所現總結自在後喻況中二初修羅自在喻後佛子譬如比丘下觀身不淨喻前中二先喻後法何況菩薩説法以劣況勝前喻可知後法説以劣顯勝於中十句初五句約喻顯法後見如實下五句就法辨德可知二觀身不淨喻中有法喻合並可知上來釋説是名下結名可知釋初定竟第二妙覺定中三初徵次釋後結初徵可知次釋中二初就法説後約喻辨前中十句明妙光定力令菩薩身於諸世界能入能納於中前六重身雲重入為調伏衆生七是為下別明所知所入諸雜世界八是諸世界亦悉下明即彼所入世界還即入於菩薩身內九身所入界界亦入自界內身中而無雜亂十種種法亦不壞滅後約喻辨説中有六喻一寶山光影喻二佛子譬如幻下明幻現時處喻三如有幻師下時幻事不壞本法喻四如世幻者下明幻必依處喻五菩薩摩訶薩得不思議下明同佛幻智喻六如彼幻師下明幻師不迷幻事喻就初喻中二先喻顯後佛子菩薩下法合前中有四一日照七寶山現影後照山間水內影現二其寶山上已下明山上日影共山間水日影互相照現故云更相影現三或説下明相現名出入謂此影現彼此名出彼名入彼影現此準之又本日出時謂從山等處出本日沒時謂於山等處入四但此下時互無初際體實非有相現非無不住山等結山上也不住水等結山間也次法合中二先明相入而不壞後觀一切下釋所由以世界在身內不壞世界不滅諸法又以世界在身中故云不住世界內以身還在身內世界中故云不住世界外以同時俱現即不住內外世界與身不可分別故云無所分別而亦不壞世界本相後釋所由中謂一相無相故得相入雖無相而不滅虗相故恆不壞也真性不礙於虗相故云住真恆不捨也此是法性融通門也第二喻中先喻後菩薩摩訶薩下法合前中四一總舉幻事二別顯幻時長短三隨其下明幻處四不以下彰幻與本法互不相礙後法合中五一此云現者準下結中能以無數剎入一剎二其阿僧下明彼剎中三世間染淨人物等同入也三菩薩於此下明入時相狀四何以故下徵釋所由五佛子菩薩如是下結成上義初二段可知三入時相狀中二先明能見後不以下明所現前中三初一句總標次五句別顯後一句總結初云菩薩於此者於此多剎入一剎也別中普明見者謂同時頓見前三世間淨染人物等故下普字並準此二入者頓見入故三觀者頓觀諸剎佛會故四慧者頓聞諸剎佛説法頓思惟故五了者既思惟已頓解了故後總結云以無盡智者常智故如實智者稱境知故後所現中兩句先明多入於一一不為多所逼破後顯一容於多多不為一所損滅也四徵釋所由中二先徵意云以何義多入於少各本相如故而不相壞故後釋中有九義約九觀九名以顯若開第一第五中各二名則名有十一也其我差別名諸聖教中或依人執説或約法執説今此通二顯二無我初云菩薩知等者二無我觀也入無命法者法無我也謂命是不相應行法行蘊所攝故智度論云命謂計有我衆生等命根成就故言衆生者顯五蘊故無作法者者人無我也智度云作者謂計有我人用手足等作衆事故入字通人法兩處謂俱證會故二菩薩於一切等者無諍觀也謂勤修二無我行時不見人法中有二相之諍故住無我法者瑜伽云我謂於五取蘊我我所現行故今此言無照彼空故二菩薩如實等者緣起觀也照身從衆緣而起無能起者故云如實見身也住無衆生法者智度云衆生見謂計有我人依於五陰和合而生故今照彼陰無和合故智住此理故云住住亦名行行此理故四菩薩知等者無生觀也觀有為法剎那生滅不得自在何能為因而生於果補特伽羅者瑜伽釋云數數往取諸趣無厭故謂不厭其果而數數造因造因故數受其果令知彼唯是一聚有為生滅了無造因往趣之者五菩薩知法等者性平等觀也意生者勘梵本中名摩努闍謂有作此計云我是意生者依止於意或高或下生故摩納婆者此云儒童謂少小而有學植者仍要是四姓中婆羅門種不爾雖小有學但名俱摩羅此云童子也今此知諸法性平等故意生高下及四姓中高皆不可得故並云無以其二名義類同故一處列也六菩薩知一切者等性寂觀也菩薩觀無明風擊藏識海雖生死洪涉爛汗三界而有為本寂初未嘗動七菩薩知一切一相者無相觀也住無分別法者分別亦是差別之言謂一切法同一無相故名一相一相故無差別相通體相及相狀相上來七門是會相歸性顯理事無礙便顯事事無礙依展轉説八菩薩知法界等者法界無差別觀也謂即理之事此彼互望相有差別由解脫業用令互鎔融相即在等同一無礙名無差別住不思等者從無礙業用為名亦通德相文云菩薩知故此正合前多入於一事事無礙法界九菩薩勤等者大悲觀也是前菩薩勤以方便對應度者現此事事無礙境界是極大悲調機也此位菩薩寧有勤耶雖無功用約化不息名為勤爾五結成上義中三初牒前然現二智無數下略明前三世間淨染人物等三亦自見下明無礙行相初中可知二中五一牒前諸國土無量衆生等二無數菩薩者牒前菩薩衆會等三觀無數佛等者牒諸佛出興四彼諸如來所説等者顯前句中佛興説法五諸菩薩等者顯前菩薩句衆會總法此則略牒結也三明無礙行相中二先明行相後常勤下明修觀前中三一此菩薩自身在自定境界中二然不捨下顯法界無礙體用謂體一故不捨此彼不礙用故見在此彼約體不異約用不一二彼身下唯就體顯不異三入法界故一句結歸所依謂菩薩見身及處得此不一不異無障礙者由證入法界無礙體用故也第三喻中二先喻説後菩薩摩訶薩下法合喻中可知法合中二先正合喻後菩薩了知下類知諸法皆同幻化於中二先總後知法下別別中七句三重展轉遞起一牒前起後謂由知世幻故知此能知智亦幻二由了能知智幻故此智起業用亦幻三由知智及業幻故後以幻智觀所起業用也第四喻中先喻後菩薩摩訶薩下法合喻説可知法合中世間依空合彼依所有標起徵釋可知此中虗空是真性之空是非事虗空也菩薩能於空中見世亦能於空修業者以了如幻於無處現有故又一念現多不令念廣者皆如上幻與本法無礙故也第五喻中三先法説次思惟下喻顯後決定下法合初中三句一明所住神力業用究竟故云到彼岸二住幻際者際謂邊際智契即有即無之理極處也三於世中諸法並在幻數菩薩善達故云入也二喻顯中四句分二先一句總後三句別顯前中凡所思莫不皆然故又此幻法恆不離心故云思惟也別中一不違幻世者不礙存也盡幻知者不礙亡也凡是幻法要具此二義是故約境智互舉存泯理實齊具二了知下明境智不異也三決定下心是幻法不可其邊際也次如諸下引佛幻智為喻後摩訶薩下合法同喻可知第六喻中先喻意云幻師身雖不同彼幻而明了於幻後法中菩薩心雖不我入法而明了於法離常斷故不壞真俗故後結可知上來第二定了第三次第遍往諸佛國土神通定中三先徵次釋後結初徵可知次釋中三謂法喻合中五一於一切處入定二或剎那下於一切時入定三若久下總結差別四菩薩於彼下明不起心念五雖離下不廢起用並可知第三竟第四清淨深心行定中三先徵次釋後結初徵可知次釋中二先法説後佛子如散動下喻顯前中三初廣知諸佛次於彼下廣興供養後然於下了無所得就供養中二先十種外事供後於彼一一下明內三業供初身業次語業後入下意業後了無所得中可知第二喻顯中有三喻初明應念無知喻喻合可知二如日中下明陽焰非水似水喻喻合可知三佛子此三昧名為下寤憶夢事喻有法喻合合中二初合不忘後而以此下明以所憶法利益衆生後結名可知第四定竟第五知過法莊嚴藏定中三先徵次釋後結初徵可知次釋中五一知過去佛出現所作次第之相有十句可知二佛子此菩薩摩訶薩得下明增廣智前所知剎益於中十句內第五云知法者有二義一知教法二知世出世法餘並可知三佛子此三昧名下明一念入劫從少至多有十三重可知四佛子彼菩薩下明雖入過去定而不滅現在法亦不作功用緣於過去故云不緣過去何以不滅現在者若滅現在者即無過去可緣所以者何九世尚即一念一念即是九世況唯過去與現不俱耶五明出定獲益中三初總辨舉數謂位終成果名領受不思灌頂法二屬己名得三得淨治名清淨四究竟名成就五契合名入六證會七圓滿八住持九平等普知十三輪淨者三業離障也二何等下別中十內初四是四無礙解可知二心言無失次二於未受苦者為依令免已受苦者救令得脫後二因善勝果位妙三結得時達法喻合可知結名易解第五定竟第六智光明藏定中三初徵次釋後結初徵可知次釋中有十門前六正明此定業用後四明住定得益前中初一總知未來諸佛二所謂下別知名號有九句三常出現下明佛所作事業有十二句初二出現利生次二作法王紹繼先佛及降魔伏外等次二説世出世福次二説進善治惡正分者善惡二分中善是自分故次二明於相修無相後二位滿成果四彼諸如來下明智彼佛因圓果滿十句可知五彼諸如來名姓下時亦知彼佛出生名姓所作事説入涅槃等六此菩薩下於一念中能入如是無盡劫者釋上所知未來諸佛所出劫數故言入大千世界塵數劫入佛剎塵數劫此文須梵本準第八定中從大千後至百千億那由他大千界故上來正明三昧事畢後四門明住定得益者一得入持門益二佛子菩薩摩訶薩住此下得善功益上二自利也三佛子菩薩摩訶薩如是下得不空益四佛子菩薩摩訶薩住此下敬養益上二利他也初中有十種一心憶持佛佛護念故二心住持法得總持辨三住持行令願滿四神力無能伏五智力持所行法無礙六以悲持法為物説故七巧持句字令法明淨八不畏生死流轉即受生三界名師子受生法持謂心如此勇猛大菩提志不避淤泥方出淤泥也九以智力持行不休息也十善友力任持淨多機故十一無住之力所持能入多劫十二以善巧智知諸法性淨此不入法之力任持也二法得善巧益中有三初法説次佛子譬如日出下喻顯後此大三昧下法合初中有十二種初二巧住時處處次三巧知衆生根類次三巧知衆生根行思念次二巧知説法及佛興後二巧知通慧次喻顯中明日光無念喻後法合可知三得不空益中十種謂若有衆生於此菩薩三業所作見聞同住等皆獲勝益無空過者故名不空其文易可知四由於衆生有此不空益故遂得天等十王賀恩供養並易了第六定竟第七了知一切世界佛莊嚴定中三初徵次釋後結初中兩重徵者初徵義後徵名後釋義中先釋其名後為釋義謂住此定故能次第入十方世界是了知一切世界也皆見諸佛出興現神力等是佛莊嚴也於中二先明此定體後佛子菩薩摩訶薩住此三昧成就下明得定利益前中八一明住此定能入十方世界者是現在世界以異前二定明過未故也二皆見下明於彼十方諸世界中廣見諸佛出現業用十事然非是一佛有十事乃至通十方多佛同皆有此為顯無盡故明十也下諸門並準此知三亦見諸佛衆會下明見諸佛眷屬徒衆所被機等十類差別可知四亦見衆會其量下見衆會多少數量不同二十門欠一可知五亦見諸佛於彼下見彼諸佛各於自衆會中各示異相以化衆生故云種種相住時多少故云種種時等十種並準可知六菩薩摩訶薩亦見自往彼下明菩薩往諸衆中或説法持法乃至自見入諸法等十九門七如是見時下明在定雖見而心不動亦無分別法喻合法中八句可知喻中明所詮諸法自不能分別自性然不捨自性能詮音聲名字亦爾不自分別亦不滅名字合中從後合不捨於行行謂菩薩自行合自性不捨捨隨世所作合名字不滅也而於此二無所著者合前二住各無分別也八佛子菩薩摩訶薩見佛無量光色下明見佛色量不同於中五初見分明二或見佛身種種光下十種明見佛身色不同三或見佛具量下明見佛身分量不同四佛子菩薩如是見下約所見佛身色形業用五佛子菩薩如是見於佛身下明見有差別佛無增減於中有三喻一空無增減喻世人將芥子檜中虗空與多世界中虗空寬狹不同而真空不爾隨事大小理各無限亦無二相故無增減合喻可知二月無增減喻法合可知三受生心現喻謂善業見淨法合可知梵本中云譬如衆生命終之後將欲受生憶念所從心淨無礙菩薩摩訶薩亦復如是住此三昧以佛智故知諸世界種種莊嚴心淨無礙佛子下同上來時三昧體用竟第二明得定利益中有七種一得速成行願益十句準釋可知二佛子此菩薩下得法印同佛益十種中初二福慧同次二二諦境同次二體用同次二無住同上句不住生死下句不住涅槃後二善巧平等同三佛子菩薩摩訶薩成就此下明以德成人益於中二初總標定名顯修成憱後是老師下正明其益於中皆先標人者後釋德用初二為一對一自德不由他二大志能悟他次二為一對一內達性淨二外救世間次二為一對一安慰恐怖二令住種性次二為一對一智實二言實後二為一對一法藏內滿二法雨外灑四佛譬如下得廣大知藏益於中二先喻後法喻中明天帝髻珠喻有十勝相可知法中十內初二照剎知生智次二變化入佛身智次二佛法淨法智次二令入法身見法智後二到岸無餘智五佛子菩薩摩訶薩住此下得寂淨威德身益謂身放光及變化現自在故名也十中一照剎二令淨三調生四近佛五事佛六供佛調生七成就衆生八遠方請法九令見聞不空十開祕密法六佛子菩薩摩訶薩得此下明得利他圓滿益於中二先牒前起後後何等為十下明正顯顯中十益初二令見佛信佛次二令聞法知剎次二令見佛力業力次二令定圓入佛淨境後二令發心智圓梵本中云能令衆生得十種加持圓滿七佛子菩薩摩訶薩令衆生下明轉利他令得作佛事益於中二先牒前起後後何等為十下正顯顯中初二以聲色開覺衆生次二內以憶念外動世界次二覺中方便夢中現相次二以光照修行次二以成佛轉法輪後二以住壽入滅為佛事此有十二種是增數十也後結名可知第七定竟第八一切衆生差別身定中三先徵次佛子菩薩摩訶薩住此下釋後是名下結初徵可知次釋中三一以住此定德十無著法準釋可知二佛子菩薩摩訶薩於此下明入出三昧之相於中初問後釋成釋成中有法喻合法中略總辨有十類或於正報衆生六趣形互為入出或依報事物中入出或依正相對入出或約數多少入出或衆生數多少中入出或染淨衆生互入出或於眼等諸根入出或於微塵多少中入出或異聖身入出或念劫入出或於理事中入出次佛子譬如有人下以四喻略合前法初明鬼力持人喻法合可知二呪起死尸喻法合亦可解三羅漢現通喻法合可知亦易了四地一苗多喻法合準喻三佛子菩薩摩訶薩住此下明住定得益相於中五一得讚同佛果益十種可知梵本云住此三昧以十種稱讚法得所稱讚二得光明照曜益亦十稱可知三得無所作益亦十種並明業用無作可知四佛子菩薩摩訶薩住此下明於此三昧入出自在大用境界中二先法説後譬如幻師下以六喻喻其大用前法説可知喻中一幻現六境喻二修羅潛入藕絲喻上並法合可知三農夫下種喻喻菩薩一多自在德四受胎生長喻喻菩薩三昧成事德五龍下雲上喻六梵宮普現喻喻並法合可知五佛子此菩薩下明到十通岸可知後結名易了第八定竟第九法界自在定中三先徵次佛子此菩薩下釋後是名下結初徵可知次釋中三初正顯定體用二菩薩如是善知下明得定所成益三佛子譬如無熱惱下明喻況前二初中四一於自身諸根毛孔入定了三世間法二菩薩於彼下明多劫修行三又於下明於彼多劫入出三昧及作所作并釋成以於法界得自在故四善分別下明以於法界自在故能善分別六根等盡其邊際可知第二明得定成益中有十種一生起成就十千億功德有二十一句可知二佛子此菩薩摩訶薩復有下復得無盡功能有二十句於中初十明所具之能後十明能具之相三佛子菩薩摩訶薩住此下明為十方佛攝受於中三初為佛所攝二為現説法三令修下令獲益入法四佛子菩薩摩訶薩住此下結彼諸佛護念成益五佛子菩薩摩訶薩住此下得十海自在益可知六復得十能益易了七復得十力益於中二先別明十力後通能多力八佛子菩薩下結具如上諸勝能十句可知九此菩薩功能下明無能説此菩薩功能邊際十此菩薩所獲下明功能廣多説不能盡上明利益竟第三喻況前二中三初法説次正喻後法合初中二先了知乃至不可説不可説三昧二亦了彼一一定中所知所作並可知二正喻中略辨三義一池出四河二河間華草三法寶影現廣有多義如下合處辨三佛子無熱下合法於中有十二門一以四辨合四河先總合後別合於中無盡辨是樂説力也餘並可知二如四大河下合菩薩三業隨智流注四方入果海合四河繞池入四海菩薩四方者一見佛二聞法三智圓四悲滿三如四大河間華等從菩提心説法調生令見嚴土合之可知四如無熱池下以菩提心無邊合彼縱廣淨善充滿無濁離垢可知其於菩提心中間六字梵本云於所化境中五如無熱池下明菩提智寶嚴岸並散善香對合可解六如無熱池底下微妙智等合金沙種種法寶合種種摩尼等七阿那下菩薩現生無染合龍王無惱八四河潤等下以菩薩四智潤澤人天令入佛海一願智二行智三寶智四悲智對合可知九如四大海下明菩薩行終極入佛果海十如四河下明行智入佛海無能為障十一如四河下明行入佛海無疲厭十二佛子如日光下明菩薩於一一毛孔見不可説不可説剎塵等佛合彼金沙等互相影現二何以故下徵釋涉入所由有十門可知二佛子菩薩摩訶薩雖能下菩薩權實雙行自在門二十句可知第三句云雖善入剎那等者梵本云雖善入剎那際定利益衆生下並同也次後云譬如虗空等者梵本云譬如虗空雖能容受一切諸物而離有無想後結名釋第九定竟第十無礙輪定中三先徵後佛子菩薩摩訶薩入此下釋三佛子此是下結名初徵可知二釋中二先明入定時三昧業用亦即顯此定名後佛子菩薩摩訶薩住此下明出定時三昧業用前中二十句內初十一句約因行辨用後九句就果門辨用第二出定時業用中六一觀佛智用二佛子此菩薩摩訶薩有一蓮華下明現事成行用三佛子菩薩入如是下明證入諸法用四佛子此菩薩摩訶薩住普賢下明住普賢行用五佛子菩薩摩訶薩以此三昧下明上攝果用六佛子菩薩摩訶薩住此下明正同佛果用初中三初正觀佛智二何以下徵三此菩薩下釋初中九句初一結前生後此總句次二觀緣真智三觀緣俗智四緣真智用五緣俗智用六常緣體用不捨七八由常緣故常見二智九由常見二智見果不捨因鎔融行願於中二十句初十體廣後十用恆二徵意云何以得此如佛體用故三釋意由成就大願等故於中五一法説二喻説三法合四徵五釋初中八一成大願此亦總句二起大行三入方便海四巧慧照行五覆因神變六同佛護念七常悲衆生八得佛常法二喻況可知三菩薩摩訶薩下法合言成就智慧以為心寶者合前巧慧照諸菩薩行如摩尼寶觀一切智普皆明現者合前觀一切智常見見然不捨於菩薩行者合前得不捨因如摩尼雖同衣色不捨自性四徵意云既成如來不變異法此即因修果滿何以復須行菩薩行五釋意云菩薩無障礙願法應爾故但隨衆生所須即應不唯現佛不唯菩薩乃至一切於中五初法説二喻況三徵四釋五合初中九一發願此為總句二益生三度生四事佛五嚴剎六慰生七契深法八財法施九照世如幻心常不失不易不倦不滿故云不退等也二喻三徵四釋並可知五合中五一正合前法喻二佛子譬如涅槃下喻前合中無倦三徵四釋可知五合中五一正合法喻二佛子如薩婆下喻況三何以下徵四一切智下釋五菩薩摩訶薩下合上來初段竟第二現事成行中三一現神通事二佛子菩薩摩訶薩住此下會事成行三佛子菩薩摩訶薩以此開示下證行勝能初中二初明依果殊勝後菩薩摩訶薩於此華下顯正報自在前中二先明相嚴後此大蓮華下明能並可知後正報自在中二先明身量廣大後一切諸佛下明佛加放光前中可知放光中文有二十重一一中數皆百萬億那由他不可説佛剎塵數等然始從菩薩一一毛孔乃至衆生調伏展轉遂現數倍漸增至第二十難可量也二會事成行中七十五句分二初明證體後成就下明證用前中六句一牒前起後此亦是總句謂會前所現事通力緣現無性稱真故不生染著二安住等者於中二初標法體後無去來下重自釋標中云安住者證會相應故無邊等者謂中邊相盡不可説故自住性從證門説故性淨等者不為客塵汗故如來種者聞熏此性成佛性故無礙等者體無際限故釋中云無去來等者釋性淨故彼無底釋無際現量等釋安住心不迷等轉釋悟字三諸佛印可四還源五正智緣真六後得了俗二證用中七十句分四一依證善巧行二功能下廣大法界行三所證下證菩提行四入不二下明無住行初中九句初八別説後一總結一示如來藏二緣俗智境三語業化物四出到菩提成滿鄰向佛住故云趣丈夫五無間道智所斷境微細礙等不能為礙六得等覺正智能起安立思擇等法智七以本願力受隨類生八現通化物九總結善巧二廣大行中十六句初別説後一句總結別中一福慧圓淨二智用廣三觀佛境四住願堅五福無盡六於如來藏及佛所覺能覺常觀以增明其智故云積智寶七淨無明住地八不空三業九見多佛十照染法相盡十一照淨法究竟十二以主伴同善根行故隨佛所在攝法上首十三佛護念故成法身十四得無忘失十五定心絶寄十六總結廣大三證菩提行中六句一所證廣能證離二益世三證真故達俗四境離三輪名淨施此解不動名住心從此慧成名淨種淨種是成佛正因故順生菩提也五中初標善巧後具徵下釋謂離過力堅六知佛威神四無住行中三十八句分二初一句總標餘皆別釋初中總標總釋謂住無相法四字釋入不二門四字此中住無所住無所住次別釋中一無説説二了欲等永無而常調生三身即法界法界即身四智無盡五勤難壞六見佛福源七了劫八法化九住剎十嚴土十一中初標後演下釋十二示大悲法十三示善趣行十四所生見佛十五得等覺智因位極十六能齊佛故攝受次鄰佛位故未來入佛數十七尅遂到此皆諸佛力十八福慧俱勝十九受説皆如大雲二十證會究竟故更無有礙二十一行無分別故心不動二十二斷微細著等二十三知教法盡二十四受隨類生二十五了深無作而用周法界二十六常説而無説二十七知假二十八無著二十九了空三十成法界行三十一真不礙俗三十二多德一顯一即一切三十三學佛所行大乘同性經佛有十地毗盧遮那智海藏等證契經同三十四由智免生死泥溺至佛果三十五照盡法性三十六深達地義三十七大願究竟三證行勝能中二初總顯十句後雖一切時下別辨初句前中初云以此者謂此前證行也開示者顯其勝能云何勝能謂由證行能顯無分別法性云何能顯謂於一切法有不礙無無不礙有即由此能名為方便是行遊入名為門下九句可知後別辨前總句中有無無礙義總四十一句分二初一句明有不礙無以其有是無之有故亦即二而不二之義後四十句明無不礙有以其無是有之無故亦即不二而二之義文並可知第三明證入用中四一顯證功用二而此下明用離念三何以下徵四菩薩三昧下釋初中十句初一句總標定名後九句別釋定用名中正應云大威德智輪三昧經依梵文勢隔越故以智輪兩字安三昧下大威德者因定之中此定勢力最勝故智輪者有二義一所依義如四輪相依謂此定為智所依能發金剛會故二摧伏義謂此定所發之智能摧如金剛惑故別釋用中九句皆是佛地之法此菩薩得此定故即能尅證彼是故皆云即能也於中一證佛所證法性二契教同佛三成神通同佛四果圓同佛五積行究竟同六斷惑盡同七住聖天梵住同八十力智明同九照境一法性同二用離念中十二句分二初兩句明能得定人及所得定法可知後十句明念所離於中一是前積集究竟二三兩是前清淨四是前成就五是前了達六是前安住謂四禪四無量三空等皆依思惟故七是前證得八是前趣入九是前與一切法自性相應三徵意有三一者何以此三昧用要離能所念故二者何以入一定然得多果法故三者何以入因定能得果法故釋中二先正釋前徵後此三昧下轉釋第三殊勝前中次第釋前三徵一謂此定體離念故用亦如體二此定雖一而德用無邊故能得多果法如一心力生種種法三雖是因定而威力殊勝故能得佛所得後轉釋第三殊勝中二初略舉三德後所謂下廣釋第三德言境界者定所緣故威力者得勝果教深入者契徹故後廣釋第三深入中二十八句一無盡智智即是門二諸無相忍三多彼岸行謂離三輪故四諸定五智包法界六見如來藏恆沙德七所度境八證信等九迅疾通十所證理境十一得平等見佛眼十二積普行十三堅智身十四説佛智廣十五起多神變十六生諸佛無盡智門門即巧方便也十七諸佛現前觀十八淨普智謂令障盡故十九開普法門謂一即一切等二十智微細法界二十一境微細法界二十二智勝用二十三到神通岸二十四隨宜巧説二十五智身周法界二十六八相化物遍法界二十七差別定二十八知諸佛心第四住普賢行用中四一校量顯勝二佛子菩薩摩訶薩入普賢下住定加三佛子此菩薩摩訶薩如是下住定勝益四佛子此菩薩摩訶薩已到下明到普賢行際初中五一舉劣顯勝二何以下徵三知一切下釋成四佛子如如意下喻況五佛子菩薩摩訶薩如是修行普賢下結前定用歸普賢行初中云此菩薩住普賢等者謂若不入普賢三昧雖入餘多定終不見普賢三昧境界及佛境界菩薩行嚴前際等具如後十句顯二徵意云何以入多定不見普賢定境界等故三釋意云餘定雖多所知有盡而普賢三昧緣境無盡故於中十句一知法二知剎三知衆生四知前際五知未來六知現在七知佛境八知菩薩行九知佛所説境界十知幻心所緣此上初一總餘九別且略説十理實無邊然知此十及更無量皆是無盡四喻況中有三喻喻定用無盡一如意珠喻喻定應境用二凡夫生心喻喻定緣境用三龍王降雨喻喻定入法用就初喻中四一舉喻喻隨應無盡而珠力不竭二法合合定心如殊生諸境界隨應遺三徵意云定心既如幻生境非實何以能應而無盡耶四釋意云由菩薩得普賢無礙行智觀幻境隨應無盡謂觀境界從緣有故如幻隨緣應故如影像應緣無來故無增緣謝無去故無減無增減故無盡也二凡夫生心喻中四一舉喻凡夫各各三世生心緣境數多難測二法合可知三徵意云何以一定而多用難思四釋意以了普賢普幻門故三龍王降雨喻中三一舉喻二菩薩摩訶薩亦復下法合三是故諸菩薩下結勸修定初中四一降大雨滴二雨多無際三雲體無盡四龍王無作境難陀等梵語可知二法合中四一正顯法合二為一切下業用成德三何以下徵四譬如下釋初中四一住定業用二於一念下業用時分三如是入時下業用多定心廣四不疲下業用無作初初中二十一句初一總餘別此合前際大雨滴總中應云菩薩住此三昧亦復如是今須梵本故也別中皆云門者通智遊入故就中略釋三五餘可知準言自在者離世間品云智慧能入阿僧祇諸三昧故神變者化現難測故如離世間品説十種變化謂變化一切衆生一切剎等神通者於所知所作境無擁故難測故如離世間品説十種神通謂宿命天耳等幻網等者謂諸法各多因緣親疏相續集成如網無能獨立似有如幻言世界有體無體等者謂淨業所成故名有體妄業所成故名無體餘並準知二業用時中云於一念等者顯定力勝用於促時緣多法復皆攝境此合前降雨時三業用多定心廣雙合前雨無際雲無盡四業用無作合前龍無作境於中十句一由無功用故無疲二無疲故無厭故三無厭故無間斷四無疲厭故無休息五究竟故無退六純熟故無失七善達處非處八思生死涅槃九等等持十趣果無間二業用成德中七句一為世燈二轉多法輪三請法無限四示成多佛五調生不捨六常勤普行七現多色身三徵意云菩薩豈無行滿成佛何以業用無際限耶四釋意云菩薩本為衆生修行非為自求作佛所為衆生既無際無盡故菩薩業用不可盡也文中六一舉喻顯二菩薩摩訶薩下理釋通三何以下徵四此菩薩摩訶薩下重釋五是故下結勸勤修六佛子下總結修成初中喻意火隨緣起滅二以理釋中二初標其大心後乃至別顯廣業前中觀三境知空際初為衆生既爾菩薩行願無終極也後別顯廣心業用中六初一念頓等舉小類多也謂於一念間能至爾所佛邊故二於彼多佛所各入多世俗智境三化爾所多境淨信等根故四令多未至普門者得至故五以多巧慧人多三世三災大劫六於多三災世間起多悲願調生令盡離三徵意云何以一念起爾所多業用耶四釋意云普度衆生界淨普賢行願智五結勸勤修中初是故諸菩薩五字是前後應於下勸修前中謂結前住定業用緣境二十門也後勸修中二先明所應修法即前住定所緣法也後三昧之中下顯能修行相前中十一句初種類者是前入普賢三昧由於三昧中入三昧故云種類二境界者是前法三威德是前神通變等四廣大是前廣佛剎五無量是前不可説菩薩充滿六不思議是前幻化等七普照明是前智八諸佛現前住是前見諸佛及親近塵數如來九佛護念是前加持十成就往昔等是前知衆生根謂根由往昔習起今知已而成就故十一心不動是前心自在二能修行相中二初正顯能修行相後所謂下逐難重釋前中初一句總餘十四句別總云三昧中者明修所依勤加修者正顯勤詞別中略釋一二餘可準知言入難思智地者上攝佛位同性經云如來有十地一名甚深難知廣明智德地乃至第十名毗盧遮那智海藏地今此即是彼初地名難思是難知是智德餘文略也言諸法智等者法智即是二十一功德中盡一切疑功德謂佛能知器根有善法無善法智於佛此智但宜定住一味不應分別境智之異後逐難重釋者謂前句言略難解顯理未盡故此重明於中三十句一近佛開悟二説法益物三令物捨邪歸正四願觀出離五淨三輪成諸度六信佛七觀理餘句可知五總結前是定用歸普賢行十一句初一總餘是別此應準前釋普賢三昧緣境無盡十句配釋第二住定佛加中四一正顯加持二佛子菩薩摩訶薩如是滿足下加以成用三何以下徵四佛子下釋初中三一加所依謂住定時二十方下顯能加者謂多諸佛三與如來下正顯加相前二可知加相中十句一佛境之念二知能詮慧三所詮慧四果智五因盡智六常化智七無礙辨八神通九圓音十不空三業二加以成用中二先牒前兩段中一前成滿普賢行二次前佛加相二淨出離下正顯成用於中七句一滅障二成果智三輪化四成果福五普賢明淨第六句可知七説法盡未來三徵意云普賢行既滿足何以更須盡未來行調生行邪四釋意云菩薩無障礙願法爾故於中二初正釋可知後即為下顯願所作於中十句一法師二法日三智月四須彌五智海六法燈七示德八順佛願九修普行十勸衆生住定現用第三住定勝益中二初牒前加相中令得十法準配可知後證不思下正顯獲益於中八句一證不思解脫此依三昧不依勝解二正安住三因滿至果四因中習學若據次第第四是第一第三是第二第一是第三第二是第四思之可見五證即理之事參而不雜六於普賢多定出入無礙七住自在定發智八恆住十法藏此第八中有四一標二徵三釋四佛子下難勝標藏者法門之藏多所包含故如後影勝説釋中第六云平等相菩提者三世佛所覺法同一味故第十云觀察等者時微細法界故彰勝中云難忍受者廣大難可領受故餘並可知第四列普賢證中三初正顯益二何以下徵三菩薩下釋初標行體勝後開示下行用勝體中可知用中六句一開示善二增勢力三滿巧德四成行五聞義持六真俗無礙二徵意云既常住實際何以還隨世俗故三釋意云住定者法合如此謂本觀真俗無礙成故第五上攝佛果用中三一正顯攝果二何以下徵三菩薩摩訶薩下釋初中十句一得廣智二得廣辨三得無畏四得定方便智五得善巧六法光照到安世岸七知根生熱八照世令生智九具福為世範十示定令生慧二徵意云菩薩正修定時何故復能起業用耶三釋意云此定無礙故文中三一正擇在定不礙業用二於此下顯業用行相三佛子下逐難重釋初中十二句分二初句云菩薩等者標修定時後十句別顯可知二業用行相中十句分三初句牒前作業此簡持也次六句正顯作業時行相一無厭二不易緣二不易解四不懈五不疑六解緣俱不易後三句約前作業用此六心思惟作業乃至究竟三逐難重釋者謂前十句中初云不作餘業此未廣顯故此重明文中三初標略起次何以下徵後譬如下廣顯初標中二初標人後無異下標行行中兩句初反顯後隨釋文中難據利物相顯具説身語理實通意二獲三業無異何故菩薩即得此耶三喻釋意云菩薩本依行得名若無行從何立稱文中十喻即為十段一金剛難壞喻喻菩薩由不離法行為名二真金妙色喻喻菩薩不離善業為名三日有光明喻喻菩薩不離慧為名四須彌四岸喻喻菩薩不離善根五大地能持喻喻菩薩不離大悲六大海含水喻喻菩薩不捨大願七軍將明戰喻喻菩薩慣習三昧行八輪王護世喻喻菩薩依定度生九植種令生喻喻菩薩令物增善法十雲雨生種喻喻菩薩依定修行令物成佛前九喻中各二初喻況後法合並可知就第十喻中四一喻況二菩薩摩訶薩下法合三何以下徵四菩薩摩訶下釋初喻可知二法合中二先明菩薩法施合前降雨後乃至下顯法施益合前增長種子喻合可知後合中十四句十煩惱障盡二得斷果三得智果菩提願滿故安隱也四平等法身波羅蜜果位成滿也五永離五怖等六了根生熟七堪為應供入令行離蔽障檀度攝餘故唯説施九教證二法不可轉動或無功用位十緣真俗無礙如大般若第九説十一離二障所依趣十二四智十智圓滿十三得佛所覺果法十四展轉佛果益此最後兩句或合為一是諸菩薩等所成智謂依佛智聞法為先得生智已後展轉説法後後菩薩生智三徵意云菩薩依何行力説法然成此廣大益物四釋意由成無量證法界行故文中二先標後釋標中四一標人得法二由得法令慧明了三由慧明證入法界四證法界成多勝行行釋中二初略顯八種功德並可知後佛子下結其廣多結廣中二先正結行廣後於如是等下結前成行所因於中十句略釋一二言入智慧地者謂十地言同分善根謂回向法性故成主伴因故超世間等者與法性相應所修成故餘準可知第六正同佛果用中二初正顯用同佛果後爾時普賢下問答分別前中三初總舉同佛次何者下總徵後所謂下別顯初二可知別顯中一十句一相嚴二放光三神變四普身圓音五應現淨土六普攝語言七無盡辨才八説法無畏九念入三世十示佛莊嚴等二問答分別中二初普眼問後普賢下答前中二先牒前同佛後何故不名下辨違前中十一句可知後答中二初讚問縱難後佛子此菩薩摩訶薩已能下正答答中五一説法二佛子譬如下喻説三佛子菩薩摩訶薩亦復下法合四何以下雙徵因果相違五欲以下雙釋初中十一段次第答前十一句問普易可知二喻況中三一明象王依正勝嚴二若天帝釋下明象王神變三佛子彼伊羅下明於本處身不至天上為供帝釋故變現三法合中三一具衆行嚴二為欲下明因果無礙行合前至天下為供帝釋故變現三佛子菩薩摩訶薩本身下明菩薩身不動而應現合前不變象身而於天上種種現化初中十句可知二因果無礙行中二先明修無礙行所為後不捨普賢下正顯無礙行相前中二初明為無礙果後大悲下明為無礙因後正顯行於中二先總標後現不可下別顯前中云不捨普賢現成最正覺者此法界因果不一不異無障礙也後別顯中二先別顯因果後復於一切下別顯果門因行前中七句一智果二説法果三般若相應集諸善根果四斷果五多處現果六多善屬果七多時現果就時略顯十時理實無限並可知後別顯果因行中有十四句可知四雙徵因果相違意云何故因門現果果後作因五別釋二門初釋果作因意後佛子汝應觀下釋因現果意中前十句文易可知後因現果中四一法説二如伊羅下喻顯三佛子菩薩摩訶薩亦復下法合合中十句分二初一標人次二明不捨因行後七現果四佛子菩薩摩訶薩安住下歎勝上來第二釋相竟第三總結可知上來別釋第十定訖自下總結十段可知十定品釋了卍按已下十通品十忍品阿僧祇品壽量品菩薩住處品及不思議品之釋闕而不傳惜哉
