body:
  text: 如來十身相海品第三十四釋此品文四門同前初釋名者按梵本名如來十身相海如來之名廣如前釋十身者如上文第八地中兩種説十身一衆生身國土身等二菩提身願身等廣説如章相海者內德外彰標表超勝其數繁廣難可測量此則如來之十身十身之相海正當依主亦帶數釋也二來意者有二種一遠答第二會初後佛果德問二近望前品總明果法此品別顯相德故來也三宗趣者辨佛果無邊相海為宗顯差別因成差別果為趣也四釋文中三一誡聽許説二如來頂上下略説九十七相三佛子毗盧遮那下廣結十華藏塵數相就第二略説中顯相依處有四十六若細論之相所依處與相數等以無重疊者故其一一相文中或五四三二等五謂一相所依處二相名三莊嚴四業用五成益具與不具文各自顯此中最初明頂相後辨足相者依觀佛三昧海經説觀佛有逆順今此是順觀若先從足觀是逆觀也問此明大相相福與後品所説好福何厚薄邪答善生經中自有校量故後文云一切世間所有福不及如來一毛功德如來一切毛功德不及一好功德聚合八十種好功德不及一相功德一切相功德不及白毫相功德白毫功德復不及無見頂相功德就初相中三先總標相依所處及通嚴次其中下別顯後佛子下總結就別顯中同前依處有三十二相初相文三謂一名二一切妙下莊嚴三一一下業用二中三中四中五中皆同初文三也六中嚴內二先明菩薩以寶焰摩尼為冠後明具佛力等寶為鬘業中可知七中三可知八中嚴內如意寶與摩尼寶別者摩尼單名意故業中三海約三業也九中三同前加益物十中三十一中三同前十二中業有益世獲淨剎斷妄想十三中三同上十四中業用云四菩薩行者謂四攝行也十五十六十七十八文並易了十九具足千輪者梵本云具千輻輪業用中云發明智日者智日即是佛之別稱謂光中出聲讚佛功德故二十可知二十一業用中云顯現諸佛菩薩智慧妙藏者謂光中出聲説佛菩薩智慧善巧説法應機故二十二二十三二十四文並可知二十五業中云舒大焰網乃至示諸衆生一切業海者光中出聲説善惡業決定不亡或説一一衆生業海繁廣故二十六二十七並可知二十八業中光現三世間故二十九中略無莊嚴業中有明利益可知三十中亦無莊嚴業中令得見無所見益三十一中亦無莊嚴三十二中同上有名嚴業上來別明頂相竟三佛子如來下總結可知上來諸相表名中皆稱雲者舊經解云是周遍義潤益義無體義無礙義現相義降雨義今謂上下文中説諸供具或佛菩薩或能化佛事等多用此語皆同一義所謂應感則形形必成益而來無所從感畢則謝謝無停止具茲五德如世間雲故名雲爾自下第三十三眉間有一相文四謂依處名嚴業也第三十四眼有一相第三十五鼻有一相並文四同眉間第三十六舌有二相前相文七一相依處二名三嚴四因五依處分量六業用七利益後相三十七云如來舌復有等者準梵本復字是相字文中五一依處二名三依處體狀四嚴五業業中云其光普照一切佛剎唯塵所成者梵本云一切佛剎自性離於塵相以光威力令色相土無和合相顯散塵相隨應度者見此獲益此光即是為菩薩時説因緣法無和合者無有自體之所致爾第三十八舌端有二相前一文中五一依處二名三嚴四業五利益後相三十九中文五同前第四十上齶有一相文四謂所依名嚴業可知第四十一右輔下牙有一相文四易了第四十二右輔上牙文四同前第四十三左輔下牙有一相文四第四十四左輔上牙有一相文四業用中云流布法乳等者法謂教菩薩法能長養其胎故名乳令勝解成就故名燈令依勝解成行故此可貴故名寶此三同是伏忍位中或別配三賢第四十五齒有一相文四同前第四十六脣有一相文中三一依處二名三業第四十七頸相文四莊嚴中紺蒲成就如音義説四十八右肩有二相前文三謂依處名業後相四十九文四謂依處名體業第五十右肩有三相初相文四謂依處名嚴業次相五十一文四謂所依名字莊嚴業用後相五十二文四依名嚴業第五十三胸臆相文六一依處三形狀形如卍字者梵本云室利瑳三名字四莊嚴五業用六利益第五十四吉祥相右邊有五相謂五十四五六七八也唯第二相文中五餘四文各四五謂如前依處乃至利益四謂除利益一種第五十九吉祥相左邊五相謂五十九六十六十一六十二六十三也文中各四如前所説第六十四右手有五相謂六十四五六七八文中各四皆同前説六十六中云成變化網者梵本云放光化成網也第六十九左手有四相謂六十九七十七十一七十二也文中亦各有四第七十三右手指相文四第七十四左手指相文四第七十五右手掌相文五謂處名嚴業益第七十六左手掌相文中亦五同前第七十七陰藏相文四第七十八右臀相文四第七十九左臀相文中四第八十右䏶相文五五中第四明䏶相狀餘四同前第八十一左䏶相文中五五中初四同前第五利益第八十二右腨相文中五於中第五形相餘四同前第八十三左腨相文中五五中第四明色相餘四同前第八十四寶腨相文中四一依處二名字三相狀四業用第八十五足下相者此中略無左右以標譯家脫漏復勘梵本文中四一依處二名三色相四業用第八十六右足上相文中四依名嚴業也第八十七左足上相中四同前第八十八右足指間相文中四同右足上相第八十九左足指間卍字相者梵本云室利瑳相文中五同右足上四外并有利益第九十右足跟相第九十一左足跟相文中并同右足上九十二右足趺相第九十三左足趺相文並同前右足上四第九十四右足四周相第九十五左足四周相文中皆四同前可知第九十六右足指端相第九十七左足指端相文皆四同前可知上來大段第二依佛身四十六處略顯九十七相竟自下大段第三以別説難周故次總結無盡故云毗盧遮那如來有如是等十華藏世界海微塵數大人相等也十身相海品略分文指當一二了如來隨好光明功德品第三十五釋此品文四門同前初釋名者如來謂乘如實道故隨好者隨逐大相益加姿好故光明者顯曜除冥故功德者行成攝益故此即標人以顯相因相而發光因光以獲益總名如來隨好光明之功德亦隨好之光亦如來之隨好皆依主釋若隨好等是如來所有名如來之隨好等即皆有財釋也二來意者前品明大相今此辨隨好好有勝益相因顯也三宗趣者有二義一辨好為宗顯相為趣二説好為宗彰益為趣四釋文中二先明果隨好後佛子我為下辨因隨好前中二初告上首菩薩後如來下正説隨好前中告寶手者寶功德也手信心也將説好光功德非深植信根者不被故此表也後正説中佛自説者好是微相其用乃廣非佛自陳恐難信受故古德云阿僧祇品是差別因滿處此品是差別果滿處各是究竟故佛自説者此或不然所以者何十定品既不同彼於中亦佛自説文中三一好名名圓海王者令見聞者生究竟自在福故二此隨下顯光名名熾盛者德殊勝故三七百下辨光眷屬後明因好中文有六段一菩薩於兜率放光相二佛子菩薩足下下明足下隨好放光利益三天子汝等應發下勸發大心四淨治其意下勸懺除障五説此法時下時衆聞法得益六爾時諸天子以上衆華下展轉利益就初段中五一放光時二放光處三光名字四光照處五彼世界下光所照益益中四一脫地獄苦二得十眼耳等三生天四聞天鼓説得生天因緣於中四一不放逸故二於種福故三昔近善友故四佛威神力故第二足下隨好光益物中三一相輪名二此有下隨好名三常放下明好業用業用中二先標總數後中有下別舉其一存略故也別舉中三一光名二能照下光所照三隨諸下光所益益中四一隨機成就二離苦趣三得生天四聞天鼓説法説法中二先勸誨後如我説我下正顯前中三一天鼓勸誨二爾時諸天子下怪鼓聲尋所因三是時天鼓下鼓為説因因即諸天子善根也後正顯中六一鼓無我所説我所喻佛證無我所説我所文中喻法可知二如我音聲下鼓聲緣感無所從喻緣起無來處文中喻法可知三譬如汝等下地獄及身無所從喻光及聲無所來文中二初喻二合問喻中云但由於汝顛倒等生地獄身此即現有來處何故乃云此無根本答從緣之法皆無自性即是無根本也餘文同此者準知四譬如須彌下樂具無從喻喻鼓無所從文中喻合五譬如億那下一音説法應多喻喻菩薩一隨好光現多自在力合中二先正合後一切聲聞下顯勝前中云大歡喜者各稱根欲故雖多時説不生疲厭為多衆説不生退怯雖多恭敬不生憍慢雖多安樂不生放逸六諸天子汝當往詣下勸供養離欲文中二先勸後時諸天子下依勸供養前中二先總勸後勿復下別勸前總者令往菩薩所供養此有二意一能暫別五欲二能報恩德後別中三一説五欲過令離無善根障故文中三法喻合可知二汝等應當下明報恩損益文中四一勸報恩益二其有下明不報恩損三汝等今者下雙結損益謂若離不報修於報行回損向益故云宜疾回向等也四如我天鼓下因為説法於中二先説二空觀後汝等若能下結觀成益前中二初明生空中先喻後法法中非男女者即男女相不可得此顯離斷常故後如我天鼓下明法空中亦先喻後法法中五蘊不生者非常故不滅者非斷故後結觀成益云則入無依印者印是決定之義謂此定無寄不依根境識等一切諸法以此無依印印一切法皆無依故後依勸修供中七一聞天鼓勸二即皆下身化出興三即共下欲供不逐四時有下諸天子聞菩薩下生母胎五時諸天子以天眼下見菩薩處母胎六諸天子衆下諸天子各將眷屬諸菩薩起居七時天鼓中下鼓顯菩薩諸生假實於中二先喻況後法説説中云離分別者令菩薩示現受生非實生歿故除憍慢者令不自謂天宮勝故無染著令捨五欲求菩提故第三勸發大心中大心梵名阿耨等者此云無上正遍知覺心心體有三具如上釋第四勸懺除障中三初明勸懺罪障二聞是語下問其懺法三爾時天鼓下為説懺法初中四一略標身意二業為能懺緣言淨治意者令離垢淨分別故住善威儀者令修善行相儀不住相故二懺除下列所懺障障有四種一業者小宗五逆業障聖道今此七逆加和上阿闍梨故二煩惱障者小宗九十八使并十纏為障今此以分別俱生所執實我薩迦耶等一百二十八根本煩惱及彼等流能遮見修二種其道及道方便故總名障三報障者小宗以三惡道北單無想天等報能遮聖道故為障也今此更加四果四向皆能於大菩提見修二道極成障故攝大乘云非往諸惡趣極障大菩提如住於聲聞及以獨覺地又諸大乘經論廣明此理具如別行章説四見障者此唯所知不同小宗但説煩惱若不爾者有重言失前煩惱中有五見故此行相者謂於真俗理事別執由迷真如隨緣不變二分之義乃至執佛四智菩提有為無漏涅槃第二云外道邪見可説如來同於有為持戒比丘不應如是若言如來是有為者即是妄語當知此人死入地獄乃至云應知如來即是無為三以盡法界下重顯三業廣大懺悔文中四句分三初兩句廣前善住威儀修五輪禮儀初句身者顯兩肘兩膝四輪也後句頭者明頂輪通前五也次一句舌者廣明語業陳説罪障自性無依後以盡法界乃至善身業等下總結三業皆盡法界衆生數者由昔來起障既未曾治於境攀緣造作莫限是故障緣遍衆生界今欲懺除故還數等於彼也第二問懺法中二先聞能所懺喜後而問下正顯也第三為説懺法中二先顯説因後諸天子下正説正説中二初總説後諸天子如我下別顯前中三一舉能識業障體若不識則不能除故何以偏舉菩薩以諸天子賀菩薩恩深信重故次不從東方下正明懺相問此中問懺四障何故唯説業耶答此有二義一以四障展轉相緣不相離故見障是煩惱所依依煩惱而起於業依業感報故二由同是從緣無自性觀故以一觀通治四障若依此解障無不起不待除亡三菩薩結善識障體苦故後別顯中二先別以六門明懺除障法各有喻法後若如是知下總結懺法真實之相前中六者一鼓聲説業無説説喻佛無説而有説二天鼓聲無生滅能隨悟喻業能隨報三鼓恆出聲離斷常喻佛恆説無斷常四鼓隨心樂皆得樂聞諸佛亦爾隨心悉令見五頗梨鏡現器情影喻業現果無出入六幻師幻惑餘人眼喻業現果然無實後總結中云若如是知者牒前總別所説四障如幻緣生無體是真實懺悔者對小乘權大執有能所治體彼非真實故一切罪惡悉清淨者彼見能所治令滅者非真實淨以障除障故第五時衆聞法得益中四一餘剎兜率天子得無生忍二諸六欲天子發無上菩提心三諸六欲天女皆捨女身亦發大心四爾時下此處兜率天子得益於中六一得證地益二得三昧益三得多淨三業益四懺除四障五見衆多佛菩薩六而猶未現等益分齊謂雖得十地當未究竟故云未現少分之力第六展轉益中四一華供佛菩薩普雨香益二若有衆生見其蓋下見蓋益三若有暫得下見前輪王放摩尼光益四成就如是肉眼下以喻重顯并聞説喻益初中有法喻合法中三一以上衆華者上字是梵本中前字謂是諸天子前欲詣遮那菩薩供養時所化作華香樂幢蓋讚等中之華也二復於身毛孔化出多華共以供佛散億佛身者表散華者行必感果故三以前香雨諸剎於彼益生喻中喻蒙香者業障銷滅得解脫樂故非隨第四禪中有變實受樂不爾彼地非捨受故喻取少分相似邊説合中云若有聞者者還只是前身蒙香者爾此文有四一香舉前蒙香者二彼諸下顯滅惑數三了知下明伏害差別四成就下辨得善根益問既六種皆益何偏言聞答因香獲益故明惑數中此八萬四千煩惱但有都名而非巨細致使昔來諸德種種安立初一云衆生根本煩惱有十然一惑力復各有十即為一百計應分為九品但上品重故開為三品中下輕故各為一品合為五品即是五百復於外內境起謂以自五塵為內以他五塵為外一一各五百即為五千別迷四諦則成二萬并本一千則有二萬一千依多三毒及等分故為八萬四千二云以十惡為本展轉相成一一各十故成一百迷自五塵為五百迷他亦爾合有一千正迷十諦法門謂四諦三諦二諦一諦或約迷説誠諦等十諦空有不同分成二萬或約十善二諦亦是二萬并本一千總為二萬一千依三毒多分及等分故成八萬四千煩惱也三依賢劫經別有八萬四千如上九地記中釋雖有三説今依前二前二依此經文內外等故三伏害文中云了知如是悉是虗妄者此但了知六根境等是妄伏惑不起非害斷也或可害斷了法悉妄相盡理即是斷惑證如亦無違也四得善根可知二見蓋益中有法喻合初中二先明種一恆河沙數輪王善根按梵本中非但一王一恆善根乃是一恆輪王善根故梵本云恆河沙齊等也後佛子菩薩住此下明得此王位所化利益言於百千等者正明境分齊按本業經上卷云初地菩薩作四天王有一萬子百法身百佛國土中化十方天子二地菩薩作忉利天王有二萬子從此後諸地子數皆同略無化境初地既遍百佛國土當知後後漸增乃至第十地菩薩作淨居天王準其化境與此一恆沙數箇清淨金網輪王同等以是菩薩攝報位極故次喻及合中明但聞彼佛名必生彼佛土顯此但見第十地菩薩蓋即得十地位爾三見前輪王身光益中有法喻合法中云若暫遇光者謂前輪王放摩尼光明也彼雖未轉分段必定得法雲地位故言以先修行善根者顯此勝益非無因緣非小因緣必由宿植此大教善根見聞信樂等故喻中云雖未命終見梵天處等又云得諸禪等者者類上三靜慮也合中二先明放光後若有衆生下重明得益於中五一得第十地位二成就無量智慧光明三得六根各十種清淨四得具無量深定五假使下以喻重顯并聞説喻益中二先明喻顯後若有善男子下明聞説喻益前中重顯上來見蓋見光皆是肉眼肉眼所見蓋及光明只是障內之色何有乃得如是益耶文中雖説以菩薩善根及金網輪王三昧福善終自難信故喻重顯文中二先假設譬喻顯輪王肉眼所見剎塵廣多後亦見百億下明見佛廣多前中五一見億那由他剎塵數剎復末此剎為塵十方各行如上塵數剎乃下一塵十方各爾下剎塵皆盡又以前所下塵及不下塵數剎總成一剎二寶手於汝下問答顯廣三若有衆生下明聞説喻得益顯剎難思故四寶手設復下重積前數以顯剎廣謂以前廣剎積至千億剎塵數剎復末為塵依前喻下塵盡總攝共成一土復末為塵如是經八十反五如是一切下明業報肉眼一念中見前一切廣剎之微塵後見佛廣多中有法喻合文顯可知釋隨好品了普賢行品第三十六按梵本中名説普賢行品釋此品文四門分別初釋名中二先得名後釋名前中此品約人標稱言普者遍也賢善也道也因也謂此菩薩身遍法界若依若正乃至微塵毛端等剎故具滿衆善德海故雖成正覺不捨因行徹窮來際常修利樂無竟期故故普賢三昧品云普賢遍住於諸剎坐寶蓮華衆所觀又云普賢恆以種種身法界周流悉充滿又云一切佛身所有剎悉現其形而詣彼又云普賢廣大功德海遍往十方親近佛一切塵中所有剎悉能詣彼而明現又云佛子能以普遍身悉詣十方諸國土衆生大海咸濟度法界微塵無不入又云入於法界一切塵其身無盡無差別譬如虗空悉周遍又理趣般若云普賢菩薩自體遍故釋曰此普與賢各是別義相違釋也若總言之是依主釋也普賢之行故二來意者上來從名號品至隨好品明差別因果從此品下明出現因果於中普賢行品辨因出現品明果故次來也三宗趣者此下二品俱是自在果成為物出現因果為宗徹窮來際利樂為趣四釋文中二先長行後偈頌前中亦二先正説後爾時佛神力故下辨瑞前中亦二先敘説所因後佛子我不見下正顯前中三一指前所説是隨器略説謂是前所説差別因果二何以故徵徵意云何以將彼差別因果為略少故三諸佛下釋釋意云由差因俱是因因其行未普差別果但是因果略顯相好未可廣陳若出現因果則因是因一一行量盡法界果是果果境界如空因果俱盡未來利樂無竟故前云略少若爾何不唯説出現因果故此釋云諸佛世尊為惡衆生出興故將説出現時先説差別故云為諸衆生無知乃至隨流遠道故出興也然此説差別所由中略顯十種一無智無明者通獨頭相應二種二作惡諸纏者此有八種十種八者謂昏沉睡眠此二障止掉舉惡作二障觀嫉慳障捨無慚無愧障尸羅十者謂於前八加忿覆二種此皆現起纏繞於心令不自在故廣如章釋三我我所者此通生法見修二種具如別章四身見者謂五見中唯薩迦耶故五三四七八倒者三謂心想見四即常謂無常乃至淨謂無淨七謂前三四八謂前四乃無常謂常等四六疑者謂心猶豫故七邪見者五見中乖僻正理之見故八結者有三五九種三謂身見戒禁取疑五謂愛恚慢嫉慳九謂愛慢無明見取疑慳嫉九縛者有二種四種二謂相及粗重相者有二説一云相是相分由有漏得相令彼見分不得自在名為相縛此相即是縛名為相縛一云第七末那為相縛體由第七識餘眼等識於所緣相不得自在若依此説相之縛名為相縛粗重縛者亦有二種一云有漏法上無堪任性名粗重縛與有漏法非一非異無別體故非實斷不斷別故非一二云二障種子通名粗重雖有二説取種為勝或有説云一切漏相分名為相縛由彼令見分不自在故即彼相分上能縛諸惑名粗重縛行相粗故若總言之所緣相分名相縛能緣見分貪等諸惑名粗重縛四者貪欲瞋恚戒取我見十隨流遠道可知後一句結結意云世尊為此多惑障衆生出興是故先須説差別因果後為説出現因果也後正顯中二種一先辨所治廣多有百萬障後佛子我不見有下明能治廣大有六十種行前中三初總舉二何等下別顯三佛子若菩薩下結初中三先標次徵後釋初中按梵本云佛子諸菩薩過失中我不見有一法過菩薩於他菩薩起瞋心者釋曰雖諸煩惱皆能通障一切聖道然瞋一種具有二義故偏舉之一親障菩薩不能攝受饒益衆生二於菩薩道諸障之中最尤重故決定毗尼云菩薩寧起百千貪心不起一瞋違害大悲莫過此故善戒經説與此同也二別顯中先徵後顯顯中有一百門寄位分五初障十信行二不樂佛法下明障十住行三不得菩薩諸根下障十行四樂誹謗一切智語下障十回向大願行五不樂與菩薩同住下障十地真證行此中亦耳不聞無礙法故者梵本云耳不聞法處受身障釋曰謂生於無佛處故菩薩萬行不過此故五位起一瞋心一切頓障又以所障法界如帝網重重令能障同於所障亦皆無盡起一瞋成百億障理實無盡結中三初正結次何以故徵意後佛子我不見下釋成亦即是後辨能治廣大也就辨能治廣大中三初躡前總顯次是故諸菩薩下別明後佛子菩薩摩訶薩聞此下結勸初中可知次別顯中有六位皆依前起後初中三一牒勸修治二依勸徵問三所謂下正顯顯中十句攝為五對初二約人前不捨下後不慢上次二約法一不誹教二不迷事次二約心行一樂行二堅心次二約降制伏使前降後制後二悲智前悲後智第二清淨中三段同前初謂依前正法行成離染勝故云清淨十句亦攝為五對初三於教法淨一信二求三護次二於理法淨一廣大二甚大次二於化清淨一了器二僧福次二於時劫淨一不著二勸察後一結成性第三廣大智者由離染障令智廣大故此十句亦為五對初二了所化智次二知化法智一能詮二所詮次二知持辨智次具身語業用智後二照依正智第四入十普入者由得廣智能普契所知令互相入故十句中各自多少為對初二大色小處互相入次二多身一身互相入次二多劫一念互入次二多法一法互入次二多處一處互入次二多根一根互入次二多根與境互入次二多想一想互入次二多言音一言音互入後二三世一世互入第五住十勝妙心者轉變無礙應機成益故心得勝妙正顯中一住離言二住離念三住無常愛果因四住常果因五住祕密深六住平等深七住滅猶豫八住諸世平等九住三世佛平等十住佛十力四無量第六得十一種佛法善巧智者依前勝妙心起此巧智正顯中一了理法二出生行法三宣説教法四證果法五明了三乘法六悟解一乘法七巧言詞説法八純門説法九雜門説法十知別不別二二不二不二二十一於第一義諦唯識門究竟故三明結勸中三初正顯勸二何以故徵意三菩薩摩訶薩釋意由聞此法得佛果故功德海滿故利生等故第二辨瑞中二先感瑞後爾時佛神力故下明證成前中二先此土後如此世界下結通十方前中二先顯瑞因因有二謂佛力及法爾後明瑞相相中二先動地後雨諸色雲並可知後證成中亦二先此土後如此道場下結通十方問此感瑞自是重會普光明殿會中何故結通乃云菩提樹下菩提場菩薩宮殿中耶答以菩提樹是本故前後諸會不一不異故第二偈頌中二先敘意後正頌前中二初示相謂自他二力是所因也觀十方者念所化故觀法界者思所説故後欲開下述意謂為欲述此十種意故説此偈頌一明因行二顯果德三説大願四行起時處五機熟願佛六稱機授法七所説利益八明因得果九果淨身十語業開現此十種義下偈頌中普具顯之正頌中有一百二十一頌分二初二十二頌顯説分齊餘九十九頌正辨普賢行相此並不是重前文但與綺互共顯普賢行用謂前是略明此是廣説前體後用故前中初二頌誡聽許説二亦説諸劫下八頌明此菩薩學過去佛弘誓願行三於一賢劫下十一頌明學相學現未修三輪行於中初七舉現未佛後四學成三輪淨行四行者下一頌結説分竟第二正顯普賢行相中亦二初六十九頌明自德大智行後未安者令安下三十頌明外化大悲行前明普賢大智行中十種一初七頌明善入帝網大智行二深入微細下十七頌明深入時處微細智行三世界及如來下五頌明了三世佛心祕要行謂世界名及佛名此等最粗猶於多劫説不能盡況佛心中所知境界謂真妙法界等然此菩薩亦能了知成普賢大智行四如是未來世下四頌了未來攝化業行五現在所攝下四頌通達現在佛境界行六出生無得眼下五頌明六根化用行七諸佛甚深智下十頌明器世間自在行八了知諸世間下六頌明智正覺世間自在行九如來法身藏下五頌明非身示法身行十譬如工幻下六頌明非量不量淨心行上來自德智了第二外大悲行中亦十行初六頌化物令發菩提心行二衆生身無量下二頌讚歎現佛攝生行三諸佛能現身等一頌明分布過去舍利行四如是未來等一頌明能起未來佛德行五如是三世下四頌明法輪深入行六無量無邊下五頌了物心器染淨行七衆生皆妄下三頌了物業報緣起行八眼耳鼻舌下五頌了達根境無得行九佛説等一頌了知三輪三世中説法行十末後二頌明三世相行普賢行品釋了如來出現品第三十七釋此品文四門分別初釋名中二先得名後釋名前中如來者略有二義一智乘因行而來成果此智即如故雖來未曾來也金剛般若云如來者即諸法如義故二果智契理一如時不礙常應所化故來也仁王教化品云超度世諦第一義諦之外為第十一地薩云若覺非有非無湛然清淨常住不變同真際等法性無緣大悲教化一切衆生乘般若乘來化三界故今此出現是後非前也後釋名者或如之來或如即來或如來之出現或如來即出現初二而者謂如之與來非一非異故雖如不壞來此來是如之來依主釋也雖來不失如此即是來持業釋也後二句者一正來即如時而不礙乘一切智乘來化三界此即如來之出現依主釋也二正乘一切智來化之時此即如來復即出現持業釋也問晉本名為性起今此乃曰出現何故爾耶答舊翻如來性起四字中如來兩字正依梵本性字全無起字或通以溫鉢底言正譯為生為現通有起義故二來意者前品明果因出現此品辨果果出現義次第故來也三宗趣者此品顯果果出現為宗以徹窮來際利樂有情無竟期為趣四釋文者此品長科有七分一加分二爾時如來性起下本分三時性起妙德下請分四爾時普賢菩薩摩訶薩告下説分五佛子此法一名為如來祕密下顯名受持分六爾時佛神力故下表瑞證成分七爾時普賢菩薩承佛下偈頌總攝分初中二先毫光加請法主後爾時如來即於口中下口光加持説法主前中二先長行後偈讚前中二先光加後時此道場下明衆益前中有十初光出處眉間者表證道離二邊故白毫者表中道法界為諸教本故二顯光名如來出現者欲表諸佛無障得顯果果出現故三無量等者是光因業四其光者是舒業五右繞等者是敬業六覺悟等是覺業七除滅等者是正業八映蔽等是降伏業九顯示等是示現業十作是事已下明卷業入妙德頂者正明加相何故加此菩薩者欲令問果法故為顯金剛種性義故後明衆益中二先得喜踊益後復作如是下知光是説法先相後偈讚中二初標説頌之人後正覺下正顯顯中十頌分六初一頌歎佛申禮二有五頌歎佛放光三有一頌歎前光益四有一頌歎衆有堪聞之德五有一頌歎佛悲智利世故先放光將説法六末後一頌請佛示説法意何不直請佛説法乃轉請示餘人者此有二意一光入身時已令知覺佛不自説故二同上多例佛不自説故後口光加持説法意者前既請示故今示爾於中二先加後其光下加益前中有十初光出處口放者表教道得通故二光名無得者表辨才不滯故無畏者不懼深而難説故顯其已離衆威德故餘同前説入普賢口者令説如佛説故口傳授故何故加普賢者表此所説是普賢法故不入頂者以兼教故後加益中云過本百億者顯加力故及過餘者簡異故唯除佛者顯尊卑故加分竟第二本分中二先問後普賢菩薩摩訶薩言下答答中二一引昔類今後説是語下現瑞表相相有二種一動地者顯普賢引昔相應故二出問法光者表有問法菩薩名表所問故謂説佛果出現法門令所問者生起種性勝德故云如來性起妙德菩薩第三請分中二先長行後偈頌前中二先總相舉法請後善哉佛子下列十門請前中三初舉法請二佛子此諸下歎衆請三佛子汝已下歎説者請初請可知二中三初歎衆大二皆久下歎德高三具如是下結衆集初可知歎德中十種一淨戒久二三念慧成四誓願極五具佛儀六憶念佛七大悲觀八了通境九得佛加十受佛法三結可知三中二先別顯後總結前中十種一事佛多二成妙行三定自在四證祕密五知教法六除衆疑七佛力加八知物根九隨樂説十順佛智後結可知後別列十門請中三初讚德總牒請次身相下別列中門云轉法者梵本云轉法輪後如是下結後偈頌中十偈分三初一頌標歎説聽二菩薩云何下正頌別列問請三此説下歎德勸就正頌別列中四頌分七初半偈頌如來出現法次一句頌身語心境界語謂音聲次一句頌佛行次一句頌成菩提次一句頌轉法輪次一句頌般涅槃次二頌一句頌見聞親近出善根三歎德勸説中五頌分六初半頌歎衆敬法重人次半頌讚普賢德請説謂是聽者生功德海之境界故亦是能淨治衆生惑障者故次一頌舉六事請謂以因喻證明與理相應聞已發心疑除智淨次一頌舉四事請謂以因喻巧説示佛身如是十方佛身無異前半舉例後半請問次一頌歎衆希有請謂十方佛土無量劫中難可得見如今所集之衆次一頌歎衆仰法敬人請以淨心具演出現法上來請分竟第四説分中答前十問即為十段一一各二謂先長行後偈頌十中初答如來出現之法法是出現所依之因緣後答身等九種正顯能依出現之相猶如因果非是因果以並是果中所現法故就初長行中三先法説次佛子譬如下喻顯後佛子菩薩摩訶薩知如來下約法通結此三各有十門然初十一一通中間十門故此因緣總有四重一云十種者據初略也二云百者以初十入中十故則一一具十有百門也三云千者以後結十一一結前百故有千門也四無量阿僧祇者彼千門中後各容有多因緣故如四智風輪十光明等又亦通攝身等九中諸因緣故文中二先總告衆令知後此處下正顯顯中二先歎後何等下正説前中四一歎難言念二所謂下辨難所由三何以故重徵所以四非以下顯難差別差別中二先反顯後以十無量下順釋釋意謂此但數量繁廣故云不可思議非約理性言絶也數量者如前分別十百千等四重展轉餘文可知後正説中三初徵起次所謂下正顯後佛子下總結顯中一多大心攝生成故二多淨勝志樂成故三多慈悲成故四多行願成故五福智無厭成故六多二利行成故七多巧慧成故八多淨德藏成故九多智慧嚴成故十多説實法成故結中云成於如來此結出現因緣非説成佛因也第二喻顯中有喻一一有三先喻次合後結前請中云願以因緣及譬喻者前法説即是因緣此下明其譬喻十喻中第一大千興造喻喻佛衆緣成出現顯此喻中有二先約緣相喻出現因緣後法性如是下待緣性喻出現因緣前中三初總舉多因緣二所謂下別辨多因緣三佛子如是等下總結多因緣初中二先反顯後以無量下順釋前中云非以一緣等者梵本云曩翳繫糸垢囊此云非以一因也曩翳繫囊迦後云以無欏囊此云非以一事緣也若唯是緣則應云鉢欏底耶文既不爾故知事緣為後云以無量者準前可知別中二先舉四風輪後如是皆由下出所因前中二先總顯四輪相依後其四者下別辨四輪謂依雲雨起四風輪一名能持者衆生業力於空劫處世界將成於上空中先起雲雨若無風持雨水無停處壞餘世界是故業力起初風輪水若不減無由得起諸天宮殿是故業力起第二風輪雖能消水處起無由是故業力起第三風輪減一節水起一層天宮如是漸下至起須彌及大地等雖起總處不能辨彼別類莊嚴故彼業起第四風輪令此世界乃至圓滿先起器世間後起有情世間廣如俱舍分別世品中説後出所因中三應衆生外增上業共感其中有共中共共中不共可知二諸菩薩善根所起者此約淨染染淨二類界説所以者何純染界中無菩薩故純淨界中無衆生故二種可得故就二類中染界容有菩薩悲願現彼除純苦趣故賢首品云或有剎土無有佛於彼示現成正覺或有剎土無有法於彼示現説法藏等三令於下通顯前同處異感各隨所應如維摩云譬如諸天共寶器食餅色異等下文第六十六中大光王告善財言妙光城所住衆生皆是三佛子下總結可知後明緣性出現中三初法性如是一句是總顯二無有下四句明即相而性故不礙生作知成即無生等即性而相故雖無生等而不礙生等二法合中合前緣相緣性及相性中各三相顯其四種大智風輪者一任持不失智持法雲雨次二依法起自利行所成智一滅惑二成德後一依利他行所成智餘文可知三總結中結及勸前文相易了第二洪霔大千喻三段同前此中是前風所持雨喻喻佛深廣難知德謂得無盡陀羅尼力説此成就如來出現法一切二乘不堪容受唯除大乘菩薩所以者何此菩薩信佛有無障礙願力至果方乃相續利樂無竟期故故云唯除諸大菩薩心相續力者也此論根器不可限以位地分爾則八地已還非所被故第三大雨無從喻此中大雨同前所説衆生業力感龍雲雨然無來去喻喻佛出現無來無去此有多釋一應機無來機謝無去二從因緣現故現時無來來既不來滅盡無去三從初現來則已不來不去以是從因緣現故第四大雨難知喻亦名摩醯數渧喻此亦是前成劫大雨喻喻佛出現大機堪受德古德釋云此有四義一教廣二行大三因深四果遠故非二乘所預第五大雨成敗喻喻佛滅惑成智德各有五種初能滅炎熾二能起處所三能壞大水四能成海中一切衆寶五能莊嚴大千界處法中初二滅惑成福次二滅障成智後一以法照機第六一雨隨別喻喻佛一味隨器德第七有二喻初先成色界喻喻佛勝緣先際德二後喻釋疑就二喻中前先成由業力後法異由機殊餘益可知第八喻中三先喻二佛子大雲下結三佛子如來下合初中二先顯水輪生華後爾時於中下明風輪起前中依五卷大悲經第三卷云何故名賢劫阿難此三千大千世界劫欲成時盡為一水淨居天以天眼觀見此世界唯一大水見有千枝諸妙蓮華一一蓮華各有千葉金色之光大明普照香氣芬熏甚可愛樂彼淨居天因見此事心生歡喜乃至讚言奇哉希有如此劫中常千佛出世故號此為賢劫釋曰華名如來出現者先召之名也後風輪中每一節水減一風輪起成一處所十風次第成處滿足二結中善根異故風及剎殊而雨無別三法合佛成辨大事德文中二先正顯合後佛子一切如來下釋疑前中四一如出現令水二放智光授菩薩記合華生表佛出數三佛子如來出現下合十風此表佛德應機不同四佛子如來大悲下合上結文後釋疑中三一順前文辨正理勸知二衆生念言下舉偏執之疑於機緣緣成之中一句謂佛獨辨不應道理故云此非也三佛子乃至下具顯緣成便彰無作之義文中三先辨菩薩依佛種善根後但以下顯佛因菩薩有善根故方以威力令其具佛德三而佛下顯前根緣互應是緣成無能所作故無成無成故無壞無成壞故無差別也第九四輪相依喻喻佛體用依持德然水輪所依之風有四義一持水名安住二不可搖撼名不動三成直至劫壞名究竟四體質不可損傷名堅固其厚有十六洛叉法合中初合四風後合四輪前中一攝取二授法三守護四照實有配四攝合四風理可通矣合四輪中饒益慈悲合前地輪大方便合水如來合風無礙慧光合寶遞依持準釋第十大千饒益喻化興世利生德令明三學益慧中一內得真理二外用照明餘準可知第三結勸中十一句一一皆通結前十門謂一行多二周遍三離相遷四離分別五永寂六無主寄七無窮已八無休息九佛智無礙十觀為無為非一異十一回向願得滿足第二偈頌中三十七頌分三初十四頌頌歎深許説頌上總答二譬如世界下二十二頌頌上十喻三有一頌頌歎難説説初中二初十二頌頌歎法難量後是故下二頌明除説分齊前中亦二先十一頌歎所知甚深後若有欲知下一頌頌歎能知器淨前中亦二初一頌總顯佛德深廣難量後十力功德下十頌別頌佛德十門難量各一頌顯佛一德初一顯佛難思德總舉後九別辨皆先喻後法二末塵喻喻佛無限德三量空喻喻佛廣大德四數心喻喻佛無量德五法界喻喻佛甚深德六真如喻喻佛離相德七實際喻喻佛無礙德八法性如空喻喻佛性淨德九法性離言喻喻佛離説德十法性寂如鳥迹喻喻即寂而用非色顯色德次一顯能知淨中前半總相勸後半別顯下二許説中初一誡聽許説後一略示九門第二頌上十喻中初二頌頌初喻先一頌喻後一頌合二有二頌頌第二喻三有二頌頌第三喻四有二頌頌第四喻五有二頌頌第五喻唯除於世自在人者梵本云唯除於世自在主六有二頌頌第六喻七有二頌頌第七喻八有四頌頌第八喻九有二頌頌第九喻十有二頌頌第十喻三末後一頌歎出現法難喻説説上來十門中第一明能出現因緣法竟第二別答大段九門所出法中先明身業以是後八所依故就長行中三先總標舉二佛子菩薩摩訶薩應於下釋相三以心無量下結勸顯釋相中有五百門分別謂初約法總顯有五門後所喻別辨有十身即為五十三通結能知亦十門即為五百也準例亦應有千門但以總中略故也初中二先總標德廣後何以下釋成於中二先反顯後應遍下順釋前中五一法是事所依事即行事二行是能行故三身是行所成四剎是身所依五衆生是所化各盡法界故皆無量後依喻別辨中略明如來出現十身一周遍無身身二無別令別身三大用成益身四平等應機身五密益身劣根身六超劣隨應身七一多無得身八無功成事身九體用成益身十隨願令滿身為顯此十身舉十喻以辨於一一中各三謂喻合結就初中明虗空周遍至不至喻以此虗空無形故無可量也又即由無形得故無所不至也喻佛法界身非有非無故本為衆生而有其身非自有故名非有身又願以此為衆生身為自身故名非自身前徵喻云既遍一切處等何故復非至耶釋曰以無自身故身是聚義故後徵法準喻可知餘文易了第二虗空非色現色喻喻佛無別令別身具標釋結可知第三日光饒益喻喻佛大用成益身文中喻有十義第五義廓徹虗空者梵本云照徹虗空合中四謂總別徵釋別中十種一滅惡生善二治障發慧三與樂拔苦四授法長道五令心淨除疑六見聞四諦理事無盡七令自他死此生彼八見無性理不損無漏善根九覺菩提開智照明梵本云為諸衆生放光益智光令諸弟子功德華敷釋曰智日照菩提心華開敷如日光照赤蓮華也經云令智修明者修長也永照故十依大菩提心成於萬行三徵四釋義可知第四喻中有二喻一日光等照喻喻佛平等應機身合中有六位謂三乘及三聚衆生無念而照益二日月隨照喻喻佛隨根應現身意者釋前疑云若機有異法不異者何故現見聖教差別種種耶釋云教亦彼希望施設故致異爾第五日照生盲喻喻佛密益身劣根身喻中二先無見後密益合中二先略合後佛子如來下廣顯顯中二先辨能益光明後五百光明普照下方下明所益衆生前中二先列十光初二成施行次一成戒行次二聞慧次一思修次二成證智後二成淨智後結廣云千種者古人釋云五百照下者是五位自分行五百照上者五位勝進行後所益中四一利益菩薩得普賢位十十之德後因得彼法成就種智於中諸處者是前十眼耳等也二住二乘下益二乘令垢滅者以不求種智故三其餘下益生盲謂人天中不知有出道令得三益一身樂二心調三行成其堪道器四地獄下益惡道中先身光救惡道二慈音破邪見又釋有七一拔苦與樂二佛子彼諸下因起邪見謂初願力後釋梵作三是時下妙音示正四彼諸下回向邪知正五心喜故下起報恩行六佛與授記七結光利益第六月光奇特喻喻佛起劣隨應身合中明佛此身有四奇特一無明現起二常身即延促三住體恆現彰四一身普現對言菩提器者衆生堪授道之心有定水故現佛影像故第七梵身普應喻喻佛一多無得身亦無起念等第八醫王巧術喻喻佛無功成事身喻中二先顯醫王現德後彼大醫王下明歿後持身如本救物合中亦二初醫現德後於無量下合呪覺藥持身等文中三初皆到彼岸等合命終以生死永盡二善能等合藥塗呪持隨有報化住持不絶三無思等合無功成事第九摩尼利物喻喻佛體用成益身合中二先體後法用合可知第十寶王應念喻喻佛隨願令滿身梵本云復次佛子譬如大海有大如意珠王餘文易了後唯除下釋疑若有衆生因見等者梵本云若有衆生應見佛身而成就者如來爾時為成就故示現其身第三結勸知中十句一信十方佛二所行自在三遍證法界四住法深五時不遷六世無實七無分別八度無竟九嚴剎十嚴身第二頌中二十偈依次頌十種身唯第八有四頌餘九各二頌可知第三出現語業中長行內三初徵起二佛子菩薩摩訶薩應知下釋相三佛子如來應正下總結就釋相中三一略説十種聲德二佛子菩薩摩訶薩如來音聲非量下廣顯前十種一一有十種故成百門三復次佛子應知如來音聲有十種下通結前別顯百門成一千門巨細言之各各無量也就初説中約德辨聲有十種一體廣二稱欲樂三稱勝解四應時五體常隨應六業集緣起七難度八正真九無門十無改第二廣顯中三初總標次何以故徵後佛子譬如下釋就標中有三對六句初對非量等者佛聲非限故隨限故次對非主等者從緣起故後非示等者相而性故性而相故二徵意云何以非限非主非示三聲而不得有緣故三釋中三初喻次佛子如來下合後佛子是為下結下九喻文同有此三此前第一劫盡唱聲喻喻佛緣起有無聲即一聲上具前標中三對義故此劫盡時空中聲準俱舍第二云生無色界有二因一因謂近習及數習二業力謂上界後報業果報將至故若生色界有三因二因如前更加法力但器壞時法爾有聲故又不得越次生二禪等仍待火至初禪方生二禪乃至風至三禪方生第四法合中佛將破壞生死世間亦出四種聲説法而聲體平等無主無作餘文可知第二響聲隨應喻喻佛無方應現聲文三同前合中從衆生欲解緣合前山谷地中應有佛以慈悲本願略故不説第三天鼓開覺喻喻佛教誡放逸聲合中二先辨能開覺後無數下明所開覺前中三初總次所謂下別後以此下結別中有十一種聲於中初二通大小教次六唯小後三唯大餘可知後所開覺中三初總標二所謂下別顯三佛子是為下總結可知第四天女善口喻喻佛圓音聲謂佛一圓音出無量衆生相應音聲於彼一一音聲之中復説無量法各隨解了第五梵聲各聞喻喻佛根熟獨聞聲不出衆外者根未熟故第六水隨器別喻喻佛一異無得聲第七龍王降雨喻喻佛長養善根聲不從外來者離佛無聲不從內出者離機無聲故第八龍王漸雨喻喻佛漸教説法聲亦是審根説法聲合中二先現法雲等合前先起大雲等此明説擁小教也後得其熟已者合前普降甘露等此時説大乘實教普得令同一實果故梵本云若諸衆生善根未熟未雨法雨若即説深法衆生恐怖是故如來先興法雲成就衆生諸根就已然後廣樹甘露法雨第九龍王連注喻喻佛種種差別聲隨聲異説異並從淨法界流故無異之異也第十遍降喻喻佛普雨法界聲喻中有六一雲二電三雷四風五雨六結合中先合十身雲初一總後九別別中初四約外相次四內功德後一稱性二合依身雲放十電光三合雷震中言三昧者明依定起説從所依為名十種可知四合風謂將説法時先從慈悲起後知警覺加被令身心柔耎以成法器然後説法五合十法雨初坐道場菩薩者正坐覺樹臨將成佛者也法雨名法界無差別者此有二種一理事無差別謂理即事事即理故雖此亦有不一之義今依不異説故二事事無差別謂此事彼事互望亦約不異義説菩薩雖從初地已來常聞説此然未極説今此最極故偏説爾二最後身者是已處胎出生未坐道場故法雨名遊戲等者此有二義一現道即為説法故名密教二現通亦為説密教密教者甚深祕密聲聞對坐而不聞故三一生所繫者是未處胎前同彌勒等法雨名清淨等者謂説斷果將滿智果欲圓並令圓滿故已上並等覺位四灌頂者是第十地菩薩十方佛同以法水灌其智頂授佛職位故法雨名如來莊嚴具嚴者即法水灌頂是也五得忍者忍有五種莫不同一無生之理今言得者正在七八九地法雨名功德寶等者説大悲大智非一異行是福慧無得功德寶故六住向者三賢菩薩趣向正證故法雨名入現前等者説勝解力變現境界故七初發心菩薩者十住初心也法雨名出生如來等者説菩薩心慈悲為本如來從此故八為獨覺深知緣起等者依分相説故無明行感識等果故離斷果起因謝故離常亦顯順觀離斷逆觀離常由此得解脫果故言不壞也九為求聲聞者説大智慧劒等者説入空慧為劒四住惑為怨害之為究竟故十為積集善根等者此三聚衆生也一正定二邪定三不定法雨名能令成就等者各隨所應説令行法得成故歡喜也六結中二先結十雨充法界後結佛心等合龍王心平等餘可知第三結前十聲中二先直結前十種後復次下結十種各有無量前結可知後結可知後結中三一總舉二何等下別顯三佛子如來下結數就別中先徵後列列中十種無量一一各通結前十聲於中各先舉喻顯後釋義義顯可知上來總以一千門分別如來音聲竟後頌中有二十頌頌前十段文一一各二頌如次應知然第九頌梵本云譬如梵王一言音能令衆生皆歡喜其音唯在梵衆中令普得聞除憂惱上來總答如來音聲竟第四意業中長行內二先徵起後佛子如來下釋相釋相中三初約法總辨二譬如虗空下別顯三佛子菩薩摩訶薩應以如是等下總結初中云如來心意識下此簡法體遮非顯是謂佛無心等但有智故然於此文三説不同一云佛地無有有漏心及法而具有淨分心及法今言無有心意識但應以智無量故者依淨分中無彼染心等故無漏位中智強識劣故不爾無王所依何立故成唯識第三引如來功德莊嚴經云如來無垢識是淨無漏故解脫一切障圓鏡智相應一云以無分別故言無謂無體故攝大乘第八云無分別智所依非心非思義故亦非非心為依止心種類故以心為因數習勢引得此位名心種類一云佛果實無心意識及餘心法唯有大智我故梁攝論云佛果無有色聲粗相功德可得唯如如及如如智特存佛地論云法攝大覺地謂四智及如如不言更有餘法若依成唯識第十佛地四智已辨八識所作之業不藉心王及餘心所謂鏡智純淨圓德現種依持能現能生身土智影此辨第八識作用也平等智觀一切法自他有情悉皆平等能隨樂現受用身土影像此翻顯末那辨彼作用餘二智辨五六作用如論應知一云諸經論説土雖似實衆異無盡所以者何説無心等者依無染分説説有心等者依有淨分説若不爾者既令聖教互致列違亦使佛無能現不現若一向無者色聲亦應不有若一向有者離染亦應無上來雖有多説今依第四也二就喻顯中略舉十種大喻喻佛十種大智一虗空無依喻喻佛平等無依智謂能與化作增上緣故能與他為依不依他故依是何義復言無耶謂從因緣而得起故説依因緣因緣無體則無依也然即不壞因緣不失智體是故常有能所依而常無也二法界無改喻喻佛性無增減智合能依後得隨世虧盈所依真智無有增減三大海潤益喻喻佛益生無念智謂加持衆生資其念力故云流入衆生心中也四寶珠出生喻喻佛用興體密智合中六一佛海合大海二智珠合寶珠三福智能生三乘道果合能生衆寶四引四寶名合四珠辨法師釋此四寶配屬四乘謂三乘及天乘衍法師等配云初是證道智斷惑障二助道智斷業障三是不住道智捨報障上三自利四利他此釋並非經意所以者何此中顯已成之佛何得配三道智耶故今不爾謂一巧便無著智二於為無為不一異智三於性相融無得智四應時化物智五此四智下合深勝凡夫龍神等皆不見此同法華王髻明珠有功勳臣方見亦此四智下合端嚴方正等五珠消海水喻喻佛無功用等智文中三先喻況後佛子如來下法合三佛子是為下總結初中二先明海有四寶後佛子若大下辨寶業用前中二先通顯四寶後何等下別列其名可知後業用中二先明要用後佛子此下正顯珠業若依俗書自有兩説一云大海內近東有沃燋石常能消吸海水令盡不溢一云彼沃燋東有大壑其名尾閭海水注中故常無異若小宗中起世經及大婆沙説於大海下有阿鼻獄猛火吞消爍海水便不盈溢餘同此者為究竟説實則非了餘文可知合中二先合前列名後佛子諸菩薩下合後業用前中古德將此四智配大乘光明集福德王賢護首楞嚴等三昧智亦有配屬禪定方便如理如量等智此並訛言不堪憑信今但依文文自有解可怙古人凡見一文即將舊語以屬配之何必一切皆是舊言古人之中往往有此本疏云初能除流散染業障二能除味定著淨障三能除根本無明障四障盡成果智今謂此四智乃是佛果出現門中辨四種智業覺悟菩薩令行增進不應妄配地前地上三昧智等初滅一切等者謂佛以智光照觸菩薩令住定心修善滅散修故此照地前令入地至三地也二除一切等者以智光照菩薩令捨著禪味起廣神通故此從三地至五地也三慧光等者以智光照菩薩令捨廣通住功用行故此從五地至六七地也四與如來等者以智光照菩薩令捨功用依無功用故此從八地至如來地也三結文及餘文並可知六虗空含受喻喻佛起住無得智三門同前合中釋云如來智慧遍一切故等者謂佛智遍一切衆生心中而衆生從自心內種性生智即是從佛智生還依佛智住是故雖容無量智無分別也三結可知七藥王生長喻喻佛種性深廣智喻中有六初明樹生處及名梵本中名無退根二明從生因深三樹功廣大以能生一切樹根等故四此藥王下釋樹名五佛子彼下簡非生處六然亦下明無捨厭晉本云然亦不捨生性次合中二初總後別前中舉法同喻總言亦如是後別中四一合樹身生長乃至成果二佛子如來下合釋樹名三佛子如來下合令一切樹根生等四佛子如來下合簡非生處初中七一以過去等大智願悲三法此習所成性也合樹根二於一切下合從生因深謂從諸法無性中生此性種也三堅固下合樹莖謂以善巧精進為身故四遍法界下合樹枝隨所引生諸度行故五禪定下合樹葉謂以四禪八定三空等故六總持下合樹華謂以總持辨才菩提分等故七究竟下合樹果謂以大菩提常樂故二合釋名中二先總標徵釋後以究空下別顯顯中三一以菩提心一發無休息時故二得果不捨因故無斷也三以前前菩薩行成後後如來體如是展轉無窮盡三合令一切樹根等生等有六並文顯可知四合簡生處中三初總標非處二所謂下別顯三類墮無為坑者住小見故闕大悲水緣不同生長利益故此合地獄坑有火無水故不生問豈此許彼住無餘依不爾如何遮言墮坑答此有二義一怖令勇猛故二令無迂回故二及壞等者住耶見故斷善根故信不具足不住法器永沉生死貪愛長流此合水輪中有水無土緣故不生也三不捨生性中云然亦等者舉前闕緣雖即不生生性不無故云亦也曾無厭捨者佛菩薩性不厭生死不捨衆生其性既在故云無厭捨故前住耶小位只説闕緣不生言三無性不生近有一僧指前墮坑溺水之語即謗此經説畢竟無性義不觀此後句然亦之文乃是顯有佛性之理此僧大與末代衆生作惡知識持少世聽誦得法相章句而於數科成佛要義皆作留難是知佛所懸記期為可驗經云我滅度後之時分後五百歲魔作比丘滿閻浮提壞亂我法後總結可知八劫火燒盡喻喻佛知不盡智合中略舉四境無不斷盡釋中云智慧平等悉明達者證彼一切法一時性分明了達故九劫風持壞喻喻佛巧令留惑智謂佛有此善巧方便令諸菩薩留惑潤生生於三界由此留惑惑方至盡得一切智不同二乘速出故斷惑令盡不生三有具明留惑如別行章十塵含經卷喻喻佛性通平等智於中文四一法説二佛子譬如下喻況三佛子如來下合四佛子是為下結初中三先標謂佛果智遍在衆生中即因性本覺也此即在纏之因具出纏果法二何以下徵意云衆生界中經説有五種種性何以總説因果等有三無一下釋意云此中唯除草木瓦礫無有一因性與果智別此中文二先反解謂但由無明覆故將為有別以後若離下順釋謂若除無明佛智便現非始生也二喻顯中五一總明經卷分量二所謂下別顯經中所録三此大下明器前雖大潛在一塵四如一下準知餘塵五時有下出經益物三合中一合經在塵謂佛智在衆生煩惱身中二但凡愚下合經在塵而不知者無益三爾時下合出經益物謂佛示衆生各自身具有佛慧教修聖道離妄見自佛慧四佛子下結成可知三總結大段可知第二大段重頌中有二十二頌分二初二頌頌前約法總辨佛心智等後二十頌每二頌頌前一喻益準釋可知第五通出現境界中長行內一法説二佛子如大龍下喻顯三佛子菩薩摩訶薩為入下總結初中三一舉能知知所知二佛子如一切下舉所知多以顯能知多三佛子菩薩摩訶薩應知下會釋心智不異初中所知有十種一一切世間者謂諸可破壞法墮虗妄中故二一切三世間遷流可壞故三一切剎者器世間故四一切法者心心法故五一切衆生者諸蘊上假者故已上並世俗諦攝六真如無差別者無性一味故七染淨實體故八純淨邊際故九無質得性故十所緣實性故已上勝義諦攝上來十種由佛所知之境界也二明所知多顯能知多者能知無障得智一味平等若不舉所知差別之境無以顯能知多故十種準前但翻顯為異三會釋心智不異者十中準舉初門顯無量義文中二初總顯心智不異後何以故下徵釋前中二先標心之境即是智境後如心下舉心緣多境無縛無脫智緣多境亦爾言無縛脫者謂勸此菩薩知心本無體無能隨知相本不生無所隨既不隨相則無相縛先既無縛後亦無脫相縛義廣如前普賢品中説此心與智王所不離故如王既爾其所亦然或此亦為鄰近釋也後中先徵意云佛智緣境平等一味無有多小何以言無量故耶後釋意云佛緣境平等必不壞差別多少是故隨彼種種分別思惟有種種多境界也第二喻顯中三一大龍降雨喻喻佛境界無所從此則顯前徵意與釋意無違謂佛境離平等一味然不壞種之相二海水心起喻喻佛智海昔願起此則顯前釋意與徵意無違謂佛智海雖無分別往昔大願無差失故上二喻皆先喻後合並文顯可知三海水無量喻喻佛智海四種無量於中二先喻後佛子於汝下合前中二先別明水多後如是下通顯四多前中一四洲中水二十龍王雨海水三海龍王太子雨滿水四十龍王宮殿中水五海龍王太子宮殿中水六海龍王雨海水七海龍王宮殿中水上七種水皆後水陪多前水入大海中後通顯四多者一水二衆寶三衆生四大地後法合中二先問答後佛子此大海下正顯顯中二先合別顯謂從百分中一分乃至比對分不及一此皆有數量語言及故所喻佛海乃至一極微皆不可比以非數量法故非語言及故故云非譬所及一復合通顯四多中一得初等者合海中水多二一切菩提等者合海中寶聚多三所經衆生等合海中衆生多四住等者合海中大地多第三大段總結可知後重頌中五頌分五初一頌頌法説次二頌頌初二喻及合後二頌頌第三喻及合並如文可知第六出現行中長行內三初牒前徵起二佛子菩薩摩訶薩應知下正顯三菩薩摩訶薩應以如是下總結能顯中二先法説後佛子如真如下喻顯前中二行內一無得行者是即理之事行他用自在故二真如行者是即事之理行常化無化故後喻顯中兩説一云初一喻喻後行後四喻喻前行一云五喻通二行今依後説其中各有法合初喻合中云不生等者謂如為三際依非三際合行過未非緣故不生不動也現在離緣故不起也二法界喻合中云非量等者謂染淨法所顯真性之行非少可量又非多不可量以非形質故然因法顯界不無故三鳥飛喻合中云無邊際等者謂畢竟無窮盡行然非不行故四金翅喻合中云住無得等者謂無分別無得行故五日月喻合中云性本寂等者謂離作念行故然非不運行故餘文並顯可知後偈中五頌各頌一喻可知釋行了第七出現菩薩中長行內三初牒前徵起二佛子菩薩摩訶薩應知下正顯三佛子菩薩摩訶薩如是下總結初中云成正覺者此有四義一彰此差別謂晉本名此為菩提故準梵本中若言菩提則唯是境若云勃陀則唯是智今云成正覺便為境智總合之稱二具釋三字者謂境是真俗二諦不一不異故智是究竟圓滿無分別大智故境智合稱者謂智即境境即智仍不離非即離故三字簡異三類衆故一異衆生衆生無正無覺故二異二乘二乘有覺無正故三異菩薩菩薩有正有覺而未成故唯佛具三故名之爾四種類中三初就菩提中五一有二種菩提大品云性淨菩提修成菩提故二有三種涅槃第四十云下智觀故聲聞菩提中智觀故緣覺菩提上智觀故無上菩提三有五種大品云發心菩提伏心菩提明心菩提出到菩提無上菩提此中初一是十解初住二是三賢三是初地見道四是修道滿五是佛果究竟四有十菩提如離間説五通一切法維摩云一切法即菩提相故二就勃陀中或二或四或十具如諸經及此經上下文説三就合説者即如此文也第二正顯中有十段一體無過失二出過下明業用三佛子諸佛菩提下明甚深四佛子如來應正下明廣大五佛子如來成正覺時下明現因果六佛子譬如虗空下明體離虧盈七假使有人下明用無增減八如來成正覺時下明依定起用九佛子菩薩摩訶薩應知如來身一毛下明佛周遍法界身十佛子菩薩摩訶薩應知自心下明遍心中有佛初體無過失中有九是減數十故謂一佛智於境無所觀觀故二於平等法性隨緣不變二分中無猶豫故三無二者無二念故亦曰不二現行亦云二行永絶世親釋云於所知一向無障功德非如二乘亦有障亦無障故無性兩釋一釋曰前二云此中無有二處現行謂生死涅槃親光釋云謂諸異生住著生死二乘聖者住著涅槃如是二障世尊無故四無相者無性為性故五無行者非生滅故六無止者無住著故七無量者是多功德故八無際者後邊無故九遠離二邊等者離斷常故第二明業用中三謂法喻合初法説中九亦減數十也一出過文字書記故二出過言説故三知衆心行四知根五知性六知欲樂七知煩惱八知習氣九一念中知三世一切法也二喻況中明大海印現喻所現如後可知三法合中心念諸根等皆現佛大智海中略舉十境也而無所現者此有三義一不持作意現故二所現無故三無別體而不得別故即自體顯照名之為覺起信云諸佛如來離於見相無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用無量方便隨諸衆生所應得解自體開示種種法義是故得名一切種智釋曰此則無思顯照同體之境名菩提智業用不同餘法有能所取故第三明甚深中四初三別後一總前中一非文宣故深二非聲及故深三非語説故深後一總者前三但是方便遮詮非表詮故故云但隨等也第四廣大中三初舉身廣大二佛子如所得下類顯結心三得如是總結初中有十三種身此增數十也一是衆生世間謂得能同一切衆生身之身故諸句中皆云量等身者量分也等齊也謂佛身令作彼諸身然不動彼故云分等身者依義聚義諸身隨應配可知二通方執無方軌三器世間四德相世及不相應行遷流性依色心立與三摩耶為依故五隨諸智正覺隨應之身故六德相語言及世間語言七諸法無性性八染淨法所顯真性九事空無質得體故十得事事無得法界德相及業用故十一得諸大願身故十二得功德海滿行身故十三大涅槃界身故二類顯中依辨語心語心亦十三種身可知三總結中身等一一各等法界故云無量等也第五明現因果中三初總顯二無盡下別辨三知一切下總結初中四一標一性二略釋三徵何性四重釋無相性相即體也以菩提身等於衆生是故衆生悉於中現以彼所現同能現故是故衆生無不成佛問此中所現衆生為約事為約理耶設爾何失二俱有過若約事者何故釋中云皆同一性所謂無性耶若約理者何故標中云普見成正覺等耶答此中所現約事理所以者何因修法性觀果成事理無得事事無得德相故謂理即事事即理及此事彼事相在等時皆不壞本相自他非一異三世相望非一非異當知悉然是故佛心中有一切衆生佛所發心乃至涅槃即是衆生發心乃至涅槃此即自他非一異門常是佛常不是佛思之可見二別辨中十一句以顯此義一衆生染相本性自無二有二義一無物可盡故二常故三本來不生故四亦無期滅故五我性自空故六非我性亦無故七衆生緣之生非是生故八即前非生之性亦不可得故九所證菩提無所得故十所依法界亦無性故十一本性空界本無體故十二能證智體無能得故三總結中三初結前知無性二得下明由智故得大智悲若不爾者悲智非大三由此悲智能度衆生到究竟故第六顯體離虧盈中二先喻後合喻中明虗空常性顯菩提無增減由體常滿足成與不成等無二故第七明用無增減中三先喻顯二普賢下法合三佛子下總結初中化現無形顯菩提成不平等言化多心者喻各各修多因故心化作如來者喻成多果故以此因果俱無色相是故化與不化等無異合結可知第八明依定起用中三初唯舉一定定名驚覺者順理警機故依此定出衆生數等菩提之身二如一下類顯謂如一定中出既爾餘一一定亦然如多定既爾餘一一法門亦然謂大悲大智大總持等則知菩提之身無盡無盡不可稱説也三佛子下結可知第九明周遍法界中三先標二何以故下徵釋三隨其下結初中三先一毛孔者此有二種一云於佛身生毛之處孔中即於此處見前門中衆生數等菩提之身無不圓滿二云於佛身上毛內孔中見也上下文中有此毛孔之者並準此二釋二類顯一切毛道皆爾三類顯一切法界處悉重重普遍二徵釋中先徵後釋釋成周遍三結法屬人謂毗盧遮那於此座上坐時即遍周法界處現種種身也第十明遍心中二先明自心例他後如自心下例他心亦爾前三謂標佛菩提果遍在菩薩身心中非是菩薩有菩提因性以此正辨佛菩提故二徵意云何以將同理性説事亦同故三釋意云佛果即以無性理成故故云如來不離此心成正覺故此義具顯如前第六門中復例他心中二先例可知後悉有下結德言廣大等者遍一切處也不離是相即不斷是不壞本相故入不思等者即理即事即因即果故第三總結中者結前十門勸菩薩應知後偈中六頌初頌頌初體無過失次頌頌第二業用次頌頌第六體離虧盈次頌頌第七用無增減次頌頌第八依定起用後一頌却頌第九顯現因果及頌初門業用中説法其末後一頌云如三世等者梵本云三世諸劫剎衆生及心根欲一切法悉於佛身平等現是故正覺亦無量門略無頌釋菩提了第八明出現轉法輪中長行內三初牒前徵起二佛子菩薩摩訶薩應如是下正顯三佛子諸菩薩下總結就正顯中七一體相二一切文字下廣深三佛子譬如下是無盡四佛子如來法輪悉入下無住五一切衆生種種語下分齊六復次佛子下出生七能如是知下顯知法益初中十種一知以心自在力者是法輪因宿願故無起無轉者是為衆生轉非自為也二知一切法等者是所轉之法對緣方起故恆無起三以三種轉等者示相勸知別證三中偏舉斷業餘略可知四知一切法離邊見者是業用能破見故五離欲際非際者所破者不見愛體而離愛故六入虗空際者畢竟無實故七無言説者離言説故八不可説者説前離言亦不可説故九究竟寂滅者永無而有故十涅槃性者圓滿寂靜利樂紛然無竟期故第二明廣深中四一廣二深三四皆俱廣深各有標釋初中前標後如來下釋廣遍也二標説聲如響釋了實性是深也三標一音出多是廣釋以無主深也四標無遺盡是廣釋無著深也第三明無盡中二前文字無盡喻後合法輪無盡可知第四明無住中三初法説謂佛法輪不定住一處二喻況可知三法合略舉五類佛語用彼説法故云善入也第五明分齊中二前中二前標後何以下徵釋先徵意云衆生語言但是執染何以得作淨法輪故耶釋意云執染即實相實相是法輪故於中二先標後釋皆約體用得成法輪也第六復次佛子下明出生於中四一標門二何等下徵起三佛子如來下總舉四何以下別釋釋中先通辨謂欲轉法輪入此三昧者是所依門故也無得者是辨才無畏者無怯懼二入此下正顯多音釋成總中出隨衆生心行欲樂音也令一切衆生等者稱根授法故皆歡喜也第七能如是知下明知法益謂如上而知即順大菩提不爾即非也三總結可知後頌五偈初半頌頌初體相次半頌頌第三無盡次一頌頌第四無住次二頌頌第六出生末後一頌却頌第二廣深其第五第七略不頌釋轉法輪了第九明出現涅槃中長行內三初牒前徵起二佛子菩薩摩訶薩欲知下正顯顯中長分有八一體實真常二佛子如來下簡異灰斷三佛子諸佛下不得出沒四佛子譬如日出下隨器虧盈五佛子譬如火大下起世隨緣六復次佛子譬如幻師下存沒俱存七復次佛子如來應正等覺示涅槃時下用窮來際八佛子如來住於下總結能知相就初中三先舉法勸知即根本自性次云如真如等也二如真如下正辨所知先標真如次會涅槃謂即雙林示滅即同真如平等一味不生不滅故云如真如涅槃如來涅槃亦如是下九例然並是如之異名意顯涅槃同彼真性令明淨故約此多門顯也三何以故下指喻同法先徵後釋徵意云何不直説如來涅槃非永滅度乃至當須了知根本自性如真如真如涅槃乃言如真如際等耶釋意云若先識真如等根本自性是不生義即知畢竟無滅如來涅槃亦爾若不知根本即不知無滅之深故云若法無生無出則無有滅二簡灰斷中三先標次徵後釋標中云如來不為等者約人顯實故謂於二乘亦説如來永斷滅故今就實教大機盡理而談故不為説次徵意云衆生亦有宜聞永滅得何以不為説故三釋意言雖有益生是小非大今為令見常現前故等亦不起二不二根者謂佛界有二不二二者應現時有已滅未滅故不二者一切皆己佛事説如此想亦不起故次復徵意云縱事非有想何得無釋意根因事起此實教中菩薩從發心來初無熏習彼現由何起故云永離一切想著也三不得出沒中三先標謂應機有出沒不得二徵意云何以作此不定故三釋云據佛自體常住隨物示滅四隨器虧盈中二先喻後佛子如來下法合前中舉日影隨器現不現喻顯佛隨器有虧盈如無性攝論第十云問若如來是常住者於一切時何故不現答衆生罪故不現故彼頌云衆生罪不見如月於破器遍滿諸世間由法光如日釋曰如破器中無水月影不得住此非月過是器之失衆生身中無奢摩他清深定水佛影不現非如來過是衆生失五起盡緣起中三初喻次合後結喻中火事隨薪有無燒不燒別佛隨彼化緣有起盡故攝論第十云或涅槃如火者如世間火有處燒然有處息滅諸佛亦爾於諸善根未成熟者現等正覺令其成就速得解脫於諸善根已得成熟已解脫者現般涅槃無所為故六存沒俱存中三謂喻合結喻中舉幻師隨捨不捨顯佛隨機有滅有存法界身恆遍言善知等者明佛此身即是法界身故七用窮來際中十二初定力現佛二佛身放光三光出華蘃四蘃有莊五依莊有佛六佛數等所化七佛德具願海八佛應機化益九佛窮來際十佛體離有無十一佛常住所由十二正結知見此並如來雙林示滅之時有此事也八總結能知相中十句一無量者結上簡異灰斷彰大涅槃功用無邊二無得者顯隨緣起盡明滅不滅無得三究竟法界者為萬行所依結存歿俱存四虗空界者結不得出沒上云其實如來無有出世亦無涅槃是故同虗空也五真如法性無生滅者結隨器虧盈上云其實如來不生不滅也六實際者結前最初體實真常結上實際等十義七為諸衆生隨時示現者通結諸門因應機現用也八本願持故無有休息不捨一切衆生九不捨利十不捨法此上三結末後用窮來際謂願力持故盡窮來際等可知後頌中六偈初頌頌第四明日等者梵本云譬如日光照世間器壞水流影隨滅佛智日光照法界無信正見見涅槃次頌頌第五次頌頌第六次二頌頌第七説一頌頌初門餘略不述涅槃出現了第十出現見聞親近所種善根中長行內三一見聞信向益二佛子我今告汝下見聞不信益三佛子如來下簡喻異法初中二先總法説後佛子譬如丈夫下喻顯然一一中皆有徵合等初中十一句先一句總後十句別總中云於如來所乃至覺慧故者謂見佛色身聞佛名號受佛戒香得佛法味若佛光觸若憶念佛皆種善根生無盡覺慧覺慧謂大菩提智也若供佛曾行地及佛塔廟亦具善根滅惑得樂乃至雖見聞佛由業障纏覆不生信樂者亦種善根無空過乃至畢竟大般涅槃後別中一斷果二窮來際利樂三不錯謬四大願滿五了有為性六所行與無為合七所作生真慧八所修皆無限九所行皆佛正因十所行皆八地已上不動因上來初唯斷後唯智中皆通如文可知二喻顯中三喻一吞小金剛喻喻於佛種少善根畢竟得大菩提涅槃益文中六一喻金剛性堅利非肉身腹內所能銷化故云食少許終竟不銷要穿身過出在外舊經云下入至金剛際乃住二何以故徵意云何以至彼方住耶三釋意云身業非金剛住處故四合云佛所種少為非一異善不住一切有為行等身中要至為即無為智處住五重徵云何以少許即能如此故六重釋云多少雖殊其性是一必不與一切有為法同性住故二小火燒薪喻喻於佛種少善必斷二障益文中六一喻謂小火能燒大草積二徵云草積極大火體極小何以小火能燒大積草故三釋意云以火是性能燒物乾草性是易燒故小能燒多也四合云於佛種少善必燒一切惑盡至大涅槃五徵六釋並易三藥樹多療喻喻於佛積少善不空過益文中一喻佛為衆生六根境益物不空文中二先約佛現在後若有衆生下約佛滅後前中見者眼得淨等可知與寶性論大同故彼論云諸佛身如虗空無相為諸勝智者作六根境界示現微妙出于妙音聲令嗅佛戒香嘗佛妙法味使覺三昧觸令知深妙法後明佛滅後中取彼地土者喻後世遇遺教及供塔廟等益二佛子如來下法合文顯可知第二見聞不信益中二先正顯業障衆生雖見聞佛及滅後遇經教供塔廟等由惡業障纏覆不生信樂者亦種善根後佛子菩薩下并前信向等總結問如何不信亦名種善根不名造罪耶答且據得益邊説謗罪非無故文殊巡行經云文殊師利言我由過去謗般若故無量劫墮三惡道即由謗時聞般若故今得解脫又如來祕密藏經云譬如罵藥服之還得病愈罵沉燒之還發香氣於佛瞋罵猶勝恭敬讚歎外道第三簡喻異法中三初標云無有譬喻能説此法二何以故徵意云向來唯約喻顯諸法今何以言非故三釋云但隨衆生心見聞愛樂處且作是説令漸得入理實不只如此故云心智路絶等上來總明大段第四説分竟此門偈頌在後顯名受持下此是教相中相第塔鉤鎖義故第五大段顯名受持分中三先顯名次佛子此時門下辨受持後佛子菩薩摩訶薩成就下結益前中名有十種一如來祕密者於佛所説中見幽奧義所謂理事事事無得法非權小所及故二世不能知權小尚迷何況世間故三入佛印者佛印即是一切法無性故四開大智門者佛果大智此教為門於此開悟是為方便得佛智故五示佛種性者佛體唯是無性理故六成就菩薩熏此種性成故七不能壞者熏成金剛種子非人天中受銷故八一向隨順佛境者佛以真俗非一為境故九能淨衆生界者悉淨治故十演説等者此教唯説隨緣不變真性此為諸佛根本故後辨受持中四一定所為受持二是故菩薩下舉益勸修三若得聞此下信順成益四菩薩摩訶薩聞此經已下勸修成益初中三謂法喻合法中二先明為非後佛子下明受非受前中二初不為餘者謂權小凡故後唯為等者謂大乘實教菩薩故於中有二先明地前名趣向大乘無分別智為乘體故後是十地菩薩乘名不思議此乘非彼權小凡等所思議故又乘是運載義若從信至賢從賢至聖是可思議今乃十信滿心十住初位即是佛果故名不思議乘也後受非受中二先明不能受後唯菩薩下顯能受不能受中云不入手者手信也上文賢首品云信為道元功德母乃至為清淨手受衆行喻中五句可知合中亦五一此經等合七寶二不入手合無堪持也三唯除真子從種性中生者合第一夫人所生太子四種如來相等者合具聖王相五若無此等者合若無太子七寶散滅以無修行故教法不行名為經滅般若論云法欲滅時者修行滅故何以故下釋無真子經滅所由第二舉益勸信中二先明聞信之益後佛子設有下明聞信難得前中有標及徵釋標云菩薩聞此應大喜頂受二徵意云豈佛所説有勝有劣有聞不大喜等者耶三釋意云由菩薩聞此生於信樂即疾得菩提故後聞信難得中二先顯真菩薩後以不能下釋成初中三初明但依權教修行不約實教熏習為因故云設多劫修六度菩提法也後若未聞下明前既無因故後無果故云未聞或聞不信等不順者不能依教行故不入者由無行故不能證會故後釋成中意若依實教畢有證會之時得名真實而生信尚無竟何證會得名真實耶第三信受利益中文有十一句一聞實教法名如來等者此唯諸佛無盡祕藏解脫大智境界故二聞已能信解等乃至住佛家故無性攝論釋云生如來家者謂佛法界於此證會故名為生世親釋云由此能令諸佛種性不斷絶故十住毗婆沙第一云今此菩薩行如來道相續不斷故更有多釋廣如彼説三順佛智境真俗鎔融四悲智行具五住境佛界此亦於佛所化能化故六無諸雜染七能增長佛果所行八諸菩薩化生法皆了達九於佛神通作用不疑十億無師自然智十一於佛無得解脫證會故第四修行成益中亦十句一大智普智一性法故二真心念真如故三現見諸佛故四以加行力入平等觀五由神通念力遊多世界或於諸事物中以自在念力身遍其中六以智導衆福七由無師自然智永離世染八以菩提心入十方網救護衆生方網者謂一剎海中有十不可説剎種一一種上有二十層從最下層有一佛剎塵數乃至最上層有二十佛剎塵數總有二百一十剎塵數剎此剎一一各有十佛剎塵數廣大剎繞又此廣剎一一各有十剎塵數眷屬剎繞如是三重諸剎遞如網以其上下四方四維皆相當相去近遠亦有相似故其一一層中諸方相望既爾故名方網總相觀之狀如網故九知三世佛同一體如此知之名大觀察十以善根回向之智能普入諸法謂凡觀一法必具一切然智入時以無能所緣而入故名無入之入也若依梵本應言佛子菩薩摩訶薩聞此法已應以普遍隨行智入應以積集中無量意樂隨行心入應以離一切分別計度勝意樂入應以一切如來現前作意入應以了知平等如虗空殊勝念入應以菩薩無中邊法界意業樂行入應以普遍一切功德成就神通智自然智入應發除滅一切世間垢濁心入應以盡一切方網菩薩普遍觀入應以善根回向三世諸佛同一體性智入應以此諸法入然無所入不於一法而有攀緣應以一法觀一切法釋曰此上十種入是聞此法已從如是十種方便法入此法不同新譯經文思之後頌中四頌此但頌前第十大段見聞等益不頌顯名受持也四頌分四初一頌法説次三頌各頌前一喻如次應知第六大段表瑞證成分中二先表瑞後是時十方下證成前中二先此土謂動地雨供表法真實後如此下結遍通十方即明一説一切説也此亦通結前所説法皆順根成利益故後證成中二初明果人證後爾時十方下明因人證前中二先明證法後令此會中下舉益證中四一現身證二而作下讚説三佛子我等下別意説四如我下類通説可知後舉益證中五一得因位滿益謂一生菩薩得十通蒙記盡現一生成佛故二佛剎下佛剎塵數衆生發菩提心一記多劫成佛同號佛勝境者同緣佛出現境界故三我等為令下明佛護持經久住四如此下類結前度生益五出前遍益所因中略顯十因一十方佛現在力故二當處佛本願力故三有此法起處即合有此益故四彼得益者自善根力故五佛加持令起不虗加故六根緣契會故七隨可驚覺時即驚覺故八往因不失故九令成普行故十顯佛智自在後明因人證中二先明此處作證後如我表此下類遍十方前中二先釋文後問答前中有十六節一乘處遠近二有十不可下衆數三來詣下明充滿法界而來四現菩薩莊嚴相五放光六動剎七壞魔宮八滅惡道苦九顯歌讚佛德十雨諸色雨十一現諸色身十二受無量法十三以佛下讚説法者十四佛子下自述同名及來處十五彼一切下述彼同此所説法同略有六種文句義理宣説決定決定即是益物十六我等下顯來意作證故略出二因佛力故得法故得類通可知後問答者問如上發心品中唯佛證成所餘會中菩薩作證今此品內通因果耶答發心品中説初發心即是佛故證此難信佛自證餘會唯菩薩者為證所説諸菩薩行一即一切一切即一故今此相顯出現行等皆是果位所行之行此則雖得佛道而不捨菩薩行故通因果也第七大段重頌分中分二先辨意後正顯頌前中二初觀衆後欲重下顯意顯意中有十句一佛出現等明總句出現正法二如來正法等是語業音聲三無量善根是身業四諸佛出世業是菩提五善能等是心業六隨應等是轉法輪七出諸菩薩等是於佛見聞敬養八一切諸佛自在等是境界九一切一身等是涅槃十從本大行等是出現行也後正顯頌中四偈初一頌頌前説分次二頌頌前顯名受持分後一歎勝勸持
