body:
  text: 離世間品第三十八將釋此品四門同前初釋名中三一分名名託法進脩成行分謂由仗託行法脩成正行故二會名上三一約處名普光明殿重會二約人名普慧普賢問會三約法名說二千行法會問第二會後歷忉利等四處後來普光可名重會七八兩會中聞不曾暫起復來何名重會答重會之名通於多種謂時處人法皆有重義前約處明此授法說謂前六會同顯生解因果令重辨彼解所成行故名重會三品名有四一下文有十義至彼當辨二別行本名度世經三又有別行本名普賢菩薩答難二千經四今此名離世間者略有二種一約位二得名釋名前中謂人天為世間二乘為離二乘為世間菩薩為離菩薩分假變易俱為世間佛果言彼為離二釋名者謂五取蘊可破壞故名為世此可破壞蘊墮三世中故名為間此世即間持業釋也若總言離世間是無他受稱或持業釋世間性離故世間即離世間也故上文力林菩薩頌云三世五蘊法說名為世間彼滅非世間如是但假名第二來意中三一分來謂前明脩因契果生解分則依信起解今明說法進脩成行分則依解起行故次來也二會來謂前第七會明生解終因及顯其果今辨依彼解成行故次來也三品來謂前明出現品是生解果之作用今顯彼作用所依之行作用唯在生解會說義如前辨第三宗趣者頓影六位為宗為證入法界為趣第四釋文中二先辨長行後偈頌前中有八謂一序分二爾時普賢菩薩摩訶薩入廣大下三昧分三入此三昧時下發起分四然後下起分五爾時普慧菩薩知眾下請分六爾時普賢菩薩告普慧等下說分七佛子此法門下經勸分八說此品時下來證分序分中三一器世間圓滿二妙悟下智正覺世間圓滿三與不可說下眾生世間圓滿初器同前二七會說第二智正覺中明佛二十一種殊勝功德攝論第五佛地論第二並約唯受用身說此經依十身顯就二十一位中初一句是總後皆為別前句總云妙幢皆滿者親光三釋一於一切有為無為所應覺境正開覺故二於一切所應覺淨妙圓滿正覺故三就真俗以依二諦攝境盡故後別句中依無性論總為二先總料簡後各別釋前中分二初四位明自利後十六德明利他前四分四一智德二斷德三恩德四作用平等德後各別釋中一云二行永絕者無性三釋一於所知障一向無障轉功德非如聲聞獨知亦有障亦無障二或二處現行此中無有二處謂生死涅槃三或約未得神通者於內外處有障現行佛無此故二達無相法者世親釋云清淨真謂趣入即是於有無無二相真如最勝清淨能入功德謂此真如非有相無性為相故亦非無相自相有故於此真如最勝能入故清淨能入故彼釋趣字是此經達字無性兩釋一同世親一云無住涅槃名為無相不住生死涅槃相故三住於佛住者世親釋云謂佛住所處即是無功用佛事不休息住功德謂此住中常作佛事無有休息無性釋云謂不作功用於諸佛事有情等中能無間斷隨其所應恒正安住聖天梵住非如聲聞要起功用方能成辨非如外道雖有所住而非殊勝天住謂四靜慮梵住四無量聖住謂空無相等四得佛平等者世親釋云於法身中所依意樂作業無差別功德無性論云所依無差別者一切皆依清淨智故意樂無差別者同有利樂勝意樂故作業無差別者同作受用變化利他故非如聲聞唯有所依五到無障處者世親釋云即是脩一切障對治功德謂一切時常脩覺慧對治一切障故親光兩釋一顯示世尊永斷所治殊勝功德謂已證得解脫一切煩惱所知二障智故及以永斷一切障故二已慣習一切煩惱及所知障對治聖道一切種智定自在性已到永離一切習氣所依趣處六不可轉法者世親釋云即是降伏外道功德無性為二釋一謂教證二法皆不為他轉勸無勝此故二謂佛正法諸魔等不能令退轉故七所行無㝵者世親釋云即是生世間不為世法所㝵功德謂雖現世間不為世間八法所染污故無性兩釋一同世親二云於諸者情所作利樂無有高下結為勿礙八立不思議者世親解云即是安立正法功德由契經等正法無量不思議非諸愚夫所能解故無性釋云謂十二分教名所安立安立自共相故如是安立非諸愚夫覺所行故出世界故不可思議九普見三世者世親云即是授記功德無性兩釋一謂於三世平等法性能遍遊涉以於三世平等性中能隨解了過未曾當轉事如現授記故二於三世佛剎有情事皆相似故十身恒充滿一切國土者世親釋云即是於一切世界示現受用變化身功德無性釋云謂隨所化遍諸世界亦現兩身利樂彼故十一智恒明達一切諸法者世親解云即是斷疑功德無性釋云於一切境善決定故非於諸法自不決定能決定化疑非決定能斷疑故十二了一切行者世親釋云即是令入種種行功德親光兩釋一顯示世尊於一切乘所作能隨有情所應示現自身殊勝功德謂遍了知一切有情性行差別如其所應現自身故後釋同世親十三盡一切疑者世親解云即是法生妙智功德謂知當來如當來如是法生如來妙智無性釋云謂聲聞言此全無小分善根而棄捨者佛知彼善法當生現證知彼餘生微少善根種子所隨逐故釋曰如經說有人求入道諸阿羅漢觀此人前八萬劫來未曾有一會善遂不度佛知有善度之得初果佛說此人昔定光佛時為採樵人於城門首聞人說佛能救苦厄稱名者蒙救彼人行至山逢虎將欲被食急欲稱佛遂忘但得一憶念南謨向者城門首聞者由有此善今熟可度故如是細遠二乘不知唯佛達也親光兩釋一顯示世尊妙善了達一切法智能隨所應恒正教誨殊勝功德謂於諸法疑惑者無能隨應教誨唯佛證見諸法智善決定能隨所應無倒教誨無休度餘一同無性十四無能測身者世親解云即是如其膳解示現功德親光釋云顯示世尊能正攝受無染自體殊勝功德一謂佛身非虗妄分別所起無煩惱業生雜染故故云不可分別二佛雖無分別如末尼珠然由佛增上力及自勝解力見佛如金色等而佛無有分別十五一切菩薩等所求智者世親解云即是無量所依調伏有情加功德謂無量菩薩所依能作調伏諸有情事無性兩釋一謂由無量菩薩所依為欲調伏有情發起加行佛增上力聞法為先獲得妙智異類菩薩攝受付屬展轉於後無間而轉故證此智二引攝住持不定種性聲聞菩薩故讚大乘為顯此事故次說言一切等所求智十六到佛無二究竟彼岸者世親解云即是平等法身波羅蜜多成滿功德謂無二法身名平等法身即於如是無二法身得清淨波羅蜜多無性兩釋一謂無二故名平等依平等法身波羅蜜多果德成滿故二果位六度無增減故名為平等十七具足如來平等解脫者世親解云謂於無雜如來智中勝解究竟此中勝解即是隨其勝解示現差別佛土功德無性兩釋一謂觀眾生勝解差別現金銀等種種佛土不相間雜世尊勝解現在前時隨眾所樂悉皆顯現無不了知二間一切佛得平等言即謂一故應一同性為遮此疑故次說言如來解脫妙智究竟十八證無中邊佛平等地者世親解云即是三種佛身方處無分限功德謂佛法身不可分限爾所方處用變化亦不可說爾所世界無性兩釋一謂如世界無中邊佛地功德方處無有分限或世界方處無邊佛三身即於身中平等遍滿或法身等於佛地平等遍滿無中邊分限復遍一切處饒益眾生然非自性無中邊佛地平等十九盡於法界者世親解云謂極清淨法界是名極於法界即是盡究竟窮生死際常現利樂有情功德無性釋云謂此法界最清淨故能起等流契經等法極此法於當來有情隨應利樂彼論極字是此經盡字二十云等虗空者解深密等皆云盡虗空性窮未來際此兩句中下句諸教或有或無有者或分或合若依此經總別合有二十一句若解深密等則有二十二句初總同前則中自有二十一句故世親無性開此第二十句為兩句別釋親光合為一釋世親釋云盡虗空性者即是無盡功德謂佛智無盡如虗空故無性釋云如彼虗空無邊際無盡滅無生無滅無變易一切時容受一切質礙法身亦爾常作利樂為相盡一切界遍作饒益常無休息窮生除者世親釋云即是究竟功德無性釋云謂此功德常無間斷窮於未來無際之際顯佛功德永涅槃窮盡所化有情永無盡故親光合釋仍為兩解一云二種殊勝功德顯示世尊功德無盡盡虗空性顯示世尊自利利他二德無盡謂如虗空經成壞劫性常無盡如來一切真實功德亦如是常無間斷如來際無有盡期利他功德亦如是窮未來常作一切有情利樂二云世尊無盡究竟殊勝功德謂如虗空常無窮盡法佛法界所起功德亦爾無窮盡故如未來際無有盡期利樂加行亦無休息上來略顯二十一德若具顯別名法釋同異及法門分別廣如別章第三眾生世間圓滿中二先舉數歎德二其名曰下列名歎德前中二初舉數簡定後悉具下歎顯勝德前中四一不可說等舉數二菩薩等簡大異小三一生等簡勝異劣四他方等簡客異主亦可通後分二謂先不可說等舉數後皆一生下歎德歎德中三一歎位高德皆一生等故二歎求法德不遠而至故三具方便智慧德於中三先總標次所謂下別顯後成就下總結初總云具方便者有巧度生法故具智慧者巧度法所依故次別中十九句初九句歎因位自分德二於一念下歎果位能進德前中二先四句歎巧慧德後五句歎攝生德前中一觀小乘熟以調伏方便令住大乘二觀法佛土方便悉往禮供聽法三觀樂涅槃眾生為說如來般涅槃無生無滅離法戲論方便常脩妙行四巧以四攝方便攝受眾生五以四無量方便化法眾生六知業果與無性不相違反七知眾生根欲心使等境持三世佛法隨應為說八於世出世法知實安住九於為無為善觀無二後勝進中十句一念得三世佛知與多劫脩得不珠故云一念中得二念念中眾生有須成佛處則成故三化物發心成佛四知物心所緣境五得果不捨因行六知所作行本無所行七為一一眾生各住多劫脩行不倦八為眾生多劫不出令生難遇渴仰善根九說法調生不應損十具三世佛行願後結可知二列名歎德中三初列中相莫不皆同普賢自德故同名普二結數可知三歎德十句初一總謂具普賢自體如行及願別中一攝法上首二受持正行三化物令不斷種性四知法佛出皆與菩薩授記次第五知法菩薩成說法六能於無佛界成佛七能化染我令淨八能除菩薩業障九令證法界行此上九句望初句亦行亦願宿願故現行第二三昧分中二先標能入人後顯定名前中普賢入者由是會主故表此行法普同遍故從此出彼無邊行故後名華嚴者欲說成行分故第三發起分中二先總謂入定時後別中四一所動處謂十方等二動相謂六種十八相三出聲四所為機問何故發起在入後出前答以是定中勢力警現在機令起決定信樂故問若爾何不出後發起耶答先發覺令起信心後出即為說故問何故此無加分者以此行法依前解起無別法故若爾何故更入定釋曰以抄解成行故須入定法不異前故不須加第四起分者有三義一三昧事訖故說時至故定無言說故故須起也第五請分中三初總標諸問二何等為菩薩摩訶薩下別問端三善哉佛子下結請問前法會皆於定前請問何故此不爾耶答前諸會從相入實成正解故今此依體發起成於正行故不同也何故普慧問者表遍法界慧方堪發起故何故一人問者表此行法專在己脩不同於解可傳多人解故言知諸菩薩雲集者知問時至故起法之緣具故此明問何依也問普賢者無盡行法從一法界流出故二別別問端中有二百句而別行本度世經中作六翻問答古來諸德依彼科段今亦依彼長科為六謂初二十句問十信行二從何等為發普賢心下二十句問十住行三從何等力持下三十句問十行行四從何等為如實住下三十句問十迴向行五何等為身業下五十句問十地行六從何等為觀察下五十一句問佛果究竟位中行上下文中總三度說六位今此是第二度說也以普賢行該六位是故度世經云此經唯為解說為菩薩行從始至終令無疑也彼經六段文雖不配屬信等六位盡云從始至終復於末後明成佛果故知最初信行為始此文明矣第六大段明說分中二初總告後菩薩摩訶薩有十種下正答答中有二千句晉本但有一千九百九十九句以中間𨷂每十句答前問中一句是故二百句有二千句答也釋此二千普賢行法略以五門分別一因果二行位三普別四互攝五行相初中四向一約大位謂前五位為因行後成佛等總為果行二尅體辨二百門行一一皆徹佛果是故法文之末悉結云即問佛也此即皆通因果二位三或總屬因位以普賢位中亦現成佛攝生故四或總屬果以下文多云雖得成佛而不斷菩薩所行是故此行皆是果行二行位者謂二千法約脩名行授分稱行位相望非即非離位無別位積行成位行無別行各別稱行三普別者謂此中一行必遍一切然恒不雜故別義常遍而不生別普義永殊而不乖至若錦文常普常別要由別而成普必賴普而成別極違成順極順成違當知此中行相亦爾若然者此即普別不相離異何獨名為普賢行耶釋曰此普即是別故但名普賢若捨普更名別即不名普賢如言大方廣法界具大小故但言大不言小離大更無別小故如言我聞我即無我故但言我聞若捨我別云無我聞者即我外有無我我不即是無我也四互収攝者有四重一以住収位六位之內一一各収一切位故是故一位即具二千為萬二千也二以門収門即二百門中一一各収一切門故則成二百箇二百為四萬行也三以行収行即二千行內一一行各攝一切行故則成二千箇二千過億等也四以略攝廣如此中說二千行等下頌結云如大地一塵是也以此塵之略說不離十方之廣地是故攝廣亦不盡此乃等無極之法界越無際之虗空下云虗空可度量菩薩德無盡是也五行相者就此二千行中依前六位即分為六如前所顯初二百答前二十問明信行中分三初九十句明自分行滿二從入法菩薩下八十句明勝進行圓三從差別知下三十句明二行究竟就初明依者以是行起所依最居首故晉本加果字者譯家誤文中四一舉數標名二依名徵數三依徵別釋四是為結勸下諸文中多具此四或有增減至文當顯言依者簡非外器及非內親因故但云依十句一一各有標釋其初句是總以菩提心是萬行之本故此二千行首先建其名此心於脩行時曾不暫離離則法行無依故二雖內有勝心若無善友行亦不成故云和合如一一謂同一心也三上二行依自宿善根或脩諸行時皆由先有善根為依所脩則得增長四所脩之行若不照三輪淨為依脩行但感三有勝果不結成就無上菩提五若不識一切法實性不得究竟出離六菩提行得增要由大願上文云一切佛事大願為本七功德海滿乃成菩提故依諸行成就八與諸菩薩更互為依彼此俱同一無生慧故九淨信佛心依供佛行生十唯佛為究竟以就於正教授故四結勸勸中諸佛所作無非智導故說依知菩薩依此十法當亦得彼故云也第二奇特想者此十各於自所緣相就其最勝決定作解故前依因緣以成諸行今約勝想以攝善根四門同前初二可知三列名中一於他善根等者菩薩勸自他無二故於善根決定知同一也二於諸善根想彼是成佛因或有正因故或有相資故或展轉故三於一切等者真如用大常熏眾生厭生死求涅槃故眾生心中具有無師自然智故多聞熏習與阿賴耶識中解性識知為聖因故四一切菩薩與己事願願性同故五故一切雜本來性淨故亦知自他無別就善說故七知諸法實性佛證此成正覺故八佛說法語言皆同眾生語言而說故彼語言堪法輪攝九菩薩受皆由從佛聞熏所感是故佛為菩薩慈父十一切佛與己同無性為體故無二也四應結勸若得此想則得能轉一切法之想以一切法隨想轉故此是佛位也第三十種行者以依決定心起大行故三別釋者十中一攝生令熟二為行求法晉本令物求法三於善根令增長四心一境性五所觀皆了六於所脩行皆能七脩嚴剎八於善友敬養九於佛尊事上來九句晉本十句今脫第三善學一切戒四結勸可知第四善知識者令我於未知善令知未識惡令識故名善知識廣顯如章行起必藉善友故次明也別釋中十句初一令住三種心謂深直悲等具顯如上二令於一切境界巧起善根三令於一切行照三輪淨四令善說法五令稱根勤說亦令如應巧說勝解七令知世如幻等八令常起行不倦九令行普行十令證大菩提第五勤精進者雖遇善友若不策勤無由進行故次明也別釋中十句一勤化物二於一切法證無生故三脩嚴利故四同法菩薩所脩故五化物滅惡因故亦息物受苦果故七摧魔業故八令物明見善惡故九脩供佛福故十廣行二利常受利樂故結勸可知第六心得安隱者晉本名正悕望謂加行時悕望故果遂時心安故三別釋中初云自住等者自他心住深心等故二自他行無諍行三自他離凡小行心成唯識云凡謂無性愚即趣寂此亦凡夫樂三有小乘厭三有菩薩不爾故皆云離四可解五波羅蜜道者道即出離因行此波羅蜜即是道六自他俱證法性家故具釋如前七自他深證無生性故八文顯可知九為自他願滿菩提十自他深證諸佛智藏謂佛六智包攝法界故出生菩提二乘人天道行果證故藏也勸可知第七成就眾生者此有二種一通二別通謂此十一一通用成就一切眾生不謂此中十法各用成一類眾生一為慳貪貧窮眾生二為恃色形起慢眾生三為愚癡眾生四佷㑦眾生五貪愛眾生亦樂二乘眾生七不厭世間眾生八信幻術力眾生九邪歸依眾生十信外道呪術眾生用上十法如次教化令其入道故云成就第八戒者依前成就眾生惡無不離善無不積故次明也十中初謂失壞菩提心則破菩薩戒乃至第十若取著佛身即是犯戒餘亦如是准之此十隨應三聚所攝第九自知受記法者依前離過德成自驗己行必當得果決定無疑故云有知受記一為眾生故發心名殊勝自知此發是真實發故自知受記二多劫常行菩薩難行初無厭心亦不放捨三多劫脩行不以為多四佛所有法悉能具脩五深教法亦脩脩眾善令圓滿七能安受眾生佛菩提中八一切所作皆順善友同心無二九於善友作佛想十於本大願常憶在前於此十行自驗有一即知定當得佛授記瑜伽菩薩地云菩薩由六種相得佛授記一安住種性未發心位二已發心位三現前住四不現前五有定時限謂示所證菩提六無定時限謂不說時限與授記善戒經云非但種性人得授記釋曰如不輕菩薩與四記約非種性人遠當得故如十信中記是種性人以約種性決定故如發心已去決定不退故是三賢位也如梁攝論云十行菩薩名授記者是也初地已去證如成就故受記如十地論云第八地中受記是無功用行成故如本師於然燈所得記等此中十種約通諸位始在十信中餘如前說上來九十句明自分行竟次第二從十種入下有八十句明勝進行於中初十入諸菩薩者前既自分行成以應明勝進入所入處自下有五門皆言入者三門多約心能入境謂觀察彼故如前心得安隱中說後二門多約身入彼中然以身心相即故心入身入亦無礙也入者證也相應也謂菩薩於此願等十種證徹故相應故一與本願相應二行相應三與八萬四千法聚相應四十度等行相應五所行與三輪淨相應六隨事隨行差別願相應七勝解相應八嚴剎相應九隨宜神力相應十於示剎諸生相應結益可知二次有十種入諸如來者前明因位今辨果位故也於中一示多成佛二示多時處說法三多巧隨根四多隨音聲五多隨宜調伏六多神力用七示多身八入多定九多力無畏十示多時處涅槃結進可知三次有十種入眾生初三三世行次二二性次四心根解惑習氣後一於時非時化伏結進可知四次十種入世界者前顯正根今辨依果故也別列中初二約染淨次四約麤細言微細者非以小故得名世親無性皆云微細者以難知故謂於一事物一向現他非如相在此彼樂容次二約止住形勢後二約化主有無結可知勝進云普入者非如前十有各各別入此則同時頓入前十也五次十種入劫者前明所依處今辨所依時故也別列中前五直明入後五約相無明入前中初三約三世各別入後二約少多各別入後五中一入少即是入多二入多即是入少三入一切劫即入非劫者一切劫謂小中大等小中刀兵等大中有多種仍重不定如壽量品說婆娑中大劫望後唯小賢勝剎中望唯喻大中間諸剎內劫亦小亦大上下互望故即非劫者謂入彼小大等劫時即是入彼非劫故非劫有二種一者日月年歲等未至劫故不以劫名之故名非劫十定品第三定中說至百千那由他億年已去方以劫量故二依壽量品說賢勝佛剎已去但是佛德相外器減彼常時無有劫量是故彼時亦名非劫古德釋云非劫者會相歸性性作是劫故又彼釋云此相入是相攝者良恐不然此文其顯不知古人何意是說今但傍文如前略顯若不爾者理望於事不是兩物何故相即耶又德相業用中相即世等皆是此事彼事相望以顯事事無礙非理事無礙法界也四入非劫即一切劫者唯前翻顯可知五入一切等者延促相即一法性故結進文易六次十種說三世者前劫此時故也於中四初牒問總標二何等下依標徵數三依數列名四是為下結及勝進初二可知三列中前九別說後一總顯前中對三世各三成此九世結現世現世中以一念之法性與前九世法性一故故前九世即是此一無也又前中未來說未來盡是無盡而過去說過去何不爾耶釋云未來非是滅法故說無盡過去是已滅是故不同又現世說現既與現不殊即云平等過未說過未何不亦然釋云過未之過未一向是無現世是有故世是有故不同爾法門分別具如別章約文易了不更釋也七次有十種知三世者舊經名入三世間今此以前既了時劫無礙今辨知彼中法故列中初一知彼彼中器世間諸安立事二知彼彼中眾生能詮語言三知彼彼中能論議論四知彼彼中執議法明五知彼彼中所有名因表召六知彼彼中真法斷惡七知彼彼中所立名字皆假安立八知彼假體即當故無盡九知彼無盡法本不生故寂滅十知彼寂滅法無性故空也四結及勝進可知八次有十種發無疲厭心舊名捨離憂惱心無厭悔大同新深悔字少異前無知法悉曲故互無疲厭列中分四初四自利行謂供佛近發求法聞法故次三利他行謂說法調生令物行佛因故次一重明二利行廣次一重明化廣後一重明思惟入理自利行也結及勝進可知上來八十句明信中勝進行竟第三從十種差別知下三十句明前二行究竟舊名不可壞知於中初十明差別智者謂於彼諸境巨細悉知名差別智於中知眾生等約勝境知佛法等約淨境知世界等通勝淨知法界約非勝淨約並可知第二有十種陀羅尼者前既悉知諸法差別之相今持彼不妄生故也於中初持教法二持行法三四持理法四亦約法先照用滅惑等五持定法六持圓音說法於一字中了一切字義故七持三世法八持辨才說九持能聞一切佛取說法耳根十持一切佛法住佛力無畏故約文可知第三次說十種佛者前明持法今辨解佛故列中今略釋名一具足開悟故二大願成滿故三萬行因感故四久住持遠法故五應化示滅故六攝理普周故七隨物心理故八現言因方見故九真性不變故十任機取欲故約文可知又釋將下文十種見佛釋此可知上來二百句答前二十句問明十信中行純熟竟自下大段第二從十種發普賢心下有二百句答前二十句十住內行法於中分四初六十句別明解中初發心住義二從十種波羅蜜下六十句明餘九住中所成內德行三從說十種法下三十句得諸住位中外化攝生行四從十種勝法下五十句明無礙殊勝行熟初中創得住位以大心為本是故最初明發普賢心釋普賢如前列中初十心皆有標釋初三心明下救濟次二心上求果行次一堅心歷多生而不忘前三心故次一於脩善無飽心如海吞流故以一忍心不可動搖故次一心施安後一心慧極故結及勝進可解二次有十種普賢行法依前大心起廣行故舊經加行字於中前九明因行廣後顯成果廣以普一多即因果故前中初二自行廣次一益生廣餘過二行廣皆廣立大願脩行無限也三有十種大悲者依前普賢行法中別辨大悲以深要故次明也用此悲心緣念眾生未曾暫廢故舊經有常字列中一傷無善友可以倚賴二性行佷戾三貧無法財四為昏沉所速五設欲求出乃習邪法無利勤苦六雖不習邪乃與愛欲相脩善七雖不與欲愛相應脩乃為色無色脩禪定故云沒生死海八眾惑病纏不示善行十身名無師智不能觀察故餘文可知四有十種菩提心因緣先觀悲境次顯能起悲直深等三心故明也列中前五下為含識為因緣後五上以佛果為因緣此則正顯菩薩之稱前五中初一總餘四別別中前二除苦與樂後二遺愚與智後中亦初總後別別中前二順教見相後二順義顯位餘准釋五有十種親近供養善知識者既發心已宜近善友念心增長故次明也又釋此上五十門行悉並同時說有前後謂以依善友方能發心等故於中五一標意二徵責三總釋四和物五結段別中十內一身業是更二悅意三順教四依從五不求恩澤六無進退七與善友和合不二八與善友俱期和物九與善友同乘如實道又重善友如佛十與善友行互無差別又前六事發後四同脩六有十種清淨者依前發心得此清果故此長發心之近果皆有標釋於中初六三業淨謂前三體淨後用淨次二主伴淨後二願行淨結文可知上來別明初住位竟第二從十種波羅蜜下有六十句通明住中所成內依行於中初十正明法住取行之行於中十度並先標後釋釋依法性相應三輪永淨也初云悉捨等者乃至捨亦捨故二三云佛戒忍者輪淨同佛故四云所作等者非唯事中策勤不轉乃至於妄策勤亦不起有無見五一境謂專一離有無境六正體直一向照實性故七以智方便證佛十力故八普賢願滿故九力度作用任志成故十後得智證諸佛法故前次三度因後得作用也結進准釋二次有十種智隨覺者由前行成能於所知無倒了達故也列中一知依果大小染淨轉變等二知正果總別種種多類三知前二門依正染淨諸類入一一入諸類此依業用門四知諸事事無礙法界五知事空果六七八知諸剎入過未現現如何入現更相入故九知諸佛多行願同一智中圓十知三世佛同一行此上二門非約同類相似故名同一何以故一智一行即是一切智行一切智行即是一智行多即一時多亦不減一即多時一亦不增何以故本位不生故一非令多無是多一故多亦非令一本是多一故思之可知依德相門說結可知勝進云於一念次解一切佛成正覺者由知理事無礙法界故一念法性與一切佛法性不二不異知自身當即是佛況但解了而不能也三次有十種證知者由前隨順無倒覺知故得此十種證知舊經名決定智列中初三知諸法謂一是多一故二知多不壞多故三知彼一多不離不念顯近遠亦不離一心故四知眾生心行無礙者無不知者知云無㝵也五知根同一無差別故六知惑習氣行七知心使行八知善不善行九知菩薩願行自在住持變化十知諸佛十力智成正覺結進准釋四次有十種力者由前既已證知有所堪能故助力也列中初一總餘九別別中一體從緣生故二緣生之相無而忽有故三緣生似有如幻故四知諸法實性故五知無性故不染著亦於前無性理不昧故七知解法不昧由善友故尊重不離八由善友故令善根感佛果九由善友信佛堅固十由善友求佛不退結進可知五次有十種平等者既有智力堪能於諸境界平等觀故次明也列中一情伏怨親二真俗一味三染淨理均四無有出離第一義心五同命一性六同一道故七同菩提願故八但淨三輪故九無一菩薩於諸行中𨷂一不脩者故或行體無一不具一切行故或無有一行非淨三輪者故言平等十無等等故又上文云一切諸佛身唯是一法身一心一智慧力無畏亦然由此諸悉平等也結等餘文易可知六次有十種佛法實義句者前既平等理事故此顯實法句晉中云方便佛法句列中初一假標稱號故二似有如幻故三稱資現故四無自從緣故五染淨俱本淨六如文字先不自立依擊顯自擊後非常故本末無實也此上約依他起性七八九十等約圓成實性餘文可解上來內德成訖第三十種說法下有三十句明外化攝生行於中初十於教理等法結次說十於法中功能後十辨說諸法就初十中初一說理法二說方廣行用等法三說餘十一分教四說果法五說行法六說佛力作用法七說與三世眾生根欲性相應法八說堅進法九說讚佛法十說菩薩學佛於所化境平等相應調化法餘文可知二有十種持法者前既宣唱今蘊於心故也列中初一持善種二持佛言教三持譬喻四持理五持總持教文六持問答法七持法行八持佛說釋定法九持慧照用法十持佛神通法餘文准知三有十種辨才者前明說持今顯宣說故也列中初一亡見二業喪三離執四達無相五不昧於性六為佛為持七師不離心八隨相不斷九說無性十說稱報故喜也餘可知上來外化攝生行竟第四從十種自在下有五十句明無礙珠行亦當位成滿行於中初十自在者前以辨才無滯遂顯業用出過凡小故云自在晉本勝法列中一調化二照理三脩善四知廣五無依或亦迴向菩提七精勤八摧魔九隨樂令發大心十隨應現佛餘文易了二次有十種無著者由前行德超昇故於境無執故也又前於境自在令於境無著此十皆是自心顯現意言所化故云智慧於中不著一於所化處二於所化者三於所化法四於化業五化所得善六隨化受生七於所發願八於脩行九於同隨伴七於所供事佛所離執故於上諸境皆無所著結及勝進准釋三次有十平等心者由前成無著智故於眾法中心無差別故此與前十平等實者別得於境此授心辨故別中前八於因等後二於果等前中一於所長養二於所發願問願既差別何名平等答平等為物故差別發三於化生身四於所化業釋五於能化法六於依染淨剎七於所化解八於所化行後二約果中前功德智後根本智此十於法皆無分別故云平等心也餘文可解四次有十種出生智慧者從前根本無分別出生後得智慧故云也列中一知所化解二知淨土差別如壽量品說三知世界綱謂一剎種中三重遍相繞故已如上釋四知剎止住正不正五知諸法純雜及廣大體六知眾生身差別多類七世間倒忘故不差八知出離者皆依一道九知佛力能普入一切法界十知三世眾生由真如因熏力皆能厭生死繼佛種故結進准知五次有十種變化者前依根本今依後得起自用故次明也實眾生等化為餘法或變餘物化為眾生等下並准之列中一一切眾生二一切身如文殊變大迦葉等三於剎四供養五者聲六行願七調化眾生如無厭足王八一切成正覺九一切說法十一切加持結等可知此中具三相應化思准之上來四段二百句文總是釋十住位竟自下大段第三從十種力持下有三百句答三十句十行位中行法於中分三初六十句明大志曠遠行二從十種不思議下九十句明定慧業用行三從十種園林下有一百五十句勝德成滿行就初中二先二十句明依起大歎行後四十句明依起勝念行前中初十持標行所依謂此住持力方能起大志此中通攝十地中十持總釋應知於中初三即三寶力持眾生為僧寶者一切菩薩皆眾生世間故眾生之名簡佛及法故四大悲所作名業持五大願力令行相續亦由願力佛果作用盡未來際六十度行力住持餘行七眾生及菩提為所緣境持起菩薩悲智心八化物不失時由此不失之力能多利樂九善根力能有住持十智力住持此上皆有勝力能任持故名也問既此中云佛法僧力持者何預此菩薩耶答由此菩薩與所為為增上緣令加持故如佛弟子若自為有緣若教他自作禮佛念佛轉經供僧等福即令彼象三寶獲益便是加持之義問此持與前十陀羅尼及十受持各何別耶答陀羅尼是總持文義等受持後領納不失此中約加持依持等各有所授不相違也二次有十一種大欣至者依前持力於所欣樂得稱心安至故晉本名大正希望列中一念發心盡事未來諸佛令喜二念以上供供未來諸佛三念於彼諸佛所示誨等四念必當得住菩薩地位五念多劫脩行等六念自發心來無五怖畏等七念令眾生盡成佛等八念當類一切剎等九念斷物疑惑等十念佛難值如優曇華等十一念當成佛時神力應諸剎等具顯如文三次有十種深入佛法者謂欣至不已便能深入佛法故也下四十句中初二十句為所依後二十句為所起前中初此十深入是內證晉本經自有句皆諸云是為第一第二等列中初四入器世間佛法次二入眾生世間佛法次三入智正覺世間佛法後一總就法界入於佛法初中前三三世各一後從世界數下為一授晉本前三種明現在一切世界入過未現後一種數行說等入一切世界體清淨若依今本但明智入剎淨性言數者剎數故行者剎因故說者為他分別故次二中前同前器中數說體後同器中行次三中初知三世智正覺次第出世次國土兩字該通諸佛及國土從眾會已下是眾生世間從知下是後一總就法界入於佛法言理知等者謂法德離言不癈常言此是權實變行法故悉入法界無入入也次云如至法說無所取差者此釋雙行離言常言故結及果准知二次有十種依止者前辨行深入今顯所說緣起也列中一依佛脩行二依調生行行三依善友行行四依集善根行行五依嚴土行行六依不損眾生行行七依深入三輪淨行行八依圓滿願行行九依能求佛果心行行十依所證果法行行謂真俗非即離故結進可知三次十種發無畏心者由前有所依故行心深勝於可畏事得無畏心以無難作而不能作故列中以勇猛故於難非事中而悉能非一業障欲滅二遠法難護三法魔難降四身餘難捨五外道難摧六眾生難喜謂根業難識唯佛能知故七大眾難喜謂眾心難一故八八部難調謂心皆𢤱捩故九二乘難迴謂已入正性離生者故十上行難隨多劫勤苦故於此十難心皆無畏結及果可知四有十種發無疑心者前以於難無懼即自知所作易故無疑也列中一以六度四無量攝生決能得此四字下九皆同恐繁不載二供佛三嚴土四誓盡未來劫以實教調化過諸算數眾生悉令成就此一段文迴消前智五滿本大願六作世燈七說一切法皆是佛法悉令眾生開悟八了法法不可得乃至成佛九知世法皆是出世以無類類一切於此了無心外師十於諸法成第一覺者離於倒侍對數量言說住不可說境界際於上十種決作了知故無疑也結進可解上來六十句明十志曠遠行竟自下第二從十種不可思議下九十句明定慧業用於中分三初三十句明融慧超情行次十三昧下二十句明深定普周行後十法門下四十句業用自在行就初中初十約行次十約語後十約智約行中有十種不思議者由前心決無疑故於所脩難測也列中一乃至一念善根悉有佛果故云不思議如尼拘陀子子小辨大二由本願力或無思任運果用無如定前等願力三知諸法如仍非有似有四菩薩於善根雖不分別然不失壞五雖深入法性而不證寂滅願理盡未來實二乘故六雖行菩薩行而示八相成道七雖現佛果自在而不捨菩薩化眾生行八知法雙行無礙相中五對十句一約迷悟境謂凡無相妄見有相聖相凡有悟見無相又一即相是無相無相即是相一事雙離知難思也餘四准之九知心與菩提及眾生三法互望平等由無性一故上文覺林菩薩頌云如心佛亦爾如佛眾生然當知佛與心一切皆無盡釋曰無盡即法性也古德辨此心字為初發心者與覺林頌中前後流例甚不相當故今不爾也晉本初二句同前三四兩句云心佛及眾生是三無差別次云亦不生等者由知一真性之理三倒不生三倒義如迴向品及列行業廣釋十中四句一雖入滅定盡流亦不盡流以流體本自盡不得盡方盡故二雖知諸法本來無漏而亦不境斷惑惑滅三雖知真俗互即而亦互不雜分別者差別也次一切佛法下結釋雖諸法常與法性合然無可合故四知諸法即法性不二不變故結及果可知二有十種巧密語者正以內行難測故發言巧密本疏云唯論密語有五種一證深密法故如上出現品名如來密藏故二以一言說一切法上文云如來於一語言中等故三雖近說而不聞如鶖子如就子等雖遠聽而同近聞如因達約擊等四言近意遠如說三乘為密意故五以異言說實法如說覺不堅為堅等今此文唯約初義說列中一約教法如說意玄故無同實故二於不受生處不云我今眾生唯云實生然非妄語三於現道成佛皆言是實不云示現然非妄語四雖知眾生業報虗妄而說因果是實然非妄語五於眾生所造染淨業還說是實此意同前六說事事無礙法七說十方盡空界有無間世界此為對非下根所知過說故名密語八約說微塵中世界內有佛示八相事亦非下根所知邊名密語九約眾生雖即涅槃然以不捨本令脩證得故說即涅槃是密語以非妄語故十雖知心外無他然常說不捨善友轉尊重佛與發善根同迴向同所作同體同出離同故結及果准知三有十種巧分別知者前既語巧今顯意巧故也晉本名巧方便分別智列中一入剎二入眾生欲樂三入心行四入根五入業報六入聲聞二諦觀行七入獨覺緣生行八入菩薩諸度行九入有漏善法十入無漏法於上十法皆智解明了悉名入也結及果如文可知第二有十種入三昧下二十句明深定普周行於中初十明定體晉本名正受三昧後十明業用亦可知初明深定後顯普周前中一入定受剎二觀眾生身為定境三諸法為定境四觀佛為定境五觀劫為定境六從定起現多身入定為境七觀諸佛身為定境八悟諸眾生皆一性為定境九念次入多菩薩定智為定境十念次以無礙智成諸菩薩行願入定無休為境此上諸入學並同前釋結及果易了二有十種遍入者前明入定今辨從定起周遍一切處故也晉經名一切處列中一所緣悲境二彼身依處三世間諸事物體四五火水灾六佛身七佛剎嚴八佛功德身九種種說法十於諸佛諸供養智於此十皆解明了明達故名為入餘文准釋上來深定普周行竟第三有十種解脫門下四十句明業用自在行於中初十准梵本是毗木叉此勝解脫謂所作自在故今但云解脫者略也晉經名法門別中十一明身遍一切剎二於諸剎示種種色相三以多剎入一剎四加持諸眾生五以法佛嚴身而嚴滿諸剎六於正中見依七念頃往諸剎八一剎中示多佛出九一身遍諸法界十念間現諸佛遊戲此十皆授解脫業用門說結等可知二有十種神通者前是作用自在無㝵故解脫今是神通所緣無㝵故次明也列中一宿命二天耳三他心四天眼五神足六隨物心現通七一身普現多剎八念頃遍入多剎九出生多嚴具嚴多剎十現多化身十一隨多物心於多剎現成菩提結及果如文易了三有十種明者前通此明也列中一知物業果二知物心中無師智等本成寂靜然物不能觀察境故不現前佛及大菩薩已能觀察得現前故故云知境界寂滅出現品中有此云爾三知招化諸所緣境皆是一性所謂無性此性堅若金剛四語業遍十方五滅心染著六等受生不受生七授根受境由根令心取相由受立於禪今捨此二故不住相不味禪或依根受滅定七捨離八有四對一知一切非相非無相謂真性不失俗相不壞二者一知一切法一性即是無性三雖知諸法無有差別然知不礙有種種法九有十五對一了遠受生知生本無生故二知因緣事事即果也三境行四生滅言說謂言說說生滅或此一別五迷離迷六倒離倒七染淨八生死涅槃九得非得十執無執十一住動十二去來十三起坐十四失壞出離謂失善根故不得出離十五所成就及所調根并能調行後別結名可知十有初於佛法剎眾生四句不起著心次不見有眾生下有十五句謂不見有實眾生然不捨化伏故大悲故大願故說法故聞法故脩行故依佛種善根敬養故神力動剎故知法藥知根病知差別故知苦果生滅知諸行如影像不礙行行故雖永斷受生根本為救護故亦不礙受生行行無所行故順佛種性發山王心故知諸妄倒入種智門故智廣難動成佛生死中等濟度故別結及果如文可知四有十種解脫者前辨大願巧明今顯惑障離縛故列中一貪等前離五鈍使後離五利使初離三見故後離二取故四蘊等三科中離擔累得無取蘊故五離二乘法執故或捨彼烏波提涅槃故六捨法有生觀無生故七於四種境離著故八離二邊住故九離分別故念頃知三際故此離不了知三世迷異熟愚故結及勝進文易上來四十句明業用自在行竟自下第三從十園林下有一百五十句明勝德成滿行於中四一初四十句明德圓滿行二十種發不動心下二十句明心住深行三十種智慧觀察下五十句明智德殊能行四從十種不可稱量下四十句德重高深行前中初十遊賞園林次十猶正宮殿次十於中悞樂後十將在束帶故曰莊嚴就初園林中一一皆初舉園林名體後以義釋成謂遊適悅故也初七自分用行後三勝進果行前中初二利他行後五自利行一時二處三違四順五脩行以道等從佛流出故云慈父境也後三中一念果法二現神通三成正覺結及果可解二有十種宮殿者前園林是外遊今宮殿是內安故次明也亦並先標名後顯義列中二初一總後九別總謂菩提心為眾生行本若忘失則法行無依故後別中初七利他行中初四化三界眾生一化色界分二初四梵住者謂聖天梵佛也住空無相無願聖行也住四靜慮天行也住慈悲喜捨梵行也住常作佛事然無功用佛行也二五淨居天未斷五上分結為斷彼故菩薩生彼故云一切煩惱不染也五結者色貪無色貪無明慢二五淨居掉舉也次三通化中一為染剎眾生菩薩為彼作隨類身故云令一切斷煩惱二為化昔同行現生王宮三化憍慢後二自行成滿一脩因二得果餘文可知三有十種所樂者前既住宮欣樂勝益故也列中初八因法中樂後二果法中樂前中初六自利法或第五亦是利他後二利他法第四有十種莊嚴者既欣樂心熟故以勝德自嚴也列中初二力無畏次二義法辨次二願行嚴次二攝剎雨法後二持行現化上來根德圓滿行竟第二有二十句明心住堅深行於中初十發不動心別中一捨所有心堅二向法三供佛四悲觀五慈攝六與求法七常脩八信堅有根信者生佛果故無濁者不雜疑故清淨者不雜二乘故極清淨者正證理故離垢者不求持戒有故明徹者不迷因果故恭敬供養一切佛者向果故不退者因行堅故不可盡者心無限故無壞者外緣不動故大歡喜者稱本期故不動心乃至方便道等者令果智滿也聞一切菩薩等因行圓也二有十種不捨深心者以前之行堅不動乃能窮達深理故云也別中一智二悲三顯化意四近友五供佛六求法七持淨戒八攝同行九持佛法十脩願行下第三有十種智慧觀察下五十句明智德勝能行於中初十者以心重不捨則智慧巧觀所作列中觀教法二行法三通力法四巧觀所詮義五法佛威力者約用是佛神力加持約體法身任持萬德六內持七外說法八觀深九觀廣十觀法法智光照用無㝵也餘文可知二有十種說法者前觀察次說法故也晉經名分別列中初二說依他起性一法一喻次一知所執性無物可以違諍知後七說圓成實性一恒沙功德二體實無依三堅若金剛四無是法身五法身體寂六證道所攝七體相一味結等可知三有十種清淨者由簡擇深法除障清淨晉本云無始列中一無異求二無疑惑三無耶見四無所障五無不欲佛果六無訥言七無性弱八彰大悲以是菩薩所住故又若住智無唯住涅槃非於一處俱無住著故九無染污故十無微細著礙故無上諸垢故皆云淨結等如文四有十種印者由清淨德堅決定無易故名為印晉本云智印列中古德十忍配屬一於安受苦境忍智不動故名印也初中十種一初三苦謂苦苦即三受中苦受及順苦受法有漏蘊已是行苦所隨處加苦觸故重言苦苦也二境苦謂與樂受及順樂受法相違故苦也三行苦謂與捨受及順捨受法相順性遷流違蘊樂住故苦也二求法不怠三脩無疲四聞深法不驚五不畏六不恐七不怖八不捨願九佛智十堅至菩提二於他不饒益忍行決定三於深佛法信忍決定即諦察法忍也四決定成佛當度眾生五決定解脫教等諸佛法故六大欲決定有十一句初善欲是總餘十是別七決定不惜身命求佛果八於善根未熟眾生令生長故九已熟眾生令入法十因圓果滿上諸句中各有多之義隨所應釋結等可知五有十種智光照者前行體決定令照用無㝵故也列中皆先明所照後顯能照初二求果見佛次二見機後法次二依友示佛次二攝生說法後二佛通行滿下第四有十種無等住下四十門明德量高深行於中初十明尊重行次十勇脩行次十高勝行後十深廣行就初十中明行用難測下藏能等故云也列中一住真不證難二成善不取難三知化行難四長劫無怠難五得滅不住難又釋四不厭生死難五不住涅槃難六了劫相盡立相難七知法無作說有作難八了三界三世唯是一心然不專無量無邊九為一一眾生多劫住脩行不生疲厭十因滿讓果難由此難測超過下位也二有十種無下劣心晉本名無懈怠心言無下劣行用超過勇猛無間故列中初二破耶授正次一巧誘令喜次一自成遍行次二福慧果圓行次二說法現身調化行次一為物脩內外施行後一有五三世下舉所解之法有十門二如是下對能解之相於中六謂以相應專了彼性相故知也悟其境界故覺也分明現前故見也見無不徹故證也無善不進故脩也無息故斷也三然於下明能緣心行相有十句可知四次不二下轉釋謂既於彼無有分別如何得說能可所緣耶於中約知有十二句約示現有五句約入有一句入是相應義智解明了義約證有一句三有十種於大菩提如山增上心者正以勇猛行成大心決定向大菩提不可傾動故云也列中初一脩能證智決定二觀諸法從本已來非性為性決定無故證無所得為究竟證三願脩稱法性行無漏智知見故白淨也四決定成就為物求法不希名利等無異求也非從他聞法自言我解故無盜法心也為法能捨難捨所有離慢奉事說法者故等心故生尊重未曾有心也五大忍度生行遇違境乃處增忍行者以其於諦察中得平等捨故如師子兒聞母哮吼時非但不怖乃處增威爾六成超魔境行於中四初成勝報有十句二雖後下不著此勝總別有五句三但深下唯在於法有十三句准前淨行品釋可知四佛子舉因釋成於中標徵釋三亦可知七精進勇脩行攝大乘云愚脩雖少時怠心疑已久佛於無量劫勤勇謂須臾八不捨忘人行九無倚伴勇脩行十權實雙行行謂雖一切法畢竟無一可得而不捨勤脩善四有十種入阿耨菩提如海智等者前顯志高難仰故以山稱今辨智深叵測故以海名爾列中十種一入眾生界無量二入世界三入虗空界四善入法界釋入有七種入是知解明了如前顯五入三世佛邊善根界六七八入三世諸佛界九能供多佛十能求多法上來總相答第三十行位中行相竟自下大門第四從十種如寶住至十種身有三百句答前三十句問明十迴向位中行相古德以問中十一句自在內初一為總餘句為別分總為別更無有總故云答前二十九句問也今既問及答中自在唯一餘句名無㝵用此則無彼總別之事可除其總是故此後答中以二百句答前問中三十句正相當也就此三百句中分三初一百一十句明迴向中行體堅固義二從十自在下一百二十句明自在無㝵義三從十種遊戲下七十句明行德圓滿義就初行體中分二初四十門明行體成就高樓彼岸二從十不壞不信下七十門明行體離障攝法勝德就前中初十種如寶住者住於正法可貴之所故云寶住又以無住為住亦名寶住於中一近佛二聞法三自在受生四知法從一生多多竟歸一說皆無㝵五知則自在謂資糧道厭離加行道止息無間道除斷其文不次勝進道防護防護即恐同二乘滯寂而不取證不證為菩薩脩行不證為到實際彼岸者法無我際方便善巧無前不證脩行又是權實雙行行善學所學者戒學令法者成無障㝵願身不疲倦者為物多劫受生死身故六眾生心雖無處無作為調化故亦說有也七知理事無㝵法八知理無不㝵起行九於空善巧所願不虗十聞多佛異說善能會通謂以四意趣四悉檀等而決了故二有發十種如金剛大乘誓願心者能於大乘無限㝵法以堅固心窮盡其際故也於中一知三世無際限法二引多菩薩以自策勵三嚴無際限剎四以福慧霑及無際眾生五以善根供無際佛六見佛聞法喜不著自及佛知非一切不壞一切徵釋云佛非一切取故七能忍無際限苦惱斬著為級多劫忍多苦不癈脩行攝生徵釋云觀法無二相故八無際時處行菩薩道九期心要成無際大行十寂而常用於中四一於境無所得二而亦不捨下不等起事行三何以故下舉本願釋成四雖後了達下雙融大願三有十種大發起者於所作大事令發起現前故云也於中初三化福業大次三化業大嚴土為攝生也次二明勝進攝福九成佛十說法四有十種究竟大事者前大事但能起現前今明所作成滿故云究竟於中一敬奉佛二逐機求救三專求佛法四次二集善思法次二願行成滿後三事友詣佛聞持佛法第二有十種不壞信下有七十門明行體離障攝法勝德於中初四十門明信慧善巧後三十門顯心行攝德就前中初十明不壞信者於深人法淨信不信障初六信行緣後四信行體前中信眾生者信是所化悲境故又信其有如來藏性等故二有十種得受記者內懷堅信外蒙記莂故有授記前明自知授記辨佛與其記別也於中有一深解悟與密教合懸與佛意同二聞此大教隨順種善根如上文第三會中眾生蒙記是也三能達大志脩廣大行故四身在佛前與記故五懸與記故六初地證真故七第八地得無生忍得記故八能調化得記故如記龍樹馬鳴然正法炬等是也九二大阿僧祇劫滿故十得自在位故三有十種善根迴向者以己善根順同善友故云也於中初二同願心次一同行次二同脩事理次二同活謂正念能對治故清淨所治淨故次一同位後二同得究竟四有十種得智慧者以迴向德成熟故次應無分別智故云也列中初二自在施深解法三入佛智謂分明了達四能遣疑五入智者境界六解佛善巧音說法七解種少善能滿白法八成菩薩不思位九於一念能住不可說剎十覺佛菩提入一切法界聞持一切佛法入一切如來種種莊嚴言音第二有十種發無量無邊廣大心者下三十門明心行攝德於中初於無限之境發稱境之心故云也一廣念所求二廣念所度次廣念所顯謂一念事二顯理次二廣念因果位七廣了業根八廣嚴剎九入大眾十觀圓音二有十種伏藏者由先大心普周故使德窮行奧故次明也於中一知諸法是能起功德二知是所思三知是所持四知是辨說五知是能覺離言真六知佛通是示所觀七知法是巧生平等八知法見佛因緣九善了劫如幻住十知佛菩薩是生信喜緣此上十皆有含攝蘊積同名藏也三有十種律儀者謂積德盈滿堪為調伏故云也於中一離謗二離疑三捨慢四捨自見五背下乘六離不堅七捨不仁八進善行九降魔十離弊上來釋行體堅竟次第二十種自在下有一百二十門明自在無㝵行中二初十句明自在行後一百一十句明無㝵行前中自在者所作任而成故此中多同前第八地有差別者此云資具彼名財此云受生彼但名生此云神力彼名如意所餘同也然一一句有標有釋文顯可知後無㝵用者所作由己成故於中三先總標十章次佛子云何下依章別顯後佛子下總結初中三初標舉次何等下徵數後所謂下正列名謂始從眾生無㝵用乃至力無㝵用後依章別顯中二初總徵起後佛子下別顯十章即為十段一一章中又四一標二徵三列四結就初明十種眾生者是所化故於中初二依觀成用二事即理故眾生即無也二有二義一唯心二勝解唯心者根為心加行行觀眾生不離自心故云但根所持二勝解者菩薩勝解力決定印持眾生即無故三為眾生說法合時故四能現眾生故五內一切眾生於自毛孔故六現他土眾生令此見故後四示現八部等二乘菩薩及佛身相故二明十種國土者所化依果故於中一多作一二多入一毛三知無盡知無盡有二種一觀知多剎故二觀知剎體即同無為相無盡故四生滿一切剎五身內現一切剎六動剎不怖生七多剎嚴嚴一剎八一剎嚴嚴多剎九以一眾會遍一切剎十以九類剎遍諸方網示所應度眾生令見方網者諸二十層剎中一一層內三重主伴遍相繞剎也廣剎者橫長剎也深剎者微細剎也以難知故名微細名甚深爾三明十種法者謂所詮諸法故於中一一多相入而不壞本相故云而亦不違眾生心解二從般若慧分別演說一切法三知一切法離文字然令因文悟入四知諸法入一相而能說多法相五知諸法離言然能多說六於諸法善以字輪轉變其義七以諸法入一法多劫說不盡然不相違也八以世法入佛法令皆悟解九知諸法無邊十知諸法無㝵如幻網差別四明十種身者能脩行身也於中初二他自自他多一一多互入次二佛身多一一多互入同前次一依入正次一正滿三世諸法中次一一身現多身入定次一一身現多身成佛次一於多眾生現作一身於一現作多次一於多眾生身現法身法身現作多眾生身五有十種願者於中一以他因願作自願二以他成果願作自成果願三利他成自利四無障㝵願盡未來際劫五轉識得智時以無所得得故是俱不著然以願力現種種身六令他身獲益七令他聞法上二皆以自願令他願滿八大願故多脩行不斷九以願力故於自一毛孔中現成佛遍諸佛國如為一眾生為不可說世界眾生亦爾十以願力故說一句法充洽遍法界眾生界六十種境界者各有分齊故於此十種勝劣之境轉變自在於勝現劣故名無㝵一理事二正耶三染淨四因果五靜亂六真妄七凡聖八智悲九住定慧等現於世界十住佛境界現二乘相儀七明十智者智不自彰約所知以彰自也於中初二約能化智一辨二持次三知所化智一知根二知心行三欲樂等藥病六上入佛力七下知三世八示成佛九於一根知一切業十於一眾生音解一切語八有十種神通中一一身示多身二於一佛會聽法受多佛會聽法三於一念中成不可說大菩提開悟眾生四於一音現一切言音各令隨解五於一念現前際業果各令自見六令諸剎具嚴七普入三世八放法光現佛菩提眾生行願九守護天龍等二乘菩薩等所有善根及如來十力善根十准晉本云佛子略說菩薩平等觀察一切諸法通自在自在令應名無㝵用令此本脫宜勘九有十種神力中一一塵中著多剎二於一塵中現多剎三一毛孔中置諸海水十方往來不嬈眾生四以多剎內自身現通五一毛繫多山持行諸剎不怖眾生六一多劫互相作示現成壞不令眾生怖七於諸剎中現三灾等然不惱眾生八一切剎三灾時護眾生資具不令損九以一手持多剎擲多剎外不令眾生驚怖十說諸剎同空令眾生悟解十有十種力者是悲智無㝵力用故於中一調生二嚴土三令身入無身四常劫脩行五開覺眾生六一行攝一切行七度脫眾生八自覺諸法九以一切智成正覺十不捨眾生第三總結中四一略結二悉有下辨益三徵四釋上來明自在無㝵義竟從此下第三十種遊戲等七十門明行德圓滿於中分二初二十門明行德殊勝後五十門明行德圓備前中初十明任志行成遊賞無㝵故名也於中初二明染正與依互相作次二中初佛身現二乘身後二乘身現佛身次二菩薩身現佛身佛身現菩薩次二於涅槃現生死生死現涅槃次一正入定時現四威儀後一正在一佛所問持時即於多佛會身遍聞持亦不分身亦不起定如是念念相續劫可窮盡菩薩行不可盡也二有十種境界者晉名勝行今言境界者因遊所有故也於中一示諸法界門令眾生入二現諸剎嚴事令眾生悟法三知眾生界生悉如化方便開悟其化往之言須勘梵本次三明互出一佛身菩薩身二虗空界世界三生死界涅槃界後四明三業初一眾生世俗言中出諸佛法言二多身作一身一身作多身三一身滿法界四一念令眾生發心各現多身成佛第二有十力下五十門明行德圓備中初十力者正以德勝智用堪能故云力也皆有標釋於中初七自分因力中初三自行一不雜世情二不捨佛法三脩善究竟次四利他行一知物心二滿物願三常化脩四現乘後三勝進行一毛孔現淨利及佛出二令眾生發心成佛三說一句法稱一切眾生根欲性二有十種無畏者前以福智力勝故次無懼也於中初二具持文義答難不畏三了知二空無不解畏無作作者等廣說如章四威儀無缺畏五三業無失畏六於魔外道等能無障畏七得無有不能聞持畏八由願力於生死無貪著畏九示同二乘於退墮無畏十機感現前無不能應現畏三有十種不共法前明無畏今辨不共有二義一不共凡小二無他可共故其十句皆云不由他教也於中一自脩六度不待師教二普能攝生三巧迴向行四巧便行於中七一不厭世俗巧二不著己樂巧三於禪自在巧四不簡生處巧五備世枝能巧六現小不失大巧七現果不斷因巧五權實雙行於中有十種一涅槃現生死二知無生而勸化三入滅現惑四一身現多身五入定示受欲六離三界不捨樂生七內受法樂外示無樂八相嚴身現陋形九積善示生三惡十得果不捨因智六三業隨智行七代物受三塗苦八物見無厭九誓自堅淨亦堅淨他十成自覺境智無師自悟四有十種業者前成不共德今辨所作業故次云也於中初一約處次三約人次一約時次二約用一自行二身光後三約准持一護法二說法三隨願令滿各有標釋五有十種身者先業因後身果故也此亦迴向位滿所得十身於中初二約體一來相盡二本無來故亦無去故求不得也次五約用一如將為實故不實也二以實理示世故不虗也三盡無盡住故四不可壞故五不可動故後三約相一福相二無相相三果相此有第九行中十身有同異中有相攝如章上來三百句答十迴向中行相竟本疏云此上十業十身古德多將入後十地位收然按別行本度世經六翻問答中此在第四翻內末今依彼經科判此文入迴向攝也自下大門第五從十種身業下有五百句答前五十句問十地位中行相於中分四初一百二十門明十地中三業殊能行寄在初地二從十種勤脩下九十門明造脩離障行寄二三地三從十種離生道下九十門明造脩能熟行寄在四地已上位四從十種足下二百門明報相圓備行寄八地已上就初中分三初二十句明身業行二次四十句明語業行後六十句明意業行就初中二先十種中一一身遍一切受二三一身起一切機三一身一切趣受生四遊諸剎五詣諸佛六一手覆諸剎七一手碎諸剎金剛山為微塵八身中現諸剎成壞九身容眾生界十身中現淨剎眾生成道二後有十種者此約行法為身說不同前門直就無生理體說也於中一六度行二四攝行三代苦悲行四救護慈行五饒益福行六同體慧行七法非趣攝行八有感便應行九現通行十示成佛行第二有十種語下四十句明語業體應名語業以語是身分攝故於中一離麤獷故云柔耎二離熱惱謂兩破亂令心熱故云甘露悉清涼次二離妄語餘六離綺語此皆約遮釋若約表則十種各顯一德二有十種淨脩語業者約脩因名故於中初二樂聞佛菩薩德行次二離過行次二語業供佛行次二法施行後二重法輕身事發行三得十守護者由發言誠諦龍天等敬護八部外更加梵王眾及佛法王為十可知四能成辨十大事者由內因誠實外緣加護逐使所言廣大成辨所作故也於中一能斷眾疑二能普詣三了眾生四淨諸勝解五能斷眾惑六令離習氣七令欲樂淨八令修善廣九遍覽即理之事法界十普證圓寂第三有十種心下六十門明意業於中初十句明意業體後五十句明意業用就前中一廣心二深心三勝心四淨心五利心六堅心七無染心八希有心九智慧心十無邊心此並意樂之心也二有十種發心者心體充滿理宜發起勝用故也於中初六明利他心次二自利心後二勝進分中利他又釋初一總餘九別然並利他可知三有十種周遍心者前既發心終成所作遍滿法界故云也於中一悲心廣二智契深三依心辨業用念頃一心知三世多心四遍佛境八相悉了五遍知根欲習氣六隨諸慧所了法界七知諸心所造如幻網八遍知諸作無生觀者識其體性九遍無㝵心不住自他心故十遍諸自在心一念成佛故四有十根者由前心滿堪為法器能出生故名根也於中一信根二淨欲根三進根四定根常住脩行五慧根六根續至究竟故七堅利證徹法性故八證智照用到佛境故九照諸佛同一性故十無礙慧到無障際處此即是佛十力根本處故云深入等此上從慧根已下并是慧但異名顯示五有十種深心晉名直心今深心者有二義一於諸行殷至詣極故二心恒樂脩一切善行故於中初二不染雜凡小次二了能所境智五於違不動六圓智淨脩七受持所聞八於受生處無著九具難知境智十脩善無厭第六有十種增上深心晉但名深心今名增上者行過前故也於中一進善堅二了密教三願行能持正法四到義幽奧五於教自在六到諸安立教門七於諸脩行成辨八定及用勝九令本願滿十利他究竟上來初地行相竟下第二十種勤脩普名方便下九十門明二地已上行相於中分三初三十句明智慧勤脩行二從十決定解知眾生界下三十句明慈悲勤脩行三從十種脩下三十句明悲智究竟行初中初勤脩者心得增上行乃勤脩故也於中初六勤脩六度行後四勤脩攝生行知物無性為說名慈知物蘊空代苦名悲示佛十力令語名喜轉不退法輪至物心名捨捨生死故二有十種決定解於諸善行起決定勝解故也一樂勝善二樂異嚴三樂廣大四樂甚深五樂普遍六堪受加持七樂慈忍八明了業果九隨應現通十受記莂三有十種決定解知諸世界者既內心解了決定故亦知外器互入無礙也於中一知多入一二知一入多三知一佛華座遍諸剎四知諸剎如空五知諸剎具佛嚴六知諸剎菩薩滿七知諸剎入一毛孔八知諸利入一眾生身九知一樹王一道場遍諸剎十知一音遍諸剎皆令物解了第二有十種決定解知眾生界晉名入眾生性下三十句明慈悲勤脩中初十明無緣悲深解物性故名決定解知眾生界之者性也謂即無性於中一知物性以無實為性二諸性入一身三知諸染之性入淨因身四知諸染之性入本淨性五知一染身入諸染之性六知諸染之性堪佛法器七知諸染之性能隨根欲現釋梵身八知諸染之性能隨現二乘身九知諸染之性能隨現菩薩身十知諸染之性現如來身二有十種習氣者解染淨人法之實性積行慣習氣分故也於中初二自利謂習大心故習諸善行故三化利他故四自曾慣觀察故五曾數於淨剎中受身故六慣多脩施等故七慣多發願故八慣淨三輪九慣數思惟一性之法十於諸境界各別慣習故三有十種取者前明慣習氣分今顯前彼增故此慣習之智於境增明顯了如緣生中愛增名取故晉名熾燃熾燃即是增盛之義於中初二攝生嚴土次二依緣成善次二悲慈次一亡相次一示相次一得無所得智後一總結於諸法取由慧於境分明照了故三有十種脩下三十句明悲智圓滿行於中初十修者脩行各至究竟故晉名趣者所趣向處與所至略同也於中初一諸度亡相二持犯學所三決擇四所詮境五能詮教六治淨七現通八策進九成佛十說法二有十種成就者令諸佛法悉圓滿故晉云為事於中初二依人教次二信法迴向次二知境界次二念理遠耶後二念佛求智三有十種退失佛法應當遠離者既於佛法悉令圓滿便能脩道在勝不退故也於中初四失利他行後六失自利行勸令遠離下第三有十種離生道下九十句明四地已上至七地來出世間行於中分三初三十句因行體廣二從十種大丈夫名號下二十句明行用殊勝三從十種無量道下三十句顯行德成就初中初離生道者離過患故謂見等惑未調如生食在腹惱亂故對治道起已惑滅心柔名離生離生即道名離生道或是見道見道之離生依主也今此中非唯離惑之離亦有離慧等緣用之生澀故總名離生於中一真俗雙緣純熟故二自他見離俱時成就故三不念不著俱時故四起過復在中熟故五離惑與惑者居故六離欲與欲者居故七樂靜與眷屬居故八離界繫業而現死此生彼故九不染世不斷世故十得果不捨因行故二有十種決定法者由離生強澀剛等得決定當成故也於中初五自分後五勝進前中一生佛種中二住佛境界三知所應作四住亡相五預佛會後中一顯佛種性二住佛力三入佛所證法四與諸佛同一身五與諸佛同止三有十種出生佛法道者於法決定故能從緣出生聖道故也於中初二順人信法次二願善不虗忍謂勝解次二時處廣長次二悲增及慈等念遍空界後二本行堅樂發心第二有十大丈夫名號下二十句顯行用殊勝中初十以實德內充喜名外著故云也菩提是所求果法薩埵是能求有情於中初一通約所求能求以立名後九唯依能求以標稱就後九中一簡非小宗菩薩二首故三尊故四尊極故五超下故六上極故七知十力故八無近偶故九心言到故又喻伽第四十六云一切菩薩隨德假名有十六種所謂名為菩提薩埵摩訶薩埵乃至十六名為法師顯揚第八莊嚴十二皆同此說然莊嚴云此十六種皆名依義立一切菩薩總有此名又商主天子經有義名一於菩提分住持入故故名菩薩二入大乘故滿大智故故名摩訶薩三不可求法智德入故故名最勝薩埵四不與煩惱共住為諸眾生滅煩惱故發精進故故名淨薩埵五令諸眾生行淨道故故名遊淨薩埵二有十種道者既名德稱實乃成菩提之道道即因行故也於中十句約增數以辨初句有三義一約行本以菩提心為菩薩萬行本故二約願力謂願得佛果一平等智境如初地第十願云以一三菩提知一切法界即涅槃相梵本中云以一正覺智普證一切法界故三約無儔伴大悲行故如上文云唯我一人志獨無侶是也二中是二智德然有兩說一云正體智名真實智緣實境故即此出生是也從此出生後得智故二後所得智名為方便善巧方便化眾生故一云正體後得名為真實能緣真俗二實境故加行智名為方便由能引生正體智故此即正助二智行也三約三空定出三界行故道也四約四行除四障故一業障二嫉妬障三謗法障四樂世障亦是異求障大智度云行是悔過等四行疾至阿䟦地故五約五根六約六通七約七念於六念上加念眾生是大悲心也八約八正道九次第定者並是菩薩寂用脩又行行始從初定乃至想受滅定聖者依此次第起諸功德二利定法故名也於中初云離欲恚害等者謂此中覺觀即是菩薩無分別淨覺對治欲界恚害等顯此地有覺觀故云說無礙也二滅除覺觀等者謂前定能治覺觀為此內淨所治內淨即捨念正知由此對治前覺觀故令不發生眼耳身三麤動之識此中雖無麤動分別然以無分別智覺觀為說因也三捨離喜愛者愛亦名樂此喜樂是前地利益支乃是此地所治由以此中捨念正知治彼令離故捨離喜樂受無所受相應故一切佛心喜也四離世間樂等者世間極樂唯第三禪然是變異有易耶故今此以捨念清淨為此能治治前地所有樂受為得清淨不苦不樂故云離也隨順出世樂者謂寂滅法樂也第五無邊處定者瑜伽三十三婆沙八十四等大同此說云但由加行而立此名謂初業者先應思惟樹舍等上諸空空相後以假想勝解觀察照了無邊空相由此加行起初無邊定故說此名空無邊處復次法爾初解脫色故地名空無邊處從定出為起相似空想現前曾聞苾芻出定已便兩手捫摸虗空有聞者言汝何所覓答曰我覓自身彼言汝身即在林上如何餘處覓耶從此出已起虗空想此想即是定之等流故名空無邊處第六識無邊處者婆沙云但由加行而立此名謂初業者無應思惟清淨眼等六種識相取此相已假想勝解脫觀照了無邊識相以先思此加行故展轉引起第二無邊空故名識無邊處復次依等流故說此定名識無邊處謂瑜伽師從此定出必起相似識想現前謂於識相歡悅而住故第七無所有處者婆沙云問何故名為無所有處答此中無我無所故問一切地中無我我所何獨此名無所有處答無有餘地能令我執及我所執羸劣穿薄勢力減少如此地者故此獨名也乃至廣說第八非想非非想處答此地中無明了想相亦無無想相故名非想非非想處無明了想相者非如七地有想定故無想相者非如無想及滅定故由此地想闇鈍羸劣不明了不決定故名也第九滅盡定者此有二種一依權教大乘二依實教大乘前中定加行以止息想作意為先滅不恒行諸心心法及第七識染汙一分由此止息身心勞逼安和名定又由偏厭受想滅故亦名想受滅定依非想地微微心時厭心種上假立非實又得人多少等諸門分別廣說如章後教中加行以悲智利樂一切有請作意為先滅恒不恒行諸心心法然不滅盡無分別心為佛事未曾暫息菩薩從現前地已去能入此定以其初得無生忍故至遠行地能念念入出然不作證住此定時隨心住劫至不可說不可說身不變異雖於有無悉無所作而能成辨諸菩薩事所謂恒不捨離一切眾生教化調伏未曾失時神通變化無有休息譬如光影普現一切而於三昧寂然不動乃至廣說十力道中知欲樂先知後為說法現身等餘並可知第三有十種無量道下四十句明行德成就於中二先標列四名後佛子菩薩摩訶薩有十種無量道下依標名顯初中一事空二理事無礙三正報四依報五劫量六語法後四是佛三業力謂十力一切智智者通根本後得二助道者以前門十道並為菩薩道所依緣故前所緣既廣大無際等故合顯能依六爾故皆言如也三脩道者對緣脩行故初三別約三無性脩一無相觀中不見所執法來去相二於無生觀中不見染分可滅淨分可增以無生理實故三於無性性觀中不見前二性為有不見為無又真如相非有體非無上約正體智四約後得智中別就依他性以成脩行觀唯識如幻等成不顛倒行五作三空觀不離三界為欲處中長善根故六於教法不著七於理法恒沙功德不壞八於真體平等九起行勇猛十於佛德平等不疑四莊嚴道者謂脩行互相發起為莊嚴故也於中初五自行無際一在亂常定次二處小常大次二在欲行禪次三隨有攝化一化行樂世二化耶道三化犯戒救苦九自行成滿於中三初得法滿二為一切眾生下巧便示現三何以故下釋成善巧十因圓果滿於中三先因圓得果二而亦不斷下明得果不捨因三何以故下釋成行相可知下第四從十足下二百門明八地已上報德純熟行於中分五初二十句明手足外用二從十腹下三十句明內德盈滿行三從十莊嚴下二十句外用脩行四從十頭下七十句明六根業用行五從十行下六十句明四威儀動止行就初中十足行用進涉表其脚足從下為初是故先辨於中初二約行一戒一進次二約通一總二別次二約心一願一誓次二約法一教一聞後二約德一說一行二有十手者行用取與表其身手於中初四自行一取二與三敬四養次四利他一除疑惑二拔欲泥三濟四流四授正法後二行滿一除惑病二破無明第二有十腹下三十句內德盈滿中初腹者含容一切淨法故喻名也於中初三約戒淨一離諂二離偽三離次一離貪次一離癡次一離垢穢次一觀法味次一觀離作性次一樂善行立次一離有無見後一一念包容法界二有十藏者前總明腹今別顯藏其猶五藏故次明爾此亦取其攝藏之義於中初六下攝眾生後四上攝佛果前中初三總攝一授解二令行三成德入不退法輪故後三別攝三聚眾生信根已定者赴感同時不增減於一念令其成就未決定者使信心相續堅固不退於耶定者起悲為作未來生信因緣涅槃眾生雖無菩提之心法聲光明入毛孔故而能為作菩提因緣後四上攝中一攝佛十力二攝四無畏三攝不共法四攝佛了知四種境智三有十念者道通顯腹內諸藏今別明心藏為最勝故於中初二攝善心一勤策心二滅惡心一摧耶一除惑次二成行心堅一不退一無著上六自行次二攝生心一令悟一慈救等大梵住心者梵住即是四無量也後二成德心一深定一告相梵本云室利搓相第三從十種被甲下二十句明身持甲仗初十句被身以甲防敵傷故表慈悲等以自防護不令惑賊傷害於中初二慈悲甲次二被願求甲次三被攝生甲後三被攝德甲二有十種器仗者兵刃通稱表施戒等用摧慳等於中初五順仗破垢次三違仗破垢如用賊器仗還以害賊後二成德建功仗可知第四有十種首下七十句明六根業用行先明首者以身之上故於中初一斷德次一敬德次一解德次一福德次一悲德次一尊德後四智慧德二有十眼者行德淨勝照了所緣故同眼也於中初五名同權教大乘體用全別如別章後五中智眼分別事法無礙眼者見理事無礙法界故一切智眼者見帝網境界故餘可知三有十耳者初二聞順遠音離於愛恚次二捨小欣大次二愍虗苦離妄樂次二德圓行後二了俗皆真四有十種鼻者領嗅行香依鼻增故云也於中初四聞香體不隨境轉次三非但不隨境轉乃復善了知知身及資具等并轉知彼惑者此道力也知有頂香者此香准此類菩薩聞也後三各隨所益一令小住佛智二令因入果地三無障礙願香得果不捨因行五有十種舌者明語業自在依之增善根故也於中初五約辨說顯德後五約順用顯德六有十身者明身業自在應物現形故於中初三現凡夫次五現三乘身後二現體用身一用一體七有十種意者明意業自在於中一福二信三解四知樂五不離六離塵七應時八釋處九調伏十無我我所第五有十種行下六十門明四威儀動止行中初十行者謂發動遊行故於中初二能聞能說次一自調次二化物二界各一故次一成慧次二化物供養後二得果存因行一涅槃即生死故故不斷生死是涅槃行一佛功德滿仍不捨菩薩行二有十種住者行有止息故次明住也於中初一住行本二住行相三住正慧四住定處五住戒相應行次二信法近人次二智忍圓後一住果滿三有十種坐者四威儀中次第三故於中初四說世主以表法後六依名義以顯法一無畏說二巧稱根三不退說四與樂說五伏共說六降魔摧外四有十種臥者四威儀之第四也於中初四表臥是寂嘿義以顯法次四表臥是安隱義顯以法後二表臥是畢無作義以顯法並思之可見五有十種所住處者智有所緣處故前明能住此顯所住又前彰身住今辨心位故也於中初四住四無量次一住一切度次三住三空後二住念慧滿及諸法平等六有十種行者遠釋云前行是利他今此自利也正云前明始脩方便故以樂聞等為行今明純熟脩故以正念等為行本疏云前約身義此約心行若爾何故前十亦有心智行耶釋云此經云菩薩身等外事並就內行以顯其相例皆如是故不疑也今按諸德各解不同只為經文先未具備今既分明云所行處義即決定不煩異釋於中初四自行一加行二覺法理趣三後智順佛四諸度亡相脩到佛智次四攝生行一總舉二同事三本語示同貪等後覺悟故四利行後二二行成滿上來總五百二十句明上第五大段十地位中行相竟自下大門第六從十種觀察下五百一十句答上第六因圓果滿行於中分二初三百二十句明因圓究竟行亦是等覺位二有十種住兜率天宮下一百九十句現果圓滿行亦是妙覺位就前中三初有一百四十門明因行體性二從十種義下八十門明方便造脩行三從十種魔下一百門明因行除障就前中二初四十句明起行方便二從十種施下明十度行體就前中初二十句明意業觀察次十句身業奮迅後十句語業哮吼前中初十種觀察者觀解方便故善達所行通塞相故於中初三觀所化一知業二知報三知根知而不取相次六觀法寶一理事無㝵法二果法三教法四行五六位法一滅惑二成德後一化法二有十種普觀察者遍審之故於中初六令眾生得六度行故次一順友教次一證聞法次一拔苦後一成智三有十種奮迅者梵音也翻曰自在無畏謂如師子王於群獸中得無所畏出入往來無有障礙於中御菩薩乘故言映蔽一切也二調心運物故三興大法教故四滅惑故五摧魔外道故六滅惑故七示法相性故八稱根說故九速說隨樂令喜故十一念普令各得道果故四有十種師子吼者決定無畏故也涅槃云師子吼有十一事具說如彼此下一菩提心二大悲三報恩四堅誓五持戒六求福七求智八脩行九無生忍十示生亦是如說而作第二有十種淨施下一百門明十度行初十施者輟己惠人故一一相施二遂求施三不虗四任須五不著報六無不應七無不施八離邊施九不捨施十亡相施二有十種戒者防十支故於中初七自分後三約勝進前中初三律儀戒次三攝善戒於中一過劣二背小三順大後一攝眾生戒巧撥毀禁名為微細後勝進中亦三聚戒也三有十種忍者於順違境欣耐受故於中初三耐怨害忍忍他三業所惱故次三安受苦忍一捨卑小見二捨命救物三勿輕未知後四諦察法忍一見身如幻無苦故不嗔二若見自他有犯報故三見境非實故惑不隨起四若有能所教別則諸法有生故四有十種精進者順理勤策故於中初五明三業精進一供事尊田二讚佛說法三有三種一入出諸定二離諸不實三進趣佛智六不空過精進七滅惑精進八智導精進九平等精進十示現八相度生精進五有十種禪者心一境性故於中初二約自他身顯靜緣說次二約處靜緣說次二約心調寂以顯次二覺悟定體後二定用上初五得定緣次三定體性後二定作用又上八現法樂住禪九利益眾生十引發禪六有十慧者委細決擇故也於中初三解法一解因惑果亦然二解脫集一緣至一法生多亦爾如一色法十緣至時其十法共集各各不同常知彼所集法得緣變改各各差別如色既爾聲香等一切法當知亦然三緣所起離有無次四攝生慧一亡見二了幻三讎對四非耶小境後三一見相知性於中一見法身二見如來藏性三諸法實性四見剎相盡二持辨善巧利樂究竟三得斷微細礙著究竟智七有十種慈者與樂意樂故於中一等攝心二隨樂三同體四恒念五令滅惑六求佛果七普照世八遍救護九證如法故此不同常說十無所緣證離生真性故八有十種悲者拔苦作意於中一救苦無侶二代苦無度三生難處令不空聞故四生善趣令止放逸故五為令發心故多劫何便虗令發四生六唯與他樂七恩不求報八離倒九知法性淨十知諸法如鳥跡以空為性悲物不能了故九有十種喜者度物得喜起不離喜作意故於中一度自發心二慶捨所有三度化破戒人四慶能忍使造惡人五慶能捨身求法六慶能欲樂樂法樂七慶令眾生捨資生樂樂法樂八慶敬養佛無厭九慶他得定十慶自順行菩薩道證佛定慧十有十種捨者心無戀著故於中一捨敬養二於輕毀不瞋三不為八法染四於法器待時於非器不嫌五不求二乘因行果法六恒遠順流七不稱美乘厭生死八遠離一功障菩薩道語九小根已熟大根未熟待時化十於菩薩結緣菩薩成佛時彼方堪化此亦待時故十一菩薩於前二人平等無異故捨上來明因行體性竟第二有十種義下八十門明造脩方便行於中初四十門明自分行二從十種明足下四十門顯勝進行前中初十義者所証旨趣故依前義以成行故於中一依教行故二釋教故三思理故四寂滅故五離言故六世一性故七諸法無故八智契無性故九無性究竟故十依斷顯性故二有十種法者自性軌持成熟行故於中初一稱真說行故次四離障法次三離相法後二對小成行觀本來自性一捨二乘無餘烏波提者此云有苦准世親佛性論第三說二乘不得無餘涅槃以有三種餘謂無明住地惑未斷故無漏業未盡故變易生死未捨故此即惑業苦在故名有苦涅槃三有十種福德助道具此皆成福之緣故云助道具也於中一勸物發大心二順脩十向三以正慧教化四悲心不倦五能捨身財六勤脩相好七不輕小善八不蔑小人九敬養大人十捨施廣大四有十種智慧助道具者成智因緣故云也於中一近真善友不違教令得智名具下並准之二調要順善三念善覺惡涅槃十八云六念者念佛法僧戒施天六敬者謂六和敬身語意戒見行行亦有云施有云學謂身語意同行慈同菩薩戒同正見同學波羅蜜故六堅者本業上卷云解行迴向十地等覺妙覺釋曰准此六堅即明此經從十地已後至佛不思議法品已前中間諸品並是等覺位也承前諸德判十地已後諸品俱是十地勝進行無等覺位者正由不見此文及本業經故此中今正是等覺位也又此六堅亦名六種性六忍六慧六觀六堅謂堅信堅法堅脩堅順堅覺也六種性謂習種性性種性道種性聖種性等覺性妙覺性六忍謂信忍法忍脩忍正忍無垢忍一切智忍六慧謂聞思修無相照寂寂照六觀謂十住觀十行觀十迴向觀十地觀無相觀一切種智觀廣說如彼十種智者已如前說四捨世語論遠小入大樂能所證為樂無厭足五心專六度行四種梵住者具顯如前十宮殿初說隨順明法者隨問為通故餘文可知六已絕欲恚害三種覺故了第一義諦心餘文准知七觀三科如幻焰等非斷常無生滅八深信寂滅九恒住止觀生法平等此彼性離十見緣起法故見一切本來清淨自分行竟第二有十種明足下四十門明勝進行於中初十顯明足者委解曰明周備稱足又惑闇盡故明也智用滿故足也涅槃十八云云何明行足明者名得無量善果行名脚足釋曰准此解彼明行足即此明足也又云善果者阿耨多羅三藐三菩提脚足者名為戒慧乘戒慧足得阿耨多羅三藐三菩提又明者名呪行者名吉足者名果又呪者名為解脫吉者名阿耨菩提果者名大般涅槃又明者名光行者名業足者名果又光者名不放逸業者名六波羅蜜果者名阿耨菩提又明者名為三明一菩薩明二諸佛明三無明明菩薩明者即是般若波羅蜜諸佛明者即是佛眼無明明者即畢竟空行者於無量劫為眾生故脩諸善業足者明見佛性釋曰今此正在等覺位中通因果也於中初七句約行後三別顯三明可知二有十種求法者依求正法成勝行故於中初二離過一離曲一離慢次一重法次二為物成戒獲安次二為菩提涅槃次二令物發心斷疑後一為滿足一乘三有十種明了法者此菩薩為令所化於法明了故此十句皆約利他也於中初一童蒙凡夫者此不定聚人未能脩出離行且隨世俗教令生長人天善根故二隨信行者此至相見道十五心中鈍根者但隨他人信他語脩行故三隨法者同前在十五心中然利根解法自依法行故此上二人於七人中及二十七賢聖中皆初二也四第八人者此有兩釋一云離耶見等八向正見八行此八行究竟總名第八也一云八謂八解脫也遠離外色拘礙乃至遠離心之謗逼如癕如箭皆是離障棄背名遠離皆對治趣解脫名為向第八人者得想受滅人也或舉後攝前以勝収劣總云第八人也五初果滅眾結者滅八十八結見所斷惑斷惡道生死漏六第二果人觀欲味是患者已斷六品故餘未盡故七第三果人不樂三界等者總意別故於受生等斷五下分結不來生欲界故八第四果六通八解脫九次第定四辨等並如薩遮尼健子第五卷說此麟角喻宿習力自思脩悟故十大智利根樂度物力無畏等滿此等覺菩薩也四有十種脩行法者依法脩行故於中一敬重善友二天覺悟三常慚愧佛四常處三有五脩善畢竟六念隨大乘心菩薩七離耶求正八摧魔及惑業九知根說法乃至令住佛地十住理事無㝵法界令滅惑身淨上來造脩行竟第三有十種魔下一百門明離障行分二初五十門明離障成行後五十門離障加持前中初二十句明所離障次十句明離障方便後二十句明見佛成行初中初十魔者與道為障故於中一取蘊擔累脩道多礙二諸惑能障見脩究竟三不善諸業皆能障道四慢高陵物我甚故障五由見生故六與眾生作樂三界緣七由見諸法有實體性執取八樂著輕安九偏於一人情戀著故法謂所得法智即能證智有智有得是法智障也二有十種魔樂者前體此用故也一魔樂生死此既癈棄亡相善而集有漏福不得出生死故是其業也二惡心施等並是有流心福捨惡性等違菩提心故成其業三求利貨法無心得燈亦失菩提心四不樂亡相亦不專勤五遠善近惡樂小入滅六瞋菩薩求過斷供七謗法不樂不重說法八樂世文詞隱大說小授深非器住耶離正九親已安遠未安十自高不敬惱害蔽固三有十種捨離者對障脩治故云捨離於中一敬養善友二離自稱舉三信深法四專恒憶佛五勤不放逸六求菩薩法七說法無倦八歸佛救護九信佛加持十與諸菩薩同善根四有十種見佛者所障既離佛境現前故云也於中一佛雖現世成而無所成如是見佛乃為見佛二見佛從願赴感非但因生三為物深信現果讎如是見佛方為見也四為令遺法久住不滅佛力持住如是隨順知名見舍利形像佛五為令眾生憂悲感慕戀佛善根故示涅槃至實如來不生不滅如是知者名見涅槃佛此見深入佛境界故六知佛身無處不至法界體故七住第一義諦心唯識理者此人見佛不離此心故八知無依義者此人見佛佛證無依成故無量者於一切法皆無依故九本以無性為性今分明見本性即為見佛十佛非自為成為物作故今知是隨一切意爾而現其身者此人見佛普受者普為隨示者此身故五有十種佛業者前體今業故於中一一切諸佛皆以化物為業二宿於佛種善業令善覺悟故三未聞經謂了義令聞了義故斷疑也四為有我造罪而生疑悔不能自出說本無我罪等可得故纏即現行疑惱纏心五為諸惑垢小心等者樂相嚴身令增福滅障故六法難聞時令聞普能多益故七方便去魔難及令益故八不證二我位根未熟者邊不說自證處九惑能雖盡不捨菩薩行十了己及物本來已寂然勸脩無厭知無造作造作不亡知無相而瞻相知無師而求發知剎空而嚴淨知無生而化生不動現通成果脩因知法離言而常說示滅更生此皆權實雙行業下五十句明離障加持行於中初二十句成障離障行後三十句明外加持行前中初十舉障後十顯德前中十慢業者謂恃舉於他高舉為性生苦為業於中一於所尊及有德所心不教故二於有德及法亦不敬故三於所聞妙法口不稱美故上三及後六八准八慢中是第八憍慢亦名徹慢並於所尊境不肯敬禮故四通慢者謂於等計己勝如是心高舉為性此是慢過慢之異爾六不讚有德七自求憍慢也高座等者謂實無德自謂為有此耶慢也八見有德人嚬慼等者此同前第六九見有聰慧等者此由執著自體有實主宰不肯暫屈取長安示為我慢吞滅故也十復有眾生等者此由慢覆心故於增上法未得謂自已得故設逢佛世亦不能親近上來若約七九攝於配屬可知二有十智業者顯對治行也前既知惑今對治故也於中初一信因果不亡二依菩提心念佛三敬養善友四示能所詮會正違耶五於物離我慢想菩薩為佛惜法如身護佛如命六三業恒善七知事理得事故不壞緣起離邪見等八順脩十迴向想諸度亡相為母方便父信心入深直悲中九懃集施戒聞慧定等十勤脩一切佛所讚法第二有十種魔所攝持下三十句辨外加持行就中初十句魔攝持者盡為怨障任持不離障㝵故於中一懈怠背精進能策萬行到菩提故怠為魔攝二志示狹劣是二乘心此違大菩提故是魔攝三脩少行不至佛德海滿故此少行違佛菩薩行海是魔所攝四既一非餘者梵本中云但於一處忍受不能遍於一切處忍受故五不發廣度眾生求大菩提願故六同二乘所示故七速入涅槃故八不能為物脩苦行故九不能為化物久流轉故十疑大乘實傷故二佛所攝持者既離耶攝故佛攝也於中初二約菩提心一創發為難一深發數習次二為起行次二約悲智次二隨化悟非即離後二權實雙行也三有十種法所攝持者捨己從法故於中初四即四法印法梵語去殟駄那此曰印亦曰標相謂無常是有為法標相苦是有漏法標相無我是一切法標相寂靜涅槃是無為法標相廣說如四優陀那菩薩藏經次二知十二緣生一總相觀一逆順觀次二知三乘出生一小三脫出二乘一大度攝出大乘後二知菩提涅槃上來總三百二十門明圓究竟說第二住樂天所作一百九十門明果用圓滿行此等多約八相現化以明佛用於中分六初二十句明在天成行二從十種示現處胎下二十句明處胎微細趣行三從十種生下明出胎行四從十種大莊嚴下四十句明在家同俗行五有十種出家下六十句明出家求道行六有十種成如來力下四十句明成佛果德行就初中初十在天所作行後十在天將下時行前十中一化欲界天二化色天三化三千界眾生四與十方同類菩薩遙互相共論說下生八相法五為十方來集菩薩隨其所應說法令善六善巧降魔七方便教化欲界天子八詣十方佛聞法九供多佛十多身益生二在天將下時行者在天事說物降故次明故大乘方便經下卷云菩薩如其本願處兜率天宮能得阿耨菩提轉于法輪非為不能菩薩思惟閻浮提人不然至此兜率天上聽受法教兜率天能下閻浮提聽法是故菩薩捨兜率天於閻浮提成佛於中有十種一足光滅在觸彼令知二毫光警覺宿在府緣三手光嚴剎從置非器四膝光覺事令供隨逐五於心藏室利瑳相中放光覺諸力士六毛孔放光覺諸助化七殿光垂照當生之處眷屬同生八樓閣等光明照母腹九足光延壽十少相中光應現八相第二示現處胎有十種事下二十句中初十句明處胎後十句明甚微細趣前中十種處胎者於中一化小根故二攝眷屬故三入住出時念不亂故四現廣益物故五依願化眾故六同人處胎故七令應見機如瞻鏡像八同類後身悉來集會九胎中現勝莊嚴宮殿十供佛聞法二有十種甚微細趣者明胎中廣攝幽密難知故名微細趣智境心所趣故於中一現本因行次八現八相後一現神力並在胎內時常現第三有十種生者於右脇出時有此十種一離癡亂二放光明三未來更無此生此最後邊故四攝理而生五如幻似生六頓現十方七具正後二智身生八光普覺悟生九定慧滿十利益生第四以十事現微咲下四十句明在家行於中初十句明初生未行之前現微咲相故也於中一濟欲泥中者二智眼導盲三得遍三世身四智眼觀諸天教化五接退屈六令大益七見佛力八覺同行九救滯流轉十欣得佛光觸二有十事示行七光者創趣遊行顯示自在於中一示俱生力二顯在家具輪王七寶出家具七聖財寶三滿他本願四顯異人天五顯超象王等行六履處皆是金剛七小即能行表能與眾生勇力八表已具行七覺分故九顯所證得是無師故十顯世中無雙故三有十事現處童子地者約表無染示學攝生故於中初三示具藝能次二顯三業無過次二顯色力超過次一令他捨妄樂真次一顯重法供佛後一顯法光加四有十事現處王宮顯行無染於中一為化同行綵女等故二不同二乘善根王宮生故三顯有勝資具故四順同濁世故五顯諠恒靜故六滿願意故七滿父母親等願故八顯示音供佛故九於宮定時現八相故十順護法故上來在家行竟第五以十事故示現出家下六十門明捨家求道行於中初十句明出家內初二為厭捨故次二顯樂勝道德故次二顯見離言故次二顯離界繫家繫故後二順果同因故二為十種事樂行苦行者明示同實道摧諸邪見於中一有小根眾生拘泥菩薩生在王宮未經苦行何能練神得道故示彼世二外道邪見以自餓為道菩薩樂餓六年猶不得道後食乳糜方悟菩提故以此激破彼邪見三化執無業現邪見眾生如大乘方便經第二卷說佛於往昔迦葉佛時為化外道五人令得無生忍故次為人罵迦葉言禿道人何有禿道人能得菩提實以般若觀空而發此語樂示現此業得現不實苦行六年令解眾生信知一生菩薩方便之業猶有此現況我等耶乃至廣說四順五濁者謂五濁眾生皆有重罪受惱覆心不得解脫為除彼憂示此業報令彼念言菩薩謗佛尚得解脫況我等耶即常悔除亦如彼說五策懈怠六令求法七令離欲我樂八顯殊勝者示此苦行非是正故對顯菩薩之勝行也九根未熟者待時故三往詣道場有十種事者顯捨邪趣正亦是因滿趣果於中初二現處次一現身次一覺同行次二嚴處次一見佛入定成佛次一八部供養後一因行滿成佛此共是趣詣道場時有此十事四坐道場有十事此處成正覺故也於中初二嚴剎次一滅苦次二嚴坐處次二明心量身相次二住定受加後一自力加他五坐道場時有十種奇特未曾有事者大果將應奇相先現故也於中初二諸佛讚加次二情非情得向次二得三昧總持次二興供了相後二身滿業普六坐道場忖觀十種義示現降魔者假對魔怨顯於勝力故也依方便經下卷云若非佛力召至彼等何容近佛為欲界中此最尊最尊若降餘皆隨伏波旬四兵滿三十六由旬周菩提樹言作留難菩薩住慈悲智慧以手指地一切散壞八萬四千八部大眾發阿耨菩提心乃至廣說如彼應知此是化魔眷屬也諸天本見魔王現滅將謂勝佛為決彼疑故云降也於中初二為眾生樂勝故三調化魔儻故四為應以此住化者故五顯菩薩力無等故六為增滿佛者心勇故七愍末世故八顯坐道場當有魔嬈嬈乃起故九顯善強感劣故十順濁世行故第六有十種成如來力下四十門明成佛攝化於中初十句成佛次二十句轉法輪後十句入涅槃就初中成如來力者前降魔當無間道斷障也此當解脫道證果也初中魔是惡緣煩惱是惡因此二是所離障由超過彼之所作業故顯成佛力也次二得定自在次二自他德滿次三三業具後二同諸佛一三業同二十力同是故經名如來不名菩薩也二如來轉法輪有十種事大覺既圓機熟時至故開甘露門授以正法餘經此中具梵王請此略不說於中初十明所轉法輪後十顯能轉之因前中若小乘法輪四諦下各為有見知明覺四行今此十行以顯無盡又彼四行既苦諦下今此亦應苦十諦下來一百行法輪也於中一具無畏二出四辨三說四諦相四順無㝵解知五令聞必信六信必益七悉願持八色遍十方九說無斷十能發道品等也三佛轉法輪時以十事故於眾生心中種白清淨無空過者顯能因是佛無漏清淨法界故云白清法此等流無漏法轉入眾生心中來聞熏種子無空過者既無不從佛流至眾生心是故無不還證佛也於中一由佛本願力故二大悲因故三常念眾生故四隨示說故五應時故六隨宜說七知三世故八身無等故九言難測故十必開悟故四如來作佛事已觀十種義故示般涅槃者化緣既畢息因歸真故示涅槃也於中初二顯有為是患次二顯涅槃為德次二有為法非可壞非不可壞次二顯三有與涅槃堅不堅別次一顯非生法而有生滅後一應所作已法爾示滅經文可知上來一百九十句明第六究竟位中行訖上來總辨二千行內六位差別明大行第五普賢說分竟第七大段明結勸脩學分於中二先結義勸脩二從佛子此一切菩薩下結名勸學前中亦二先標名讚勝後佛子若有眾生下讚聞利益後結名勸學中二初顯名後應尊重下勸學前顯名中有十名一一切菩薩功德行處者教諸菩薩生功德之處故二決定義華者結決菩薩行義故三善入一切法者令諸菩薩智契諸法故四普生一切智者生諸菩薩智故五起諸世間者依此教行者必超世故六離二乘道者皆菩薩行故七不興一切眾生菩薩者此中皆違眾生行故八悉能照了法門者顯諸法門正義故九增長出世善根者所說皆是離相善故十離世間者所行皆非世間攝故次勸學中有八法行可知第八大段表瑞證來分中二先表瑞後爾時十方下證來前中二先瑞因二種佛力故法力故後正顯瑞二種震動光照後證成中三一諸佛現身讚說二勤持三我等下隨喜護持前中三先現身讚說略舉前四名後勸持可知隨喜中通舉自他佛世界護持中准上可知自下第二大段偈頌分中總有二百一十五頌半分為四節初有八頌現其德廣難說二從其心下有一百三十一頌半明略示行德差別之相三從依於佛智下有四十頌正頌前二千行相略顯也四從雖令下有三十六頌頌前結勸脩學就初八頌中每以一頌為一結即為八事一多劫苦行成二利二所成二利復亡相三離魔惑業具德滅癡四說法現化為物五令物發心解脫憂惱六脩六度四無量七捨己益物八總結廣多第二略示行德差別中分二初六十七頌半明託事表法行相殊勝二從一身能示現下六十四頌明行用廣大就前中有十五種行相初八頌半明法樹鳥獸等喻行二菩薩為商主下四頌明導迷德惑行三菩薩為法王下四頌明行法輪王行四菩薩智慧海下四頌明大海須彌行五菩薩如金剛下四頌明金剛法雨行六菩薩正法城下五頌明法城金翅行七菩薩正法日下四頌明日月照臨行八菩薩大法王下四頌明法王梵主行九菩薩自在天下四頌明離過成德行十菩薩方便地下四頌明四大寶纓行十一菩薩德華下四頌明華香衣帳行十二菩薩無㝵乘下四頌明鷲將燈行十三菩薩功德河下四頌明河船園業行十四菩薩等於佛下六頌明等聞佛果行十五如是等功德下三頌半正明障盡德圓行餘半頌能勸令聽後明行用廣大中六十四頌分為十行初六頌明三業深廣行二菩薩身無邊下五頌明供佛受法定慧行三示現下四頌明逆順行成信滿行四或現聲聞相下五頌明隨類現身難思行五或現在天宮下八頌明八相念劫法師行六菩薩知眾生下六頌半明了眾生根欲行七一念得菩提下七頌半明身心迅用甚深行八如人睡夢中下六頌明智悲廣大玄絕行九觀色如聚沫下十一頌明智德圓明照法行十廣知下五頌明結德殊勝無盡行第三正頌前二千行法略舉中有三十九頌即約六位分為六段初四頌頌前信位中二百門行二發於普賢心下四頌頌前十住位中二百門行三住持下六頌頌前十行位中三百門行四如實下六頌頌前迴向位中三百門行五諸身及身業下十頌頌前十地位中五百門行六遍觀下十九頌頌前因圓果滿究竟位中五百門行第四約觀脩學中有四十七頌分三初一頌總結所說謂結前二千行名說少分二雖令下三十二頌頌前別結德用三末後四頌結廣勸脩就前別結中二先二十一頌別結德用廣大二身語下十一頌別結行德殊勝前中分五初五頌明於剎自在二無量鐵圍下六頌明三業自在三過去一切下三頌明三世間自在四深知下五頌明身智自在五示現下二頌結自在無盡二別結行德殊勝中三初六頌明輪王七寶城郭等二總持下三頌明林泉遊觀等三此諸下二頌結上諸行多劫脩得三末後四頌中初二結德無盡後二舉益勸脩上來略釋離世間品了
