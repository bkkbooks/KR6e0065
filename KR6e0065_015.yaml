body:
  text: 四與等者別彰三諸世主初菩薩中舉數列名賢文殊者是助化中之首故釋名如五百數唯一百四十一人大位十十中間有增同名幢者顯德行高出故二十同名威力者福智感動故三十同名藏者具德含攝故四十同名明者眼照法界故五十同名冠者表勝德嚴於心頂故六十同名髻者表德尊高故七十同名光者身智二光照內外故八十同名幢者前約獨出今依降伏各據一義前後別列故九十同名音者妙響體故十十同名上者無上故十一十同名勝者無劣故十二十同名自在王者業用無礙故十三十同名音者無礙應機故十四十同名覺者悟佛境故三結數可知三歎德中二先一句總後十句別初總云普賢行願者即後別十十句皆是普賢行願也於中一緣諸佛境二身遍親近三覩佛神變四普至覺樹五智照法海六顯説多劫無盡七廣智緣境悉極八從無依慧現應機身九了生無生滅不了見十廣智普照一切法界法故二聲聞衆中亦三一舉數二顯類三悉覺下歎德前二可知歎德中十句皆具二分一菩薩分二聲聞分當知此是諸佛密語顯詮聲聞法密詮菩薩法以每句中含二義故所以者何如來不思議境界經云時有他方諸佛為欲莊嚴毗盧遮那道場衆故示菩薩形來在會座乃至云復有無量千億菩薩現聲聞形亦來會坐其名曰舍利弗大目健連等廣説如彼釋曰準此故知句通二分初覺真諦者謂四真諦此一一諦下證生空如故亦是真俗二諦中真諦通大小乘俱有故言含顯顯密也對於俗諦故名真諦二實際者二空真如自體無限然與有為住際畔故故以邊際觀標其名爾三入法性者證一切法無性之體故顯密同前四出有海者二乘身出行不出灰斷永滅唯淨法界故菩薩行永出身不出故取二出同義故云也五依佛功德者二乘有為無為功德與菩薩無邊福慧皆依佛成故六離結使縛者大小宗四縛九結十使大小多同準小宗中見取結縛大乘名我見縛餘皆相似故此一句會於大小成顯密也七住無礙處者就小顯説坐臥空中神通無礙就大密詮得無礙解脫神通業用八心寂靜如空者能證二空智各如境故無自猶空也九於佛德海未滿歎盡故十於佛智海生深信也三諸世主衆中二先舉數可知後悉曾下歎德於中十句一久供多佛二利物出世三不請而友四護物善根五願常處有六生勝聞慧七護理教行亦即護果八發大菩提願還熏佛種九願證初地十志向佛慧上來序竟第二請分中三一標衆起念二如來下顯所念三唯願下請説初中三一衆同作念故云咸也問準此經上下文皆云一切二乘不聞此經何乃今與菩薩等同念法請答意法師云理處不隔故得同疑未積大心故不測其次又之表同在祇洹故同念請普眼未照故盲等今解不然應如前歎德中説二顯所念法中總有六十句古德意法師判云前三十句明佛自入法界後三十句明佛令他入法界本疏云六十句中初十念請果法何以得知所請是果謂次十明下位不能測量故既盡下不能知云何令欲請謂次十明因緣力具或亦明知識力具得前未知此衆有知力不謂次十顯此衆根器力具若無佛力亦無能知謂次十明佛利他因具雖利他因滿若無現起利他果用亦無由今知故次十顯果用攝生既盡此緣具故結請云唯願現等又云初三十句念法請後三十句念德請今評經意乃是直言不煩多釋謂前三十句請隨所疑説後三十句請隨所宜説前中三初十句明佛果法次十句明於前果法下類不測故後十句明下既不測待上力加就初十中一佛所知境如出現品説一切世間境界等十種境界又如佛不思議法品説十種境界謂一者一切諸佛一加趺坐遍滿十方一切世界等乃至廣説二如來智行者簡異不相應行故云智行佛智所行故出現品云無礙行是如來行等廣如彼説三如來加持者佛威神力護助故四如來力者處非處等十種力也又佛不思議法品云廣大力乃至無能動力等五無畏者四無畏十無畏是菩薩此中説佛何故引耶引彼果故故彼因未云若諸菩薩安住此法即得諸佛無上大無畏而亦不捨菩薩無畏釋曰得佛果無畏時不待捨菩薩無畏是故菩薩無畏即是佛無畏即佛無畏即是菩薩無畏六三昧者謂十定品説十種定用及佛不思議法品中十三昧等七所住者佛不思議法品云如來有無量住謂常住大悲等十種云云又云一切諸佛有十種住一切法謂覺悟一切法界等八自在者佛不思議法品云有十種自在法謂於一切法悉得自在明達種種句身味身等九身者謂三身十身具顯如章十智者謂四智十智也此中十問與初會所問果德大同也次十句明於前果法下不能測中二先總標人天不能測可知後無能過下別顯不倒八相於中有十種一於彼法中心有權滯二自無慧足可以進詣三心不決定四心未明曉五不能印可容納六未得委照七未細分別八不能顯爾衆九不能分別陳述十不能令他解了後十句明下既不測待上力加中二先總標簡後加被下別顯一加被謂神力任持故二通力三威力四願力五宿善力六善友攝力七深淨心力八解心明達力九淨心向果力十求果願力後三十句請隨宜説中二初別顯三十句後如是等下總結請説前中二初總標後種種下別顯顯中二初十一句歎機堪受後二十句正明請説前中一希望二明了三照知四言説五任業化六住位七宿淨器八思量作業九心所緣十託佛諸德十一堪受佛現一切法門後二十句中二初十句請説住因圓滿後十句請説果德用前中二初顯等四字是總貫諸句故後往昔下別顯於中一心求佛智二菩薩願三淨三輪四入位五因行滿六行善巧七修諸度八修對治九起通十所經事後十歎説果德用中十事五對一成佛説法二嚴土調生三開智城示物路四入物界受物施五説施福現佛像後總結請説可知第三三昧分中二先問答後釋文前中問何故入定為佛名顯法界身雲故問前諸會皆先集衆後入定此何先入定耶答此有二義一前明從相入實故今顯依體起用故二明前是因人入定今彰果德自在故問何故此會佛自入定答為表法界解脫唯佛窮了故後釋文中四一入定緣二大悲為身下入定因三入師子頻申下正入定四入定意初中知心念者以他心智領前疑念即入定之緣二以四種大悲明入定因謂入定益物要以大悲為本故以為因一身者利物之身積悲而立即三昧所依之身也二門者佛以大智大定大悲等為方便引物令入法獲益故名為門三首者盡既益物諸所造作皆以大悲先導故四以大悲法為方便充滿虗空者悲雖為首若無善巧悲即滯有不得入法界三正入定者明定業用從喻為名如師子頻申言頻申者梵音訛略也具正應云堅實稟多此翻為自在無畏如師子王入出群獸之中自在無畏無障礙也此定亦爾能得之者入出一切諸三昧中自在無礙依涅槃經第二十六師子吼菩薩品意多同此故彼中云善男子如師子王自知身力牙齒鋒鋩四足據地安住巖穴振尾出覩若有能具如是諸相當知是即能師子吼真師子王晨朝出穴頻申欠呿四向領望發觀震吼為十一事乃至廣説如彼云云三昧之稱如上具顯舊名奮迅者梵音既違又未譯其言也第四現淨土分中三初現器世間圓滿二所謂見如來身下明智正覺世間圓滿初中二先明逝多林現嚴淨土後如於下頻通十方前中亦二初正顯莊嚴後何以故下出嚴因前中二先總標後于時此下別顯顯中三初樓閣廣嚴二爾時後以下明逝多林莊嚴三時逝多林上虗空之中下顯虗空莊嚴初中二先廣處後顯嚴前中忽然廣博者顯佛力自在故後顯嚴中有十種一金剛地二地上散華及寶三琉璃柱大光寶嚴四金及意寶周匝莊柱上五樓閣棟宇室階並寶嚴作物像其階墀合是樓閣前地今文家來在一處也六寶網霞七建幢幡八道場外階際欄楯二逝多林廣博嚴中二先舉因後正顯顯中先總後一切妙寶下別別中十一句一寶間飾二寶遍地三寶牆四寶樹五香河河中曲有七句一香水二湍三澓四華隨流五出法音六華布水上七華樹列岸六臺榭如音義説七寶網覆臺八多寶放光九寶嚴地十燒香十一建種種幢曲有十五句文易可知三虗空嚴中十二句初一標次十別後一結別中一天宮二香樹三須彌山四枝葉五蓮華六寶坐七天王像八白真珠九赤珠嚴閣具十金剛珠後結可知第二出嚴因中二先徵記何門有此諸不可説嚴事故後如來下釋釋中十句一宿因二現果純淨無漏故名自法三福德威四約業用內顯一即一切也五約業用內顯依正入正六約業用門於少現多於小現大此亦通德相七於一正少分現多令分亦現在無礙故云現過去佛八約正業用轉顯一即多九約正少分出多依果具分十約正少分現多具分依果成住等後結通十方文易可知問逝多林園近人造立何乃結通十方法界答此中俱論稱法不稱不論新舊等一切諸法若與法界相應時凡一體事即大小遠近新舊等相即相在等無所障礙故此林園非唯遍在十方法界一切世界亦彼一切剎等在此林園中思之二智正覺世間云見佛身住逝多林者見即此普遍之林園中佛三衆生世間中二初顯衆滿林園可知後見普雨下明雨供於中有十四種供雲現可知上來現淨土分竟第五集新衆分中二初明所集衆後皆是如來威神力下顯集衆因前中二初別集十方後如是十方下總歎其德前中十方即為十數就中初二及第六各有九門餘方各有十初東方九義者一來處遠近謂過不可説剎塵數剎海外表法深遠故二有世界名聖燈雲幢者聖燈略有二義一破暗二照現雲亦二義一蔭涼二含水三佛號毗盧遮那義如上説勝謂殊勝德即功德王者自在故四菩薩名初同前願光明者本願照物故五眷屬俱來六興供雲七詣佛禮供八依本方化樓並華座而坐九寶網霞身顯勝德自在若準下殊方餘如第十或髻珠或天冠表勝相故餘方世界佛名等準釋可知南方持供來供內云悉以神力充遍等者依業用門供遍諸剎海西方供中云須彌山雲者皆高廣妙好有清涼利物之能故充滿法界義如前説釋北方供中同名衣者表依慚愧行故東北方供中同名樓閣表二利行相因成高位故東南供中同名圓滿光者表內因行説真實教資物圓滿慧故西南方供中同名𦦨者表因內行令他成就治淨慧火燒惑薪故西北方供中以三世間形像者為顯世出世境界皆同形像以有非真故即相無相故下方供中同名音覩者此有二義一顯語言文字皆緣成無適主宰二顯音覩語言雖假安立而能善巧入深法門上方供中顯諸菩薩於六處中現三世佛及衆并現昔十度本事問小宗有部過未色心有體無用現在五蘊體用見存大乘現法體用俱有過未體用皆即是無何得此云本事猶在答此中本事者是昔修行稱理之行非但除蔽名淨三輪持應治見事理融會由此不壞真俗二諦於一依他起非真非俗依此修行照生滅法與不生滅和合非一非異由此行故漸退生滅染法分得無生滅淨分故密嚴第三云金剛藏菩薩現種種形説種種法乃至云淨所依止入於佛地如來蘊界常無變易大乘權教即無此事從本已來理事別修故問菩薩證如已所感依正自各有因何須此耶答彼即是此更何別也斯即德相門之體事爾第二歎德中三十七句分三初一句總歎次以淨下三十五句別歎後如是等下結初總中云皆從等者同修普德而生其身所謂證遍自體修顯行故次別中二初兩句上緣佛境已得下自力所成前中初一句見佛法界身後一句聞佛法界法後自力成中初兩句通三業自在二親近下明身業自在三知一切衆生下意業自在四勇猛下語業自在五於虗空下亦意業自在初通三業者神通通三業故二親近者身近佛也一身充滿等者一即一切不待分遍此德相門或通業用一塵等者身所依中一小處現多大處故一毛等者於正報少小處現多大音故三意業中七知生如幻者了因果似有非實有故知佛如影者隨機質勝劣應故趣如夢者暫有昧略境而無究竟真實故業報如鏡像者隨質現故諸有生如陽𦦨者緣合暫起故知剎如化者本無如是如是廣狹形狀因緣力故先無令有同無忽有故此約一分故言他也力無畏智皆意業義如上説四語業中三師子吼者無畏説故無盡辨者涼演不窮稱根機故得言辭海智者雖言得智用在隨類説故五意業中十六種初隨意即欲往皆無難故二知法速達三通皆離障四降魔怨五知了三世六知法無達離取七無求而求八無觀而觀九了法無性不乖性十於無差別而明了差別十一於業用門顯互相入十二隨物受生十三了知剎形十四小大無礙十五得佛加即得諸佛如十六十方佛剎網乃至重重照皆明見後一句結歸佛力逝多雖狹悉能容也第六舉劣顯勝分中三初顯能不見人二皆悉下明所不見境三何以故下釋不見所由初中據前列名大數五百今此略標上首十人具釋名字如音義下卷二明所不見境中二先彰不見佛果境界後亦復不見下明菩薩境界前中十句與上大衆念請多分同也問此若非器請中不應菩薩同既列念今何不見答法名是一義通淺深前據淺同今約深別廣如前顯十中初一總餘別總云神力者無礙作用業用門中相即在等別中一十華藏剎海相及隨好故二境界者如前引出現品説三遊戲者依十通化生遊戲故四神變者神力變現種種境界故五尊勝者攝三世間具十身故六妙行者亦如前引出現品説七威德者功德海滿福力令驚畏故八住持者謂佛力所持令住在故如佛舍利形像浮圖塔廟袈裟等九淨剎者即娑婆是華藏等故後明不見菩薩境界中三十一句初一句總餘句別後一句結初總云境界者如離世間品云菩薩有十種境界及十境界無礙用廣説如彼餘別中一云大會者一會即是一切會故二普入者菩薩入一會時即入一切會故三普至者至一會即至一切會故四普詣者往一會時即往一切故五神變者離世間品云菩薩有十種神通及十種神無礙用神通變化即神變故六遊戲者離世間品云菩薩有十種遊戲謂三昧力對應化者種種現化令彼獲益名遊戲故廣説如彼七眷屬者十方菩薩來此會各剎海塵數所現所作悉是廣深非二乘知見故八方所者於彼來處莫識何方九莊嚴師子莊諸嚴具非彼能識十宮殿者離世間品云菩薩有十種宮殿廣説云云或是來時十一住處者離世間品説菩薩有十種住處如彼云云十二所入三昧自在者三昧定體自在定用離世間品云菩薩有十種入三昧如彼應知十三觀察者離世間品云菩薩有十種觀察應知十四頻申者得定自在具如前説十五勇猛者菩薩一生成就三劫所行是勇猛義俱非二乘測量境界十六供養者菩薩供養一華一香即遍法界供一如來即為供養一切如來故十七受記者離世間品云菩薩有十種自知受記此亦不是二乘所及故十八成就者菩薩觀知根欲性應時説法令解脫故十九勇猛者一念遍至十方諸佛會故二十法身清淨者證性淨如故此會菩薩他方佛故惑垢永淨故法身顯故二十一智身者十智具足故二十二願身者無障礙願成就故二十三色身者隨形應物故二十四諸相者二十八相或同佛相故二十五常光者常隨照身種種色故二十六放大光網者隨遠近照廣大交絡故二十七起變化雲者變身多種益物如雲二十八身遍者隨十方中堪化應故二十九諸行圓者因行畢故後一句結可知三釋不見所由中三初徵次以善下正釋後如來等事下總結初徵意云諸大聲聞盡預坐會中何以不得見故次正釋中二先以法説後佛子下喻顯前中四一行劣故不見二如是下總相指由境勝不見三何以故下依小教行故不見四是故下總結不見初行劣中十九句初一句總餘句別初句通言善根者順理益物生見佛增上緣因故不同者異菩薩故別中一無見佛無障因二無讚淨土因三無讚佛神變因四無自發大心因五無勸他住大心因六無念佛種不斷因七無攝衆生因八無觀他修到彼岸因九無勸他求佛智眼因十無自習佛智因十一無無漏因十二無嚴土通智因十三無菩薩眼境因十四無求超世不共菩提因十五無發菩薩大願因十六無佛加持生因十七無知法如幻因十八無知菩薩如夢因十九無得菩薩廣大法喜因二境勝不見中二初明德勝故不見後復次下正顯勝德名體前中三初兩句總標次以是下別顯後是故下總結初中上句云普賢菩薩眼境界者約行顯勝謂體事業用等境唯智能知非餘境界下句云不與一切等者約乘教顯勝謂此大乘實教所顯非小乘及大權劣境故次別顯中十句牒前餘句正顯顯中不能見等者既無普眼等故後總結約前不見句也後正顯勝德名體中五一顯勝名體二是故下重成前義十種不能三能何以故徵四諸大弟子下釋成五是故下總初中二先明無自利所成德後又亦下顯無利他業用前中二初十句顯無勝德後是故下結成前不能義前中通佛菩薩初善根者謂普賢行因具如前説二智眼同前三三昧者佛不思議法品云佛有十種佛三昧十定等亦如前顯四解脫者謂佛不思議法品中佛有十種無礙解脫離世間品云菩薩有十種解脫五神通者亦如上説六威德者佛及菩薩皆具勝福外感驚畏亦如前顯七勢力者勝力乃能展轉加持有所成壞八自在者神通業用已如上顯九住處者如前所引離世間品説十境界者亦如前説後結成前不能義中二先明自行不能後又亦不能下明利他不能前中十句初二可知三入者分明了達故四證者契合相應故餘句準釋後不能利他中十句準前思釋三徵意云此諸聲聞並是佛大弟子既復預會何以不得聞見彼境界故四釋意云此等雖是佛大弟子預會座中內熏習異故不得見聞初四句謂依教聖道修行得果別故五於無有諦者生空法有故六常住實際者如上釋七究竟寂靜不住自事者捨生死位無餘依行故八於彼下十句捨菩薩悲智行願等五結雖會中坐不見也後喻顯中有十喻遠法師等諸德皆將此喻配前所迷佛果十句功能唯第九二無喻喻上第二如來莊嚴餘皆次第融釋可知本疏云就十喻見與不見三義分別一第一第五第十此三喻二乘不見佛果功德二第二三第四此三喻菩薩能見果德餘四喻如來自見果德亦見二乘等法又云此十別相者鬼對恆河喻喻二乘有所知障故不見勝境辨法師云如餓者喻二乘人不得菩薩法界行食故云餓也鬼者似人非人喻二乘所得涅槃似而非真也裸形者以無菩薩慚勤行眼故飢濁者不得無二理觀沾至神故舉體燋然者四相所遷不息故烏鷲豺狼競來搏撮者此與舊文稍異此喻有業餘故為諸無漏業所債不自在故為渴所逼欲求水飲者喻諸聲聞本無大悲水故為渴逼也內既無悲水外復臨河而不見河故猶渴也見枯竭者梵本又云或覩灰河謂但見聞自分之境證有苦煩惱也次徵意何以住在會中不見故釋意可知二覺夢境喻喻二乘守劣乖勝故不見於中先喻後一切菩薩下法説法説中先總次別後結別中九句一久積善二發大願三學佛德四行菩薩嚴果行五滿果智六滿普行願七趣十地八顯定業用化物九修事事無得觀後結中二先結菩薩後結聲聞三愚對雪山喻喻二乘心狹無悲故不見四地有伏藏喻喻二乘無巧方便故不見五盲人不見寶洲喻喻二乘無深定故不見六有得淨眼喻喻二乘無深智故不見七遍處定境喻喻二乘無深定故不見此中十二處者前八觀欲界色處作無邊行解觀故第九第十餘處各別觀作無邊空行解無邊識行解今此合觀為一名天遍處也十名種種衆生身者身業故十一名語言音聲是語業故十二名一切所緣遍處者意業故依小宗中前八在第四禪第九第十在空處識處通凡聖修唯有漏道也八醫形自見喻喻二乘無深行故不見九二天隨人喻喻二乘無密相故不見十滅定無見喻喻二乘住位息求故不見舉劣顯勝分竟第七以偈讚德分中十方菩薩説偈讚即為十頌就初頌中二前五頌述前頻申業用後五頌諸來菩薩德前中初頌上半正讚定用所依謂佛道即法法即三昧下半歎於林現通次一頌歎用多勝非下了次一頌歎定深非世測次一頌歎佛以無相為相後一頌歎定用非言及後歎菩薩中初頌述來次頌歎德具歎量次頌歎非二乘境後二頌歎位極德堅業用廣大第二菩薩十頌分二前七頌歎菩薩後三頌歎佛前中五初一頌勸衆具二行次一歎慧明善定智境難量次二頌歎處衆集次二頌歎悟深離障垢智堅實業次一頌歎身不分而來後三頌中一歎佛感衆來二法深此衆能通三後一歎佛證一性説差別第三菩薩十頌分二初三法説歎佛一歎佛説法應時二歎佛力用摧邪三歎佛超情量後七喻顯佛德一智達三際二悲德圓滿三神變無息四現化無礙五法輪為依六佛法速遍七智輪為本第四菩薩十頌分九喻顯一佛山益世喻二悲海除炎喻三山佛出法海四五二頌無師智寶在佛海中五巧現應機六隨願能滿七普智照緣八隨方等照九智水淨根第五菩薩十頌分四初一頌歎佛身令見者成佛因二次六頌歎佛現通於中一遍法界塵內現淨諸菩薩二次歎通力現菩薩境界非世測三次一神力顯相嚴身僧菩薩行位四次一於多淨剎現成佛五次一現多神通六後一頌現諸菩薩行三次一讚菩薩修行法界智四末後二頌歎佛圓智説法淨世第六菩薩十頌分三初三明勝境非凡小能知二次四正顯所不知勝境一深智二勝通三善巧四應化後三顯能知勝者一大願二勤三修調廣第七菩薩十頌分二前六歎佛身後四歎佛菩提智前中初二歎身後四歎身業就歎身中初一顯身是智身不礙色相故非思及後一彰身因後歎身業中初二身光一法説二喻顯後二明光用一淨三有二現多色後四歎菩提智中一會覺諸法二念達三世三歎菩提智難思四歎超言第八菩薩十頌分三初二智德一依思二依修次三堅行一歎二信三向後五斷德於中初二離染成自行後三離染成利他行第九菩薩十頌分五初一歎佛難聞若近必益二次一歎意業三次二身業利益四次二身語業雙益後四利益見聞第十菩薩十一頌分五初一歎佛身見者獲益二次一轉法輪三次五歎佛大悲佛大悲為物忍苦四次一釋忍苦所由五後三明見佛成益第八普賢開發分者為令衆生發生信故於中二先長行後偈頌前中三初明説意言普觀等者謂前明教主入定廣現其事未有言説今辨普賢廣以語言資開發前定所示業用令諸菩薩同入此法故二以等法界方便下明所顯事廣多善巧有十一句一以等法界方便者謂事法界法之界法或即界數量廣多應機現事善巧廣多數量同此故二等虗空界者謂太空是事空雖體無質礙然隨所包容分量廣多應機下同前餘句亦爾三等衆生界方便者有情數多故四等三世者三際時分多故邊畔難知故五等一切劫者一切剎中劫量數多故知娑婆等望安樂等剎長短既多同類又廣説復大中小等也六等一切衆生業者衆生當多況各各業都計皆廣也七欲八解九根十成熟成熟者令從因至果故十一等一切法光影方便者光影之名簡異水影觀雜故謂水等二影依明顯己光影一種映明現己前可喻現身後可喻因緣法成壞同時三為諸菩薩下正顯説彼廣多善巧於中四一標二徵三釋四佛子此十下結初中亦四一標為菩薩二標數以十法句故三標以言説故四標定名頻申故二徵可知三釋中十門初云標説能示現者此有二義一今以言説説前所示現事故二今於言説中示現前事等法界者如前説一切佛剎等並是所示現事也自下九句中顯示並同初門釋四結中二先顯略結廣後結非餘境唯佛境故後偈頌中二初敘意後正頌前中承佛力者顯非自力故觀如來者有所稟故觀衆會者有所為故餘句觀其所説此等並是佛差別德故正頌中十頌初中上半頌前等法界剎塵等下半頌佛興等二中上半頌等空界佛剎下半頌盡未來佛處座讚佛德三中上半頌等空界佛剎下半頌佛出世菩薩圍繞聽四中上半頌等空界佛剎下半頌菩薩衆會五中上半頌毛孔出三世佛化身下半頌充滿法界六中初句頌平等現下三句頌一身滿一切剎七中上半頌前第八內一切剎塵現中三世諸剎塵數佛下半頌種種神變經多劫八中上三句頌前第七內現三世佛神變即修行法海行是也下句頌諸境界中九中上半頌毛孔出生三世佛智奇音下半頌化道菩薩十中上半頌令佛座量同法界下半頌菩薩衆會中盡未來轉法輪上來開發信心分竟第九毫光示益分者令衆證法界故於中三初舉佛放光為示法之緣二時逝多林下明依緣見法三其有此下明見法得益正入法界初中五句一標即意欲令菩薩因人隨分亦得此三昧故又此三昧中所現事即是大衆前所疑問故佛答問入此定令衆亦得方為答也二放白毫光者顯中道平等白淨法界是前三昧攝生業用三名普照等者依義立名謂遍照三世法界門悉顯現故今諸菩薩皆證入故四以不可説下明攝眷屬具主伴故五普照十方下顯攝化分齊二依緣見法中二先舉能見人謂普雲集此通新舊二衆後明所見法中亦二初見此方法界後如此會下類通十方前中亦二先見一切世界中現身説法後或現在天宮下明見一切宮殿中現身説法前中先舉所説之處後如是等下正明現身説法具三世間可知二就天宮等中亦二先所現處即前世界中塵內十種天宮等後現種種性下明現身説法亦有十種此等所現並是通答前所疑問謂如來境界等可準思之二類通中三先舉此會後如是下類通三不壞下明自在初舉此會可知二類通中二初粗類十方世界中器世間及衆生普是實報顯現故名也後一切虗空下細類毛孔中可知三明自在中初一句不壞廣事謂雖在毛孔微細之中而亦不壞三世九世廣大無邊衆生界等差別儼然次四句業用謂一隨心現像二隨樂説法三普入衆會現身種種而智無差別四隨應教化無竟期也三見法得益中二先顯見法因緣後或入法身下正明得益前中二初約緣佛有宿緣故見二或是見聞下約行已修其德方便前中二句一佛通以一切善根攝二佛唯以四攝攝後約行中二初明二利後結入法前中二初三自利謂見聞等故發大心故故與佛同種善故後一利他謂以成菩提法化故後結入法界者謂然由前得入後益此句亦是後所入之初為總也後正明益中三初明因見得法二其諸菩薩下因法成德三爾時諸菩薩下因德起用初中三初一句結前生後屬前末後初如前分別然此意標所得佛地大三昧以此中衆並是普賢位中諸菩薩故是故所得無漸唯頓即皆究竟也二或入下顯其所得於中三先總標所得略列十門於中初六明得菩薩行位究竟後四明得佛果自在成滿二後諸菩薩下行結略顯廣於中二初結名後結數名中十種初解者明了故二道者大行願故三門者方便故四入者於中分明解悟故五理趣者所顯理故六順隨者無違逆故七智慧者決斷擇法故八助道者三十七品等法九方便者加行故十三昧者定體故後結數中有二種一此十為首乃至有十不可説佛剎塵數二即此十不可説佛剎塵數餘等一一復有爾所數量以後廣明百門定末結云菩薩以如是等不可説佛剎數三昧入毗盧等故三云何種種下偏顯定廣於中三初一句總牒徵數二所謂下別列一百二門三菩薩以如是下總結就別中二先百門顯自分因終後二門約勝進果滿此中何故偏廣三昧以諸門種種皆依定現故又前文云欲令諸菩薩安住師子頻申三昧故一百二中初一名普莊嚴法界者無盡行海嚴平等法界便出纏究竟圓明具德故入如來力者梵本中云十力解釋次云一切法界旋轉藏者梵本中云一切法界理趣旋腹中間諸定隨文思釋三總結者結前一百二定通果定故上來因見得法竟第二因法成德中二先別顯德後其諸下總結前中有十門顯德一成深智德二為諸衆生下了法為師德三知諸世間下隨緣無著德四遍入一切下成就衆生德五示真實際下解深具行德六具三昧力下得法智能德七證分別下巧便勝智德八得一切法無礙下理智契真德九放淨法光下攝生見佛德於中初攝生成益後普見下見佛得益十一身充滿下三業自在德於中五一一身普遍二乘大智下智慧無礙決了佛地甚深定趣者梵云甚深所行三以無盡句下演法無盡四獲大智下念成就五恆以下轉顯業用益物定慧神變後總結可知第三因德起用中三初總顯次所謂下別顯後是諸菩薩下總結初中二先明前所得後各於下正顯起用次別中十事差別可知後結中云得法光明等者是此法力也上來第九毫光示益分竟第十文殊述德分中三初長行敘意二正頌其德三爾時彼諸下明諸菩薩以佛三昧光照得入此定初中略述頌意可知二正頌中十三偈分二初五頌歎逝多林中所顯示法於中初二頌歎林中器世間自在用次二頌歎衆生世間自在用後一頌歎智正覺世間自在用後八頌歎諸菩薩等得法業用於中初一歎林上空中説菩薩德次一頌林中樹説衆生業海次頌林中諸事內現佛神通次一頌一方國土入佛毛孔次一頌林中諸事內顯佛放光次一頌林中諸事體廣遍十方次一頌三世佛嚴事皆現此林諸事中後一頌總結諸菩薩多劫嚴事皆現此林諸嚴事中三諸菩薩以佛三昧光照得入此定中三初明所得行體謂由佛三昧光照得此大悲為利物行體二於其身上一一下明所得行相謂毛光現菩薩所化之形三普為下明行勝用中二初總顯大用遍滿法界後或現不可説下別顯悲用於中六一顯能化法二往詣一切下所化處三以平等大悲下能化心四或有見已下明化令益五佛子此逝多下現住處六佛子此諸菩薩下現能化身初中二先別説後以如是等下結數前中初八以欣厭門化二或現不可説檀下十度門化初中可知十度中一先八門明六度化七八二種慧度攝故次一或現隨諸衆生時善等是方便度次一或現降魔等是力度次七門或現知一切工巧等下皆是智度後結可知二住所化處中二先結前生後即為總句後所謂下別顯中十四處可知三能化心中四謂悲願智方便也四化益中八種文顯可知五現所住處中四句初一標次二別略顯後一不離本處此中類結不離者意顯於後文殊出會遊化亦不離本處故六現能化身中初一總標末後而亦下總結中間從所謂下別顯一現身中有十種可知二往詣下現形三威儀四音聲五言論六住處七修行八説法説法中五句並準可知上來從會初至此十數總明本會竟第二大段明末會者亦名菩薩會以菩薩為會主故前本會亦名佛會佛為會主故然此本末鎔融非即非離為一無障礙法界會也就此文初略有二種先明文殊為能化起機二爾時尊者舍利弗下明所化就應前中三一總標文殊出閣二與無量下別明同異眷屬三文殊師利下結前生後往人間也初中顯吉祥妙慧證真了俗故説文殊出閣也二別明眷屬中先顯同生衆者即是會初所列者也後及常下顯異生衆於中有二十三衆各依行標稱令亦隨釋一衛護故二為物化彼成行為供故三恆隨足下布華故四樂植善種於心因故五悲涼水除熱惱故六智火光照故七冠蔽風塵故八知方土儀式故九照生死暗故十明佛自在故十一嚴法界空故十二度有海衆故十三積集高大助道法故十四護物心城故十五守護法城故十六勤護物命故梵本訓釋藥叉此曰苦活故十七尋逐如來於定慧香生歡喜故十八以己所離令物離故十九生死海中拔出天人龍故二十成佛大身故二十一喜歎故二十二厭有樂佛故二十三重供讚故三結前生後中二先牒前二衆略讚其德後出自下明了俗順機由先內證故乃至云辭佛南行二明所化就應中四初明六千比丘會二爾時文殊菩薩下明諸龍會三復有無量下明諸乘人漸增作入大乘宗教方便故四時福城人下明善財會福城者梵本云馱寧阿羯羅若以長聲呼馱寂即云也謂多出穀米之處故若以短聲呼云但寂即云福也是福德之處故今梵本中有此多處呼召不同故譯從長存福為正也就初中三一明文殊從善住閣出下見友之遠緣也二時尊者下鶖子與自衆隨逐文殊者此明六千見發之近緣也三此六千下正明六千見先發鶖子指授於中四一明經家敘六千名德於中二先略列十名及德可知中間自所住處者同在聲聞教法中住故出家未久者發心摝出三乘家來近故後歎德中先歎後結前中七一福深望淺説故二解廣三信徹四觀佛境五了法自性六益物以出世七求成佛德後結並因文殊化成二爾時尊者下鶖子教六千觀文殊十種德一身嚴二光益物三光網滅苦四菩薩衆會五行處平恆六道場常隨七行修福嚴左右伏藏八供佛善流樹間出嚴藏九諸世主雨供十十方佛將説法先放光照身入頂後結可知三後諸比丘下明六千聞讚文殊德獲益中二先敘後彼諸下顯益益中十六句一心淨二信堅三獲喜四體柔五根悅六憂苦除七垢盡八常見佛九求正法十具菩薩力十二發大悲十三發大願十四入廣深境十五佛海常現十六深信樂一切智四即自下諸見勝緣中五一白尊請引見二時舍利弗下指授六千三爾時文殊下文殊觀彼六千四時諸比丘下明六千發願五爾時文殊下明勸成十法初二文觀可知三文殊觀六千者顯其根性堪進入法界故言如象王回者謂身首俱轉現前事重攝受相故問六千豈不本大乘耶答本是小乘有堪入大性如不定性故四中發願亦可知五中四一勸成十種趣大乘法者回入實教心無疲厭故於中一積善二見佛聚事三求法四修離三輪五滿諸定六入三世入即明解也七普嚴剎八調化一切九諸剎劫中成就菩薩行十為成就一衆生故修剎塵等行成佛一力如是為成就一切衆生故成就如來一切力也二比丘若若善男下明能深發前十心得益一長養善根二捨生死二超世種性三不墮二乘地四生佛家五具菩薩願六習佛功德七修菩薩諸行八得佛十力摧魔伏外九滅惑十入菩薩位近佛果三時諸比丘下明六千同前勸進獲三昧益由得此定得無礙眼由得此眼故能成二十五種益一能見一切佛境界二見無量剎佛道場三見彼諸趣四見彼諸剎差別五見彼諸剎微塵六見彼衆生宮殿七聞彼剎中種種佛言音説法八觀察彼剎中衆生根欲心九能憶念彼中衆生前後十生十憶彼剎中過未各十劫事十一憶彼佛十本生事十二成正覺十三轉法十四十神通十五十説法十六十教誡十七十辨才十八成十千菩薩菩提心十九十千定二十十千三輪淨二十一得大智二十二光明圓滿二十三得菩薩十通二十四身心調暢故云柔耎微妙也二十五住菩薩心堅固也四爾時文殊下結前下勸進六千究竟所得中八一住普賢行二入願海三成大願海四心清淨五身清淨六身根利七得神通八由大通故雖在文殊邊然普遍十方所現身成就佛法第二攝龍衆會中四初結前起後可知二漸次下詣後化處於中二先標名後往昔下讚勝於中三一昔佛曾住二今佛昔修行處三八部等常供養三文殊下明説法於中先顯經名後説此下顯益前中經名普照法界者説十眼圓明頓見理事理事無礙法界故釋法界名義具如別行旋澓章説後顯益中先顯類謂諸龍衆後明益中二初百千億龍厭捨龍身生人天後一萬龍不退菩提第三攝諸衆會漸增進位入實教之因緣具如教被機中説諸餘別分如常可知第四攝善財會中二先以義料簡後正釋文前中略以八門分別一會數開合二説聽起就三科為五相四會主類別五南行不定六歎問有無七推讓後勝八問答分別初門中二先敘晉本後依唐譯前中依光統師等云此中善知識總四十四人初文殊一人配十信次四十人配十住十行十向十地次二人配等覺位後一人配妙覺位若依五臺山論及意法師等總不配位亦無科截但隨諸會依文散釋後依唐譯者始從文殊終至普賢總五十三會童子童女同一問答故遍友有問無答不成會故文殊前後雖是一身兩會別故二説聽起就者此有三類一由能化者依大悲行住不請友故文殊正趣等起聽而化也二由令所化者行敬法行要待就請説故海雲海幢等待求問方説也三由具前二行故觀自在菩薩安住地神等善財未聞先即讚歎此同不請友也然復有請為説此同敬法行也彌勒後文殊普賢等皆亦同此也三科為五相者此中總有五十五位若依本疏初四十一人明寄位修行相次從摩耶下有九會十一人明會緣入實相三彌勒一人明攝位成因相四後文殊一人明智照無二相五普賢一人明顯因廣大相若依今本大都無異中間少別者謂從文殊至第四十一瞿婆總名寄位修行相寄歷諸位顯修行故二從摩耶至童子童女同得幻住解脫總名會緣入實相謂寄男女相別以幻住理會其差別入平等實性故名也若依位判此是十地勝進位後三相是等覺位但以初歷位多從多名小爾三彌勒菩薩處得入三世一切境界不忘念智莊嚴解脫名攝德成因相謂攝三世境在念無忘失智以成應化佛德之因故四後文殊師利得無量大智光明總持大願三昧神通智慧入普賢道場住文殊所住名智慧無二智謂善財至此乃入普賢所入住文殊所住與二聖同照一境界故五普賢菩薩處得普賢諸行願海與普賢等與諸佛等一身充滿一切剎等行正覺等神通等法轉等辨才等言辭等音聲等力無畏等佛所住等大慈悲等不可思議解脫自在悉皆同等名顯因廣大相謂當來大果今成彼因福彼廣大果之因故四會類別者總有二十類一比丘二醫人三長者四優婆夷五仙人六婆羅門七童女八童子九居士十人王十一外道十二船師十三比丘尼十四女人十五菩薩十六天神十七地神十八夜神十九林神二十先生也五南行不定者梵音呼南曰馱器尼依西域訓釋南是右義右是順義以彼城邑宮殿園苑屋宅菩提樹等皆面向東則南為右人多右穩穩便為順右繞等事皆因此言故於此中顯文殊順化善財順求皆曰南行爾古人釋云善財南行表中道法界離東西二邊故又表是正指南之説故若爾者向使教從此起可取此國司南之正用指南之義盡教從西起何不依彼訓釋南義蓋知不然應取順義故此經淨行品云右繞於塔當願衆生所行無逆成一切智晉本離世間品云攝右法是不違一切佛所説故今本云隨順是不盡一切尊者教故按隨順言即梵云馱器尼此云右也尊婆須密論亦同此説此表善財所求善友一一隨順不盡其教由此南行是右行故右行即是隨順義故是故中間設往忉利天宮菩提場等皆不違於南行之義以彼悉是順教行故六歎問有無者此有二義一由菩提是諸菩薩敬重故聞其能發無不稱歎二由有別緣故而無歎也別緣有三一善財善友時正受故如解脫長者海幢比丘等二善財於善友説自發心已善友不即隨答歎美乃述自所得故此門多是脫略也三由善友示逆相化若説聞發心而即稱讚者便與逆相相違故如無厭足王勝熱婆羅門婆須密多女等所餘善友無此三緣故皆歎爾七推仰後勝者此諸位中唯後文殊及普賢菩薩無別推勝者顯其人尊位極除斯以往餘皆有推中設無者脫略故也無別所以也八問答分別者問此等諸會並無佛説何得為經耶答此等並是傳法菩薩結集當時求法説法諸菩薩事同上本會所顯逝多林園自在等法令彼大衆見已入法雖無佛語豈即非經問前本會中佛雖無説諸所顯事並在佛會之中今此遠方異處又非佛説後不對佛豈得為例答雖在遠處而不離本會是故常在佛前如上文逝多林內一一境界當攝十方一切佛剎説此處而不攝耶是故此五十三會不出本會故名為一會謂入法界品也既此諸處並在逝多下文善財應見普賢及佛大衆在此國下何故乃見在金剛道場答以覺樹金剛為九會本故是故不動覺樹遍諸會處尋末見本還在此故又此會初普賢及佛在逝多林處更無移動見在覺樹即是逝多亦在樹下思之上來略分別竟後正釋文者依前五相以釋其文就初相中有四十一人於中初文殊一人寄當十信表信非位故但一也二從德雲比丘至慈行童女寄十住位三從善見比丘至遍行外道寄十行位四從鬻香長者至安住地神寄十回向位五從婆演底夜神至瞿婆寄十地位就初文殊一人寄十信善友者本業經上卷云未上住前有十心名字菩薩常行十心所謂信心念心精進心慧心定心不退心回向心護心戒心願心釋曰信名彼此雖同然行相境界二經全別如上賢首品等已顯今此文中分六一集衆分二爾時文殊童子下觀機授説分三爾時文殊下觀已為説分四爾時文殊如象王回下讚觀攝受分五善男子於此下指示後友分六爾時善財下念思辭變分初中二先總舉後時有下別顯別顯中四衆一優婆塞二優婆夷三童男四童女形各五百於中初二衆通稱優婆夷等者是梵音此云近事男近事女謂男子親近承事比丘僧故女人親近承事比丘尼故列別可知二觀機分中二初通標説意可知後復於下文殊別觀善財於中二初先明現在後又知下明宿生前中四一明入胎時現奇寶次善財下明身相具足次其七下具顯寶物後以此下總結立名二明宿生中略顯十德一昔曾供佛二信解心廣三樂善友四三業無過五菩薩行淨六求佛智七成法器八淨心如空九回向行十得無障門三為説分中二先明為説法後爾時善財下明説偈求濟前中三一時觀察善財慰喻發起可知二而為演説下正為説法三爾時文殊下結説勸進就説法中二先總標後所謂下別顯別顯中十句一多行學二不斷絶三説佛出前後四説佛會淨五説佛法輪化導六説佛身相好七説佛法身八説佛詞教九説佛光照十説諸一味三結説中可知後善財説偈求濟中二先長行述意可知後正説頌中總三十四頌分二先四頌自述在纏後三十頌讚文殊德以求濟前中初頌明依三界恃倨慠出入不離五趣之門由以深愛自溺也次頌三毒覆燒互生死如臣事王次頌會貪繩繫縛諂誑轡勒疑遮慧眼入耶道後一頌慳嫉因入三惡受八苦也後三十頌中一一分二多分上三句讚文殊德下一句求運濟前中一智日悲月二智月慈日三法界輪王遊法界真空法寶導前四福慧商主勇求佛寶利物五智忍伏魔六定慧證法頂七滅地獄因淨三有果八離三惡趣果成淨善因九見八倒行正八十了耶正無疑惑十一住佛見長佛樹行佛十二如三世佛日出現十三智慧決定染淨業三乘行十四悲願信忍為輪轂轄十五持箱慈蓋辨鈴震十六淨行三昧法鼓音十七四攝德寶慙愧歎十八施輪戒香忍辱華十九禪方便不退轉二十願持堅力智慧成二十一普行悲皆無吝二十二堅善巧無礙二十三與生極淨等空樂二十四淨業惑斷行苦摧魔外二十五滿智遍嚴剎普霑善願二十六除愛見淨如空利一切二十七住定普運願力速二十八運生如水如地不動二十九四攝總持日光三十入法城著智冠繫法繒四讚勸攝受分中三初讚述發心二善財白言下重請解脫三爾時文殊下正答所問初中二先讚發心言如象王回者前已略顯此由內有審諦之量外無淺促之儀回面向機表攝受相故後復欲下述意勸勉於中二先述後勸述中三句一近友二求解三修行後善男下勸中二句先牒前近養是成佛初因故涅槃第二十云一切衆生得阿耨菩提近因緣者莫先善友乃至廣説後結勸中為成佛亡勞謗懈也二重請中同下教問準梵本中有十二句一問學二問信受三趣向四修行五成就六淨七入八出生九隨順十憶念十一增廣十二圓滿普賢行其第二問云何修菩薩行者梵本云鉢還提簸多綿彌鹽及此云修亦曰信受此文十一句分三初一學解修次九正修後一究竟就正修中初一總問亦離惡二專趣向行三進善四亡相五於行分明解悟六悉具定七不違理事八憶持前修九習前令廣十勸巧速圓三文殊正答中二先以偈後爾時文殊下長行重讚發心教求善友前中十頌分二初一總歎善財具福悲物求佛如來後九歎善財已具大願大行於中一為滅物苦發願修行二文殊勸云若不厭生死此是為物具普賢行堅也三中上半歎善財福能滅苦名光也福能摧障名威力也生處顯寶名福處也亡相福廣名淨海也下半結是為物願行四中上半見多佛下半聞法不忘五中上半見多佛下半願海成具修行六中上半明住位中善巧修行攝同佛果故文云初發心時即與三世佛等故乃至廣説下半重顯上半常濟佛果不壞本位故云隨學當來也七中歎善財遍剎塵劫修普賢行道成八中歎善財多剎劫修普行願滿九中述多衆聞善財願發大心願學大法問善財是何位人答經無明文人斷難依古雖多説不足記録若準下文安住地神處衆神相謂云此人已生法王種中者斯文可定然釋不同一云此據智契法性生在佛家名生法王種中此即是已入大地菩薩也一云此據多聞熏習勝解真性成就佛種名生法王種中者此即是三賢位內種性菩薩也問若屬信攝此偈所説廣大見聞願行等當云何通答此言信者不同本業經中所説信也後長行重讚發心教求善友中四初重讚發心教求真友二善男子於此下指示後友三爾時善財下戀思辭退四向勝樂下依教趣求就前初門中三一歎能發心二已後更求行行難中之難故云信也三善男子正教求友此得法也於中二先教求後誡勸前中二種一樂成佛果故云一切智智二要求真友言真善知識者謂能令於未知善法得知於未識惡法得識名善知識也言真者略顯有四種一令識三惡苦得免令知人天樂得生此雖善知識非真也二令識生死苦可厭令知涅槃樂可欣此雖善知識非真也三令識有為有漏法可捨令知有為無漏法可欣此雖善知識亦非真也四令知生死非離染涅槃非寂靜然常遠離雜染恆修離相行令如是知者為真善友也若廣分別如別行善知識章説後誡勸中四一雖歷多所為重法故身心亡倦二雖晝夜親近為重法故愛無飽足三於所曉誨聞必奉行四逆行方便推非己境何見過也二指示後友中四一國勝樂者位勝過前可欣樂故二山妙峯者謂前心離過位高故妙峯也比丘德雲者比丘三義一乞士二破惡三怖魔今創發大心魔宮震動故其德如雲含法雨故四教宮震動故問中十一句同前故云乃至三念思辭戀中二初念聞法故喜躍後離別法音故悲淚也問文殊師利觀識善財根欲等皆見既足得為説一切佛法何乃多人令轉別問答此非無意略有五焉一為現在未來作軌範故二顯修萬行要必先求真友故三明修行不自用故四顯依善友不局一故五顯求友無選擇故問善財求法稱分行足何要博訪多事多知答菩薩為救衆生求於多聞不惜身命若不遍學遍修德海不滿何以隨應也古來諸德此辨善友處文或作三分四分五分六七八九十等今則不爾但隨文作其分數不可勒限也上來二十五種相中第一寄位修行相內第一明文殊師利寄十信竟自下第二明十信善友中第一德雲比丘寄初發心住善友於中六初依教趣求中二一依教尋覓國山釋説言經于七日者本疏云先淨七支見善友故徐出經行者伴思行故二見已往詣下明請問於中四一設敬儀二作如是下述自發心三而未知下正顯問問同前四我聞下結問請説三時德雲下正明答於中二先歎發心求法後善男子我得下明自所得法前中二初歎發心後能下歎問修行法此歎有十一句皆有求字一求行法總問也二所行分齊三行對治因四行出離因此亦是果五已淨大心六得自在用七示解脫方便八示同事業九知他心十不住行十一求為無為非一非異二明自所得法中二先明所得法體後往詣十方下明業用前中二先標體後信眼下釋相前中自在者作用無礙故決定解力者解謂勝解決定印持由此名力謂於境界決定印持轉變無得也後釋相有三一信二智三結釋謂由淨信即眼即境轉變決定無得也二由智光遍照於境無障得故自在也三結釋由此知外善觀信內明徹清淨行具故勝解力決定自在也後明業用中二初略標四業後所謂下廣明第四業前中一詣十方剎敬養佛業二常作念佛業三總持諸佛正法業四常見諸佛現在業後廣明第四業中二先總説見佛後一一方下明別見佛種種事前中二先展説東方謂始從見一佛乃至見不可説不可説佛剎微塵數佛後九準初略説可知中間云見三千世界微塵佛佛剎微塵佛者引梵本中云娜奢勃陀憩怛羅鉢羅忙奴攞闍此云十佛剎微塵數漢本脫十字也後別見佛種種事前中二先佛能應後隨衆生下明所應前中十種始從色相乃至壽命可知後所應中三一隨機樂二現成佛三説法四謙己推勝中二先謙己唯知一法即牒前念佛門後豈能下推勝於他前中云憶念諸境界者謂十方佛數量分齊佛即所觀境故智慧光明者無分別智所照故普見者盡照見故法門者總結屬故創入住位光明念佛三昧廣見佛者依佛為本故故初住中云此菩薩見佛形貌等也後推勝中三初一句總次所謂別顯後而我下一句結總中無邊智慧等者照無盡佛境故行無邊佛行故別中有二十一句各先舉得定後明業用差別初十念佛勝德圓備後十一念佛妙用自在前中一具見諸佛主伴德故云常見諸佛國土等二念佛令衆生離倒之德故云清淨三念佛是處非處等十力等之德四念佛於法無倒能説能授亦是菩薩心於法無倒故能念見佛已聞法受持五已達佛海智見諸佛剎無異六念微細境中佛見彼中佛自在用七念諸劫中佛無間見八念諸時中佛一切時親近不離九念諸剎中佛咸見殊勝身十念諸世中佛隨心普見後明妙用自在中一念佛遍諸差別境界中次第現二念佛示涅槃相三念佛於一日中從自所住處出去無間四念佛身充滿諸法界五念多佛於一毛端現悉承事六念佛一切處現成佛示自在七念佛出現放智光轉法八唯心念佛知佛隨心樂現像九隨樂念佛隨心樂知衆生業隨彼業所所集善現形十念佛神力現身坐華遍法界十一念佛實德如虗空身嚴法界空後結可知五指示後友中二先指示見人後善男子海雲下指示得法前中五一指方準前二示國海門者謂修德心海之方便故曰海門此國正當南海口故三比丘海雲者比丘義如上海雲謂此比丘內含法水深廣如海外應機説如雲降雨四勸往問法五海雲比丘下讚彼善説並易知彼指示得法中九句一令得實教助道如薩遮尼乾子經説二得成一切智因三聞説發大心因四得生實教慧見五得能修與法性相應行六能行普賢行海七得成滿普賢願八得清淨誓願方便九得生無緣大慈悲力六念恩難捨觀察辭退第一住竟第二海雲比丘治地住善友中七一念前所説二漸次下依教尋覓三作如是言下見已問法四時海雲比丘告下正答五善男子我唯知下謙己推勝六善男子從此南行下指示後友七時善財下念德瞻退初中十一句初一句總餘句別別中一智照用二無礙用方便三定方便四菩薩大衆五觀佛現前六觀佛所住七觀諸他儀準則八觀佛界廣九觀佛出現次第十觀佛入巧化上十句門者皆方便義故二依教尋覓中三初至處二向海雲所三頂禮下明問法於中三初設敬儀二作如是下述已發心三而未知下正顯問辭於中十句一捨世俗生出世二過無明入智明三離凡入聖四斷順流入逆流五破三有輪轉成就大悲願輪六滅樂雜染行離染行七竭貪愛海長大悲海八塞三惡八難開人天涅槃門九出三界城入佛智城十捨諸玩好悉益衆生四正答中三一本審發心二海雲言下歎發心難得三善男子我住此下辨其觀行初中先審問後善財言唯下答也二歎難得中三初逆難次順難後發菩提心者下別釋初逆云若不種善則不能發也次順難中十一句前十句別明末一句總結前中一云要得普門善根光明者謂修一行即一切行一一行時智明了故光明也二具真實道三昧智光者稱法性修定生智光明三生廣福四增長無漏中無間斷故云無懈怠也五重法故事友亡疲六重法故不惜所有也七普願荷載八普欲秡苦九與樂不捨濟拔十恆觀佛境末句結可知後別釋中二先總標後所謂下別顯有十一句一一句中皆有標釋初是拔苦二祐是與樂以福助護令不離樂故三滅苦四離惡法五守護不令怖畏六離諸障得七滿法界八等空界九竟遠見多佛十於三世境悉隨順知十一普照境界皆入智海三辨行中四一觀海為能詮方便二善男子我思惟時下得見法界無得依正三時此如來下領受所流無邊教法四若有衆生從十方下傳授衆生同入法界就初中二先總標後所謂下別辨總云住此十有二年者古人有云謂觀十二因緣故或古釋云住於菩薩十二住故或有釋云即此十住中之第二故云十二也常以海為所觀故云境界後別中十句一廣大教二甚深理三漸次住四多法寶嚴五積大悲水六隨機拔異七所化多類八教海所容諸佛菩薩九教海包容所詮義理十教海湛然化多滅度生界不滅不化多滅生界不增二得見法界無得依正中二先明見依果後滅時見彼下明見正果前中二初明現果後此大下明宿因前中二先明現華所因於中有四句可知後正明所現依果中二先牒作念後此海下正明所現果現果中二初辨華出處及時處謂大海中時謂正作念時忽然出後以無能勝下明嚴嚴中二先明當體嚴後百萬阿修下外中嚴前中五一莖二華三葉四臺五髻後外事嚴中有二十二種於中十一句雜嚴諸王有情執持十一句非情為嚴並可知後明宿因中十句前九句別時末一句總結德無盡前中一無漏因二諸菩薩隨喜三四如幻夢等觀行因生五淨業六無諍定因七觀無為八住自在用九觀佛深境十結後明見正果中二十句一見華上佛二蓮座三道場四諸相五隨好六神變七色相淨八無見頂相九舌相廣長十巧説十一圓音十二十力十三四無畏十四辨才十五宿因十六示成佛十七演法十八普現諸嚴十九隨見各異二十所益皆滿三領受教法中二先明伸右手摩海雲頂後為我下正顯説經前中右手摩頂者身業加持隨順攝受之相後説經中三先明經之業用二我從於彼如來下聞經受持三善男子我於佛下受持時法多少就初中二先顯經名言普眼者依此所詮成普眼故所謂照見平等一法界故後業示下顯經業用於中十句一佛境二菩薩行三攝法輪四能淨佛土五能摧邪六滅魔軍七令衆生喜八能照物心九能了物根十隨心令悟二聞經授持中二先明成就六法後假使下校量多少前中一納法在心故二各不失故三對文宣唱故四背文宣陳故五追記不忘故六思惟明審故後校量中以多筆墨書寫一品中乃至一句尚不得少分者顯其法門廣大故也三受持時法多少中二初一句總後於日日下別前中云於千二百年受持者顯一部故也後別中十句日日皆爾一一皆是無數品故知一部有十無數也一聞持總持光明故領受無數品二寂靜明故趣入三旋明故普入四隨地明故分別五威德明故普攝六蓮華明故引發七淨音明故開演八空華明故顯示九光聚明故增廣十海藏總持光明故辨折無數品四傳授衆生中二先明十類王及民衆來聽可知後如是下正明為説法於中二先顯能説有四句一樂示二解釋三稱揚四讚歎後咸令下明利物中三句一愛樂二趣入三安住五謙己推勝中二先謙己知一釋法門名如前後如諸下推勝知多中十一句前十句別明後一句總結前中一悟解行海發願修行入字是悟解義下同二悟解大願多劫住世三悟解衆生隨樂益四悟解心海生力智光五悟解物根調化六悟解嚴剎七懈悟解佛體常供八悟解法教而解悟分明九悟解福業具明十悟解物言音説法後一句結勝所知非己能斷六指示後友中六一南行如前可解二六千由旬者古德釋云修六度行故三楞伽道邊者向彼山之路次也四有一聚落者人衆所居也五名海岸者南海之北岸也六比丘名善住者身住虗空表內心住於真性故七時善財童子下念德瞻退可知第二住竟第三善住比丘修行住善友中六一依教趣求二善財童子下正明問法三時善住比丘下正明答四善男子我唯下謙己推勝中五善男子從此下指示後友六時善財下眷德辭退就初中二先念前所聞中十句一念指示教二念所示法三念佛加持四念持法句五分明悟解法海門六思法差別七悟解法界至深處八頓悟解一切法性空九治淨法執十觀法空所從來處後正明趣求中二先辨其所趣處可知後見此比丘下明見所趣人於中二先見比丘空中經行後無相諸天下明諸異類衆各申供養於中十類一天二龍三緊那四摩睺五修羅六迦樓七羅剎八夜叉九梵王十淨居天二明善財正問中二初牒前所見後作如是下起後起後中二先自述已發大心後而未知下正陳所問問中二先十一句聞佛之法後十句不捨諸法前中初十句別問後一句結前問復前中一起行二聚斂不令散失三務令具足四於善知識數數聞法五漸使益廣六括撮七令得至終八有垢治淨九審細再治十盡所滯礙後一句結前問復者通前後兩數問故後十句一一皆云不捨者於彼十法無暫離心故一見佛常勤修故二菩薩同善根三佛法明證故四大願普益生故五衆行無疲厭故六佛剎普嚴淨故七佛力見佛自在故八於有為不捨不住於有示變化身九聞法受正教故十智光悟解三世一故三正答中二先審問善財發心及能問法可知後善男子我已下正述己所得於中三初顯所成解脫二若來下明能成解脫方便三知一切下顯解脫業用前中名菩薩無礙解脫者因位所得名菩薩所作自在名無礙也方便中二初明修習後即時下彰得解脫其智慧光明即是無礙解脫之別名爾三業用中三初別明十二句無礙次徵後釋初中一知物心行二知物死生三知宿命四未來劫事五知現在事六知言音七決疑問八知諸根九隨應化時十知一切時分謂剎那等剎那等者仁王經云九百生滅為一剎那九十剎那為一念按俱舍等謂時之最少名一剎那一百二十剎那名一怛剎那六十怛剎那名一羅婆三十羅婆名一牟呼栗多三十牟呼栗多為一晝夜十一知三世流轉十二身遍往十方次徵意云何以得此於諸法中無障礙故後釋意中二先顯由此解脫是無住等通力故可知後善男子我以下轉釋於空顯通多種作用於中二先總標可知後於虗空中下別顯別顯中二十數一行等無礙二隱顯無礙三現身一多四穿度五加趺來往六入地水七身出煙焰八動地九手捫日月十高升十一現香等大雲十二於一念行過一剎乃至不可説不可説佛剎塵數剎十三於前所經剎中佛所聽法十四於彼佛所各顯無量佛剎塵數身十五彼一身各無量佛剎塵數供雲所謂下略列十種可知十六一一如來下聞受彼諸佛説十七一一國土下彼諸國所有嚴事悉憶十八結十方皆題此通十九如是一切下明上諸剎中衆生見其身者皆決定得菩提二十隨彼彼衆生示同類身化四謙己推勝中二先明謙己唯知一後如諸下推勝知多前中名普速等者謂為成就衆生行解證故速疾普供法界佛邊也推勝多知中略明二十一句前二十句別顯持菩薩戒始從大悲終至離垢皆約持心行相以為其名準釋可知末一句如是下顯非己知五指示後友中四一國名達里鼻荼者此曰銷融謂銷融謬解依教正知從聖教生名生貴住也二城名自在者既得生貴名自在也三善友名彌伽者此翻為雲謂智含法水廣利生故四汝詣下令問法六時善財童子下念德辭退修行住善友竟第四醫人彌伽生貴住善友中七一念前所聞二漸次下求友得見三時善財童子下正明問法四爾時彌伽告下正明答五善男子我唯下謙己推勝六善男子從此下指示後友七爾時善財下重友悲辭初中十句一念前法門思惟生勝解悟解分明二念佛力三寶常存三歎真實從貪所顯四念善友恩五照三際平等六憶念救生願七知有為性故八思諸性九嚴剎十不著佛衆二求友得見中二先明求覓後乃見下明得見可知三正明問中二先明述已發心後而我下正問問中十二句初二句總謂上句學下句修後別中一身雖勝轉而心不依轉二得一性三得離染心堅四拔苦無疲五明悟總持六生大智用七顯力決明深義八念力悟異異法輪九諸趣説法十智力決斷諸法義理四正明答中七一審問發心二善財言唯下答其已發三彌伽遽即下明歎發心下座禮善財華香供讚發心四善男子若有下讚發心利益五善男子應知下讚菩薩所作難等六彌伽如是讚下明彌伽放光召衆説法七彌伽於是下答自所得法就初審問者歎顯發心非率爾事儻能實發世中奇特將欲顯敬令普智聞故審問也二中直爾曉對故言唯也三敬發心中急下座禮善財散種種華香供讚四讚發心利益中二初讚成益後所謂下釋前安隱前中二十二句初一句總所餘句別應知發阿耨等十一字遍歷諸句由菩提心具三心故佛種不斷也具深直心故嚴剎也大悲心故成就衆生也直心故達法性也深直心故悟解業種相性也深心故滿諸行也三心故大願不絶直心故稱實性離貪深直心故見三世相性於諸法得勝解亦爾具三心故諸佛護持佛憶念亦爾菩薩平等亦爾具此三心為世依故賢聖護梵王禮天主供夜叉護羅剎侍龍王迎緊那讚世主稱令物普安後釋前安隱中十一句一捨四惡趣二出八難三斷人中貧窮因四生天樂因五遇善友六聞持正法七發大心八發亡相大心九見菩薩行路十於菩薩智悟解分明十一安住十地五讚菩薩難中二先標後為一切衆生恃怙下釋前中四句一所作難謂興物為依故二難出謂待機感故三難值謂非薄福能遇故四見者倍難謂見菩薩所見處故後釋中十七句一一句具前四難或分為四初七句釋前所作難次三句釋難出謂智光出過衆星燈大小光德高出衆山菩薩與二乘比德亦爾次二釋難值謂薄福未合受榮故不得見王及將若遇菩薩必成行德後五句釋見菩薩所見必聞法生信免漂度有也六彌放光中二先明放光集衆後彌伽大士下明為説法令聞者不退菩提言輪字品者本疏云日照三藏解云輪有多義略顯三釋一約字相楞伽中字輪圓滿猶象迹故二約所詮盡理周備如輪滿足三約業用所言不虗故如文可知七答己所得中二先明遽升座所以敬重法人故遽下座却禮善財令顯師資之禮還為敬法升座方説後善男子下正明得法得法中二先標法名謂妙音陀羅尼後能分別知下正釋謂能分別知名妙諸天等語言名音陀羅尼彌伽智中總持此故餘並可知五謙己推勝中二初謙己知一後如諸下推勝知多前中十四句先十三句別顯末一句結非己知別中施設者威儀也究竟者終畢也上句者勝句也上上句者勝中之勝故字輪際者輪如前釋際者即邊際字輪之極處故六指示後友中二先顯名等後汝詣勸令問法前中聚落義如前名住林者具衆德以建立故長者者年耆德艾事長於人故解脫者於自所得法門業用無礙故後勸問中四句可知七深重善友瞻戀辭退生貴善友竟第五長者解脫方便具足住友中七一念前所得法二漸次遊行下明依教趣求三既得見已下正明問四爾時解脫長者即入下正明答五善男子我唯下謙己推勝六善男子從此南剎下指示後友七時善財童子下戀德悲辭就初中四十一句分二前十一句正念先所得法後誓願下三十句自勵其心令依所教前中初一句總標前法門名字後十句別別顯中一深悟解語言二念知難知行之加行三觀離過心四成照益善根五能發心淨六磨礪攝生智七堅牢廣志樂八任持勝志樂九淨德信解十思菩薩修行心後自勵中初十句堅志護持次十句了差別境即無差別後十句了身心入境境入身心二依教趣求中十二年者古人釋云修自分勝進各六度行故城等釋名並如前顯三正明問中四一設敬儀中三初自度獲利次徵後釋釋中有標顯結標結可知顯中十句難出現者明解菩薩道者世間希出故承接者承近接納故喜悅者常順教命故餘準可知二述已發心中三初正述先發心二為欲事下明發心所為三聖者我今下明為前所為作意業等心三我聞聖者下讚能誘誨諸菩薩四唯願下正請宣説初中可知二述已三中先亦可知二發心所為中三十一句於中分四一前十三句欲窮盡佛寶境界故二為欲聞下五句欲窮盡法寶境界故三為欲與一切下五句欲窮盡僧寶行願故四為欲得下八句明欲窮盡十藏故一一並準釋可知三句為前所為中十句初一總餘九別並亦可知三讚能誘誨中二先總舉後示意道路下別顯別顯二十七句分三初三句指示修行方便要法二令除下十三句令離過患三令其速下十一句令獲利益一一準釋應知四正諸説中二先一句標後四句略請四正明答中三初明入定二爾時解脫長者從三昧下明出定三告善財下述己所得法門初中三先明定所依因緣有三一過去自善根為因二佛神力為緣三文殊念力為緣二即入下明定名名普攝一切佛剎無邊旋陀羅尼者謂攝多剎隨智而持所轉攝在能轉智中名總持也三入此三昧已下明定業用於中初明身內現佛三世間身二或於一世界處下現八相成道三善財童子悉能下明善財入彼身所顯剎中佛所聽法二明出定者定事訖故將欲説法故定無言説故三述己所得法門中三初明解脫名體二善男子我出入下明其業用三善男子當知菩薩下勸修令入初名如來無礙莊嚴者是現果德定故名如來也無礙者本疏有四義一一切如來各具無礙莊嚴故二者一一如來互遍無礙故三一切如來莊嚴悉入此長者身內故四長者徹見十方佛海今更助一釋謂此三昧力能令得者見十方佛及國土衆會出入皆無障礙故二明定業用中二初明見十方各一佛後善男子下總結見十方各十佛剎塵數佛前中初一總標出入此定時後即見下別明見十方佛及道場衆會後總結見多佛中四一總標佛數二彼諸下標見佛不待往來三我若欲下明欲見諸佛欲見即見如前不待往來略列九佛四釋見不待往來所由云知佛及自心如夢故如水影故如幻故如響故所見由心故三勸修令入中二先舉所作得法後如是下明所作之因前中十一初一句總舉後淨諸下十句別顯後明作得之因中二先一句云一切皆由心者總標後是故下別辨辨中十句初云扶助者相資故怛蕩者寬平故知證潔自者牢徹故鈍淨不雜也解易可知五謙己推勝中二先謙己知一後如諸下推勝知多中十三句初十二別顯後如是妙行下一句總結非己所知六指示後友中三先顯處次彼有下辨友後汝詣下明遣問法初中云閻浮畔者此洲南際故國名梵音此所未詳二善友海幢者智慧深廣故如海也解行高出衆歸故如幢也七時善財下戀德悲辭於友有九事一憶念依位二承事三恭敬四由得佛智五不盡逆六無諂誑七常隨順八慈母想九慈文想第五住善友竟第六比丘海幢正心住善友中九一念前長者教二漸次下依教趣求三周遍求覓下海幢入定四善財讚言下讚定業用五聖者下問定名六善財童子言下問定境界七善男子我唯下謙己推勝八善男子從此下指示後友九時善財下戀德辭退就初數中有十三句一正念彼教故二觀察三憶念四思惟五深入謂深悟解六趣向七明見八解了九分別十思惟謂再審所由十一了達十二修行十三發起並顯可知二依教趣求中至其國境邊亦此洲南際如前解古人釋云所以得般若是六度之後邊故云畔也三海幢入定中曲有五門一定名二從其足下下明定業用三海幢比丘下於身毛孔出光明網等四善財一心下思彼入定五如是住立下明其出定初中定名入滅受想故云離出入息無別思覺身安不動也一定業用者皆是定加行時發願力也於身所現有十四處一足下出長者等明修行之初以施為首二從兩膝出剎帝利等衆以愛語同事攝生三從腰出仙人者以此不信宿因乃信導餌得暫延年將之為道此既信中途外緣不信本因故從腰出仙者此顯離染欲故隨應為説梵行法也淮梵本中此是齊輪出仙也故梵經云𭒅髀曼荼羅此云齊輪也向若是腰即合云迦胝故是誤也四從脅出龍者以龍之業用多以膊脅之力今隨慣習所作相似化導故雨諸香華等五從𮌎室唎搓中出阿修羅者室唎搓相是出世中奇勝修羅能現幻術是雜類中奇勝也此顯大力降魔震搖山海等故六從背出二乘者由彼與大乘相背故也七肩出夜叉等者現大筋力者背樘肩努膊今欲現此筋力而化故從肩出也雖顯種種可畏之形多以守護衆生及諸賢聖之業八從腹出緊那乾闥王及女各隨所能奏樂為供歌讚三寶九從面門出輪王衆行十善化問女色不施此何許答此約十善但斷耶淫白衣五戒非授入道緇服者也十從目出日輪者目能照用同日光故隨其照用作諸利益謂照地獄離苦故幽暗得明故捨愚暗等故十一從眉白毫中出帝釋衆表於佛正法純信清白常以正法化自天衆或彰福力慧力乃至成顯衆生事業十二從額出梵王衆者額在身之高處故梵王居在色初禪故以色相威儀美音利世勸佛轉法輪等十三從頭出菩薩説十度法門隨所應化十四頂出佛身者顯最尊高故於中二先總明三業後為一切下別顯語業前中二初一句總標後其身下別明三業三業中初身業有三句一相好莊嚴二威光熾盛三光照十方二語業一句妙音滿法界三意業現通後別顯語業中二先一句總標後所謂下三十二句別顯末後一句總結周遍初標可知二別顯中分二前十二句為諸菩薩説法後二十句為諸衆生説法前中一普知平等法者觀等覺菩薩普知諸法一性平等速成妙覺故二入普門法者勸灌頂菩薩學佛十種智三世平等謂於智所緣皆普悟解分明故三普莊嚴法者勸法王子菩薩學知法王處善巧法王處執度等於彼境界悉遍學知為莊嚴故四堅固山法者勸童真菩薩學知佛剎乃至一剎那中供多佛等於此知見不可改易故云堅固梵行高峻喻名為山五海藏法者勸不退菩薩學十種廣大法謂於法界德相一一境界包攝色心等大小一多即在等無得無盡故海藏法復名廣大海六普境界法者勸正心菩薩學知一切法無相無體等標十以顯無盡是普境故七自性門法者勸方便具足菩薩知衆生自性無邊無量乃至知衆生無自性故八隨順世間法者了知衆生及器行果隨順説故九普悲愍法者勸修行菩薩學觀衆生及法界四大三界於中遍起悲愍十積集藏法者勸德地菩薩學誦習多聞乃至遠迷不動等此中若誦行等皆有修習生德之義故名積集藏新學即是創治心地發利益等十心也十一攝衆生法者勸初發心菩薩學勸供佛樂住生死主導世間故云攝衆生法也十二無盡境界普現前法者勸信解菩薩勝進修行十種信心觀彼境界令增勝分明故曰現前信是解資故名信解也問準此處文十住滿後即到坐道場菩薩等覺之位不爾何故不説十行等耶答此即顯法性大宗約位上下相融攝義廣如上懸談第九顯義門説後二十句為衆生説法中為色界説普門法者彼著色身為謂自勝今令普觀無色法故二普藏法者慈生梵世宿習多慈雖憐不普唯己眷屬今為説普普生廣福故三為大自在天説生力法者謂此天王智力自在一念能知大千界中雨滴數更無勝者今勸求佛智力故云生力也四為魔衆説心幢法者此他化自在天攝謂説慈心如幢降諸魔衆故名慈心為幢也五為化樂天説淨念法謂彼天自化樂受用今還隨説自念淨法故六為兜率天説生定法者謂於出世法生喜足意故七為夜摩天説歡喜法者為説應機合時之法令歡喜故八為忉利天説疾莊嚴虗空界法者謂居天以嚴空界為奇故説福智嚴法性空界故九為夜叉説歡喜法者謂夜叉羅剎多現可畏恐怖之形今為説衆生見形令歡喜法也十為乾闥婆説金剛輪法者此類事王不得自隨喜為説得自在法謂持呪者作金剛曼荼羅或凡欲作法悉得自在此亦如是故名也十一為阿修羅説大境界法者謂此類自恃身貌長大起於高慢今為説佛身相周遍法界故名大境界法也十二為迦樓羅説無邊光明法者謂此鳥但能觀一洲四大海照見諸龍知有離命今為説佛智光明照法界衆生悉知根欲性等故十三為緊那説一切世間殊勝智者此類以世歌樂為殊勝伎能今隨彼根説出世勝智十四為人王説無樂著法者世間諸王多著欲樂今隨其病説無樂著十五為龍説歡喜幢法者諸龍多患三苦逼今為説其離憂苦法故云歡喜幢十六為摩睺羅説大休息法者此類蟒身為性毒惡今隨病為説令止息惡毒故云也十七為地獄衆生説正念莊嚴法者謂彼衆生眼見苦具身為苦逼惶怖心亂無暇正念今為説法令心安正此即為莊嚴也十八為畜生説智慧藏法者因為説法令彼捨患生智故此所説法即名為藏十九為閻羅趣説無畏法者彼界常以熱鐵融銅為其所食今為説其離彼炎畏故云也二十為厄難衆生説普安慰法者謂諸厄難者若身若心晝夜憂苦今為説其身安心樂法故名也末後一句總結周遍可知三海幢身毛孔出光網中六一能現光毛孔二光網數三光色相四光莊嚴五光境界六光事業滿法界四思彼入定中十句初一總餘九別總中由見善友前定業用思見出定欲有啓問故渴仰也別中一憶前定用二思得彼定人三思定利生四思定普嚴依正勝境五思定嚴法界智六思得定佛加智七思定生無得用神力八思定加行願力九思定能增行力五明出定中二先顯立住思察所經時分後過此下正明出定前中始一日夜乃至六月六日本疏釋云是第六住故後明出定者利益事訖故四讚定業用中有四十一句前十一句標勝後所謂下二十句出因前中初一句總餘十句別別中一近而不知頂故二稱法界故三分齊難量四力用叵測五光用無變六嚴事數多七力勢不可止八所緣無二九照用普遍十益物無窮後二十句出因者通顯前十各由此因故曰甚深等一離貧苦二離地獄苦乃至能令安住一切智智境界中並文易可知於中第八有本云能令增長有為樂故者今勘梵本乃晉朝經皆云能令厭離有為樂故五問定名中二先問後海幢下答答中二先答定名後善男子下答得定所由前有三名一普眼捨得者以平等慧照法界故捨者障無不盡故得者理無不證故二名般若等者以離垢慧光照淨境故三名普嚴等者以淨善根為方便莊嚴智慧故後答得法所用中二初得三定後得此下明得眷屬三昧也六問定境界中二先問後海幢言下答答中有二十三句明於諸剎佛衆生境無所障得初一句總後了知下別別中分五初六於剎無障礙謂一了知二往詣三超過四莊嚴五修治六嚴淨二有十句明於佛境無障礙一見佛二觀佛威德三知佛自在力四證佛廣大力五入佛功德海六受佛妙法七入佛法修行八證佛轉法輪平等智九入佛道場衆會十觀十方佛法三有二句於衆生無礙一大悲攝生二大悲充滿四有一句見十方佛無厭足五有三句於衆生境無礙一入衆生海二知衆生根海三知衆生諸根差別智七謙己推勝中二先謙己知一後如諸下推勝知多前中如前釋後知多中有二十一句前十句顯彼勝者所知後而我下明非己能知前中十句成五對一智悟巧化遍法界淨二了達多剎諸趣根欲三知蘊諸法入無礙定四起無漏通善説無已五巧演地義與物為依後而我下顯非己知中有十一句初妙行者利他善巧故三所行者自所修故六入要門者悟解旋澓義處故八道分者行位故九十心境者知他心境故餘並可知八指示後友者中三一處二善友三令聞法初中海潮者善友住處近南海北岸潮所至處表不退住中二利行不失限故林名普莊嚴者依正二果皆殊勝故善友休捨者梵本正云呼舍羅此曰希望亦云意樂亦云滿願謂隨諸衆生來求法者皆遂希求滿其願故三令聞法可知九念思辭戀中二先述得益後五體下正辭前中十一句初一總舉次九正明獲益後一結益歡喜後正辭中十三句可知第六住竟第七優婆夷休捨不退住善友中七一念前善友教謙思二漸漸下依教求覓三爾時善財童子入下明見友問法四休捨告言下正答所問五善男子我唯知此下謙己推勝六善男子於此南方下指示後友七時善財童子頂禮下念思悲辭就初中二先念教詔思得見解增明故云蒙力等於中四句一蒙力二蒙教三念語四深愛樂友後作是下念因善友展轉利益於中五句一令見佛二令聞法二令益勝行四令普見真佛體五令得成佛華二依教求覓中二先明至前所指處前已具釋後衆寶下二先明外人物嚴後時休捨下明正報嚴前中二初明依報嚴後百萬天子下明有情嚴前中有八段一寶壚周繞有一句二一切寶樹下明衆寶樹嚴三其地下明地殿堂等嚴四園中復有下明宮殿地柱樓閣及宮殿十寶華座嚴五園中復有下衆寶帳嚴六有百萬大寶網下衆寶網嚴七有百萬大光下衆摩尼寶光嚴八常雨百萬嚴具下明香華纓等雜供養嚴後明有情嚴中三段一天子二采女三菩薩後明正報嚴中二先明正報受用嚴後其有見此下明業用益生前中金座珠冠寶釧寶網嚴寶璫寶纓衆敬十方欲色界天及人非人來敬後益生中十五句一除病二滅惑三拔見四摧障五悟解大用六增善根七分明悟解智方便八總持方便九定方便十大願方便十一行方便十二福方便皆現前十三心廣十四具通十五身普遍至三見友問法中二初明見友可知後往詣下正明問法中二初自述已發心後而未知下正發問辭並易了四正答中八一自述唯得一法二若有見下顯益物三善男子下明難得見四善男子下究竟益物五善男子東方下德高感佛佛恆不離六善男子我此下明同行眷屬及餘利物七善財白言下問發心久近中二先問先發心時後善財言聖者下問當成佛時前中二先問可知後益中三初略顯從燃燈佛等前十佛二善男子我憶下明過去多劫多生經三十六恆沙事養聞授修行三善男子菩薩下明發心限量難知於中十一句一充滿一切法界故謂此心無有少分色心時處等一切境界不遍故二悲心普入世間故三大願畢法界故四大慈普覆物故五一切時處中修行故六定力令道不退故七陀羅尼力住持世間故八智光力證入三世平等性故九通力普顯於一切剎網者謂凡於一剎種中有二十層於中一一剎皆三重展轉遞繞遙觀如網故十顯力一普令一切悉解故十一淨身悉遍一切佛剎故八善財言聖者下問當得成佛時中先問後答答中三初不為限齊故發心二欲教化調伏下正為作無限齊事故發心於中各有十四事相翻可知三是故善男子下但然修行無有限齊不答成佛問若爾豈竟無成答只此無成方是成佛意以無所得得菩提故五善財童子言下問答解脫名離名憂安隱幢者大心多劫盡苦無憂勤修正行心安無倦德高衆歸故名為幢也六善男子我喻下謙己推勝前中謙唯知一後如諸下推勝中十一句前十正顯勝者所知後而我下一句彰非己知七善男子於此下指示後友中三初處那羅索者此云不懈墮二善友名毗目瞿沙者具稱應曰毗沙摩烏多羅涅槃瞿沙言毗沙摩者此云無怖畏也烏多羅者上涅槃也瞿沙者出聲也謂此善友常為衆生出增上無怖畏聲三汝諸下令往問法可知八時善財童子下眷德辭退中三初正明辭儀次作是下顯善友處有十種難可知末一句正辭第七住竟第八仙人毗目瞿沙童真住善友中八一念前友教思惟作意於中十二句初二句順前修行法後十句依彼生增進心福慧等初二可知後十中一增福心二增見佛三出生佛心四增願心五見法心六照法實性心七散障心八法界無暗心九淨意寶心十摧魔心二依教求覓中二先至國後周遍下見依果可知三時善財下明見正果於中二先明領衆及服飾後明見善財見已下設禮讚友讚友中十一句初一句總標後十句別顯標中云真善知識者如前已釋釋真實道者實教大乘故夷險道者善惡道亦生死涅槃二道故大悲海潮故不失時故餘文可知四作是語已下問法中三初設禮二述已發心三而未知下正問五時毗目下時答答中四初讚發心所為二時諸化下敬養發心三住如是下顯發心當果四時毗目下正答所得法初中二先總告後此童子普施下正顯顯中十一句文易可知二敬養發心中先外物供後內身供三讚當果中二先十四句別明時後時毗目下結讚當果前中滅苦蘊者絶行蘊故破無明暗者斷無明住地惑故福德輪園者功德滿足故顯淨智日者大智圓明故開示善根法藏者示法苦樂令避龍故後結讚當果中二先通顯一切後此善男下別指善財四正答得法中二先述己所得法門名無勝幢者此住勝進應勸學知於器世間動轉觀詣遊等超過前住彼莫能逾故曰無勝又應勸學受諸佛説法顯自在用大音遍吼事養多佛由此降伏耶論異道使歸從故如帝釋幢也或此能降伏外道耶小彼莫逾此亦曰無能勝幢也二善財白下問境界中二先問後時毗目下神力加持今自證見於中五一仙人摩頂執手二令善財自見身往十方佛剎數剎見彼佛會聞佛會彼説達其文義無雜又知十種化衆生法三爾時善財下明為十種法門照得十種三昧可知四時彼仙人放下善財自見在本處五仙人問善財下問答定中所見六仙人言下謙己推勝推勝中二十一句初十句明彼勝者所能得後十一句顯己不能知初一句總舉餘十句別顯七善男子於此下指示後友於中三初處次人後令往問法處中聚落名伊沙那者此曰長直謂此處里巷徑迂延永也人中名勝熱者處五熱身中不為所因非只安然無患亦乃成於勝行故令問中可知八時善財下念德辭退第八住竟第九婆羅門勝熱法王子住中十二數初明得前解脫力用二念善下依教趣求三時善財童子下正問四婆羅門言下授自所行五時善財下生疑念六作是下諸梵天等勸七爾時善財聞如是下生悔過心八爾時善財下依前教命登山入火九善男子我唯下謙己推勝十善男子於此下指示後友十一汝詣彼下令往問法十二時善財下戀德辭退初中二先一句明得前解脫力用後三十句明彼解脫光照任持力用於中分三初六句明所得一得佛神力二菩薩法門通智三菩薩定慧用四時定慧用五知境依想定慧用六得了俗慧用二次十二句依前所得用而起一現身二説法三照境四聞法忍受五了法性六能修行七求佛智不退八得十力用九求法無厭十修行悟佛境十一誓嚴十二願淨三後十二句明知剎度生成行於中初三句標三章後九句各別顯於中初六句以無窮智知世界境界了菩薩行後三句以無性心度生了菩薩行二依教趣求中二先明至處後顯見人登刀山入火聚三時善財下述自發心問菩薩道四婆羅門言下令善財依婆羅門登刀山入火五時善財下生疑念於中二先總後別別中二十一句分三初十二句惜身難得不得可輒捨次此將非下三句正明可疑之狀後而欲下六句顯作留難行相六梵天等勸中有十三衆悉述己為勝熟隨應説法獲其利益一梵天衆二魔衆三自在天衆四化樂天衆五兜率天衆六三十三天衆七龍王衆八夜叉王衆九乾闥婆王衆十阿修羅王衆十一迦樓羅王衆十二緊那羅王衆十三欲界諸天衆就初衆中四一勸不生疑二今此下讚彼德用十句一得定光二發勤勇三度生無倦四斷渴愛海五截見網六燒惑薪七照惑林八斷盡死怖九壞世障十放法光皆言欲作三善男子下自述耶見四見婆羅門下蒙化除疑二魔衆中三一散寶供養二告善財下讚彼德用三我與下顯彼化力三自在天衆中三一散華供養二作如是下讚彼德用三即與下顯彼化力令得八種自在者取作由己皆遂志故初心者慈悲等故受生者出入住胎明了故業障者速能離故嚴具者能示現故長短者延促任意故佛法者明了文義故餘並可知四化樂天王衆中三一天樂供養二作如是下讚彼德用三即與下十三句明聞法獲益五兜率天王衆中三初雨香供養次作如是下述彼德用後共詣下聞法得益六三十三天王衆中四一雨天華供二作如是下述彼德用三共詣下聞法樂菩提四又善男下述怖發心七龍王衆中二初雨香華奏天樂為供二作如是下讚彼德用有十句一光照處所二離沙怖二離鳥怖三滅患四身涼五心無垢六聞法解七厭其趣八悔障九發大心十住果智八夜叉王衆中三初雨諸供供及善財二作如是下讚彼德用於中三一身及眷屬并羅剎鳩槃等生慈心二不害物三不樂自宮三即與不聞法發心九乾闥婆王衆中二初讚婆羅門德用於中二先光照住處後受多快樂後是故下明聞法發心不退十阿修羅王衆中三初明禮敬二作如是下讚彼德用震動宮海地令捨憍逸三是故下聞法利益十一迦樓羅王衆中三初明勇力持王化形在空二嗢如是下讚彼德用放光照宮震動恐怖三是故下聞法利益十二緊那王衆中三初讚彼德用於中三一明諸聲出處謂宮中諸樹等二善男子下明比校數多三善男子下聞法利益十三欲界諸天王衆中二初明妙供養供次唱如是下讚彼德用於中三一光照地獄二我等下見光生信三從彼下還生彼天後為知下明聞法利益七生悔過中三初明善財聞上十三衆所説以勸曉歡喜二唱如是下請恕疑心三時婆羅門下顯無疑獲益八依前教命中三初登山入火二未至下得益益中二先明暫始到火時得善住定者善能安住焚惑性故後得靜樂通定者得離喧適悅定起無得用故三善財下讚其定緣逆順翻顯故曰甚奇九謙己推勝中謙己唯名菩薩無盡輪解脫者謂以精進誓願如風輪轉住諸行不令退轉故推勝有三初總云大功德焰者即福之慧能燒我見故次必不下六句別顯後而我下一句結自所不知十指示後友中師子奮迅者如上具顯童女名慈行者善知衆生受生等十種行故起慈饒益行故十一汝詣彼下令問法可知十二時善財下戀德辭退第九住竟第十童女慈行灌頂住善友中八初念前善友恩生極尊重意中有二十四句此即總句後皆別顯於中一廣淨解二念我三求智四願見佛五觀法六無礙智常現七決了法實際八常住際九剎那際十如空際十一無二際十二無分別際十三義無障際十四劫無壞際十五佛無際際十六於佛心無別十七破想網十八離執十九不取佛衆會二十不取淨國二十一知生無我二十二知聲如響二十三知色如影二依教趣求中二初至彼城推覓二善財入已下見彼依果可知三其慈行童女下明見正報聞法可知四時慈行下正答答中二一令善財觀其宮殿於中二先總顯後周遍下別顯別中二先明能現壁等諸事初有十一句後走見下明所現一切佛從發心至佛果事二爾時善財下明善財意問童女懸領以言答答中三先答法門名二答本得法處三答得法時入方便名般若普莊嚴者慧心如空福德成滿故五善財白言下問境界中二先問後童女答言下正顯顯中二初總答謂入此門思惟等時得普門總持故後所謂下別明明中有一百二十句總持分為十段一初八理事總持二福德下十門明願行持三業不下十門明業持四三昧下六門明定用持五心海下五門明知他心持六知衆生下十二門明知所化持七大悲下十五門明能起化持八世界下十七門明知世界持九見諸佛下二十五門明佛海自在持十菩提心下十二門明知菩提心因果行願智淨等總持六謙己推勝中謙己可知推有十五句明推勝者能知末句結已不知七指示後友中三處人可知令問法可知八仰德辭奉可知第十住竟
