body:
  text: 京兆靜法寺沙門慧苑述刊定記者苑以薄祐和上遽遷生所製茲略疏經纔四分之一始自妙嚴品訖乎第二十行并能造十定疏前之九定而懸談與中間及十定後疏並未修葺其已撰者不遑剪刻今故鳩集廣略之文會撮舊新之說再勘梵本讎校異同順宗和教存之以折衷簡言通意牋之以筆削云爾將釋此經略開十門一教起所因二藏部所攝三顯教差別四簡所被機五能詮教體六所詮宗趣七顯義分齊八部類傳譯九具釋題目十依文正釋初中有二先總辨名意後正顯教起言總辨名意者觀夫大像無形赴感則形而無極大音無說應器則說而無窮蓋知形不自形感赴而形矣說無自說器應而說焉無形而形彌十方而不廣赴無極而不疲無說而說互九世而不延應無窮而不倦大方廣佛華嚴經者實可謂不思議之祕藏難測量之教海文言浩汗該眾典以為源理趣淵玄會殊途而同致其為體也則不生不滅非有非無用不滅為無生以不生為無滅事包萬類理極一如理無事而不融事無理而不液故觸類成教即教亡言混真俗於雙際跨空有於中道筌蹄絕寄教網踰張魚兔無依義山彌峻其為德也同異類之殊體則微細容持同異類之別軀則展轉重現微細之境難信曉之以芥瓶重現之相易疑喻之以帝網其為用也則不分而遍不去而臻一多大小而互為延促靜亂而相攝多劫入於一念非卷非舒微塵納於世界無增無減於是剎該淨穢娑婆震而華藏動主融報化瞻盧舍以見牟尼括三際之二七日乃闡揚之時分總五位之一多身為輔翼之圓滿即此即彼之體用不起而昇四天互隱互顯之主伴不謀而應十剎現能仁之海印七處昭彰開所化之蓮華九會彪炳若乃具金剛種雖八難而聞經闕智眼因對十身而莫覩善財詢友表隨順以南行妙德從機顯濫觴於東廟然則大以體性包含方廣業用周遍佛謂兩悟圓極華喻萬行披敷嚴則通能通所經則為貫為攝故云大方廣佛華嚴經世主妙嚴品第一者世謂世間則眾生之別稱主謂君主則諸王之異名妙即法門深妙嚴是威德莊嚴品乃品類第謂次第一是創名為數之首斯經有三十九品此品建初故稱第一故曰大方廣佛華嚴經世主妙嚴品第一按梵本此品具名薩婆嚕鷄印拏上倈良追驃訶柰耶鉢攞叵婆娜忙鉢里勿多此云名一切世主莊嚴法門威德品釋曰此品雖亦說同生眾莊嚴法門顯佛威德然以異生有三十九眾同生唯一從多為稱又此品亦但顯世主功德利益等相威德之言為顯佛者功德施般若論云一切經首列眾者示現如來大威德故後正辨教起所因中三一宿因故二現緣故三所為故初中二種一願力故此復二種一化主願二助化願故普賢三昧品云十方諸佛告普賢菩薩言以毗盧遮那如來本願力故亦以汝修一切諸佛行願力故所謂能轉一切法輪故十住品云十方諸佛告法慧菩薩言又是毗盧遮那如來往昔願力乃至云令汝說法十行十向十地品等皆同此說現相品頌云毗盧遮那佛願力周法界一切國土中恒轉無上輪又云十方中所有諸大世界海佛神通願力處處轉法輪又云如來大威力普賢所成願一切國土中妙音無不至二善根力故亦有二種一說法菩薩自善根力二同會菩薩眾善根力此中善根除願智以外一切善根十住品云爾時十方諸佛告法慧菩薩言及汝所修諸善根力令汝入是三昧而演說法十行品十方諸佛告功德林菩薩言及諸菩薩眾善根力令汝入是三昧而演說法迴向品云十方諸佛告金剛幢菩薩言諸菩薩善根增勝故令汝入是三昧而演說法第二現緣事有四一智慧故二加持故三勸請故四三昧故初智慧者迴向品云爾時十方諸佛告金剛幢菩薩言及由汝智慧清淨故乃至云令汝入是三昧而演說法十地品爾時十方諸佛告金剛藏菩薩言亦是汝勝智力故欲令汝為一切菩薩說不思議諸佛法光明故二加持者有二種一他方佛加持二當會佛加持故普賢三昧品云十方諸佛告普賢菩薩言佛子此是十方諸佛共加持汝乃至云所謂能轉一切佛法輪故十住品云爾時諸佛告法慧菩薩言十方各千佛剎塵數諸佛悉以神力共加於汝又是毗盧舍那如來威神之力乃至云令汝說法十行十向十地等品皆同此說又上下文中明諸菩薩對佛說法讚頌等皆云承佛神力者是其類也三勸請者如現相品中諸菩薩等念請普賢三昧品中諸菩薩偈請名號品中諸菩薩念請賢首品中文殊勸說十住十行十向等品皆是十方諸佛勸說十地品中三家勸請乃至入法界品等其中勸請如文應知恐繁不具四三昧者於九會中但諸菩薩將欲說法先承佛力入定方說者皆即是其教起緣也第三所為中廣有無量略標十種一機感故此中機感有二種一者現在機感二者未來機感故初發心功德品云是時十方萬佛剎塵數同名法慧佛讚法慧菩薩言汝今能說此法汝說此法時有萬佛剎塵數菩薩發菩提心我等今者悉授彼記於當來世過不可說無邊劫同一劫中而得作佛皆號清淨心所住世界各各差別我等諸佛護持此法令未來世一切菩薩未曾聞者皆悉得聞出現品云是時十方各八十不可說百千億那由他佛剎塵數同名普賢佛讚普賢菩薩言善哉佛子乃能說此法今此會中十方佛剎塵數菩薩得一切菩薩神通三昧我等皆與授記一生當得阿耨菩提復有佛剎塵數眾生發阿耨菩提心我等亦與授記當來不可說佛剎塵劫皆得成佛同號殊勝境界我等為令未來諸菩薩聞此經故皆共護持離世間品云十方諸佛告普賢菩薩言我等諸佛悉共同心護持此經令現在未來諸菩薩眾未曾聞者皆當得聞賢首品云賢首菩薩說此偈已惡道休息釋曰此惡道眾生與法宿緣應得法力感茲教起又如天上諸會中天女等皆是現在應教之機令此教起又三世十方所有佛教無非機感所以者何離機之外佛無說故問機感既通現未何故不入現緣中攝答只為通現未不唯現在緣故不入也問向引發心等品皆云諸佛為未來菩薩護持此經者自餘眾生豈絕無分答若兼正通為則遍該四類如下被機中說今就正為唯說菩薩二為顯行位故此有二種一者行布行位如三賢十地等說二者圓融相攝行位如普賢行品等說然上二門互無障㝵所以者何行布是教相施設圓融是理性德用相即性之相故行布不㝵圓融性即相之性故圓融不㝵行布故世親菩薩以六相門圓融十句也三為顯果德故此亦二種一依果謂華藏世界海二正果謂十佛身通三世間如初會中四十三眾內除座中眾餘眾所讚佛德及第二會中佛光名號德第六會中十地果分德第七會中相海隨好不思議法等德出現品中十種現世間德第八會中二千句內末後一百九十句化用德故度世經二千答內分為六段其第六段中有五百一十句前三百二十句明因圓後一百九十句明果滿也第九會中佛入三昧放眉間光現法界身雲令眾覩見自在之德也四為顯佛田生福勝故出現品云於如來所見聞親近所種善根皆悉不虗何以故此小善根不與有為諸行煩惱而共住故譬如丈夫食小金剛又如小火能燒如須彌山大乾草𧂐又如善現大藥王樹見聞覺知皆獲利益無空過等廣如下說五為顯於法獲勝益故此有二種一於佛現在聞法得益如前機感中說二於佛遺教時聞法得益此通十法行攝論第七云書寫供養轉施聽聞披讀受持開示諷誦思惟修習餘論中初名信樂最後名修行中間大同勝天王第七初書寫末後修行中間亦略賢首品云趣大乘者猶為易能信此法倍更難況能誦持為人說如法修行真實解乃至云十剎塵數眾生所悉施樂具經一劫彼之福德未為勝信此法者為殊勝十剎塵數如來所悉皆承事盡一劫若於此品能誦持其福最勝過於彼出現品云一切二乘不聞此經何況受持讀誦書寫解說唯諸菩薩乃能如是是故菩薩摩訶薩聞此法門應大歡喜以尊重心恭敬頂受何以故菩薩摩訶薩信樂此經疾得阿耨菩提故設有菩薩無量百千億那由他劫行六波羅蜜修集種種菩提法若未聞此如來不思議大威德法門或時聞已不信不解不順不入不得名為真實菩薩以不能生如來家故若聞此經信解隨順悟入當知此人生如來家乃至云深入如來無㝵境界又云菩薩聞此法已則能以平等智知無量法乃至云恒以一法觀一切法成就如是功德故少作功力得無師智自然智廣如彼說又頌云若聞此經生欣慶彼曾供養無量佛為佛加持所攝受人天讚歎常供養六為顯具分唯識理故夜摩天宮偈讚品覺林菩薩云譬如工畫師分布諸彩色虗妄取異色大種無差別乃至云若人欲了知三世一切佛應觀法界性一切唯心造如是十頌皆明唯識廣說應知十地品云菩薩復作是念三界所有唯一心作世親釋論云唯一心作者一切三界唯心轉故云何差別隨順觀世諦即入第一義諦上下文中所明唯識皆此門攝七為顯廣大菩提心故此中三種謂體相德初即大悲願力智故下文七十八云菩提心燈大悲為油大願為炷光照一法界釋曰光即慧也二相者即前三法所有行相皆無限量如初發心功德品云不但以一切樂具供養十方十阿僧祇世界眾生經百千那由他劫及令修五戒十善教住四禪四無量四無色定教得四果辟支佛故發阿耨菩提心乃至云不齊限但供養爾所佛故發菩提心為令如來種性不斷故為了知十方世界故為悉知一切世界成壞故為盡知一切世界所有眾生種種解故種種根故種種方便故種種心故種種業故種種煩惱故為供養盡法界虗空界不可說不可說十方無量去來現在所有諸佛故發阿耨菩提心又如七十八中顯菩提心二利行相利益安樂離過自分勝進等具說如彼三德者謂功德如賢首品云若有菩薩初發心誓求當證佛菩提彼之功德無邊際不可稱量無與等如是等三百餘頌顯菩提心德又初發心功德品中十重校量一一皆云比初發心菩薩百分不及一千分不及一百千分不及一乃至百千億分百千那由他分數分歌羅分笇分喻分優婆尼沙陀分亦不及一又七十八中二百二十一問歎菩提心於中或讚體具勝德或形劣顯勝或福或慧生善滅惡制伏邪魔上攝佛果廣說如彼又上下文中但明菩提心處皆此門攝八為顯諸法無性理故須彌頂上偈讚品云了知一切法無性無所有如是解法性則見盧舍那又云諸法無真實妄取真實相是故諸凡夫輪迴生死獄又云現在非緣合去來亦復然一切法無相是則佛真實體若能如是觀諸法甚深義則見一切佛法身真實相夜摩天宮偈讚品云一切法無來是故無有生以生無有故滅亦不可得一切法無生亦復無有滅若能如是解斯人見如來以法無生故無性無所有如是分別知此人達深義又云云何說諸蘊諸蘊有何性蘊性不可滅是故說無生分別此諸蘊其性本空寂空故不可滅此是無生義眾生既如是諸佛亦復然佛及諸佛法自性無所有如是等文遍九會中處處皆有不可繁引九為顯理事無㝵法界故夜摩天宮偈讚品云如金與金色其性無差別法非法亦然體性無有異又第四迴向云菩薩解了世間皆如變化明達眾生唯是一法無有二性不捨業境善巧方便於有為界示無為法而不滅壞有為之相於無為界示有為法而不分別無為之相第四八迴向云譬如真如真實為性善根迴向亦復如是了一切法真實為性譬如真如以一切法無性為性善根迴向亦復如是了一切法無性為性譬如真如無相為相善根迴向亦復如是了一切法無相為相譬如真如興一切法同其體性善根迴向亦復如是與三世佛同一體性如此等文九會經中處處皆有不能具述十為顯事事無㝵法界故此中略有十種謂主伴隱顯微細重重等廣如下卷第九顯義中說上來諸門言為顯者謂聖意為顯此等令世知見故起斯教又有十種教起所因如發心品云悉以佛神力故乃至第十為了法界無有二故說如是法廣說如彼起所因門竟第二藏部所攝中二先釋藏部後辨所攝前中藏謂三藏二藏部即十二部經於中先釋三藏即分為三初修多羅藏者或云素怛此中有二先解通名後釋別目初通名三藏者世親攝論第一莊嚴論第四皆作是問彼三及二云何名藏答由攝故謂攝一切所應知義十地論中兩義解釋或通三義兩義者一堅實二出生三者於出生中開出包含義如孕在藏有二義故故彼第一云藏即名堅其猶樹藏又如懷孕在藏是諸善根一切餘善根中其力最上猶如金剛亦能生成人天道行今此三藏其義亦然能詮所詮不可壞故由此能壞難壞惑故二於能詮中蘊積所詮諸義理故三由能所詮成深無善因果故三是數即帶數釋也二別釋中三一辨名二釋相三異名初中修多羅者此云契經契謂契理契機經即貫穿攝化此或契理合機之經或契即經又契經即藏古來相傳多同此釋今詳諸論及以梵言良恐不爾所以者何此中通辨有三失故一敵對翻名失二譯義為名失三總別不分失初失者古德解云脩多羅者此翻為線此方不貴線稱癈線名經者按五印度中呼線席經井索聖教皆曰修多羅古人不知修多羅音含於眾目乃執線為正翻而經非敵對但此國聖典既號為經佛演修多羅寧應異召敵對而譯正合稱經二以義為名失者翻譯之家自有規准若名梵漢共有則敵對而翻如其彼有此無或即令留梵語或復借義充名凡是此方所無翻為漢稱者皆其類爾其譯脩多羅為契經者便是半義半名非純借也若契經兩字皆是名者如何梵本不云欲底脩多羅耶欲底具翻總有三義一契二順古所行三依正道理行今取契義有膚受云欲底但是道理之言者謬矣攝大乘論佛地論等皆云由能貫攝故名為經不言貫攝即是經目蓋知經有貫攝業用義當契合貫穿即為契理攝持即是合機由此譯家依筆削之理取呼召之便借義助名稱契經爾此即綴增一雜心文者作古於前譯華嚴涅槃經等者取則於後遞相祖習不復研覈隨遠法師雖亦蹖駮未竭其源今依敵對但可稱經故智度第二呼脩多羅藏以為經藏此經之一字尚非六釋所收況通持業依主若帶藏教之名容有持業應知諸論所釋契字自解經之契義非釋契是經名若不爾者而雜心五義既亦經之義用何不譯作經名謂涌泉經等又如質多名心集起為義詎翻集起亦作名耶一切名義當知皆爾問名依義立名豈異義答義定名不定隨方名字種種差別義則不然三總別不分失者但藏部立名各有兩重總別一謂三藏十二部為總名脩多羅等為別稱二謂修多羅為總號毗奈耶應頌等為別目古來相傳唯辨前門不論其後隨遠法師雖說脩多羅總別略三初順涅槃二無聖教亦乖正理三違雜集云雜集修多羅者謂長行綴葺略說所應說義釋曰此略說所應說義即是長行綴葺曾無先略標後舉廣釋之相當知略者總之異名謂脩多一分是總餘十一分是別故今謂脩多依藏部中總相業用而立其名餘藏部名依藏部中別相業用所以者何脩多羅業能貫攝故餘藏餘部所詮所化由此有貫攝彼方成故涅槃十五云始從如是我聞終至歡喜奉行一切皆名修多羅故又仁王二諦品中名修多羅為法本故故知是總若不爾者餘藏餘部或不皆能合機契理或應各各皆名修多無所餘稱由非總別相依持故所餘之名別相立者毗奈耶藏依調伏業用阿毗達磨依智對業用本事本生方廣記莂希法等五依所詮業用因緣自說依起教業用應誦諷誦依教相業用譬喻論議依善巧業用別是能依必帶於總故應頌等亦帶經稱總是能持不依於別是故不帶應頌等稱問若修多是總餘是別者何故涅槃第十四云從牛出乳從乳出酪酪出生蘇出生蘇出熟蘇熟蘇出醍醐佛亦如是從佛出於十二部經從十二部經出修多羅從修多羅出方等經從方等經出大般涅槃大般涅槃猶如醍醐醍醐者譬於佛性佛性者即是如來答此文正顯修多是總然有兩釋一云言從佛出十二部者此即本質十二部教從十二部出修多羅者此即影像十二分教修多是總但舉修多也從修多羅出方等者方等是別依於總故從方等經出涅槃者依方等教顯所詮故一云兩文互舉顯總別相從之理非總無以成別故十二皆名修多非別無以顯總故從十二出修多言從十二部者通相說也二言釋相者諸論配屬貫攝不同或具二義各別配屬或以貫攝通配二用或雖具二無別分配故佛地論第一云能貫能攝故名為經以佛聖教貫穿攝持所應說義所化生故又世親攝論云素怛纜有四義謂能貫穿依故相故法故義故依者謂於是處由此為此而有所說相者謂世俗諦相勝義諦相法者謂蘊界處緣起諦食靜慮無量無色解脫勝處遍處菩提分無㝵解無諍等義者謂隨密意說又瑜伽二十五顯揚二十皆云素怛纜者謂佛世尊於彼方所為彼有情依彼所化諸行差別演說無量蘊相應語乃至廣廣說結集法者攝取聖語為法久住以美妙言次第結集貫穿縫綴能引義利能引梵行真善妙義是名素怛纜三異名有三一仁王經中名為法本按隨遠法師釋有五義一教為理本二經為論本三總為別本謂十二部中初是總修多羅如涅槃云始從如是我聞終至歡喜奉行一切皆名修多羅故即於前總中開分十一餘不收者還復攝在修多羅中名之為別四初為後本謂即前別修多羅望於祇夜重頌及譬喻論議等是其本故五略為廣本謂十二部中初略標舉一切通名修多羅後廣解釋說為十二如言色者即是根本略修多羅後云青黃等是其廣修多羅今解不然應如前敘兩重總別中後總別義總為別本名法本也若依隨遠前五義釋名法本者則餘十一部應非理所依應非論所釋應非契理機十一既無不契理機故無脩多羅十一不攝應唯脩多有重頌祇夜亦應頌脩多除諷重外餘九皆應無重頌除論喻外餘九皆應無論喻彼等既並有應皆名法本分教既爾藏亦應然略為廣本亦遍一切凡是藏教皆有標釋若爾一切悉是法本何獨脩多理既不然遠釋非也二依成實論名直說語言斯即尊者訶梨䟦摩約佛語總相而言名為直說一一語言多義分別名非直說三依智度第二明三藏中此名經藏斯即正是敵對翻名廣如前說二毗奈耶藏中三一辨名二釋相三異名初辨名者翻毗奈耶義名調伏若敵對譯正稱為律然調練三業伏即制伏過非調是行體伏是行用調即是伏持業釋也然行體用俱藏所詮此則調伏之藏依主釋也或能詮藏有此調伏行之業用有財釋也相者世親攝論云毗奈耶有四義謂犯罪故等起故還淨故出離故犯罪者謂五眾罪等起者謂無知故放逸故煩惱盛故不尊敬故而犯諸罪還淨者謂由意樂不由治罸如受律儀出離者有七種一各各相對說悔所犯二誓受治罸謂受學等三若有妨害先制學處後由異門還復開許四別處止息謂眾僧和合還捨所制五轉依謂苾蒭苾蒭尼轉男女形故捨不共罪六由真實觀謂作殊勝法殟駄南諸行相觀七由法爾得謂由見諦法爾得無小隨小罪明了論釋無小隨小自有兩說一云小謂第二篇罪隨小謂二種方便罪一云小謂性罪隨小謂諸戒中制罪言已見諦者於彼諸罪法爾得出離故問今明大乘三藏何故此中依聲聞教顯毗奈耶相答理實三藏大小不同然今且就引接教說古來同此三異名有六一曰波羅提木叉此云別解脫然有二種一約因名別解脫自有二義一簡異定道俱起名之為別二以三業十支各各防非離過故名為別前依簡持後約離過若無簡持定道亦應名別解脫皆具別別離過義故或應無此離過解脫二據果名隨順解脫謂方便淨涅槃離障所顯戒能順彼故立此名相續解脫經注云五分法身名解脫梵云毗木叉涅槃解脫梵云木叉遠法師云涅槃是無為解脫五分法師是有為解脫今解不然離過無障名為木叉業用無㝵名毗木叉經注五分法身者意取解脫解脫知見非是令取五分也以於境自在名解脫故審決解脫之事名解脫知見故二曰尸羅義取翅恒羅翅恒羅此云清涼此亦二義離熱惱因故得清涼果故三曰優婆羅叉此西域外道律名亦名為縵四曰剌闍你地地音田夷反此西域王法律名也五曰守信謂如本言期無違犯故六曰性善此於三性唯善攝故三阿毗達磨藏中三初辨名二釋相三異名初者阿毗達磨義名對法若依敵對而譯或應名傳如公羊等但此非勝故不用爾然阿毗言對達磨稱法舊云阿毗曇譯為無比詮慧勝故今按諸家更有三釋一云對是所對謂即涅槃法是藏法由此藏法能令脩行向涅槃故此即對之法故依主釋也二云對是智用法是智體故真諦三藏翻有二義一趣向至得對謂無流慧根趣向涅槃故二如實相知對謂無流慧根緣諦理故釋曰此但於一無流智體隨用分二緣果緣理有差別故問如何辨藏乃釋智耶答此有二義一依所詮智二依造論者智故瑜伽八十一云論議者謂諸經典循環研覈摩怛理迦乃至云諸聖弟子已見諦跡依自所證無倒分別諸法體性此亦名為阿毗達磨釋曰即准此文三賢菩薩七方便人所造解釋非對法攝三云依藏對藏解釋為名故順正理云契經名法論能決了名為對法此即法之對故依主釋也二釋相者世親攝論云阿毗達磨有四義謂對故數故伏故通故謂阿毗達磨名為對法此法對向無住涅槃能說諸諦菩提分解脫門等亦名數法於一一法數數宣說訓釋言詞自共相等無量差別故亦名伏法由此具足論處所等能伏他論故亦名通法此能通釋素怛纜義故三異名中三一名優波提舍此云論議二名摩怛理迦此云本母謂藏是解本能生解故稱之為母本即是母持業釋也三名摩夷此云行母謂依藏生解依解成行從本為名稱日行母生行之母依主釋也三藏竟第二二藏者一菩薩藏二聲聞藏然此二藏體不異三約所為異分之為二故莊嚴論第四云此三藏由上下乘差別故復說為聲聞及菩薩藏攝大乘云如是三藏上乘下乘有差別故則成二藏一聲聞藏二菩薩藏言菩薩者佛地論中三師別釋故彼第二云菩薩摩訶薩者謂諸薩埵求菩提故此通三乘為簡取大故復說此摩訶薩言又緣菩提薩埵為境故名菩薩具足自利利他大願求大菩提利有情故又薩埵者勇猛義謂能勇猛求大菩提故名菩薩初後依主中一有財後或有財言聲聞者成實云聞法得悟曰聲聞佛地論故云聞佛言音而入聖道故曰聲聞瑜伽八十二云從他聽聞正法言音又能令他聞正法聲故曰聲聞法華第二云以佛道聲令一切聞故名聲聞此上諸釋或依他聲而自聞或依自聲令他聞皆依主釋然此二藏若據所詮菩薩聲聞理行果等以名其藏皆有財釋若依菩薩聲聞以立藏名皆依主釋二藏竟問攝論莊嚴論皆云由上下乘差別故於三藏分為二藏何故普超普曜闍王大悲等經及入大乘論皆說三乘為三藏耶答前據二乘理果同故聲聞教行多故緣覺多分不籍教故依藏合乘也後約二乘教行異故依乘開藏也雖各有據而前具三義後唯一義多義勝故今就勝說廣如瑜伽二十五三十八八十一八十五雜集十一顯揚第六等說第三十二部經者亦曰十二分教於中二初總後別總者十二是數部類經即是教總言十二等帶數釋也然其部名濫於部𧙍經稱涉於卷軸不爾如言若干卷經應云若干卷教為止謬解新名分教爾別中有三一列名二釋名三辨相初列者涅槃十五曰知法者菩薩知十二部經所謂脩多羅祇夜受記伽他優陀那尼陀那阿波陀那伊帝目多伽闍陀伽毗佛略阿浮陀達摩優波提舍受記梵云和伽羅那解深密第三云何菩薩依是四種奢摩他乃至云能善毗鉢舍那佛言如我為諸菩薩所說法假立所謂契經應頌記別諷誦自說因緣譬喻本事本生方廣希法論議二釋名者初辨契經廣如前釋應頌者應即相應謂與長行相應之頌或為後來應更頌故依主釋也記別者玉篇云記錄也說文云別解也謂錄彼果示令解知錄是教體令解為用記即是別持業釋也有云差別之記識名記別者本事本生豈非差別記識耶諷誦者說文云諷誦也諷即誦故持業釋也自說者通依主有財謂依自說故自有所說故因緣者因即是緣譬喻者阿波陀那譬即是喻本事本生者猶因也謂因時之事因時之生有財也方廣者謂業用廣大猶如虗空充滿十方如涅槃說此方即廣有云正方也正理廣陳故名方廣希法者謂希奇之法論議者謂循環研覈論即是議若此十二各帶分教二字之名皆持業釋謂脩多分即教故乃至一切三辨差別相者十二分教各有二義初契經二者一總相二略相故雜集十一云契經者謂長行綴葺略說所應說義釋曰長行簡伽他等教略說簡對法等藏餘如前說此論且據一相而說理實如前總別分別後引雜集皆是此卷二應頌者一為長行未說故雜集云不了義經應更頌釋故名應頌二為後來者故涅槃十五云佛告比丘我昔與汝愚無智慧乃至云如佛昔日為諸比丘說契經竟爾時復有利根眾生為聽法故後至佛所即便問人如來向者為說何事佛時知已即因本經以偈頌曰我昔與汝等不見四真諦乃至更不受諸有下所引文皆同此卷三記別者一記弟子生死因果故雜集云記別者謂聖弟子等謝生過去記別得失生處差別二記菩薩當成佛事涅槃云如有經律中佛為諸大人受佛記別汝阿逸多未來有王名曰蠰佉當於是時而得成佛號曰彌勒是名受記經四諷誦者一為易誦持故二為樂偈頌說者故涅槃經云除脩多羅乃至云諸惡莫作諸善奉行自淨其意是諸佛教是名伽陀今依別相業用為名故云除脩多羅餘教分有此言亦同此會五自說者一為令知諸法故十地論云何故不請而說若不自說眾則不知為說不說又復不知欲說何法二為令所化生殷重故念佛慈悲為不請友故涅槃云如佛晡時入於禪定乃至云明旦從禪定起無有人問以他心智即自說法乃至云是名優陀那六因緣者一因請方說表重法故如雜集云緣起者因請而說故二因事方說知本末故涅槃云如舍衛國有一丈夫羅網捕鳥乃至世尊知其本末而說偈言莫以小罪以為無殃乃至云是名尼陀那雜集云又有因緣制立學處者此與涅槃因事說同七譬喻者一為深智說似令解真故如法華云諸有智者以譬喻得解是也二為淺識就彼所類誘令信故如對擔人說二蘊等雜集通說為令本義得明了故八本事者一說佛往事故二說聖弟子往事故瑜伽中但明初相雜集唯說後義涅槃通二種故瑜伽八十一云本事者說佛前際諸所有事除說所生之事雜集云本事者所謂宣說聖弟子等前世相應事涅槃云我所說者名曰界經乃至云是名伊帝曰多伽釋曰界者因義性義種子義本因之言通佛及弟子故九本生者一說昔所行故二說昔受身故雜集顯揚但辨初相涅槃經中唯顯後義瑜伽通二說顯揚第六云本生者謂於是中宣說世尊過去彼彼方所若死若生行於菩薩難行之行涅槃經云如佛世尊本為菩薩作鹿罷獐兔金翅鳥等所可受身是名闍陀伽瑜伽八十一云本生者所謂宣說諸菩薩相應事十方廣者一義廣大故涅槃云所謂大乘方廣經典其廣大猶如虗空是名毗佛略二業用周遍故雜集開為五義故彼云方廣者謂菩薩藏相應言說亦名廣破以能廣破一切障故亦名無比無有諸法能比類故一切有情利益安樂所依處故宣說廣大甚深義故十一希法者一德業殊異故二法體希奇故顯揚第六云謂於是處宣說諸佛及聖弟子所有共不共德及諸最勝殊特驚異甚深之法名為希法即准此文佛及菩薩現無㝵自在神通及不可思議解脫法門世及二乘皆未曾有雜集云宣說聲聞諸大菩薩及如來等最極希有甚奇特法名為希法涅槃云菩薩初生即行七步乃至云初生入天廟時令彼天像起迎禮敬名未曾有釋曰雜集且依通相而說若分別言希相全殊十二論議者一佛自宣說二諸菩薩等互相論難故瑜伽八十一云論議者謂諸經典循環研覈摩怛理迦謂於是處世尊自廣分別乃至云摩怛理迦亦名阿毗達磨此經問明品等諸菩薩更相問難即論議經也辨相竟第二辨所攝者此經於三藏中正唯脩多羅攝兼通餘二謂十藏品中說戒藏故第二地中明戒品故淨行賢首十住梵行十行等中皆有其文不可繁引由此故通毗奈耶攝又此經或佛自說隨好品等或加持說十地品莫不皆悉循環研覈甚深了義由此亦是對法所攝此經於二藏中唯菩薩藏十二分教一切皆攝所以者何文中具有十二分故初有契經者如涅槃說始從如是我聞乃至歡喜奉行如是一切名脩多羅故二有應頌者上下文中多有此分不可具引三有記別者如說十住品初發心功德品出現品等十方佛為聞法者授記是也廣如前說四有諷誦者如賢首品及三天偈讚品等五者自說者如十忍住處等品六有因緣者除前自說所餘皆是七有譬喻者上下文中多有此分不可繁述八有本事九有本生者如毗盧舍那品中說大威光生處及其逢事諸佛獲利益事并入法界品中諸善知識說自在往世本生事等是也十有方廣者此經名義令分正攝十一有希法者上下文中說無㝵法界體德用等自在之相非權小凡等所有境界故希有也十二有論議者上下經文若佛自說若加持菩薩說所有脩環研覈甚深了義皆論議攝辨攝竟問若此大乘具十二分涅槃等說當云何通故涅槃第三云護大乘者受持九部法華第一云我此九部法隨順眾生說瑜伽二十五三十八八十五地持十一皆云聲聞藏中無方廣故答彼諸經論各依別義且約一相故作是說理實大小皆通十二故深蜜第三說菩薩依十二分教修奢摩他毗鉢舍那瑜伽二十一云佛為聲聞一一具演十二分教而涅槃說九部大者由依三部小乘相故一據因緣中因犯制戒不據因請因事二依譬喻中誘引義不依顯深廣義三約論議中非了義說不約了義說具顯如前法華經說九部小者由依三部大乘相故一依記別中記作佛義不依弟子死生記故二據自說中不請友義不據為重法義三約方廣中廣大利樂義不約正法廣陳義瑜伽地持同此會釋各有所據不相違也問若藏部中脩多唯總而非別者餘中豈不各有餘部謂一切分中各有一切廣如諸經不可繁引然其應頌與諷誦本事與本生及本事本生與記別互望並無而自說因緣容得互有如涅槃經說因緣相無人請故答脩多羅是總名義俱令餘但義通故並別攝門諸分別具顯如章上來第二藏部攝竟第三立教差別中三一敘異說二辨順違三顯正義就初門中略敘一十九家勒為六門第一立一音教門自有兩家一後魏菩提留支云如來一代說法不離一音故如來一音同時報萬大小並陳是故聖教雖多差別不離一音也二東秦羅什三藏云佛一圓音平等無二無思普應機聞自殊非謂言音本陳大小故維摩云佛以一音演說法眾生各各隨所解故第二立二種教門自有四家一者齊朝武丘山隱士劉虬立漸頓二教謂云如來一代所說無出漸頓華嚴經等是其頓教餘名為漸漸約五時以顯其相一佛初成道為提謂等說五戒十善人天教門二佛成道已十二年中說三乘差別教門如為聲聞說四諦教等三佛成道後三十年中說般若空相教門四佛成道已四十年後於八年中說法華經明破三皈一教門五佛臨涅槃一日一夜說大涅槃明佛性常住教門如是約時次第說故名之為漸二隋朝誕法師等亦立漸頓二教與前稍異謂若約直往頓悟機大不由小所說唯是菩薩乘教則名為頓若約漸悟機大由小起所設具有三乘之教則名為漸三西秦曇牟讖三藏立半滿二教謂依涅槃經喻顯大小乘教如半滿字隋遠法師亦同此立四唐初南印法師亦立二教一屈曲教謂釋迦經遂機性說隨計破著故如涅槃經等二平道教謂盧舍那經遂法性說故如華嚴經又此二教略有四異一主異謂釋迦化身與舍那十身異故二處異謂娑婆界中木樹草座與華藏界中寶樹寶座異故三眾異謂地前菩薩二乘凡夫等雜眾與唯十地菩薩眾異故四說異謂局處之說與通方之說異故廣顯差別如彼華嚴疏第三立三種教亦有四家一後魏光統律師立漸頓圓三種教謂初為根未熟者先說無常後方說常先為說空後說不空如是漸次故名為漸二為根已熟者於一法門具足演說一切佛法常與無常空不空等更無由漸故名為頓三為於上達分階佛境者說於如來無㝵解脫究竟果德圓極祕密自在法門故名為圓其門人遵統亦同此立二玄奘三藏依解深密經立三時法輪教初為發趣聲聞乘者於波羅奈國施鹿林中創開生死涅槃因果此即第一四諦法輪次為發趣菩薩乘者鷲峯山等十六會說諸般若此即第二無相法輪後為發趣一切乘者蓮華藏等淨穢土中說深密等此即第三了義法輪此如測法師解深密記第一中敘三真諦三藏依金光明經立轉照持三法輪教謂佛二月八日成道四月八日於波羅奈鹿野苑中為聲聞眾轉四諦法輪後於成道第七年中在舍衛國去祇園五里智慧江邊為諸菩薩及二乘眾說般若等經此時具二謂轉照法輪又於成道三十年後未涅槃前在毗舍離國鬼王法堂為真常菩薩說解節經此時具有轉照持等三種法輪也四唐吉藏法師立三法輪教一根本法輪教即華嚴經佛初成道說故二枝末法輪教謂佛成道已五十七日後於波羅奈林轉四諦法輪故三攝末皈本法輪教謂法華經如來成道四十年後說會三歸一理故第四立四種教門於中自有五家一齊朝大衍法師立四宗教一因緣宗謂薩婆多二假名宗謂經部教三不真宗謂般若教四真宗謂法界真理佛性等教二陳朝智顗禪師立四教云一三藏教此教明因緣生滅四諦理正教小乘傍教菩薩乃至云此之三藏的囑小乘故名三藏教法華云貪著小乘三藏學者故二通教通同也三乘同稟故此教明因緣即空無生四真諦理是摩訶衍初門正教菩薩傍教二乘故大品云欲學聲聞者當學般若等云云三別教別是不共之名不共二乘人說故此教正明因緣假名無實四真諦理的化菩薩不涉二乘聲聞在座如聾如啞乃至云非如方等大品二乘共聞而教菩薩兼欲簡非圓教名為別不名不共四圓教以不偏為義此教明不思議因緣二諦中道理事具足不別為最上利根人說故華嚴云顯現自在力為說圓滿經無量諸眾生悉受菩提記乃至廣說具如顗師別行四教中辨三梁朝光宅寺雲法師立四乘教彼依法華譬喻品說以臨門三車為權教三乘四衢等授大車為實教大乘權實合論故立為四故云若不爾者諸子出宅各應得車無宜更索謂羊鹿是權可使出門不得牛車是實如何齊素又若四衢等授即是三中牛者且二子先自無心得大是不期而會求牛正當無志何說非本所望又若不爾者經不應言初以三車引誘諸子然後但與大車如來亦爾初說三乘引導眾生然後但以大乘而度脫之又不應言於一佛乘分別說三又不應言彼佛出時雖非惡世以本願故說三乘法解云惡世本願方說三乘不爾諸佛唯說其一明知三中之大非實教大也具釋如彼法華疏中四隋朝笈多三藏亦立四教云一四諦教謂四阿含等諸小乘經二無相教謂諸部般若三法相教謂楞伽經等四觀行教謂華嚴經五唐新羅國元曉法師亦立四教一三乘別教如四諦教緣起經等二三乘通教如般若深密經等三一乘分教如梵網經等四一乘滿教如華嚴經等然三乘共學名三乘教不明法空名別相教通說法空是為通教不共二乘名一乘教於中未顯普法名隨分教復明普法名圓滿教具顯如彼華嚴疏中第五立五種教門自有三家一齊朝護身法師立三宗教一因緣宗二假名宗三不真宗此上三教同衍師說四真宗教謂涅槃經說佛性常住等故五法界宗教謂華嚴經說法界法門故二唐初波頗三藏亦立五教一四諦教謂小乘經二無相教謂般若經三觀行教謂華嚴經此上三教同笈多說四安樂教謂涅槃經說常樂故五守護教謂大集經說守護正法事故三有古德亦立五教一小乘教二初教三終教四頓教五圓教此五大都影響天台唯加頓教令別爾然以天台呼小乘為三藏教其名謬濫故直目為小乘教通教但被初根故改為初教別教被於熟機故改名終教圓教之名仍其舊也所立頓名不據根機入法非漸故引思益經云得諸法正性者不從一地至於一地又引楞伽云初地即八地無所有何次又云呵教勸離毀相泯心生心即妄不生即佛亦無佛無不佛無生無不生如淨名哩住顯不二等是其頓也其相同此第六立六種教門唯有一家謂耆闍法師云教有六種一因緣宗教二假名宗教此上二教同衍師說三不真宗教謂諸大乘通說諸法如幻化理故四真宗教謂說諸法真空理故五常宗教謂說真理恒沙功德常恒等義故六圓宗教謂法界自在緣起無㝵德用圓備故第二辨違順者前之所敘一十九家雖各有憑教理成立中間非無名義可不故此略明順違之相也初一音教中兩師俱依本質教說若唯識教分本影則非唯一音影像多故隨聞者識聚集異故若依無㝵法界則說聽圓融令互相攝一多無㝵也第二二教門內初劉虬立漸頓中云初時但說人天教者此判若唯對一類機理則無爽若用五時刻定全斷便乖提謂密迹等經彼經皆云第二七日說三乘故若十二年中說三差別則深密應非說三差別真諦記中佛成道後三十八年說解節經故若十二年後三十年前說般若空教者龍樹菩薩釋大品經則不應云諸比丘眾聞說般若各脫三衣施佛不犯缺衣者由是十二年前未制廣戒故又與真諦引教相違記中說佛成道七年後即說般若經故又云說般若時未說破三皈一教者何故大品云舍利弗問須菩提言若都不退空復不異何故得有三乘差別不唯一乘須菩提言無二無三若聞不怖能得菩提據此已說何言未耶若三十年後說破三皈一教者深乖前引大品所說若臨涅槃時唯說佛性常位了義者遺教應非臨涅槃說此上且約隨說乖妨大都此人未識佛法謂不知如來本質色聲聞同時異應一切時處但與諸機作增上緣非目前後說大小法故不識佛也又不知影像教但結集家隨機見聞故前後大小之相故不識法也由不知判教多失諸有同者準此應知二誕法師等漸頓教者教既有憑義復無失故出現品云若即說深法眾生恐怖是故如來漸降法雨如摩那斯若頓說大乘法如大莊嚴又法華云若但讚佛乘眾生沒在苦是故以方便分別說三乘等廣說應知文既至義教復極成無過故也三曇牟讖三藏立半滿教者文義令依涅槃所說既亦教義至極無所違也四江南印法師等立平道屈曲二種教者義寬斷狹多所違犯何者謂云釋迦說經皆是遂機隨計破著舍那說經皆遂法性自在而說若爾者涅槃法華維摩楞伽密嚴勝鬘佛藏經等皆釋迦說應不明於如來藏性實相法界等華嚴梵網既舍那說何故華嚴於四諦普賢行等品皆云隨諸眾生所應調伏作如是說又問明淨行梵行三賢十地離世間入法界等諸品之中不應皆說對治行法梵網應唯遂法性說不隨雜類畜生等器方便而說亦不應說化身佛禮報身佛請問法等四異中眾處兩異皆違經說七處並是娑婆界故出現品云十方諸佛讚普賢言能說此法今此會中有佛剎塵數眾生發菩提心故發心功德品中亦同此說准此故知有地前器是此師所立多違教理甚難依也第三三種教門內四說之中初光統立漸頓圓者若漸根生熟俱漸頓根生熟但頓漸頓可分既云未熟名漸已熟名頓此則於一漸根生熟為異無頓義也或應彼一有漸頓二根生必至熟熟必從生故或應一切皆是漸根無有不從生至熟故又圓機既是分階佛境則地前無有堪聞此經此經此釋便有自教相違出現品云今此會中有佛剎塵數眾生發阿耨菩提心故又發心功德品及離世間品皆云我等諸佛悉共同心護持此經令現在未來諸菩薩眾未曾聞者皆當得聞故釋曰此未曾得聞之輩應是地上既爾必唯被上達分階佛境者耶二玄奘三藏三時法輪祇可唯是漸教唯論三性一法唯為一機不可以為定量剖判一切佛法測法師解深密記宗趣中敘清辨護法兩家判教云問諸部般若宗明無相此經了義淺深何別清辨解云深密等經明有所得淺而非深諸部般若顯無所得為最甚深護法判云二時所說無相之理理無淺深而說深密為了義者約三性義決判諸經有無道理顯了說故名為了義非無相中有淺深故名為了義又成唯識記第八卷中會釋云清辨菩薩說解深密為不了者有所得故諸部般若名為了義無所得故而彼經中說深密等為了義者以對機根說三性義易可了知勸令受覺於一時間說為了義非約盡理名為了教釋曰准此所敘故知深密不能定斷一切佛法若不爾者則眾生界中無頓機故又使佛無圓音應故又不能斷佛性常住法界解脫具分真性如來藏等無量法門約時尅教難極成也若謂三時約義淺深不據時節者深密不應說初昔今故彼第二云世尊初於一時在波羅痆斯國仙人墮處施鹿林中唯為發趣聲聞乘者以四諦相轉正法輪乃至云世尊在昔第二時中唯為發趣脩大乘者以隱密相轉正法輪乃至云世尊於今第三時中普為發趣一切乘者以顯了相轉正法輪又前敘異說中引深密記辨三法輪時處前後歷然差別如何拒諱也三真諦三藏三時法輪尅定年月斷教淺深會同前說四吉藏法師三法輪中若初時唯是根本法輪無技末者何故此經入法界品云譬如餓鬼至恒河邊而不見水設有見者見其枯竭此喻聲聞在根本教法界會中雖不見聞佛菩薩境然能見聞自分境界又此所立亦違密跡提謂等經彼經皆云第二七日說三乘故若四十年後總是會末皈本教者佛臨涅槃不應更說遺教誡經又此所判為漸為頓若為漸根則不應說先大後小若為頓根則不應有以後會前漸次之相又按無量義經佛一切時說大說小機一切時有大有小各別自聞各別獲益是故約時尅教皆不可也第四立四種教門內五說之中初衍法師四教第一名因緣者此名寬濫何教之內不說因緣經部標為假名宗者仁王大品皆立三假豈唯經部又不真之與假名難表差別也二智顗禪師四教初名三藏教者按立此名本依智度謂對迦陀延尼子弟子而言三藏中如是如是說非謂一切也故彼論一部文中通名小宗或云聲聞法或云二乘法或云小乘法或云三藏法當知小乘之名隨自宗語三藏之稱隨他宗言非共名也而顗禪之徒不曉此意務存詭異誤製教名自成四失一濫涉大乘失謂若小有三藏則名三藏教大既有三藏何不名三藏二大無三藏失謂小乘有三藏獨名為三藏大不名三藏大應無三藏三特違至教失謂法華云不得親近小乘三藏學者既以小乘為能別之言明知三藏不唯屬小諸大乘經皆無偏目小乘為三藏者闍王下卷及入大乘論皆破小乘不許立三藏也四有不定失謂智度十一龍樹自云如提達呵多等亦以三藏聲聞法摩訶衍法教人而身入地獄是事云何等又經量部唯立經律二藏經詮慧處是對法故大眾部師說有四藏三藏之外更立雜藏通詮三學故犢子部師亦立四藏於三藏外立呪藏故成實論宗立有五藏於三藏外更立雜藏及菩薩藏准上諸部立藏多少數既不定何得都名小乘為三藏教故今與作不定過云為如一切有部立三藏故小乘定名為三藏耶為如經量部等不立三藏小乘不定名三藏耶有喻云云又若此教傍教菩薩則應一切菩薩皆因小起總無頓機無簡言故二以三乘同稟名為通教此明因緣即空無生四真諦理者小宗之中亦說聲聞辟支菩薩同稟小教亦應名通教耶又佛說般若時二乘在會為聞生空為聞二空若唯生空則與菩薩異何名同稟若言聞之雖異以同會故名同稟者則諸教皆爾何直般若一音異應豈不然乎亦不可說聞二空教獲二乘果行果雜亂故又別圓兩教豈亦不說因緣即空無生四直諦理三別教以不共二乘人的化菩薩二乘在座如聾如啞此教明因緣假名者圓教應共二乘人說非的化菩薩又別圓二教所相因緣應不即空應執一切為實有也四圓教明不思議因緣二諦中道理事具足不別為上利根人說者華嚴為是別教為是圓耶若別非圓則應說因緣假名不說不可思議因緣二諦中道所說理事應別不具不為上利根人說若圓非別二乘在會應不如聾若亦圓亦別有前相違或無四教也三光宅雲法師四乘教者一三之名備陳眾典權實之說尤著法華能詮則憑於實教所詮則當乎了義權實合論總目為四依乘立教理極成也四笈多三藏四教四諦之名大乘亦有無相之理楞伽不無楞伽雖有法相宗豈存乎相也四諦無相皆是觀門何獨華嚴唯明觀行僧祇壽量住處等品說何觀耶若謂宗明則諸經甚眾矣五曉法師立四教中云唯明生空名三乘別教者此但是小乘教何用三名若言是三中小與大別故名別者有大乘經為異小乘唯說法空彼亦應名三乘別教又云具顯二空名三乘通教者一乘亦應名為通教分滿教中具二空故一三雖殊空無異故又不共二乘名一乘者法華維摩涅槃等經應非一乘彼經會中有聲聞故第五立五種教三說內初護身法師五宗教中初之三教會釋如前衍師所說四五兩教但是部別之宗非通宗之教二波頗三藏五中初二同前笈多所會餘之三教亦但一部之宗爾三古德五教中立頓既引思益云得諸法正性者等及楞伽云無所有何次等又云呵教勸離毀相泯心乃至云如淨名嘿等者當知此並亡詮顯理何復將此立為能詮若此是教更詮何理若言以教離言故與理不別者終圓二教豈不離言若許離言總應名頓何有五教若謂雖說離言不㝵言說者終圓二教亦應名頓以皆離言不㝵言故又此頓望誕及光統所立之頓便有兩重以彼漸頓機中皆有勸脩離言者故蓋知此所立頓但是餘教所詮法性非能詮教也第六耆闍法師六宗教中初二同前衍師所會第三第四只是一義謂不真如幻約喻顯空真空理性就法說空法望於喻豈二門也第五恒沙功德與第六無㝵德用此之二宗相望稍別亦無過也第三顯正義中二初以理成立後問答分別前中古來立教各據不同或依言音或約時機或就別宗或據乘立此之多類具述如前今依所詮法性以顯能詮差別謂有全隱全顯分隱分顯以立四教故寶性論第四云有四種眾生不識如來如生盲人一者凡夫二者聲聞三者辟支佛四初心菩薩今之所存依此而立初迷真異執教當彼凡夫二真一分半教當彼聲聞及辟支佛三真一分滿教當彼初心菩薩四真具分滿教當彼識如來藏之根器准法華譬喻品內三品大乘當此第三教法彼四衢等授一乘當此第四教大寶積經無盡慧所問會中及寶性論第四皆云初心菩薩教者當此第三教智度論三十七云共教者互當此第三教又云不共者當此第四教解深密第二云世尊在昔第二時中唯為發趣脩大乘者又云世尊於今第三時中普為發趣一切乘者等此二時教既俱大乘有了不了當知二中有權有實性各隨宗諍了不了大乘權實終自有憑寶性等云初心教者約根勝劣名其初終非據修行初終時位不爾凡夫於茲絕分初迷真異執教者謂世及出世情非情類莫不皆依真性建立而諸凡夫福慧微薄於正法中不中不得真實於虗妄法橫起推求謬執異因將為正道無利勤苦不免輪迴由先業力堅執不捨此等皆由迷真所致故密嚴經第二云諸仁者意在身中如風速轉業風吹動遍在諸根七識同時如浪而起外道所計勝性微塵自在時等悉是清淨阿賴耶識由先業力乃愛為因成就世間若干品類妄計之人執為作者此識體相微細難知未見真實心迷不了此經宗意以生滅與不生滅和合成阿賴耶識故以阿賴耶名名如來藏也就此教中有二先敘西域後述此方前中西方外道色類總有九十五種其中執有異因傳習文教者有十一論師計立二十五諦謂從自性三德變成大等二十三法真我於中但能受用而非作者此計自性為萬物因是常是涅槃因二勝論師計立六句義謂實德業大有同異和合於實句中真我能為作者互能受用故此真我是萬物因是常是涅槃因三塗灰外道計三界中有所一切大地命非命物皆是摩醯首羅天之所生故此天是實是常是周遍能生萬物是涅槃因四圍陀論師計圍陀此云明也彼計那羅延天能生四姓煞生祭祀梵天得生彼天是即涅槃故那羅延是一切物因是常是涅槃因五時散外道計一切萬時生滅是故時即是常是萬物因是涅槃因六方論師計方生世人天地後滅還入於方是故方即是常是萬物因是涅槃因七安荼論師計世間最初唯有大水時有大荼安出生如雞卵金色後為兩段上為天下為地中生一梵天能作一切有命無命故此梵天是萬物因是常是涅槃因八無因論師計一切萬物無因無緣自然生自然滅故此自然是萬物因是常是涅槃因九口力論師計虗空為物因從空生風風生火火生水水生凍堅作地地生五五穀生命命歿後還歸虗空是故虗空為萬物因是常是涅槃因十宿作論師計一切眾生受苦樂報皆隨往日本業因緣是故若持戒精進受身心苦能壞本業本業既盡滅眾苦盡滅即得涅槃是故宿作為一切因廣破此計如涅槃經第四十說十一路伽耶論師計色心等法皆是極微所作是故極微為萬物因是常是涅槃因此上諸計若廣分別具如瑜伽第六顯楊第九第十婆沙第十一第十二金七十論等敘西域竟第二述此方者除偽書之外說天地萬物本所從生莫出於易老莊也此三家大意略同而文稍異初依孔丘述易為萬物之始生於萬物故易繫云易有大極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業又曰一陰一陽之謂道陰陽不測之謂神二依李聃計自然為萬物因則萬物無非自然故道經云道可道非常道名可名非常名無名天地始有名萬物母德經云道生一一生二二生三三生萬物又曰人法地地法天天法道道法自然此計道即自然或道次於自然三莊周計道為萬物因則道無不在故莊子內篇太宗師云夫道有情有信無為無形可傳而不可受可得而不可見自本自古以固存神鬼神帝生天生地釋曰此上三家所計物生自虗萬無而響像學人摸塔釋教即謂如藏隨緣是彼無生萬有若此者豈唯不識如來之藏抑亦未辨虗無之宗何則如寧有生生萬物耶如寧先無有後方生有耶如寧有所在而無不在耶有無在有非即離故如寧展轉生諸法耶空即薀故如寧可傳有可得耶離名言故無所得故若謂無傳傳無得得者愛之與見何不爾耶道豈同如體相用耶相即相在耶主伴隱顯耶純雜微細耶重重無盡耶同時具足耶既於如藏未能巨細許別建立染淨同如隨緣深可悲愍與夫執礫為寶謂蠹知文其何爽矣一切外道不說因緣無性有空空有有不即不不離摸搭之人持由迷此若諦心不可為說慮其竊真飾偽故也第二真一分半教者謂於真如隨緣不變二分義中唯說生空所顯之理雖一切有部及多聞部說三無為分別論者立四無為大眾一說說出世雞胤等部說九無為化地部說真如等九而擇滅等皆是凝然生空所顯仍有數量以其根劣未堪聞說二空所顯無分限真故智度三十一云小乘弟子鈍根故為說眾生空起信論云法我見者依二乘根鈍如來但為說人無我涅槃第五云以諸聲聞無有力是故如來為說半字九部經典而不為說毗伽羅論方等大乘釋曰當此教機雖不同前別執異道然由未聞真具分義故依六識三毒建立染淨根本所依故阿含云貪恚愚癡是世間根本乃至云以此三毒為因緣故起於三業三業因緣起於三界是故有一切法又云眾生癡所覆為後起三行乃至云是謂為生死諸法之根本此據染根本說具如中觀第四引又二十部中分別說部立一切凡夫聖眾生皆以空為本所以凡聖眾生皆從出如佛性論第一卷說經部師計以現在色心等為染淨因然有三說一根本經部計六識及色不相應并心法受熏持種二末經部計識類受熏持種三復有末計雙熏事類具如順正理第八卷說上座部計色心前後各各自類前為後因因果義成如成唯識第三中說又計微細意識為染淨因撿犢子部計補特伽羅為染淨因故宗輪云犢子部說諸法若離補特伽羅無說前世轉至後世依補特伽羅可說有轉移故薩婆多計雜染清淨依未來藏得建立撿又說隨眠為雜染依故俱舍十九云隨眠諸有本此差別有六謂貪瞋亦慢無明見及疑廣說如彼經量部計異生位中亦有聖法執有勝義補特伽羅如宗輪說釋曰此教雖有多部異計莫不皆迷真具分義故別建立染淨之因問此教若於真如隨緣不變義中唯說生空所顯之理名真一分半者智度論說當云何通三十二云問聲聞法中何故不說如是法性實際而摩訶衍法中處處說耶答聲聞法中有說處但少爾如雜阿含中說有一比丘問佛十二因緣為是佛作為是餘人作佛告比丘我不作十二因緣亦非餘人作有故是事有等答雖有此說由四義故但為真一分半一者諸大乘經多分說彼二乘智劣佛不為說法空理故二者彼小教中多分不說法無我故三者智度所引但是少分說彼無故四者彼雖說名而不釋義隱密相故如攝大乘亦引彼說阿賴耶名欣喜愛樂豈即由此都名滿分故今所立依多分說第二教竟第三真一分滿教者謂於真如隨緣不變二分義中具說不變生法二空所顯真性當此教機雖不同前執法有體而二空所顯還是凝然故成唯識第九云真如者真謂真實顯非虗妄如謂如常表無變易謂此真如於一切位常如具住故曰真如即是湛然不虗妄義釋曰由此真如但是不變無隨緣故故依生滅八識建立生死根本及涅槃因故無性攝論第一引阿毗達磨大乘經頌云無始時來界一切法等依由此有諸趣及涅槃證得無性釋云此引阿笈摩證阿賴耶名所知依無始時者初際無故界者因也即種子也是誰因種謂一切法此唯雜染非是清淨故後當言多聞熏習所依非阿賴耶所攝彼一切法等所依者能住持義是所依義非因性義所依能依性各異故若不爾者界聲已了無假依言護法論師釋前頌文與無性異故成唯識第三云頌中初半顯第八識為因緣用後半頌顯為流轉還滅作依持用界是因義即種子識無始時來展轉相續親生諸法故名為因依是緣義即執持識無始時來與一切法等為依止故名為緣謂能執持諸法種子故與現行法為所依故釋曰此教既說依生滅識成世出世是故四智心品為相所遷說佛三身具常無常以有為智證無為理義說不異而實非一真俗二諦迢然別故依他起性似有不無非即無性真空圓成釋經空義但約所執同時四相滅表後無非斷非常果生因滅根本後得緣境斷惑決定不同義說雙觀而實別照既說有為不即無為故亦不說流即無流佛果說有有為無流眾生識中建立本有無流種子理行二性根本既異是故五性畢竟差別說眾生界有佛化境各殊如是義類廣有眾多皆由真性唯凝然故准釋可知第四真具分滿教中有二門一理事無礙門二事事無㝵門初中聖教說真如隨緣作一切法不失自體諸法即真不㝵生滅所以者何由無自性理諸法得成由諸法成方顯無性理為顯此義諸聖教中總有三說一依理成事二會事歸理三理事互成且說初者如寶性論第四云無始時來性作諸法依止依此有諸道及證涅槃果堅慧論師釋云性者謂如來藏性如聖者勝鬘經說依如來藏故有生死依如來藏故有涅槃起信論意亦同此說密嚴第三云世間諸眾生染淨等諸法皆依於藏識為因而得生佛說如來藏以為阿賴耶惡慧不能知藏即賴耶識此經問明品中顯一心生種種果意亦同也二會事歸理者法華方便品云是法住法位世間相常住又云諸佛兩足尊知法常無性仁王觀空品云若有脩習聽說無聽無說如虗空法同法性聽同一切法皆如也維摩菩薩品云一切眾生皆如也一切法亦如也又觀眾生品云言說文字皆解脫相此經十忍品云譬如谷響從緣所起而與法性無有相違涅槃第八云若言無明因緣諸行凡夫聞已生二法想智者了達其性無二無二之性即是實性乃至云若言一切法無我如來祕藏亦無有我凡夫謂二智者了達其性無二無二之性即是實性第八迴向云譬如真如以一切法無性為性無相為相涅槃四十云無相者謂一切法無自相無他相無自他相乃至云如是等相隨所滅處名真實相名為法界名第一義諦名第一義空三理事互成者此經第四迴向中云於有為界示無為法而不滅壞有為之相於無為界示有為法而不分別無為之相第七迴向云法性不違相法相不違性法生不違性法性不違生離世間品云於有為無為不生二想佛所攝持密嚴第三云如來清淨藏世間阿賴耶如金與指環展轉無差別維摩弟子品云諸法畢竟不生不滅是無常義乃至廣說大品三十九云諸法平等所謂無相須菩提白佛言是法平等為是有為為是無為佛言非有為法非無為法何以故離有為法無為法不可得離無為法有為法不可得須菩提是有為無為二法不合不散釋曰由上教理顯有為無為非一非異故不同前教說生滅智證無生滅理不說如外智證智外如緣境斷惑不二而二說能所斷二而不二說為內證照惑本無即是智體照體無自即是證如若依此釋無能所斷證方為真斷證始本無二之智應用無邊說無盡智非唯二四等如是智體非相能遷非為無為三界唯心依第一義非唯生滅識理行二性不二而二故凡有心悉有佛性但有流心會自本性成無漏智非無漏外有別有漏心能得無漏法無此失故不別立有為無漏無因緣種是故乘破三殊姓無五異依他無性即是圓成更無二執三性一觀不待別脩同時四相滅非後無因果即空即有非斷非常如是義類廣有眾多不可繁文應准思擇二事事無㝵門者謂此事彼事或由法性力所致或由神通等轉變是故互望於同類異類中有相即相在等相作相入等然此總依三相以顯一體事二德相三業用初體事者謂色心時處身方教義行位等此通二種一純淨無漏謂佛菩提從無生智證淨法界所起依正此即德相所依體事也二通染無染此即業用所依體事也二德相者謂相即相在等由佛菩提無染依止莫不皆以真如為體真如既具過恒沙德真所起事德量亦然是故此事德相一同真性無㝵自在三業用者謂佛菩提證得淨法界故成就通明三昧解脫而能於彼染淨體事示現自在相作相入等上來略顯事事無㝵若廣分別明行相證成如下第七顯義中說第二問答分別者如別行三教對辨中說上來真具分滿教了上來總辨第三大段立教差別門竟第四教所被機中二初明正為後辨兼為前中即是具分教機於三乘中唯是實教大乘菩薩故出現品云此法門如來不為餘眾生說唯為趣向大乘菩薩說唯為乘不思議乘菩薩說釋曰此簡持名也簡中二種一者二乘二是漸悟俱非正為故云唯為趣向大乘菩薩也持者乘是運載之義謂無分別智所有脩行及所成位等一切諸法不同行布乘教彼中行但一多行但多上位但上下位但下理在事外事在理外今此不爾一即多而不壞一多即一而不失多上即下而不壞上下即上而不失下事即理而非理理即事而非事恒是不是不是而是理事鎔融互無障㝵如斯運載乘謂一不可以一思議以即多故乃至理不可以理思議由即事故是故名此為不思議此亦可是簡非名爾又此簡彼二乘小故名為大非彼下乘所能測故名不思議雖有兩釋前說為勝也後兼為中三一引為二轉為三遠為初是真一分滿教機也於三乘中權教大乘菩薩五種姓內菩薩種姓及不定性中一分菩薩由此根性未可正為但應且依權教脩習從此引入實教中故出現品云設有菩薩於無量百千億那由他劫行六波羅蜜修習種種菩提分法若未聞此如來不思議大威德法門或時聞已不信不解不順不入不得名為真實菩薩釋曰理實菩薩經爾所時脩六度等無有不聞此經不信不解今假設言設爾所時依彼權教脩六度等而未聞此實教大乘或聞不信此尚不名真實菩薩況聞權教少時脩行而得名為真實菩薩問若權教菩薩畢竟還須入實教者權教所說十他佛他豈虗設耶答權教所設因果行相非實非虗非虗者為接引故長養根器故無實十地佛地故非是實也亦如小教說佛菩薩因行果證彼說非實非不實也是故實證實果唯在實教以此教中說如來藏具分義故因果行相稱法性故一即一切一切即一乃至廣說故出現品云此法名演說如來根本實性不思議究竟法又云此經珍寶不入一切餘眾生手唯除如來法王真子生如來家種如來相諸善根者乃至廣說二轉為者謂即真一分半教機也於三乘五姓中隨其所應今依此經但應轉為不可直被故出現品云如藥樹王唯除三處不能為作生長利益所謂地獄深坑及水輪中然亦於彼初無厭捨如來知慧大藥王樹亦復如是唯除三處不能為作生長利益所謂二乘墮無為坑及壞善根非器眾生溺大邪見貪愛之水然亦於彼曾無厭捨釋曰無厭捨言非畢竟無生長利益菩提涅槃故然諸二乘以根鈍故不能直入實教之中要先迴至權教大乘捨二乘名得菩薩稱然後方入真具分教有釋此經亦直被小現相品說彼獲益故第九會列聲聞眾故者今按此釋乃為謗經所以者何出現品說一切二乘不聞此經何況受持書寫等故而現相品說二乘獲益非在此會聞此法故第九會中正為簡彼非此所被故列彼眾顯如聾盲問此經既不被於二乘何名具分答若被二乘何名具分思之可見三遠為者謂即迷真異執無聞非法亦即是前壞於善根溺見水等於五姓中畢竟無有般涅槃法諸有情也今依此經但得遠為非可正被故出現品云如來智慧無處不至何以故無一眾生而不具有如來智慧但以妄想顛倒執著而不證得若離妄想一切智自然智無㝵智則得現前譬如有大經卷量等大千書寫大千世界中事一切皆盡乃至云雖復量等大千世界而全在一微塵之內如一微塵一切微塵皆亦如是如來智慧亦復如是無量無㝵普攝利益一切眾生具足在於眾生身中但諸凡愚妄想執著不知不覺不得利益乃至廣說寶性論宗亦同此教故彼第三云向說一闡提常不入涅槃無涅槃性者為欲示現謗大乘因故為欲迴轉謗大乘心不求大乘心故依無量時故作是說以彼實有清淨性故不得說言彼常畢竟無清淨性上來聖教除正為外無有凡愚不至二乘無有二乘不至權教大乘無有權教不至實教是故一切三乘五姓無非此經之所被者此中總攝現為當為四生六趣外道闡提一切皆盡無一眾生無佛智故出現品云佛子譬如大海其水潛流四天下地及八十億小洲有穿鑿者無不得水佛智慧海亦復如是流入一切眾生心中若有眾生觀察境界脩習善法則得智慧清淨明了而如來智平等無二乃至廣說此猶且約行性而說若依法性非情亦是此經所為所以者何情與非情其性一故攝相歸性相亦無二是故但被有情則為已被非情也第四門竟第五教體中兼辨諸宗通有其三一薩婆多宗二經部宗三大乘宗就初宗中自有三說一大婆沙中於四法內唯取音聲以為教體故彼一百二十六云問如是佛教以何為體為是語業為是名等答應作是說語業為體問若爾次後所說當云何通如說佛教名為何法答謂名身句身文身次第行列次第安布次第連合答後文為顯佛教作用不欲開示佛教自體謂次第行列安布連合名句文身是佛教用有說佛教名等為體問若爾此文所說當云何通如說佛教云何答謂佛語言唱詞評論語音路語業表是謂佛教答依展轉因故作是說如世子孫展轉生法謂語起名名能顯義評家釋云如是說者語業為體佛意所說他所聞故雜心論說意亦同此二依順正理於四法中用名句文三法為體故彼第三云牟尼說法蘊數有八十千彼體語或名此色行蘊攝俱舍第一亦有此頌正理釋云論曰有說佛教語為自性彼說法蘊皆色蘊攝語用音聲為自性故有說佛教名為自性彼說法蘊皆行蘊攝名不相應行為性故問語教異名教是語名別體教何是名答要由有名乃說為教是故佛教體即是名所以者何詮義如實故名佛教名能詮義故教是名由是佛教定名為體舉名為首以攝句文顯宗第三亦同此說問豈不正理依婆沙等如何乃違評家正義答眾賢論師無適莫但理長者即為自義故順正理名等為正發智論說意亦同此三依俱舍通取四法總為教體故彼第一中有頌同前正理而長行但敘兩家無偏定斷故彼敘云諸說佛教語為體者彼說法蘊皆色蘊攝諸說佛教名為體者彼說法蘊皆行蘊攝次後文中釋蘊量云如實義者世尊宣說八萬法蘊如彼所說八萬法蘊皆此五中二蘊所攝釋曰准此論文既無別斷當知意在通取四法問婆沙俱舍只是一宗豈應別立答俱舍婆沙理實無異今且據文而有差別一則不同正理定取名等二則不同婆沙評家定斷今故別列也第二依經部宗聲為教體故正理十四破彼計云汝不應說名句文身即聲為體無性攝論第一亦云諸契經句語為自性且不應理然此宗中自有三說一云十二處中聲處為性離聲無別名句字故一云法處相續假聲為體唯是意識所緣境故一云通假及實二聲為性由前二說皆有理故第三就大乘宗中自有四宗一真俗俱有宗二真俗雙泯宗三理事無㝵宗四事事無㝵宗初謂真諦理實故說為有俗諦不壞故說非無於中三一隨相辨體二唯識辨體三會性辨體初中復三一唯能詮二通所詮三通諸法初能詮中復有三說一云教體唯是音聲由聲是實名等假故故深密第五云如來言音略有三種一者契經二者調伏三者本母一云教體用名句文由名句文有別體故故成唯識第二破經部云若名句文不異聲者法詞無㝵境應無別一云聲名句文合為教體由前二說皆有教理為定量故又深密第四云不可捨於言說文字而能宣說是故我依般若波羅蜜多能取諸法無自性性問教豈非一如何辨體諸說不同玄奘三藏釋此義云以假從實聲為其體離聲無別名句等故以體從用名等為性能詮諸法自性差別二所依故生解究竟要由文義二種合為教體瑜伽八十一云諸契經體略有二種一文二義文是所依義是能依如是二種總名一切所知境界釋曰此論意顯無教則無義無義則無教教之與義不可離異故合為體三通諸法者謂餘一切情非情境所以者何如來身二業能為自身他身非身等三相應化故意唯二化非情已是心等現故如佛地論第七卷說又阿彌陀經云彼國常有種種奇妙雜色之鳥宣暢菩提分法乃至微風吹動諸寶行樹出微妙音眾生聞者皆發念佛念法念僧之心釋曰此文即顯自身相應或非身相應彼土無有實畜生故依此三化所顯之教皆是通明三昧解脫以為其體二唯識辨中二一本質教體二影像教體言本質者諸佛自宣說若文若義皆是如來妙觀察智相應淨識之所顯現離識無別文義可得故佛地論第一云有義聞者善根本願增上緣力如來識上文義相生此文義相是佛利他善根所起名為佛說此顯如來淨識為教體也二約顯影像教體謂聞者識上所變文義皆不離識故佛地論云佛說法時聞者識心雖不取得然似彼相分明顯現故名我聞又云如來慈悲本願增上緣力聞者識上文義相生此文義相雖親依自善根力起而就強緣名為佛說由耳根力自心變現名為我聞又無性攝論第一云貫穿縫綴故名為經此中即是隨墮八時聞者識上直非直說聚集顯現以為教體釋曰八時者舊人四說一云如來說法於八轉聲中隨用一聲逗機說故一云佛說華嚴八會時故一云依聲明論晝夜各有四時如來隨於此時應機說故一云依十地論如來說法離八非時依八正時故故彼論第十一云如王懷憂惱病恚著諸欲險處無侍衛纔侫無忠臣於此八難時智臣不應語心王亦如是非時不應說釋曰尋上諸說雖各有據然勘梵本並不相應謂梵稱一瑟吒此云欲樂梵言遏瑟吒此謂之八而攝論梵本則是一瑟吒非遏瑟吒也由其兩音相濫致使時譯者謬傳既翻欲樂為八大復虗如時字故勞諸德擾動智海玉巵雖寶無當奈何是故正譯應云隨墮欲樂聞者識上直非直說聚集顯現釋曰此文意顯聞而欲樂成聚集故言直非直說者五釋不同一云詮法自性名為直詮法差別名非直說一云長行名直說偈頌非直說一云十二分教中契經名直說餘十一分名非直說一云直爾說法名為直說以譬喻說名非直說一云如實說者名為直說方便說者名非直說言聚集顯現者今且依未自在位聞四字句五心次第以辨聚集謂如佛說諸行無常四字之時此中即有四聲四字四名一句及所詮義於聞者識聚集顯現然此義中西方四釋一云如說諸字有率爾尋求二心然未定知諸字所屬無決定故次說行字由先熏習連帶解生有三心起謂率爾尋求決定知諸字所屬一切行故聞諸行字雖知自性然未知義為令知義復說無字但有二心謂率爾尋求未有決定以未定知無字所屬後說常字由前字力展轉熏習連後字生具起五心謂率爾尋求決定染淨等流心等於最後時四字周圓方能解義總十二心初二次三次二後五也十四相謂四聲四字四名一句一義名聚集也一云說諸字時率爾耳識同時意識但緣其聲是現量故尋求心中唯尋耳識所緣境故亦但緣聲不緣字名此之三心所變聲上雖有字名如生等相而不緣之至決定心緣聲字名有三相現說行字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名有三相現說無字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名有九相現說常字時率爾耳識同時意識及尋求心亦但緣聲至決定心緣聲字名經十六心有十四相謂四聲四字四名并句及義名為聚集若不散亂起染淨心及等流心若散亂時生心不定一云率爾耳識同時意識但緣於聲是現量故尋求心中緣聲字名非現量故由此然小經十二心有三六九十四相現名為聚集若不散亂決定心生若散亂時生心不定一云卒爾耳識但緣於聲同時意識緣聲字名若不爾者尋求意識尋何等名此中曲有兩釋一云四率爾耳識各緣其聲四同時意識緣聲字名是其現量四尋求心方得圓滿經十二心有三六九十四相現名為聚集一云同時意識容非現量得緣過去緣於八心四率爾耳識四同時意識有三六九十四相現名為聚集問同時意識既是現量何得緣字名耶答現量亦緣名字自相不緣名義相繫屬故上來且依未自在位五心次第聞教聚集若傳教者是自在位則非此說所以者何自在位者得淨耳根一剎那頃聞一字時於餘一切皆就領受無障礙故或有聞說先受持教由純熟故不待率爾耳識引發及尋求等雖有決定或染淨或等流等或有字句增減之者亦即非如前說相心數量多小但隨所應字句而說若具顯五心如瑜伽第一及餘處章說問此既說有本影二教何故有聖教說佛無色聲心意識耶答教說有無各別所據今約五義會其違相一遮過顯德二真俗二諦三傳古非作四悲願所成五本質影像初中為遮過患故說非有為顯實德故說非無如十卷楞伽第八云如來不說墮文字法若人言如來說墮文字法者此即妄語四卷楞伽第三云我從某夜得最正覺乃至某夜入般涅槃於其中間不說一字亦不已說當說是佛說佛性論第二云如實義者如來無有色聲麤相功德可得檢兜率偈讚云色身非是佛音聲亦復然亦不離色聲見佛神通力釋曰此上意顯有過失之色聲則佛非有無過失之色聲則佛非無然此非無是不有之非無不無之非無也故密嚴第一云或說菩薩入於諸地乃至淨所依止入於佛地無漏蘊界常無變易涅槃三十七云凡夫之色從煩惱生是故智者說色無常苦空無我如來色者遠離煩惱故說是常恒無變易乃至云以是因緣如來色常乃至識常此經現相品說如來六根皆無有量出現品說如來三業亦無有量二真俗二諦者真諦離相故說非有俗諦隨機故說非無金光明云佛果唯有如如及如如智獨存大般若四百二十五云我從成佛已來不說一字汝亦不聞維摩云其說法者無說無示其聽法者無聞無得仁王觀空品云若有脩習聽說無聽無說如虗空法同法性一切法皆如也釋曰此上唯就真勝義說兜率偈讚云眾生妄分別是佛是世界了達法性者無佛無世界大般若五百六十七云眾生各各謂佛獨為說法而佛本來無說無示涅槃二十六明菩薩具足多聞中亦同此說釋曰此上雙約真俗以顯三傳古非作者謂佛所說但是傳述古佛之教非自製造楞伽云如來不說法者緣本位法故般若論云須菩提言如來無所說此義云何無有一法唯獨如來說餘佛不說故四悲願所成謂佛所無有盡三業應眾生者皆是廣劫悲願為眾生感非自所有故說佛果無有色聲然即以此為他為自故亦說有下文云如來不出世亦無有涅槃以本大願力顯現自在法出現品云如來身遍一切處乃至非至非不至何以故如來無身故為眾生故示現其身五本質影像者謂佛三業平等普應無彼差別影像色聲故說非有然即與彼差別聞見為增上緣因質有影故說非無上五義會諸聖教不相違也三會性辨體者謂此教雖不說真如隨緣之義然說佛正體智證最淨法界而於後得安立教法故亦說如為體性故成唯識第十釋真如云三勝流真如者謂此真如所流教法於餘教法極為勝故七法無別真如者謂此真如雖多教法種種安立而無異故釋曰教法既從法界流是故教法依真建立上來第一門竟第二約真俗雙泯宗出體者謂真諦離相故說非有俗諦無性故說為空次第如前三門出體皆悉是空畢竟非有即以此空為教體性如清辨論師掌珍頌云真性有為空如幻緣生故無為無有實不起似空華此二比量依真勝義不依世俗故說皆空廣說云云第三理事無㝵宗出體中三一隨相二唯心三法性初隨相中三一約能詮二通所詮三通諸法就能詮中亦三一唯音聲為體故維摩第一云佛以一音演說法故二唯名句文為體故仁王觀空品云是經名味句百佛千佛百千萬佛說名味句故三合前二說四法為體故十地品云如空中彩畫如空中風相牟尼智如是分別甚難見佛藏經第一卷初亦同此說十地論云說者以此二事說聽者以此二事聞謂音聲及善字釋曰此文舉下攝上故但云字或舉所依攝能依故問前來諸宗皆說聲等四法為體今此亦爾何以甄別答名言雖同理趣胡越所以者何初有實體故二唯是聲有體假故三就大中一稱實故二俱不立故三即理事故後第四宗中四法融故二通所詮者十住品云文隨於義義隨文故三通諸法者謂非但如前依能所詮取耳意識境以為體亦復通於六識之境以為教體由悉能為開悟利益所知境故維摩香積品云眾生香菩薩謂維摩詰我土如來無文字說但以眾香令諸天人得入律行菩薩各各坐香樹下聞斯妙香即獲一切得藏三昧釋曰但示此香即為說法故彼文次前云彼土無有聲聞辟支佛名唯有清淨大菩薩眾佛為說法故又菩薩行品云有以光明而作佛事有以菩薩或佛化人或菩提樹或以衣服臥具或以飲食園林臺觀三十二相八十種好或以佛身或以虗空夢幻影響鏡中像水中月熱時焰或以音聲語言文字而作佛事或有佛土寂寞無言無說無示無識無作而作佛事阿難諸佛進止威儀無非佛事乃至廣說八萬四千諸塵勞門而作佛事十卷楞伽第四云佛告大慧非一切佛土言語說法故有佛國土直視不瞬口無言說名為說法有佛國土宜爾示相名為說法有佛國土但動眉相名為說法有佛國土唯動眼相名為說法有佛國土咲名說法有佛國土欠呿名說法有佛國土咳名說法有佛國土念名說法有佛國土動身名說法釋曰准上二經種種境界開悟眾生皆名說法是故教體隨其所應非但四法乃所詮也二唯心辨體者謂前所說能詮等三莫不皆是真心所現離此真心更無有法故起信云依一心法有二種門一者心真如門二者心生滅門如是二門皆各總攝一切法此義云何以此二門不相離故心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法但依妄念而有差別釋曰各攝世出世間故無漏散不離真心也梵行品云知一切法即心自性成就慧身不由他悟故問此中即依真心辨體有本影不答有無無㝵本疏釋此四句分別一唯本無影謂令唯能說以聽者不離說者真心故二唯影無本謂令唯能聽以說者不離聽者真心故三亦本亦影謂令說令聽俱時現前以真心不壞說聽故四非本非影謂令說令聽俱非現前以真心無二非說聽故三法性辨體者謂前相心二教即令法性所成真心即法性之別號是故離真如外更無有法仁王二諦品云大王法輪者法本如應誦如乃至云論議如此名味句音聲果文字記句一切如上來隨相等三總會為一理事無㝵教體也第四事事無㝵宗出體者此中聲名句文能詮所詮等莫不一一皆具無盡無㝵法界謂具正智所生法性所起色心時處身方行位等體事相等德相相入業用所以然者此中無有一法而不具足一切法故廣釋體事等三義如下第七顯義門說問此宗亦有本影義不答有無無等㝵成一四句所以者何佛中有眾生眾生中有佛故故出現品云如來成正覺時於其身中普見一切眾生成等正覺乃至普見入般涅槃皆同一性所謂無性廣說云云又佛性論第二云一切眾生悉在如來智內以如如智稱如如境故一切眾生決定無出如如境者普為如來之所攝持故名所藏眾生為如來藏此明眾生在佛中也又出現品云菩薩摩訶薩應知自心念念常有佛成正覺何以故諸佛如來不離此心成正覺故如自心中一切眾生心中亦復如是悉有如來成等正覺此明佛在眾生中也言四句者一果門攝法界盡故則因無異果之因而唯本無影二因門攝法界盡故則果無異因之果而唯影無本三法界緣起因果無礙互相在故則亦本亦影四法界緣起因果相攝雙相辨盡俱非二心則非本非影是故由前第三句故佛心中眾生聽眾生心中佛說法眾生心中佛為佛心中眾生說法由前第四句故佛心眾生無聽眾生心中佛無說問何故前立教中明體事業用通於染淨今此教體唯局淨耶答前辨業用所依體事故通染淨今顯諸相及淨業用所依體事故不通染也問此中地身非情等說法與前一分滿教通諸法說有差別答彼據三種化說已如前辨今此所有菩薩說剎說眾生說業即是佛說所以者何三種世間無非佛故是故教體該攝法界所有諸法也上來教體門竟第六宗趣者宗謂尊崇趣即意指謂此一部經內所詮義中最所珍貴高尚之義謂之宗也宗意所向謂之趣也此宗即趣或宗之趣通其二釋因此部宗二門分別初通論三教後別明當部前中三教各有四宗謂一通宗二別宗三隨部宗四隨義宗又有會宗品宗恐繁不述初真一分半教中通宗者謂二十部對法及四阿含雖多所立莫不同詮生空之理是故通名生空法有宗也二別宗者謂即前之二十對法各立宗別如宗輪論中說不可具引略顯三宗一三世俱有宗此一切有部計謂過未名色體是實有同現在故二法無去來宗此大眾部計謂去來色體用俱無唯有現法及無為故三現通假實宗此說假部計謂去來二世法定非有唯有現法於中在界處是假在蘊是實經部同此三隨部宗者謂即於前二十對法一一宗內有多部論宗有不同如薩婆多中婆沙正理俱舍等當當部部宗各別故又如四阿含中各有多部經詮宗各別又如正法念雜寶藏等並准應知四隨義宗者謂即前諸經論中凡所立義一一皆有宗旨廣說應知第二真一分滿教中初通宗者謂或有大乘經說真俗俱有或有說言真俗俱空雖此有異莫不皆辨生法二空是故通名生法俱空宗也二別宗者謂即於前通宗之內開成兩宗然有兩說一云一三性皆空宗如三無性論等二三性空有宗如深密等此二學從互言顯密一云即真俗俱空有等是前宗也謂勝義真實故不無世俗因果不失故是有此則真俗俱有如深密瑜伽等二若二勝義相盡為空世俗緣生如幻非有如前所述清辨比量此則真俗俱空如大般若等三隨部宗者深密以境行果無等為宗十輪以佛輪等十輪為宗阿彌陀經以稱淨土為宗大般若十八空為宗四隨義宗者謂前深密十輪大般若中隨所說義有所成立即以為宗問大般若等亦說色空相即之義此則正當理事無㝵何故列在一分滿教答此色義兩宗釋異一分滿云依所執性故說為空具分滿云依他無性故說為空設依後釋而般若中復有說處是不了義故大般若五百九十二中說三乘五姓畢竟差別唯說色空依所執說是故且配屬前教攝若所說色空依緣生死性則具分滿攝第三真具分滿教中初通宗者謂此宗中雖說理事無㝵真莫不皆顯有為無為非一非異是故通名為無為非一異宗也二別宗者謂於前通宗之內分成兩宗一理事無㝵宗此即楞伽密嚴維摩法華涅槃勝鬘仁王等經二事事無㝵宗謂即此經及如來不思議境界經等問華嚴等亦說理事無㝵何獨事事無㝵宗攝仁王維摩涅槃經等亦說事事無㝵之相何不事事無㝵宗收答兼正異故又仁王等唯依業用說故此經具德相等故三隨部宗者初理事無㝵宗中如楞伽以五法三自性八識二無我為宗內證聖智所行境界為趣或以一百八句為宗一心為趣密嚴以現法樂住內證智境為宗維摩以抑挫二乘顯菩提解脫為宗法華以會三歸一為宗勝鬘以空智如藏及攝受正法為宗涅槃以佛性常住為宗仁王以三種般若為宗後事事無㝵宗中不思議境界經以如來不思議境界三昧為宗後別明當部宗者古來異釋總有七家前六古說後一現傳前中一笈多三藏云此經以三十二聖觀行為宗二敏法師云以因果為宗印法師亦同此說三遠法師云以華嚴三昧為宗由此經意令觀因果成三昧故四衍法師云以無障㝵法界為宗五裕法師云以甚深法界心境為宗法界門中義分心境諸佛證之以成淨土法界即是一心諸佛證之以成法身故此經初品內頌云無盡平等妙法界悉皆充滿如來身又經最後品內明入法界故知唯以法界為宗六光統律師云以因果理實為宗二現傳者即是本疏所立也於中二初簡持後釋義前中謂前六家宗內初三但顯所成因果次二唯明所依理實後一雖該前二然以名意不具令義不明故現所傳具言因果緣起理實法界以為宗趣後釋義中二先釋別名後解通稱謂因果緣起理實法界唯囑此經故名為別宗趣之目通餘一切前中四一因果緣起與理實法界分相別顯二融理實法界以成因果緣起三會因果緣起以歸理實法界四雙融次前二門無㝵存泯初中有十法五對一無等境此有二種一在纏為所信境二出障為所證境二無等心此亦二種一大菩提心為主故二喜捨等心為伴故三無等行此亦二種一差別行歷位顯故二融攝行一即一切故四無等位如前行說五無等果此亦二種一依果謂華藏世界海故二正果謂十身故此上五對初一是理實法界次三緣起因後一緣起果也第二中亦十法五對一所信因果二差別因果三平等因果亦是出現因果四成行因果五證入因果此門配經如第二卷疏科文中說第三中亦十法五對謂即會前理實之因果而還歸於理實所以者何五對因果莫不皆以無㝵法性而為自性是故不㝵即相即性也第四雙融次前二門無㝵存泯者謂即於一無㝵法界而性相混融自在成就亦有十義一由離相故因果不異理實即因果非因果也二由離性故理實不異因果即理實非理實也三由離相不壞相故理實即因果以非因果為因果也四由離性不泯性故因果即理實以非理實為理實也五由離相不異離性故因果理實二俱泯絕逈超言念六由不壞不異不泯故果因理實二俱現前熾然言念七由上存泯不相異故常以絕見聞而見聞故此即無見聞之見聞也常以離言念而言念故此無言念之言念也八由理實性融不可分故即理實之果統攝理實無不盡即因隨所依而在果中是故佛中有菩薩也九即理實之因攝義亦爾是故菩薩中有佛也十因果二位各隨所應收攝無邊差別諸法相即相在微細帝網等此十義中初七是理事無㝵宗後三是事事無㝵宗後尺通稱中義類繁廣略顯十法五對一人法相對謂舉人為宗顯法為趣如佛華嚴之大方廣故或反上謂大方廣之佛華嚴故二理事相對謂舉事為宗會理為趣或舉理為宗融事為趣如舉具分真性故三境智相對謂舉境為宗成觀為趣或舉智為宗攝境為趣如心性是一等四行位相對謂舉位為宗成行為趣或舉行為宗顯位為趣如圓行成圓位五因果相對謂舉因為宗成果為趣或舉果為宗脩因為趣然此宗之與趣及因果緣起理實法界等互望融鎔相即相在皆無障㝵謂因之果果之因或因即果果即因或因果即緣起或理實即法界或因果緣起之理實法界或因果緣起即理實法界或宗即趣宗之趣或因果緣起理實法界之宗趣或即宗趣皆准思之上來四宗相望寬狹有三謂初一唯寬後一唯狹中間別及隨部二部互寬狹望前後故此經於三通宗是為無為非一異宗攝於三別宗是事事無㝵宗收於三隨部宗中是因果緣起理實法界宗於三一隨義宗內即諸法相即相在相攝相入等宗於色大小無增減於時長短無延促餘一切義准應知第六宗趣門竟第七顯義分齊者於中有別有通別謂隨會隨品隨文句字等一一皆有義分齊故通謂一部大宗義之分齊今此所辨唯通非別謂即事事無㝵法界宗中義之分齊爾於中二初辨相後問答前中三一體事二德相三業用初體事者即是德用所依此通二種一純淨無漏是德相所依體事二通漏無漏是業用所依體事今通前二體事略舉十法餘可思准謂色心時處身方教義行位初色者謂外器世間能造所造下至微塵上至廣剎及中一切所有事物二心者謂佛菩薩及諸眾生所有染淨心及心法三時者謂迦羅時三摩耶時大劫小劫九世十世下至一剎那等四處者謂盡十方世界依色所顯大小方量上至廣剎下至一塵毛端等處五身者謂佛身菩薩身二乘人身乃至一切眾生身下至一毛孔上至全身六方者謂東方南方乃至上方下方上至盡十方虗空界分下至一毛端量處七教謂能詮名句字聲及通一切下至一名一句一字一聲一光香等上至種種無量差別名句字等八義者謂教之所詮一切法門下至一義上至一切九行者謂諸菩薩所有脩行無邊行海下至一行上至無盡十位者謂三賢十地等上至佛位下至十住初心等第二德相者第八迴向說真如一百門德皆名真如相又起信論云真如相大者具足無量性功德故此德即是相名德相也今此將顯如所起果故以如德而名其果就此門中二先通辨德相因後別顯德相果前中謂佛菩薩從初發意修諸行時一一皆與法性相應常觀諸法若同類若異類若同體若異體若雜染若清淨相雖差別其性是一所謂無性以無性故性相無㝵此相彼相既同一性相隨性而融通是故此事彼事成即在等無障㝵也又由大願迴向善根同如相故證淨法界所感依正還同真性具足一切無邊無㝵德相普賢行品云何況最勝智三世諸佛法從於法界生充滿如來地真如性既具過恒沙德真所起事德量亦然是故此事及德同無為性非相所遷非分限取唯普眼見非餘境界今略舉真如十種德相以顯此中體事德相第八迴向云譬如真如與一切法而共相應不相捨離不離諸法恒守本性無有改變無所不在一切法中性常平等性常隨順與一切法同其體性常住無盡普攝諸法一切法中畢竟無盡釋曰此十德相凡有其一必具餘九具餘九具百具十具過恒沙如八德水何以故同體性故無分限故法界體事既全如起是故一一具餘一切今且依總別分相略辨十門餘應思准謂一由法界體事一一皆有同法性中與一切法而共相應不相捨離德故一一隨應同時具足一切體德二由此彼事各有同法性中不離諸法德故相望有相即德三由此彼事各有同法性中無所不在德相望有相在德四由諸體事各有同法性中性常隨順德及恒守本性無改變德故一一隨應有隱顯德五由此彼事各有同法性中與一切法共相應德故相望有主伴德六由諸體事各有同法性中與一切法同體性德故一一即是一切諸法德七由諸體事各有同法性中常住無盡德故一一自具無盡法德八由諸體事各有同法性中普攝諸法德及一切法中性常平等德故一一隨應有純雜德九由諸事一一皆有同法性中普攝於法德故一一隨應具微細德十由諸體事一一各有同法性中無所不在德及一切法中畢竟無盡德故互望重重有如因陀羅網德也二別顯德相果者准前略顯十種德相餘類應知初同時具足相應德者謂後九門所有體事同類異類及中一多大小長短位上下等同時具足在於一法是故此門為後九門之總後九是此一門之別然以總別不相離故凡舉一法必具所餘一切門者是此門攝若舉一法但具當自一門法者是餘門攝華藏頌云華藏世界所有塵一一塵中見法界妙嚴品初顯佛法界身德云譬如虗空具含眾像舊經性起品云三世一切劫佛剎及諸法諸根心心法一切虛妄法於一佛身上此法皆悉現是故說菩提無量無有邊二相即德者謂諸體事同類異類及中一多大小長短位上下等相望此中同異體事相望但各兩句謂此即彼彼即此等其中同類體上一多等相望或有六句謂此一即彼一多即多一即多多即一一即多一多即一多乃至餘大小長短位上下等互望皆爾異類體上互望相即當知亦爾思準可知十住品云一即是多多即一文隨於義義隨文如是一切展轉成釋曰既云展轉即是異體也四十七云諸佛知一切佛語即一佛語知三世一切劫即一剎那初發心品云以發心故即與三世一切諸佛體性平等乃至云真實智慧等者此顯位上下相即也七十八云彌勒告眾云言餘諸菩薩經無量百千億那由他劫乃能滿足菩薩行願乃能親近諸佛菩薩此長者子於一生內則能淨佛剎乃至云則能具足普賢諸行釋曰此顯行位及時相即也三相在德者謂諸體事同類異類及中一多大小長短位上下等相望是故非但一多相容此中體事同類自相望但各兩句謂彼在此此在彼若異類及中一多等相望各有六句初六句者且如身土相望依中有依正中有正依中有正正中有依依中有依正正中有正依餘體事准思後六句者謂一中有一多中有多一中有多多中有一一中有多一多中有一多餘大小等准之普賢三昧品初說佛身中有國土及諸佛菩薩等者是正中有依正也初發心品云一微塵中無量剎無量諸佛及佛子諸剎各別無雜亂等者是依中有依正也現相品云如來一一毛孔中一切剎塵諸佛坐菩薩眾會共圍繞等七十九云善財入樓閣見種種境界乃至云又見其中有無量百千諸妙樓閣一一嚴飾皆悉如前廣博嚴麗同於虛空不相障㝵亦不雜亂於一處中見一切處一切處中悉如是見釋曰此百千閣分量皆等不礙內外互相容在而不相雜四隱顯德者謂諸體事同類異類及中一多大小長短位上下等一一隨應有隱有顯如見此者不見彼見彼者不見此雖不互見而各收盡雖各收盡而不相雜如見既爾聞等隨應知亦然如一人身六親所望雖各不同然各全得亦不雜亂夜摩偈讚云十方一切處皆謂佛在此或見在人間或見在天宮十定品第七定云或見佛身其量七肘或見八肘九肘十肘乃至或見佛身量等不可說不可說世界如來本身無增無減譬如月輪閻浮提人見其形小而亦不減月中住者見其形大而亦不增釋曰如佛身隱顯既爾當知言音依果所有及一切法門教義行位等亦然諸大菩薩成就如是法界體事德相者並準可知五主伴德者謂諸體事同類異類及中一多大小位上下等相望此中據兩法已去互隱顯相望不同前門但一法上即有隱顯諸會中說普賢等類輔翼之眾皆是果海菩薩更相主助同遍法界主主不並伴伴不俱主伴伴主同時成就又脩多羅光明總持三昧乃至菩薩無邊行海皆有主伴如第二中說六同體成即德謂諸體事同類異類及中一多大小長短位上下等一一即是一切諸法此中不同前相即門前據此彼相望相即此約即體是一即是一切諸法此中不同造色地即是一切法如體事能造色地即是水等亦即所造香味觸等亦即異類心心法乃至一切悉亦如是餘一切法一一亦然並應類准妙嚴第一云其身充滿一切世間其音普順十方國土如來所處宮殿樓閣充遍十方第二云十方虛空可知量佛毛孔量不可得又說依即正謂摩尼幢放光說法菩提樹亦爾並出菩薩眾師子座亦然又見毛孔中說法乃至眼即耳等不同權宗諸根互用夜摩偈讚云佛坐夜摩宮普遍十方界此事甚奇特世間所希有七十六說摩耶夫人如常之身能容十佛剎微塵數菩薩並各乘宮殿及八萬龍王皆在胎中而不迫窄七十八云彌勒菩薩謂善財言汝但遍觀樓閣則能了知學菩薩脩行菩薩道釋曰此色法即是教義也八十云善財從初發心乃至得見普賢已前中間所入一切諸佛剎海今於普賢一毛孔內一念所入諸佛剎土過不可說不可說佛剎微塵數世界如是而行緣盡來來劫猶不能知一毛孔中剎海次第乃至邊際釋曰此顯一毛孔量不增即如是廣大也七具足無盡德者謂諸體事同類異類及中一多大小長短位上下等一一自體皆無窮盡如水中文此不同後如帝網德此但當體即具無盡彼依互在重重無盡又亦不同微細德相彼據一中多法齊現此約一一即無盡窮妙嚴品云佛身普遍諸大會充滿法界無窮盡又云其菩提樹恒出妙音說種種法無有盡極十住品頌云欲具演說一句法阿僧祇劫無窮盡而今文義各不同菩薩以此初發心六十五說具足優婆夷於一小器中出一切資具飲食等畢竟無盡然不減少釋曰此皆體德自在非約解脫等業用八純雜德者謂諸體事同類異類及中一多大小長短位上下等相望各具普別然普與別非即非離融無障碍非即故諸體諸德繁興萬品非離故一體一德即為究竟妙嚴品說諸異生眾及餘同生各各唯得一解脫門是純門也普賢菩薩得不思議諸解脫門是雜門也六十五云慈行童女見三十六恒河沙佛彼諸如來各以異門令慈行入般若波羅蜜普莊嚴門者此純雜無碍也又善財童子所求諸善知識各言我唯知此法門又皆云多劫唯修此純門也彼諸善知識皆推進云諸大菩薩種種知見種種脩行種證得者此雜門也自言唯一他推有多自他雖異然屬一身此亦純雜無碍也又善財普獲諸善知識解行德證亦雜門爾上下文中更有此類準知九微細德者謂諸體事同類異類及中一多大小長短位上下等一一之中即具諸法此不同前相在之義彼約解別體別德相望相在此但當法即具一切炳然齊著此門亦可名普門德故七十一云寂靜音海謂善財言此菩薩念念出生廣大喜莊嚴解脫門者即是普門於一事普見一切諸神變故第九迴向中說微細智微細境各七十二門不可繁引六十二中善財於德雲比丘所聞勝進行法廣說念佛門中云住微細念佛門於一毛端處有不可說如來出現悉至其所而承事故又離世間品說菩薩有十種甚微細至相依之總名微細相容安立今分德用彼文屬用如後業用門具引應知十如因陀羅德者謂諸體事同類異類及中一多大小長短位上下等相望此門據互相容在展轉重重無有窮盡阿僧祇品頌中從不可言說諸佛剎至此剎為塵說更難等有四重也又四十七云諸佛有十種知一切法盡無有餘乃至第十云知一切法界中如因陀羅網差別盡無有餘上來十種德相於前純淨無漏體事一一具有是故成百成千等門也第三業用中二先通顯所因後別辨其相前中謂佛菩薩成就無㝵法界相應三昧通明解脫陀羅尼等用前體事對應度者轉變自在此所轉境通於染淨如後所引二別辨相中略顯十類餘可准知謂同時具足相應相即相在相入相作純雜隱顯主伴微細如因陀羅網初同時具足相應用者謂以諸體事同類異類及中一多大小延促去住染淨定散位上下等對應度者隨於一法即普示現後之九門同時具足乃至盡法界所有染淨法無不同時具足相應所以者何一切染法一真性故一切淨法真所起故故於堪應者現此境界普賢三昧品云能令一切國土微塵悉能容受無邊法界第十行文云此菩薩於其身中現一切剎一切眾生一切法一切諸佛八十云善財見普賢一一身分一一毛孔有十方一切世界三千界中地水等輪諸山河海人天宮殿時劫佛菩薩如見現在世界如是前際後際一切世界中悉爾明見乃至十方剎塵中現三世一切境界一切佛剎一切眾生一切佛出興一切菩薩及聞佛菩薩眾生言音釋曰此一普賢身遍十方一切世界塵內無邊佛會中一一毛孔現法界中所有諸法莫不皆令同時具足也二相即用者謂以諸體事同類異類及中一多大小長短去住染淨定散位上下等相望成用忉利夜摩兜率等三處昇天品中皆云爾時佛神力故不離於此菩提樹下而上昇天宮者此顯坐即昇昇即坐也五十三云菩薩有十種入劫智所謂入可數劫即是不可數劫乃至入劫即一念入一念即劫釋曰此上約異體相望顯相即用若得同體亦有即義而不名相准前德相第六此應名同體成即用五十六云菩薩有十種遊戲乃至第十云菩薩不分身遍一切佛會者此一身即是一切身故也摩耶夫人如常之身量同虗空者若依大願智幻解脫力而成就說亦即是此業用門也勝熱婆羅門刀山火聚即無分別慧能斷惑網破癡闇故七十七說善財歎樓閣云不動本處能普詣一切佛剎者住處不離一毛端處而普現身一切世界者住處釋曰此皆一即一切也三相在用者謂以諸體事同類異類及中一多大小長短去住染淨定散位上下等相望成用此中有二六句准前德相相在中說現相品一一塵中無量身復現種種莊嚴剎三世所有一切劫一剎那中悉能現賢首品云一微塵中入三昧成就一切微塵定而彼微塵亦不增於一普現難思剎彼一塵內眾多剎或有有佛或無佛或有雜染或清淨或有廣大或狹小乃至云如一塵中所示現一切微塵悉亦然此大名稱諸聖人三昧解脫神通力第九迴向云此菩薩以無著無縛解脫心於一毛端量處悉能包容盡虛空遍法界不可說不可說一切國土皆使明見如一毛端量遍法界虛空界一一毛端量處悉亦如是又云於一念中現一眾生不可說不可說劫念心乃至現一切眾生爾所劫念心六十八云一一毛孔內各現無數身一一毛孔內各現無數剎釋曰上下文中同此門者準之四相入用者謂以諸體事同類異類及中一多大小長短去住染淨定散位上下等相望成用此亦同前有二六句十行品云能於一一三昧中普入無數諸三昧無量無邊諸國土悉令共入一微塵第八迴向云此菩薩於一毛孔中普能容納一切國土第九迴向云於一身中悉能包納盡法界不可說不可說身而眾生界無增無減如一身乃至周遍法界一切身悉亦如是十地品云第十地菩薩知佛十種入劫智所謂一劫入多劫多劫入一劫乃至長劫入短劫短劫入長劫十定品第二定云三千世界微塵數三千大千世界悉入是菩薩身是菩薩身亦入是諸世界第十定云菩薩自見其身往彼眾會亦自見身普入諸地釋曰此文即是諸位相入也普賢行品云菩薩有十種普入謂一切世界入一毛道一毛道入一切世界乃至云一世入一切世一切世入一世離世間品十種無碍用中亦說眾生一多相入六十云上方菩薩以自在力令一切世界展轉相入六十一云此諸菩薩入一切無諍境界乃至能令小大自在相入此一切方普入一方釋曰此約方體事顯相入也五相作用者謂以諸體事同類異類及中一多大小長短去住染淨定散位上下等相望成用此亦同前有二六句第八地前頌云大剎隨念變為小小剎隨念變為大如是神通無有量世間共說不能盡又後長行云此菩薩隨眾生所樂能以眾生身等十種身互相作第十文云此菩薩神通隨能以廣狹活淨亂住住次第住倒住正住等世界皆互相作五十六云以一國土作多國土以多國土作一國土以不可說劫作一劫以一劫作不可說劫光明覺品云一身為無量無量復為一六純雜用者謂以諸體事同類及異類中一多大小延促前後染淨定散位上下等相望成用第九迴向云以無縛無著解脫心成就普賢佛自在力於一門中示現種種不可說不可說劫無有窮盡令一切眾生皆得悟入以無著無縛解脫心成就普賢佛自在刀於種種門示現種種不可說不可說劫無有窮盡令一切眾生皆得悟入其身普現一切佛前七隱顯用者謂以諸體事同類異類及中一多大小長短染淨定散位上下等相望成用賢首品云有勝三昧名方網菩薩住此廣開示一切方中普現身或現入定或從定出乃至廣說釋曰菩薩一身隨應見異七十六云摩耶夫人告善財言菩薩將下生放一切如來受生功德光輪入於我身爾時我身雖不踰本然其實已超過世間乃至云如於此處為菩薩母三千世界閻浮提中悉亦如是由得菩薩大願幻解脫門故釋曰本身無二非一處住故一隱多顯也非多處住故多隱一顯也八主伴用者謂以諸體事同類異類及中一多大小位上下等相望成用現相品說佛眉間出勝音菩薩與諸眷屬坐華鬘臺顯示主伴教差別相出現品說佛放眉間出現光明無量百千億那由他阿僧祇光以為眷屬釋曰人光教等主伴既爾餘法准知九微細用者謂以體事同類異類及中一多大小長短去位位上下等隨其所應當體即全具一切法同時炳然齊現成用第九迴向云此菩薩於一念中現一切眾生各不可說不可說念心離世間品云菩薩十種甚微細極所謂在母胎中示現初發菩提心乃至灌頂地住母胎中示現住兜率天初生童子地處王宮出家苦行詣道場成正覺轉法輪般涅槃乃至云示現大微細謂一切菩薩行一切如來自在神力無量差別門六十七云一一毛孔內各現無數身一毛孔內各現無數剎十如因陀羅網用者謂以諸體事同類異類及中一多大小長短位上下等相望互在重重無盡成用普賢三昧品云佛身所現一切國土所有微塵一一塵中有世界海塵數佛剎一一剎中有世界海塵數諸佛一一佛前有世界海塵數普賢入此三昧阿僧祇品頌中從一毛端處所有剎已下有多重重同類異類皆神力現六十四說體捨優婆夷答發心久近謂善財言菩薩神通無有量普現一切剎網故第二問答者具如別行旋澓章說第七門竟第八部類傳譯者依教流次第應云翻譯部類傳通今准此分三一翻譯時代二部類本末三傳通感應初中此經前後翻譯補闕四本不同初本者晉義熈十四年此天竺三藏佛度䟦陀羅此云覺賢於揚州謝司空寺翻梵本三萬六千頌成漢經五十卷或六十卷沙門法業筆受慧嚴慧觀潤色第二本者大唐永隆元年中天竺三藏地婆訶羅此云日照於西京大原寺譯出入法界品內兩處脫文一從摩耶夫人後至彌勒菩薩前中間脫天主光等十善知識二從彌勒菩薩後至普賢菩薩前中間脫文殊師利申手過百一十由旬按善財頂等半紙餘文大德道成律師薄塵法師大乘基法師潤色依六十卷本為定第三本者證聖元年于闐國三藏實叉難陀此云喜學於東都佛授記寺再譯舊文兼補諸闕計益九千頌通舊總翻四萬五千頌合成漢本八十卷大德義淨三藏弘景禪師圓測法師神英法師寶法法師華嚴和上等同譯復禮法師綴文第四本者謂前第三本中雖繕數處然復漏脫日照三藏所補入法界品內文殊手按善財頂處一段要文由此遂令前文虗指於後後經來無所因謂前七十七及七十九中皆云彌勒善財詣文殊所後文既𨷂便將善財違彌勒命又前七十九中彌勒告善財言文殊師利為汝說一切功德既漏此文及使彌勒記言無驗又八十初云善財一心願見文殊師利見三千大千世界塵數知識者此文失次居然可見謂上句既云願見文殊師利次句忽云見三千等此語斷緒無來由故是故知上以新舊兩經與梵本讎校還將日照補文安喜學脫處遂得斷文再續缺義復全今之所傳即此第四本也二部類本末中三一本部二別行三論釋初中西域相傳佛涅槃後六百年時龍樹菩薩入龍宮見此經有上中下三本其上本有十三千大千世界微塵數頌四天下微塵數品中本有四十九萬八十八百頌一千二百品下本有十萬頌三十九品龍樹乃誦得下本流布人間今此所傳即其本也二別行者一切經中兜沙經一卷是名號品菩薩本業經一卷是淨行品小十住經一卷是十住品大十住經四卷是十地品如來性起微密藏經兩卷是出現品顯無邊佛土功德經一卷是壽量品度世經六卷是離世間品羅麻伽經三卷是入法界品等目菩薩所問三昧經二卷是十定品又于闐國三藏提雲陀般若所翻脩慈經一卷金剛鬘經十卷並實叉難陀三藏譯如來不思議境界經等並是華嚴眷屬非本部內別行之經以其三種世間嚴事劣故三論釋者龍樹菩薩造大不思議論有十萬頌備傳西域此方漢本十住毗婆沙論十六卷是彼中釋十地內初兩地也又世親菩薩造十地論釋十地品魏朝勒那三藏及菩提流支各翻一本于時光統律師自善梵文又奏二三藏對御參詳糅成一部一十一卷見傳於代又魏朝僧靈辨愛重此經於五臺山頂戴祈請經于三載遂感冥加悟斯玄旨爰詣懸瓮山造此經釋凡一百卷頗傳於代三傳通感應者舊本靈徵具如五卷華嚴傳說今此八十卷本初釋之後佛授記寺諸大德等共請華嚴和上講此經其年十月十五日開講便即入文至十二月十二日晚上講講至華藏世界海震動之其講堂中及寺院內忽然震動于時聽眾道俗有數千人共覩斯徵歎未曾有時三藏法師實叉難陀及寺大德明詮律師德感法師等述茲靈應具狀以聞都維那慧表署狀為首即以聖曆三年臈月十九日進則天聖皇后親運神筆批狀報云省狀具之昨因敷演微言弘揚祕賾初譯之日夢甘露以呈祥開講之辰感地動而標異斯乃如來降跡用符九會之文豈眹庸虗敢當六種之應披覽來狀欣暢兼懷此批並狀具如別錄第八門竟第九具釋題目中二初通辨諸經後別顯當部前中諸經得名大例有二種一單名二複稱單中六一依說法者名如無盡意菩薩經等二依請法者名如賢護經思益經等三依所為者名如大集經須達經優填王經等四依說法處名如密嚴經楞伽恒水經等五依喻名如大雲經大寶積經等六依所說立名此類稍多略顯八種餘准應知一依所說人名如僧染經孛經等二依所說處名如阿彌陀經阿閦佛國經等三依所說時名如時經賢劫經新歲經等四依所說喻名如群牛譬經雜譬喻經等五依所說行名如正恭敬經施燈功德經善戒經大悲經修慈經諸三昧為經忍辱經等六依所說依名如十住經佛地經等七依所說事名如華手經胎藏經等八依所說法門名如僧伽吒經緣起經等二複稱者謂即如前單名之類或有二三四等和合一處共目一經此類亦多略顯三五餘准應知謂或以法喻合名如法華經等或以智果為名如大般若等或智喻為名如金剛般若等或以教義為名如解深密等或是約人為名上首菩薩同此名故或有以數喻為名如百喻經十輪經等或人法數喻為名勝鬘經等乃至廣說其單名複稱皆有釋名得名不可具敘二別顯當部中二初辨異名後顯本號前中二初明餘部中所說後明當部中所說前中三一以所說法為名如智度論屬累品中此經為不思議解脫經故二喻名如涅槃經及觀佛三昧海經名此經為雜華經故三數名如梁攝論第十勝相中名此經為百千經故後明當部中異名者如下文出現品及離世間品依別德用各立十名至後當辨後顯本號者謂此一部經首總相稱為大方廣佛華嚴故於中三一總相科簡二別顯義類三釋名得名初中有四對八事一教義相對謂大等字是所詮義經之一字是能詮教二就義中人法相對謂大等三字是所得法佛等三字是能得人三就人中行果相對謂佛字是所嚴果華字是能嚴行嚴之一字通前能所無別自體四就法中體用相對謂大之一字是無㝵法界體方廣兩字是無㝵法界用二別顯義類者謂大等六事各有多義且初大義具顯則無量略辨十種餘准思之一處大謂此經充遍十方法界一切世界乃至塵內空毛端處微細重重一切剎故二時大謂此經遍前後際九世十世乃至念劫重重故三歸大謂餘所得終歸此故如被機中說四信大謂此教中說信能具一切佛法故如賢首品說五心大謂初發菩提心所期無限皆與佛等故如發心品說六願大謂凡所脩行迴向三處無自為故如迴向品說七行大謂菩薩行海一一悉包無盡法界故如普賢行品及離世間品說八果大謂依正二種具足十身通三世間故如華藏品及十身相海品等說九能詮教大謂此經一一名句字即是盡十方法界世界前後際劫乃至微細重重時剎中諸佛所說教海無有餘故如上下文中具顯十義大謂稱前教故二方廣有十義謂雜集有五義入大乘論有六義中間除共同者合有十義初雜集中五者彼論第十一云方廣者謂菩薩藏相應言說一切有情利益安樂所依處故宣說廣大甚深義故廣破一切障故無有諸法能比類故入大乘論六義者彼第一云毗佛略者為眾生說對治法故亦有眾多義故亦以多莊嚴具故亦能出生無量大果報故非是稱量所能知除斷一切諸邪見故釋曰前論破重障後論隨對治此二同也是故合有十義三佛有十義然有兩說一如佛地論第一說云具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺一切有情如睡夢覺如蓮華開故名為佛二如真諦三藏七事記中引真實論佛具十義謂覺勝天鼓不由他悟離二無知已過睡眠譬如蓮華自性無染具足三義一假名佛謂六神通二寂靜佛謂惑不生三真實佛謂即真也具足三德般若解脫法身具足三寶性自知令他知謂自覺謂他也四華是雜華喻於萬行略顯十義餘准應知一無染著義謂雖為能造水等所造不為水著喻離相行雖因有漏境界脩成而不為漏法所染二柔耎義喻柔和行三自開義喻無功用行四可觀義喻慈忍行五馚馥義喻戒定等行六鮮淨義喻離障行七相狀巧成義喻中道無住行八味甘美義喻禪行適悅故九堪為嚴義喻脩顯行十能感果義喻脩生行五嚴有二義謂能嚴所嚴故即以前無盡行華嚴前無邊佛果也六經有八義或十義謂雜心五義一出生二顯示三涌泉四繩墨五結鬘佛地論中說有二義一貫穿所說二攝持所化依涅槃仁王同說一義謂總相義如藏部中辨或十義者於前更加常法二義此如俗書訓釋可知三辨得名釋名中二初得名後釋名前中大以當體為目包含為義方廣就用標稱周遍為義佛以覺照彰名果滿為義華是喻名感果為義嚴以資莊得名通能所為義經以總相得名契合為義後釋名中四一以體望用有一釋謂瑜伽二十一云佛為聲聞說十二分教今為簡彼方廣故謂之大准此而言則大之方廣依主釋二以人望法通有二釋謂以法簡人即大方廣之佛非下乘佛也以人簡法即佛之大方廣非因依所得法故皆依主釋亦通有財三就人中行望於果即佛之華嚴而行非餘果之行果望於行即華嚴之佛而果非餘行之果皆依主釋亦通有財四教義相望教是義教即大方廣佛華嚴之經義是教義即經之大方廣佛華嚴皆依主釋有有財同第九門竟
