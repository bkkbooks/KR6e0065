body:
  text: 昇須彌山頂品第十三將釋此品四門同前初釋名中二先釋會名後解品稱前中約處名須彌山頂會亦名三十三天會若通別具言名三十三天帝釋宮中妙勝殿會若約所法說名十住會此即從處從法皆依主釋後解品名者昇登也須彌梵音具正應曰蘇迷盧此云妙高也山頂者謂此山頂縱廣八萬四千由旬其形畟方四邊各有八城中央有一大城名曰善見帝釋居中有大衛殿名為妙勝據實佛但往妙勝殿品目就通名昇須彌或是言總意別故曰山頂山頂之品依主釋若依梵本具名應云如來向蘇迷盧山頂上品言妙高者妙謂體以四寶所成高即相出七金山等俱舍第十一云於金輪上有九大山妙高山王處中而住餘八周帀繞妙高山於八山中前七名內第七山外有大洲等此外復有鐵輪圍山周帀如輪圍一世界持雙山等唯金所成妙高山王四寶為體如次四面北東南西金銀瑠璃頗胝迦寶乃至云如是九山住金剛輪上入水量皆等八萬踰繕那蘇迷盧山出水亦爾餘八出水半半漸昇謂初持雙山出水四萬乃至最後鐵輪圍山出水三百一十二半如是九山一一廣量各各與自水出量同若依此經十定品說妙高山身入水出水皆八萬千由旬山頂從廣及餘八山並准應釋又彼論頌云妙高層有四相去各十千傍出十六千八四二千量堅手及持鬘恒憍大王眾如次居四級亦住餘七山妙高頂八萬三十三天居四角有四峯金剛手所住中宮名善見周萬踰繕那高一半金城雜寶地柔耎中有殊勝殿此殿梵名吠制演多此云妙勝或曰殊勝周千踰繕那乃至廣說如彼云云今此明佛以自在力不起覺樹下應機現彼故云昇須彌山頂也問何要昇天說此法耶答有二義故一者機感在彼處故二者顯德漸增勝故問既顯德增何不按次向四王天耶答此亦二義一表此將說成位法故謂十信但是十住方便未得成位四王住處在須彌半未至山頂如來成位二表此非位與位懸隔是以說住越彼四大王眾天爾二來意者亦有二種一顯會來然有二義一為答前十住問故二顯信是住方便故方便既滿正位宜陳故次來也二品來意者前品說信德用究竟此品明住方便故次來也三宗趣者亦為二種一以十住行位為宗攝位得果為趣二明品宗者以嚴處請佛為宗成後正說十住為趣四釋文者此會總有六品經文長科為三初二品顯當會由致次三品是當會正宗後一品明勝進趣行問前會何故無此進趣行耶答顯二義故一顯此成位前但行故二顯前無位總為此位進趣行故更無別也問若爾者迴向是位何故亦無進趣行邪答彼亦為顯二種義故一顯三賢位滿總為趣地加行故二顯趣地加行是無分別慧離趣相故就初二品文即分二前一品明化主赴機後一品明助化讚佛主伴圓備方可顯說就前品中長分為八一本會圓遍二爾時世尊不離下佛以應法界會身各昇當處帝釋宮殿三時天帝下十方天王各見佛來嚴殿及座四爾時帝釋下十方天王諸佛居殿五爾時世尊下明一切佛皆受請入殿六爾時帝釋下樂聲止息七即自下天王憶念昔佛入殿自種善根八爾時世尊下佛普坐殿殿怱寬容初中二先明能現因謂佛威神力後十方下明所現相所現相中二先明化主遍一切會赴機後各有下明助化遍一切會說法前中赴機所遍之處略有九重一遍一娑婆界內百億閻浮提菩提樹下二遍圍繞娑婆世界十剎塵數廣大世界內三遍圍繞一一廣剎各十剎塵數眷屬剎中四遍娑婆種中一切世界五遍盡華藏剎海一切世界五遍盡華藏剎海一切種內諸世界中六遍盡虗空界所有剎海諸世界中七遍前一切世界各各同類皆遍法界諸世界中八遍前一切世界所有塵中諸世界內九遍前塵中一切剎內所有塵中一切世界乃至重重如因陀羅網諸世界內今此文中但顯遍在第七重中娑婆同類剎內餘略不說下諸結通皆約此辨上文光覺品等所說會遍皆此准也又此依器世間說若約智正覺世間身及眾生世間身中所有世界乃至塵剎亦有如前重重無盡佛皆充遍准釋應知問若佛遍前九會等處者為同時遍前後遍耶設爾何失二俱有過若同時遍何有九會後次第若前後遍則佛及會不稱法界答同時前後遍所以者何法界體故同時遍法界用故前後遍用是體用常前後不礙同時體是用體常同時不礙前後如印中字印即同字不礙時字前後也問經說略毗盧但嚴華藏如何今說周遍法界一切剎海乃至塵剎皆其化境答但嚴華藏則為已嚴無盡剎海若爾者經何但言嚴華藏邪解云為顯諸佛嚴土行果互望無礙一即一切故毗盧嚴一華藏則已嚴淨法界諸佛一切剎海一切即一故法界諸佛所嚴剎海即為但嚴毗盧華藏如毗盧望餘佛既爾餘一一佛望餘亦然問若一佛化境則遍周法界餘一切佛更何處化答一佛化遍則為一切諸佛化遍舉毗盧望餘佛收攝既爾舉餘各各望餘亦然一即一切故一切即一故如十業佛云云文云皆見如來者謂由佛威神故令前十方一一會眾各皆見佛在當處會中此文意顯前十方一切處一一會皆儼然不散佛法界身該一切時遍一切處故後明助化遍一切會說法中二先明承佛力說法界十住後靡不下明承佛力見佛法界身前中法界十住者具主伴故一說即一切說故一切說即一說故後見法界身者一身不分多處恒見此一即一切也多身不合一處令見此一切即一也一多同時應感無礙是佛法界身矣文中有三世問及三寶等准釋可知第二佛以應法界身各昇當處帝釋殿中云不離一切菩提樹下而上昇等者據文則不離一切處而昇一處約理則不離一切處而昇一切處為顯一切即一一即一切故互舉爾若通而言之具有四句一不離一處昇一處二不離一處昇一切處三不離一切處昇一處四不離一切處昇一切處問動靜不俱去住懸別既言不離何復云昇答釋此略以三門分別一敘古二辨違三顯正初敘古四說一云釋迦本身不離道樹別起應化昇於天宮故曰不離而昇也一云不離是報身昇天是化身二身別故不礙有坐有昇也一云不起是法身昇天是化用一云此昇天之身是不住而至以往即不往故所以不起也不往即往故所以昇天也如云以不來相而來故二辨違者且前三說俱違本教此經九會皆說毗盧遮那法界十身不分法報化故第六會云釋迦佛者還於十身呼釋迦爾故名號品及入法界品中說摩耶夫人處並有明文第四師說但明昇相離故昇即無昇不離相離相即無礙三顯正者此佛神通同體業用即住是去去即是住住是體遍去是用應應是體應雖昇後而不離前體是應體雖不離前而昇後然此中有三無礙六相即三無礙者一去住無礙謂不離而昇故二多一無礙謂不離一切菩提樹下昇一天等具前四句故三合前二種無礙謂佛以不離而昇之身一處昇時即是前一切處不離而昇故六相即者一去住相即此有二種一住時即去時二住身即去身二多一相即亦有二種一謂一身昇即一切身昇二昇一處即昇一切處三前後相即此亦二種一前會即後會二前時即後時上三各二總六相即也又此帶前赴後有相入義至後之時二俱在故亦有帝網義後後之中有前前故思之問佛既同時遍在九會而不礙去住相即者則凡從前往後皆應云不離前復而往後何故但云不離前耶答此顯二義一顯相即義謂前即是後故但云不離前則已是不離後也二顯相順義謂用順體故雖前後歷然而不礙同時普遍體順用故雖同時普遍不壞前後次第故依次第理但說不離已經之處不說未經以其不壞前後相故問九會所顯因果雖別然帶前赴後事理應齊何唯三天會有餘並無耶答從前往後理實皆相連帶為顯別義故致異同謂第二會與初會同在人間相去非遠故略不說不離菩提樹下又即由此二會相近後三會初皆舉樹下攝普光殿故亦不云即此三會同詮賢位故遞相望說帶前赴後第六七會所詮望前相無相別不可帶相契於無相故𨷂昇天不離等說第八會所詮行位細微同生解中證一會頓彰五位行相體用已融不待帶昇以顯第九會所證入證玄妙體用一味亦不假帶前赴後融會之爾第三十方天王各見佛來嚴殿座等於中二先明見佛彰其根就後即以下明嚴殿座表嚴根欲為法器於中十一句初句總餘句別別中前七句依報嚴次二句正報嚴後一句通二嚴或天放光或寶光故第四十方天王請佛居殿中二初結前可知後曲躬下請於中二先三業慇敬後唯願下正顯願詞前中三業文顯語業再三者歎德無盡故善來之言略有四義一稱機來故二應時來故三不來來故四帶法界會來故後願詞可知第五佛智受請入殿者謂根緣契合故十方亦如是者結前所明第七重處也第六樂音止息者顯三賢行相有勝劣故此有三說一云十住十行止勝觀劣迴向望於住行觀勝止劣故以樂音息不息相表差別也一云住行多脩會相歸性故以樂音止息表迴向多脩以理從事觀故以樂音不息表也一云住行多脩寂觀少起事行迴向多脩事行然不乖寂而起大用故以音樂息不息表也雖有三說大略相似共無異途任取所當第七天王憶昔佛入此殿自種善根中二先明佛力令天王得宿住隨念憶昔佛所於此植善可知後迦葉如來下正明偈讚於中二初明此方天王偈讚後如此世界下結通十方天王偈讚前中但列十佛者表說十住故豈不說十顯無盡耶不爾天王憶昔見佛種善不至無盡故何故天王說偈餘不說者是所應器最上首故問經文自云天王偈讚十佛功德何故今乃科判讚殿答讚佛欲顯殿勝所因偈云如是勝德吉祥之人既皆曾入此殿當知此殿是吉祥處也文中十頌一一各分為二初三句顯殿勝所因於中二初兩句標佛名略讚德後一句述德者入殿後一句結成殿勝初頌中迦葉者此云飲光是飲光仙人種中現生故取族望為名飲光仙者彼仙身光能映奪人間光明使盡如吞飲之故立其稱二中云拘那牟尼者正云迦那迦牟尼言迦那迦者金也牟尼者寂也或曰金仙謂身真金色心恒恬寂近瑜世仙故或名仙三中迦羅鳩駄者具云迦羅鳩忖駄此云所應斷已斷惑業苦也四中毗舍浮者正云毗濕婆部言毗濕婆者此云遍一切也部者自在也謂普於諸法自在無礙故或云遍勝五中尸棄者正云或棄那此云持髻或云有髻六中毗婆尸者此云淨觀或云勝觀見亦曰勝見亦曰遍見七中弗沙者正云勃沙此云增盛八中提舍者正云底沙依西域訓字底是底邏那此云度也沙是皤沙此云說也謂說法度人故或曰說已當說法故九中婆頭摩者此云赤蓮華十中然燈者智度云此佛從初現生乃至成佛舉身常光如然燈故或曰錠光亦其義也此十佛中後七是前莊嚴劫佛如何曾得入此殿耶本疏兩釋一據世劫等相入故二約處有麤妙麤者隨劫壞滅細者常存如法華云天人見劫盡大火所燒時我土常安隱故又如維摩云梵王見淨舍利弗見穢亦其類故後結通中二先牒前後十方世界下類通普結可知第八明佛普坐殿殿忽寬容此依業用門同體即成小大無礙亦名廣狹無礙結通可知須彌頂上偈讚品第十四將釋此品四門同前初釋名者須彌頂上是處偈讚是法此即須彌頂上之偈讚法依處以標顯依主釋也若依梵本具名應云如來於須彌頂神變集會菩薩說偈品此即如來於須彌頂之神變集會菩薩說偈依主釋也品字望所詮亦是依主二來意者前品明化主應機是當會遠方便今此明助化說偈是當會近方便故須來也三宗趣者此中以集眾偈讚為宗成後正說為趣四釋文中三初明集眾二爾時世尊下明放光三爾時法慧下明偈讚初中二先辨此方後如此世界下結通諸剎前中七一佛力者集眾因也二十方各有下明眾集大數三從百佛下明來處近遠謂前十此百顯漸增之相四其名下辨列其名同名慧者表十解故五所從下明來處剎名同名華者表此解慧依無著故六各於下明來處剎中同名月者表解開敷十行華故七是諸下設般列坐後結通者十方世界皆同具前七門事也本疏云問准此結通即於十方盡空世界皆有菩薩而來集者且如東方過百剎塵數外亦有眾集未知彼因陀華界為在何處餘界亦爾答彼百剎塵數外眾集之處彼因陀華界還從彼向東百剎塵數外與此相似餘界亦爾是故諸會各見本眾來集不見東眾過向西亦不見西眾過向東以諸本會處定是多集眾普應一為一切如佛普應一為一切普應餘可准思二放光中五一放光主謂世尊也二放光處謂佛足指指能令身住立表十住成位不退故三光數四光相妙色表住中慧解細密而照五光照處謂十方盡空世界須彌頂上佛會皆現此則一光照一切一切光亦爾重褺無礙無不互見為一法界大會也三偈讚中十菩薩說偈即為十段初一是總餘九是別以法慧是說法主故通敘此會本末事意總顯佛德餘九別歎佛理教等初中十頌分二前七敘會中事後三舉因釋成前中一敘此品放光二敘前品天王請佛偈讚三敘此品中菩薩來集四次二頌敘集眾結通初一敘菩薩名剎皆同後一辨佛名同五次二敘佛不離覺樹下而昇天等初一明恒在一切閻浮會後一明普在十方須彌山頂皆佛神力後三頌舉因結果初一舉因謂佛於過去遍彼諸剎發心求佛常發此願依願行滿今成彼果後二明依前行願得普遍大用一身雲普遍二慧光滅闇可知第二一切慧中十頌分四初三明佛非妄見次三明解真覩佛次三明簡妄異真後一推功歸本就初三頌分二初二明迷理依我見佛雖見如盲覩於中初一顯因後一辨果其顯因頌中梵本云盡於多百劫依我見導師彼於救世者不能知法理性後一頌明順理觀蘊等唯是假名梵本云觀察此諸法自性不可得生滅悉皆如但示現名字言示現者如幻相故二次三解真覩佛中一明佛離生滅上半真境下半真見二明佛泯能所謂無所取無能見上半初句標法體次句泯也下半上句明法即是佛下句顯法體離圖度三明見益上半顯所知下半辨益惑盡故三次三簡妄異真中一不了相是無相相故而作有取故不見佛也二了相是無相不隨生住滅等大三相遷雖住無所住故雖遍而不動故三由了前相無相等所以見佛真體無礙惑也四後一推功歸本中上半牒前說下半述己聞第三勝慧者解佛勝智之慧故名也十頌分四初三明妄執不見佛次二明了真見佛次四喻況得失後一推功在本就初三中初一總標所見能見真妄異故妄見不到真境上半標真境有三一智德廣大二不為滿德輙見三世無與等下半標非妄境謂可破壞故名世墮虗偽中故名間佛非如此思所到故云莫能及後二別顯於中初一明以相取佛故不見佛由佛非倒根境故梵本云愚夫思佛時生想不如理若於佛離見淨治一切想後一明以體取佛故不見佛由佛非漏蘊為體故或取蘊幻相不識實性故名迷惑無知者此二頌或前約凡夫見後約二乘見二次二頌明了法實性見佛者異前小執兼異權大於中初一明了性見佛後一釋了之行相前中既了蘊性非品守性則己亦乃見佛法界身雲所以者何由了相即性見即性根之相故不同餘宗後釋了行相中上半釋前上半下半釋前下半就釋上半中約前後色心相望無性佛以無性成故了此即為見佛謂由前蘊滅後蘊方生後蘊續起顯前開導此則相望成緣各無自性無性之性即是佛體是故欲識佛體先當觀蘊起滅也涅槃二十九云師子吼言世尊如佛所說一切諸法有二種因一者正因二者緣因以是二因體無縛解是五陰者念念生滅如其生滅誰縛誰解世尊因此五陰生後五陰此陰自滅不至彼陰雖不至彼能生彼陰如子生牙子不至牙雖不至牙而能生牙眾生亦爾云何縛解佛言善男子諦聽諦聽當為汝說如人捨命受大苦時乃至云眾生業果亦復如是此陰滅時彼陰續生如燈生闇滅燈滅闇生善男子如蠟印印泥印與泥合印滅文成而蠟印不變在泥文非泥出不餘處來以印因緣而生是文現在陰滅中陰陰生是現在陰終不變為中陰五陰中陰五陰亦非自生不從餘來成因現五陰生中陰陰如印印泥印壞文成名雖無差時節各異釋曰由緣因故則前滅後生成緣起相由正因故後緣起相無性所成是故生滅恒相續但不相至故中論第四云若因前五陰有後五陰者應是從他生如縷應作布然縷無布下半釋前下半者續成前文了性見佛也三次四頌喻況得失中初三喻不見失於中一雖有因𨷂緣失二雖有緣因障失謂心有障故不淨也又亦無淨信心故三雖有緣𨷂因失謂無見理之慧後一喻前真見之得謂除無明翳離妄想色絕諸法見方得見佛此無見之見四後一推功歸本上半牒前下半述己為離己我慢故又令法成鉤鏁故第四功德慧者解功德法之慧故名也十頌分七初一頌明凡夫迷真妄執異法為真即諸外道數勝論等執冥性神我等廣敘如前第一記中由彼妄執不識實性故致輪迴云云可見二次一頌明二乘學有執心外法有實自體若說若思皆妄非真由此法執障真唯心也三次一頌明初心菩薩教學者但謂外壞八識變現非如來藏第一義心無不了此將何正慧為菩提因慧既顛倒無惡不增長也四次二頌明不見佛為損佛以法性為體若不見法性即是不見佛體於中前一頌半正明無法眼見佛故損後半頌明觀脩法眼觀佛五次二頌明是佛為益於中前頌得了真智如佛知法性益後頌得了真智如佛知法性益後頌得了俗智如佛見世間益六次二頌釋前見法性於中前頌釋見行相後頌上半釋法性體下半釋佛覺此法性亦令眾生覺此七末後一頌推功於先第五釋進慧者以勤觀真理故名也十頌分三初一癡妄之失次八明真悟之得後一推功顯實初中上半壞淨眼下半由癡不見佛二次八中初二明所執無相觀前一離所取後一離能取前中論說遍計所執有二義一情有二理無此中上半知於情有名如實不倒下半知於理無名本真見佛如迷木見鬼知鬼是迷有名如實知知鬼本無舉體是木名知妄本真所以者何由見鬼者則不見鬼見本者乃見鬼故二離能取中以前所取既盡能取應息上半明存能見即為垢障智不見理下半明離能見則智見理佛如見鬼則不見木離鬼方見木迷悟相翻理數皆爾次三明緣起無性觀一遣所緣二泯能緣三辨觀益初中明依他有二義一幻有二無性於中上半緣起世間但是言說幻妄下半知即無生方名見世二中泯能緣者初句牒前見世間若此見見於世間此見即是世間之想如實言之見與世間無異如是知名真見三中觀益者初句牒前等觀下三句顯四益一離妄二斷障三證無漏四用自在後三明圓成無性觀一牒前二性無二正顯真性三明觀益初中上三句明前二性皆無所有下句辨無之性本清淨故二中顯真性者上半明真性體有相無下半明離言成觀三中明觀益者一於法離妄想二不樂著法三證理不待脩四見佛益三後一推功顯德可知第六善慧者積眾善而見理故名也十頌分五初二舉佛實德次三明佛說法次二泯能所見次一結知佛及法益後二推功德結初中一佛德希有二能見者難得前中初兩句顯利他德有二種一希現令欣二勇健益物下句結德歸佛次一句明自利德亦二種一離所知障垢二煩惱障解脫下句通結二利後見者離得中上半述自所見下半積智方覩如也二次三明佛說法相中四初一頌明眾生即法性初三句會相歸性下句引說證成前中上二句言速歸盡等者謂有為諸行當相即盡不待遷壞此盡是無盡盡德無自性即是法性法性體常故名無盡如上文云無盡平等妙法界上下斯文其例寔繁勝鬘云如來色無盡亦此類也次句辨體喻顯下句引說證成並可知二次一頌明能說同所說於中上半會相上句牒前引證能說下句唯所說無性故亦無說下半出因謂能說自性是無盡法性故得會相盡即性其相盡是不盡盡故名難思也三次兩句明法性非眾生謂法性是常眾生無常前會相歸性明性相不離今顯不即四末後兩句明知此真實非即離義則見佛也三次二泯能所見中一無能所為能所謂眾生性空故即以無眾生而作眾生稱此而見見亦如彼故以非見而為見爾下半釋成謂以見及眾生俱無性故二遣能所而現真性上半遣能所見及彼見者下半不壞真性而現了知四次一結知佛及法益中上半結如上所知佛及說法下半辨知利益謂如毗盧遮那佛光照世間此人亦當成就此益五後二頌推功總結初中上半佛示一道法下半進慧說為多後中上半離有無想下半見佛住真第七智慧者聞慧究竟照佛境故名也十頌分四初一顯自名義次六凡愚違理不見佛次二頌順理見佛後一釋佛名義以顯其至理初中上半聞教生慧光光即照用下半普照見佛二次六中初一人執違理上半明理實無人下半橫計造業梵本云陰處此是諸眾生苦中眾生以自性不亦於中有少許此是假言說迴文應云陰處諸眾生以眾生自體於中無少物但是假言說二法執乖理上半起法執謂觀身實相凡愚計內等法實下半明佛超彼執故非彼見三無二空慧眼不見上半失益謂以二執障翳慧眼不覩真理故不見佛下半具損謂由二執故於生死海多劫流轉四釋彼生死謂諸凡夫具惑業苦乖理違諍故為生死二乘之人以永斷名為涅槃就實無故云二俱不可得五明二乘人執著前二乘大乘道六於佛執取故不能見三次二順理見佛中一頌三句顯法超言後一句明佛亦爾四後一釋佛名義以顯其理於中上三句顯義下句結名謂佛既永斷分別根根即法執明知離妄方見佛也第八真實慧者以見佛法界真實身故名也十頌分五初五顯佛名能益聞者於中初一明令知聞佛名益故寧受苦得聞後一明昔不知不能忍苦求聞所以至今流轉二次一釋前名有何義聞獲斯益釋云於真俗境無倒現證無倒現證者照和合相即非和合相故如是覺照究竟成滿名無上覺三次二顯前名下何體立此名邪於中初一釋義後一辨益釋中依體立名名不異體名詮自體體不異名名既無合為義其體亦然益中可知四次二重顯前名於中初一明能覺智稱真俗境而覺謂於真境覺實俗境覺不實覺真境外無俗俗境外無真二境鎔融非即非離為究竟解名佛也後一明離能所覺謂離能覺智無別所覺境離所覺境無別能覺智以一性故一性故如此覺了方名能所覺由二俱離下句結云一法不可得五後三重顯前名體無和合義於中初一顯諸法無依以一多緣和合故離和合相也次一明諸法無能所作以從妄想業緣所生起故諸業緣中一一望餘為一多和合作果故無能所作後一明諸法無住初三句釋以諸緣業果無能所作故諸法名體定安一處竟不可得下句結成謂諸佛住此無依無作無住畢竟不動成真體得覺名也第九無上慧中十頌分三謂初一頌釋自名義二次八頌顯佛勝德三後一頌推功及結初一可知二次八中前六明佛內證德後二外化德前中初二明所證深次二明能證離後二泯能所證就初二中總五義初頌初句標所證故云佛所得處於中四一非緣所作亦離所作證以離境界相故二非分別所及亦離差別相三非五識得故無麤者也四非意識知故無細者也後頌初句亦標所證於中一義謂無為不墮數故正覺離數者此以能顯所也下句結所證次二中初四義一標智及用普二用益謂滅眾生惑三用無所用照相離故四非用而用無照照故滅眾惑故後頌六義於中初五義釋前照相離謂一滅惑暗時智自反照不取此用者自相故不著也二即由此不起所用有自相故無念也三不恃此用有功能故不染也四用於境無二別物相對故無住也五照境時不作分限相故無處所也後一義釋前無照照故云不壞法性性即體也謂智用皆是法皆有體故後二泯能所證中初頌上半正明泯能所之二二既不立一亦不存以一斯二說一還是二故下半讚智巧證如斯之處後頌泯無二之跡所以者何若存二無還即是二以無離有立故無二亦泯也三界一切空此離有無之無性空非對有之空故中論頌云執有名為常計無則為斷若離於有無是名真實空執有取體相執無著無體不存於有無是故真實觀下句結益可知上來明佛內證德竟後二明佛外化德中初頌教住正法上半總教下半令住無所住見身實體後頌釋成見自身實體上半釋身謂非身為身以緣起無性故云非起此釋非身也又即此無起而起故云現起此釋而說身也下半釋見謂身既非有見亦如身觀身既爾故云是佛無上身亦可見自實體即是見佛身也後一推功及結中上半推所說下半結聞益第十堅慧者了佛境界淨慧增固故名也十頌分三初六顯佛大悲德次三明慶遇見聞後一結讚無盡初中一總標謂上半能救上句智光廣大下句悲願勇健下半為物出興二別顯大悲見物流轉三唯佛能救四佛及菩薩方能與樂五佛及弟子亦爾六標見聞獲益次三慶遇中一慶己見聞益二同會菩薩同斯見聞宿緣力三慶重見佛增淨信喜而得讚說佛智無盡後結讚中上三句結能讚人多復各讚逕多劫下句結佛德深廣說猶不可盡十住品第十五將釋此品四門同前初釋名者創此得位不退名住又諸佛法界慧能安住故本業下卷云住空性位故名為位乃至云心生一切功德故不名地但名住住義多種依則說十總言十住帶數釋也依梵本中具名演說菩薩十住品菩薩是能得十住法之人十住是所得位法此皆所詮也演說是開顯為能詮也謂於此品開顯菩薩得十住位法故若依此釋則通有四種一依主釋謂菩薩之十住故二帶數釋約十顯名故三有財釋十住是菩薩所有故四持業釋人法相即故二來意者前二品是當會中序自下三品是其正宗故次來也三宗趣者以十住解行德為宗成後十行為趣四釋文者就此正宗三品經文即為三節初解次行後德就初品中分二先長行後偈頌前中七分一三昧分二以三昧力下加持分三法慧菩薩下起分四告諸下本分五佛子云何下說分六爾時佛神力下瑞應分七又以佛神力下證成分就初分中文四一入定人謂法慧菩薩何故此菩薩入者是眾尊故顯此十住是慧解故二承佛力者為顯隨順師資義故示此菩薩無我慢故三入定意者有五種一顯所說法非思量境界故二以此定是法體故三顯非證不說故四觀機審法故五為受佛加故四定名者謂標人別法及簡非果定故云菩薩能發巧慧故稱方便巧慧多門故曰無量三昧具言謂三摩地此云等持具如前釋第二加分中三一總辨能加二為增長下顯加所為三善男子如當下正明加相初中六一顯能加諸佛方所望行為劣故云千也後佛數同此釋各字二義一十方各二就一一方中諸剎相去各有二千下彰能加佛數十地論云何故多佛加顯於法及法師增長恭敬心故又顯一切佛同說故此通因果二人說也三皆同下顯佛名同說法菩薩者有四意故一明得法不異故二此菩薩聞佛同己名已重增踴悅故三顯住中說因果同故四顯諸佛於住門顯現即名法慧以法力故法爾故四普現其前者顯彼十方佛不來而至故五善男子汝能下彰得深定言汝能者顯餘不能故所以者何入此定者希有難得自非十方佛力毗盧宿願及現威神并自善根餘無能入故問佛何舉定名於眾中歎耶答為欲令眾各知渴仰故六善男子十方下明得定因文中二初別顯後入此下總結前中二先明正顯得定因後亦是下轉顯加因謂入定則加持為因加持則願等為因所因雖異然加定同時後當具釋前中諸佛自述由己等力加者佛若不說眾則不知法慧在定不應說故為令大眾生敬仰故多佛加同名加如前顯後轉顯加因中三一毗盧宿願二毗盧現力三自善根力十地論云彼佛先作是願今復自加何以先有此願者佛曾過去見有斯事即發願故後總結中二先結入定因後結說法因問加之與定何先後耶若先定故後加則不應云汝能入此三昧此是十方諸佛菩薩共加於汝又是毗盧乃至云及汝善根力故入此三昧若先加後定則不應在三昧分後方說加分又十地論加分釋云何故加為說此法故不言為入三昧故加又彼釋意加中云何故唯加金剛藏不加餘者以是菩薩得此三昧餘不得故既俱文證如何會通答據此等文似各前後理實二事同時成就所以者何若未定而加則發心不能勝致諸佛加持之力若未加而定則自力不堪入此深定是故正加時入定正入定時受加也二加所為中十一句前十別辨後一總結前中一為令未得十住菩薩聞說住已增長無師自然智故二為令證得無礙法界故三為令了知所化種性故四為令往所化處無障礙故五為令自行無障故六令得勝善增化法故七為令得佛證真智故八為令悟佛了俗智故九為令知所化根故十為令得陀羅尼辨才故後一總結為欲發起未入十住菩薩令進入故三加相中三初語業加次是時諸佛即與下明意業加後是時諸佛各申下明身業加初中何故先語業加者因前語便故何以語加者令增辨才故辨有二種一他力辨二自力辨經云承佛威神故而演說法故又此勸承力說即為加相也二意加者令益智故文中三先加次何以故徵後此三昧下釋初中與十種智一無礙者謂四無礙解智說法所依故二無著者是無著辨才智謂於所說無所著故三無斷者是任放辨才智不待說次言詞不斷處處隨意不忘名義故四無癡者明了文義無癡闇故五無異者所說同佛無差別故六無失者不求名利說故七無量者於一切法一切器隨所應說無限量故八無勝者非菩薩智所能通設餘佛智亦不可勝故九無懈者說法無疲倦故十無奪者無有能相映奪令闇昧故依此辨說無有制伏令退屈故次徵者謂諸如來有力有慈於諸菩薩能與能普令何獨與法慧十智故後釋云此三昧力法如是者謂由法慧得此三昧三昧之力法應招致諸佛力加故十地論云以是菩薩得此三昧法餘者不得故三身加者令增威力故令起三昧故文中四一諸佛者顯多佛加故多義如前二各申者顯多佛同各觀觸頂不相障礙是相即自在故又各不離本處手復不長此是延促無礙亦去者住無礙故三右手者顯佛隨順法慧所說亦彰法慧所說稱順法界及所作故四摩頂者顯法慧所說上稟尊力故第三起分者略由四義故從定起謂一三昧事訖故二已得勝力故三說法時至故四定無言說故如十地住起分中釋第四本分中二先明住體後彼菩薩住下辨住相前中二先對前後諸位料簡後正釋文前中何故十信不明此者未成位故此是位體故何以故此名住處者謂此菩薩大菩提心以三種心為其體一直心二深心三大悲心雖三賢十地同此三心以為體然欲簡別賢上中下故各寄一心說為體性而此三心凡有其一必具餘二𨷂則非也今此住位由是慧解直心相顯慧為眾行所依故名住處之舊經譯云種姓者四種姓中習種姓也五種性內菩薩性也種性之位亦住處故中賢位體名為行者由是菩提心體中深心樂脩一切諸善行故舊經譯為行業是也上賢位體名大願者由是菩提心體中大悲心救護一切苦眾生故謂彼菩薩位相漸高大悲轉厚將前稱理所脩行海一一迴向一切眾生令離苦得樂故十地位體名願善決定者地位最勝體具三心菩提心中大悲為首故舉其首攝餘二心但云願也故十地論釋云顛善決定者如初地中說發菩提心即此本分中願是是故菩提心為諸位通體亦為總句餘句依之而建立故十住十行無大善者表位劣故大善即是遍眾生界攝化利益之大用故後釋文中四一菩薩位處二廣大與法界等三與虗空等四住三世諸佛家初是總句謂此菩薩住處廣大與法界等乃至住三世佛家言菩薩者是能住者故住處者是所住處謂菩薩假者所生不簡淨土穢土六趣四生貴賤貧富但有增長菩提心處願生其中故菩提心是菩薩住處餘如前說二廣大與法界等者謂此位菩薩大菩提心是一切佛根本故廣大也法界故大也此廣及大皆等大法界故云與等此句准論是勝善也謂大法界故是勝善也大法界真如觀勝諸凡夫及二乘智淨故是勝善也大善巧說大乘法故勝善也三與虗空等者謂大菩提果依菩提心體中正念真如法生故如色法依虗空立故此文准論是因善也因有二種一無常愛果因謂大菩提於有為界不可愛相故二常果因於無為界顯離障性故此亦則為生了二因義如常說四佛子菩薩住三世諸佛家者此位菩薩於菩提心三種體中是初直心以此亦名十解位故雖此三心非即非離能依非即常正念真如法直解菩提心此心即菩薩生處故名佛家三世佛無別故云三世准論此名不怯弱善謂由此必諸佛護念此位不慮解心不明於位有退是故總名不怯弱善上來四種若於地上無分別智證理必然名為決定若於地前隨行勝劣各得自位必無有差失名為決定後明住相中四一牒前許說此總句也二諸佛子下標數引證謂三世佛果無不皆由十住為因是故同說三依數列名者一發心謂經十千劫脩信行滿入位不退創發大心名發心住此發心即住是持業釋本業云一劫二劫一恒二恒佛所行十信信三寶常住脩八萬四千度行不作邪見乃至云常隨佛多聞多求方便始入空界故二治地者脩治前心令離過失於八萬四千法門清淨明白心有生成住持之義故名為地從喻立稱脩治之地依主釋也三脩行者脩無性觀長養諸行此脩即行持業為名四生貴者生在佛家種性清淨是最尊貴依主名也五具足方便者多習無量善根故謂帶真隨俗脩習萬行是巧方便亦是具足義此具足即方便持業為名若准下頌中具足度生善巧方便即是具足之方便依主釋也六正心者成就第六般若故謂聞違順音住平等忍不隨相故正之心故依主釋也七不退者入於無生畢竟空性心常行空無相願故謂止觀雙運不為緣壞故此即從他受稱八童真者心不生倒不起邪魔破菩提心故謂脩真如觀成離染行故此童即真持業釋也九法王子者從法王教生解常紹佛家故謂應機巧說紹繼佛故此法王之子依主也十灌頂者從前九住空觀得無生心最極故謂位滿行成諸佛法水注其心頂從喻名故如輪王子將紹王位令四剎利種各持金鍾盛四海水灌其身頂故此即從喻得名非六釋攝或可從喻同依主釋也四是名下總結顯勝可知第五說分中釋十住即為十段初住中二先徵起名字可知後此菩薩見下依名廣釋釋中二先明自分是護煩惱行後佛子此菩薩下明勝進是護小乘行前中二初明發心緣後此菩薩緣下緣難得法前中十一句初十句別釋後一句總結別中一見佛貌嚴二見佛相具三見佛為樂眾見四知佛難遇五見佛威力六見佛神變七聞佛與授記八聞佛與教誡九見苦眾生十聞佛為說菩薩藏法界一段總結者謂既緣悲智之境而發心是故不求世間及二乘果以彼不永能拔濟故後緣難得法中三初標次列後結標謂十種智力佛果方獲故云難得列名中略釋如前法品廣在別章後結可知後勝進中五一標謂此菩薩者即此位菩薩也進求勝位故須勸勵故云勵也下並准此二徵可知三依標別列一勸勤供佛二勸樂住生死心無厭三勸為主化導四勸為物說第一妙法五讚勸學佛無能制力六勸脩種如來相善根七勸生佛前八為說等持勸脩九勸令摧生死輪十勸令與苦眾生作歸處問此中第二句勸樂住生死第九句勸生佛前讚離生死如何會通答此意為令自他成不住行故謂前一句是即智之悲雖樂出離生佛會中而未曾捨三有救護後二句是即悲之智雖樂住生死而常近佛摧生死輪互舉似違通論是一四重徵意云以何益故須此勸邪五重釋意云為令得二種益故文中二先明別益欲令所發大菩提心得增廣故後有所聞下明諸住通益此有兩釋一云聞重生解要由善知識為增上緣故云有所聞法然其生解從自種起故云即自開解不由他悟一云多聞重習雖依善知識然此聞熏不離自心第一義諦心中無別他故是以解籍師資則云有所聞法也師及所說不離自心故曰即自開解不由他悟也下文云雖知前諸法悟不由師求善知識常無厭足者語雖翻覆會意同耶上兩釋中後解為勝下諸住中並准此釋第二治地住中徵釋同前分判釋內自分勝遠亦同前判就自分中於眾生起十心有二義一於一一眾生各起此十心二為辨此十心差別故對十種眾生釋異初一總謂欲聞令得出世故二於苦眾生起救拔心三於貧財起給施心四在不定聚者令住正定聚五剛強者憐愍六柔耎者攝受教發心七已發心者守護不令退八劣己者將為齊己九齊己推為師十過己者敬同佛此十心略同第二地依大悲利益眾生或增上五義同第四集義非集果義讀誦者知後勝進中文五同前標徵可知釋中十法一勸眾生讀誦至教廣聞義理二閑處思前所聞三思有疑就師四問師及與餘人言聞以柔語小語不現語難相語令前人心悅語五問師及說法翻八非時六不以勝負說法故離怯也七觀境了唯心又義亦是前有疑問師蒙決之義八既了唯心順觀脩行九既順觀行離異熟愚真實義愚十既離二愚習所成性不可改動又於義明了自無猶豫名不動又心自明了不為他悟亦名不動四重徵意云何不但脩前自分行更須此勸他故五重釋中文二初別後通別益者謂但自分脩治非令悲增既自分心辨後勸勉他方得悲增長也後通益者如前可知第三脩行住者梵本中名瑜伽住瑜伽此云觀行觀之名皆順所詮如文可見文中徵釋自分勝進皆同前判自分中四一總標謂於蘊處界等諸有為法脩十觀行二徵數可知三列名中一無常者是總句脩行此觀漸頓不同漸有二種一約時分位二約性差別前中三一觀蘊等遷流性一期分位無常相二觀剎那生滅無常相三觀自體不成實無常相二約性中亦三一觀所執性是無物無常謂無物可常故二觀依他性是生滅無常謂行隨故三觀圓成實性是離不離無常謂障無障別故如辨中邊說頓者觀蘊等生滅相即不生滅所以者何法若有實生滅則無常故說身無常不厭身故二苦者觀蘊等逼迫性洞達空無所起故所以者何蘊等相盡即性透徹無餘由是違觸本來不起以不起方有苦也約三性觀亦如中邊論說三空者觀蘊等究竟無所有故又所執無相故空依他無生故空圓成無性故空四無我者觀五蘊界等中無主宰故不自在故又蘊等中我與無我無差別故所以者何我以無我為自性故五無作者觀蘊等中假者既無何有所作業六無味者業因尚無況有所貪五欲實味七不如名者依名召體推體非有無體何以當名故又如者稱順也觀蘊等名體皆因生緣成待對假立各無自實可相稱順體若不如名名豈有邪名即是法名亦有名展轉相望皆無實體廣釋名義不相稱順如無性論第六四尋思觀處說八無處所者觀蘊等相本無生起離住方所若在方所則是有生故九離分別者觀蘊等無生則離分別分別即是差別異名梵語通故又心蘊相盡誰有分別故十無堅實者觀蘊等虗假如幻幻相本盡故後勝進中五初標二徵可知三列名中十句准頌各有二義一觀其事相因緣差別委細歷然二觀彼事相平等一性四徵可知五釋中二初別益者欲使觀理事鎔融無障礙慧得明了故二通益准前第四生貴住中二初徵可知後此菩薩從聖下釋釋中初自分內四一釋名及標數生貴之名准頌及此文總有三種一約教謂此菩薩從多聞熏習等流無漏教法而生其身此即教法實為尊貴故斯文是也二約理謂此菩薩悟平等理得其自體此即理法實是尊貴故下頌云了達諸有無所有超過彼法生法界三約佛謂此菩薩生佛種中此即聖種尊貴故下頌云佛子於法如是觀從佛觀生名佛子准此三說會之則一所謂因佛聞教因教會理展轉相由不相離也二依數總徵可知三依徵別列於中一於法界生勝解不退二信佛心堅三觀法寂滅四至十皆了虗妄所以者何眾生依正皆妄因果故菩薩離言念以言中謂涅槃為寂靜無住等亦為妄也四結數可知二勝進中五初標二徵可知三所謂下別列十句分二初九約以性從相故說三世佛法佛所得法名為佛法謂菩提也後一約即相之性故說三世佛平等也前中三一解佛菩提二依解起行三依行得果後一約即相之性者謂三世及佛差別歷然而即平等一性也四徵意云何以勸學此故五釋中二初別益意云此菩薩生三世佛種中故即應知三世佛及法相性鎔融之義不爾不名生佛貴種由此知故則真俗平等之智增進也二通益准前第五具足方便住中二初徵可知二此菩薩所脩下釋釋中自分內十句初總餘別總中云此菩薩至皆為九字貫通諸句言救護者免濟在苦厄者故二饒益者令脩善故三安樂者令得善果故四衰愍者令不著樂故五度說者令脩出離行故六離灾者令離三灾八難故七出生死苦者令出分段變易二種生死苦故八發生信者授八正法令除疑故九調伏者授與三學故十證涅槃者令得究竟三德果故後勝進中五初標二徵可知三所謂下別列中十句分二初六知諸眾生數量眾多差別後四知彼眾多差別即無差別平等一相前中一無泥畔二無分限三非算計知四非節度得五色數廣六非秤量盡後四中轉釋之以第四釋第一第一釋第二第二釋第三遞相顯意謂一無自性者蘊處界等俱緣成故皆無自體二由法尚無性故假者何有三假者既空誰復造業四能起之業尚無寧有所起之果四徵意同前五釋中二初別益內意云欲令此菩薩知眾生數量眾多差別即非數量眾多差別即非數量眾多差別而亦不壞幻相歷然可見令此解心轉增勝故二通益同前第六正心住中初徵後釋釋中自分內四一總標二徵數可知三列名中十句分三初四約所教三寶及行脩音聲忍次三約所度眾生脩音聲忍後三約所知法界脩音聲忍此十皆云於佛法中心定不動者聞讚不加珍重毀不起輕慢心如故不改動也上句顯非世間剛猛心頑愚心同上句云於佛法中者非無記不善愚迷等心故下句云心定不動者也知諸法自體故無性理故如幻如夢故無分別故於讚毀不見二相由此忍解正解正見不動如覺者知夢幻師知幻彼等豈復取幻相夢境為實邪就初四句中三寶及行是菩薩所欣仰境聞讚應喜聞毀應惱由知讚毀同一無性故無分別心不動也次三中菩薩度生悉欲令盡聞少無垢易度應喜聞多有垢難度應憂然則不爾由前義故准思可見後三中法性離於數於數量成壞有無今既聞之理難忍受由前道理正念思惟故於彼言無所動亂也後勝進中五一標二徵可知三別列中十句准頌此菩薩常樂聽聞此十法非脩觀也初無相者謂樂聞蘊處界中界如等相無差別故二無體者蘊等緣生故三不可脩者造業無故四無所有者所造業無故五無真實者所趣果虗故六空者真空故七無性者實性故八如幻者似有故九如夢者似實故十無分別者平等故又以後五句釋前五句謂空故無相無自性故無體業如幻故不可脩果似實故如夢能聽聞心無真實故無分別此十句前後相釋十地論中有此體惑四徵意云何須樂聽此十句邪五釋中初別益者便此菩薩無生慧增明故後通益准前可知第七不退住中標釋釋內自分勝進自分中四一標數二徵可知三別列中聞十種言音不退轉者菩薩得音聲忍有淺有深前位但聞讚毀三寶非總撥無而心不動為淺忍也今此乃聞三寶有無言傷甚不退為難既得不退為深忍也十中初三約三寶次二約菩薩行次三約三世佛後二約佛智境不退所因准前位釋或隨所應如理解釋心不退轉聞惡不退聞善不轉轉移轉也謂一聞佛有者應機現故無者非世有故二聞法有者理法可證教法隨機行法尅果果法讎因故無者理教行果離妄有故三有菩薩等者大乘種性決定有故無者佛種從緣自性無故四聞菩薩行有者如前說無離三輪故五聞菩薩脩行出離如前說不出離若有出離則無出離故六七八中三世佛有無者過未佛以今望彼無也各據緣會時說有也現在有無如初句說九佛智有盡無盡者此有二種一約智用緣境二約智體離相前中二種一分相二融攝分相亦二種一緣世俗二緣勝義世俗境可破壞故有限量故了彼智名有盡也勝義境無滅壞故離分限故了彼智名無盡也二融攝者謂世俗境有盡勝義境無盡然此二境二而不二不二而二故能了彼智名盡無盡謂知世俗即勝義故盡即無盡也知勝義即世俗故無盡即盡也二境無礙故了彼之智亦無礙也二約智體離相者謂智體即真有無俱離有相盡故名智有盡無相盡故名智無盡十聞三世一相者三世平等故非一相者不壞世俗故四結可知後勝進中五謂初標二徵可知三別列中十句五對一一多相即者約色心時方身處等或約位相或約業用說也二文隨於義等者約教義相即此准純淨無漏亦通位用此上兩對四句依事事無礙後三非有即有者無為即有為也有即非有者有為即無為也四無相即相者真如德相即有為相狀故相即無相者有為相狀即真如德相故五無性即性者有為法無自性即真如自體故性即無性者真如自性即有為法無自性故此上三對依理事無礙說四徵准前五釋中別益意云欲令於理事法中離限礙故二通益可知第八童真住中標釋自分勝進文同前科就自分中徵名標數徵數列名結數並標徵列結如前標云十業者即身語意之所為也徵數可知列中三一初三無失三業為化體無失有二種一者無過失謂若三業所作與惑相應皆為過失今此無礙故云無過失二者無錯失謂身無非威儀語無猝暴音意無忘失念此三具獲唯果分得通因或依法性鎔融斯亦具足二次一隨意受生者若頓悟菩薩隨願生故名隨意生若漸悟菩薩地前客受變易身故隨所欲生發意須至彼故名隨意受生三次五化境於中初四知所化欲解性業後一知所化依果四後一既知所化根欲隨應現通結文可知後勝進中標徵可知列中十句分二初六於剎自在謂初及四意業餘身業後四於三業自在謂一意二身三語四通三業四徵五釋並可知第九法王子住中徵釋自分勝進判亦同前自分中標徵亦可知三中十句一知受生者此通三一知引淨業感總別報二知九種命終心受生差別三知彼種種受生而無來處二知煩惱現起者謂現行諸惑三知習氣相續者習氣謂諸煩惱種熏而習之同彼氣分故相續者無間斷故非如現行故四知所行方便者此通二義一脩自利善巧二脩利他善巧五知無量法者謂廣知教法六解諸威儀者謂法師威儀庠序生善乃至語言審諦七知所化所依剎差別八知所化所依時差別九知所化宜聞四種世俗安立道理十知所化宜聞不可言說法性時非安立諦又知九十兩句不即不離鎔融無礙四結可知後勝進中初標二徵可知三列中十句皆言法王者此既法王子住故應於此學佛施為初六皆云處者處猶位也初善巧者謂學佛隨機安立種種乘教一乘三乘五乘乃至無量乘八萬四千教門乃至佛剎微塵數威儀路攝化眾生此皆善巧安立也二軌度者隨於佛果位中所應施作令佛位中所行法度也三宮殿者大悲故四趣入者三慧趣入三空門故五觀察者審機故六灌頂者學佛以佛所證甘露法性水灌位滿菩薩心頂故七力持者學佛以神力持菩薩故八無畏者學佛四無畏十無畏法故九宴寢者學佛所入定故十讚歎者有二種一學佛讚諸菩薩令增勇銳二學佛讚諸曩所脩行今菩薩學故四徵可知五釋中二初別益內二種一為令所增二為無障礙二通益准前第十灌頂位中徵起別釋自分勝進判皆同前自分中四初標二徵亦可知三列名二十句前十句明業用自在後十句顯下位不測前業用中初五約所化依果以顯以自在於中一動剎二照剎三住持謂以神力持欲壞剎令住四遊剎五嚴剎作神變等此五多依神境智通以皆緣外色或內身故作轉變等其第四或名如意通以其往還自在故或名身通以內身轉變往還故隨相立此三名實是一通爾第五嚴淨有二種一宿因嚴謂菩薩萬行皆為嚴士因故如經序第一中說二現力嚴謂佛菩薩以神通力變現嚴事故如此所說後五約能所益以顯自在中初三能益一開示法門二觀機欲樂三知根生就後二所益一令信解趣入二令心調起行後十下位不測中三初列次結後釋初中一身量二身所作三於情非情所作無擁四於情非情轉變自在五六七知三世境八嚴土行九緣眾生心為境十緣佛智為境次結難可知後釋誰不知後勝進中五初標二徵可知三列中一學佛三達智二明了佛法三知理事無礙法界四知法界無邊五遍知一切世界六光照一切剎七神力持一切剎令住不壞八知眾生根欲性九知一切有為法性相十知佛一切種智四徵可知五釋中二初別益中欲令一切種智因漸增長故後通益可知第六瑞應分中二初此界後如此下結通十方就此界中二先動地後雨供前中三一動因二動處此望行向最劣故表動一萬佛剎塵數剎也三動相後雨供中十種可知後結通中二初標後十方下結前中略標三事一處二所說法三神變後結可知第七證成分中亦二先此界後如於此下類遍十方身前中四一顯彼來因二作如是下讚此所說三我等下述己作證於中六一主伴同名二土三佛伴名自同四義五眾六教亦主伴名同四佛子下顯其來意後類通可知此上瑞應證成二分應在偈頌後安所以者何有四因故一未說偈頌經猶未了不應豫瑞豫證故二瑞證本為證經既瑞證長行而不瑞證偈頌則應偈頌非經故三證不應云我等佛所亦說十住文句義理悉亦如是無增減故四若許二分全在頌前即事應頌中頌此二分假使梵本如此前後即合譯者迴文文既不迴致令文有舛誤此譯人之謬非結集之過下諸會中有此者准釋應知問何故作證菩薩與此說法菩薩及眾會能所詮等彼此名同彼佛及剎與此別邪答若此彼令同則無主伴彼此令別則非主伴故於佛及剎別者簡主伴有殊所餘同者明主伴同類第二大段偈頌分中總有一百頌分二初九十一偈正頌前十住法後如是十住下九頌結歎勸脩前中頌十住即為十段初住中有四十六頌分五初三頌頌前發心緣二從三世下十頌頌所求十力各一頌一力三隨諸下二頌頌求所知二諦法四欲悉下二十頌頌所求佛果廣大三業於中分四一初十頌頌身業自在二欲以下三頌頌語業自在三欲使下六頌頌意業自在四欲以下一頌總結三業廣大自在五菩薩如是下十一頌頌前勝進所學十法初十各頌一法後一總結並准前知第二住中有五頌初二頌前自分十心次二頌勝進十法後一結說第三住中五頌初二頌自分行後三頌勝進行第四住中六頌初三頌自分後三頌勝進第五住中五頌初三頌自分次一頌勝進後一結歎第六住中四頌初三頌自分後一頌勝進第七住中四頌初二頌自分後二頌勝進第八住中五頌初三頌自分後二頌勝進第九住中五頌初二頌自分後三頌勝進第十住中六頌初三頌自分次一辨位後二頌勝進第二大段結歎勸脩中九頌分三初一總歎十住次七別歎發心住於中第六第七兩頌勘梵本少異六中梵云如上所有諸世界悉皆分拆為微塵若有眾生知此數方能了斯佛子行七中梵云過現未來十方佛所有獨覺及聲聞於此初心功德量欲說令盡不可得後一頌以初心類後轉益難量故梵本云如上所說菩提心功德充滿眾生界何況所餘諸妙行豈有於此能稱說上來頌中二初頌前十住後結歎勸脩兩段不同總明偈頌竟上來文有七分謂三昧分加持分起分本分說分瑞證分重頌分總明十住品竟梵行品第十六將釋此品四門同前初釋名者梵是梵音具云勃濫摩此翻為淨行淨行有二種謂相及離相聲聞唯依相脩名為梵行菩薩唯脩離相名為梵行是以聲聞梵行乃是菩薩污行由執見故但是假名非真梵行是故文中於戒等推徵顯共無性方為梵行此即隨順觀世諦入第一義諦所推二諦非即離境是淨也能推二諦非即離心是行也而此心境亦非即離非即故梵之行依主釋也非離故梵即行持業釋也故文云菩薩脩梵行時應以十法而為所緣作意觀察二來意中三一前品明諸住別行今顯諸住通行故來也二前明正位今辨成位之行故來也三前品諸住之末皆云有所聞法即自開解不由他教雖標其言未顯其義今此顯故來也三宗趣者以會相歸性為宗速達無上菩提為趣四釋文中二先問後法慧菩薩言下答前中二先經家標能所問人後佛子下正顯問端前中能問是正念天子者正念表此所明能觀之心離斷常見故天子者表此所明所觀境淨故法慧菩薩為所問者謂以融真俗法之巧慧答前問故後正顯問端中三一明能脩觀行人謂出家菩薩二云何下問得成梵行清淨所因三從菩薩下問從因得果後法慧答中二初答第二問後若諸菩薩下答第三問何故不答今問者初問通在後二答故前中二初總據能脩行人觀察十法為得梵行清淨所因後所謂下別顯所脩行法前中云十法為所緣者是所觀境也言作意觀察者是能觀心也後別顯所脩行法中二初明自分行法後復應脩習下辨勝進行法前中二先明對緣脩梵行觀後如是觀已下辨觀成利益前中二先總顯後若身下分別辨前中二初列十法為觀境後應如是下明觀心對境略顯推徵問何要觀此十法顯梵行耶答此十法是梵行緣故謂梵行依戒戒依眾緣即自身三業業具為能受體三寶為能受緣戒是所受法若不觀察此十各無自性但取相堅持為梵行者使同權小無真梵行是故要常觀此十法問二乘法執持戒可使不同菩薩權教大乘脩二空戒望實教脩持豈差別邪答權大乘中二空但依所執性說若因緣生法似有不無梵行依戒戒從眾緣即是彼立緣生不無之法不無意存不同所執然不與圓成非一非異故此不無乃是理外之事於能所護持見有見無以為梵行故成唯識云若不執菩提有情實有無由發起猛利悲願是故今此一一推徵相盡現理為真梵行後別辨中依觀十境即為十段第一觀身中二先牒後破破中十事一云則為非善者梵行是諸善所依身是不善承所依故二法既殊明知身非梵行梵行何在二非法者梵行可軌身非可軌是無記故明知此身不是梵行梵行何在三渾濁者梵行是至信出離所成身是不信真實義心所得是故身非梵行若不爾者則應世間一切迷其實義愚而持戒者皆其梵行准此若違實教而持戒者皆無真梵行也四臭惡者梵行戒香芬美身是惑苦臭惡故身非梵行五不淨者梵行清淨身令不淨謂種子住處自相自性畢竟故身非梵行六可厭者梵行樂因可以願求身是苦果如前不淨可以厭捨故非梵行七違逆者梵行是順勝義諦脩身是違勝義諦得故身非梵行八雜染者梵行純淨所成身是雜染業起故身非梵行九死屍者謂身無所知無恩報等同於死屍有所覺知屬身業故死屍無知既無梵行身無知故無梵行也十蟲聚者依此經十藏品及觀佛三昧海經皆說身中有八萬戶蟲小宗中說身即蟲聚故觀佛三昧經云身中有八萬戶蟲戶有九億小蟲大婆沙說人身皮肉並是蟲聚蟲頭在內食人所食蟲尾在外辨作人皮今徵破云身既蟲聚身是梵行蟲亦即身蟲應梵行蟲既不爾身云何然當知其身都非梵行梵行何在第二觀身業中二先牒後破前中身之作用名為身業破中十事言行住等者謂住等並是身作用相而此作用皆依於身前徵身無業依何起說業所作各具眾緣一一之中何者是業餘如前說第三語具十事破中音聲風息者謂風擊七處所發音聲又胷舌唯等皆語業具徵破云此諸緣具一一之中誰是具邪若一是者應不待餘餘亦如是若各相待則各無具若不相待亦無有具具既不有依何起業為受戒餘戒緣無故則無無有戒有戒故無梵行也第四語業十事破中安立說者謂假施設說諸法故隨俗說者隨世名言說諸法故顯了說者離隱密相說諸法故餘文可知徵破云前文徵破業具尚無況此處有作業可得又業一一各眾緣成一一緣中何者是業業既無矣乃至何有梵行第五觀意十事破中覺觀者覺麤觀細思慧為性令身安住不安住為相分別者三分別中自性故七分別中任運故種種分別者隨念計度故有相無相尋求伺察染污不染污故憶念者於曾更境但追記一故種種憶念者於多追記故思惟者於一籌度故種種思惟者於多籌度故幻術者能變現故眠是四不定中眠數輕眠有夢取境昧略徵破云此中意是心王餘是心所為業之具既具多法一一法中誰是具邪若王是具應不待所若所是具應不待王諸所相望當知亦爾推具既無以何作業成能受戒體受體既無則無有戒戒無故無梵行也第六觀意業十事破中分四初思數思能造業故次一想數是意加行令意成業根本故次四解數識合根境由業引境故後四受數亦由業引故此亦業眷屬也成唯識云業之眷屬亦立業名故徵破云前破業具體無業已非有況業眾法令一一皆無餘如前說問寒熱等觸在五識地今何別在意業中邪答此由三義一由相應義謂意識與五有同緣境故二由意識用強有彼同分緣故三由意識於極樂地有樂觸故純苦趣中意有苦故寒熱准故問前業具中有覺觀思憶等後業中亦說思等有何差別答思等皆有二相一體二用體謂自性與王同是業之具故用謂作用與王相應同一所緣而作業故各有所據故別列也第七觀佛者受菩薩戒及聲聞戒皆先歸三寶為根本得戒所依依戒有梵行今約聲聞戒依觀察梵行所以者何聲聞戒中不亡法執有無見等故此徵破破中十事初五五蘊者聲聞乘中以無漏戒定慧解脫解脫知見及眷屬無漏五蘊為佛法身以百劫脩相好業感三十二相八十種好有漏報為佛報身以神通變化隨機應現種種形類為佛化身聲香味觸四塵為體徵破云若佛是梵行者佛三身中各具多法一一法中何者是佛若一是佛應不待餘餘亦如是若各相待則無有佛若不相待亦無有佛佛既非有依誰有戒戒既不有梵行何憑二相者謂三十二相一一相中何者是佛餘如前說三好者謂八十種好一一好中何者是佛餘如前說四神通者謂六神通初神境者神謂等持不測之義轉變外事難測量故外事名境二天眼者眼謂照矚天即四禪彼界大造遠見無㝵故三天耳者耳謂聽聞天如前說遠聞無㝵故四他心者緣他心王雖亦緣所從定加行意樂立名五宿住者緣宿多生五蘊所住六漏盡者煩惱種現俱亡故謂漏盡者由通力能知他漏盡故或漏盡者身中起通故上並各於所緣無倒了達妙用無礙俱名為通徵破云一一通中具有多法一一法內何者是通通既非有將何為佛佛尚不有依何得戒餘如前說五行業者謂經三大劫阿僧仚耶脩菩薩行六度四攝四無㝵等無邊行業徵破云於彼諸行一一之中何者是佛遍推無佛況有戒邪餘如前說六果報者謂智斷二果智有二種一者盡智二無生智盡智者謂正自智我已知苦斷集證滅脩道無生智者謂正自智我已知苦斷集證滅復知苦斷集證滅脩道不應更復知苦斷集證滅脩道徵破云若有苦可知乃至有道可脩則無智果智果既無將何為佛佛既非有戒依誰得戒既不有梵行何從所以者何無智無得方得智果故斷有二種一者有餘依二無餘依依謂惑滅所得擇滅無為作有餘依體身智若滅但是無常無記滅故不待擇滅重難前擇滅作無餘依體今徵破云若有煩惱擇令斷滅得斷果者則無斷果所以者何無能所斷得斷果故既有能所斷則無斷果斷果既無將何為佛佛既不有依誰得戒餘如前說或彼有餘無有涅槃涅槃唯屬彼有苦故又無餘依亦無涅槃無明住地及無漏業意生身等煩惱業報三餘在故如佛性論第三中說既無涅槃何名為佛佛既非有從誰得戒何有梵行第八觀法八事破中初一理法次三果法次二教法後二行法徵破云若理法是梵行者則無梵行以擇滅理有多數量一一數中誰是理法餘如前說次三果法中初一斷果後二智果斷果如前涅槃中說後智果中不生者無生智也不起者盡智也釋相徵破並如前說次二教法中初約所說後約能說前中徵破云所說教義字名句等眾法合成而有所說於中一一所說皆無若即以此不可說法為梵行者則梵行非有餘如前說後能說中無分別者分別有二種一言說二尋伺言加行故而此能說加行及果眾法合成一一法中無能分別若以如是無分別說為梵行者則梵行非有餘如前說後二行法中初約行體後約行用前中依無所說也教隨成行故則行無所行若以如是無所行法為梵行者則梵行非有餘如前說後行用中合集生果為行業用行體尚無用依何起餘如前說第九觀僧十事破中前八約名體破後二約德用破前中敘四向及果諸說雖異大意略同雜集婆沙恐繁不述今依瑜伽聲聞地略顯其相約般若以會觀謂意無所入名入流等於中先約名後約體前中初預流向者謂見道位有二種一真見道謂世第一法無間彼惑滅增上引無分別智生絕諸戲論證人無我所顯真性依出世智也二相見道謂由前證真如已欲差別說自所證處即復擬議彼真見道作十六種謂苦法忍乃至道類智總斷見道所斷一百一十二根本煩惱謂迷欲界四諦各十隨眠色無色界各三十六各除嗔故此前十五心皆為趣向所求果故名之為向徵破云真見道中絕諸戲論不可名言何有向邪相見道中所斷迷諦惑之品數皆是擬議非如實故亦無有向又能所斷相對及前後相望皆從緣合無一獨立故無一法名為向者既無有向以誰為僧既無有僧梵行何託二云預流果者謂第十六心道類智緣道諦故得預聖流名為預流道類智生得預流果入脩道也徵破云果不自果因向成果向既不立果何有邪有因道類智生方制此果又能所斷等眾緣合故立此果名故非有也果既非有說誰為僧既無有僧梵行何寄而得立邪三云一來向者謂脩道中已斷欲界五品煩惱安住彼道即第六品無㝵道二義徵破一斷惑五品合共成故二住第六品無㝵道相望成故結破如前四云一來果者謂已斷欲第六品惑安住彼道即第六品解脫道二義徵破一約能所因故二約能所住道緣成離作無有此果結如前說五云不還向者謂脩道中已斷欲界七八品惑安住彼道即第九品無㝵道二義徵破准前向中結亦准之六云不還果者謂於脩道已斷欲界第九品惑安住勝道即第九品解脫道二義徵破准前果中結亦准之云阿羅漢向者謂前不還果中有五人一中般二生般三有行般四無行般五阿羅漢向斷色界并有頂地前八品惑盡及第九品無㝵道皆名阿羅漢向能所斷惑及能所住道二義徵破准前可知結亦准前五人具釋如雜集第十三說八云阿羅漢果者此有二種一盡智二無生智謂有頂地第九品解脫道有此二智乃至未般無餘涅槃已來所有無漏聖慧皆名阿羅漢果斷惑住道二義徵破亦並准前阿羅漢既非有誰名為僧僧既無矣戒依誰有戒既不有梵行何從上來約名破訖二約體破者謂有為無為二種果體無為體者謂初預流中斷欲界四諦下見道惑盡四品無為斷色無色界四諦下見道惑盡四品無為總有八品向人七品果人具八也言有為者取道類智俱生無漏五蘊二十九法以為其體謂善大地十種即嗔貪無愧信輕安不放逸不害精進捨等通大地有十謂想欲觸慧念思解脫憶定受等覺觀心五無表色四相及得也二一來中無為體向人斷欲脩五品惑有五品無為果人六品惑盡及各通前見道八品有十二十四等有為同前二十九法三不還中無為體向人斷欲脩七八二品果人斷第九品惑盡又各通前見道所斷有十五十七品無為也有為同前二十九法四阿羅漢中無為體向人斷四禪三空各九品脩惑盡及有頂地前八品惑盡果人斷第九品惑盡并前總有一百四品無為也有為體者非想脩惑向人第九品無㝵道果人第九品解脫道數皆同前二十九法俱生無漏五蘊為體徵破云向果所有有為無為為體皆約數量數量一一誰是其體若一是者應待約餘既待他則無自餘亦爾推體既無僧則非有無僧故無戒無戒故無梵行如是推無方真梵行後二約德用破中初云三明者一宿命明亦名宿住隨念智證明通達解了前際法故二天眼明亦名死生智證明通達解了後際法故三漏盡明亦名漏盡智證明通達解了涅槃性故如次對治過未現愚故徵破云慧對治愚方名為明此則明非明也明無故無德無德用德用既無將何為僧僧既非有依誰有戒戒無故無梵行也五云六通者一神境智證二天眼智證三天耳智證四他心智證五宿住隨念智證六漏盡智證皆名通者於自所緣無倒了達妙用無㝵故徵破云於六通中依慧依境或依等持緣合成用用無自體假為立名德用既無將何為僧僧既是無從何有戒戒既非有梵行何憑也上來九門約梵行疎所依緣徵顯梵行訖自下第十據梵行親所依緣徵顯梵行中二初牒後為壇場下徵破於中十事皆通聲聞菩薩戒緣前八約受後二據隨前中初云壇場者謂別結界二藏各自有文可知二問清淨者聲聞問十三難百遮等菩薩問七逆等三教威儀者菩薩八萬如梵網經說聲聞三千如別行本及眾學等四三說羯磨者謂聲聞戒白四羯磨受菩薩戒如善戒經及玄弉三藏所譯彌勒菩薩造菩薩受戒羯磨說五和上者聲聞戒比丘為和上菩薩戒佛為和上六阿闍梨者聲聞有二謂羯磨威儀也菩薩戒唯一羯磨師善戒云大師者十方諸佛是小師者我身是也師有二種一可見二不可見不可見者十方諸佛菩薩僧是可見者我是今於可見不可見師邊是人得菩薩戒七剃髮八著袈裟衣者由是出家菩薩受戒故後二隨戒內初是四聖種中一也後是離四五等邪命四邪命謂仰口下口方口遣口活命故五邪命謂為利故誑現奇特為利故自說功德為利故占相吉凶高聲現威望他敬畏為利故講說經典上來明對緣脩梵行觀訖問上來十觀為約受聲聞戒者起見破邪為約受菩薩戒者起聲聞見破邪若依前破便乖本問亦違初答若依後破僧謂中何故破四向果耶答此中大意通前二種所以者何善戒經云受菩薩戒要先具前三戒方得與授問遮難中先問此事廣如彼說自下第二辨成觀利益中二初牒前推徵成觀後如是觀察下正顯得益前中二十一句分二初十句牒成觀後十一句牒推徵前十句中分四初三句明淨三輪觀不取能持戒故不著所污法故不住戒法故次戒三句明三世相盡觀次兩句因果盡觀作者受者不可得故後兩句明法不至法觀後牒推徵十一句中初一總後十別別中分六初一徵所從次一徵所屬次一徵體性次一徵所由次一徵有無後五徵五蘊後顯得益中十一句初十別說後一總結前中初一句總謂如是之言牒前成觀推徵兩段文即是答相答相即是清淨梵行言梵行法不可得者即前十問一百事徵皆非梵行故三世法空者前依三世中求相盡故二意無取著者前離不取能持戒及脩行故三心無障㝵者不住戒法故四所行無二者於一切所行境皆照無性故五方便自在者善巧觀心常現前故六受無相法者於相盡言教深忍樂故七觀無相法者隨所見聞皆觀無相故八知佛法平等者知佛自證此平等故九由此梵行觀智能具證得一切諸佛所證之法後一句總結可知上來自分行竟自下第二明勝進行者此即勝進行中之勝進也文中三初標次徵後列初中以自分已成仍須更進故曰復應進門不出三慧故云脩習仰學智力故依十法二徵可知三列中四一列名十力名義如前分別二於如來下觀十力名義諮問勝已成於聞慧於中二先聞後依教觀境前中一一力有無量義者謂諸智境後觀境聞中謂眾生不知處非處等理起悲不捨三思惟下成於思慧四行無上業下成於脩慧於中二先標後釋標云行無上業者佛以力智度生為業今此菩薩亦依佛智力度所緣境故不求果報者有二種一由智謂了因果如幻等故無所求二由悲謂見眾生迷淪理合救度故不求後報釋云了知境界等者謂了所度生也身緣集無我我所如幻受如夢中領納境界想取境相分齊如影行雖如響暫相應用然速遷流心雖變現種種境界如變化人自尚非實況有所作或此五喻不別配屬通譬人法上來總辨自分勝進行答前云何得梵行情淨問訖自下第二答前從因至果問中二先牒前起後後一切佛法下正答前問前中云能與如是觀相應者指前十問觀察梵行於諸法不二解者即還是彼觀相應心謂於一百事中一一推徵悉無所有差別見盡故云不生二解後正答中三先總標次初發下別釋後知一切下出因初中云一切佛法者謂若如前脩梵行得佛果所有理智法故疾得現前者現論在即故次別釋云初發心等者前云疾得菩提未定何時為疾故此別明初發心時謂十住中初發心住創得成位故云初發心時此約因脩法性位上下相即觀說三出因中二先正顯謂以知一切法即心自性故離自心性更無別佛乃至一切後成就下結成謂一切法既不離自心故即是佛成就無師自然智心外無他故云不由他悟上來二初答得梵行清淨問後答從菩薩位到菩提果問雖兩段不同總答問竟上來有二初正念天子問後法慧菩薩答兩段雖殊共明一品經也梵行品釋竟初發心功德品第十七將釋此品四門同前初釋名中二先得名後釋名前中按梵本名初發心菩薩功德藏品初者十住中第一住故發心者起三種心增上脩諸行故此即三發心中解行發心也起信云發心有三種一信成就二解行三證解行發心者當知轉勝以是菩薩從初正信已來於第一阿僧祇劫將欲滿故於真如法中深解現前所脩離相乃至廣說順法性脩諸波羅蜜餘二發心具說如彼菩薩者約位以顯人故功德者約人以顯德故即此脩行力用圓滿饒益己得在己故藏者謂此菩薩初發心中蘊積無邊勝功德故後釋名者初住之發心依主釋以此發心通三賢故初發心之菩薩初發心菩薩之功德初發心菩薩功德之藏皆依主釋二來意中二義一由前二品明住自分勝進行今此顯彼行之功德故來也二由前品末云初發心時即得阿耨菩提彼中雖有言未釋其義今此解彼是故來也三宗趣者以辨初發心具攝普真法界因果為宗令種性菩薩皆增勇銳為趣四釋文中二初長行後爾時法慧下偈頌前中二初明此界所說後如此娑婆下結通十方前中四一請段分二法慧菩薩下解釋分三爾時佛神力下現瑞分四是時十方下證成分初中何故天帝問者在彼宮故聞前所說生疑念故疑云初心有幾功德前說初心即得佛耶第二解釋分中三初歎所問深難二雖然下法喻廣顯三發是心已下直就法說初中何不即辨先且歎者有二義故一約說深玄理合先讚故二欲令聞者用心異常故文中十一句分二初一總歎言此義者義謂境義功德分量智所知故甚深者且理玄叵測數廣難量雖深非甚也今乃即少而多即事而理深之至極故曰甚深後十句別難者開總成別皆帶總句謂彼甚深功德之量一非言說境故二非生滅識所知故三非妄想心能分別故四非依次第門起信解境故五非有所得境故六非有無相行境故七非有終極故八非籌量境故九非分量得故十無路無門可趣可入故或前總句為標後別句為釋釋是能成標是所成謂由十難顯甚深故第二法喻廣顯中先牒前起後後佛子假使下正顯前中云雖然者牒前十句雖依身力難說等也我常下起後謂承佛力可得說也後正顯中有十一大喻顯功德量一供生及益喻二者法多剎喻三知劫成壞喻四者他勝解喻五者他諸根喻六知欲樂喻七者他方便喻八者他心行喻九者他業行喻十者他煩惱喻十一知供佛功德喻初中三先校量顯勝二何以故徵三佛子一切下釋勝所由初中有十重校量初一廣說餘九略顯初中四一舉廣事二佛子於意下徵問三天帝下答四法慧下辨超過初中有四事廣一供具謂一切樂具二供田謂阿僧剎中眾生三供時謂一劫四利益謂令修五戒後九略顯中供及供田並同云一切樂具十阿僧剎中眾生而供及益各別謂百劫千劫百千劫億劫百億劫千億百千億那由他億百千那由億劫此中數劫次百千後即對億者以百千為百萬為億故此百百變數名也下並准知益謂十善四禪四無量四無色定四果辟支果二釋勝所由中四一問答顯多二法慧下比少猶劣三何以故徵四佛子下釋初二可知三徵意云如前功德既唯佛能知何因比此極少之分猶非類耶四釋中二初反顯謂不為齊限等故後為令下順釋謂為無限等故前中明初心無限故所生德亦即無限非如所喻供具等四皆有限也後順釋中十二句初句總餘句別總得初發心時誓令眾生悉當成佛佛種不斷非只令得五戒乃至緣覺別中一心廣往下頌應云為以大慈光遍一切世界翻前十阿僧祇世界故二行廣謂為廣一切等故三為知處廣謂得一種智知十方剎幾成壞等四為知所作廣謂知眾生報類垢淨五知剎實體或法性主六為知眾生心樂欲異煩惱輕重習氣麤細七為知眾生死生差別智八為知眾生根生熟九為知心令差別十為知三世業報智十一為知佛平等境上十一句皆所為無限故超彼也二佛子復置此喻下明知行多剎喻於中四初顯喻廣大二佛子此下辨菩薩超過三何以故徵四佛子下釋超所由初中二先東方十重言且置者置猶止也下皆准此後南西下類通九方總約百人所行世界二辨超過中可知三徵意同前四報中二先反顯謂非如彼有限故超也後為了下順釋中十一句初一總攝後所謂下別於中十句初五及第七顯相即謂麤妙覆仰小大廣狹一多淨穢六一多相入八微細多少剎體差別無差別九一中出多多無性十令知諸廣剎盡問所云為欲了知諸剎即入等者云何了知答准下頌中往彼諸剎今此但是了知諸剎故喻中知彼能速行者所往多剎菩薩非但知彼有限一類有顯之剎乃知盡知種種異剎及知諸剎無碍之相是故超彼其無碍相體德位業用本修因具如經前顯義門訖第三佛子復置下知劫成壞喻於中四初顯喻廣大二菩薩初發心下明超過三何以故徵四菩薩下釋初中三一辨東方十人二南方下類顯九方三佛子此下總結百人此雖略成壞實亦該攝住空釋四劫相具如劫章二超過可知三徵意准前四釋中二初反顯初心不齊故後為悉下順釋前中可知順釋中三初總比所謂下列後是名下釋前為欲知等之意初中可知問何故總中云為知世界成壞盡而別中乃說諸劫長短等平等義及相入等無碍相邪答前總中通標成壞劫簡非成壞者而別中所顯還知論後壞劫平等義相入無碍相若爾何故亦說無量無盡劫耶釋曰由為有量有盡相從說故二別中九句初長短如下壽量品說娑婆界內劫唯短矣首剎中劫唯長中間諸分內劫上下遞望亦長亦短言平等者有二義一准十地論釋長短等雖異相入義齊故云平等二劫長短一多等俱以無性為性故二一劫者或長或短但取其一無數者即是阿僧祇劫也三有無佛者謂如莊嚴劫賢劫星宿劫等是有佛劫從此已後六萬三千劫空過無佛出是無佛劫四一多劫有多一佛者如勝音剎種種莊嚴劫有十須彌山塵數佛出是一劫中有不可說佛又如頌云如來無量曠劫行自然正覺出世間於當來世無量劫身應一切如大雲是不可說劫中有一佛也五量無量劫者謂勝蓮華界已下諸剎內劫皆可比上為其一曰可據量故有限量故是有量劫也然即彼勝蓮華世界內劫更無有上可比曰故無限量故是無量劫也六盡無盡劫者謂諸成壞剎內劫有盡時故是有盡劫彼勝蓮華界非成壞剎故劫無有盡是無盡劫七念須劫可知八劫非劫相入者劫謂成壞中火等非劫謂劫前時分若依俱舍第十二說百二十剎那為一怛剎那六十怛剎那為一臘縛三十臘縛為一牟呼栗多三十牟呼栗多為一晝夜三十晝夜為一月十二月為年年中分三際謂寒熱雨從此已後未至成壞中大劫量已來雖多時分怛以年名之謂百千年等非以劫名之故亦名非劫故彼文云如是已辨剎那至年劫量不同今次當辨若准此經十定品說始從剎那須臾晝夜六時一日五日半月一月一時一年乃至百千那由他億年皆是非劫從此已去方名為劫廣說如彼第三定中又下文第六十四中毗目仙人執善財手令自見身於諸佛經歷年劫大同前說又有釋云法性為非劫者慮恐難通所以者何若是法性則不唯非劫亦非色等一切法故又亦不唯非非劫等法性即是一切法故若不爾者法性與劫如何相入又應但顯理事無㝵無相入義非事事無㝵業用門也九念須知三世剎內劫成壞空中二初發心所為事後發阿耨下能為心前中念須知廣但顯別相非總結前猶是同前於成壞劫所欲知故後能為心者此語令遍前八句中略故此顯前喻所明但是知一類剎中一類劫然是有限知有碍知而初心菩薩誓欲知種種剎種種劫皆無限量理事理事體用無㝵是故超彼不可比也三釋前為欲知言者謂前總別句中為欲知言比言應合句句安之略故不具此云是名初發心者牒前也大誓莊嚴者釋為欲也了知一切劫等者了知智神通者依通發慧而了知故此同下第四知盡未來際劫智神通第四佛子復置下明知他勝解喻按此中梵本云阿地目多阿地也目多解也譯家存略故但云解文中四初舉喻顯二佛子此下明初心超過三何以故徵可知四佛子下釋初中二先舉東方十人後南西下類通九方前中二先廣說二人謂初人一知念類剎中眾生勝解積如是念次經無數劫眾生解第二人無間知前無數劫所知積如是念後經無數劫知後次第下略舉八展轉望前以念知劫所知後類通九方總一百人也明超過中謂彼解雖多猶可知邊初心功德難得其際三徵可知四釋中二先反顯謂不作齊限發心故後為盡下順釋於中二初總可知後所謂下別別中二初標三章後欲悉知眾生海下依章開釋前中三者一欲知諸解差別故二欲知彼差別解一多平等故三欲得佛果能知差別解之智光方便後依章開釋中十句分三初三句開釋初章欲知眾生謂欲知眾生海各各差別解無邊故欲知三世三性差別解無邊故略無無記性也欲知相似不相似差別解無邊故次一句釋第二章平等有三種一約想謂此彼見解類同故二約性謂此彼俱無自性故三約無㝵謂此彼平望俱相即故雖通三義前依相即故此句釋後六句釋前第三章中三初一句釋前能知智光明謂智是佛十力智種種解智力次二句釋佛智所知不可說差別解於中初句內明六種解釋前不可說差別解一從凡夫至等覺已來所有勝解皆名有上二唯妙覺解名為無上三於所解境未能究盡名有餘四解已了終極名無餘解五此彼解齊名等六反此不等後句內明十二種解釋前不可說差別解一謂凡夫及二乘見有為法有和合相故名有依解二菩薩反彼名無依解三世出世人同境異解名為不共四自類同解名之為共或大小乘人同解緣生故有是共菩薩解此緣生未曾不空與二乘異名為不共五緣虗空等境無邊解故名無邊解六緣餘一切有限高齊境故名有邊解或執斷計常名有邊解離此見故名曰無邊七緣諸有為名差別解八緣無為境名無差別餘四可知後三句釋前得佛種種解智之方便就初句中五前四別顯後一總結前四內一解一切法無性即真故名妙解二解一一事皆包法界故名大解三解無量境名無量解或解難量境名無量解四無分別慧現證真解名正位解後一結前四種解等中得佛無㝵智此即是因亦名方便次一句釋佛解智知境種種勝解不同於中二先標能知之意後悉知下顯所知之解有六一不與諸見相應名淨解二反上名染三遍知名廣四反上名略五委照名細六粗了名麤後一句釋佛解智知境同前於中二先舉所知之解後一切下總結前中有六種解一解方廣至奧名深然非下乘所測名密二臨事製宜權實善巧故云方便三凡於一多法門決擇故云分別四於曾更事慣習淳熟不待作意任運勝解故云自然五從親因生解故本疏云宿因所發六從增上緣生解故本疏云善發開悟後總結有三一勝解多類不可具陳故總結如細二解類雖多悉欲知盡三結為知盡故發心第五佛子復置下明知他諸根喻中四初喻廣二佛子此下明發心超彼三何以故徵四菩薩下釋釋中反顯順釋同前順釋中總別准前別中據三業等多分同前故云廣說乃至等第六佛子復置下明知他欲樂喻文四同前第七佛子復置下明知他方便喻文四同前方便有二種一造業加行名為方便二所作善巧今此並通餘意准前第八佛子復置下明知他心王喻亦兼心所除此文中前深心所文四及意並准前釋第九佛子復置下明知他業喻謂善不善漏無漏等文四及意同前第十佛子復置下明知他煩惱喻文中四初明喻廣百人准前二佛子此下明發心超彼三何以故徵徵意同前四佛子下釋釋中二初反顯後為盡下順釋順釋中先總後所謂下別別中二先以六門別釋後發大悲下總結兼別前中第一門內文有二先知後治知中有三喻一輕重一對略辨十種一五住地煩惱中前四為輕障見脩道故後一為重障大菩提故二分別為輕少時頓斷故俱生為重多時漸斷故三諸斷品內下品道斷者為輕中上品道斷者為重中品道斷者為輕上品道斷者為重同等分者為輕稱境起故多分者為重通境起故五隨惑為輕大惑為重小隨為輕中大為重中隨為輕大隨為重六迷事為輕後智亦斷故迷理為重正體智斷故七習氣為輕正使為重八暫起起羸劣起者為輕多起常起猛利起者為重九不與邪邊見相應起者為輕反上為重十現行為輕種子為重見脩二執皆後斷故約識分別如理應思二眠起一對眠謂隨眠即諸種子起謂現起彼種現行三一一眾生下覺觀一對謂惡覺觀與惑相一一眾生種種覺觀無量煩惱涅槃說有八種覺觀一欲覺求可意事二嗔覺念欲嗔他三惱覺念欲惱他四親里覺憶念親緣五國土覺念世安危六不死覺積財資養七族姓覺念族高下八輕侮覺是慢自恃欺人後治中謂菩薩於諸煩惱悉欲知者意在對治不欲但知而已第二門中文二同前前中無明與愛一對謂發業無明潤生愛等後斷中為斷眾生結生相續故須知此第三門中文二准前前中等分非等分一對非等分謂於貪等劣境起增上貪等故等分者稱境起故後斷中為斷惑根故須知此第四門中文二准前前中利鈍一對我我所是利慢是鈍或我及我所一對慢通二故後斷中為覺悟我我所空故而知也第五門中文二同前前中有三對一顛倒分別與餘一切為一對二根本隨惑一對三身見與六十二見為一對後斷中可知第六門中文二同前前中蓋障一對謂五蓋即貪恚疑惡作睡眠惛沉掉舉也障謂二障三障或二三中但煩惱障後斷中兼於總別於中二先明發心所為後發阿耨下明能發心前中四一非救二慈護三令斷惑四令智淨後能發心可知第十一佛子復置下明供佛功德喻文中三一喻據量二何以下徵三佛子釋初中二先廣說一人喻後佛子復置下略說九人喻前中二先明供廣後佛子於汝下問答顯勝前中二先廣說東方後南西下略准九方前中五一供具廣謂種種上味等二供田廣謂東方多剎中佛及眾生三供時廣謂念念如是乃至經無數劫四剎行廣謂令彼眾生如己供養五顯彼佛滅後供廣於中有六一造多佛塔二高廣三多嚴四塔各像五像各光照多剎六經多劫後九方略准中一一同前後問答顯勝中二先問答顯供福皆多後佛子此人下明前供福比後發心不可為擬並可知後略說九人中二先顯供福甚多後佛子此前下將供福比發心福不可為擬前中九人展轉遞望無數多劫數量復增同阿僧祇品內從無數至不可說不可說中間雖有超然大方依比此中如第一人一念以無數供供十方各無數佛及無數剎各無數眾生如是念念經無數劫佛滅度後造塔供時等亦各無數此中無數之言至第二人皆增至無量第三增至無邊第四無等第五不可數第六不可稱第七不可思第八不可量第九不可說第十不可說不可說如第二人一念中作第一人無數劫供事第三人一念中作第二無量劫供事乃至第十人一念中作第九人不可說劫供事餘佛數等准知又皆以後位一念望前位極時則以如是之念相續至自位極時也後約供福比發心福不可擬中乃至少分比前極數亦不相及二徵意云彼第十人所供生福數雖不至不可說不可說轉然得供養之福豈不比於發心少分福邪三釋中二先反顯後為供下順釋釋意供福雖多心經有限發心縱少少即無限無限有二種一事二理事謂心境心為能限境為所限心於供具供田不以數量時劫為限而以無限為限由此少福亦無有限從無限心之所生故理謂彼福若多若少皆是法性相應所起是故少分亦稱性無限也故反顯中云不齊限但為等順釋中為供盡法界虗空界等第三直就法說中二初牒前所校量心後能知下明所攝功德前中云發是心已者簡未發時故云已也後攝功德中四一攝佛功德二以發心故下明得果法三纔發心下約時化用四此初發下顯所作無著初中四一標三世佛功德能信能知過現世法已從緣應故可得知未來法未有故但可信二彼諸下正明攝德謂此菩薩聞三世佛功德汝能信受等文中八句勒為三位初四句三賢謂信受兩句同是十住此中信者即十住之信不應劫發十信信故謂於三世佛所有功德起深勝解故受謂於彼領納心無逆故次修一句是十行謂於信受隨順行故次得一句是十迴向謂以所順行迴向不失能獲證故次知證成就三句是同十地知謂加行智解了如故證謂正體智冥契如故或正體如前後得名知成就者謂因行圓滿故後一句與諸佛平等一性者能同佛果故三何以下徵徵意云以何義故此菩薩於三世佛功德即能信受乃至能與佛果一體同此菩薩下釋釋中十一句初一總餘十別文並同前不煩更述二得果法中二先顯當得復應知下明即得然當得者果佛故即得者因佛故攝法同等因果不離若因不攝果法盡則非法性果之因若果法不全即是因則非法性因之果因果之相不一因果之體不異如是因果果因非即非離鎔融無碍方為法界因果也前中文二初四字明能得所由後常為下明所得果法就所得法中三初正顯所得二何以下徵三以是下釋初中八句一得果護念令增善不退二由不退當必得果三感佛授與自所得法四與三世同一體性五脩成諸佛助道行六三世佛力無畏皆成就七以三世佛不共法為嚴八得盡法界佛說法無㝵解智二徵意云何不說由三賢十地萬行圓滿得佛果法但云由初心得三釋中意云以此初心是萬行本故二即得果法中五句初一總餘四別初總云與佛同等未顯所因並別之狀故別說同事一境界者如問明品及出現品說二功德者謂攝度悲定力無畏等諸功德海三與佛隨應現身一多無㝵同等同得法界大智與佛同等或此後兩句合為一事謂得隨機現身一多無㝵智故三約時作用者謂纔發心時即得此應用故文中十一句一得諸佛同讚二能調化三能同多剎四能光照多剎五滅惡道苦六嚴淨多剎七示成多佛八攝機令喜九能證法性十能繼佛種十一得佛智因四明所緣無著中二初總標無能所著次所謂下別列無所著境後唯求下雙結無能所著初中云不於三世業者即後所列三寶現世世所攝故了知不離自心性故離此無少別物為所得無別少心為能得次別列中七對十四句前四後一五對約人法五六兩對約名義或總約名義後總結中二先一句明無所著意意等一切智後於謂下正雙結無所著行諸法界是差別事境餘可知問前列中既云於佛及佛法無所得後結中云唯求一切智常不相違答正前佛無所得則是唯求一切智也上來第二解釋分竟第三現瑞分中二初標現瑞所因謂佛神力故後十方下明所現瑞於中先明動剎瑞後雨眾下明雨物瑞前中二初標動遠近後所謂下顯震動相略顯如前廣辨如章雨物瑞中十事音聲謂歌讚第四證成分中內四初十方佛現身證成於中四一來更剎量二有萬下佛數量三顯佛名表所說法同說法表名故四各現下正明現身二作如是下讚說證成三我等下引同說證四汝說此下舉益證成舉益證成中二先明益現世復有二種一發心益二授記益後我等下益未來可知上來明此世界中說竟後結通十方無盡世界說法中二先明結通普遍盡空剎內同說此法後悉以下釋遍所由前中二初明說處十二重數內前十略同阿僧祇品中從第一百四數後十箇數內後二顯無限量後亦說下明所說所作能說者名並同後釋遍所由中十句一由此界他方諸佛威神令十方同說二由毗盧宿願三由為顯佛自得法四由為以佛智照五由為開實義六由為令眾生證法性七由為會眾聞稱根法八由為開佛所得法本因九由為得諸佛無㝵用互望無異法十由為令眾生了事法界無二上來第一大段長行竟第二大段偈頌中二先辨說偈意後為利下正顯偈詞前中十句一普觀十方同說此法之集會顯法界法門法爾如是不謀而應故二欲普成就故三欲普令絕惡業不受苦故四欲普令客塵斂顯本自清淨性故五普欲令拔去無明住地惑故六普欲令增普門信證信故七普欲令知眾生三乘根器及信等諸根故八普欲令知三世一相故九普欲令觀生死即涅槃故十法慧自欲增長無漏善根故故說此偈也第二正顯偈詞中總有一百二十一頌古來諸德不判此文唯本疏有科然望前長行解釋分中三段次第此乃翻彼從後向前謂初八十二頌頌前第三直就法說文次十方國下一十五頌頌前第二諸喻廣說文後發心無㝵下二十四頌頌前第一歎問深難之初中四初五十一頌頌自分行滿次欲得下二頌結歸初心次無量下二十八頌明勝進行滿後菩薩下一頌結屬初心就初自分行滿中分為十二節初三頌頌前發心充滿十方界第二頌梵本云盡虗空界如法界充滿世間如佛法一切遍行如諸佛剎世不退故隨入十方國土下三頌頌前知一切世界成壞等按梵本云菩薩常脩最勝行依細無依不可說於諸佛智見無厭彼能隨入法海流三哀愍五趣下三頌頌前為不斷如來種性四諸趣差下五頌頌前知眾生心行諸根及大願供佛等五其心清淨下三頌頌前知法甚深智六菩薩始發下四頌頌前發心即能說法調伏十方眾生智七菩薩具足下三頌頌前得三世佛智慧光明八為令眾生下五頌明忍苦說法體用行九十方世界下六頌顯供佛請法證理起用亦即頌頌前現成佛等十菩薩所得下七頌頌圓滿成果用於中第四頌按梵本云身滿諸剎勇猛土放勝光網遍世間普照眾生陰闇冥如龍王雨演大法十一一身示現下四頌明身心廣大亦頌前一身無量身等十二能所分別下五頌明絕妄契真頌前等真法界等二欲得最勝下二頌明結歸初心者前深廣大功德海皆此初心之德是故勤令脩學結結己所說三明勝進行滿二十八頌中分八初二頌明三種世間無染行二其心廣大下兩頌明悲智深廣行三無量難思下四頌明請法嚴土知根說法四無量無數下四頌明定慧自在知劫脩短五眾生是嚴下六頌明知佛十力自在德六菩薩於一毛孔下四頌明見三種世間如因陀羅網七如是大智下三頌明順佛普供聞供歡喜按梵本云如是無畏諸菩薩次二句同漢本第四句梵云於如來所獲大喜次一頌梵本云變身種種無量億現前供養十方佛示現最勝神通力佛所行處皆隨往八己護如來下三頌明定慧信悲無著深勝於中第三頌梵本云彼得廣大哀愍竟於諸眾生同己相見己除妄倍精勤行空無相等虗空四菩薩發心下一頌結上諸德皆發心功德量無齊限故讚述難盡上辨前直就法說竟第二大段頌諸喻廣說一十五偈中文顯可知然第十頌梵本世間種種惑業轉由此三業恒相續彼諸邊際有盡窮勝菩提心無限極第十一頌梵本云云何解脫業煩惱發心供養如來故煩惱既離業亦除哀愍三世皆令孔第三大段頌歎問深難二十四偈中分二前二十三頌正頌長行末後一頌舉益勸脩前中分十初三頌明發心深廣頌前甚深及難趣入於中初頌梵本云菩提心謂無著際一切有量此無量到眾生性菩提岸一切智智最勝力次頌梵本云菩提心等虗空界生諸功德如法界所行普遍同真如一切性離猶善逝二一切能捨下二頌明行廣大頌難知三三世一切下二頌明德門普頌前難知四菩提心下二頌明初心成佛頌前難信解於中第二頌內後兩句云智慧等者梵本云智慧無著應供尊根本皆由發心得五一切獨覺下三頌明能出生世出世樂頌前難證六往佛無㝵下二頌明智日行月德海淨空無不圓滿頌前難行七普發下二頌明行願圓備頌前難通達八了法自性下二頌明深廣同佛頌前難思惟九如眾生數六二頌明以住佛家必得佛智設經多劫說德無盡頌前難說十眾生心行下三頌頌以能出生三世界及世間樂是故心塵虗空不可比量頌難度量二末後一頌舉益勸脩初發心功德品釋竟明法品第十八將釋此品四門同前初中二先得名後釋名前中按梵本云達摩阿嚕迦娜忙鉢里勿多達摩法也阿嚕迦光明娜忙名也鉢里勿多品也名品相逼隨方語如經前第一記卷初說也然總云法光依攝大乘略敘五說一依無著總相釋云法光明者謂大法光故二世親釋云於名句文身能緣之心分明記故名法光明此約明記教文三無性釋云顯照行故名法光明如善誦習文字光明此據智用明照行法四梁攝論云以能照智名光明此論雖亦世親同本或西域自有廣略別行故此異爾前約心緣教分明記憶後約能照教智五有釋云後得所知所現相分名法光明此釋菩薩後得智能照能現二教法故名法光明謂照佛說本質教故自識顯現影像故今此品各望前諸說雖各無違契理符文無性梁論二釋稍現所以者何以此勝進趣十行故行要賴智明照教故故問中云彼諸菩薩於佛教中云何修習令諸如來皆生歡喜後釋名者若依無性則法是行法明是能顯照心謂於教明解則今所脩行三輪淨稱法性此即光明之行法依主釋也若依梁論約智用通於教行亦皆依主也二來意者前明十住自分行之勝德今辨十住趣後方便故來也三宗趣者以修習勝進趣後方便為宗務成後位為趣第四釋文中三初請說分二爾時法慧下正說分三時法慧下結說分初中二先長行後偈頌前中二初牒前自分行復彼諸下問後勝進行前中二初經家據能所問人後菩薩下正牒前品所說前中進慧問者表問勝進行教法慧答者表說行法慧光明故牒中七句初一總舉前初發心成無量德後六別辨一大誓嚴心二乘無碍法界智乘三得位不退四無生解成多背生滅蘊熏無生蘊種五生佛種己分同佛體此即攝受六既體分同佛則定當圓滿二問勝進中二先問所疑後一切菩薩下請說前中二先問所成行體後復次下問行所成德前中二初十句別問後佛子下結請前中初云彼諸菩薩者牒前初發心菩薩也云何脩習者問令諸佛憙能求前德之所因據後答意由住不放逸等故令佛憙即後由此成前品中所說功德餘准應知問其云何脩習豈非別是一句下答中不放逸是耶答不然若不放逸獨是修習下諸十十句應皆非修習何故文云復有十法令佛歡憙有十種法令諸菩薩速入地等皆此說邪二由巧成福慧速入十地三由十度令所行淨四由成就眾生無厭願滿五由願滿得普見佛等廣無盡藏六由得無盡藏福具悉淨能隨應說法七由說法利生時自增義利故不捨諸度具嚴淨十度行八由不捨諸度住大願乘隨所念眾生令增淨業出使解脫准梵本中隨彼諸菩薩者皆為說法令解脫九由菩薩說種種法度眾生智故令三寶不斷十由紹三寶故所行無生與方便慧相應皆迴向菩提無空過者並如下答中具顯後結請中二先結後請謂先結前所問何方便得後請隨問垂哀宣說二問行所成德中三初問行成因德二及餘無量下結因成果德三於諸如來下守護正法德初中准下答中麤相分為十二句云如諸菩薩等十一字貫通諸句言滅除等者此有兩釋一云問斷迷理迷事二種愚故一云問斷見脩惑障故二問降魔故三問制異道故四問究竟道所斷微細垢障故五問策勵諸行所依故六問脩淨土離諸難處故七問大智境云何淨故八問成就菩薩七法九問菩薩莊嚴六事十問知佛三種功德十一問佛所行境十二問三隨佛事隨樂現土隨根說法隨時說法並具如下說二結因果成論中有二先結因後疾與下成果前中心結前所說成滿不可更一一說故總結云諸行諸道諸境界皆滿諸行是助是菩提心是正道境界是所變後成果者由因滿故疾與果齊也三守護正法中二先明守護行後於一切下明守護益前中三一開演守護二摧敵守護三令久守護並顯可知二守護利益中七一王守護二世間敬善三諸佛護念與灌頂勘梵本云一切如來共所護念同灌其頂四菩薩愛敬五長無漏善六能演深法七持法自嚴並顯可知後請說中云所行次第請依問說故二偈頌中十一頌分四初一歡說者復次一頌前所說次三半頌前十一句所脩之行後五半頌前行所成德於中初三半頌前十二句因德究竟後二頌前守護利益於中前五句頌三守護後三句頌利益中菩薩愛敬得善根長自法餘略不頌第二大段正說分中二先長行及偈頌前中二先歎問許說後佛子菩薩下正答所問前中二先歎問後諦聽下許說前中二先讚問所為後佛子下讚問者德前中二先讚後問於下結問前中云善哉者所為廣大善中極故饒益者利益也令脩善因故安樂者令得樂果故慧利者雙顯利安故廣釋利安五種差別如前淨行品記中引佛地論第七卷說多所者廣故大故哀愍等者悲憐人天戀少妄樂失真常樂長流轉故後結問可知二讚問者德中五句一住無所住故云住實法二由住此實得無功用勤故云發大精進三由得無功勤故不可退轉四由不退故解脫麤重所緣等縛五由離縛無障無智明淨故問同佛也二許說中三初明誡邪勤發聞思二慧次我今下顯對尊卑己離我慢故推功於佛第二正答所問中二初答前所成行體後佛子菩薩摩訶薩下答後行所成德前中二先牒前起後後佛子下正答前中二初云菩薩已發一切智心者牒前問中菩薩初發一切智心也後應離下起後謂菩薩既已發心自分事訖更求後位須起加行加行雖有眾行唯不放逸為本體即精進無貪嗔癡故云應癡暗等守護之言通無貪嗔也二正益中依問次第答即為十段唯頌脩習屬不放逸就初段答脩習不放逸令佛歡憙行方便中有五十句分二前二十明令佛歡喜後三十句明正令佛歡憙行就前二十句中二初十句正明不放逸行後十句明由不放逸得清淨德前中四一總標二徵數三別列四總結初中云各不放逸者一釋如前一云遠離躭著五欲名不放逸二徵數可知三別列十句中一三聚淨戒廣故云眾戒然不放逸行持戒為本故先舉也二不同凡夫行故離愚不同二乘行故淨菩提心三好行真實四進脩無怠五設心欲退即自策言我自發心無人勸抑如何得退六有兩釋一云在家凡夫者不求出離道多造不善行出家凡夫者雖求出離與有漏相應一云無問在家出家但造順流轉行皆名凡夫不可親近隨放逸七所脩行唯迴向菩提八脩大離小行九修善相續十常自觀量力而行不令過分四總結可知後明由住不放逸得十清淨德中四一牒前知後二徵可知三列中一言行相應二憶識宿念故三住深等持四求法無倦為成聞慧五隨同觀察為成思慧六依定為成修慧及通七捨勝劣等見八利物無漏九敬菩提心如下文說彌伽聞善財已發菩提心遽即下座五體投地敬禮善財散華供養等十恭事師友四結可知第二後三十句明正令佛歡喜行中分三初十句結前生後即初成行相次十句中成行相後十句終成行相初中二初句中云佛子至不放逸者結前方便行成也後發大下生後並是正令佛歡喜行也於中一先由精進等成不放逸令後由不放逸更加勇悍故云大精進二由斂攝諸根得正念三由心不亂勝樂現前四由勝樂脩行不能已五由稱理脩離著六不以深而不動習七證不二方便八慈悲轉增九順了無盡門法十由前所行稱順佛心故令喜也次中成行相十句內四一標數辨相謂前門初成次顯中成故云復有十法令佛歡憙即是行成就相二徵數可知三別列中一謂前雖發勤若不至中或容有退令既至此故不退二於求法護法苦眾生不惜身命三不求財利稱名讚美亦為供養故四會事歸理謂知五蘊無性故五普證事事無㝵法界一即一切一切即一故六有兩釋一約四相謂知一切法無常苦無我寂靜莊嚴論第十一中名曰法印也優陀那菩薩藏經名四法鄔陀南鄔陀那此名為印亦標相如說無常是有為法標相苦是有漏法標相無我是一切法標相涅槃寂靜是無為法標相亦可印是決定義謂凡諸有為決定無常凡諸有漏決定有苦凡所執我決定無我無為理性決定寂靜若廣分別如優陀那第二善戒第七地持第八瑜伽第四十六今此為顯明為等法知無常等故得離四倒於常等相心無倚著一云此中不但離凡夫倒亦離二滅無常樂倒法蘊處界等本不曾生更有何滅若見有滅則見有生故無常等觀亦是顛倒以此無生印印一切法決定知無性故能觀心無所倚著七大菩提願饒益有情願如迴向品中所有諸願及初地中十大願等八忍謂勝解勝解與智照達真俗不二而二二而不二名清淨光明九觀自善法及佛眾生不見多少有異法性善根平等有故十無所行而行故四結可知後十句終成行相中四一總標由從中至終行相淳熟究竟故云復有也二徵數可知三別列中一勤及三善根二照法實性三無緣與樂四無緣秡苦五觀事行以合理六依法性而行事七八九十是願方便力智等四波羅蜜也此上十句皆云安住者顯行相至此淳熟不退故第二答入菩薩所住處問者以此觀能速得入地於中三十句分三初十句明起入地行二後次下十句明住地觀脩後佛子下十句明地要勝初中四標徵釋結初二可知三釋中十句分二前三句自分行一具資糧二成加行三自悟不由師後七勝進行一近善友為起行緣二須自策三行稱佛心為佛攝受故云住神力四無解緣倦五有兩釋一云深心鑒真徹事利智照事達理以此鑒照為自莊嚴一云重脩以深厚大悲磨瑩以明利智斯即大乘自莊嚴也六由於諸地法門心不住著故速入地也七無性觀門是諸佛善根方便此方便體與三世佛同四總結可知二次十句明善安住地脩觀法文中二先十句直辨能所觀相後悉善下逐難重顯前中二先一句總明能觀後九句別列所觀前中二先明脩觀時分謂創得入地住時不可後時方順安住法故後正標觀心謂善觀察應是觀向後別列九句中皆云隨其者以此一一句通顯十地一一地中中法門相望各別故智慧各別故乃至所得各別故一法門者謂隨地相得果等法於佛菩薩所聞已觀察故二甚深智慧者謂地地中根本智故三所脩因者此有二種一通行謂十度四攝等隨地有勝劣故然言隨也二別行謂若當地淨治地行故四所得果者謂調柔攝報等地地別故五境界者所化眾生多少異故六力用者謂處非處等十種智力故七示現者謂所作及力既各不同對彼變現故亦別也八分別者從前地轉入後故九所得者此通二種一於佛菩薩所得聞法故二於地地中證說得如故此段文同初地中菩薩住地行故彼云菩薩住於初地應從諸佛菩薩善知識所推求請問此地行相及果無厭足為成就此地亦應推求請問第二地行相及果乃至第十地相及得果善知諸地障對治成壞相果得脩地法清淨轉行處非處殊勝相不退轉淨謂治一切菩薩地乃至轉入如來地由此故地行不斷乃至入第十地不斷如商主預須知前路安危事云云第二逐難重顯中二先釋前善觀察後如是知下明觀察利益前中謂觀諸地法門等九句諸法皆不離自真心所現既不見有別體性故云無著名善觀也後益中三句初句應安第二第二應置第一所以然者此觀已是八地初住心故於中初二句牒前後一句顯益謂由智唯心理則能於地善安住也三後十句明地要勝中四一標謂思速入地二何以下徵意云地有何要念遠入邪三釋中三句一以入地至住則能成前隨諸地觀察所有功德二以具功德故能入佛地三至佛地故能廣作佛事謂十身三業滿法界遍十方盡未來重重無盡如因陀羅世界時處中利樂無斷四是故下結前思惟宜應速入五句一常勤脩二不息三無疲四以所脩德自嚴五結入地第三若大行清淨問中有二十句初十句行成出障故云清淨後十句由行淨因得勝法果前中一標起可知二何下徵數三者下別列十句即是十度一施滿足意自他俱悅二護戒堅淨三忍力無限四勤脩無退五伏沈不迷伏棹不亂故知得正念心一境性也六無分別慧善了諸法七善巧脩行無偏住著八大願堅固不可動搖九運生之力無有疲厭十佛及眾生智了同體此中初句五七各同十行餘并全別不可指復次有文具顯十度句佛子下總結可知後十句中四一牒前起後可知二何下徵數三一者下別列一多佛護念他方顯多又他方尚護自不待言二同類中為上首三堪受佛加四所在皆逢善友為怙如倚賴父母五常脩行勤及三善根六了有為法實性七住無緣拔苦八能起思慧九能起脩慧十知佛化物權實善巧四佛子下總結第四大願滿足問中二十句初十句起勝淨願後十勵志念溺又前十起願後十滿願前中四同前初二可知三列中一願度生無倦二願具脩淨土行三願重心事佛四願護法不惜身命五願隨智所觀淨土即能身詣其中六願與諸菩薩同行法性善根互望無礙不即不離七願入定無相無願之門以此了諸法八願得不空三業九無障㝵願徹窮未來際利樂眾生無盡期故又是十種如金剛大乘誓願中第八願也又是十種願無㝵用中第八於一切行菩薩行而大願不斷也十願具生了普因謂普賢行生因也淨治等了因也或行普賢行即是淨治一切種智門門是方便義也四總結可知後十令願滿中文三謂標徵列列中初五自行後五利他前中一行心無厭令願成滿二大誓自嚴三念勝己者願力所作四普願眾生生淨剎問菩薩何故自不願淨土願他生邪答菩薩行法法應如是所以者何若不願他生淨土則利他行不成若不自願生穢土則大悲行不立五樂脩行海長時無間後五中一願普成熟二為成熟一一眾生各經一劫不覺疲倦三於彼一切劫具受三惡等苦無暫厭悔四亦不暫起貪樂之心五勤護法護教理行果等第五答護菩薩藏問中四一結前生後二何下徵三所謂下別列四佛子下結初中謂由前行願蘊積成藏故唯十句更無成滿也二徵可知三列中一見佛二持法三解釋教理四悲普五多定六來欲乞皆與七辨無㝵解八護得五通變現緣境等業用皆無盡故九住一切時梵本中名無邊佛威神守護無盡藏十入一切處四結可知第六答隨所應化常為說法中三一菩薩得是下結前生後謂蘊福智攝眾生故二佛子菩薩下徵起三所謂下別列於中有三十句分二前十五句教離過後為說法時下十五句教起行前中二初十四句別說後菩薩下一句結隨應說前中二初四句明知根器一知所作者宜作何事二宿因待何緣發三知心行念處四知希望所好後十句正明教離過一貪雖通色等一切今此且據麤顯色欲對治故說不淨廣說五種如下十藏品中說二嗔能加害慈能與樂正對治故三癡等者癡是邪癡觀察是思擇謂為彼不信由惑起業由業感果者說十二因緣令觀察故四為說等者謂前三句約三毒重者且為說對治煩惱未堪為說成勝智法今此等分三毒輕故方可為說無性觀等釋多貪等分名具如雜集第十三說五知三界無樂則不復受樂生死以人天中樂皆變異受行所隨故六處所者有二種一身所依處即鄉邑舍宅乃至樂著阿蘭若處二識所依處即所依身於此二處而樂著者皆由不了空寂之理故此為說令不樂著七為說怠惰損勤行益八為自高陵彼者說一切眾生蘊處界平等無異九易知十為樂事寂者說理寂法後教起行十五句中亦二先五句明說法儀軌一文有位次二義無差錯三於前後理皆以智照四於無性印或法殟柁南皆審稱順五行位徵著次第為說後十句正教起行中一令於所說行門生信三簡知根性令入佛教三令證理四令斷法愛由貪相應故五令除二執六令識真佛不離自心即是常念七令知說法聲實性八令悟名句文如彩畫空九令知法喻相應十令悟佛果智大用第七答恒不捨波羅蜜行問中二先牒前利他行時即成自利行後是時下明自利行時即成利他行而此兩文說雖前後行則同時故云菩薩為眾生說法則自脩習增長義利不捨諸度等義利者如前釋不捨諸度者二利行同體不相捨離但所望異故波羅蜜道者度行通至佛果故二行同體所望異者即前所明隨其所應為說法時令彼益故成利他行此即法施成自利檀行又法施離慳成自利戒行又法施忘怨及諦察勝解成自利忍行又說法無倦成自利勤行又說法之心專一法性成自利禪行又說法時念念思惟思慧增長成自利慧行又說法時不住空有隨機所宜皆善巧故成自利方便行又此說法稱十盡願成自利願行又此說法心是無雜染力乃至第十加持力等成自利力行又此說法智能知所化者心行煩惱乃至知佛智覺法界門成自利智行也後明自利行時即成利他行中具顯十度即為十段一一段中二先明行相後結度名就行相中皆先約事後約理然事與理說離前後行則同時就初施行相先約事中謂身命財法隨求即與則無方來乞悉能滿意後而無下約理謂達三事空故無所著後結度名云是則能淨等者謂若但事行而不會理或但觀理而不行事則不能淨波羅蜜故下諸結名並准此知雖自利由說法利生即利他也二戒行相先約事云具持眾戒者三聚清淨無缺犯故後而無下約理中謂三輪淨故無所著無著故我慢息謂菩薩不以自具持戒見他不具陵彼自高故持戒雖是自利由菩薩戒要必法施方名具持眾戒故此即為利他結名准知三忍行相中先法後喻法中先約事者謂為怨惡憎嫉打罵割截等處與觀善無別等為說法後於諸下約理者諦察怨親平等性故高為說法初無有二後喻中普截善惡無分別故忍雖自利因次說法則為利他後結名可知四勤行相先約事中三一利樂勤謂遍策諸行亦普勸發諸行亦普勸發諸有情故二諸有下如行勤三勇猛下被甲勤也後於諸下約理者謂於三勤所生善根離有無相離有故不取離無故不捨由此佛因行滿足因行是果之門門是方便結名准知五禪行相中十句先科後釋前中四門一三禪二事理三因果四禪支及初三禪者謂十句中一二三六七九是現住法樂禪由得真三昧樂不復貪著世間輕安虗妄樂也餘亦並是正在定故五十兩句正是引生功德禪兼饒益有情禪現通威佛皆非為己故餘唯引生由定能令生多定故令知定境故了知不違無生印故二事理者謂十句中三九兩句約理餘皆約事三因果者前九皆因第十是果四禪支者十句中初一句及第三句內下半是對治支第二句及第三句內上半是所依支正思惟即是心一境性不住不出即是無生行相唯遮詮故後七句是利益支依小乘及大乘權教八定支分名體與此不同滅受想定名同體異或名名皆同而對治所治依利益並別謂對治一切惑障非唯靜慮無色等障惑此唯約脩位所斷所知障說由得滅定者非見道故地中不斷煩惱障故前八亦據此人說故若依融攝位地不定此中所依即無生定薩遮第五亦同此說對治利益如文可知後釋文者一由觀五境無無自性故不復貪著二依九定作無生觀從初禪為首乃至非想及滅盡定按次入出故云次第定簡異逆順超越為名九定具如薩遮中說靜慮無色四相分別如雜集第九廣顯九定如別行章三正思惟及不住不出等如前可知四從無生定出生多定起信云得此真如三昧能生無量諸三昧門五從前多定各起多通六出入九定逆順自在顯淳熟謂從初禪入二禪乃至從非想入滅定如是名順從滅定入非想乃至從二禪入初禪如是名逆七由無生定入餘一等持時即入多等持以無生定是一切定根本故八由無生定故觀一定境時即知一切定境九在無生觀時能緣觀智與餘一切若事若理等持等至觀智不相違以彼一切不離此故智即是印故名智印印定諸法本不生故無性攝論第七云靜慮定名等持無色定名等至又心一境相名等持正受現前名等至十由此定即是佛體故依此所作皆稱法界是故能令速證佛位結名可知六般若行相中八句先科後釋前中三一因果謂前七脩因後一成果二理事謂五六兩句約理餘皆約事三三慧謂初三成聞慧次一成思慧後四脩慧問寧知此八句初四次二後二非是加行正體後得如次邪答此若具三不應更說第十智度故無性釋論第七云若說十度第六唯是根本智攝若立六度通攝三智後釋文者且依三慧謂聞中初句內有二義一正成聞慧二句思為因謂聞已記持故前句聞慧勝緣於中二謂近及事後句聞慧勝因亦二謂樂及無厭足無欲樂不能聽故暫聞則已慧不生故思慧中先簡非後顯正謂簡獨覺及不隨所聞妄思惟故後顯正者謂如理故後四脩慧中初兩句正是慧體上句離妄下句稱實後兩句慧用上句知佛行下句入果結名可知七方便行相中十句皆顯悲智善巧無所住著名為方便文中先科後釋科有二相一分二方便謂四七八三句明迴向方便餘七句明拔濟方便若依本業纓絡下卷因果亦有三方便一進趣向果二巧會有無三一切法不捨不受屬當可知二分理事別謂四八九句約理餘約事後釋文中一巧匠化世如賢首品云若見世界始成立眾生未有資身具足時菩薩為工匠為之示現種種業乃至廣說二導利忘疲三稱機現形四行淨三輪五現漏無漏行六不住涅槃七不住生死八觀諸所作皆無作作故云善觀九為物現嚴非自愛著十入趣受生結名可知八願行相中十句分二謂三四五十等四句明求菩提願餘之六句明求利他願且依一相理實皆通又一一皆至無餘故云盡也依本業經願有三種一自行二神通三外化願文可知文中一利生盡願二嚴剎盡願三供佛盡願四了法界盡願五脩法界行盡願六盡來際住願七知他心盡願八悟有支起滅盡願九現淨土盡願十證佛智盡願此十中前九脩因無餘後一成果無餘結名可知九力行相中十句分三初句思擇力後九脩習力依本業經通力有三謂報通力脩通力變化通力文中初二句報通力第九句脩通力第十句變化通力或第九第十句俱通脩力變化力加持亦通通報力所攝餘句或是三力因緣或三力所起准知十中一觀心淨明徹見法性曰深離有無見云無雜染二信心徹理曰深深故邪師教不能伏三不見有拔苦而拔故無疲厭四不見有與樂而與故所行平等五義持無忘六巧說稱機故令歡喜七三輪離相三空圓滿唯顯了教故嚴大乘八無障㝵願徹窮來際利樂無斷九神力具故出多變現十聞教不信不解不受者神力加持令信解領受結名可知十智行相中十句分四初七知眾生心行此成就有情智也次一句知諸法實性此受用法樂智也次一句知佛能隨化力此成就有情智後一句菩薩自悟法界智此受用法樂智依本業經智三種一無明智二一切種智三變化智十句中初四句是無明智三毒中無明為本智知三毒智從本為名故餘皆一切種智或第五句是變化智若廣分別十波羅蜜如別行章第八答所念眾生滅令得度問中三一結前起後二墮惡下正明化度三如其下總結初中二前三句結前後住大下起後前中三句各通牒前十度初云清淨者謂脩前十度時皆淨三輪離有無相故並結名中云是則能淨等也二圓滿者謂脩前十度時皆二利圓滿故包融圓滿故十度圓滿故因終圓故三不捨者謂脩前十度行時如救頭然曾無暫捨故後起後者謂今隨昔日創發大心請一切眾生誓常度脫故云經大莊嚴乃至云而得度脫等言住者正住在脩行也大莊嚴者大誓願也菩薩乘者悲願相應運生也隨所者順昔願心所欲度生皆為說法令解脫也念授隣近同在別境理實是欲希望度彼亦可隨昔願心所請度者明記不忘故云念也梵本中云於菩薩乘住大莊嚴隨所請眾生成為開示使集諸善根皆令出離二正明化度中十句分四初二說離苦難法謂為將墮苦趣常生難者語令知使懺悔若不爾者純苦趣中無暇聞法發心故若隨值菩薩聞法能勤非難中故或現墮苦發心在難能勤所以者何除無間獄餘容有故聞法後答難中有故次三說離增上三毒法謂於劣境起增上煩惱故云多也初云示無貪法者謂說不淨觀故說無生觀故二令行平等者謂說違順境性無二故三為說緣起者謂說十二有支相緣故起即顯流轉非自然勝性等起相緣故不起即顯還滅不待緣滅性自滅故由此令離斷常等見著次三說三界出離法初教離欲者謂欲界愛恚及因愛恚所起十惡教以尋伺對治故得離欲界或說所治無恚或說有五謂一貪尋恚尋害二憂三苦四犯戒五散亂二為說毗鉢舍那者此有二種一者靜慮雖定慧均然是定地恐其滯寂但為說觀令離色界二者由彼未聞無生觀慧依有漏定麤治過患狹麤利益故此為說無生觀慧令知惑源得究竟益永離色界三為說妙慧者此亦二種一者以彼無色定多慧少恐其滯寂說慧令均使離無色二者妙慧是無生慧謂彼所持取相細根令出離故後二隨乘根性方便為說初教二乘寂靜行者此有二種一者隨彼小根說遠離行故二者因彼樂乘方便為說一切諸法本來寂靜不生不滅後為樂大說十力廣嚴者此亦二種一為權大乘根樂三身佛十力境界者乘方便為說十身佛十種大力那羅延等廣大佛事引令入實二為樂實大乘根直為說佛十種大力廣大莊嚴令得增進三總結中二初結本誓願後菩薩具足下結問中度脫此中准梵本一切眾生下脫一句云是名住大莊嚴餘並同也第九答前紹三寶種使不斷絕問謂菩薩有知根知法巧化之慧令所化者成聞熏種生正覺牙成佛說法度諸眾生成菩薩聲聞僧由此能令三寶不斷就此文中三先牒前起後二何下徵三菩薩下釋初中牒前菩薩有知根識法巧化之慧亦即是後徵釋之處二徵意云菩薩但能說法度生何以能令三寶種不斷邪三釋中明四重三寶種不斷相於中前三別辨後一總顯就前別中初三寶內佛寶云教諸眾生等者謂菩提心是佛體故此有二義一者菩薩自己發心得佛體故續前不斷復更教他發心令得佛體胤後不斷後後皆爾為不斷也二者諸佛無師無㝵智具在眾生心中眾生不覺菩薩教發大心則佛智顯現後後皆爾為不斷也法寶云常為等者謂菩薩自於佛菩薩聞正教理今復為開闡教理如是展轉後後相續為不斷也僧寶云善持等者謂菩薩自持教無違事理教他亦爾無乖違是和合也次三寶內佛寶云悉能等者二種一謂無障㝵願徹窮來際利樂不斷不同二乘趣無餘依究竟永滅讚發此願故二謂求菩提饒益有情願謂菩薩行海皆應以願迴向眾生成大菩提讚發此願則種性成故法寶云分別等者謂此菩薩自聞因緣無生方便而得證悟今復為他說其無生證悟方便故僧寶云常勤等者謂於菩薩眾中三業互敬戒見施同由此成佛當還有僧故後三寶內佛寶云於眾生等者謂佛昔聞教等流無流熏種成佛佛令菩薩於佛熏種亦爾今便為他無倒宣說令人眾生心田成佛可之種故法寶云護持等者初句通護三法不斷謂證理為護理法持教為護教法脩行為護行法若兼下句則唯教行以護教行容有身命之難故由佛證理得成教化化菩薩菩薩證理成佛教化眾生亦令證教行展轉不斷亦爾僧寶云統理等者謂菩薩自依一味之法後以此法攝仰大眾令皆隨順為和合不斷上來別辨竟後總顯中持三世佛戒者謂由戒得佛由佛有法僧故菩薩前後亦如是故不斷也第十答善根方便皆悉不虗問中四一明由紹三寶種故三業無暇二無暇故下明由無暇得不空三業三菩薩如是下明三業不空自利相四若有眾生下明不空利他相初中二先結前紹三寶種後一切下生後生後中二先標所行無失後隨有下釋無失所由可知二明得不空三業中二初牒前後所作下起後起後中三初明所行無謬二皆與下釋無謬所因三末一句結成不空三明三業不空自利相中四初牒前標後二何下徵可知三所謂下依標釋十中初四依正嚴謂三業及土於中前二後一利他故現現身說法嚴土攝生故第三一向自心定故次四句明攝化嚴一放光警覺二攝眾集會三現通令信四授法令解後二現佛說法嚴四菩薩成就下結不空自利相四明不空利他相中有法喻合三法中見聞等略舉十事餘並可知上來答所成之行問竟第二大段答行所成德問中三初明心行成因德二佛子下明結因成果德三於無邊世界下明護持正法德初中十二句一一內有二皆先釋後牒准法應合先牒後釋文雖左右於義無違如云摧魔以慈或曰以慈摧魔就初句中勤加脩習四字冠下諸句謂牒問云勤加脩習何法以滅癡闇乃至勤加脩習何法隨所應等釋云勤加脩習以智慧明滅諸癡闇乃至云以往昔誓願力隨所應化現淨土轉法輪度眾生所謂初發大心時即發此大悲無障㝵願此即便顯初後二句竟二云摧魔以慈者自心先能調他故三制外以福慧者智以理制福以威制故四滅心垢惑以金剛定者無間道時煩惱所知二障種永斷無餘五集善以進者精進遍策眾善行故六以淨土善離惡道諸難者淨土業成自無三惡八難故七以無著慧淨智境者心離執著智障淨故八以方便智出生菩薩諸地等者方便智有二種一種一加行位智為十地方便能生十地故二善巧方便智此通資粮及十信智於真俗二諦巧鎔融故依此智慧出生七法及令清淨准前問中此脫總持令清淨者治謂其障使純淨故九以一切善法成滿諸佛淨土等者謂佛依正報因遍脩眾善維摩佛國品云六度四攝四無量道品十善等皆是淨土故方便品云佛身者即法身也乃至云從斷一切不善法集一切善法生此句內有六法莊嚴謂淨土相好三業十以智自在觀知佛十力四無畏十八不共平等者此有二種一謂觀一切佛力等知無差別二觀知同一法性然此二義融無障礙十一以廣大智知一切智之境界者謂菩薩以照理事無㝵智知佛後得智也十二如前釋二明答結因成果德問中無別行相但依前十二句行相勤加脩習即能次第成就無量功德法乃至疾與佛功德等故牒前云菩薩勤修此法次第成就等也按前問中有三句今此答中有兩句由來問中初二句為一句故也三若護持正法問中二先別說後成就三世一切如來智下總結成法師說法護持前中三初正答前問次何下徵後佛子釋初中答前十問即為十段一答前於諸如來應正等覺百千阿僧祇劫修菩薩行所集法藏守護問中三一守護處謂無邊世界二能守護者謂為大法師三所守護法謂諸佛正法二答前開示演說時諸魔外道不能阻壞問謂得一切佛護念故三答前攝持正法無窮盡問於中出所因一內持廣大法藏二外說無㝵四答前於一切世界演說法時十王守護問於中二先明得三種三業後得心下明十自在由法王守護故得三三業十種自在由得此故九王守護三三業有第一善巧三業身業巧隨類現語業三種一義無碍辨巧說深理二法無碍辨巧布教相三由前二二巧令聞者獲益第二攝根三業意業知機語業二句一圓淨二令喜第三無勝三業身業威力意業知機語業無碍後十自在中一一皆有標名釋義相顯可知由法王守護故得此三三勝三業及十自在即由得此諸王守護或由得此感十王守護令無退失轉增最高也五入前一切世間恭敬供養問謂菩薩更演說大法得人天敬養故六答前諸佛護念同灌頂問謂得諸佛護諸佛灌頂由得灌頂得無見頂相由佛護念得身業威德無能映蔽語業威德無能屈辨七答前一切菩薩亦皆愛敬問由菩薩得前十種自在處大眾中威德蔽眾以大慈悲安怯弱故一切菩薩敬愛也八答前得善根力增長白法問以深智慧察其欲樂也九答前開闡諸佛甚深法藏問謂以無畏辨為其說法故十答前能令一切聞法生喜問謂攝持正法以自莊嚴釋曰菩薩利他為自利故是莊嚴也上來總顯差問竟次徵意云此菩薩位居十住何以乃得如是三業十自在邪釋意云以成就十種德故一智圓德二擇法德三不忘德四無住慧德五總持德六大心德七無失辨德八勝解德九遍法界會中恒輔翼德十了自與佛同體德第二總結成中二先結能成因後作大下結所成德前中二初明成果智圓後一切菩薩下成因智因是果因也後結所成德中三一法師是能護持二正法是所護持三總結前二也第二重頌分中十頌分二初六頌半頌前十種所成之行後令其下三頌半頌前行所成德前中初半頌頌初不放逸二有一頌半頌佛歡喜三有一頌頌入諸地及大行大願四有一頌頌菩薩藏及隨所化說法五有一頌頌不捨自行諸度及所念眾生令得度六半頌頌紹三寶種七有一頌頌善根方便皆不虗二頌行所成德中初一頌頌初兩段謂行成因德及因成果德次有一頌半頌護轉正法後有一頌喻說法者說法三業無畏辨等謂一身儀庠序二樹說雄猛三智了深度為動問答物滅惑第三結說分中所說契理令佛歡喜所說合機大眾奉行亦可契理合機佛憙眾奉先長行後偈頌兩段不同說分了上來初請次說三結不同釋文了上來初辨名次來意次宗趣後釋文四門法亦了上來初明昇須彌頂品乃至明法品了六品明第三會竟卍按六七兩卷隱沒而無傳者應有第四會夜摩天說十行位四品昇夜摩天品夜摩讚嘆品十行品無盡品第五會都率天說十迴向三品之內昇都率天品都率讚嘆品之釋八卷十迴向品亦第五會也
